body:
  text: 樂府泰娘歌秋扇詞搗衣曲七夕龍陽縣歌度桂嶺歌揷田歌畬田行蒲萄歌鶗鴂吟牆隂歌觀雲篇踏潮歌百花行春有情篇路傍曲白鷺兒壯士行邊風行竹枝詞楊柳枝詞浪濤沙詞瀟湘神詞抛毬樂詞又楊柳枝詞又竹枝詞紇那曲泰娘歌并引泰娘夲韋尚書家主謳者初尚書爲吴郡得之命樂工誨之琵琶使之歌且舞無幾何盡得其術居一二歳㩦之以歸京師京師多新聲善工於是又損去故技以新聲度曲而泰娘名字往往見稱於貴遊之閒元和初尚書薨于東京泰娘出居民閒乆之爲蘄州刺史張愻所得其後愻坐事謫居武陵郡愻卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭其音燋殺以悲雒客聞之爲歌其事以足于樂府云爾泰娘家夲昌門西門前緑水環金堤有時妝成好天氣走上臯橋折花戲風流太守韋尚書路傍忽見停隼旟斗量明珠鳥傳意紺幰迎入專城居長鬟如雲衣似霧錦茵羅薦承輕歩舞學驚鴻水榭春歌撩上客蘭堂暮從郎西入帝城中貴遊簪組香簾櫳低鬟緩視抱明月纎指破撥生胡風繁華一旦有銷歇題劒無光履聲絶洛陽舊宅生草萊杜陵蕭蕭松栢哀妝奩蟲網厚如繭愽山鑪側傾寒灰蘄州刺史張公子白馬新到銅駞里自言買笑擲黃金月墮雲中從自始安知鵩鳥坐隅飛寂寞旅魂招不歸秦家鏡有前時結韓壽香銷故篋衣山城少人江水碧斷鴈哀猿風雨夕朱絃巳絶爲知音雲鬢未秋私自惜舉目風煙非舊時夢㝷歸路多參差如何將此千行淚更灑湘江斑竹枝秋扇詞莫道恩情無重來人閒榮謝遞相催當時初入君懷袖豈念寒爐有死灰搗衣曲爽砧應秋律繁杵含淒風一一逺相續家家音不同户庭凝露清伴侣明月中長裾委襞積輕珮垂璁瓏汗餘衫更馥鈿移麝半空報寒驚邊鴈促思聞候蟲天狼正芒角虎落定相攻盈篋寄何處征人如轉蓬七夕二首河鼓靈旗動常娥破鏡斜滿空天是幕徐轉斗爲車機罷猶安石橋成不礙查寧知觀津女竟夕望雲涯天衢啓雲帳神馭上星橋初喜渡河漢頻驚轉斗杓餘霞張錦幛輕電閃紅綃非是人閒丗還悲後㑹遥龍陽縣歌縣門白日無塵土百姓縣前挽魚罟主人引客登大堤小人縱觀黃犬怒鷓鴣驚鳴遶籬落橘柚垂芳照牎户沙門草緑見吏稀寂歷斜陽照懸鼓度桂嶺歌桂陽嶺下下復髙髙人稀鳥獸駭地逺草木豪寄言千金子知余歌者勞插田歌并引連州城下俯接村墟偶登郡樓適有所感遂書其事爲俚歌以俟采詩者岡頭花草齊鷰子東西飛田塍望如線白水光參差農婦白紵裙農夫緑蓑衣齊倡田中歌嚶儜如竹枝但聞怨響音不辨俚語詞時時一大笑此必相嘲嗤水平苗漠漠煙火生墟落黃犬往復還赤雞鳴且啄路傍誰家郎烏帽衫袖長自言上計吏年初離帝郷田夫語計吏君家儂足諳一來長安罷眼大不相參計吏笑致詞長安眞大處省門髙軻峨儂人無度數昨來補衛士唯用筒竹布君看二三年我作官人去畬田行何處好畬田團團縵山腹鑚龜得雨卦上山燒卧木驚麏走且顧羣雉聲咿喔紅熖逺成霞輕煤飛入郭風引上髙岑獵獵度青林青林望靡靡赤光低復起照潭出老蛟爆竹驚山鬼夜色不見山孤明星漢閒如星復如月俱逐曉風滅夲從𫾣石光遂致烘天熱下種暖灰中乗陽拆牙孽蒼蒼一雨後苕穎如雲發巴人拱手吟耕耨不關心由來得地勢徑寸有餘隂蒲萄歌野田生蒲萄纒繞一枝蒿移來碧墀下張王日日髙分歧浩繁縟脩蔓蟠詰曲揚翹嚮庭柯意思如有屬爲之立長架布護當軒緑米液漑其根理踈看滲漉繁葩組綬結懸實珠璣蹙馬乳帶輕霜龍鱗躍初旭有客汾隂至臨堂瞪雙目自言我晉人種此如種玉釀之成美酒令人飲不足爲君持一斗往取涼州牧鶗鴂吟朝陽有鳴鳯不聞千萬祀鶗鴂摧衆芳畏聞先入耳秋風白露晞從是爾啼時如何上春日唧唧滿庭飛牆隂歌白日左右浮天潢朝脯影入東西牆昔爲童兒在隂戲當時意小覺日長東鄰侯家吹笙簧隨隂促促移象牀西隣田舎乏糟糠就影汲汲舂黃粱因思九州四海外家家只占牆隂内莫言牆隂數尺閒老却主人如等間君看眼前光景促中心莫學太行山觀雲篇興雲感隂氣疾走如見機晴來意態行有若功成歸葱蘢含晚景㓗白凝秋暉深夜渡銀漢漠漠仙人衣踏潮歌并引元和十年夏五月終風駕濤南海羨溢南人云踏潮也率三更歲一有之余爲連州客或爲予言其狀因歌之附于南越志屯門積日無迴飈滄波不歸成踏潮轟如鞭石矻且揺亘空欲駕黿鼉橋驚湍蹙縮悍而驕大陵髙岸失岧嶤四邊無阻音響調背負元氣掀重霄介鯨得性方逍遥仰鼻嘘吸揚朱翹海人狂顧迭相招罽衣髽首聲嘵嘵征南將軍登麗譙赤旗指麾不敢囂翌日風迴沴氣消歸濤納納景昭昭烏泥白沙復滿海海色不動如青瑶百花行長安百花時風景宜輕薄無人不沽酒何處不聞樂春風連夜動微雨凌曉濯紅豔出牆頭雪光映樓角繁紫韻松竹逺黃遶籬落臨路不勝愁輕飛去何託滿庭蕩魂魄照廡成丹渥爛漫嗾顚狂飄零勸行樂時節易婉娩清隂覆池閣唯有安石榴當軒慰寂寞春有情篇爲問遊春侶春情何處㝷花含欲語意草有鬪生心雨頻唯發色雲輕不作隂縱令無月夜芳興暗中深路傍曲南山宿雨晴春入鳯皇城處處聞絃管無非送酒聲白鷺兒白鷺兒最髙格毛衣新成雪不敵衆禽喧呼獨凝寂孤眠芊芊草乆立潺潺石前山正無雲飛去入遥碧壯士行隂風振寒郊猛虎正咆哮徐行岀燒地連吼入黃茅壯士走馬去鐙前彎玉弰叱之使人立一發如鈹交悍情忽星墮飛血濺林梢彪炳爲我席羶腥充我庖里中欣害除賀酒紛號呶明日長橋上傾城看斬蛟邊風行邊馬蕭蕭鳴邊風滿磧生暗添弓箭力斗上鼓鼙聲襲月寒暈起吹雲隂陣成將軍占氣候出號夜翻營竹枝詞并引九首四方之歌異音而同樂歳正月余來建平里中見聮歌竹枝吹短笛擊鼓以赴節歌者揚袂雎舞以曲多爲賢聆其音中黃鍾之羽其卒章激訐如吴聲雖傖儜不可分而含思宛轉有湛濮之豔昔屈原居沅湘閒其民迎神詞多鄙陋乃爲作九歌到于今荆楚鼓舞之故余亦作竹枝詞九篇俾善歌者颺之附于末後之聆巴歈知變風之自焉白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動郷情山桃紅花滿上頭蜀江春水拍江流花紅易衰似郎意水流無限似儂愁江上春來新雨晴瀼西春水縠文生橋東橋西好楊柳人來人去唱歌行日出三竿春霧消江頭蜀客駐蘭橈溤寄狂夫書一𥿄住在成都萬里橋兩岸山花似雪開家家春酒滿銀杯昭君坊中多女伴永安宫外踏青來城西門前灩澦堆年年波浪不能摧懊惱人心不如石少時東去復西來瞿唐嘈嘈十二灘此中道路古來難長恨人心不如水等間平地起波瀾巫峽蒼蒼煙雨時清猿啼在最髙枝箇裏愁人腸自斷由來不是此聲悲山上層層桃季花雲閒煙火是人家銀釧金釵來負水長刀短笠去燒畬楊柳枝詞九首塞北梅花羗笛吹淮南桂樹小山詞請君莫奏前朝曲聽唱新翻楊柳枝南陌東城春早時相逢何處不依依桃紅李白皆誇好須得垂楊相發揮鳯闕輕遮翡翠幃龍墀遥望麴塵絲御溝春水相暉映狂殺長安年少兒金谷園中鶯亂飛銅駝陌上好風吹城東桃李須臾盡爭似垂楊無限時花萼樓前初種時美人樓上鬪腰支如今抛擲長街裏露葉如啼欲恨誰煬帝行宫汴水濵數株殘柳不勝春晚來風起花如雪飛入宫牆不見人御陌青門拂地垂千條金縷萬條絲如今綰作同心結將贈行人知不知城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管別離輕盈嫋娜占年華舞榭妝樓處處遮春盡絮飛留不得隨風好去落誰家浪濤沙詞九首九曲黃河萬里沙浪濤風簸自天涯如今直上銀河去同到牽牛織女家洛水橋邊春日斜碧流輕淺見瓊砂無端陌上狂風急驚起鴛鴦出浪沙汴水東流虎眼文清淮晚色鴨頭春君看渡口濤沙處渡却人閒多少人鸚鵡舟頭浪颭沙青樓春望日將斜銜泥鷰子爭歸舎獨自狂夫不憶家濯錦江邊兩岸花春風吹浪正濤沙女郎翦下鴛鴦錦將嚮中流定晚霞日照澄州江霧開淘金女伴滿江隈美人手飾侯王印盡是沙中浪底來八月濤聲吼地來頭髙數丈觸山迴須臾却入海門去卷起沙堆似雪堆莫道讒言如浪深莫言遷客似沙沈千濤萬灑去雖辛苦吹盡狂沙始到金流水濤沙不暫停前波未滅後波生令人忽憶瀟湘渚迴唱迎神三兩聲瀟湘神詞二首湘水流湘水流九疑雲物至今愁君問二妃何處所零陵香草露中秋斑竹枝斑竹枝涙痕點點寄相思楚客欲聽瑶瑟怨瀟湘深夜月明時抛毬樂詞二首五綵繡團圎登君瑇瑁筵最宜紅燭下偏稱落花前上客如先起應須贈一舩春早見花枝朝朝恨發遲及看花落後却憶未開時幸有抛毬樂一杯君莫辭楊柳枝詞二首迎得春光先到來淺黃輕緑映樓臺秖縁嫋娜多情思便被春風長暗催巫峽巫山楊柳多朝雲暮雨逺相和因想陽臺無限事爲君迴唱竹枝歌竹枝詞二首楊柳青青江水平聞郎江上唱歌聲東邊日出西邊雨道是無晴還有晴楚水巴山江雨多巴人能唱夲郷歌今朝北客思歸去迴入紇那披緑羅紇那曲詞二首楊柳鬱青青竹枝無限情同郎一迴顧聽唱紇那聲踏曲興無窮調同詞不同願郎千萬壽長作主人翁右巳上詞先不入集今附卷末劉夢得文集卷第九劉夢得外集卷第九表述引傳碑論西戎表謝上連州刺史表含輝洞述吏隱亭述傳信方述彭陽唱和集引唱和集後引吳蜀集引汝洛集引子劉子自傳王公神道碑爲淮南杜相公論西戎表臣某言臣一辤闕庭巳僅二載官當重任身受厚恩旣懷子牟戀闕之心又負臧文竊位之責思所以歌頌聖德禆𥙷箴規塵露至微不任懇迫臣逺祖詩顯名漢代出牧南陽讜言善筞隨事獻納忠醇之至聞于中外遺風可襲有激愚衷臣是以輒竭聞見粗陳梗槩雖不盡陛下聖明萬分之一然臣子之心有直必獻伏惟皇帝陛下德合天地道躋文武㢮張普博法則隂陽氣均生成人霑亭育凡是氛沴覆以春和銷除容納皆如聖意寛宥肆赦實賴皇明河中誅鋤不勞兵革淮右底定不戮一人慶浹萬邦事出千古近又西戎背約寇犯王師陛下弘貸豺狼矜其凶悍布以恩澤果此知慙功因德成不以兵制故詩云獫狁孔熾書稱蠻夷猾夏臣觀自古帝王不忍小忿貽大患故竭耗中國盡力邊陲至如滅昆明之城平大宛之種豈是發揮皇猷増榮簡冊故賢哲之論薄衛霍之功陛下鏡歷代無益之端修大君文德之教遂得北狄深藏五城晏閉百蠻嚮化四海無虞惟此小蕃尚迷聲教陛下示之大信弘以舊恩雖關防暫驚而烽燧旋罷臣負恩方鎭初懼寇戎正於憂迫之時果聞仁聖之諭攘却凶孽不勞干戈臣靜思逺圖乆計莫若存信施惠以愧其心歳通玉帛待以客禮昭宣聖德擇奉誼之臣恢拓皇威選謹邊之將積粟塞下坐甲關中以逸待勞以髙御下重其金玉之贈結以舅甥之歡小來則慰安大至則嚴備明其斥候不撓不侵則戎狄爲可封之人沙場無戰死之骨若天下無事人安歳稔然後訓兵命將破虜摧衝原州營田靈武盡復舊地通使安西國家長筭悉在於此計熟事定舉必有功苟未可圖豈曰容易此皆陛下朝夕倦談之事前後立驗之謀臣質性頑踈籌畫庸近受恩非據敢忘獻忠犬馬之心實所罄盡謹遣某官某奉表謝上連州刺史表臣某言伏奉去三月七日制授臣使持節連州刺史恭承睿旨跪奉詔書皇恩重於丘山聖澤深於雨露抃舞失次神魂再揚臣某中謝臣性愚拙謬學文詞幸遇休明累登科第出身入仕竝不因人德宗臨御之時臣忝御史陛下龍飛之日臣忝郎官恭守章程勤脩職業權臣奏用蓋聞虚名實非曲求可以覆視跡卑易枉無路自明亦縁臣有微才所以嫉臣者衆競生口語廣肆加誣㐲頼陛下至仁特從寛典舉以縁坐貶佐遐藩屢變星霜頻經恩赦犬馬懷戀寢興匪寧唯讀佛經願延聖壽昨蒙詔命追赴上都隨列授官俾居逺郡在臣之分榮幸巳多伏荷陛下孝理弘深皇明照燭哀臣老母羸疾憫臣一身零丁特降洪恩得移善部光榮廣被母子再生凡在人臣皆感聖德凡爲人子皆荷聖慈豈惟賤臣獨受恩造不覺喜極至于涕零昔殷王俯念於前禽且聞解網漢帝有哀於少女爰命罷刑方之聖朝不足多尚感召和氣慰安羣生非臣隕越所能上報伏以南方厲疾多在夏中臣自發柳州便染瘴瘧扶筞在道不敢停留即以今月十一日到州上訖謹宣聖旨以示逺人恭述詔條所期富庶無任含輝洞述河南薛公景晦以文無害爲尚書刑部郎中以訕爲道州刺史居郡大理至於無事清機羡益盡付山水一旦以書來誇曰吾得異境于近郊自城西門竝南山俯江水有石穹然如夏屋其左右前後又如回廊曲房藻繡雕彤之象雲生日入怪狀迭發水石卉木香非人寰意其甞爲食霞御氣者之所遊息委蛻而去不知其幾千百年逮今得諸黃冠野夫及詣而信因名其地曰含輝洞蓋詩家流所謂山水含清輝者是巳吾子常以詞業於丗盍爲我誌焉愚得書退而深惟若薛公者少居江湖閒遊名山東探禹穴止四明句曲金華陽羡南過九江薄莊廬以渉彭蠡天下山水之籍存乎胷中第其髙下銖兩不失及是而口呿不能名顧爲竒信矣若江華者九疑三湘之佳麗地也前此二千石御史中執法河南元次山諫大夫北平陽亢宗司刑大夫東平吕和叔皆碩人也考盤招隱之致恒汲汲然卒使兹境貴于異日豈地愛其寶有時而發邪顧謂異信矣夫物之有作俟言而逺故述焉以書于洞隂曰營陽欝欝山水第一洞有含輝遊人忘歸忘歸孔樂請言其明先是斯境蘙于榛薄天姿孤絶凡目所忽閟其清光有待而發公之來思探異翫竒茇野憇林而民恱之旣恱其至益知所嗜捫徑歷峴來適公志偶得竒絶聿來告公駕言從之谷岸溟濛有石如門又如垣墉憀蔓交才似綸似組乃芟乃治乃可布武伸脰掉臂空洞無阻左右回環儼若廊廡飛泉出竇練縋花吐觸石吹沙珮揺絃撫側逕寅縁豁然見天有石如堂度之五筵東西二門與日明昬奥者如室宣者如軒因其髙下爰構亭榭匠生於心隨指如化開山剪木役以私屬結構曁茨子來嬉嬉無事而就邦人不知淑清之辰休澣之時雅歩幅巾琴壷以隨前無俗人與白雲期年日盡適形神不覊元氣顥然觀吾朶頥遵渚之鴻有時而飛石門之下可以棲遲此谷而盈彼丘而夷維公之羭跡永在斯吏隱亭述元和十五年再牧于連州作吏隱亭海陽湖壖入自外閒不知藏山歷級東望怳非人寰前有四榭隔水相鮮凝靄蒼蒼淙流布懸架險通蹊有梁如蜺輕泳徐轉有舟如翰登霞漾月若在天漢視彼廣輪千畒之半翠麗于是與丗殊貫㵟明峭絶靃靡葱蒨炎景有宜昬旦迭變疑昔神鼇負山而抃摧其別島置此髙岸海陽之名自元先生先生元結有銘其碣元維假符予維左遷其閒相距十五餘年封境服人其猶比肩天下山水非無美好地偏人逺空樂魚鳥謝公開山渉月忘還豈曰無娱伊險且艱溪山尤物城池爲伍却倚佛寺左聮仙府勢拱臺殿光含霜廡窈如壷中別見天宇石堅不老水流不腐不知何人爲今爲古石焉終堅水焉終竭不知何時再融再結傳信方述余爲連州四年江華守河東薛景晦以所著古今集驗方十通爲贈其志在於拯物予故申之以書異日景晦復寄聲相謝且咨所以𥙷前方之闕醫拯道貴廣庸可以學淺爲辤遂於篋中得巳試者五十餘方用塞長者之問皆有所自故以傳信爲目云元和十三年六月八日中山劉禹錫述彭陽唱和集引丞相彭陽公始由貢士以文章爲羽翼怒飛于冥冥及貴爲元老以篇詠佐琴壷取適乎閒讌鏘然如朱絃玉磬故名聞于丗閒鄙人少時亦甞以詞藝梯而航之中途見險流落不試而胷中之氣伊欝蜿蜒泄爲章句以遣愁沮悽然如燋桐孤竹亦名聞于丗閒雖窮逹異趣而音英同或故相遇甚歡其合面必抒懷其離居必寄興重詶累贈體備今古好事者多傳布之今年公在并州余守吴門相去迴逺而音徽如近且有書來抵日三川守白君編録與吾子贈荅緘縹囊以遺余白君爲詞以冠其前号曰劉白集悠悠思與所賦亦盈于巾箱盍次第之以塞三川之誚於是緝綴凡百有餘篇以彭陽唱和集爲目勒成兩軸爾後繼賦附于左云大和七年二月五日中山劉禹錫述唱和集後引貞元中予爲御史彭陽公從事于太原以文章相徃來有日矣無何予受譴南遷十餘年閒公登用至宰相出爲衡州方獲㑹面輸冩藴積相視泫然爾後或雜賦詩贈荅編成兩軸大和五年余領吴郡公鎭太原常發函寓書必有章句絡繹於數千里内無曠旬時八年公爲吏部尚書予牧臨汝有詩歎七年之別署其後云集卷自此爲第三未幾予轉左馮公登左揆每恨近而不見形於詠言開成元年公鎭南梁予以太子賔客分司東都新韻繼至率云三軸成矣二年冬忽寄一章詞調悽切似有永訣之旨伸紙慨歎居數日果承訃書嗚呼聆風相恱者四十年㑹面交歡者十九年以詩見投凡七十九首勒成三卷以副平生之言吳蜀集引長慶四年余爲歴陽守今丞相趙郡李公時鎭南徐州每賦詩飛函相示且命同作爾後出處乖逺亦如鄰封凡詶唱始於江南而終於劒外故以吴蜀爲目云汝洛集引大和八年予自姑蘇轉臨汝樂天罷三川守復以賔客分司東都未幾有詔領馮翊辤不拜職換太子少傅分務以遂其髙時予代居左馮明年予罷郡以賔客入洛日以章句交歡因而編之命爲汝洛集子劉子自傳子劉子名禹錫字夢得其先漢景帝賈夫人子勝封中山王謚曰靖子孫因爲中山人也七代祖亮事北朝爲冀州刺史散騎常侍遇遷都洛陽爲北部都昌里人丗爲儒而仕墳墓在洛陽北山其後地狹不可依乃葬滎陽之檀山原由大王父巳還一昭一穆如平生曽祖凱官至博州刺史祖鍠由洛陽主簿察視行馬外事歳滿轉殿中丞侍御史贈尚書祠部郎中父諱緒亦以儒學天寶末應進士遂及大亂舉族東遷以違患難因爲東諸侯所用後爲淮西從事本府就加鹽鐵副使遂轉殿中主務于埇橋其後罷歸浙右至楊州遇疾不諱小子承風訓稟遺敎眇然一身奉尊夫人不敢殞滅後忝登朝或領郡蒙恩澤先府君累贈至吏部尚書先太君盧氏由彭城縣太君贈至范陽郡太夫人初禹錫旣冠舉進士一幸而中試閒歳又以文登吏部取士科授太子校書官司間廣得以請告奉温凊是時年少名浮於實士林榮之及丁先尚書憂迫禮不死因成痼疾旣免喪相國楊州節度使杜公領徐泗素相知遂請爲掌書記捧檄入告太夫人曰吾不樂江淮閒汝冝謀之於始因白丞相以請曰諾居數月而罷徐泗而河洛猶艱難遂改爲楊掌書記渉二年而道無虞前約乃行調補京兆渭南主簿明年冬擢爲監察御史貞元二十一年春德宗新棄天下東宫即位時有寒俊王叔文以善弈棊得通籍待詔因閒隙得言及時事上大竒之如是者積乆衆未之知至是起蘇州掾超拜起居舎人充翰林學士遂隂薦丞相杜公爲度支鹽鐵等使翊日叔文以夲官及内職兼充副使未幾特遷户部侍郎賜紫貴振一時愚前巳爲杜丞相奏署崇陵使判官居月餘日至是改屯田貟外郎判度支鹽鐵等案初叔文北海人自言猛之後有逺祖風惟東平吕温隴西李景儉河東柳宗元以爲信然三子者皆與余厚善日夕過言其能叔文實工言治道能以口辨移人旣得用自春至秋其所施爲人不以爲當非時上素被疾至是尤劇詔下内禪自爲太上皇後謚曰順宗東宫即皇帝位是時太上乆寢疾宰臣及用事者都不得召對宫掖事秘而建桓立順功歸貴臣於是叔文首貶渝州後命終死宰相貶崖州余出爲連州途至荆南又貶朗州司馬居九年詔徴復授連州自連歷夔和二郡又除主客郎中分司東都明年追入充集賢殿學士轉蘇州刺史賜金紫移汝州兼御史中丞又遷同州充夲州防禦長春宫使後被足疾改太子賔客分司東都又改祕書監分司一年加撿校禮部尚書兼太子賔客行年七十有一身病之日自爲銘曰不夭不賤夭之祺兮重屯累厄數之竒兮天與所長不使施兮人或加訕心無疵兮寢於此牖盡所期兮葬近大墓如生時兮魂無不之庸詎知兮唐故監察御史贈尚書右僕射王公碑公諱倰字眞長其先乗黃帝夫大聖之後與庶姓不同如河出崑崙濳於厚地欻焉振起奮爲洪瀾環自天非衆川也故自黃帝八代而生舜武王克殷求有嬀之胤滿封於陳是爲胡公十三葉生完自以公子國難不得立乃抱樂器奔齊桓公以卿禮接之下又十一葉和以乆爲政隂浹于人遂有齊國三代稱王至建爲秦所滅項羽入秦封建孫安爲濟北王漢興失國齊人謂之王家因以爲氏安子㳙仕漢爲鎭東將軍青州牧封劇縣伯自㳙至彤几一十九代兩漢公卿牧守如家諜然十代祖猛字景略符秦尚書令佐秦成覇業與孔明佐蜀同功故時人爲之王葛史云北海劇人遂著爲族望九代祖休儀曹尚書八代祖鎭惡佐命宋武長安擒姚泓至北齊五代祖昕七兵尚書兄弟九人時号王氏九龍於齊史有傳髙祖顗字君粹北齊著作郎燕郡太守曽祖敬忠成州刺史大父上容髙宗封嶽進士及第歷侍御史主客兵部貟外郎累遷兵右金吾衛將軍冀州刺史靈州都督朔方道緫管見職官儀及衣逸二字烈考暾宣州宣城縣令贈工部郎中娶河東裴氏乃生僕射孝睦餘力工爲文始以崇文生應深謀祕䇿考入上第拜監察御史天之賦予莫能兩大旣敡令名而不以景福享齡五十五葬于河南府偃師縣亳邑郷後以子貴累贈禮部尚書至右僕射夫人江夏李氏祔焉李門多竒才父暄起居舎人暄子鄘門下侍郎平章事髙叔祖善蘭臺郎崇文館學士注文選行於時善子邕北海郡太守有重名四方之士求爲碑誌者傾天下故夫人於盛宗禮範可法累贈至江夏郡夫人僕射有三子長子早終次子處玄少嬰沈恙慕道士養生之術髙尚其趣強仕而没積善不試後來果大焉季子彦威字子美始以五經登甲科歷太常博士祠部貟外郞遷屯田郎中轉户部司封竝充禮儀使判官弘文館學士京兆少尹諫議大夫史館脩撰以直諫出爲河南少尹入爲少府監司農卿改湽青節度使徴拜户部侍郎判度支勢逼生患出爲衛尉卿分司東都㝷起爲陳許節度使檢校禮部尚書充汴宋亳等州節度觀察處置等使北海縣開國子食邑五百户娶潁川韓氏主客貟外郎衢之女國子祭酒楊頊呼玉之外孫夫人有三弟皆材無子早謝巳如禮祔葬于亳邑原僕射厚德覆露之尚書丕承之以蚤孤銳意嚮學甞閱詩至蓼莪篇感激流涕故其志如刃始淬及學成立朝爲鴻儒入用爲能臣參定儀制財成經費起書生擁旌節今又領全師鎭上游握神符垂三組皆嚮時感發之所激也志就而學成名聞而身逹欲報無所外榮中悲人子之孝在乎揚其先德以耀于逺乃俾學古者書夲系所自且銘于龜趺螭首云銘曰山積而髙澤積而長聖人之後必大而昌由聖與賢或爲覇強建不克嗣濟北䟽疆齊人德之其族稱王佐于符秦北海重光僕射之生負材而起筞千萬乗擢爲御史同時條對千目仰視桂林一枝㭘芥相似名動海内夫豈不偉種德而牙迺生令子出入鼎貴理財統師流根之澤密印纍纍峻其追崇幽顯有輝孝嗣之志歉然弗怡春露秋霜感傷履之時乆能慕禄豐益悲明發不寐永懷孝思攄之無窮曷若豐碑景亳之原佳城在斯乃金石刻揭于道陲松邪栢邪有洛之湄過者必下來觀信詞劉夢得外集卷第九
