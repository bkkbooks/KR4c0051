  text: 劉夢得文集卷第一
  hash: sha256:65fffbc671150d39c062268134d9271865c18c14d7a0d6c832b2678818fc7774
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_001-1a}
body:
  text: 古詩澤宫登司馬錯故城寄李六侍御謁枉山㑹禪師善卷壇下作武陵觀火答崔元受途中早發贈尹果毅望衡山遊桃源賦登天壇寫羅浮事秋江早發歸城南別墅和裴尹祈雨命箏歌送酒澤宫并序澤宫送士歲貢也晉昌唐如誨以信誼為良弓文學為菆矢規爵祿猶衆禽密彀持滿遡風蜚繳者數矣有措杯之妙而無雙鶬之獲韔弓收視歸究其術繇是跡愈屈而名愈聞君子益多之彼不由其術一幸而中者雖懸貆在庭君子未嘗多也歲殫矣告豫以西余為賦澤宫一章庶見子之弓弗再張也巳秩秩澤宫有的維鵠祁祁庶士于以干祿彼鵠斯微若止若翔千里之差起于毫芒我矢既直我弓既良依于髙墉罔我不臧髙墉伊何維器與時視之以心誰謂鵠微登司馬錯故城秦昭王命錯征五溪蠻城在武陵沅江南將軍將秦師西南奠遐服故壘清江上蒼煙晦喬木登臨值蕭辰同覽壯前躅塹平陳葉滿墉髙秋蔓緑廢井抽寒菜毀臺生穭榖耕人得古器宿雨多遺鏃楚塞鬱重疊蠻溪紛詰曲留此數仭基幾人傷逺目卧病聞常山旋師䇿勳宥過王澤大洽因寄李六侍御寂寂重寂寂病夫卧秋齊夜蟲思幽壁槁葉鳴空階南國異氣候火旻尚昏霾瘴煙跕飛羽沴氣傷百骸昨聞凱歌旋飲至酒如淮無戰陋丹水垂仁輕藁街清廟既策勳圎丘俟燔柴車書一以混幽遠靡不懷逐客憔悴久故鄉風雨乖禽魚各有化豫欲問齊諧謁枉山㑹禪師我夲山東人平生多感槩弱冠遊咸京上書金馬外結交當丗賢馳聲溢四塞勉修貴及早狃捷不知退錙銖揚芬馨尋尺招瑕纇淹留郢南鄙摧頽羽翰碎安能各往來且欲去沈痗吾師得真如自在人寰內哀我墮名網有如翾飛輩曈曈揭智炬照使出昏昧靜見玄關啓歆然初心㑹夙尚一何微今得信可大覺路明證入便門通懴悔悟理言自忘處屯道猶泰色身豈吾寶慧性非形礙思此靈山期未來何年載善卷壇下作在枉山上先生見堯心相與去九有斯民既巳治我得安林藪道為自然貴名是無窮壽瑶壇在此山識者常回首武陵觀火詩楚鄉祝融分災火常為虞是時直突煙發自晨炊徒盲風扇其威白晝曛陽烏操綆不暇汲修牆寧避踰怒如烈缺光迅與棼輪俱聮延掩四逹赫奕成烘爐汹疑雲濤翻颯若鬼神趨當前迎焮赩是物同膏腴金鳥入梵天赤龍遊玄都騰煙透窗戶飛焰生欒櫨火山摧半空星雨灑中衢瑶壇𬒳髹􅃮寶樹欑珊瑚花縣與琴焦旗亭無酒濡市人委百貨邑令遺雙鳧餘勢下隈隩長熛烘舳艫吹熒照水府炙浪愁天吳災罷雲日晚心驚視聽殊髙灰辨廩庾黑土連闉闍衆燼合星羅遊氛鑠人膚􅌋地藏宿熱遙林呈驟枯火德資生人庸可一日無御之失其道敲石彌天隅晉庫走龍劒吳宫傷燕雛五行有沴氣先哲垂訏謨宋鄭同日起時當賢大夫無苛自可樂弭患非所圖賢守恤人瘼臨煙駐驪駒弔傷色慘怛唁失詞劬愈下令蠲里布指期輕市租閈垣適未立苫蓋自相娛山木行翦伐江泥宜墐塗魯臣不必葺何用徴越巫崔元受少府自貶所還遺山薑花答以詩故人博羅尉遺我山薑花採從碧海上來自謫仙家雲濤潤孤根隂火照晨葩淨搖扶桑日豔對灜洲霞丗人愛芳辛搴擷忘幽遐傳名入帝里飛馹辭天涯王濟夲尚味石崇方鬪奢雕盤多不識綺席乃增華驛馬損筋骨貴人滋齒牙顧子藜藿士持此空歎嗟途中早發馬踏塵上霜月明岡頭路行人朝氣鋭宿鳥相辭去流水隔逺村縵山多紅樹悠悠關塞內來往無間步和董中庶古散調辭贈尹果毅昔聽東武吟壯年心巳悲如何今濩落聞君苦辛詞言有窮巷士弱齡頗尚竒讀得玄女符生當事邊時借問遊俠窟結客幽并兒往來長楸閒能帶雙鞬馳崩騰天寶末塵暗燕南陲烽火入咸陽詔徴神武師是時召軍募插羽揚金羈萬夫列轅門觀我中㦸支誓當雪國讎親愛從此辭中霄倚長劒起視蚩尤旗介馬晨蕭蕭陳雲竟天涯隂風獵白草旗槊光參差勇氣貫中腸視身忽如遺曾擒白馬將虜騎不敢追貴臣上戰功名姓隨意移終歲肌骨苦他人印纍纍謁者既清宫諸侯各罷戲上將賜北第門㦸不可窺眥血下霑襟天髙問無期却尋故鄉路孤影空相隨行逢里中舊撲遬昔所嗤一言合侯王腰佩黃金龜問我何自苦可憐真數竒低徊顧徒御慘色懸雙眉翻然悟世途撫巳昧所宜田園巳蕪沒流浪江海湄􅋧禽毛翮摧不見翔雲姿衰容蔽逸氣孑孑無人知寂寞草玄徒長吟下書幃為君發哀韻若扣瑶林枝有客識其真潺湲涕交頥勸爾一杯酒陶然足自怡望衡山東南倚蓋卑維嶽資柱石前當祝融居上拂朱鳥翮青冥結精氣磅礴宣地脉還聞膚寸隂能致彌天澤遊桃源一百韻沅江清悠悠連山鬱岑寂回流抱絶巘皎鏡含虛碧昏旦遞明媚煙嵐紛委積香蔓垂緑潭曝龍照孤磧山下潭名緑羅磧名曝龍淵名著前志子驥思逺跖子驥事見陶先生夲記也寂寂無何鄉密爾天地隔金行太元歲漁者偶探賾尋花得幽蹤窺洞穿暗隙依微聞雞犬豁逹值阡陌居人㸦將迎笑語如平昔廣樂雖交奏海禽心不懌揮手一來歸故溪無處覓綿綿五百載市朝幾遷革有路在壷中無人知地脉皇家感至道聖祚自天錫金闕傳夲枝五函留寶曆禁山開祕宇復戶潔靈宅詔隸二十戶免徭以奉灑掃藥檢香芬氲醮壇煙羃羃我來塵外躅瑩若朝酲析崖轉對翠屏水窮留畫鷁三休俯喬木千級攀峭壁旭日聞撞鐘綵雲迎躡屐遂登最髙頂縱目環楚澤平湖見草青逺岸連霞赤幽尋如夢想綿思屬空閴夤緣且忘疲耽玩近成癖清猿伺曉發瑶草淩寒坼祥禽舞葱蘢珠樹搖玓瓅羽人顧我笑勸我稅歸軛霓衣何飄颻童顔潔白晳重巖是藩屏馴鹿受羈靮樓居邇清霄蘿蔦成翠帟仙翁遺竹杖王母留桃核姹女飛丹沙青童護金液寶氣浮鼎耳神光生劒脊虛無天樂來僁窣鬼兵役丹丘肅朝禮玉札工紬繹枕中淮南方牀下阜鄉舄明燈坐遙夜幽籟聽淅瀝因話近世仙聳然心神愓乃言瞿氏子骨狀非凡格往事黃先生羣兒多侮劇謷然不屑意元氣貯肝鬲往往游不歸洞中觀博奕言髙未易信猶復加訶責一旦前致辭自云仙期迫言師有道骨前事嘗被謫如今三山上名字在真籍悠然謝主人後歲當來覿言畢依庭樹如煙去無迹觀者皆失次驚追紛絡驛日暮山徑窮松風自蕭槭適逢修蛇見瞋目光激射如嚴三清居不使恣􅊧索唯餘步綱勢八趾在沙礫至今東北隅表以壇上石列仙徒有名世人非目擊如何庭廡際白日振飛翮洞天豈幽遠得道如咫尺一氣無死生三光自遷易因思人閒丗前路何湫窄瞥然此生中善祝擬滿百大方播羣類秀氣肖翕闢性靜夲同和物牽成阻厄是非鬪方寸葷血昏精魄遂令多夭傷猶喜見斑白喧喧車馬馳苒苒桑榆夕共安緹繡榮不悟泥塗適紛吾夲孤賤世業在逢掖九流宗指歸百氏旁攟托公卿偶慰薦鄉曲謬推擇居安白社貧志傲玄纁辟功名希自取簪組俟揚歷書府早懷鉛射宫曾發的起草香生帳坐曹烏集柏賜宴聆簫韶侍祠閲琮璧常聞履忠信可以行蠻貊自迷希古心妄恃干時畫巧言忽成錦苦志徒食蘗平地生峯巒深心有矛㦸層波一震蕩弱植果淪溺北渚弔靈均長岑思亭伯禍來昧機兆事去空歎惜塵纍與時深流年隨漏滴才能疑木鴈報施迷夷跖楚奏繫鍾儀商歌勞寧戚稟生非懸解對境方感激自從嬰網羅每事問龜䇿王正降雷雨環玦賜遷斥儻復夷平人誓將依羽客買山􅌟精舍領徒開講席冀無身外憂自有間中益道牙期日就塵慮乃冰釋且欲遺姓名安能慕竹帛長生尚學致一溉豈虛擲芝术資糇糧煙霞拂巾幘黃石履看墯洪崖肩可拍聊復嗟蜉蝣何頻哀虺蜴青囊既深味瓊葩示屢摘縱無西山姿猶免長戚戚客有為余話登天壇遇雨之狀因以賦之清晨登天壇半路逢隂晦疾行穿雨過却立視雲背白日照其上風雷走于內滉漾雪海翻槎牙玉山碎蛟龍露鬐鬣神鬼含變態萬狀㸦相生百音以繁㑹俯觀羣動靜始覺天宇大山頂自澄明人閒巳雱霈豁然重昏斂渙若春冰潰反照入松門瀑流飛縞帶遙光泛物色餘韻吟天籟洞府撞仙鐘村墟起夕靄却見山下侣巳如迷丗代問我何處來我來雲雨外有僧言羅浮事因為詩以寫之君言羅浮上容易見九垠漸髙元氣壯洶湧來翼身夜宿最髙峯瞻空浩無鄰海黑天宇曠星辰來逼人是時當朏魄隂物恣騰振日光吐鯨背劒影開龍鱗倐若萬馬馳旌旗聳奫淪又如廣樂奏金石含悲辛疑其有巨靈怪物盡來賔隂陽迭用事乃俾夜作晨咿喔天雞鳴扶桑色昕昕赤波千萬重踴出黃金輪下視生物息霏如隙中塵醯雞仰甕口亦謂雲漢津丗人信耳目方寸度大鈞安知視聽外怪愕不可陳悠然想大方此乃杯水濵知小天地大安能識其真秋江早發輕隂迎曉日霞霽秋江明草樹含逺思襟懷有餘清凝睇萬象起朗吟孤憤平渚鴻未矯翼而我巳遐征因思市朝人方聽晨雞鳴昏昏戀衾枕安見元氣英納爽耳目變玩竒筋骨輕滄洲有竒趣浩蕩吾將行裴祭酒尚書見示春歸城南青松塢別墅寄王左丞髙侍郎之什命同作早宦閲人事晚懷生道機時從學省出獨望郊園歸野彴渡春水山花映巖扉石頭解金章林下步緑薇青松鬱成塢修竹盈尺圍吟風起天籟蔽日無炎威危徑盤羊腸連甍聳翬飛幽谷響樵斧澄潭環釣磯因髙見帝城冠蓋揚光輝白雲難持寄清韻投所希二公如長離比翼翔太微含情謝林壑酬贈駢珠璣顧豫久郎濳愁寂對芳菲一聞丘中趣再撫黃金徽和河南裴尹侍郎宿齊大平寺詣九龍祠祈雨二十韻有事九龍廟潔齊梵王祠玉簫何時絶碧樹空涼颸吏散埃壒息月髙庭宇宜重城肅穆閉澗水潺湲時人稀夜復間慮靜境亦隨􅒺懷斷鼇足疑想乘鸞姿朱明盛農節膏澤方愆期瞻言五靈瑞能救百榖萎咿喔晨雞鳴闌干斗柄垂修容謁神象注意陳正辭驚飈起泓泉若召雷雨師黑煙聳鱗甲灑液如棼絲豐隆震天衢烈缺揮火旗炎空忽淒緊髙霤懸綆縻生物巳雱霈濕雲稍離披丹霞啓南陸白水含東菑熙熙飛走適藹藹草樹滋浮光動宫觀逺思盈川坻吳公敏於政謝守工為詩商山有病客言賀舒厖眉冬夜宴河中李相公中堂命箏歌送酒朗朗鵾雞絃華堂夜多思簾外雪巳深坐中人半醉翠娥發清響曲盡有餘意酌我莫憂狂老來無逸氣劉夢得文集卷第一劉夢得外集卷第一詩答白學士寄韓白二公戲酬白舍人春日書懷寄酬白舍人酬白舍人曹長贈白舍人有歎和令狐相公白太守行酬樂天席上見贈登棲靈寺塔留辭郭使君開元寺構𣏌和樂天鸚鵡歲抄將發楚洛中逢白監燕王少尹宅鶴歎有所嗴答樂天臨都驛再贈樂天和裴相傍水間行郡齊新竹聞新蟬和裴相公求鶴和樂天送鶴終南秋雪闕下待傳點和樂天早寒和樂天以鏡換酒送河南馮尹贈王山人題集賢閣杏園花下令狐相公言懷曲江春望春日尋花南園試小樂和樂天春詞玉蘂花下歎水答樂天戲贈送令狐相公赴東都翰林白二十二學士見寄詩一百篇因以答貺吟君遺我百篇詩使我獨坐形神馳玉琴清夜人不語琪樹春朝風正吹郢人斤斫無痕跡仙人衣裳弃刀尺世人方內欲相尋行盡四維無處覔始至雲安寄兵部韓侍郎中書白舍人二公近曽逺守故有屬焉天外巴子國山頭白帝城波清蜀柿盡雲散楚臺傾迅瀨下哮吼兩岸勢爭衡隂風鬼神過暴雨蛟龍生峽斷見孤邑江流照飛甍蠻軍擊嚴鼓筰馬引雙旌望闕遙拜舞分庭備將迎銅符一以合文墨紛來縈暮色四山起愁猿數處聲重關羣吏散靜室寒燈明故人青霞意飛舞集蓬瀛昔曽在池籞應知魚鳥情白舍人自杭州寄新詩有柳色春藏蘇小家之句因而戲酬兼寄浙東元相公錢塘山水有竒聲暫謫仙官守百城女妓還聞名小小使君誰許喚卿卿鼇驚震海風雷起蜃鬪噓天樓閣成莫道騷人在三楚文星今向斗牛明春日書懷寄東洛白二十二學士楊八二庶子曽向空門學坐禪如今萬事盡忘筌眼前名利同春夢醉裏風情敵少年野草芳菲紅錦地遊絲僚亂碧羅天心知洛下間才子不作詩魔即酒顛白舍人見酬拙詩因以寄謝雖陪三品散班中資歷從來事不同名姓也曽鐫石柱詩篇未得上屏風甘陵舊黨凋零盡魏闕新知禮數崇煙水五湖如有伴猶應堪作釣魚翁白舍人曹長寄詩有遊宴之盛因以戲酬蘇州刺史例能詩西掖今來替左司二八城門開道路五千兵馬引旌旗水通山寺笙歌去騎過虹橋劔㦸隨若共吳王鬪百草不如應是缺西施蘇州白舍人寄新詩有歎早白無兒之句因以贈之莫嗟華髮與無兒却是人間久逺期雪裏髙山頭白早海中仙果子生遲于公必有髙門慶謝守何煩曉鏡悲幸免如新分非淺祝君長詠夢熊詩髙山夲高于門使之髙二義殊古之詩流曉此和汴州令狐相公到鎮改月偶書所懷二十二韻受脤新梁苑和羮舊傅巖援毫動星宿垂釣取韜鈐赫奕三川至歡呼百姓瞻緑油貔虎擁青紙鳯凰銜外壘曽無警中厨亦罷監推誠人自服去殺令逾嚴赳赳容皆飾幡幡口盡鉗為兄憐庾翼選壻得蕭咸鬱倔咽喉地駢闐水陸兼渡橋鳴紺􅎻入肆揚雲帆端月當中氣東風應逺占管絃喧夜景燈燭掩寒蟾酒每傾三雅書能發百函詞人羞布鼓逺客獻貂襜歌榭白團扇舞筵金縷衫旌旗遙一簇舄履近相攙花樹當朱閣晴河逼翠簾衣風飄靉靆燭淚滴巉嵓玉斝虛頻易金爐暖更添映鬟窺艷艷隔袖見纎纎謝傅何由接桓伊定不凡應憐郡齊老旦夕鑷霜髯白太守行聞有白太守地官歸舊溪蘇州十萬户盡作嬰兒啼太守駐行舟閶門草萋萋揮袂謝啼者依然兩眉低朱户非不崇我心如重狴華池非不清意在寥廓栖夸者竊所怪賢者默思齊我為太守行題在隱起圭酬樂天楊州初逢席上見贈巴山楚水淒涼地二十三年弃置身懷舊空吟聞笛賦到郡翻似爛柯人沈舟側畔千帆過病樹前頭萬木春今日聽君歌一曲暫憑杯酒長精神同樂天登棲靈寺塔步步相攜不覺難九層雲外倚欄干忽然語笑半天上無限遊人與眼看罷郡歸洛途次山陽留辭郭中丞使君自到山陽不許辭髙齊日夜有佳期管絃正合看書院語笑方酣各詠詩銀漢雪晴褰翠幕清淮月影落金巵洛陽歸客明朝去容趂城東花發時楚州開元寺北院枸𣏌臨井繁茂可觀羣賢賦詩因以繼和僧房藥樹依寒井井有香泉樹有靈翠黛葉生籠石甃殷紅子熟照銅瓶枝繁夲是仙人杖根老新成瑞犬形上品功能甘露味還知一勺可延齡和樂天鸚鵡飬來鸚鵡觜初紅冝在朱樓繡户中頻學喚人緣性慧偏能識主為情通斂毛睡足難銷日嚲翅愁時願見風誰遣聰明好顔色事須安置入深籠歲杪將發楚州呈樂天楚澤雪初霽楚城春欲歸清淮變寒色逺樹含清暉原野已多思風霜潜減威與君同旅鴈北向刷毛衣洛中逢白監同話遊梁之樂因寄宣武令狐相公曽經謝病各遊梁今日相逢憶孝王少有一身兼將相更能四靣占文章開顔坐內催飛盞回首庭中看舞槍借問風前兼月下不知何客對胡牀河南王少尹宅燕張常侍白舍人兼呈盧郎中李貟外二副使將星夜落使星來三省清臣到外臺事重各銜天子詔禮成同把故人杯捲簾松竹雪初霽滿院池塘春欲回第一林亭迎好客殷勤莫惜玉山頽鶴歎二首并序友人白樂天去年罷吳郡挈雙鶴雛以歸余相遇于楊子津間玩終日翔舞調態一符相書信華亭之尤物也今年春樂天為祕書監不以鶴隨置之洛陽第一旦豫入門問訊其家人鶴軒然來睨如記相識徘徊俯仰似含情顧慕填膺而不能言者因以作鶴歎以贈樂天寂寞一雙鶴主人在西京故巢吳苑樹深院洛陽城徐引竹閒步逺含雲外情誰憐好風月鄰舍夜吹笙東鄰即王家丹頂宜承日霜翎不染泥愛池能久立看月未成棲一院春草長三山歸路迷主人朝謁早貪養汝南雞有所嗟二首庾令樓中初見時武昌春柳似腰肢相逢相笑盡如夢為雨為雲今不知鄂渚𪷟𪷟煙雨微女郎魂逐暮雲歸只應長在漢陽渡化作鴛鴦一隻飛答樂天臨都驛見贈六言北固山邊波浪東都城裏風塵世事不同心事新人何似故人再贈樂天一政政官軋軋一年年老駸駸身外名何足算別來詩且同吟和裴相公傍水閒行為愛逍遙第一篇時時間步賞風煙看花臨水心無事功業成來二十年和宣武令狐相公郡齊對新竹新竹翛翛韻曉風隔窗依砌尚蒙籠數閒素壁初開後一段清光入坐中欹枕間看知自適含毫㓪詠與誰同此君若欲長相見政事堂東有舊叢答白刑部聞新蟬蟬聲未發前巳自感流年一入凄涼耳如聞斷續絃晴清依露葉晚急思霞天何事秋卿詠逢時亦悄然和裴相公寄白侍郎求雙鶴皎皎華亭鶴來隨太守船白君罷吳郡太守携鶴雛來青雲意長在滄海別經年留滯清洛苑徘徊明月天何如鳯池上雙舞入祥煙和樂天送鶴上裴相公別鶴之作昨日看成送鶴詩髙籠提出白雲辭朱門乍入應迷路玉樹容棲莫揀枝雙舞庭中花落處數聲池上月明時三山碧海不歸去且嚮人閒呈羽儀終南秋雪南嶺見秋雪千門生早寒閒時駐馬望髙處卷簾看霧散瓊枝出日鈄鉛粉殘偏宜曲江上倒影入清瀾闕下待傳點呈諸同舍禁漏晨鍾聲欲絶旌旗組綬影相交殿含佳氣當龍首閣倚晴天見鳯巢山色葱籠丹檻外霞光泛灩翠松梢多慙再入金閨籍不敢為文學解嘲和樂天早寒雨引苔侵壁風驅葉擁階久留間客話宿請老僧齊酒甕新陳接書籖次第排翛然自有處搖落不傷懷和樂天以鏡換酒把取菱花百錬鏡換他竹葉十旬杯顰眉厭老終難去蘸甲須歡便到來妍醜太分迷忌諱松喬俱傲絶嫌猜校量功力相千萬好去從空白玉臺同樂天送河南馮尹學士可憐玉馬風流地暫輟金貂侍從才閣上掩書劉向去門前修刺孔融來崤陵路靜寒無雨洛水橋長晝起雷共羡府中棠棣好先於城外百花開同白二十二贈王山人愛名之世忘名客多事之時無事身古老相傳見來久歲年雖變貌長新飛章上逹三清路受籙平交五嶽神笑聽鼕鼕朝暮鼓只能催得市朝人題集賢閣鳯池西畔圖書府玉樹玲瓏景氣間長聽餘風送天樂時登髙閣望人寰青山雲繞欄干外紫殿香來步武閒曽是先賢翔集地每看壁記一慙顔杏園花下酬樂天見贈二十餘年作逐臣歸來還見曲江春遊人莫笑白頭醉老醉花閒有幾人和令狐相公初歸京國賦詩言懷凌雲羽翮掞天才楊歷中樞與外臺相印昔辭東閣去將星還拱北辰來殿庭捧日飄纓入閣道看山曳履回口不言功心自適吟詩釀酒待花開曲江春望鳯城煙雨歇萬象含佳氣酒後人倒狂花時天似醉三春車馬客一代繁華地何事獨傷懷少年曽得意和令狐相公春日尋花有懷白侍郎閣老芳菲滿雍州鸞鳯許同遊花徑須深入時光不少留色鮮由樹嫩枝亞為房稠靜對仍持酒髙看特上樓晴冝連夜賞雨便一年休共憶秋官處餘霞曲水頭和樂天南園試小樂間步南園煙雨晴遙聞絲竹出牆聲欲拋丹筆三川去先教清商一部成花木手栽偏有興歌詞自作別生情多才遇景皆能詠當日人傳滿鳯城和樂天春詞新粧宜靣下朱樓深鎖春光一院愁行到中庭數花朵蜻蜓飛上玉搔頭和嚴給事聞唐昌觀玉蘂花下游仙二絶玉女來看玉蘂花異香先引七香車攀枝弄雪時回顧驚怪人閒日易斜雪蘂瓊絲滿院春衣輕步步不生塵君平簾下徒相問長伴吹簫別有人歎水別白二十二雜言水至清盡美從一勺至千里利人利物時行時止道性淨皆然交情淡如此君遊金谷堤上我在石渠署裏兩心相憶似流波潺湲日夜無窮巳答樂天戲贈才子聲名白侍郎風流雖老尚難當詩情逸似陶彭澤齊日多如周太常矻矻將心求淨法時時偷眼看春光知君技癢思歡宴欲倩天魔破道場同樂天送令狐相公赴東都留守自户部尚書拜尚書劔履出明光居守旌旗起洛陽丗上功名兼將相人閒聲價是文章衙門曉闢分天仗賔幕初開辟省郎從發坡頭向東望春風處處有甘棠自華陜至河南皆故林也劉夢得外集卷第一
