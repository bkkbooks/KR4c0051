front:
  text: 劉夢得文集卷第十七
  hash: sha256:5ca79a07c8bbde9af1ddd0880bf3b076eea3fb6e25e71640912b5b3c594c50fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_017-1a}
body:
  text: 表代讓鹽鐵等使代謝追贈代讓立去思碑代賀遷獻懿二祖代賀雨止代賀祈晴獲應代謝許折糴代賀元日祥雪代賀春雪代賀雨代謝紫雪面脂代謝鍾馗等又代謝鍾馗等代謝新茶代謝春衣代謝新橘代謝柑子代謝冬衣代杜司徒謝讓度支鹽鐵等使臣某言伏奉制書授臣檢校司徒同中書門下平章事充度支及諸道鹽鐵轉運等使者臣久塵髙位尸素巳多更受新恩滿盈為懼中謝伏惟皇帝陛下紹登寶位光纂鴻猷擢用之間華夷聳聽況利權所在宜適變通國計是資須明輕重當至化鼎新之日在微臣遲暮之年將何以上副宸衷下成庶務進退惟咎冰炭是懷輒罄愚誠冀回天監陳力無補庶遵周任之言循涯若驚敢飾范宣之讓慙惶局蹐倍百常情代杜司徒謝追贈臣某言伏奉制書褒贈臣亡父先臣某官某尚書左僕射者時逢霈澤禮極徽章中謝臣家受國恩至臣纍葉常懼不克負荷以忝前人豈意多幸遭逢猥居髙位陛下應乾御極作解庇人恩浹寰區禮成宗廟垂仁布德自葉流根紫書忽降於重霄密印榮加於厚夜霜露增感蒸嘗有輝非臣殞越所能上報無任代杜司徒讓淮南立去思碑臣某言伏見淮南節度使王諤所奏當道將吏僧道耆壽百姓等請為臣立去思碑伏奉聖旨允其所奏臣內惟菲薄聲績無聞祗荷恩私慙懼交至中謝臣伏蒙先朝過獎纍典方隅頃鎮江都十有四載數周星紀水旱備經境接淮濆兵戈時起至於邑里粗免流離非臣所能悉稟聖化在唐堯可封之日奚假吏師當漢宣責實之時皆承詔旨王鍔與臣交代輒有上聞況以去思為名慙無可紀之績伏以建碑有制甲令垂文苟非至公翻益貽誚臣伏覽故事宋璟自廣州都督入為尚書南海之人請為刋石璟自遜讓至于再三雖勒其文竟從降制著在國典垂為美談璟非苟榮人益見德臣才誠不逮心實慕之伏乞聖慈賜寢前命臣情非飾讓義在徇公無任代京兆李尹賀遷獻懿二祖實臣某言伏見詔書以今月某日奉遷獻祖懿祖神主祔于德明興聖皇帝廟盛禮云畢宗祧永安中謝伏以太祖景皇帝膺期撫運啓封于唐為百代不遷之宗開三靈眷命之兆頃以夲朝初建清廟備儀二祖冠西室之先景皇闕東嚮之位諸儒獻議歷載未行陛下濬發睿謨旁延正論爰詔多士㑹於中臺酌三禮之前一作全文參百王之故事講貫斯定詢謀僉同撰日展儀考祥視履配貴神於逺祖正尊位於始封廟貌有嚴禘嘗允穆示人以孝得禮之中既觀秩秩之容必降穰穰之福臣職為內史屬忝夲枝躬道盛儀獲申誠敬無任代京兆韋尹賀雨止夏卿臣某言今月某日中使吳文政奉宣聖旨緣今年雨多恐損麥苗稼諸有靈跡處並宜祈禱者臣謹檢尋祀典方議遍祠惟德動天倐巳澄霽中謝伏以至教惠農兆人務夲今歲宿麥茂於常年爰自季春遂逢多雨蓋隂陽常數有以推遷而隴畝之閒未聞傷敗陛下勞謙思切覆育恩深或慮成災先期軫念昭薦未陳於方社睿誠巳格於上玄文明煥開隂曀潛掃有年之慶實兆於兹辰先天不違敻超於前代臣謬司京邑䖍撫蒸黎欣抃之誠倍百羣品無任代京兆韋尹賀祈晴獲應臣某言今月十七日中使某奉宣聖旨以霖雨未晴諸有靈跡處並令祈禱者臣當時於興聖寺竹林神親自祈祝兼差官城外分路遍祠伏以神祇效靈景物開霽兆庶覩動天之德大田俟多稼之期臣謬荷恩輝忝司京邑無任代京兆韋尹謝許折糴臣某言伏奉詔旨以臣所請畿內折糴宜令度支計㑹定數奏來者天慈廣被人瘼是求中臣自理京邑不先威刑唯務便安所期富庶每因賜對常奉德音府縣之閒巨細令奏伏以聖明在上風雨應時順成之年榖糴常賤若無輕重之法必利兼并之家輒敢上聞請行折糴天光下燭幽隱無遺宣付所司允臣所奏事關理夲惠及生靈臣忝尹京倍百欣荷無任代京兆韋尹元日賀雪臣某言伏以去冬巳來久無雨雪臣每於內殿親奉德音以宿麥未滋為虞以兆人生疾為念聖情所屬神理潛通獻歲發春佳雪肇降當夷夏㑹同之日覩天人合應之徴迎喜氣於三元浹歡心於萬國癘疵永息豐阜可期臣以疾沴未平趨步有阻伏蒙恩貸以具奏聞謹於光宅寺中勾當夲務不獲隨例稱慶明庭既覩嘉祥益彰聖德無任代京兆韋尹賀春雪臣某言伏奉詔旨充某郡主禮命使謝恩之日親承德音以春初巳來雨雪猶少慮妨農事有軫睿慈今當下嫁之辰克致上玄之感雲生河漢及佳期而降祥雪滿寰區應豐年而呈瑞臣官當撫字職在肅雍慶抃之誠實倍常品代京兆李尹賀雨臣某言臣伏奉進旨以時雨愆候有妨農耕應諸有靈跡處並令祈請者德音才發膏雨驟飛滂霈巳周動植咸恱中謝伏以久愆時澤上軫聖慈爰命禱祈俾申誠敬神應如響天且不違未興雲漢之詩巳致桑林之雨臣謬司京邑䖍撫黎蒸覩豐年之可期同比屋而稱慶無任代李中丞謝賜紫雪靣脂等汶臣某言中使某至奉宣聖旨賜臣紫雪紅雪靣脂口脂各一合澡豆一袋特降王人俯臨私第銜恩慶抃省己慙惶中謝臣謬荷寵私素無績效空變星霜之候猥霑慶賜之恩跪捧雕奩榮觀珍藥功能去疾永絶於癘疵澤可飾容頓光於蒲柳生成是荷雨露難酬無任代李中丞謝鍾馗曆日臣某言中使某奉宣聖旨賜神畫鍾馗一新曆日一軸恩降雲霄光生里巷雖當歲暮如煦陽和中謝伏以將慶新年聿循故事繢其神象表去癘之方頒以曆書敬授時之始微臣何幸天意不遺無任又代杜相公謝鍾馗曆日臣某言髙品某至奉宣聖旨賜臣畫鍾馗一新曆日一軸星紀分回雖逢歲盡恩輝忽降巳覺春來伏以圖寫威神驅除羣癘頒行律曆敬授四時施張有嚴既增門戶之貴動用協吉常為掌握之珍瞻仰披尋皆知聖澤無任代武中丞謝新茶元衡二首臣某言中使竇國宴奉宣聖旨賜臣新茶一斤猥降王人光臨私室恭承慶賜跪啓緘封中謝伏以方隅入貢採擷至珍自逺貢來以新為貴捧而觀妙飲以滌煩顧蘭露而慙芳豈柘漿而齊味既榮凡口倍切丹心無任又臣某言中使某乙至奉宣聖旨賜臣新茶一斤猥沭深恩再霑殊錫承旨慶抃省躬慙惶中謝伏以貢自外方珍殊衆品效參藥石芳越椒蘭出自仙廚俯頒私室義同推食空荷於曲成責在素餐實慙於虛受無任代武中丞謝春衣臣某言中使某奉宣聖旨賜臣春衣一副㠪人臨第御府降衣抃舞失容捧戴無措中謝伏以律曆當春暮慶洽時雍萬物被薰風之和九天垂湛露之澤臣受任非次速尤是虞方懷匪服之憂更荷解衣之賜恩加盡飾拖朱紫以為榮受非以庸顧形影而增愧丹誠徒罄玄造難酬無任代武中丞謝新橘臣某言中使某乙至奉宣聖旨賜臣新橘若干顆特降恩光猥頒慶賜珍踰百果榮比兼金中謝伏以丹實初成苞貢爰至芬馨味重方列於御筵雨露恩深忽霑於賤品感同推食事等絶甘豈唯適口為珍實冀捐軀上答無任代武中丞謝柑子臣某言中使某乙至奉宣聖旨賜臣柑子若干顆特降殊私再頒名果自逺稱責以新為榮中謝伏以方貢外來人閒未覩黃苞輝頴雕俎增華芬芳初佐於天庖慶賜遂霑于凡口甘踰萍實剖食既同于楚謡寒比柘漿析酲何慙于漢史感恩思效倍百常情無任代武中丞謝冬衣臣某言中使某乙至奉宣聖旨賜臣冬衣一副恩降重霄榮加陋質承旨慶抃省躬慙惶中謝臣受任巳來微效莫著每更時律慙曠官常豈謂玄造曲成鴻私荐及念兹戒寒之候錫以禦冬之衣抃舞失容顧眄增飾鶴文是錫逺慙晉代之賢鵜翼不濡實懼曹風之刺無任劉夢得文集卷第十七
