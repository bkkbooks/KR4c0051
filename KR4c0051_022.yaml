front:
  text: 劉夢得文集卷第二十二
  hash: sha256:5c7a5aeed45a5a84573200410f4d5c8aef6f2db8077da23219e9f1c1febc2ee7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_022-1a}
body:
  text: 狀代論請廣利方代韋尹進衣代李尹進衣代韋尹進野豬代謝賜酒食代謝就宅賜食代謝賜食代進東封圖舉崔羣自代舉柳公綽自代舉薑倫自代蘇州舉自代蘇州謝宰相加章服謝宰相汝州謝宰相汝州舉自代汝州進鷹同州舉自代上宰相賀德音上宰相賀改元赦書薦處士嚴毖薦處士王龜代淮南杜相公論新羅請廣利方貞元十九年九月十七日淮南節度觀察處置等使敕賜貞元廣利方五卷右臣得新羅賀正使朴如言狀稱請前件方一部將歸夲國者伏以纂集神效出自聖衷藥必易求疾無隱狀搜方伎之祕要拯生靈之夭瘥坐比華胥咸躋仁壽遂令絶域逖聽風聲美兹豐功爰有誠請臣以其久稱藩附素混車書航海獻琛既巳通於華禮釋痾蠲癘豈獨隔於外區正當四海為家冀覩十全之效臣即欲寫付未敢自專謹録奏聞伏聽敕旨代京兆韋尹降誕日進衣貞元十八年四月十九日衣一副四事黃折造衫一領白吳綾汗衫一領白花羅半臂一領白花羅袴一腰右伏以正陽令月誕聖嘉辰運協千年慶流萬國凡在臣子合有獻陳敢傾就日之心願奉如山之壽輕瀆宸扆無任兢惶代京兆李尹降誕日進衣貞元十九年四月十九日衣一副四事云云右伏以德水方清真龍下降天長地久瞻北極以常尊獻壽稱觴配南山而永固臣地居宗屬職忝尹京慶賀之誠倍萬常品前件衣服謹詣銀臺門奉進輕瀆旒扆伏用兢惶代京兆韋尹進野豬野豬一口右伏以收穫之餘田獵有獲異於芻豢著在方書既堪充庖輒敢上獻前件野豬謹隨狀上進謹奏代杜相公自淮南追入長安至長樂驛謝賜酒食某官某右臣今日至長樂驛髙品某奉宣聖旨賜臣酒食者伏以恩降王人榮分御膳未展儀於雙闕先受賜於八珍品越脤膰味兼醪醴頓驚凡口倍益歡心無任欣躍代杜相公謝就宅賜食某官某右髙品某奉宣聖旨賜臣食者出自太官飫于私第光榮曲被猥承推食之恩駑蹇未施益重素餐之責舉其匕箸若負丘山無任戰荷踴躍代東都韋留守謝賜食某官某右臣今日發至長樂驛中使某奉宣聖旨賜臣食者伏以味兼海陸品溢圎方降自御厨光臨傳舍初辭魏闕倍懷犬馬之誠猥受珍羞更切稻粱之感無任欣躍代裴相公進東封圖集賢殿御書院開元東封圖一面右臣謹按開元十三年玄宗皇帝以天下太平登封東嶽聲明文物振耀古今伏惟陛下丕承耿光再闡鴻業祖宗盛事紹復有期臣所以寫成此圖輒敢上獻至於繢畫躬自指揮徴史氏之文纂禮容之要山川氣象悉擬真形羽衛威儀咸稽故實所冀睿情一覽遐想玄蹤臣叨榮過深抱疾巳久望陛下告成之日心必前知嗟老臣將謝之年身恐不見疲羸之際感激倍深前件圖謹差某官某詣光順門上進謹奏舉崔監察羣自代御史臺貞元十九年十一月宣歙池等州團練判官監察御史裏行崔羣右臣蒙恩授監察御史伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官在諸生中號為國器縶維外府人咸惜之臣既深知敢舉自代謹具如前謹録奏聞候敕旨舉開州柳公綽自代尚書屯田貞元二十一年四月八日某官守開州刺史柳公綽右臣蒙恩授尚書屯田貟外郎伏準建中元年正月五日制常參官後三日舉一人自代者伏以前件官以賢良方正再敡王庭在流輩間號為端士昨除逺郡人皆惜之臣初蒙授官得以論薦多士之內無非其人竊惟用材宜自逺始謹具如前謹録奏聞伏聽敕旨舉薑補闕倫自代東都尚書郎省大和元年八月十四日前左補闕薑倫右臣蒙恩授尚書主客郎中分司東都伏準建中元年正月五日敕常參官上後三日舉一人自代者臣伏詳詔旨欲逹聰旁求發揚幽逺故人人得言所知不當循其階次也臣伏以前件官有儒學士行蒙以諫官徴會其年老被疾不堪上道有司按視如狀不復逼迫至今家居而篤志無倦臣謹舉為郎吏分司别都冀優賢振滯兩得其道云云蘇州舉韋中丞自代大和六年十二月九日諸道鹽鐵轉運江淮留後朝議郎守太僕少卿兼御史中丞上柱國賜紫金魚袋韋應物右某伏奉去年十月十二日敕授使持節蘇州諸軍守蘇州刺史伏準建中元年正月五日制刺史上後舉一人自代者前件官歷掌劇務皆有美名執心不回臨事能斷今領職雖重夲官尚輕伏以當州口賦首出諸郡況經災沴切在撫綏內省無能輒敢公舉司榷管之利誠藉時才流愷弟之風實惟邦夲非敢臆説以塞詔書今具聞奏蘇州上後謝宰相大和六年十二月七日右某今月六日到州上訖某山東一書生潦倒踈闊在少壯日猶不逮人況今衰遲智力愈短相公哀憐不遇擢授名邦實荷弘獎慙非器使伏以當州繇一作經大浸之後物力蕭然飢寒殞仆相枕于野誓當悉心條理續具奏論才術素空憂勞方始懼無聞問忝荷恩知不任瞻望懇迫之至蘇州加章服謝宰相右某素乏吏才謬居劇郡以無庸之器當難治之時恭守詔條勤求人瘼伏以聖德柔逺皇明燭幽凡有上陳皆可其奏遂令管見得及疲黎自承雨露之恩非有循良之政猥蒙朝獎特降命書顧逢掖之腐儒被華章之貴服有黷陟明之典誠招彼已之譏限以官守不獲拜謝瞻望榮感心魂載馳汝州上後謝宰相大和八年右某自領吳郡仍歲天災上稟詔條下求人瘼地苞藪澤俗尚剽輕悉心撫綏用法擒擲事繁才短常積憂虞忽蒙天恩稍移近郡家夲榮上籍占洛陽病辭江干老見鄉樹榮感之至實倍常情印綬所拘不獲拜謝瞻望德宇精誠坐馳汝州舉裴弘恭自代大和八年正議大夫使持節杭州諸軍事守杭州刺史上柱國賜紫金魚袋裴弘恭右臣蒙恩授汝州刺史兼御史中丞充夲州防禦使伏準建中元年正月五日敕諸州刺史上後舉一人自代者伏以前件官前為九卿出領兩鎮頃因微纍遂有左遷今授逺州物情未塞臣前任鄰境具知其才舊屈未伸輒舉自代汝州進鷹大和九年九月十一日汝州防禦使當使進奉籠母鷹六聮右伏以前件鷹等學習應期馴養斯至列於常貢有異衆禽受紲之時志已存於雲外下韝之際思用展於軍前既懷百中之能願獻三驅之禮謹差防禦押衙景再休隨狀奉進以聞同州舉蕭俶自代同州防禦使前諫議大夫蕭俶右臣蒙恩授同州刺史兼御史中丞充夲州防禦長春宫等使伏準貞元二年正月二十四日敕上後三日舉一人自代者伏以前件官生於貴族伏膺儒門搢紳之間號為端士昨蒙朝獎冠于諫垣時方被病不果上道長告巳滿塊然家居今聞疾瘳可以録用臣與俶久同班列知其材能為官擇人敢舉自代上宰相賀德音大和九年十二月二十三日同州狀上中書門下今月十六日德音右被刑部牒宣示德音伏以聖澤滋深新恩廣被言念正刑之外或有詿誤之徒爰降殊私特弘在宥瑕纍咸滌危疑獲安此皆廟算弼諧致君及物事光前史功格上玄某限以守官不獲隨例上宰相賀改元赦書開成元年正月日同州狀上中書門下改元赦書右伏奉今月一日制書改大和十年為開成元年大赦天下者伏以律首三元禮崇四始順陽和發生之德敷大號渙汗之恩宥過恤刑弛征巳責盡去人瘼通知物情德音朝發於九天和氣夕周於四海此皆相公弼諧之道燮贊之功進退於密勿之間發揚成􅗈霈之澤某恪守官業印綬所拘不獲隨例拜賀薦處士嚴毖處士嚴毖右左庶子損之之孫國子司業士元之子舊名保嗣亦有官班頃者李賔客渤常與之遊辟為桂州支使其後寄家汝海專靜自居某嘗典汝州與語甚熟歷代史及國朝故事悉能該通操心甚危觀迹相副未逢知己巳過壯年汨沒風塵有足悲者伏見赦文節目委州郡長吏搜訪隱淪夫舉無他唯善所在每覽殊英卷後列學士姓名有常州人符鳯白衣在選取其藝業不棄逺人某忝被儒官得以薦士亦非出位冀不廢言儻弘文集賢史氏之館採其實學有勸諸生伏以桂州辟之於前某薦之於後豈必有土長吏然後事行伏惟試味斯言降意詳擇謹狀薦處士王龜處士王龜古者選公族大夫必以惇惠者教之文敏者道之果敢者諗之鎮靜者循之孜孜於此者蓋膏粱之性難正而懼公侯之胤不能嗣其耿光可以深惜然則成宣之後而老為大夫非恥乎此智武子誡文子既冠而見之詞也是知古之取士不專寒族必參用世胄以廣得人之路今見處士王龜即居守之第三子也天生貞靜操心甚危不由門資誓志自立樂處士之號不汨綺繻一作羅之間自到洛都便居山寺耽玩墳籍放情煙霞曾邀與語如鋸木屑信有稟受居然出羣伏聞比者在京師甚足知者諫院有狀名流亟言某流滯周南靜閲時輩身雖不用心甚愛才況遇相公持衡敢有所啓誠懸之下輕重難欺伏惟深賜詳擇知卿族之內有遺逸焉劉夢得文集卷第二十二
