front:
  text: 劉夢得文集卷第十六
  hash: sha256:3593198c6de3402a04ef1475d6aa68f73a8b849c09d4c948c0852f64587114d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_016-1a}
body:
  text: 表並代淮南杜相公佑作代謝冬衣代謝濠泗割屬淮南代謝墨詔代謝曆日面脂口脂代請朝覲代論廢楚州營田代謝春衣代謝男師損等官代謝賜戟代謝端午日賜物代謝冬衣臣某言中使王國清至伏奉聖旨慰勞臣及將佐官吏僧道耆壽百姓等并賜臣墨詔及冬衣兩副大將衣四副者大明昭回逺燭下土殊錫稠疊延及偏裨慶抃失圖捧戴相賀中謝臣謬承委寄獲守藩條灰琯屢移塵露無補陛下至仁天覆玄化風薰頒以兼衣賁兹瑣質降自天府光于轅門緘縢既開覩綵章之盛飾蹈舞而服發溫燠於祁寒愧塵補衮之名更荷解衣之賜恩波下浹將校同霑共戴殊榮咸思竭節生成是荷雨露難酬無任代謝濠泗兩州割屬淮南臣某言伏奉十一月二十九日詔書其濠泗兩州令臣依前收管臣謬承寵光作鎮淮海位均九伯權總十連內省無堪常恐不逮豈謂恩私曲𬒳封略有加慙無報政之勤重受分憂之寄伏以兵戈方息閭里未安謹當奉宣皇風慰彼黔首且責成於牧宰期不失於澄清伏惟聖明俯賜昭鑒無任代謝墨詔二首臣某言中使陳日華至奉宣聖旨存問兼賜臣墨詔又以臣所奏羅珦及裴靖政理有方今各賜手詔激賞者恩降重霄澤流下土義存獎勸榮冠等夷中謝臣昨以羅珦裴靖勵精吏理效用著明人咸恱安俗致殷阜恐須甄録以勸在官輒獻封章具陳成績伏蒙睿鑒俯亮愚衷載嘉理行之尤光示絲綸之旨守道者益以固志懷慝者由是悛心激俗化人於兹為大謬司廉問職在澄清幸遇旌善之時獲􅊵蔽賢之責無任又臣某言中使陳日華至奉宣聖旨慰勞臣及將佐官吏僧道耆壽百姓等兼賜臣墨詔恩降紫泥澤流下土跪奉自天之命遙馳捧日之心中謝伏以皇帝陛下凝旒穆清軫念黎獻巳洽雍熙之化尚存宵旰之勤逺降王人特紆宸翰慰安稠疊曉諭便蕃任重力微不知上答應緣戎旅庶務謹具別狀奏聞伏乞皇明俯賜昭鑒無任代謝曆日面脂口脂等臣某言中使霍子璘至奉宣聖旨存問臣及將佐官吏僧道耆壽百姓等兼賜臣墨詔及貞元十七年新曆一軸臘日面脂口脂紅雪紫雪并金花銀合二金稜合二皇明逺燭恩錫荐臻抃舞失容捧戴無措中謝伏惟皇帝陛下立極御人順時布政禮崇大蠟澤浹遐藩臣叨榮日深竊位時久謬回宸眷猥降王人天書下臨覩三光之照耀玊曆爰授知四氣之環周雕奩既開珍藥斯見膏凝雪瑩含液騰芳頓光蒲柳之容永去癘疵之患命輕恩重上答何階無任代請朝覲臣某言臣聞臣之事君有犯無隱懇誠所至敢不罄陳伏惟聖明俯賜矜察中謝臣伏受國恩忝承門蔭脫巾筮仕敢期榮名陳力效官靡樹聲績始因孤直驟歷清班復加朝章作藩外府逺違輦下十有四年恪守淮濆逮今一紀犬馬懷戀寢興匪遑蒲柳易衰遲暮俄及竊位時久妨賢愧深況歷官巳來四十八考祗奉朝謁時才二周服勤郡符荏苒垂老屏營魏闕之思夢想承明之遊如迫餧寒不忘衣食伏惟睿鑒俯亮愚衷早賜擇人與臣交代授受之際冀無可虞然後脂車奔赴京輦微願斯畢雖死猶生臣頃以戎務方殷猥加宰輔今既事罷實慙此名為有藩鎮同時未敢輕上印綬伏惟聖朝赫赫左右惟賢漢愧得人周慙多士臣才略既短齒髮又衰柄用之地甘心自絶所冀退歸舊里沐浴皇風絶鍾鳴漏盡之譏展維桑與梓之敬匪惟名器不假實貴骸骨可全知止之心神祗所鑒無任代論廢楚州營田臣某言中使曹進玊至奉宣聖旨存問兼賜臣墨詔以楚州營田廢置事令臣商量奏來者跪捧天書恭承睿旨道存致用義在隨時中謝伏以夲置營田是求足食今則徒有縻費鮮逢順成刈穫所收無禆於國用種糧每闕常假於供司較其利害宜廢巳久比來循守舊制不敢輕有上陳皇明鑒微特革斯弊取其田蓄授彼黎蒸仍俾薄租誠為至當但以田數雖廣地力各殊須量沃塉用立程度臣巳追里正臣與商量利便謹具別狀奏聞伏惟聖慮俯賜詳擇無任代賜謝春衣臣某言中使陳日華至伏奉聖旨慰勞臣及將佐官吏僧道耆壽百姓等并賜臣墨詔及春衣兩副大將衣肆副王人捧詔御府降衣寵光不隔於遐藩慶賜猥霑於禆將中謝臣素乏器能謬膺驅使每慙效薄常懼食浮陛下覃以至仁均其厚施宰元和而布澤順時律以頒衣出自禁中賁于臣下執領禬而抃舞失次被纎柔而顧盼增輝舉體動容既安且吉在身不稱恐招鵜翼之譏居位無功叨受鶴紋之賜下延將校同荷生成無任代謝男師損等官伏覩今月一日制授臣長男師損祕書省著作郎次男式方太常寺主簿又得進奏官裴遘狀報伏承聖恩特降中使送官告到臣宅付師損等者寵渥非常授任不次驚躍無措靦懼失容中謝臣謬分重寄獲守外藩受恩既深無績可紀男師損等器惟凡品教闕義方早沐睿慈巳階官次每懷塵忝常誡滿盈豈謂鴻霈曲覃大明私照寬臣尸素之責念臣葵藿之誠下延胤息叨踐班級天書出禁中貴臨門榮冠等夷慶流宗族況著作乃論撰之地唯才史是居太常實禮樂之司非儒者勿履顧兹庸昧忽此超升內省慙惶若墜冰谷伏以聖朝立制建官惟賢名實無乖輪轅盡適微臣父子獨為幸人非據踰涯自中徂外虛受丘山之賜實增負乘之憂進退倣徨不知所據無任代謝賜門戟臣某言臣得進奏官裴遘狀報今月九日軍器使梁延壽奉宣進旨付所司準省牒賜臣門戟十二竿者恩降雲天榮加門户承旨慶抃省躬慙惶伏以禮著等威朝有命數是昭懋賞必在疇庸臣謬荷寵光素無績效旌旄之寄巳忝外藩􅙶戟爰列更光私第賁于棖闑慶及子孫覩兹盛儀實愧虛受無任代謝端午日賜物臣某言中使劉元弼至奉宣聖旨慰勞臣及將佐官吏僧道耆壽百姓等兼賜臣墨詔并衣一副金花器參事綵絲一軸大將衣肆副綵絲伍軸寵光荐至慶賜曲霑抃舞失容捧戴無力中謝伏以朱明仲月端午佳辰萬國被薰風之和九天垂湛露之澤臣幸逢休運獲守外藩叨承睿慈猥受榮賚發詔而煥窺宸象振衣而頓失炎威色絲表祥載光於佩服珍器充玩盡飾於圎方恩輝既盈喜懼交集下延禆將共荷鴻私無任劉夢得文集卷第十六
