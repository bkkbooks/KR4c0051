front:
  text: 宋築唐集惟書夲偶一見之若卷第稍繁即風行為李杜韓柳已為星風遑論他光緒丙午奉牒遊日夲道出西京因閲訪古志慕崇蘭館藏書之富訪之于北野别業主人福井翁漢醫也清芬世紹抱獨樂天出示宋元及古刻且言凡經森氏簿録者慘罹秦厄此皆劫餘所續得者也縹帙井然如登宛委內宋大字夲劉夢得集每半葉十行行十八字中縫有刻工姓名書體遒麗純仿開成石經紙墨並妙竊謂此書與東京啚書寮之太平寰宇紀宋景文王文公楊誠齊等集及吾國京師啚書館之殘文苑英華昭文瞿氏之白氏文集府之徐公文集此書後歸余今入大倉可稱海內奇夲歸國恆與朋輩誦述之昨年避囂東航僑居星地復過崇蘭館翁猶强健罄閲所藏始知是集首尾完善並附外集尤所心醉適小林忠治業珂羅製版藝精爲全國冠曩為羅君叔言影印宋拓碑志濃淡豐纎猶形鑑影乃介內藤炳卿博士假歸屬小林氏用佳紙精製百部昔士禮居僅藏是書殘宋刻四卷半葉十二行草一字今歸昭文瞿氏鐵琴銅劍題跋每以鈔夲不足據為憾深兾得一宋刻之全者以正誤設蕘翁生于今世其快愈更當為何噫際此流離轉徙牽于結癖投擲資以印此書殊不自量然獲此百部行世不啻貽傳百部真夲舉凡舊鈔明刻訛謬相萟林嚮奉爲珍祕者可概供覆瓿于中山是編功匪鮮淺後之覽者當亦憫余今日之苦衷也癸丑夏日毗陵董識于東山寄廬
