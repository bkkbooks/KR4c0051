body:
  text: 山口藤田緑子録平安福井氏崇蘭館以多藏宋元古書聞于海內安政中罹災故物蕩然迄其後嗣克紹先志兩世搜購收儲之富不减曩曰中有宋槧劉夢得集卅卷外集十卷蓋為東山建仁寺舊藏相傳千光國師入宋時所齎歸近年寺主僧天章以方外之身勤勞王事兼能詞翰名著士林眀治初退居西崦妙光寺因帶此書而去既為凶奴所殪藏書散佚此書遂歸崇蘭館每半葉界長八寸六分廣六寸四分十行行十八字字大欄豁疏朗恱目按陳振孫書録解題稱劉賔客集原夲卌卷宋𥘉佚其十卷宋次道裒其遺詩四百七萹雜文草二首為外集卷數萹目與此夲吻合今通行夲雜文草卷詩十卷出于明刻卷弟既已不同所録詩文並有佚奪又表箋各篇有通行夲存年月而此夲失録此夲有年月而通行夲刊落者其餘異文多不勝舉且此夲先文後茟仍是六朝以來集部體製若通行夲先文後詩經眀刻恣改耳外集十卷天祿琳琅前編録汲古閣影抄宋夲後編又録元刻夲並稱希見此夲則正外兩集完好無缺宋氏所裒直齊所録忽獲目睹于數百載後可稱藝林奇寶已清國董授經亰卿雅善鑒藏又喜刻書頃避地東渡僑寓平安既盡閲崇蘭之藏深愛此書借覽不足竟謀㬌刻乃用玻璃版法精印百部以貽于丗雖紙幅稍蹙原夲而精采煥然不爽豪髮自兹東瀛祕笈復廣流傳中山精華頓還舊觀是則授經之有功此集不在次道下矣大正二年八月內藤虎劉夢得文集目録第一卷古詩澤宫登司馬錯故城寄李六侍御謁枉山㑹禪師善卷壇下作武陵觀火答崔元受途中早發贈尹果毅望衡山遊桃源賦登天壇寫羅浮事秋江早發歸城南别墅和裴尹祈雨命箏歌送酒第二卷古詩效阮公體偶作古調寓興昏鏡詞飬鷙詞武夫詞賈客詞調瑟詞弔張曲江庭梅詠詠古詠史苦雨行萋兮吟經檀道濟故壘題欹器圖聚蚊謡百舌吟飛鳶操秋螢引華山歌磨鏡篇有獺吟第三卷律詩春日退朝經九公主舊院作蜀先主廟觀八陳圖夜玩月許給事見示詩和崔舍人玩月和李相公早秋凱旋成詠武陵書懷經伏波神祠聞董評事疾贈髙大夫宿誠禪師山房晚泊牛渚罷郡歸洛陽間居城東間遊歸洛陽寄友人雪後眺望途中早發初至長安詔賜觀秋稼早秋集賢院金陵懷古池上亭獨吟蒙李相公書問和二相公述懷賀門下相公加冊命謝一二禪客病中見問第四卷律詩西塞山懷古陽山廟觀賽神漢壽城春望後梁二帝碑荆門道懷古和竇貟外早春對雪早秋贈答答徐貟外贈端州紫石硯觀董評事詩松滋渡望峽中題假侍御枕上贈王學士闕下口號監祠夕月壇書事戲贈崔千牛詔徵逐客和嚴司空見馮叔逹故洛城古牆戲贈看花諸公再遊玄都觀望夫山金陵五題謝寺雙檜韓信廟安國觀聞笙洛中寺北樓見賀監草書韓賔擢第歸覲寄楊八壽州重寄楊八和宣上人贈東嶽張鍊師和崔少監寄楊􅉑州題竇貟外新居舉韓湖州目代華州陪錢大夫覩玄宗詩懷上京故人和尉遲郎中酬福建陳判官始聞秋風和蘇十郎中酬淮南廖參謀題王郎中新居酬朗州崔貟外賀溫尚書水亭避暑述舊酬吳端才第五卷雜體詩翠微寺有感觀莫徭獵西山觀舞柘枝君山懷古秋江晚泊臨江寓望秋日送客登武陵城謝寄三癖詩寄上都同舍寄京師親友請告東歸題湖城驛池亭平蔡州平齊行城西行說笛歌試茶歌偃松答東陽于令贈致仕滕庶子詠紅柿子庭竹臺城懷古題壽安甘棠館與歌者米嘉榮聽穆氏唱歌渾侍中牡丹看牡丹與歌者何戡與歌童田順郎題破屏風賞牡丹寄陜州姚中丞酬崔郎中第六卷送別詩送張侍郎送楊侍御送蕭郎中送李尚書送渾大夫送源中丞送陸侍御送太常蕭博士送王司馬送楊處厚逢韓七中丞送周使君留別張侍御送家兄隱居送王師魯別友人後得書送李僕射重送李相公送張苕送能判官送韋秀才道沖赴制舉送李䇿秀才送張盥赴舉送裴處士應舉送錢侍御辭李相公送令狐相公送趙中丞送裴司徒令公送李户部侍郎送李郎中送杜録事夜宴盧常侍宅送崔司業使君送皇甫少尹送蔡京送唐舍人送盧處士送李秀才赴舉送令狐博士送李貟外送陳郎中送李中丞送李庚先輩送廖參謀送從弟郎中第七卷送僧詩別君素上人送深法師答宣廣上人送僧仲剬送僧元皓送如智法師贈讃頭陀送慧則法師過鴻舉法師重送鴻舉送僧方及贈日本僧贈眼醫僧別浩初師觀碁歌送儇師贈別約師送鴻舉師送宵韻上人送義舟師送景玄師送元曉上人送惟良上人送元簡上人送宗密上人第八卷樂府團扇歌荆州歌紀南歌宜城歌順陽歌馬嵬行視刀環歌三閣詞更衣曲淮隂行競渡曲堤上行採菱行秋風引莫徭歌蠻子歌洞庭秋月行踏歌詞華淸詞步虛詞桃源行魏宫詞阿嬌怨九華山歌送春曲初夏曲柳花詞送春詞秋詞第九卷樂府泰娘歌秋扇詞搗衣曲七夕龍陽縣歌度桂嶺歌插田歌畬田行蒲萄歌鶗鴂吟牆隂歌觀雲篇踏潮歌百花行春有情篇路傍曲白鷺兒壯士行邊風行竹枝詞楊柳枝詞浪濤沙詞瀟湘神詞拋毬樂詞又楊栁枝詞又竹枝詞紇那曲第十卷哀挽德宗挽歌敬宗挽歌文宗挽歌于司空挽歌傷栁儀曹謫居悼往哭吕衡州遙傷假右丞傷桃源薛道士王思道碑堂遙傷丘中丞傷獨孤舍人覩華州舅氏詩袁公挽歌代靜安佳人怨傷愚溪見元九侍御詩傷秦姝行悼妓詩和憶故姬傷循州渾尚書哭龐京兆再傷龐尹哭王僕射傷韋賔客縝再經故元九相公宅第十一卷賦問大鈞砥石楚望傷往何卜謫九年望山陽城秋聲第十二卷論辨迹明贄華他天論上天論中天論下第十三卷易論辨易第十四卷書上杜司徒獻權舍人代答于襄州答元使君答竇中丞答柳子厚與柳子厚答薛郎中論方書與刑部韓侍郎論書儀第十五