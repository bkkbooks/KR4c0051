front:
  text: 劉夢得文集卷第十九
  hash: sha256:048f2be33a7a15bea358f451b4a6783145490b5b66488da797a6ef512a038976
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_019-1a}
body:
  text: 表箋附代賀册魯王代讓官蘇州謝上蘇州謝賑貸賀册皇太子賀皇太子受册箋賀赦上皇太子箋代裴相公賀册魯王臣某伏見制書以今月日册魯王禮畢皇家有慶寶祚無疆既榮夲枝克固盤石中謝伏惟皇帝陛下德符列聖道冠前王孝敬承兩宮之歡虔恭奉九廟之祀先崇大禮慶浹天人次念建封事并家國伏以魯王夙承睿訓特稟天姿爰以告辰光膺寵册既示之以君親之道又錫之以禮義之邦寰海聞風室家相慶臣自嬰疾病巳歷旬時不獲展禮明庭拜舞稱賀無任代裴相公讓官三首第一表并批答臣某言臣去冬得疾近日方劇西夕之景豈能久留及其未亂披露誠懇臣犬馬之齒六十有七壽雖不長亦不為短位忝公台近十五年皆由際會非以才進常懼官謗以招國刑今被病得死保其始終為幸甚厚豈復咨嗟所恨者遇聖明之君不得佐成太平之化自量氣力忽恐奄時則有微素無階上逹伏惟聖慈昭鑒憐而察之中謝伏以三台非曠職之地宰相非卧理之官伏枕之初巳有陳乞請罷真食兼辭貴階伏蒙優詔才遂一事頻降中使慰勉再三專令御醫旦夕診視茍安名器不覺經時主恩則深公議不可伏思陛下臨御之始宰臣四人逮今零落忽巳一半臣且危惙餘年幾何唯易直外鎮獨得無恙竊推此理權位難居伏乞賜臣停官許在家養疾就間辭祿或冀有瘳害盈福謙固是神理儻天眷綢厚念以伏事多年臣之所陳未蒙便遂則國朝勳舊以疾辭位者皆得致仕官使其家居足以頥養既有成例著於舊章伏望天恩特賜哀允無任省表具之夫爵位崇髙以酬勳德君臣協契諒在始終斯乃前王之令圖有國之彞典也況卿輔相憲祖逮于朕躬履歷四朝夷險一致服事君之大節推致物之深誠道光朝倫行滿天下倚注之意豈同他人屬朕纂曆御乾興師伐叛騷動纍歲端憂靡遑及河朔載寧郊丘畢事方欲咨詢元老康靖生靈不虞寒暑所侵勤勞遘疾雖國醫診視中使省臨憂屬之誠頃刻在念忽覽章奏退讓官榮雖知止之心則思避寵而謀猷之體斯乃為時寢食之間勉加頥攝其所陳乞非朕意焉第二表并批答臣某言臣所獻章表發於至誠伏奉批答未蒙俞允外負公責內迫私情祈於必遂敢守難奪中謝臣束髮已來號為強力及其晚節亦未甚衰一朝被病遂至綿惙臣自思省得其端倪非因飲食不節無有霧露之犯蓋由才微而任重功薄而賞厚竊位既久妨賢則多以積年之過幸致今日之沈疾不能酌損所以生災悟雖巳晚情實非矯伏惟陛下念其委使之久察其危苦之詞特降深恩救臣不逮無冒榮之咎得遂性之宜物議不形病心自泰忍死俟命披肝再陳伏乞聖慈俯賜容納無任省表具之卿勳績髙崇誠節忠盡秉心一德宣力四朝訏謨緝熙弼于豫理勤勞事國啓沃匪躬功格道光常所嘉尚所疾未瘳勉於繕食勿藥之喜佇即痊平台衮之司倚卿為重及纍陳讓殊謂不然宜體朕懷即斷來表第三表并批答臣某言得疾踰年在假三月再有陳請未蒙允從慮其奄忽銜愧入地伏惟聖慈哀而信之中謝臣聞君之使臣在知其心而聽其言不以容尸祿為惠也臣之事君在無隱情而盡忠節不以受非據為榮也然後上下交感終始可詠臣伏事陛下五年于兹葵藿微誠巳蒙識察桑榆暮景所冀哀憐豈令危惙之時更懼滿盈之禍雖有藥石安能調和聖日難逢生涯漸短體羸無拜舞之望心在有涕戀之悲臣伏覽國書備見前事太宗朝李靖髙祖朝劉仁軌皆自宰臣乞骸致政其後知猶可用復起于家進退之間曲盡情禮君臣之際良史美談伏望陛下悉臣至誠念臣羸病許遂頥養以保餘年俟其有瘳或冀萬一無任省表具悉謝病之制雖起於昔賢盡瘁之詞亦摽於古典況卿有功於國作相纍朝自匡輔眇身又勤勞數載豈可以微疾去位以重望辭榮章疏徒來延遲彌切至如太宗許李靖致政髙宗遂仁軌乞骸朕非不知事則有異何者時當明聖在上理道巳成宰臣優遊固得自便今則生物尚困庶工未循言念勳賢方深倚注惟此故事恐難遽行卿宜體是誠懷力更頥養必有多福以扶大忠無至崔然復陳章表蘇州謝上臣某言伏奉制書授臣蘇州刺史始從郎署出領郡章承命若驚省躬知感中謝伏惟皇帝陛下受上玄之眷佑揚列聖之耿光大康黎元愼擇牧守德音每發品物咸蘇臣夲書生素無黨援謬以薄伎三登文科德宗皇帝擢為御史在臺三載例轉省官永貞之初權臣領務遂奏録用蓋聞虛名唯守職業實無朋附竟坐飛語貶在遐藩憲宗皇帝後知事情却授刺史凡歷外任二十餘年伏遇陛下應運重光物無廢滯收拾耆舊塵忝班行既幸逢時常思展效在集賢院四換星霜進供御書二十餘卷儒臣之分甘老於典墳優詔忽臨又委之符竹分憂誠重戀闕滋深石室之書空留筆札金閨之籍巳去姓名夲末可明申雪無路豈意聖慈弘納不隔卑微靣辭之日特許升殿天顔咫尺臣禮兢惶不敢盡言空懷誠懇謝恩而出生光於九陌之間受訓而行布政於五湖之外臣即以今月初六日到任上訖伏以水災之後物力索空臣謹宣皇風慰彼黎庶臣聞有味之物蠧蟲必生有才之人讒言必至事理如此古今同途了然辨之唯在明聖伏惟陛下察臣此言則天下之人無不幸甚江海逺地孤危小臣雖雨露之恩幽遐必被而犬馬之戀親近為榮無任蘇州謝賑賜臣某言伏奉去年二月十五日敕蘇州宣賜米一十二萬碩委刺史據戶均給者恩降九天澤流萬姓伏以臣當州去年災沴尤甚水潦雖退流亡尚多臣前月到任奉宣聖百闔境老幼無不涕零詢訪里閭備知凋瘵方具事實便欲奏論聖慈憂人照燭幽逺特有賑恤救其災荒蒼生荷再造之恩儉歲同有年之慶臣忝為長吏倍萬常情無任蘇州賀册皇太子臣某言伏奉制書以今月七日册皇太子德音遐布盛禮畢陳國夲永安人心同慶中賀伏惟皇帝陛下以繼天之聖有知子之明義兼君親禮重宗祏龍樓肇建展嘉禮於三朝鳯曆延長固夲枝於萬葉臣守在遐郡不獲稱慶闕庭無任賀皇太子受册箋二首朝議大夫持節蘇州諸軍事守蘇州刺史上柱國劉某叩頭叩頭伏惟皇太子殿下允膺上嗣光啓東朝蒼震發前星之輝黃離表重輪之瑞位居守器禮重承祧萬國以貞九圍咸恱無任又使持節都督夔州刺史劉某叩頭伏惟皇太子殿下祗膺詔册光啓儲闈展至性於三朝承夲枝於百代宗祏永固神人以和四嶽仰搖山之髙百川承少海之潤無任賀赦上皇太子箋使持節連州諸軍事守連州刺史劉某惶恐叩頭伏見今月一日制書大赦天下者伏以獻歲布和皇恩逺降乾坤交泰寰海廓清伏惟皇太子殿下道冠元良德兼忠孝承顔拜慶榮耀古今某職守有限不獲隨例稱賀宫庭無任劉夢得文集卷第十九
