body:
  text: 樂府團扇歌荆州歌紀南歌宜城歌順陽歌馬嵬行視刀環歌三閣詞更衣曲淮隂行競渡曲堤上行採菱行秋風引莫徭歌蠻子歌洞庭秋月行踏歌詞華淸詞步虛詞桃源行魏宫詞阿嬌怨九華山歌送春曲初夏曲柳花詞送春詞秋詞團扇歌團扇復團扇奉君清暑殿秋風入庭樹從此不相見上有乘鸞女蒼蒼網蟲遍明年入懷袖別是機中練荆州歌二首渚宫楊柳暗麥城朝雉飛可憐踏青伴乘䁔著輕衣今日好南風商旅相催發沙頭檣竿上始見春江闊紀南歌風煙紀南城塵土荆門路天寒多獵騎走上樊姬墓宜城歌野水繞空城行塵起孤驛荒臺側生樹石碣陽鐫額靡靡度行人溫風吹宿麥順陽歌朝辭官軍驛前望順陽路野水齧荒墳秋蟲鏤官樹曾聞天寶末胡馬西南鶩城守魯將軍拔城從此去馬嵬行緑野扶風道黃塵馬嵬驛路邊楊貴人墳髙三四尺乃問里中兒皆言幸蜀時軍家誅佞幸天子捨祅姬羣吏伏門屏貴人牽帝衣低徊轉美目風日為無暉貴人飲金屑倐忽蕣英暮平生服杏丹顔色真如故屬車塵巳逺里巷來窺覷共愛宿妝妍君王畫眉處履綦無復有履組光未滅不見巖畔人空見凌波襪郵童愛蹤跡私手解縏結傳看千萬眼縷絶香不歇指環照骨明首飾敵連城將入咸陽市猶得賈胡驚視刀環歌常恨言語淺不如人意深今朝兩相視脉脉萬重心三閣詞四首吳聲貴人三閣上日晏未梳頭不應有恨事嬌甚却成愁珠箔曲瓊鈎子細見楊州北兵那得度浪語聲悠悠沈香帖閣柱金縷畫門楣回首降幡下巳見黍離離三人出眢井一身登檻車朱門漫臨水不可見鱸魚更衣曲博山炯炯吐香霧紅燭引至更衣處夜如何其夜漫漫鄰雞未鳴寒鴈度庭前雪壓松桂叢廊下點點懸紗籠滿堂醉客爭笑語嘈嘈琵琶音幕中淮隂行五首并引古有長干行言三江之事悉矣余嘗阻風淮隂作淮隂行以禆樂府蔟蔟淮隂市竹樓緣岸上好日起檣竿烏飛驚五兩今日轉船頭金烏指西北煙波與春草千里同一色船頭大銅鐶摩挲光陳陳早晚使風來沙頭一眼認何物令儂羡羡郎船尾燕銜泥趂檣竿宿食長相見隔浦望行船頭昂尾幰幰無奈洗菜時清淮春浪軟競渡曲競渡始於武陵及今舉楫而相和之其音咸呼之何在斯招屈之義事見圖經沅江五月平堤流邑人相將浮彩舟靈均何年歌巳矣哀謡振楫從此起楊枹擊節雷闐闐亂流齊進聲轟然蛟龍得雨鰭鬛動螮蝀飲河形影聮刺史臨流褰翠幃揭竿命爵分雄雌先鳴餘勇爭鼓舞末至銜枚顔色沮百勝夲自有前期一飛由來無定所風俗如狂重此時縱觀雲委江之湄綵旗夾岸照鮫室羅襪凌波呈水嬉曲終人散空愁暮招屈亭前水東注堤上行三首酒旗相望大堤頭堤下連檣堤上樓日暮行人爭渡急槳聲幽軋在中流江南江北望煙波入夜行人相應歌桃葉傳情竹枝怨水流無限月明多長堤繚繞水徘徊酒舍旗亭次第開日晚上樓招估客軻峩大艑落帆來採菱行武陵俗嗜芡菱歲秋矣有女郎盛遊于白馬湖薄言采之歸以禦客古有採菱曲罕傳其詞故賦之以俟采詩者白馬湖平秋日光紫菱如錦綵鴛翔蕩舟遊女滿中央採菱不顧馬上郎爭多逐勝分相嚮時轉蘭橈破輕浪長鬟弱袂動參差叉影釧文浮蕩漾笑語哇咬顧晚暉蓼花㳂岸扣舷歸歸來共到市橋步野蔓繫船萍滿衣家家竹樓臨廣陌下有連檣多估客攜觴薦芰夜經過醉踏大堤相應歌屈平祠下沅江水月照寒波白煙起一曲南音此地聞長安北望三千里秋風引何處秋風至蕭蕭送鴈羣朝來入庭樹孤客最先聞莫徭歌莫徭自生長名字無符籍市易雜鮫人㛰姻通木客星居占泉眼火種開山脊夜渡千仭溪含沙不能射蠻子歌蠻貊鈎輈音蠻衣斑斕布熏狸掘沙鼠時節祠盤瓠忽逢乘馬客恍若驚􅍪顧腰斧上髙山意行無舊路洞庭秋月行洞庭秋月生湖心層波萬頃如鎔金孤輪徐轉光不定遊氣濛濛隔寒鏡是時白露三秋中湖平月上天地空嶽陽城頭暮角絶蕩漾巳過君山東山城蒼蒼夜寂寂水月逶迤繞城白蕩槳巴童歌竹枝連檣估客吹羌笛勢髙夜久隂力全金氣肅肅開清躔浮雲野鳥歸四裔欄干星斗當中天天雞相呼曙霞出劒影含光讓朝日日出喧喧人不間夜來晴景非人間踏歌詞四首春江月出大堤平堤上女郎連袂行唱盡新詞觀不見紅霞映樹鷓鴣鳴桃蹊柳陌好經過燈下妝成月下歌為是襄王故宫地至今猶自細腰多新詞宛轉遞相傳振袖傾鬟風露前月落烏啼雲雨散遊童陌上拾花鈿日暮江頭聞竹枝南人行樂北人悲自從雪裏唱新曲直到三春花盡時華清詞日出驪山東徘徊照溫泉樓臺影玲瓏稍稍開白煙言昔太上皇常居此祈年風中聞清樂往往來列仙翠華入五雲紫氣歸上玄哀哀生人淚泣盡弓劒前聖道夲自我凡情徒顒然小臣感玄化一望青冥天步虛詞二首阿母種桃雲海際花落子成二千歲海風吹折最繁枝跪捧瓊盤獻天帝華表千年一鶴歸凝丹為頂雪為衣星星仙語人聽盡却向五雲翻翅飛桃源行漁舟何招招浮在武陵水拖綸擲餌信流去誤入桃源行數里清源尋盡花綿綿踏花覓徑至洞前洞門蒼黑煙霧生暗行數步逢虛明俗人毛骨驚仙子爭來致詞何至此須臾皆破冰雲顔笑言委曲問人間因嗟隱身來種玉不知人世如風燭筵羞石髓勸客餐燈爇松脂留客宿雞聲犬聲遙相聞曉光䓗籠開五雲漁人振衣起出户滿庭無路花紛紛翻然恐迷鄉縣處一息不肯桃源住桃花滿溪水似鏡塵心如垢洗不去仙家一出尋無蹤至今水流山重重魏宫詞二首日晚長秋簾外報望陵歌舞在明朝添爐火欲熏衣麝憶得分明不忍燒日映西陵松柏枝下臺相顧一相悲朝來樂府長歌曲唱著君王自作詞阿嬌怨望見葳蕤舉翠華試開金屋掃庭花須臾宫女傳來信言幸平陽公主家九華山歌并引九華山在池州青陽縣西南九峯競秀神采竒異昔豫仰太華以為此外無竒愛女几荆山以為此外無秀及今見九華始悼前言之容易也惜其地偏且逺不為世所稱故歌以大之竒峯一見驚魂魄意想洪爐始開闢疑是九龍夭矯欲攀天忽逢霹靂一聲化為石不然何至今攸攸億萬年氣勢不死如騰仚音媽䡖舉貌雲含幽兮月添冷日凝暉兮江漾影結根不得要路津逈秀長在無人境軒皇封禪登雲亭大禹㑹計臨東溟乘樏不來廣樂絶獨與猿鳥愁青熒君不見敬亭之山黃索漠兀如斷岸無稜角宣城謝守一首詩遂使名聲齊五嶽九華山九華山自是造化一尤物焉能籍甚乎人閒送春曲三首春向晚春晚思悠哉風雲日巳改花葉自相催漠漠空中去何時天際來春巳暮冉冉如人老映葉見殘花連天是青草可憐桃與李從此同桑棗春景去此去何時回遊人千萬恨落日上髙臺寂寞繁花盡流鶯歸不來初夏曲三首銅壷方促夜斗柄暫南回稍嫌單衣重初憐北户開西園花巳盡新月為誰來時節遇繁華隂隂千萬家巢禽命子戲園果墜枝斜寂寞孤飛蝶窺叢覓晚花緑水風初暖青林露早晞麥田雉朝雊桑野人暮歸百舌悲花盡無聲來去飛柳花詞三首開從緑條上散逐香風繞故取花落時悠揚占春草輕飛不假風輕落不委地撩亂舞晴空發人無限思晴天點點雪來送青春暮無意似多晴千家萬家去送春詞昨來樓上迎春處今日登樓又送歸蘭蘂殘妝含露泣柳條長袖向風揮佳人對鏡容色改楚客臨江心事違萬古至今同此恨無如一醉盡忘機秋詞二首自古逢秋悲寂寥我言秋日勝春朝晴空一鶴排雲上便引詩情到碧霄山明水淨夜來霜數樹深紅出淺黃試上髙樓清入骨豈如春色嗾人狂劉夢得文集卷第八劉夢得外集卷第八律詩寄楊給事巫山神女廟柳絮陪崔大尚書曹剛登望梅樓別蘇州送處州奚使君題報恩寺渡楊子津館娃宫姑蘇臺贈陳長史寄韓中丞有感楊柳枝海陽十詠送周魯儒赴舉送曹璩歸越中尋汪道士不遇桃源玩月遊建康田順郎歌米嘉榮自江陵㳂流別夔州官吏夜聞船中箏聞道士彈思歸引喜康將軍見訪贈劉景擢第次德宗山陵嘗茶梁國祠九日登髙謝柳子厚硯元日感懷謝崔相公賜馬南中書來題招隱寺寄山中友人望洞庭魚復江中歷陽書事寄毗陵楊給事三首揮毫起制來東省􅰭足修名謁外臺好著櫜鞬莫惆悵出文入武是全才曽主魚書輕刺史今朝自請左魚來青雲直上無多地却要斜飛取勢回東城南陌昔同遊坐上無人第二流屈指如今巳零落且須歡喜作鄰州巫山神女廟巫山十二鬱蒼蒼片石亭亭號女郎曉霧乍開疑卷幔山花欲謝似殘妝星河好夜聞清佩雲雨歸時帶異香何事神仙九天上人閒來就楚襄王柳絮飄揚南陌起東鄰漠漠濛濛暗度春花巷暖隨輕舞蝶玉樓晴拂豔妝人縈回謝女題詩筆點綴陶公漉酒巾何處好風偏似雪隋河堤上古江津陪崔大尚書及諸閣老宴杏園更將何面上春臺百事無成老又催惟有落花無俗態不慊憔悴滿頭來曹剛大絃嘈噆小絃清噴雪含風意思生一聽曹剛彈薄媚人生不合出京城發蘇州後登武丘寺望梅樓獨宿望梅樓夜深珍木冷僧房巳閉戶山月方出嶺碧池涵劒彩寶剎搖星影却憶郡齊中虛眠此時景別蘇州二首三載為吳郡臨歧祖帳開雖非謝桀黠且為一徘徊流水閶門外秋風吹柳條從來送客處今日自魂銷松江送處州奚使君吳越古今路滄波朝夕流從來別離地能使管絃愁江草帶煙暮海雲含雨秋知君五陵客不樂石門遊題報恩寺雲外支硎寺名聲敵虎丘石文留馬跡峯勢聳牛頭泉眼濳通海松門預帶秋遲回好風景王謝昔曽游罷郡姑蘇北歸渡楊子津幾歲悲南國今朝賦北征歸心渡江勇病體得秋輕海闊石門小城髙粉堞明金山舊遊寺過岸聽鍾聲館娃宫在郡西南硯石山上前瞰姑蘇臺傍有採香徑梁天監中置佛寺曰靈巖即故宫也信為絶境因賦二章館娃宫宫館貯嬌娃當時意大誇豔傾吳國盡笑入楚王家月殿移椒壁天花代蕣華唯餘採香徑一帶繞山斜姑蘇臺故國荒臺在前臨震澤波綺羅隨丗盡麋鹿古時多築用金鎚力摧因石鼠窠昔年雕輦路唯有採樵歌贈同年陳長史貟外明州長史外臺郎憶昔同年翰墨場一自分襟多歲月相逢滿眼是淒涼推賢有愧韓安國論舊唯存盛孝章所歎謬遊東閣下看君無計出恓惶寄湖州韓中丞老郎日日憂蒼鬢逺守年年猒白蘋終日相思不相見長頭相見是何人有感死且不自覺其餘安可論昨宵鳳池客今日雀羅門騎吏塵未息銘旌風巳翻平生紅粉愛惟解哭黃昏楊柳枝楊子江頭煙景迷隋家宮樹拂金堤嵳峩猶有當時色半蘸波中水鳥棲海陽十詠并引元次山始作海陽湖後之人或立亭榭率無指名及余而大備每疏鑿搆置必揣稱以標之人咸曰有旨異日遷客裴侍御為十詠以示余頗明麗而不虛美因捃拾裴詩所未道者從而和之一云余為吏隱亭𫐠言海陽之所從來詳矣異日下與此同吏隱亭結構得竒勢朱門交碧潯外來始一望寫盡平生心日軒漾波影月砌鏤松隂幾度欲歸去回眸情更深切雲亭逈破林煙出俯窺石潭空波搖杏梁日松韻碧窗風隔水生別島帶橋如斷虹九疑南面事盡入寸眸中雲英潭芳幄覆雲屏石奩開碧鏡支流日飛灑深處自疑瑩濳去不旯迹清音常滿聽有時病朝酲來此心神醒玄覽亭蕭灑青林際寅緣碧潭隈淙流冒石下輕波觸砌回香風逼人度幽花覆水開故令無四壁晴夜月光來裴溪時御史巳遇新恩楚客憶關中疏溪想汾水縈紆非一曲意態如千里倒影羅文動微波笑顔起君今賜環歸何人承玉趾飛練瀑晶晶擲巖端潔光如可把瓊枝曲不折雪片晴猶下石堅激清響葉動承餘灑前時明月中見是銀河㵼蒙池瀠渟幽壁下深淨如無力風起不成文月來同一色地靈草木瘦人逺煙霞逼往往疑列仙圍碁在巖側棼絲瀑飛流透嵌隟噴灑如絲棼含暈迎初旭翻光破夕曛餘波繞石去碎響隔溪聞却望瓊沙際逶迤見脉分雙溪流水繞雙島碧溪相竝深浮花擁曲處逺影落中心間鷺久獨立曝龜驚復沈蘋風有時起滿谷簫韶音月窟濺濺漱幽石注入團圎處有如常滿杯承彼清夜露巖曲月斜照林寒春晚煦遊人不敢觸恐有蛟龍護送周魯儒赴舉并引晝居外次晨門曰有九疑生持一刺來謁立西階以須生危冠方袂淺拱舒拜且前致辭稱贄其文頗涉獵前言居五六日復袖來益引古事以相劘切與之言能言其得姓因家之所自暨縣道鄉亭之風俗望山名水之槩狀羅含所未記朱贛之未條咸得之於生由是始列於賔籍臨觴而司斟觀博而竄言有日矣初邑中人聞有生來而二千石客之駢然來觀遷客裴御史遇生於坐抵掌曰人固有貌類而族殊者周生疑羅玠也衆咸辴然而熟視生疑也愈甚夫形似古所有也優孟似蒍敖而楚君欲以為相人殊而貌肖猶或欲用之玠生於衡山而生生於九疑其似誠匹也無乃躡其武升俊造仕甸服佐君藩為御史乎古攴人無避事即有而書之尚實也行李之貺則徴夫詩曰當日營陽內史孫因家占得九疑村童心便有愛書癖手指今餘把筆痕自握蛇珠辭白屋欲憑雞卜謁金門若逢廣坐問羊酪從此知名在一言送曹璩歸越中舊隱余為連州諸生以進士書刺者浩不可紀獨曹生崖然自稱為山夫及與語以徴其實則日所嗜者名嘗逺遊以索之抗喉舌胝足拇以干東諸侯見之日率莞然曰秀才者天下是不禮庸何傷今方依名山以揚其聲將掛幘於南嶽生之言未及休余遽曰在已不在山若子之言依山而易髙是練神叩寂捐日月而不顧名聞而老至持是焉用乎生聞言愀然如悔色見於眉睫因留止道士院從余求書以觀居三時而功倍一歲讀史書自黃帝至吳魏閒班班能言之然而絶口不敢言衡山知山夫不販而贏也十一月告余歸隱於㑹稽且曰知求名之自矣乞詞以發之遂賦七言詩以鑒其志詩曰行盡瀟湘萬里餘少逢知已憶吾廬數閒茅屋間臨水一盞秋燈夜讀書地逺何當隨計吏策成終自詣公車剡中若問連州事惟有千山畫不如尋汪道士不遇仙子東南秀泠然善馭風笙歌五雲裏天地一壷中受籙金華洞焚香玉帝宫我來君閉户應是向崆峒八月十五日夜桃源玩月塵中見月心亦間況是清秋仙府閒凝光悠悠寒露墜此時立在最髙山碧虛無雲風不起山上長松山下水羣動翛然一境中天髙地平千萬里少君引我升玉壇禮空遙請真仙官雲駢欲下星斗動天樂一聲肌骨寒金霞昕昕漸東上輪欹影促猶頻望絶景良時難再并他年此夕應惆悵叔父元和中考昔事為桃源行後貶官武陵復為玩月作竝題於觀壁爾來星紀再周蔇牽復此郡仰見文字暗缺伏慮他年轉將塵沒故鐫在貞石以期不朽大和四年蔇謹記罷和州遊建康秋水清無力寒山暮多思官間不計程偏上南朝寺田順郎歌清歌不是丗間音玉殿嘗聞稱主心唯有順郎全學得一聲飛出九重深米嘉榮一別嘉榮三十載忽聞舊曲尚依然如今丗俗輕前輩好染髭鬚事少年自江陵㳂流道中三千三百西江水自古如今要路津月夜歌謡有魚父風天氣色屬商人沙村好處多逢寺山葉紅時覺勝春行到南朝征戰地古來名將盡為神別夔州官吏三年楚國巴城守一去楊州楊子津青帳聮延喧驛步白頭俯傴到江濵巫山暮色常含雨峽水秋來不恐人唯有九歌詞數首里中留與賽蠻神夜聞商人船中箏大艑髙船一百尺新聲促柱十三絃楊州市裏商人女來占西江明月天聞道士彈思歸引仙公一奏思歸引逐客初聞自泫然莫怪殷勤悲此曲越聲長苦巳三年喜康將軍見訪謫居愁寂似幽棲百草當門茅舍低夜靜將軍忽相訪鷓鴣驚起繞籬啼贈劉景擢第湘中才子是劉郎望在長沙住桂陽昨日鴻都新上第五陵年少讓清光赴連山途次德宗山陵寄張貟外常時竝冕奉天顔委佩低簪綵仗閒今日獨來張樂地萬重雲水望橋山嘗茶生採芳叢鷹觜牙老郎封寄謫仙家今宵更有湘江月照出霏霏滿碗花梁國祠梁國三郎威德尊女巫簫鼓走鄉村萬家長見空山上雨氣蒼茫生廟門九日登髙丗路山河險君門煙霧深年年上髙處未省不傷心謝柳子厚寄疊石硯常時同硯席寄此感離羣清越敲寒玉參差疊碧雲煙嵐餘斐斖水墨兩氛氲好與陶貞白松窗寫紫文元日感懷振蟄春濳至湘南人未歸身加一日長心覺去年非燎火委虛燼兒童衒綵衣異鄉無舊識車馬到門稀謝宣州崔相公賜馬浮雲金絡腦昨日别朱輪銜草如懷戀嘶風尚意頻曽將比君子不是換佳人從此西歸路應容躡後塵南中書來君書問風俗此地接炎洲淫祀多青鬼居人少白頭旅情偏在夜鄉思豈唯秋每羡朝宗水門前日夕流題招隱寺隱士遺塵在髙僧精舍開地形臨渚斷江勢觸山回楚野花多思南禽聲例哀殷勤最髙頂間却望鄉來思歸寄山中友人蕭條對秋色相憶在雲泉木落病身健潮平歸思懸涼鍾山頂寺瞑火渡頭船此地非吾土間留又一年望洞庭湖光秋月兩相和潭面無風鏡未磨遙望洞庭山翠小白銀盤裏一青螺魚復江中扁舟盡室貧相逐白髮藏冠鑷更加逺水自澄終日緑晴林長落過春花客情浩蕩逢鄉語詩意留連重物華風檣好住貪程去斜日青帘背酒家歷陽書事七十韻并序長慶四年八月余自夔州轉歷陽浮泯江觀洞庭歷夏口涉潯陽而東友人崔敦詩罷丞相鎮宛陵緘書來抵曰必我覿而之藩不十日飲不置子故余自池州道宛陵如其素敦詩出祖于敬亭祠下由姑孰西度江乃吾州也至則考圖經參見事為之詩俟采之夜諷者一夕為湖地千年列郡名霸王迷路處亞父所封城漢置東南尉梁分肘腋兵夲吳風俗剽兼楚語音傖沸井今無湧烏江舊有名土臺遊柱史石室隱彭鏗老君適楚有臺存焉彭祖石室在含山縣曹操祠猶在濡須塢未平海潮隨月大江水應春生一昨深山裏終朝看火耕魚書來北闕鷁首下南荆雲雨巫山暗蕙蘭湘水清章華樹巳失鄂渚草來迎廬逸三字出湓城粉堞明鴈飛彭蠡暮鴉澡大雷晴平野分風使恬和趂夜程貴池登陸峻春轂渡橋鳴絡繹主人問悲歡故舊情幾年方一面卜晝便三更助喜杯盤盛忘機笑語訇管淸疑警鶴絃巧似嬌鶯熾炭烘蹲獸華茵織鬪鯨回𥚑飄霧雨急節墮瓊瑛斂黛疑愁色拾鈿耀翠晶容華夲南國妝梳學西京日落方收鼓天寒更炙笙促筵交履舄痛飲倒簪纓謔浪容優孟嬌憐許智瓊蔽明添翠奕命燭柱金莖坐久羅衣皺杯頻粉面騂興來從請曲意墮即飛觥令急重須改歡馮醉盡呈詰朝還選勝來日又尋盟道別殷勤惜邀筵次第爭唯聞嗟短景不復有餘酲衆散扄朱户相攜話素誠晤言猶亹亹殘漏自丁丁出祖千夫擁行廚五熟烹離亭臨野水別思入哀箏接境人情洽方冬饌具精中流為界道隔岸數飛甍沙浦王渾鎮滄州謝傅塋望夫人化石夢帝日環營半渡趨津吏緣堤蔟郡氓場黃堆晚稻籬碧見冬菁里社爭來獻壷漿各自擎鴟夷傾底寫粔籹鬪成文採石風傳柝新林暮擊鉦繭綸牽撥刺犀焰照澄泓露冕觀原野前驅抗斾旌分庭展賔主望闕拜恩榮比屋惸婺輩連年水旱并退思常後己下令必先庚逺岫低屏列支流曲帶縈湖魚香勝肉官酒重於餳憶惜泉源變斯須地軸傾雞籠為石顆龜眼入泥坑事繫人風重官從物論輕江春俄淡蕩樓月幾虧盈柳長千絲宛田塍一線絣遊魚將婢從野雉旯媒驚波淨攢鳬鵠洲香發杜衡一鍾菰葑米千里水葵羹受譴時方久分憂政未成比瓊雖碌碌於鐵尚錚錚早忝游三署曽聞奏六英無能甘負弩不愼在騎衡口語成中遘毛衣阻上征時聞關利鈍智亦有聾盲昔愧山東妙今慙海內兄後來登甲乙早巳在蓬瀛心託秦明鏡才非楚白珩齒衰親藥物宦薄傲公卿捧日皆元老宣風盡大彭好令朝集使結束赴新正劉夢得外集卷第八
