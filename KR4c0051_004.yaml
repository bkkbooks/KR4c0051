菊風意欲摧蘭歲念貧心泰天涼病體安相逢取次第却甚少年歡和樂天洛下雪中宴集寄汴州李尚書洛城無事足杯盤風雪相和歲欲闌樹上因依見寒鳥坐中收拾盡間官笙歌要請頻何爽笑語志機拙更歡遙想兔園今日㑹瓊林滿眼映旗竿喜遇劉二十八偶書兩韻聮句病來佳興少老去舊遊稀笑語縱橫作杯觴絡繹飛度清談如水玉逸韻貫珠璣髙位當金鉉虛懷似布衣禹錫巳容狂取樂仍任醉忘機捨眷將何適留歡便是歸居易鳳儀常欲附蚊力自知微願假樽罍末膺門自此依紳劉二十八自汝赴左馮塗經洛中聮句不歸丹掖去銅竹漫云云唯喜因過我須知未賀君度詩聞安石詠香見令公燻欲首函關路來披緱嶺雲居易貂蟬公獨步鴛鷺我同羣插羽先飛酒交鋒便戰文紳鎮嵩知表德定鼎為銘勳顧鄙容商洛徴歡候汝墳禹錫領年多謔浪此夕任喧紛故態猶應在行期未要聞度游藩榮巳久捧袂惜將分詎猒杯行疾唯愁日向曛居易窮隂初莽蒼離思漸氤氲殘雪午橋岸斜陽伊水濆紳上謨尊右掖全略靜東軍萬頃徒稱量滄溟詎有垠禹錫豫自到洛中與樂天為文酒之㑹時時措詠樂不可支則慨然共憶夢得亦分司至止歡愜可知因為聮句成周文酒㑹吾友勝鄒枚唯憶劉夫子而今又到來度欲迎先倒屣亦坐便傾杯飲許伯倫户詩推公幹才並以本事居易久曾聆郢唱重喜上燕臺晝話墻隂轉宵歡斗柄回禹錫新聲還共聽故態復相咍遇物皆先賞從華半未開度起時烏帽側散處玉山頽墨客喧東閣文星犯上台居易詠吟君稱首踈放我為魋憶戴何勞訪憶夢得夢得分司而來留髠不用猜宴席上老夫暫起樂天密坐不動度奉觴承麴蘖落筆捧瓊瑰醉辨無妨側詞鋒不可摧此兩韻美令公也居易水軒看翡翠石徑踐莓苔童子能騎竹佳人解詠梅陪遊南宅之境禹錫洛中三可矣鄴下士悠哉自向風光急不須絃管催度樂觀魚踴躍間愛鶴徘徊煙柳青凝黛波萍緑撥醅居易春榆初改火律管又飛灰紅藥多遲發碧松冝亂栽禹錫馬嘶駝陌上鷁泛鳳城隈色色事堪惜些些病莫推度涸流尋軋軋餘刃轉恢恢從此知心伏無因敢自媒禹錫室隨親客入席許舊寮陪逸興嵇將阮交情陳與雷此二句屬夢得也居易洪爐思哲匠大厦要羣材他日登龍路應知免曝鰓禹錫洛中早春贈樂天漠漠復靄靄半晴將半隂春來自何處無迹日以深韶嫩冰後水輕盈煙際林藤生欲有託柳弱不自任華意巳含蓄鳥言尚沈吟期君當此時與我恣追尋翻愁爛漫後春暮却傷心和樂天宴李周美中丞宅池上賞櫻桃花櫻桃千萬枝照耀如雪天王孫宴其下隔水疑神仙宿露發清香初陽動暄妍妖姬滿髻插酒客折枝傳同此賞芳月幾人有華筵杯行勿遽辭好醉逸三年和牛相公遊南莊醉後寓言戲贈樂天兼見示城外園林初夏天就中野趣在西偏薔薇亂發多臨水鸂䳵雙遊不避船水底逺山雲似雪橋邊平岸草如煙白家唯有杯觴興欲把頭盤打少年思黯南墅賞牡丹花偶然相遇人閒世合在增城阿姥家有此傾城好顔色天教晚發賽諸花樂天少傅五月長齊廣延緇徒謝絶文友坐成睽閒因以戲之五月長齊戒深居絶送迎不離通德里便是法王城舉目皆僧事全家少俗情精修無上道結念未來生賔閣田衣占書堂信鼓鳴戲童為塔象啼鳥學經聲黍用青菰角葵承玉露烹馬家供薏苡劉氏餉蕪菁暗網籠歌扇流塵晦酒鐺不知何次道作佛幾時成樂天池館夏景方妍白蓮初開綵舟空泊唯邀緇侣因以戲之池館今正好主人何寂然白蓮方出水碧樹未鳴蟬靜室宵聞磬齊㕑晚絶煙蕃僧如共載應不是神仙酬樂天晚夏間居欲相訪先以詩見貽池榭堪臨泛翛然散鬱陶步因驅鶴緩吟為聽蟬髙林密添新竹枝低縋晚桃酒醅晴易墊藥圃夏頻薅老是班行舊間為鄉里豪經過更何處風景屬吾曹酬樂天感秋涼見寄庭晚初辨色林秋微有聲槿衰猶強笑蓮逈却多情簷燕歸心動韝鷹俊氣生間人占間景酒熟且同傾樂天以愚相訪沽酒致歡因成七言聊以奉答少年曾醉酒旗下同輩黃衣頷亦黃蹴踏青雲尋入仕蕭條白髮且飛觴令徴古事歡生雅客喚間人興在狂猶勝獨居荒草院蟬聲聽盡到寒螿秋晚新晴夜月如練有懷樂天雨歇晚霞明風調夜景清月髙微暈散雲薄細鱗生露草百蟲思秋林千葉聲相望一步地脉脉萬重情和思黯憶南莊見示丞相新家伊水頭智囊心匠日增修化成池沼無痕跡奔走清波不自由臺上看山徐舉酒潭中見月慢回舟從來天下推尤物合屬人閒第一流同留守王僕射各賦春中一物從一韻至七鶯能語多情春將半天欲明始逢南陌復集東城林踈時見影花密但聞聲營中緣催短笛樓上來定哀箏千門萬户垂楊裏百囀如簧煙景晴和樂天春詞依憶江南曲拍為句春去也多謝洛城人弱柳從風疑舉袂叢蘭裛露似霑巾獨坐亦含嚬謝樂天聞新蟬見贈碧樹有蟬後煙雲改容光瑟然引秋氣芳草日夜黃夾道喧古槐臨池思垂楊離人下憶泪志士激剛腸昔聞阻山川今聽同匡牀人情便所遇音韻豈殊常因之比笙竽送我遊醉鄉新秋對月寄樂天月露發光彩此時方見秋夜涼金氣應天靜火星流蛩響偏依井螢飛直過樓相知盡白首清景沒追遊酬樂天小臺晚坐見憶小臺堪逺望獨上清秋時有酒無人勸看山秪自知幽禽囀深竹孤蓮落靜池髙門勿遽掩好客無前期早秋雨後寄樂天夜雲起河漢朝雨灑髙林梧葉先風落草蟲迎濕吟簟涼扇恩薄室靜琴思深且喜火前別安能懷寸隂和樂天秋涼間卧暑退人體輕雨餘天色改荷珠貫索斷竹粉殘妝在髙僧掃室請逸客登樓待槐柳漸蕭踈間門少光彩秋晚病中樂天以詩見問力疾奉酬耳虛多聽逺展轉晨雞鳴一室背燈卧中庭掃葉聲蘭芳經雨敗鶴病得秋輕肯踏衡門草唯應是友生和樂天燒藥不成命酒獨醉九轉欲成就百神隂主持嬰啼鼎上去老貌鏡前悲却顧空丹竈回心向酒巵醺然耳熱後暫似少年時酬樂天詠老見示人誰不願老老去有誰憐身瘦帶頻减髮稀冠自偏廢書緣惜眼多炙為隨年經事還諳事閲人如閲川細思皆幸矣下此便翛然莫道桑榆晚為霞尚滿天歲夜詠懷彌年不得意新歲又如何念昔同遊者而今有幾多以間為自在將壽𥙷蹉跎春色無情故幽居亦見過元日樂天見過因舉酒為賀漸入有年數喜逢新歲來震方天籟動寅位帝車回門巷掃殘雪林園驚早梅與君同甲子壽酒讓先杯裴令公見示樂天寄奴買馬絶句斐然仰和且戲樂天常奴安得似方回爭望追風絶足來若把翠娥酬緑耳始知天下有竒才酬思黯代書見戲官冷如漿病滿身凌寒不易過天津少年留守多情興請待花時作主人酬思黯見示小飲四韻拋却人間第一官俗情驚怪我方安兵符相印無心戀洛水嵩雲恣意看三足鼎中知味久百尋竿上擲身難追呼故舊連宵飲直到天明興未闌酬樂天醉後狂吟十韻來章有移家住醉鄉之句散誕人閒樂逍遙地上仙詩家登逸品釋氏悟真筌制誥留臺閣歌詞入管絃處身於木鴈任丗變桑田吏隱情兼遂儒玄道兩全八關齊適罷三雅興尤偏文墨中年舊松筠晚歲堅魚書曽替代香火有因緣陸法和云與梁元帝於空王寺佛前結香火因緣欲向醉鄉去猶為色界牽好吹楊柳曲為我舞金鈿酬牛相公獨飲偶醉寓言見示宫漏夜丁丁千門閉霜月華堂列紅燭絲管靜中發歌眉低有思舞體輕無骨主人啓駝顔酣暢浹映髮猶思城外客阡陌不可越春意日夕深此歡無斷絶和僕射牛相公春日間坐見懷官曹崇重難頻入第宅清間且獨行階蟻相逢如偶語園蜂速去恐違程人於紅藥唯看色鶯到垂楊不惜聲東洛池臺怨拋擲移文非久㑹應成牛相公見示新什謹依韻次用以杼下情劇韻新篇至因難始見能雨天龍變化晴日鳳騫騰遊海驚何極聞韶素不曽愜心時拊髀擊節自麾肱符彩添隃墨波瀾起剡藤揀金光熠熠壘壁勢層層珠媚多藏賈花撩欲定僧封來真寶物寄與愧文朋巳老無時疾時洛中時厲多傷少年長貧望歲登雀羅秋寂寂蟲翅曉薨薨羸驥方辭絆虛舟巳絶絙榮華甘死別健羡亦生憎玉柱琤瑽韻金觥雹凸稜何時良宴㑹促膝對華燈秋霖即事聮句三十韻蕭索窮秋月蒼然苦雨天泄雲生棟上行潦入庭前居易送上僕射苔色侵三徑波聲想五絃井蛙爭入户轍鮒亂歸泉起送上中丞大監髙霤愁晨坐空階警夜眠鸛鳴猶未巳蟻穴頻遷禹錫送上少傅侍郎散漫踈還密空濛斷又連竹霑青玉潤荷滴白珠圎居易地濕灰逸一字滅池添水馬憐有苗霑霡霂無月弄潺湲起籬菊潜開秀園𬞞巳罷鮮斷行垂鴈翅孤嘯聳鳶肩禹錫橋柱黏黃菌墻衣點緑錢草荒行藥路沙淀釣魚船居易長者車猶阻髙人榻且懸此思劉白之來也金烏何日見玉爵幾時傳起近井桐先落當簷石欲穿趨風誠有戀披霧邈無緣禹錫以答懸榻之名廩米陳生醭庖薪濕起煙鳴雞潜報曉急景暗雕年居易蓋灑髙松上絲繁細柳邊拂叢時起蝶墜葉乍驚蟬起巾角皆爭墊裙𥚑例似湔人多蒙翠被馬盡看連乾禹錫好客無來者貧家但悄然寒泥印鶴迹漏壁絡蝸涎居易蚊聚雷侵室鷗翻浪滿川上樓愁羃羃繞舍猒淺淺起律候今秋矣歡娛久曠焉但令髙興在晴後奉周旋禹錫喜晴聮句苦雨晴何喜喜於未雨時氣收雲物變聲樂鳥烏知居易送上僕射蕙泛光風圃蘭開皎月池千峯分逺近九陌好追隨起送上尚書白日開天路玄隂卷地維餘清在林薄新照入漣漪禹錫碧樹涼先落青蕪濕更滋㬠毛經浴鶴曵尾出泥龜居易舞去商羊速飛來野馬遲柱邊無潤礎臺上有游絲起橋淨行塵息堤長禁柳垂宫城明睥睨觀闕麗罘罳禹錫洛水澄清鎮嵩煙展翠帷梁成虹乍見市散蟻初移居易籍草風猶暖攀條露巳晞屋穿添碧瓦墻缺召金鎚起逈徹來雙目昏煩去四肢霞丈晚煥爛星影夕參差禹錫爽助門庭肅寒催草木衰黃乾向陽菊紅洗得霜梨居易假蓋間誰惜彈絃燥更悲散蹄良馬穩炙背野人冝起洞户晨輝入空庭宿霧披堆牀出書卷傾笥上衣椸禹錫道路行非阻軒車望可期無辭訪圭竇且願見瓊枝居易仙閣蓬萊客古以袐書喻蓬萊儲宫羽翼師此言少傅每優陪麗句何暇接英姿起以酬圭竇之言玩景方搔首懷人尚斂眉因吟仲文什髙興盡於斯禹錫㑹昌春連宴即事聮句元年寒食日上巳暮春天雞黍三家㑹鶯花二節連居易光風初淡蕩美景漸暄妍簮組蘭亭上車輿曲水邊禹錫松聲添奏樂草色助鋪筵雀舫冝間泛螺杯任漫傳起園𬞞香帶露㕑柳暗藏煙麗句輕珠玉清談勝管絃居易陌喧金距鬪樹動綵繩懸姹女妝梳豔遊童衣服鮮禹錫圃香知種蕙池暖憶開蓮怪石雲疑觸夭桃火欲燃起正歡唯恐散雖醉未思眠嘯傲人閒世追隨地上仙居易燕來雙涏涏鴈去纍翩翩行樂真吾事尋芳獨我先禹錫滯周慙太史太史公留滯周南今榮忝慙古人矣入洛繼先賢此言劉白聲價與二陸爭長矣昔恨多分手今歡謬比肩起病猶陪宴飲老更奉周旋望重青雲客情深白首年居易遍嘗珍饌後許入畫堂前舞袖翻紅炬歌鬟插寶蟬禹錫斷金多感激倚玉貴遷延說史吞顔注論詩笑鄭箋起松筠寒不變膠􅃮冷彌堅興伴王尋戴謂隨僕射過尚書也榮同隗在燕居易自謂擲盧誇使氣刻燭鬪成篇實藝皆三捷虛名愧六聮禹錫興䦨猶舉白話靜每思玄更說歸時好亭亭月正圎起僕射來示有三春向晚四者難并之說誠哉是言輒引起題重為聮句疲兵再戰勍敵難降下筆之時辴然自哂走呈僕射兼簡尚書三春今向晚四者昔難并借問低眉坐何如攜手行居易舊遊多過隙新宴且尋盟鸚鵡林須樂麒麟閣未成起分隂當愛惜遲景好逢迎林野薰風起樓臺榖雨晴禹錫墻低山半出池廣水初平橋轉長虹曲舟回小鷁輕居易殘花猶布繡密竹自聞笙欲過芳菲節難忘宴慰情起月輪行似箭時物勢如傾見鴈隨兄去聽鶯求友聲禹錫蕙長書帶展菰嫩剪刀生坐密衣裳暖堂虛絲管清居易峯巒侵碧落草木近朱明與點非沂水針夢得散秩身猶幸趨朝力不任官將方共拙年與病交侵樂天徇樂非時選忘機似陸沉鑒容稱四皓捫腹有三壬夢得攜手慙連壁同心許斷金紫芝雖繼唱前後各任賔客白雪少知音樂天憶罷吳門守相逢楚水潯舟中頻曲宴夜後各加斟夢得燭淚銷殘漏絃聲閒逺砧􅋳顔舞長袖密坐接華簮樂天持論峯巒峻戰文矛㦸森笑言誠莫逆造次必相針夢得往事渾如昨餘歡迄至今迎君常倒屣訪我輒攜衾樂天隂魄初離畢時有雨後陽光正在參五月之節待公休一食縱飲共狂吟夢得劉夢得外集卷第四
