body:
  text: 古詩效阮公體偶作古調寓興昏鏡詞飬􅋧詞武夫詞賈客詞調瑟詞弔張曲江庭梅詠詠古詠史苦雨行萋兮吟經檀道濟故壘題欹器圖聚蚊謡百舌吟飛鳶操秋螢引華山歌磨鏡篇有獺吟效阮公體三首少年負志氣信道不從時只言繩自直安知室可欺百勝難慮敵三折乃良醫人生不失意焉能慕己知朔風悲老驥秋霜動􅋧禽出門有逺道平野多層隂滅沒馳絶塞振迅拂華林不因感衰節安能激壯心昔賢多使氣憂國不謀身目覽千載事心交上古人侯門有仁義靈臺多苦辛不學腰如磬徒使甑生塵偶作二首終朝對樽酒嗜興非嗜甘終日偶衆人縱言不縱談丗情間盡見藥性病多諳寄謝嵇中散豫無甚不堪萬卷堆牀書學者識其真萬里長江水征夫度要津養生非但藥悟佛不因人燕石何須辨逢時即至珍古調二首軒后初冠冕前旒為蔽明安知從復道然後見人情簿領乃俗士清談信古風吾觀蘇令綽朱墨一何同寓興二首常談即至理安事非常情寄語何平叔無為輕老生丗途多禮數鵬鷃各逍遙何事陶彭澤拋官為折腰昏鏡詞并引鏡之工列十鏡于賈奩發而視其一皎如其九霧如或曰良苦之不侔甚矣工解頥謝曰非不能盡良也蓋賈之意唯售是念今來市者必歷鑒周睞求與已宜彼皎者不能隱芒杪之瑕非美容不合是用什一其數也豫感之作昏鏡詞昏鏡非美金漠然喪其晶陋容多自欺謂若他鏡明瑕疵既不見妍態隨意生一日四五照自言美傾城飾帶以文繡裝匣以瓊瑛秦宫豈不重非適乃為輕飬􅋧詞并引途逢少年志在逐禽獸方呼鷹隼以襲飛走因縱觀之卒無所獲行人有常從事於斯者曰夫􅋧禽飢則為用今哺之過篤故然也豫感之作養􅋧詞飬􅋧非玩形所資擊鮮力少年昧其理日日哺不息探雛網黃口旦暮有餘食寧知下韝時翅重飛不得毰毸止林表狡兔自南北飲啄既巳盈安能勞羽翼武夫詞并引有武夫過詫余以從軍之樂翌日質于通武之善經者則曰果有樂也夫威恣而賞勞則樂用威雌而賞暴則樂橫去聲顧其樂安出耳豫惕然作是詞武夫何洸洸衣紫襲絳裳借問胡為爾列校在鷹揚依倚將軍勢交結少年場探丸害公吏袖刃妬名倡家産既不事顧盼自生光酣歌髙樓上袒裼大道傍昔為編戶人秉耒甘哺粳今來從軍樂躍馬飫峙粱猶思風塵起無種取侯王賈客詞并引五方之賈以財相雄而鹽賈尤熾或曰賈雄則農傷豫感之作是詞賈客無定遊所遊唯利并眩俗雜良苦乘時取重輕心計析秋毫捶鈎侔懸衡錐刀既無棄轉化日巳盈邀福禱波神施財遊化城妻約雕金釧女垂貫珠纓髙資比封君竒貨通幸卿趨時􅋧鳥思藏鏹盤龍形大艑浮通川髙樓次旗亭行止皆有樂關梁自無征農夫何為者辛苦事寒耕調瑟詞并引里有富豪翁厚自奉養而嚴督臧獲力屈形削然猶役之無何一旦不堪命亡者過半追亡者亦不來復翁悴沮而追昨非之莫及也豫感之作調瑟詞調瑟在張絃絃平音自足朱絲二十五闕一不成曲美人愛髙張瑶軫再三促上絃雖獨響下應不相屬日暮聲未和寂寥一枯木却顧膝上絃流淚難相續弔張曲江并引丗稱張曲江為相建言放臣不宜與善地多徙五溪不毛之鄉及今讀其文張自內職牧始安有瘴癘之歎自退相守荆州一作南有拘囚之思託諷禽鳥寄詞草樹鬱然與騷人同風嗟夫身丗出於遐陬一失意而不能堪矧華人士族而必致醜地然後快意哉議者以曲江為良臣識胡雛有反相羞與凡器同列密啓廷爭雖古哲人不及而燕翼無似終為餒魂豈忮心失恕隂謫最大雖二美莫贖邪不然何袁公一言明楚獄而鍾祉四葉以是相較神可誣乎豫讀其文因為詩以弔聖言貴忠恕至道重觀身法在何所恨色傷斯為仁良時難久恃隂謫豈無因寂寞韶陽廟魂歸不見人庭梅詠寄友人早花常犯寒繁實常苦酸何事上春日坐令芳意闌夭桃定相笑遊妓肯回看君問調金鼎方知正味難詠古有所寄二首車音想轔轔不見纂下塵可憐平陽第歌舞嬌靑春金屋容色在文園詞賦新一朝復得幸應知失意人寂寂照鏡臺遺基古南陽真人昔來遊翠鳯相隨翔目誠在桑野志遂貯椒房豈無三千女初心不可忘詠史二首驃騎非無勢少卿終不去世道劇頽波我心如砥柱賈生明王道衛綰工車戲同遇漢文時何人居貴位苦雨行悠悠飛走情同樂在陽和歲中三百日常苦風雨多天人信遐遠時節易蹉跎洞房有明燭無乃酣且歌萋兮吟天涯浮雲生爭蔽日月光窮巷秋風起先摧蘭蕙芳萬貨列旗亭恣心注明璫名髙毀所集言巧智難防勿謂行大道斯須成太行莫吟萋兮什徒使君子傷經檀道濟故壘萬里長城壞荒營野草秋秣陵多士女猶唱白符鳩史云當時人歌曰可憐白符鳩枉殺檀江州題欹器圖嬴相功成思稅駕晉臣名遂歎危機無因上蔡牽黃犬願作丹徒一布衣聚蚊謡沈沈夏夜間堂開飛蚊伺暗聲如雷嘈然欻起初駭聽殷殷若自南山來喧騰鼓舞喜昏黑昧者不分聰者惑露華滴瀝月上天利觜迎人看不得我軀七尺爾如芒我孤爾衆能我傷天生有時不可遏為爾設幄潛藜牀清商一來秋日曉羞爾微形飼丹鳥百舌吟曉星寥落春雲低初聞百舌間關啼花枝滿空迷處所搖動繁英墜紅雨笙簧百囀音韻多黃鸝吞聲燕無語東方朝日遲遲升迎風弄景如自矜數聲不盡又飛去何許相逢緑楊路綿蠻宛轉似娛人一心百舌何紛紜􅋳顔俠少停歌聽墮珥妖姬和睡聞可憐光景何時盡誰能低回避鷹隼廷尉張羅自不關潘郎挾彈無情損天生羽族爾何微舌端萬變乘春輝南方朱鳥一朝見索漠無言蒿下飛飛鳶操鳶飛杳杳青雲裏鳶鳴蕭蕭風四起旗尾飄揚勢漸髙箭頭砉騞聲相似長空悠悠霽日懸六翮不動飛凝煙遊鶤翔鴈出其下慶雲清景相回旋忽聞飢烏一噪聚瞥下雲中爭腐鼠騰音礪吻相喧呼仰天大嚇疑鵷雛畏人避犬投髙處俯啄無聲猶屢顧青鳥自愛玉山禾仙禽徒貴華亭露朴樕危巢向暮時毰毸飽腹蹲枯枝遊童挾彈麾肘臆碎羽分飛人不悲天生衆禽各有類威鳯文章在仁義鷹隼儀形螻蟻心雖能唳天何足貴秋螢引漢陵秦苑遙蒼蒼陳根腐葉秋螢光夜空寂寥金氣淨千門九陌飛悠揚紛綸暉映平明滅金爐星噴燈花發露華洗濯清風吹攢茅不定招搖垂髙麗罘罳過珠網斜歷琁題舞羅幌曝衣樓上拂香裙承露臺前轉仙掌槐市諸生夜對書北窗分明辨魯魚行子東山起征思中郎騎省悲秋氣銅雀人歸自入簾長門悵望來照淚誰言向晦常自明童兒走步嬌女爭天生有光非自衒逺近低昂暗中見撮蚊祅鳥亦夜飛翅如車輪人不見華山歌洪爐作髙山元氣鼓其橐俄然神功就峻拔在寥廓靈蹤露指瓜殺氣見稜角凡木不敢生神仙聿來託天資帝王宅以我為關鑰能令萬國人一見換神骨髙山固無限如此方為嶽丈夫無特逹雖貴猶碌碌磨鏡篇流塵翳明鏡歲久看如漆門前負局生為我一磨拂萍開緑池滿暈盡金波溢白日照空心圎光走幽室山神祅氣沮野魅真形出却思未磨時瓦礫來唐突有獺吟有獺得嘉魚自謂天見憐先祭不敢食捧鮮望清玄人立寒沙上心專脰肩肩漁翁以為祅舉塊投其咽呼兒貫魚歸與獺同烹煎關關黃金鶚大翅搖江煙下見盈尋魚投身擘洪漣攫拏隱嶙去哺雛林嶽巔鴟烏欲伺隙遙噪莫敢前長居青雲路彈射無由緣何地無江湖何水無鮪鱣天意不宰割菲祭徒虔虔空餘知禮重載在淹中篇劉夢得文集卷第二劉夢得外集卷第二詩和微之深春好贈別白侍郎洛中戲呈馮尹答白賔客始聞蟬有懷憶樂天樂天寄新詩月夜憶樂天酬令狐相公吟白君哭崔兒答樂天所寄池北新葺水齋酬別樂天贈樂天酬別樂天醉答樂天和樂天耳順吟見樂天題詩早夏郡中書事見元相公題名寄贈小樊憶春草報白君送令狐相公秋夕不寐冬日晨興酬樂天見寄答樂天見憶誚失婢榜者晚逹喜崔賔客歸洛傷小姬英英洛下醉吟郡齋書懷酬樂天即事公主舊宅吟樂天自問中秋玩月秋日書懷酬貽賀金紫初冬早寒傷微之敦詩晦叔泛舟聮句杏園聮句醉中聮句興花池亭聮句西池聮句首夏猶清和聮句薔薇花聮句西池落泉聮句和樂天柘枝和題真娘墓同樂天和微之深春好二十首同用家花車斜四韻何處深春好春深萬乘家宫門皆映柳輦路盡穿花池色連天漢城形象帝車旌旗暖風裏獵獵向西斜何處深春好春深阿母家瑶池長不夜珠樹正開花橋峻通星渚樓暄近日車層城十二闕相對玉梯斜何處深春好春深執政家恩光貪捧日貴重不看花玉饌堂交印沙堤柱礙車多門一巳閉直道更無斜何處深春好春深大鎮家前旌光照日後騎蹙成花節院收衙隊毬場蔟看車廣筵歌舞散書號夕陽斜何處深春好春深貴戚家櫪嘶無價馬庭發有名花欲進宫人食先薰命婦車晚歸長帶酒冠蓋任傾斜何處深春好春深恩澤家爐添龍腦炷綬結虎頭花賔客珠成履嬰孩錦縛車畫堂簾幕外來去燕飛斜何處春深好春深京兆家人眉新柳葉馬色醉桃花盜息無鳴鼓朝回自走車能令帝城外不敢徑由斜何處深春好春深刺吏家夜闌猶命樂雨甚亦尋花傲客多憑酒新姬苦上車公門吏散後風擺戟衣斜何處深春好春深羽客家芝田繞舍色杏樹滿山花雲是淮王宅風為列子車古壇操簡處一徑入林斜何處深春好春深小隱家芟庭留野菜撼樹去狂花醉酒一千日貯書三十車短衾從露體不敢有餘斜何處深春好春深富室家唯多貯金帛不擬負鶯花國樂呼聮轡行厨載滿車歸來看理曲燈下寶叉斜何處深春好春深豪士家多沽味濃酒貴買色深花已臂鷹隨馬連催妓上車城南踏青處村落逐原斜何處深春好春深貴胄家迎呼偏熟客揀選最多花飲饌開華幄笙歌出鈿車興酣樽易罄連㵼酒瓶斜何處深春好春深唱第家名傳一紙榜興管九衢花薦聽諸侯樂來隨計吏車杏園拋曲處揮袖向風斜何處深春好春深少婦家能偷新禁曲自剪入時花追逐同遊伴平章貴價車從來不墮馬故遣髻鬟斜何處深春好春深幼女家雙鬟梳頂髻兩面繡裙花粧壞頻臨鏡身輕不占車鞦韆爭次第牽拽綵繩斜何處深春好春深蘭若家當香收柏葉養蜜近梨花野徑宜行樂遊人盡駐車菜薗蘺落短遙見桔橰斜何處深春好春深老宿家小欄圍蕙草髙架引藤花四字香書印三乘壁畫車遲回聽句偈雙樹晚隂斜何處深春好春深種蒔家分畦十字水接樹兩般花櫛比栽籬槿咿啞轉井車可憐髙處望棊布不曾斜何處深春好春深稚子家爭騎一竿竹偷折四鄰花笑擊羊皮鼓行牽犢頷車中庭貪夜戲不覺玉繩斜刑部白侍郎謝病長告改賔客分司以詩贈別鼎食華軒到眼前拂衣髙謝豈徒然九霄路上辭朝客四皓叢中作少年他日卧龍終得雨今朝放鶴且沖天洛陽舊有衡茅在亦擬抽身伴地仙遙和白賔客分司𥘉到洛中戲呈馮尹西辭望苑去東占洛陽才度嶺無歸思看山不懊來冥鴻何所慕遼鶴乍飛回洗竹通新徑攜琴上舊臺塵埃長者轍風月故人杯聞道龍門峻還因上客開和留守令狐相公答白賔客蛟龍和風吹樹枝商山逸客出關時身無拘束起長晚路足交親行自遲官拂象筵終日待私將雞黍幾人期君來不用飛書報萬户先從紙貴知始聞蟬有懷白賔客去歲白有聞蟬見寄詩云秖應催我老兼遣報君知之句蟬韻極清切始聞何處悲人含不平意景值欲秋時此歲方晼晚誰家無别離君言催我老巳是去年詩憶樂天尋常相見意殷勤別後相思夢更頻每遇登臨好風景羡他天性少情人樂天寄洛下新詩兼喜微之欲到因以杼懷也松間風未起萬葉不自吟池上月未來清輝同夕隂宫徴不獨運塤篪自相尋一從別樂天詩思日巳沈吟君洛中作精絶百鍊金乃知孤鶴情月露為知音微之從東來威鳯鳴歸林羡君先相見一豁平生心月夜憶樂天兼寄微之今宵帝城月一望雪相似遙想洛陽城清光正如此知君當此夕亦望鏡湖水展轉相憶心月明千萬里酬鄆州令狐相公官舍言懷見寄呈樂天詞人各在一涯居聲味雖同迹自踈佳句傳因多好事尺題稀為不便書巳通戎略逢黃石仍占文星耀碧虛聞説朝天在來歲霸陵春色待行車吟白君哭崔兒二篇愴然寄贈吟君苦調我霑纓能使無情盡有情四望車中心未釋千秋亭下賦初成庭梧已有雛栖處池鶴今無子和聲從此期君比瓊樹一枝吹折一枝生答樂天所寄詠懷且釋其枯樹之歎衙前有樂饌常精宅內連池酒任傾自是官髙無狎客不論年長少歡情驪龍頷被探珠去老蚌胎還應月生莫羡三春桃與李桂花成實嚮秋榮白侍郎大尹自河南寄示池北新葺水齋即事招賔十四韻兼命同作公府有髙政新齋池上開再吟佳句後一似畫圖來結構踈林下寅緣曲岸隈緑波穿戶牖碧甃疊瓊瓌幽興當軒滿清光繞砌回潭心澄曉鏡渠口起晴雷瑶草緣堤種松煙上島栽魚遊驚撥刺鷺浴喜毰毸為客烹林笋因僧採石苔酒瓶常不罄書案任成堆簷外青雀舫坐中鸚鵡杯蒲根抽九節蓮蕚捧重臺芳訊此時到勝遊何日陪共譏吳太守自占洛陽才赴蘇州酬別樂天吳郡魚書下紫宸長安廄吏送朱輪二南風化承遺愛八詠聲名躡後塵梁氏夫妻為寄客陸家兄弟是州民江城春日追遊處共憶東都舊主人贈樂天一别舊遊盡相逢俱涕零在人雖晚逹於樹似冬青痛飲連宵醉狂吟滿坐聽終期拋印綬共占少微星福先寺雪中酬別樂天龍門賔客會龍宫東去旌旗駐上東二八笙歌雲幕下三千世界雪花中離堂未暗排紅燭別曲含凄揚晚風才子從今一分散便將詩詠嚮吳儂醉答樂天洛城洛城何日歸故人故人今轉稀莫嗟雪裏暫時别終擬雲間相逐飛和樂天耳順吟兼寄敦詩吟君新什慰蹉跎屈指同登耳順科鄧禹功成三紀事孔融書就八年多巳經將相誰能爾拋却丞郎爭奈何獨恨長州數千里且隨魚鳥泛煙波到郡未浹日登西樓見樂天題詩因即事以寄樂天自此郡謝病西歸湖上收宿雨城中無晝塵樓依新柳貴池帶亂苔春雲水正一望簿書來繞身煙波洞庭路愧彼扁舟人早夏郡中書事水禽渡殘月飛雨灑髙城華堂對嘉樹簾廡含曉清拂鏡整危冠振衣步前楹將吏儼成列簿書紛來縈言下辨曲直筆端破交爭虛懷詢病苦懷律操剽輕􅕡吏告無事歸來解簪纓髙簾覆朱閣忽爾聞調笙虎丘寺見元相公二年前題名愴然有詠前年滻橋送之武昌滻水送君君不還見君題寺虎丘山因知早貴兼才子不得多時在丗間寄贈小樊花靣丫頭十三四春來綽約向人時終須買取名春草處處將行步步隨憶春草憶春草處處多情洛陽道金谷園中見日遲銅駝陌上迎風早河南大尹頻出難只得池塘十步看府門閉後滿街月幾處遊人草頭歇館娃宫外姑蘇臺鬱鬱芉芉撥不開無風自偃君知否西子裙𥚑曾拂來樂天寄憶舊送因作報白君以答報白君别來巳度江南春江南春色何處好燕子雙飛故官道春城三百七十橋夾岸朱樓隔柳條丫頭小兒蕩畫槳長𬒮女郎簪翠翹郡齋北軒卷羅幕碧池逶迤繞華閣池邊緑竹桃李花花下舞筵鋪彩霞吳娃足情言語黠越客有酒巾冠斜坐中皆言白太守不負風光向杯酒酒酣襞箋飛逸韻至今傳在人人口報白君相思空望嵩丘雲其奈錢塘蘇小小憶君淚黦石榴裙白君有妓近自洛歸錢塘和白侍郎送令狐相公鎮太原十萬天兵貂錦衣晉城風日斗生輝行臺僕射新恩重從事中郎舊路歸疊鼓蹙成汾水浪閃旗驚斷塞鴻飛邊庭自此無烽火擁節還來坐紫微秋夕不寐寄樂天洞戶夜簾卷華堂秋簟清螢飛過池影蛩思繞階聲老枕知將雨髙窗報欲明何人諳此景逺問白先生冬日晨興寄樂天庭樹曉禽動郡樓殘點聲燈挑紅燼落酒暖白光生髮少嫌梳利顔衰恨鏡明獨吟誰應和須寄洛陽城酬樂天見寄元君後輩先零落崔相同年不少留華屋坐來能幾日夜臺歸去便千秋背時猶自居三品三川吳郡品同得老終須卜一丘投老之日願樂天為鄰若使吾徒還早逹亦應簫鼓入松楸答樂天見憶與老無期約到來如等間偏傷朋友盡移興子孫間筆底心猶毒杯前膽不豩呼關反唯餘憶君夢飛過武牢關和樂天誚失婢榜者把鏡朝猶在添香夜不歸鴛鴦拂瓦去鸚鵡透籠飛不逐張公子即隨劉武威新知正相樂從此脫青衣樂天寄重和晚逹冬青一篇因成再答風雲變化饒年少光景蹉跎屬老夫秋隼得時凌汗漫寒龜飲氣受泥塗東隅有失誰能免北叟之言豈便無振臂猶堪呼一擲爭知掌下不成盧河南白尹有喜崔賔客歸洛兼見懷長句因而繼和幾年侍從作名臣却向青雲索得身朝士忽為方外士主人仍是眼中人雙鸞遊處天京好五馬行時海嶠春遙羡光隂不虛擲肯令絲竹暫生塵和楊師臯給事傷小姬英英見學胡琴見藝成今朝追想幾傷情撚絃花下呈新曲放撥燈前謝改名但是好花皆易落從來尤物不長生鸞臺夜直衣衾冷雲雨無因入禁城和樂天洛下醉吟寄太原令狐相公兼見懷長句舊相臨戎非稱意詞人作尹本多情從容自使邊塵靜談笑不聞桴鼓聲章句新添塞下曲風流舊占洛陽城昨來亦有吳趨詠唯寄東都與北京郡齋書懷寄江南白尹兼簡分司崔賔客謾讀圖書三十車年年為郡老天涯一生不得文章力百口空為飽暖家綺季衣冠稱鬢面吳公政事副詞華還思謝病今歸去同醉城東桃李花酬樂天七月一日夜即事見寄夜樹風韻清天河雲彩輕故苑多露草隔城聞鶴鳴搖落從此始別離含逺情聞君當是夕倚瑟吟商聲外物豈不足中懷向誰傾秋來念歸去同聽嵩陽笙題于家公主舊宅樹繞荒臺葉滿池簫聲一絶草蟲悲鄰家猶學宫人髻園客爭偷御果枝馬埒蓬蒿藏狡兔鳯棲煙雨嘯愁鴟何郎獨在無恩澤不似當初傅粉時吟樂天自問愴然有作親友關心皆不見風光滿眼倍傷神洛陽城裏多池館幾處花開有主人八月十五日夜半雲開然後玩月因書一時之景寄呈樂天半夜碧雲收中天素月流開城邀好客置酒賞新秋影透衣香潤光凝歌黛愁斜輝猶可玩移宴上西樓秋日書懷寄白賔客州逺雄無益年髙健亦衰興情逢酒在筋力上樓知蟬噪芳意盡鴈來愁望時商山紫芝客應不向愁悲酬樂天見貽賀金紫之什久學文章含白鳳却因政事賜金魚郡人未識聞謡詠天子知名與詔書珍重和詩呈錦繡願言歸計並園廬舊來詞客多無位金紫同遊誰得如酬樂天初冬早寒見寄乍起衣猶冷微吟帽半欹霜凝南屋瓦雞唱後園枝洛水碧雲曉吳宫黃葉時兩傳千里意書札不如詩樂天見示傷微之敦詩晦叔三君子皆有深分因成是詩以寄吟君歎逝雙絶句使我傷懷奏短歌丗上空驚故人少集中唯覺祭文多芳林新葉催陳葉流水前波讓後波萬古到今同此恨聞琴泪盡欲如何春池泛舟聯句鳯池新雨後池上好風光上相公禹錫取酒愁春盡留賔喜日長度送兵部柳絲迎畫舸水鏡寫雕梁羣送賈閣長潭洞迷仙府煙霞認醉鄉餗送張司業鶯聲隨雨語竹色入壷觴籍送主客晚景含澄徹時芳得豔陽禹錫飛鳬拂輕浪緑柳暗回塘度逸韻追安石髙居勝辟強羣杯停新令舉詩動綵箋忙餗顧謂同來客歡遊不可忘籍杏園聮句杏園千樹欲隨風一醉同人此暫同羣上司空老態忽忘絲管裏衰顔頓解酒杯中絳上白二十二曲江日暮殘紅在翰苑年深舊事空居易上主客二十四年流落者故人相引到花叢禹錫花下醉中聮句共醉風光地花飛落酒杯絳送劉二十八殘春猶可賞晚景莫相催禹錫送白侍郎酒幸年年有花應歲歲開居易送兵部相公且當金韻擲莫遣玉山頽羣送庾閣長髙會彌堪惜良時不易陪承宣送主客誰能拉花住爭換得春回禹錫送吏部我輩尋常有佳人早晚來嗣復送兵部寄言三相府欲散且徘徊居易時户部相公同會宴興化池亭送白二十二東歸聮句東洛言歸去西園告別來白頭青眼客池上手中杯度離瑟殷勤奏仙舟委曲回征輪今欲動賔閣為誰開禹錫坐弄琉璃水行登緑縟苔花低妝照影萍散酒吹醅居易岸蔭新抽竹亭香欲變梅隨遊多笑傲遇勝且徘徊籍澄徹連天鏡潺湲出地雷林塘難共賞鞍馬莫相催度信及魚還樂機忘鳥不猜晚晴槐起露新暑石添苔禹錫擬作雲泥別尤思頃刻陪歌停珠貫斷飲罷玉峯頽居易雖有逍遙志其如磊落才會當重日用此去肯悠哉籍西池送白二十二東歸寄令狐相公聮句促坐宴回塘送君歸洛陽彼都留上宰為我説中腸度威鳳池邊別冥鴻天際翔披雲見居守望日拜封章禹錫春盡年華少舟通景氣長送行池籍薔薇花聮句似錦如霞色連春接夏開禹錫波紅分影入風好帶香來度得地依東閣當階奉上台行式淺深皆有態次第暗相催禹錫滿地愁英落緣堤惜掉回度芳濃濡雨露明麗隔塵埃行式似著燕脂染如經巧婦裁居易奈花無別計只有酒殘杯籍西池落泉聮句東閣聽泉落能令野興多行式散時猶帶沫淙處即跳波度遍洗磷磷石還驚泛泛鵝色清塵不染光白月相和居易噴雲縈松竹攢殊濺芠荷禹錫對吟時合響觸樹更搖柯籍照圃紅分藥侵階緑浸莎居易日斜車馬散餘韻逐鳴珂禹錫和樂天柘枝柘枝夲出楚王家玉靣添驕舞態奢雲鬢改梳翔鳯髻新衫別織鬬雞紗鼓催殘拍腰身軟汗透羅衣雨點花華筵曲罷辭歸去便隨王母上煙霞和樂天題真娘墓薝匐林中黃土堆羅襦繡黛巳成灰芳魄雖死人不怕蔓草逢春花自開幡蓋向風疑舞袖鏡燈臨曉似妝臺吳王嬌女墳相近一片行雲應往來劉夢得外集卷第二
