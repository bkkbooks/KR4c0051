front:
  text: 劉夢得文集卷第十五
  hash: sha256:997e6a38ae0b96f7e688080b72a50b7517a02a4e33f3319200b1f95d872d8160
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_015-1a}
body:
  text: 表並代淮南杜相公佑作代讓同平章事代謝平章事代謝手詔代謝貸錢物代謝赴行營代謝加朱鄭官代賀赦吳少誠代賀除䖍王代慰公主薨代慰王太尉薨代讓同平章事臣某言髙品吳千金至奉制某月日加臣銀青光祿大夫同中書門下平章事兼徐泗濠等州節度使觀察處置等使餘如故者初受恩榮若登霄漢退思塵忝如履春冰臣某誠惶誠恐頓首頓首臣聞以德詔官以勞定賞苟或虛授人無勸心臣自守方隅纍更時歲荷唐虞宣力之寄乏齊魯報政之能愧無可稱以答髙位豈意聖慈弘獎天澤荐加以夑贊之崇名被庸虛之陋質懼速官謗有玷大猷伏以宰相之職安危是注其在當否繫于慘舒惟以材升例無平進舉不失德則副蒼生之心苟非其人或致外夷之哂臣雖愚昧嘗覽前言豈敢冒榮遂安竊位輒思事理冀盡芻蕘若以汴河要津漕運所切徐方俶擾師旅未寧謹當上稟睿謀下貞師律剋期而進屈指可平勵衆率先是臣之志既行其事必在正名所加節制安敢飾讓至於銀青貴服金鉉重名勳績無聞豈冝濫及伏乞賜寢前命俯亮愚衷微臣有知止之宜聖朝無不稱之服名器斯愼退讓有聞遐邇聆風孰不知勸其新授官告謹重封進無任代謝平章事臣某言伏蒙獎拔超踐鈞衡慮玷大猷昧死陳讓再奉嚴旨不令固辭恩厚命輕位髙責重中謝臣聞天下安危注意將相處論道具瞻之地當總戎作鎮之權雖協夢而求無聞秉鉞之寄登壇以拜不兼調鼎之榮授受惟艱伊昔猶爾況臣庸瑣何以克堪陛下玄造曲成大明私照俾掌戎律復參廟謨寵光之崇在臣巳格毫髮之效於國何施謹當罄竭微誠奉遵至教仗天威以攝不類敷聖澤以遂羣生上分旰食之憂下塞素餐之責力誠不足心實念兹伏乞皇明俯賜昭鑒臣恪居官次遐守藩維不獲伏謝彤庭陳露丹慊心存闕下同犬馬之戀恩身在淮濆仰雲天而結思無任代謝手詔詔後批云朕自書臣某言中使閭忠信至奉宣聖旨存問兼賜臣手詔拜捧紫泥跪伸金簡承旨見聖神之略感恩知身命之輕中謝臣素乏異能幸逢昌運猥當旄鉞之寄未靖祅氛榮分台鼎之名何階啓沃竊位斯久速尤是虞豈謂玄化曲成鴻私荐及特紆睿思親灑仙毫降自九重粲然五色初喜麗天之象逺燭輝光旋驚垂露之蹤曲覃霈澤鸞鳳騫翔而變態煙雲舒卷以呈姿賦彩飛文聳神蕩目恭惟國寶何幸家藏感極涕零莫知上答應緣軍旅庶務謹具別狀奏聞無任代謝貸錢物臣某言中使南宮懷珍至奉宣聖旨存問兼賜臣墨詔天光下濟睿澤曲流銜恩未酬居寵彌懼中謝臣受任斯極微功莫施昨以封略未寧干戈猶動壽春固壘以備盜淮甸興師以扞姦經費所資數盈巨萬餽餉時久供億力殫慮始圖終不敢緘默輒陳管見上黷宸聰伏蒙聖慈特遂誠請逺承如綍之旨特假聚人之財軍須不愆士氣彌振糗糧既備永無半菽之虞襦袴足頒逺超挾纊之感是為恱使咸願先登臣忝總戎倍百欣荷伏以上分國用俯濟軍興候清煙塵謹備償納無任代謝赴行營臣某言臣自守淮濆巳周星紀䖍奉朝典粗安遐方素效未聞新恩荐及身曵兩綬寄深一隅蚊蚋負山力誠不足鷹鸇逐鳥志則有餘臣再授兵符夙參軍幕被堅執鋭雖未經於戎行制勝伐謀亦嘗習於事業自忝藩翰屬時淸平無施汗馬之勞但詠櫜弓之什今則幸遇殊獎委之專征以臣率先是臣素志況聞徐州士衆夲無叛心倉卒之閒危疑至此臣請自臨疆場親領紀綱裂帛繫書諭其禍福一作悔椎牛饗士養以威聲冀宣皇風煦兹蠢類以忠義感脅從之伍以含弘安反側之徒革靣悛心期乎不日其楊州留務請令行軍司馬路應權知伏乞聖慈俯賜照鑒無任代謝加兵馬使朱鄭官初除侍御史續除中丞異姓王臣某言奏事官韋溫回特蒙聖恩重賜朱鄭等官告宸象昭回煥然下燭榮分右職光賁遐藩中謝臣伏以朱鄭朴忠為心沈毅見色當建封禦侮之寄見張愔提孩之年昨者隸職徐州分鎮蘄縣繹騷之際綆亮彌彰歷險而來實繁其旅詳探夲末有足褒稱輒具奏聞恐須獎勸伏蒙睿鑒俯亮微誠優詔先行巳階直指之目殊私荐至超升獨坐之崇户領三千爵踰五等恩生非次感異常倫轅門有光武旅增氣遂使感激之士希勇爵以捐軀猖狂之徒聆聖澤而悛性風行草偃其勢必然臣忝總戎倍百欣荷無任代賀赦吳少誠復官爵臣某言中使宋惟澄至奉宣聖旨存問兼賜臣墨詔及昭示洗雪吳少誠等事天地弘覆燾之恩雷雨施渙汗之澤瑕纍咸滌危疑獲安中謝臣伏以少誠擅興兵戈事生詿誤自王師致討天威下臨曾無悖辭但聞引咎初懷疑懼雖擁衆以偷生旋感聖神屢拜章而請命陛下仁深解網慮軫納隍念餽餉飛挽之勤閔戰爭暴露之苦舉兹宥過之典副彼效順之誠一方承再造之恩九有覩惟新之化敷鴻霈而覃及蠢類鼓仁風而臻于大和罷柝銷鋒自兹而始臣謬膺重寄䖍守遐藩不獲稱慶瑶墀陳露丹懇仰瞻宸極倍百常情無任代賀除䖍王臣某言中使李國真至奉宣聖旨存問兼賜臣墨詔鴻澤決下大明燭幽曉諭便蕃慰安稠疊中謝臣伏覩天書恭承睿旨弘愛人屈巳之道酌因時適變之宜擇賢王作鎮徐方俾張愔便主留務上則成邦家盤石之固下則副士衆拜章之請戚藩之寄斯重舊勳之祀獲全丕變猖狂之徒咸躋仁壽之域既弘在宥坐見止戈率土人臣孰不欣恱臣素乏方略謬荷寵光猥塵將相之名無施分寸之績遭逢若此報效蔑聞官謗巳興渥刑宜及陛下恩深覆載道務含弘恤公私餽餉之勤念吏士鋒鏑之苦特紆神算昭發德音危疑獲安制宜惟固好生宥過誠陛下開網之仁尸一作有位無功重微臣素餐之責周章局蹐胡顔自安但以遐守藩條恪居官次不獲叩謝雲陛陳露血誠未遂周任知止之言敢逃臧文竊位之咎無任代慰義陽公主薨臣某言伏承義陽公主薨伏惟聖懷傷悼增切伏以公主妍姿令則冠絶天人稟教皇宫巳挺柔嘉之德降嬪卿族益彰貞粹之儀方期作範壼闈長榮邸第豈意遘兹短曆奄謝昌辰伏慮陛下軫念未捐深慈莫遣有虧常膳罷設宫懸臣子之情不任愓戀況聖凡禮異家國制殊伏願道齊殤彭理逹修短割肌膚之愛慰寰海之心率土人臣孰不相慰無任代慰王太尉薨臣某言伏承成德軍節度使太尉兼中書令王武俊今月某日薨殁伏以武俊生逢昌時天授忠節奮揚義勇茂建勳庸秩冠朝端參夑和於台鉉姻連戚里承嘉慶於雲霄榮掩等夷事髙今昔方膺作翰之寄遽迫歸泉之期鼎臣云亡梁木斯壞伏惟陛下君臣義重存殁感深臨冊禭以興懷聽鼓鼙而軫念臣恪居官守奉慰無階悲慟之誠有加常品劉夢得文集卷第十五
