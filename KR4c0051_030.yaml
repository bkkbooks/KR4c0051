front:
  text: 劉夢得文集卷第三十
  hash: sha256:ddeb7d136e78b1fd56a0165ffb5bc69e4ad4fbfd2ef80948cfc31160496dbe38
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_030-1a}
body:
  text: 碑釋門銘記讃附曹溪第六祖碑佛衣銘唐興寺儼公碑第一祖新塔記袁州廣禪師碑夔州移鐵像記華藏丗界圖讃成都新修福成寺記大唐曹溪第六祖大鑒禪師第二碑元和十一年某月日詔書追褒曹溪第六祖能公諡曰大鑒實廣州牧馬總以疏聞繇是可其奏尚道以尊名同歸善善不隔異教一字之褒華夷也懷得其所故也馬公敬其事且謹始以垂後遂咨於文雄今柳州刺史河東柳君為前碑後三年有僧道琳率以其徒由曹溪來且曰願立第二碑學者志也維如來滅後中五百歲而摩騰笁法蘭以經來華人始聞其言猶夫重昏之見䀛爽後五百歲而逹麼以法來華人始傳其心猶夫昧旦之覩白日自逹麼六傳至大鑒如貫意珠有先後而無同異丗之言真宗者所謂頓門初逹麼與佛衣俱來得道傳付以為真印至大鑒置而不傳豈以是為筌蹄耶芻狗耶將人人之莫已若而不若置之耶吾不得而知也按大鑒生新州三十出家四十七年而殁既殁百有六年而諡始自蘄之東山從第五師得授記以歸髙宗使中貴人再徴不奉詔第以言為貢上敬行之銘曰至人之生無有種類同人者形出人者智蠢蠢南裔降生傑異父乾母坤獨肖元氣一言頓悟不踐初地五師相承授以寶器宴坐曹溪丗號南宗學徒爰來如水之東飲以妙藥差其瘖聾詔不能致許為法雄去佛日逺羣言積億著空執有各走其域我立真筌揭起南國無修而修無得而得能使學者還其天識如黑而迷仰見斗極得之自然竟不可傳口傳手付則礙於有留衣空堂得者天授佛衣銘并引吾既為僧琳撰曹溪第二碑且思所以辨六祖置衣不傳之旨作佛衣銘曰佛言不行佛衣乃爭忽近貴逺古今常情尼父之生土無一里夢奠之後履存千祀惟昔有梁如象之狂逹麼救丗來為醫王以言不痊因物乃遷如執符節行乎復關民不知官望車而畏俗不知佛得衣為貴壞色之衣道不在兹由之信道所以為寶六祖未彰其出也微既還狼荒憬俗蚩蚩不有信器衆生曷歸是開便門非止傳衣初必有終傳豈無巳物必歸盡衣乎久恃先終知終用乃不窮我道無朽衣於何有其用巳陳孰非芻狗唐故衡嶽律大師湘潭唐興寺儼公碑佛法在九州間隨其方而化中夏之人汨於榮利莫若妙覺故言禪寂者宗嵩山北方之人鋭以武攝武莫若示現故言神道者宗清涼山南方之人剽而輕制輕莫若威儀故言律藏者宗衡山是三名山為莊嚴國必有逹者與山比崇南嶽律門以律公為上首律之後雲峯證公承之證公之後湘潭儼公承之星月麗天珠璣同貫由其門者為正法焉公號智儼曹氏子丗為郴之右姓兆形在孕母不嗜葷成童在侶獨不嗜戲其夙植因厚者歟生九年樂為僧父不能奪其志抱經笥入􅒖嶁山從名師執業凡進品受具聞經傳印皆當時大長老我入明門不住諸乘我行覺路徑入智地居室方丈名聞大千護法大臣多所賔禮嗣曹王臯之鎮湖南請為人師自是登壇蒞事三十有八載由我得度者萬有餘人人持寶衣解纓珞為禮公色受之謂門弟子曰彼以有相求我我以有為應之凡建寶幢修廢寺飾大像皆極其工應物故也元和十三年九月二十七日中夜具湯沭剃頭頂與門人告別既即寂而視身與色無有壞相嗚呼豈生能全吾真故死不速朽將有願力耶余不得而知也問年八十二問臘六十一葬于寺東北隅傳律弟子中巽道準傳經弟子圎皎貞璨與其徒圎靜丈外惠榮明素存政等欲其師之道光且逺故咨余乞辭乃作長句偈以銘之曰祝融靈山禹所治非夫有道不可止中有毗尼出塵土以律視儼猶孫子登壇人師四十祀南方學徒宗奧旨幼無童心至齯齒識滅形全異凡死長沙湘一作潭西幾五里陶侃故居石頭寺門前一帶湘江水于嗟律虎之名兮與湘流而不巳牛頭山第一祖融大師新塔記初摩訶迦葉授佛心印得其人而傳之至師子比丘凡二十五葉而逹麼得焉東來中華華人奉之為第一祖又三傳至雙峯信公雙峯廣其道而𡵨之一為東山宗能秀寂其後也一為牛頭宗巖持威鶴林經山其後也分慈氏之一支為如來之別子咸有祖稱粲然貫珠大師號法融姓韋氏延陵人少為儒博極羣書既而歎曰此仁誼言爾吾志求出丗間法遂入句曲依僧炅改逢掖而緇之徙居是山宴坐石室以慧力感通故旱麓泉涌以神功示現故皓雪蓮生巨蛇摧伏羣鹿聽法貞觀中雙峯過江望牛頭頓錫曰此山有道氣宜有得之者乃來果與大師相遇性合神授至于無言同躋智地密付真印揭立江左名聞九圍學徒百千如水歸海由其門而為天人師者皆脈分焉顯慶二年報身示滅道在後覺神依故山戒香不絶龕坐未飾夫豈不思乎蓋神期冥數必有所待大和三年潤州牧浙江西道觀察使檢校禮部尚書趙郡李公在鎮三閏百為大備尚理信古儒玄交修始下令禁桑門歸佛以眩人者而於真實相深逹焉常謂大師像設宜從夲教言自我啓因自我成乃召主吏籍我月入得緡錢二十萬俾秣陵令如符經營之三月甲子新塔成事嚴而工人盡藝誠逹而山神來護願力既從衆心知歸撞鍾告白龍象大會諸天聲香之藴如見如聞即相生敬明幽同感尚書欲傳信于後逺命愚志之夫上士解空而離相中士著空而嫉有不因相何以示覺不由有何以悟無彼逹真諦而得中道者當知為而不有賢乎以不修為無為也袁州萍鄉縣楊𡵨山故廣禪師碑天生人而不能使情欲有節君牧人而不能去威勢以理至有乘天工之隙以輔其化釋王者之位以遷其人則素王立中區之教懋建大中慈氏起西方之教習登正覺至哉乾坤定位而聖人之道參行乎其中亦猶水火異氣成味也同德輪轅異象致逺也同功然則儒以中道御羣生罕言性命故以丗衰而䆮息佛而大悲救諸苦廣啓因業故劫濁而益尊自白馬東來而人知像教佛衣始傳而人知心法弘以權實示其攝修味真實者即清淨以觀空存相好者怖威神而遷善厚於求者植因以覬福罹於苦者證業以銷冤革盜心於冥昧之間泯愛緣於死生之際隂助教化總持人天所謂生成之外别有陶冶刑政不及曲為調揉其方可言其旨不可得而言也惟四海之大羣倫之富必有以得其門而會其宗者為丗導師焉禪師諱乘廣其生容州姓張氏七歲尚儒以俎豆為戲十三慕道遵壞削之儀至衡陽依天柱想公以啓初地至洛陽依荷澤會公以契真乘洪鍾藴聲扣之斯應陽燧合熖晞之乃明始由見性終得自在常謂機有淺深法無髙下分二宗者衆生存頓漸之見説三乘者如來開方便之門名自外得故生分别道由內證則無異同遂以攝化為心經行不倦愍彼南裔不聞佛經由是結廬此山心與境寂應念以起教隨方而立因居涉旬而善根者知歸逮周月而帶縛者漸悟以月倍日以年倍時瘖懞恫開荒憬潛革邑中長者十方善衆咸發信願大其藩垣法堂四阿股引僧舍身心恆寂象馬交馳隨其去來皆得利益踰嶺之北涉湘而南仰兹髙山知道有所在此地緣盡􅊀然化俱神歸佛境悲結人丗自趺坐而滅至于茶毗三百有六旬矣爪髮加長容澤差衰真子號呼圍繞薪火得舍利如珠璣者數百十焉於戲肖圎方之形故寂滅以示盡入菩提之位故殊相以現虛猶鳯毛成字麟角生肉必有以異不知其然於是服勤聞法之上首曰甄升乃率其徒圎寂道弘如亮如海等相與校徒具役建塔于禪室之右端從衆也初廣公始生之辰歲在丁巳當玄宗之中元生三十而受具更臘五十二而終終之夕歲直戊寅當德宗之後元三月既望之又十日也後九年其門人還源以為崇塔以存神與建銘以垂休皆憑像寄懷不可以闕一謬謂余為習於文者故繭足千里以誠相攻大懼其先師德音與時䆮逺且曰白月中黑東川無還揚于金石傳信百劫彼墮淚之感豈儒家者流專之敬酬斯言銘示真俗曰如來説法遍一作普滿大千得勝義者強名為禪至道不二至言無辨心法東行羣迷丕變七葉無嗣四魔潛扇佛衣生塵佛法如線吾師覺者冥極道樞承受密印端如貫珠一室寥然髙山之隅為法來者百千人俱裔民蚩蚩戶有犀磲攝以方便家藏佛書願力既普度門斯盛合為一乘散為萬行即動求靜故能常定絶緣離覺乃得究竟生非我樂死非我病現滅者身常圎者性夲無言説付囑其誰等空無礙後覺得之像閟虛塔迹留仁祠十方四輩瞻禮於斯夔州始興寺移鐵像記佛薪盡于乾笁而像教東行是法平等故所至為淨土是身應供故隨念如降生先是魚復人有以利金為珍勒像者重千鈞睟容端相人天兩足鳬氏卒事而他工未備故寓于西偏不知其幾年矣寺僧法照瞻禮發信赤肩白足入諸大城乃至聚落無空過者積十餘年得信財無量繇是購工以嘗巧募徒而畢力四輩增增工麾以肱中樞外脈隂轉陽動欻如地踴岌如山行大匠無言尊容嚮明青蓮承趺金獸捧持藻井花鬘蔥籠四垂邑人瞻拜如佛出丗法照以願力能就泣于佛前因持片石乞詞以示後按此寺始於宇文周初瀕江埤庳皇唐神龍中為水所壞有波那賴耶國僧廣照浮海而至頓錫不去遂移於今道場所山曰磨刀嶺曰虎岡其經始與克修一作備皆蕃僧是力後之有志者豈無人哉法照夔人姓穆氏年十有五出家依江陵名僧受具肇自貞元二十年甲申歸此寺願崇建有為凡修大殿立菩薩大弟子侍佛左右逮長慶癸卯有成其善植德夲者歟毗盧遮那佛華藏丗界圖讃佛説華嚴經真人妙覺不由諸乘非大圎智不能信解德宗朝有龍象觀公能於是經了第一義居上都雲華寺名聞十方沙門嗣肇是其上足以經中九會纂成華藏圖俾人瞻禮即色生敬因請余讃之即説讃曰清淨不染花中蓮捧持丗界百億千踴出香海浩無邊風輪負之晝夜旋大雄九會化諸天釋梵八部來森然從昏至覺不依緣初初極極性自圎寫之綃素色相全是色非色言非言成都府新修福成寺記益城右門銜大逵坦然西馳曰石笋街街之北有仁祠形焉直啓曰福成寺寺之殿臺與城之樓交錯相輝繡於碧霄望之如崑閬間物大和四年蜀帥非將材不修邉備南詔君長諜得內空乘隙坌入鬪於城下或縱火以駭衆此寺乃焚高門修廊委為寒燼如是者再歲帝念坤維丞相復來山川如迎父老相識環視故地寺為燋墟載興起廢之歎爰有植因之願乃命主俸吏以吾緡錢三十萬為經營之基自公來思蜀號無事時康歲稔人樂檀施公言既先應如決川乃傾囊楮乃出懷袖勝因化愚慧力攝慳男奔女驟急於徴令匠者度材以指衆徒藝者運思以役衆技斤鋸磨礱丁丁登登陶者儲精圬者效能欻自火宅復為金繩治故鼎新因毁成妍華夷縱觀萬目同聳既告訖役公來慶成雲鮮日潤輝映前後於是都人舞抃而謡曰昔公去此福成以燬今公重還福成復完民安軍治亦如此寺庸可勿紀乎公實聞斯言遂折簡見命謹月而日之時大和某年某月日大檀越具官封爵段氏其他發大願者程功董事者自中貴人及賔寮將吏若僧徒偕籍之而刻於石劉夢得文集卷第三十
