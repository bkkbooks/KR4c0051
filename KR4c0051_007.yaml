front:
  text: 劉夢得文集卷第七
  hash: sha256:c92be1538e16b64670650ec21b7b7c48f617ac949994508140e7631f9e7ab65b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_007-1a}
body:
  text: 送僧詩別君素上人送深法師答宣廣上人送僧仲剬送僧元皓送如智法師贈讚頭陀送慧則法師過鴻舉法師重送鴻舉送僧方及贈日夲僧贈眼醫僧別浩初師觀碁歌送儇師贈別約師送鴻舉師送宵韻上人送義舟師送景玄師送元曉上人送惟良上人送元簡上人送宗密上人贈別君素上人并引曩豫習禮之中庸至不勉而中不思而得􅋏然知聖人之德學以至于無學然而斯言也猶示行者以室廬之奧爾求其徑術而布武未易得也晚讀佛書見大雄念物之普級寶山而梯之髙揭慧火巧鎔惡見廣踈便門旁束邪徑其所證入如舟㳂川未始念於前而日逺矣夫何勉而思之邪是余知穾音窈奧於中庸啓鍵關於內典㑹而歸之猶初心也不知余者誚豫因而後援佛謂道有二焉夫悟不因人在心而巳其證也猶喑人之享大牢信知其味而不能形於言以聞去于耳也口耳之閒兼寸耳尚不可使聞他人之不吾知宜矣開士君素偶得豫於所親一麻拪草千里來訪素以道眼視豫豫以所視視之不由陛級攜手智地居數日告有得而行乃為詩以見志云窮巷唯秋草髙僧獨扣門相歡如舊識問法到無言水為風生浪珠非塵可昏去來皆是道此別不銷魂送深法師遊南嶽上人夲住資聖寺師在白雲鄉名登善法堂十方傳句偈八部㑹壇場飛錫無定所寶書留舊房唯應銜草鴈相送至衡陽廣宣上人寄在蜀與韋令公唱和詩卷因以令公手札答詩相示碧雲佳句久傳芳曾向成都住草堂振錫常過長者宅披文猶帶令公香一時風景添詩思八部人天入道場若許相期同結社吾家夲自有柴桑送僧仲剬東遊兼寄呈靈徹上人釋子道成神氣間住持曾上清涼山晴空禮拜見真像金毛五髻卿雲閒西遊長安隸僧籍夲寺門前曲江碧松閒白月照寶書竹下香泉灑瑶席前時學得經論成奔馳象馬開禪扄髙筵談柄一麾拂講下聽徒如醉醒舊聞南方多長老次第來入荆門道荆州夲自重彌天南朝塔廟猶依然宴坐東陽枯樹下經行居此故臺邊忽憶遺民社中客為我衡陽駐飛錫講罷同尋相鶴經間來共蠟登山屐一旦揚眉望沃洲自言王謝與同遊憑將雜擬三十首寄與江南湯慧休送僧元皓南遊并引豫策名二十年百慮而無一得然後知世所謂道無非畏途唯出世閒法可盡心爾繇是在硯席者多旁行山岡反四句之書備將迎者皆赤髭白足之侣深入智地靜通還源客塵觀盡妙氣來宅內視胸中猶煎鍊然開士元皓姓陶氏夲丹陽居家世有人爵不藉其資於毗尼禪郍極細牢之義於中後日習揔持之門妙音奮迅願力昭答雅聞豫事佛而佞亟來相從或問師隳形之自對曰少失怙恃推棘心以求上乘積四十年餘羸老將至而不懈始悲浚泉之有洌今痛防墓之未遷塗芻莫備薪火恐滅諸相皆離此心長懸雖萬姓歸佛盡為釋種如河入海無復水名然具一切智者豈遺百行求無量義者寧容斷思今聞南諸侯雅多大士思扣以苦調而希其末光無容至前有足悲者豫聞是說巳力不足而悲有餘因為詩以送之庶乎踐霜露者聆之有惻云寶書翻譯學初成振錫如飛白足輕彭澤因家凡幾世靈山預㑹是前生傳燈巳悟無為理濡露猶懷罔極情從此多逢大居士何人不願解珠瓔送如智法師遊辰州兼寄許評事前日過蕭寺看師上講筵都人禮白足施者散金錢方便無非教經行不廢禪還知習居士發論待彌天贈長沙讚頭陀外道邪山千萬重真言一發盡摧峯有時明月無人夜獨向昭潭制惡龍送慧則法師歸上都因呈廣宣上人并引師精淨名經佛示滅後大弟子演聖言而成經傳心印曰法承法而能專曰宗由宗而分教曰支坐而攝化者勝義皆空之宗也行而宣教者摧破邪山之友也釋子慧則生於像季思濟劫濁乃學于一支開彼羣迷以為盡妙理者莫如法門變凡夫者莫如佛土悟無染者莫如散花故業于淨名深逹實相自京師涉漢沔歷鄢郢登熊湘聽徒百千耳感心化法無住道行而歸顧豫有社內之因故言別之日愛緣瞥起時也秋盡詠江淹雜擬以送之前見宣上人為我多謝昨日東林看講時都人象馬踏琉璃雪山童子應前世金粟如來是夲師一錫言歸九城路三衣曾拂萬年枝休公久別如相問楚客逢秋心更悲秋日過鴻舉法師院便送歸江陵并引梵言沙門猶華言去欲也能離欲則方寸地虛虛而萬景入入必有所泄乃形乎詞詞妙而深者必依於聲律故自近古而降釋子以詩聞于世者相踵焉因定而得境故修然以清由慧而遣詞故粹然以麗信禪林之花萼而誡河之珠璣爾初鴻舉學詩於荆郢閒私試切切詠發餘習蓋榛楛之翠羽弋者未之盼焉今年至武陵二千石始竒之有起豫之歎以方袍親絳紗者十有餘旬繇是名稍聞而藝愈變閠八月余步出城東門謁仁祠而鴻舉在焉與之言移時因告以將去且曰貧道雅聞東諸侯之工為詩者莫若武陵今幸承其話言如得法印寶山之下宜有所持豈徒衣裓之中衆花而巳余聞是說乃叩商而吟成一章章八句郡守以坐嘯餘詠激清徴而應之師其行乎足以資一時之學矣看畫長廊遍尋僧一徑幽小池兼鶴淨古木帶蟬秋客至茶煙起禽歸講席收浮杯明日去相望水悠悠重送鴻舉赴江陵謁馬逢侍御西北秋風凋蕙蘭洞庭波上碧雲寒茂陵才子江陵住乞取新詩合掌看送僧方及南謁柳貟外并引九江僧方及既出家依匡山一時中頗屬詩以攄思古詩人暨今號為能賦有輒求其詞吟呻之拳拳然多多益嗜願不出山者十年嘗登最髙峯四望天海沖然有逺遊之志頓錫而言曰神馳而形閡者方內之徒及吾無方閡於何者繇是耳得必目探之意行必身隨之雲遊鳥屳靈筵反無迹而逺豫為連州居無何而方及至出裓中詩一篇以貺豫視其詞甚富留一歲觀其行潔矩如教益多之一旦以行日來告且曰雅聞鳥咮之下有賢諸侯願躋其門如蹈十地敢乞詞以抵之豫唯然而賦顧其有重請之色起於顔閒爾昔事廬山逺精舍虎溪東朝陽照瀑水樓閣虹霓中騁望羡遊雲振衣若秋蓬舊房閉松月逺思吟江風古寺歷頭陀竒峯攀祝融南登小桂嶺却望歸塞鴻衣裓貯文章自言學雕蟲槍榆念凌厲覆簣圖穹崇逺郡多暇日有時訪禪宫石門聳峭絶竹院含空濛幽響滴巖溜晴芳飄野叢海雲懸颶母山果屬狙公忽憶吳興郡白蘋正葱蘢願言挹風彩邈若窺華嵩桂水夏瀾急火山宵熖紅三衣濡菵露一錫飛煙空勿謂翻譯徒不為文雅雄古來賞音者樵爨得孤桐按狙公宜斥賦茅者而越絶書有猿公張衡賦吳都有猿父哀吟之句古文士又云權父由是而言謂猿為父舊矣贈日夲僧智藏深杯萬里過滄溟遍禮名山適性靈深夜降龍潭水黑新秋放鶴野田青身無彼我那懷土心㑹真如不讀經為問中華學道者幾人雄猛得寧馨贈眼醫婆羅門僧三秋傷望逺終日泣途窮兩目今先暗中年巳老翁看朱漸成碧羞日不禁風師有金箆術如何為發矇海陽湖別浩初師并引瀟湘閒無土山無濁水民乘是氣往往清慧而文長沙人浩初生既因地而清矣故去葷洗慮剔顚毛而壞其衣居一都之殷易與士㑹得執外教盡捐苛禮自公侯守相必賜其清問耳目灌注習浮於性而里中兒賢適與浩初比者嬰冠帶豢妻子吏得以乘凌之汩沒天慧不得自奮莫可望浩初之清光於侯門上坐第自吟羡而巳浩初益自多其術尤勇於近逹者而歸之往年之臨賀唁侍郎楊公留歲餘公遺以七言詩手筆于素前年省柳儀曹于龍城又為賦三篇皆章書今復來連山以前所得雙南金出於裓亟請余賡之按師為詩頗清而奕棊至第三品二道皆足以取幸於士大夫宜薰餘習以深入也㑹吳郡以山水冠世海陽又以竒甲一州師慕道於泉石宜為篤故攜之以嬉及言旋復引與共載於湖上奕於樹石閒以植沃州之因緣且賦詩具道其事近郭有殊境獨遊常鮮歡逢君駐緇錫觀貌稱林巒湖滿景方霽野香春未闌愛泉移席近聞石輟碁看風止松猶韻花繁露未乾橋形出樹曲巖影落池寒湖東架險凡四橋山下出泉逗嵒為池泓澄可愛者不可遍舉故狀其境以貽好事別路千嶂裏詩情暮雲端他年買山處似此則隳官觀碁歌送儇師西遊長沙男子東林師間讀藝經工奕棊有時凝思如入定暗覆一局誰能知今年訪余來小桂方袍袖中貯新勢山城無事秋日長白晝懵懵眠匡牀因君臨局看鬪智不覺遲景沈西牆自從山人遇樵子直到開元王長史前身後身付餘習百變千化無窮巳初疑磊落曙天星次見搏擊三秋兵鴈行布陳衆未曉虎穴得子人皆驚行盡三湘不逢敵終日饒人損機格自言臺閣有知音悠然逺起西遊心商山夏木隂寂寂好處徘徊駐飛錫忽思爭道畫平沙獨笑無言心有適藹藹京城在九天貴遊豪士足華筵此時一行出人意賭取聲名不要錢贈別約師并引荆州人文約市井生而雲鶴性故去葷為浮圖生悟而證入南抵六祖始生之墟得遺教甚悉今年訪余于連州且曰貧道昔浮湘川㑹柳儀曹謫零陵宅于佛寺幸聮棟而居者有年繇是時人大士得落耳界夫聞為見因今日之來曩時之因爾今儀曹牧柳州與八句贈別師逢吳興守相伴住禪扄春雨同栽樹秋燈對講經廬山曾結社桂水逺揚舲話舊還惆悵天南望柳星送鴻舉師遊江西并引始余謫朗州爾時是師振麻衣裴然而前持文篇以為僧贄唧唧而清如蟲吟秋自然之響無有假合有足佳者故為賦三章以聲之距今年遇于建平赤髭益蕃文思益深而內外學益富既訊巳探裓中出前所與詩閲之𥿄勞墨瘁與我同容因思夫苒苒之光渾渾之輪時而言有初中後之分日而言有今昨明之稱身而言有幼壯艾之期至乃一謦咳一彈指中際皆具何必求三生以異身邪然而視豫之文昔與今有筵楹之別視豫之書昔與今有鈞石之相懸視豫之仕昔與今唯阿之差爾豈有工拙之數存乎其閒哉蓋可勉而進者與日月而至矣彼儻來外物雖日月無能至焉是歲師告豫遊江西復為賦七言以為遊地爾禪客學禪兼學文出山初似無心雲從風卷舒來處處繚繞巴山不得去山州古寺好間居讀盡龍王宫裏書使君灘頭揀石硯白帝城邊尋野𬞞忽然登髙心瞥起又欲浮杯信流水煙波浩渺魚鳥情東去三千二百里荆門峽斷無盤渦湘平漢闊清光多廬山霧開見瀑布江西月淨聞漁歌鍾陵八郡多名守半是西方社中友與師相見便談空想得髙齊師子吼送宵韻上人遊天台曲江僧向松江見又道天台看石橋鶴戀故巢雲戀岫比君猶自不逍遙送義舟師却還黔南并引黔之鄉在秦楚為爭地近世人多過言其幽荒以談笑閒者又從而張皇之猶夫束藴逐原燎或近乎語祅適有沙門義舟道黔江而來能畫地為山川及條其風俗纎悉可信且曰貧道以一錫遊他方衆矣至黔而不知其逺始遇前節使而聞今節度益賢而文故其佐多才士摩圍之下曵𥚑秉筆彬然與兔園同風貧僧以外學嗜篇章時或攝衣為末坐客其來也約主人乘秋風而還今乞詞以揚之如捧意珠行住坐卧知相好爾豫曰唯命筆以為七言以應之黔江秋水浸雲霓獨泛慈航路不迷猿狖窺齊林葉動蛟龍聞呪浪花低如蓮半偈心常悟聞菊新詩手自攜常說摩圍似靈鷲却將山屐上丹梯送景玄師東歸并引廬山僧景玄袖詩一軸來謁往往有句輕而遒如鶴雛襹褷未有六翮而步舒視逺戞然一唳乃非泥滓閒物獻詩已斂裓而辭且曰其來也與故山秋為期夫所者僧事也今無他請唯文是求故賦一篇以代瓔珞爾東林寺裏一沙彌心愛當時才豫詩山下偶隨流水出秋來却赴白雲期灘頭躡屐挑沙菜路上停舟讀古碑想到舊房拋錫杖小松應有過簷枝送元曉上人歸稽亭重疊稽亭路山僧歸獨行逺峯斜日影夲寺舊鍾聲徒侣問新事煙雲含別情應誇乞食處踏遍鳯凰城送惟良上人并引以貌窺天者曰乾然而健于然而髙以數逆天者曰其用四十有九天果以有形而不能脫乎數立象以推策既成而遺之古所謂神交造物者非空言爾軒皇受天命其佐皆聖人故得之惟唐繼天德如黃帝有外臣一行亦聖之徒與刋曆考元書成化去今丹徒人惟良生而能知非自外來以乾坤之策當十朞之數凝神運指上感躔次視玄黃溟涬無倪有常絶機泯知獨以神㑹數起於復之初九音生乎黃鍾之宫積微夲隱與言化合夫天人之數極而含變變而靡不通神趨鬼懾不足駭也惟良得一行之道故亦慕其為外臣謬謂余為世閒聰明孑孑來訪初以說合至于不言言息而理冥復申之以嗟嘆曰師其庶幾乎信神與之而不能測神之所以付信術通之而不能知術之所以至淺哉余聞乎曾井蛙䤈雞之不若也長慶四年冬十一月甲子語至夜艾遂為詩以志焉髙齊灑寒水是夕山僧至玄牝無關鎖瓊書捨文字燈明香滿室月午霜凝地語到不言時世閒人盡睡送元簡上人適越孤雲出岫夲無依勝景名山即是歸久向吳門遊好寺還思越水洗塵機浙江濤驚師子吼稽嶺峯疑靈鷲飛更入天台石橋路垂珠璀璨拂三衣送宗密上人歸南山草堂寺因詣河南尹白侍郎宿習修來得慧根多聞第一却忘言自從七祖傳心印不要三乘入便門東泛滄江尋古跡西歸紫閣出塵喧河南白尹大檀越好把真經相對翻劉夢得文集卷第七劉夢得外集卷第七律詩霜夜對月𫐠夢喜徑松成隂伊川卜居憶江南禊事秋日見寄吐綬鳥詞和逰房太尉西湖和重題聞琴絶句和李尚書示詩傷韋令孔雀酬喜歸鄉國喜見初月和望山居即事和平泉新墅柳柳州贈家雞答前篇答後篇酬柳柳州贈別重別三贈題淳于髠墓懷妓登清輝樓省試風光草際浮喜再遇毛仙翁和淅西李大夫霜夜對月聽小童吹觱篥歌依夲韻海門雙青暮煙歇萬頃金波踴明月侯家小兒能觱篥對此清光天性發長江凝練樹無風瀏栗一聲霄漢中涵胡畫角怨邊草蕭瑟清蟬吟野叢冲融頓挫心使指雄吼如風轉如水思婦多情珠淚垂仙禽欲舞雙翅起郡人寂聽衣滿霜江城月斜樓影長才驚指下繁韻息巳見樹杪明星光謝公髙齊吟激楚戀闕心同在羈旅一奏荆人白雪歌如聞雒客扶風塢吳門水驛接山隂文字殷勤寄意深欲識陽陶能絶處少年榮貴道傷心浙西李大夫述夢四十韻并浙東元相公酬和斐然繼聲位是才能取時因際會遭羽儀呈鸑鷟鋩刃試豪曹洛下推年少山東許地髙門承金鉉鼎家有玉璜韜吕仍嗣侯海浪扶鵬翅天風引驥髦便知蓬閣閟不識魯衣褒興發春塘草魂交益部刀形開猶抱膝燭盡遽揮毫昔仕當初筮逢時詠載櫜懷鉛辨蟲蠧染素學鵝毛車騎方休汝歸來欲效陶大夫罷太原從事歸京師南臺資謇諤內署選風騷羽化如乘鯉樓居舊冠鼇美香焚濕麝名果賜乾萄議赦蠅棲筆邀歌蟻泛醪代言無所戲謝表自稱叨蘭熖凝芳澤芝泥瑩玉膏對頻聲價出直久夢魂勞草詔令歸馬封章合獻獒幽冀歸闕西戎乞盟事並具注前銀花懸院榜翠羽映廉絛諷諫欣然納竒觚率爾操禁中時諤諤天下免忉忉左顧龜成印雙飛鵠織袍謝賔緣地密潔巳是心豪五日思歸沐三春羡衆遨茶爐依緑筍棊局就紅桃溟海桑潛變隂陽炭暗熬仙成脫屣去臣戀捧弓號建節辭烏桓宣風看鷺濤土山京口峻䥫瓮郡城牢舊說潤州城如鐵瓮事見韓浣南征記曲島花千樹官池水一篙鶯來和絲管鴈起拂麾旄宛轉傾羅扇回旋墮玉搔罰籌長豎纛觥盞㨾如舠山是千里障江為四面濠卧龍曽得雨浙東孤鶴尚鳴臯浙西劒用雄開匣二公弓間蟄受韜自謂鳳姿嘗在竹二公鷃羽不離蒿自謂吳越分雙鎮東西接萬艘今朝比潘陸江海更滔滔和浙西李大夫晚下北固山喜徑松成隂悵然懷古偶題臨江亭并浙東元相公所和依夲韻一辭溫室樹幾見武昌柳荀謝年何少韋平望巳久種松夾石道紆組臨沙阜目覽帝王州心存股肱守葉動驚綵翰波澄見頳首晉宋齊梁都千山萬江口煙散惰宮出濤來海門吼風俗太伯餘衣冠永嘉後江長天作限山固壤無朽自古稱佳麗非賢誰奄有八元邦族盛萬石門風􅌋天桂揭東溟文星照北斗髙亭一騁望舉酒共為壽因賦詠懷詩逺寄同心友禁中晨夜直江左東西偶筆手握兵符儒腰盤貴綬頒條風有自立事言無苟農野聞讓耕軍人不使酒用材當構厦知道寧窺牖誰為青雲髙鵬飛終背負和淅西李大夫伊川卜居早入八元數嘗承三接恩飛鳴天上路鎮壓海西門清望寰中許髙情物外存時來誠不讓歸去每形言洛下思招隱江干厭作藩按經修道具依樣買山村馬髙堂為御史大夫將置宅命畫工圖其狀戒所使曰依此樣求之開鑿隨人化幽隂為律暄逺移難得樹立變舊荒園絶塞通濳徑平泉占上源煙霞遙在想簿領益為繁丹禁虛東閣蒼生望北轅徒令雙白鶴五里自翩翻和滑州李尚書上巳憶江南禊事白馬津頭春日遲沙州歸鴈拂旌旗柳營唯有軍中戲不似江南三月時酬滑州李尚書秋日見寄一入石渠署三聞宮樹蟬丹霄未得路白髮又添年雙節外臺貴洞簫中禁傳徴黃在旦夕早晚發南燕吐綬鳥詞并序滑州牧尚書李公以吐綬鳥詞見示兼命繼聲蓋尚書前為御史時所作有翰林二學士同賦之今所謂追和也鳥之所異具于首篇越山有鳥翔廖廓嗉中天綬光若若越人偶見而竒之因名吐綬江南知四明天姥神仙地朱鳥星精鍾異氣赤玉雕成彪炳毛紅綃剪出玲瓏翅湖煙始開山日髙迎風吐綬盤花絛臨波似染瑘瑘草映葉疑開阿母桃花紅草緑人閒事未若靈禽自然貴鶴吐明珠暫報恩鵲銜金印空為瑞春和秋霽野花開玩景尋芳處處來翠幕雕籠非所慕珠丸柘彈莫相猜棲月啼煙凌縹眇髙林先見金霞曉三山仙路寄遙情刷羽揚翹欲上征不學碧雞依井絡願隨靑鳥向層城太液池中有黃鵠憐君長在瑶枝一作長向瑶枝宿如何一借羊角風來聽簫韶九成曲和西川李尚書漢州微月遊房太尉西湖木落漢川夜西湖懸玉鈎旌旗環水次舟楫泛中流目極想前事神交如共遊瑶琴久巳絶松韻自悲秋和重題林端落照盡湖上逺風清水謝芝蘭室仙舟魚鳥情人琴久寂寞煙月若平生一泛釣璜處再吟鏘玉聲和遊房公舊竹亭聞琴絶句尚有竹閒路永無綦下塵一聞流水曲重憶食霞人西川李尚書知愚與元武昌有舊逺示二篇吟之泫然因以繼和二首來詩云元公令陳從事求蜀琴將以為寄而武昌之訃聞因陳生㑹葬如何贈琴日巳是絶絃時無復雙金報空餘掛劒悲寶匣從此間朱絃誰復調秖應隨玉樹同向土中銷和西川李尚書傷韋令孔雀及薛濤之什玉兒巳逐金環葬翠羽先隨秋草萎唯見芙蓉含曉露數行紅泪滴清池後魏元樹南陽王禧之子南奔到建業數年後比歸愛姬朱王兒脫金指鐶為贈樹至魏却以指鐶寄玉兒示有還意酬李相公歸鄉國自鞏縣夜泛洛水見寄鞏樹煙月上清光含碧流且無三已色猶泛五湖舟鵬息風還起鳳歸林正秋雖攀小山桂此地不淹留和李相公平泉潭上喜見初月家山見初月林壑悄無塵幽境此何夕清光如為人潭空破鏡入風動翠娥顰㑹向瑣窗望追思伊洛濵和李相公初歸平泉過龍門南嶺遙望山居即事暫別明庭去初隨優詔還曽為鵩鳥賦喜過鑿龍山新墅煙火起野程泉石間巖廊人望在只得片時間和李相公以平泉新墅獲方外之名因為詩以報洛中士君子兼見寄之什業繼韋平後家依崑閬閒恩華辭北第蕭灑愛東山滿室圖書在入門松菊間垂天雖暫息一舉出人寰酬柳柳州家雞之贈日日臨池弄小雛還思寫論付官奴柳家新㨾元和腳且盡薑牙斂手徒答前篇小兒弄筆不能嗔涴壁書窗且賞勤聞彼夢熊猶未兆女中誰是衛夫人答後篇昔日慵工記姓名逺勞辛苦寫西京近來漸有臨池興為報元常欲抗行再授連州至衡陽酬柳柳州贈別去國十年同赴召渡湘千里又分歧重臨事異黃丞相三黜名慙柳士師歸目併隨回鴈盡愁腸正遇斷猿時桂江東過連山下相望長吟有所思重別二十年來萬事同今朝歧路忽西東皇恩若許歸田去歲晚當為鄰舍翁三贈信書誠自誤經事漸知非今日臨湘別何年得汝歸題淳于髠墓生為齊贅壻死作楚先賢應以客鄉葬故臨官道邊寓言夲多興放意能合權我有一石酒置君墳樹前懷妓四首玉叉重合兩無緣魚在深潭鶴在天得意紫鸞休舞鏡能言青鳥罷銜箋金盆巳覆難收水玉軫長拋不續絃若向䕷蕪山下過遙將紅泪灑窮泉鸞飛逺樹栖何處鳳得新巢巳去心紅壁尚留香漠漠碧雲初斷信沈沈情知點汚投泥玉猶自經營買笑金從此山頭似人石丈夫形狀淚痕深人曽行處遍尋看雖是生離死一般買笑樹邊花巳老畫眉窗下月猶殘雲藏巫峽音容斷路隔星橋過往難莫怪詩成無淚滴盡傾東海也須乾三山不見海沈沈豈有仙蹤更可尋青鳥去時雲路斷姮娥歸處月宫深紗窗遙想春相憶書幌誰憐夜獨吟料得夜來天上鏡只應偏照兩人心登清輝樓逸前四句在江州潯陽江色潮添滿彭蠡秋聲鴈送來南望廬山千萬仞共誇新出棟梁材省試風光草際浮熙熙春景霽草緑春光麗的皪亂相鮮葳蕤互虧蔽乍疑芊綿裏稍動䒠茸際影碎翻崇蘭浮香轉叢蕙含煙絢碧綵帶露如珠綴幸因採掇曰況此臨芳歲赴和州於武昌縣再遇毛仙翁十八兄因成一絶武昌山下蜀江東重向仙舟見葛洪又得案前親禮拜大羅天訣玉函封劉夢得外集卷第七
