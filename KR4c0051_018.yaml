front:
  text: 劉夢得文集卷第十八
  hash: sha256:b35eb8df0a2785feb98a7254e4e41beb50442c2aece1820198a4a08bba0f8c59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_018-1a}
body:
  text: 表代竇中丞謝上謝中使送至郡賀收蔡州賀赦賀䇿皇太子慰國哀賀龍飛賀冊太皇太后賀冊皇太后和州謝上賀改元赦夔州論利害夔州謝上賀雪鎮州賀平淄青代竇中丞謝上羣時在朗州相逢因以見託臣某言伏奉某月日制受臣容州刺史充夲管經略招討等使伏以道途遐阻水陸縈紆臣以今月日到夲任上訖謹宣聖旨慰諭逺人中謝臣夲書生素無吏術頃因多幸賁自丘園纍沭聖慈驟居清貫識昧通變動乖事宜愧無善狀以塞公責伏惟睿聖文武皇帝陛下凝旒清穆洞照寰海恕臣夲性朴愚賜以恩輝𬒳於廢弃逺辭偏郡重委方隅捧印綬而為榮望闕庭而增戀雖到官之始惠未及人而率下之人誠務先克己凡施政教皆稟詔條參以土宜遂其物性可行必守有弊必除便蠻夷生梗之風慕臣子盡忠之道力誠不足心實在兹謝中使送至郡臣某言中使吐突仕曉至奉宣聖旨慰諭并送臣至夲任者徐山逺郡忽降王人跪受恩榮仰瞻宸極中謝伏以發自巴峽至于南荒涉水陸湍險之途當炎夏鬱蒸之候山川縈轉晨夜奔馳幸無他疾得至夲管九重結戀遙傾捧日之心萬里獲安皆荷自天之祐賀收蔡州臣某言伏見詔書以唐州節度使李訴生擒逆賊吳元濟獻俘文武百寮於興安門列班稱賀者天威逺被元惡就誅一方既平萬國咸慶中賀伏惟睿聖文武皇帝陛下德超邃古道合上玄臨御巳來天人協贊削平吳蜀掃蕩塞垣車書大同夷狄來貢蕞爾元濟敢懷野心輒聚犬羊茍偷時月陛下聖謨獨運睿感潛通天助神兵人生勇氣既擒凶逆遂正刑書伏三紀之逋誅誠九衢之壯觀宗社昭告華夏式瞻行弔伐而在禮無違但威聲而何城不剋楚氣改色淮水安流漢上成人盡霑雨露汝南遺老重覩升平凡在具臣孰不欣抃臣久辭朝列恭守遐藩不獲稱慶闕庭陳露丹慊仰瞻宸極倍萬羣品賀赦二首臣伏奉今月一日制書大赦天下者聖德廣運浹于華夷天光下臨照彼幽蟄中謝伏惟睿聖文武皇帝陛下神扶寶祚天􅐌鴻猷意有所之事無不剋當淮右凱旋之後是城中慶幸之時順陽和以發生施霈澤於寰海網開三靣危疑者許以自新德逹四聰瑕纍者期於録用求碩畫於庶位慮遺材於放臣旌忠烈之家賞勳庸之胤仁及枯骨無隔於寇戎榮加顯親普霑於存殁恤刑巳責實廩蠲徭頒錫彰有客之詩崇儒協宗子之望嶽瀆咸祑耆艾飲和大僚承任子之恩武旅荷賜金之寵斯皆禹湯文武之遺美髙祖太常之耿光集于聖朝然後大備德音所至和氣隨之歡謡上徹於九天福祚永延於億載能使逺夷屈膝豈唯小醜革心率土人臣不勝大慶臣久辭闕下恪守海隅犬馬之誠倍百常品又臣某言伏見今月三日制書大赦天下者大明初升萬物咸覩渙汗一發神人以和中謝伏惟皇帝陛下天資睿聖神啓聖期端拱受萬國之朝承顔奉兩宫之慶初副大位克揚孝心三光協明和氣來應臣伏讀赦令首於奉園陵盡誠敬親九族蘇兆人次及定章程止進獻巳逋責滌夙瑕內照于九重則歸嬪嬙放鷹犬外明于四目則求隱士開直聲柔逺以仁則還其係虜賞近以禮則澤及後昆菲食遵夏禹之規弋綈法漢文之儉墜典咸舉舊章再明升平之期正在今日發號之始疾於春風殊私所及霈若時雨臣幸逢昌運歷事五朝出守遐藩僅垂二紀欣承雷雨作解之澤不勝犬馬懷戀之誠瞻望帝鄉無任屏營賀冊皇太子臣某言伏見冊皇太子盛禮斯畢德音遐宣萬國以貞庶類咸恱中謝伏惟文武孝德皇帝陛下體元立極垂訓御時既闡王猷思安國夲前星位定拱宸極以昭彰蒼震氣宣與天地而長久禮光匕鬯澤被華夷宗祏有無疆之休生靈懷莫大之慶臣恪居官次遐守巴南不獲稱賀闕庭無任踴躍之至慰國哀臣某言上天降禍大行皇帝奄弃萬國奉諱號劈麋潰五情伏惟皇帝陛下孝思至性攀號罔極臣恭守所部不獲倍位西宮伏增感慕之至謹奉表陳慰以聞賀龍飛臣某言伏見詔書正月二十六日皇帝陛下嗣登寶位萬國同歡日月繼明乾坤交泰中謝伏惟皇帝陛下欽承顧命懷惟永圖以大孝奉宗祧以至仁蘇品物洞照寰海統和神人聖祚延長從今無極羣生鼓舞自此太寧臣守遐藩恪居官次賀冊太皇太后臣某言伏見制書以二月十七日冊立太皇太后徽章克備慶賜遂行榮冠古今澤周寰海中謝伏惟皇帝陛下纘承列聖歡奉兩宮太皇太后含飴保和重光疊慶漢儀盛於長信周祚興於大任方之聖朝彼有慙德臣逺守巴峽不獲稱慶闕庭賀冊皇太后臣某言伏見制書以二月二十五日冊立皇太后盛禮畢陳德音逺被一人有慶萬國同歡中謝伏惟皇太后稟靈作配誕聖表祥徽號極域中之君遵仁為天下之母陛下君臨有國子道無違長樂宫中永獻南山之壽濯龍門上再楊東漢之風率土臣子不勝欣抃和州謝上臣某言伏奉制書授臣使持節和州諸軍事守和州刺史臣自理巴賨不聞善政恩私忽降慶抃失容中謝伏惟皇帝陛下丕承寶祚光闡鴻猷有漢武天人之姿稟周成睿哲之德發言合古舉意通神委用得人動植咸恱理平之速從古無倫微臣何幸獲覩昌運臣業在辭學早歲榮名德宗尚文擢為御史出入中外歷事五朝纍承恩光三換符竹在分憂之寄祿祑非輕而素蓄所長效用無日臣聞一物失所前王軫懷今逢聖朝豈患無位臣即以今月二十六日到所任上訖伏以地在江淮俗參吳楚災旱之後綏撫誠難謹當奉宣皇恩慰彼蒸黎久於其道冀使知方伏乞聖慈俯賜照鑒賀改元赦臣某言伏見今月七日制書大赦天下者帝遊出震聖澤如春神人以和天地交泰中謝伏惟皇帝陛下丕承鴻業光闡睿圖吉日展嚴祀之儀告天陳太平之盛九廟成禮百神降祥鑾輅旋衡風雲改色殊私廣被再弘莫大之恩寶曆惟新更啓無疆之祚兩宫承慶四海永寧率土臣子上千萬壽夔州論利害二首臣某言伏凖元和十二年四月十八日敕諸州刺史如有利害可言者不限時節任自上表聞奏者伏見貞觀中詔許羣臣各上書言利便馬周時布衣遂因中節將常何獻䇿二十餘事太宗深竒之盡行其言擢周為御史至龍朔中壁州刺史鄧弘慶進平索看精四字堪為酒令髙宗嘉之亦行其言遷弘慶為朗州刺史則知苟有所見雖布衣之賤逺守之微亦可施用況臣早受國恩德宗朝忝為御史逮今歷事四朝頻領藩條當陛下至明之時是微臣竭節之日伏以守在遐郡不敢廣有所陳謹准敕上利害及當州公務各具別狀以聞伏乞聖慈俯賜照鑒又臣某言伏准今年正月五日德音宜令諸道觀察使刺史各具當處利害附驛以聞者伏惟皇帝陛下睿哲自天纘承列聖善述先志發揚德音率土人臣不勝慶幸臣䖍奉詔旨宣示蒸黎伏以華夏不同士宜各異詳求利病謹具奏聞伏乞聖慈俯賜照鑒臣伏覽國史竊見開元十八年朝集使至京玄宗臨軒親問利害時宣州刺史裴耀卿上便宜事論轉運甚詳竟不行下至二十一年耀卿為京兆尹再以前事奏論方見允納此及三年漕運七百萬石省腳三十餘萬貫當耀卿前不見納必有人非之及後數年方展其效臣僻守逺郡敢望言行祗奉詔書或冀萬一伏惟明主擇之夔州謝上臣某言伏奉月日制書授臣使持節都督夔州諸軍事守夔州刺史跪受天詔神魂震驚臣某中謝伏惟文武孝德皇帝陛下垂衣穆清睿鑒旁逹三統交泰百神降祥浹于華夷盡致仁壽臣家夲儒素業在藝文貞元年中三忝科第德宗皇帝記其黨援擢為御史在臺三載例遷省官權臣奏用分判錢穀竟坐連纍貶在遐藩先朝追還方念淹滯又遭讒嫉出牧逺州家禍所鍾沈伏草土禮經有制羸疾僅存甘於畎畝以樂皇化伏遇陛下大明御宇照燭無私念以殘生舉其彞典獲居善部伏感天慈臣即以今月二日到任上訖峽水千里巴山萬重空懷向日之心未有朝天之路無任賀雪鎮州臣某言伏見四月二十七日德音以王承宗效順著明復其官爵所獻二郡别置藩垣聖德動天鴻恩及物瑕纍咸滌蒸黎永安臣某中謝伏惟睿聖文武皇帝陛下自承寶位克振皇綱既以四海為家每念一夫不獲昨因大慶爰降昧私廣宥過之科開自新之路綸言一發神理潛通遂令迷誤之徒頓釋憂危之慮命胤子以入侍獻名都而效誠臣心既明天網為解因析四郡别為一方惟懷永圖盡去前弊大河以北化為禮樂之鄉率土之濵重見升平之日臣恪居官次遐守嶺隅不獲稱慶闕庭無任賀平淄青臣某言伏見制旨魏博節度使所奏逆賊李師道并男二人並梟斬訖以二月十六日御宣政殿受賀者聖德玄運兵威神速旬月之內鯨鯢就誅泰嶽既寧登封有日臣某中謝伏惟睿聖文武皇帝陛下有征必克舉意無違天地協神算之期雷霆助成師之氣蠢爾孽竪敢生野心蕭斧一臨妖氛自滅皆由聖慈廣被睿略潛通獻俘者盡許生還得地者復令安堵感我仁激其深衷凡是脅從盡思效節五紀巢穴一朝蕩夷遂使齊魯之鄉復歸仁壽之域捷音既至傳首繼來備文物於明庭告殊勳於清廟百辟陳賀萬方㑹同從此止戈所以為武西州士庶方觀飲至之容東嶽煙雲巳望告成之禮臣恪居逺服常忝班行慶快之誠倍萬群品無任
