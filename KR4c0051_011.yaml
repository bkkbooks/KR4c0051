front:
  text: 劉夢得文集卷第十一
  hash: sha256:1a61304adb1cf54bb8224c550bf5219e4a67561a4fdada659733b315b80fcd6e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_011-1a}
body:
  text: 賦問大鈞砥石楚望傷往何卜謪九年望山陽城秋聲問大鈞并序始余失臺郎為刺史又貶州司馬俟罪朗州三見閏月人咸謂數之極理當遷焉因作謫九年賦以自廣是歲臘月詔追明年自闕下重領連山郡印綬人咸曰美惡周必復第行無恤歲杪其復乎居五年不得調歲二月有事于杜前一日致齋孤居慮靜滯念欻起伊人理之不可以曉也將質諸神乎謹貢誠馳精敢問大鈞其夕有遇寤而次第其辭以為賦圎方相函兮浩其無垠窅冥翕闢兮走三辰以騰振孰主張是兮有工其神迎隨不見兮強名之曰大鈞欹以臨下兮巍乎雄尊天為獨陽髙不可問工居其中與人差近身執其權心平其運循名想象斯可得以訊曰嘻蒙之未生猶泥爾落乎埏埴唯鈞所指忽然為人為大幸矣工賦其形七情與俱嗇智不授卑去聲之以愚坦坦之衢萬人所趨蒙一布武化為畏途人或譽平聲之百説徒虛人或排之半言有餘物壯則老乃唯其常否終則傾亦不可長老先期而驟至兮否踰數而叵量雖一夫不獲兮亦大化之攸病謹薦誠上問兮俯伏以聽是夕寢熟夢遊乎無何有之鄉抗陛級乎重霄兮異人間之景光中有威神兮金甲而煒煌頷之使前兮其音琅琅曰吾大化之一工也居上臨下廉其不平汝今有辭吾一以聽播形肖貌生類積意橐籥圈匡鎔鍊消息我之司智初不爾嗇不守以愚覆為汝賦既賦汝形輔之聰明去求世師資適攸宜胡然抗志遐想前烈倚梯青冥舉足斯跌韜爾智斧無為自伐鑿竅太繁天和乃泄利徑前誘多逢覆轍名腸內煎外火非熱今哀汝窮將􅌋汝愚剔去剛健納之柔濡塞前竅之傷痍兮招太和而與居貰以待人兮急以自拘道存宧奧無示四隅軋物之勢不作兮見傷之幾自無汝不善用吾焉嗇乎且夫貞而騰氣者膴膴健而垂精者昊昊我居其中猶輪是蹈以不息為體以日新為道倮鱗蜚走灌莽苞皂乃牙乃甲乃殈乃剖陽榮隂悴生濡死薧各乘氣化不以意造賦大運兮無有淑惡彼多方兮自生醜好爾奚不德余以驟壯姑尤我以速老邪觀汝百為又或不然赤子哇哇急其能言亦既名物幾時蹁躚春耕其丘投種之日釋耒而歎何時粟實望所未至謂余舒舒欲其久留謂我瞥如我一子二誰之曲歟彼蒹葭之蒼兮霜霰苦而中堅松竹之皸皴索籜兮不若榯筍之可憐納材葦而構明堂固容消而力完揚且之晳兮不可以常然當錫爾以老成蒼眉皓髯山立時行去敵氣與矝色兮噤危言以端誠俾人望之侮黷不生爾之所得孰與壯多不善處老問余而何受教而回蘧蘧形開嚮之威神孰為來哉乃遽衣促盥端慮滌想委珮低簪持簿叩顙而言曰楚臣天問不酬今臣過幸一獻三售始厚以愚終期以壽志上問之罪濯已然之咎心增故術腹飽新授馳神清玄拜手稽首砥石并序時在朗州南方氣泄而雨淫地慝傷物嫗伏噫濕渝色壞味雖金之堅亦失恆性始余有佩刀甚良至是澀不可拔剖其室乃能出遡陽眇視傅刃蒙脊鱗然如痏痂如黑子如青蠅之惡鋭氣中錮猶人被病然客有聞焉袖密石以遺余沃之草腴雜以烏膏切劘下上真質焯見躊躇四顧逌爾謝客微子之貽幾喪吾寶客曰吾聞諸梅福曰爵祿者天下之砥石也髙皇帝所以礪世磨鈍有是邪余退感其言作砥石賦我有利金兮以利為佩遭土卑而慝作兮雄鋩為之濳晦如景昏而蝕既兮與肌漆而為癘顧秋蓬之不可刜兮尚可遊乎髖髀之外利物蒙蔽才人惆悵俾百汰之至精蟠一檢而多恙豈害氣之獨然兮將久不試而然彼屠者之刀兮獵者之鋋不灌不淬兮揉鍇銜鉛曰鼓曰揮兮刲腴擊鮮皖霩穫禾火以耀鋩蓊淫夷而騰羶豈不以涉暑而蒙沴兮鼎用之而成妍有客自東遺余越砥圭形石質蒼色膩理剗其鱗皴滑以滫瀡如衣浣垢若鼎出否霧盡披天萍開見水拭寒焰以破眥擊清音而振耳故態復還寶心再起既賦形而終用一蒙垢焉何恥感利鈍之有時兮寄雄心於瞪視嗟乎石以砥焉化鈍為利法以砥焉化愚為智武王得之商俗以厚髙帝得之傑材以湊一作奔走得既有自失豈無因漢氏以還三光景分隨道闊狹用之得人五百餘年唐風始振懸此大砥以礱兆民播生在天成器在君天為物天君為人天安有執礪世之具而患乎無賢歟楚望并序豫既謫于武陵其地故郢之裔邑與夜郎諸夷錯雜繫乎天者隂伏陽驕是巳繫乎人者風巫氣窳是巳囂氛浮浮利于樓居城之麗譙實鄰所舍四垂無蔽萬景坌入因道其逺邇所得為楚望賦云翼軫之野祝融司方隂迫而專專實生沴天濡而雺土泄而泥氣罕淑清兮淫氛曀曀中人體肢兮為瘥為瘵以曠滌煩兮利居髙于物外我卜我居于城之隅宛在藩落麗譙渠渠四阿垂空洞口發樞眸子不運坐陵虛無歲更周流時極慘舒萬象起滅森來貺豫櫺軒之外羣山巃嵸岡陵靡阤勢若相拱出雲見怪窈蔚森聳露夕霞朝望如飛動簷廡之下大江澒洞支流合輸泄入雲夢羲和望舒出沒兩涯涵泳之族聱取𣢺呀秋水灌盈漩石飄沙流枿軒昂舞于盤渦逮及收潦淡如緑醽白石磷磷倒影羅生蘋末風起有文無聲悠逺煙綿與空蒼然湘沅之春先令而行臘月寒盡溫風發榮土膏如濡言鳥嚶嚶三星明其曉中植物颯以飄英雲歸髙唐草蔽洞庭目與天盡神將化并圎方相涵遊氣杳冥煕煕藹藹藻飾羣形枿樹童丘積空凝青環洲曲塘含景曜明恢台之氣發于春季涉夏如鑠逮秋愈熾土山焦熬止水瀵沸翔禽跕墮呀咮垂翅曦赫敲蒸陽極反隂二儀交精下上相歆雲興天際欻若車蓋凝矑未瞬彌漫霮䨴驚雷出火喬木糜碎殷地爇空萬夫皆廢懸霤綆縋日中見昧移晷而收野無完塊少隂之中景物澄鮮丹葉星房燭耀川原夕月既望曜于丹泉上鏡下冰湔塵濯煙宿麗濳芒獨行髙躔皓一氣之悠悠潔有形而溢清玄杳微明而斐斖想遊目於化先夜無眹以徂征金霞暈乎海壖明星方揚斜漢西懸璿柄如墮半沈層瀾雞啁哳而晨鳴兮日荏苒以騰晶動植暸兮巳分山川鬱乎不平復人寰之喧卑洶浩浩以營營追向時之景光不可驟得以再更意華胥之夢還猶仿像而馳精日次于房天未降霜木卉猶澤水泉收脈故道睃音宣削衍為廣斥水禽嬉戲引吭伸翮紛驚鳴而決起拾彩翠于沙礫時時北風振稿揚埃蕭條邊聲與鴈俱來寒氛委積萬竅交激楚雲改容飛雨凝滴灑林遞響淅瀝梢摵飛電照雪以騰光柔𬞞傲霜而秀坼躔次殊氣川谷異宜民生其間俗鬼言夷招三閭以成謡德伏波而構祠投粔籹以鼓楫豢鱣魴而如犧蟠木靚深孽祅憑之祈年去癘蠲敬祗威擊鼓肆筵河旁水湄薦誠致祝却略躨跜渚居鮮食大掩水物罟張餌啖不可遁伏顯舉濳縋晝撞夜觸設機沈深如拾于陸彼遊倏之瑣類咸跳脫於窘束雖三趾與六眸時或加乎一目亦有輕舟軒輊泛浮拖綸往復馴鷗相逐暮夜澄寂嘯歌羣族傖音俚態幽怨委曲逗疏柝於江城引哀猿於山木巢山之徒抨木開田灼龜伺澤兆食而燔鬱攸起于巖阿騰絳氣而蔽天熏歇雨濡穎垂林巔盜天和而藉地勢諒無勞而有年罷士間人逸為末作求金渚涘淘汰瀺灂流注濻沱繁光熠爚貪賈來貿發於懷握無翼而飛潤于豐屋哂耕耘之悒悒徒胼胝以自鞫我處層軒日星回還閲天數而視民風百態變見乎其間非耳剽以臆説兮固幽求而縱觀觀物之餘遂觀我生何廣覆與厚載豈有形而無情髙莫髙兮九􅕡逺莫逺兮故園舟有楫兮車有轄江山坐兮不可越吾又安知其所如恍臨髙以觀物傷往并序人之所以取貴於蜚走者情也而誕者以遣情為智豈至言邪豫授室九年而鰥痛若人之夭閼弗遂也作賦以傷之冀夫覽者有以增伉儷之重云歎獨處之邑邑兮憤伊人之我遺情可殺而猶毒境當歡而復悲人或朝歎而暮息夫何越月而踰時太極運乎三辰轉寒暑而下馳有歸於無兮盛復于衰猶昧爽之必暮又安得而怨咨我今怨夫若人兮曾旭旦而濳暉飄零日反之萼倐忽蜉蝣之衣川走下而不還露迎暘而易晞恩巳甚兮難絶見無期兮永思我行其野農民桑者舉案來饁亦在林下我觀于途禆販之夫同荷均挈荆叉布𥜗羽毛之蕃鱗介之微和鳴灌叢雙泳漣漪薨薨伊蟲蠢蠢伊豸遊空穴深兩兩相比何動類之萬殊必雄雌而與俱物莫失儷以孤處我方踽踽而焉如我復虛室自凄涼兮心伊鬱心伊鬱兮將語誰坐匡牀兮撫嬰兒何所丏沐兮何從仰飴襦袴在身兮昔圍差跌鞶囊附臂兮餘馥葳蕤誠天性之濳感顧童心兮如疑嘵然有難繼之慕漠然減好弄之姿指遺袿兮能認遡空帷兮欲歸我入寢宫痛人亡兮物改其容寶瑟偃兮絃柱絶瑶臺傾兮鏡奩空寒爐委灰虛幌多風隙駟晨轉窗蟾夜通步搖昏兮網黏翡翠芳褥掩兮塵化蛩蛩閲刀尺之餘澤見巾箱之故封玩服儼兮猶具繁華謝兮焉從想翩仙於是非求僁窣與冥蒙信竒術之可致嗟此生兮不逢徒注視以寂聽恍神疲而目窮還抱影以獨出紛百哀而攻中系曰龍門風霜苦別一作唳鶴哀鳴夜銜羽吳江波浪深雌劒一去無遺音悲之來兮憒一作憤豫心洶如行波洊浸淫悵一作既緣情而莫極思執禮以自針巳焉哉苒苒生死悠悠古今乘彼一氣兮聚散相尋或鼓而興或罷而沈以無涯之情愛悼不駐之光隂諒自迷其有分徒終怨於匪忱彼蒙莊兮何人豫獨纍歎而長吟何卜余既幻惑力命之説兮身久放而愈疑心回泬其莫曉兮將取質夫東龜楚人俗巫而好術兮叟有鬻卜而來思乃招而訊之曰嘻人莫不塞有時而通伊我兮久而愈窮人莫不病有時而間伊我兮久而滋蔓吾聞人稟五行動止有則四時轉續變於所極一歲之旱人斯具舟三月之熱人斯具裘極必反焉其猶合符豫首圎而足方豫腹隂而背陽胡形象之有宵而變化之殊常經曰剝極則賁而未嘗剝者其誰否極受泰居否而未嘗泰者又其誰鶴胡不截鳬胡不禆夔何罰而踸踔蚿何功而扶持紛紜恣睢交作舛馳似豫似奪似信似欺孰主張之問于子龜卜者曰招我以粗問我以微有天下之是非有仁人之是非在此為美兮在彼為嗤或昔而成或今而虧君問曷由主張其時時乎時乎去不可邀來不可逃淹淹兮孰捨孰操堇啄之毒芩雞首之賤毛各於其時而伯音霸其曹屠龍之技非曰不偉時無所用莫若履狶作踊之工非曰可珍時有所用貴於斫輪絡首縻足兮驥不能踰跬前無所阻兮跛鱉千里同涉于川其時在風沿者之吉泝者之凶同藝于野其時在澤伊穜之利乃穋之厄故曰是邪非邪主者時邪主者命邪諒淑惡之同出兮顧所丁之若何夫如是得非我美失非我恥其惡曷思其來曷期姑蹈常而俟之夫何卜為言訖執龜而起豫退而作何卜賦於是蹈道之心一而俟時之志堅內視羣疑猶冰釋然謫九年古稱思婦巳歷九秋未必有是舉為深愁莫髙者天莫濬者泉推巳極數無踰九焉伊我之謫至於數極長沙之悲三倍其時廷尉不調行當跋而天有寒暑閏餘三變朝有考績明幽三見顧堯之民兮亦昏墊而有歎歎息兮倘佯登髙髙兮望蒼蒼突辨之夫我來始黃合抱之木我來猶芒山增昔容水改故坊童者鬱鬱兮涸者洋洋天覆地生蓊兮無傷彼族而居嚮之投荒彼軒而遊昨日桁楊信及澤濡俄然復常稽天道與人紀咸一僨而一起去無久而不還棼無久而不理何吾道之一窮兮貫九年而猶爾意不可得而知庸詎得而悲苟變化之莫及兮又安用夫肖天地之形為望邈不語兮臨風境自外兮感從中晦明轉續兮八極鴻蒙上下交氣兮羣生異容發孤照於寸眸鶩遐情於太空物乘化兮多象人遇時兮不同嗟乎有目者必騁望以盡意當望者必緣情而感時有待者瞿瞿忘懷者熙煕慮深者瞪然若喪樂極者沖然無違外徙倚其如一中糾紛兮若斯望如何其望最樂晞慶霄兮遡阿閣如雲兮天顔咫尺如草兮臣心踊躍扇交鳯兮葳蕤旗升龍兮蠖略日轉黃道天開碧落凝瑞景於庭樹掬非煙於殿幕望如何其望且歡登灞岸兮見長安紛擾擾兮紅塵合鬱蔥蔥兮佳氣盤池象漢兮昭回城依斗兮闌干避御史之驄馬逐幸臣之金丸望如何其望攸好宗萬靈兮越四隩漢帝仙臺兮秦皇海嶠霓衣踴于河上馬迹窮乎越徼紫氣度關而斐亹神光屬天而照耀晥眷眷以馳精聳專專而觀妙望如何其望有形視蠢蠢兮窮冥冥楚塞氛惡兮蕭關燧明暈籠孤月角奮長庚沙多似雪磧有疑城煙雲非女子之氣草木盡王者之兵審曵柴之虛警破來鏑之先聲信有得於風鳥示無言於斾旌望如何其望且慕恩意隔兮年光度雕輦巳辭兮金屋何處長信草生兮長門日暮徯翠華之儻來仰玄天以自訴況復湘水無還漳河空注淚染枝葉香餘紈素風蕭蕭兮北渚波煙漠漠兮西陵樹夫不歸兮江上石子何見兮秦原墓柏琴翻朔塞之音挾瑟指邯鄲之路望如何其望最傷俟環玦兮思帝鄉龍門不見兮雲霧蒼蒼喬木何許兮山髙水長春之氣兮恱萬族獨含嚬兮千里目秋之景兮懸清光偏結憤兮九回腸羡環拱於白榆惜馳暉於落棠諒衝斗兮誰見伊戴盆兮何望平聲豈止蘇武在胡管寧浮海送飛鴻之滅沒附隂火之光彩鶴頸長引烏頭未改恨巳極兮平原空起何時兮東山在永望如何傷懷孔多降將有依風之感宫人成憶月之歌歌曰張衡側身愁思久王粲登樓日回首不作渭濵垂釣臣羞為洛陽拜塵友山陽城并序山陽故城遺址數雉四百之運終於此墟裔孫作賦蓋閔漢也詞曰我止行車隕涕于山陽之墟是何蒼莽與慘悴舂陵之氣兮焉如踣昌運於四百辭至尊而伍匹夫有利器而倒持兮曾何鋩刃之足舒懿王迹之肇基暨坤維之再敷邈汜陽與鄗上恍蛇變而龍攄痛人亡而事替終此地焉忽諸嗟乎積是為治積非成虐文景之欲處身以約播其德牙迄武乃穫桓靈之欲縱心於昏爇其祅焰逮獻而焚彼伊周不世兮姦雄乘舋而騰振物象漼以易位被虛號而陽尊終世殫而事去胡竊揖讓以為文嗚呼維神器之至重兮蓋如山之不騫使人得譬乎逐鹿固健步者所先諒人事之云爾孰云當塗之兆也自天亂曰久矣莫可追升彼墟兮噫嘻獨遺武兮貽後王之元龜秋聲并序相國中山公賦秋聲以屬天官太常伯唱和俱絶然皆得時道行之餘興猶有光隂之歎況伊鬱老病者乎吟之斐然以寄孤憤碧天如水兮窅窅悠悠百蟲迎暮兮萬葉吟秋欲辭林而蕭颯濳命侣以啁啾送將歸兮臨水非吾土兮登樓晚枝多露蟬之思夕蔓趣一作起寒螿之愁至若松竹含韻梧楸早脫驚綺疏之曉吹墮碧砌之涼月念塞外之征行顧閨中之騷屑夜蛩鳴兮機杼促朔鴈叫兮音書絶逺杵續兮何泠泠虛窗靜兮空切切如吟如嘯非竹非絲合自然之宫徴動終歲之別離廢并苔冷荒園露滋草蒼蒼兮人寂寂樹槭槭兮蟲咿咿則有安石風流巨源多可平六符而佐主施九流而自我猶復感隂蟲之鳴軒歎涼葉之初墮異宋玉之悲傷覺潘郎之么麼嗟乎驥伏櫪而巳老鷹在韝而有情聆朔風而心動盼天籟而神驚力將痑兮足受紲猶奮迅于秋聲劉夢得文集卷第十一
