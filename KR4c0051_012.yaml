front:
  text: 劉夢得文集卷第十二
  hash: sha256:6036258cca082af136cad34203fc132f21c44de2dbf5382232f8157d4d4b1cc7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_012-1a}
body:
  text: 論辨迹明贄華他天論上天論中天論下辨迹客有能通夲朝之雅故者曰時之汙崇視輔臣之用房與杜迹何觀焉建官取士之制地征口賦之令禮樂刑法之章因隋而巳矣二公奚施為余愀然曰三王之道猶夫循環非必變焉審所當救而巳隋之過豈制置名數之閒邪顧名與事乖爾因之何害焉夫上材之道非務所舉必的然可使户曉為迹也吾觀梁公之迹章章如懸㝢矣曷然哉請借一以明之史不云乎初太宗怒渾戎之橫于塞也度諸將不足以必取當寧而歎曰得李靖為帥快哉靖時告老且病矣梁公虛其心以起之靖忘老與病一舉虜其君郡縣其地而還夫非伐國之難能起靖之難能也靖非不克之為慮居功之為慮也古之為將度柄輕不足以遂事重則嫌生焉是以有辭第以見志有多産以取信有子質以滅二有嬖監以虞謗其多患也如是若靖者名既成位既崇重失畏逼其患又甚焉微梁公之能盡材能捍患能去忌能照私彼姑藉舊勞居素貴足矣惡乎起哉夫豈感空言而起邪心相見久矣夫豈飾小信而要邪道相籠久矣其後李敬玄擅能失才臣而敗隨之林甫自便進蕃將而亂隨之由是而言固相萬矣子方規規然窺上材以户曉之迹此吾之所不取也若杜萊公者在相位日淺將史失其傳然以梁公之鑒裁自天策府遂以王佐材許之則是又能以道籠房公者矣房之許與迹孰甚焉客無以應而作子劉子曰觀書者當觀其意慕賢者當慕其心循迹而求雖博寡要信矣明贄古之人動必有以將意故贄之道自天子逹焉夫芬芳在上臭逹于下而溫粹無擇有似乎聖人者鬯也故用於天子淸越而瑕不自掩潔白而物莫能汙內堅剛而外溫潤有似乎君子者玉也故用乎諸侯執之不鳴刑之不嘷似死義乳必能跪似知禮者羔也故卿執焉在人之上而有先後行列者鴈也故大夫執焉耿介而一志者雉也故士執焉視其所執而知其任是故食愈重而志愈卑位彌尊而道彌廣耿介之志唯士得以行之何也務細而所試者寡齒卑而所蔽者衆言未足以動聽故必激發以取異行未足以應逺故必砥礪以姑聞借今由士為大夫捨雉而執鴈其志也隨之故耿介之名不施於大夫矣況其上乎然則為士也不思雉之介為卿也能思羔之禮歟今夫或者不明分推理而觀之則曰此居下而嗜直者是必得志而稔其訐矣彼當介而務弘者是必處髙而肥其德矣曾不知訐當其分則地易而自遷弘非其所則志遂而無制矣於戲責士以卿大夫之善猶諭君以士之行爾豫以執贄之道得其分苟推分明矣求刑賞之僭濫得乎華他史稱華他以恃能厭事為曹公所怒荀文若請曰他術實工人命繫焉宜議能以宥曹公曰憂天下無此鼠輩邪遂考竟他至蒼舒病且死見賢遍反醫不能生始有悔之之歎嗟乎以操之明略見幾然猶輕殺材能如是文若之智力地望以的然之理攻之然猶不能返其恚執柄者之恚真可畏諸亦可愼諸原夫史氏之書于冊也是使後之人寬能者之刑納賢者之諭而懲暴者之輕殺故自恃能至有悔恚書焉後之或者復用是為口實悲哉夫賢能不能無過苟置于理矣或必有寬之之請彼壬人皆曰憂天下無材邪曾不知悔之日方痛材之不可多也或必有惜之之歎彼壬人皆曰譬彼死矣將若何曾不知悔之日方痛生之不可再也可不謂大哀乎夫以他之不宜殺昭昭然不足言也獨病夫史書之義是將推此而廣爾吾觀自曹魏以來執死生之柄者用一恚而殺材能衆矣又烏用書他之事為嗚呼前事之不忘期有勸且懲也而暴者復藉口以快意孫權則曰曹孟德殺孔文舉矣孤於虞翻何如而孔融亦以應泰山殺孝廉自譬仲謀近霸者文舉有髙名然猶以可懲為故事矧他人哉天說柳子厚韓愈謂柳子曰若知天之說乎吾為子言天之說今夫人有疾痛倦辱飢寒甚者因仰而呼天曰殘民者昌佑民者殃又仰而呼天曰何為使至此極戾也若是者舉不能知天夫果蓏飲食既壞蟲生之人之血氣敗逆壅底為㿈瘍疣贅瘻痔亦蟲生之木朽而蝎出草腐而螢飛是豈不以壞而後出邪物壞蟲由之生元氣隂陽之壞人由之生蟲之生而物益壞食齧之攻穴之蟲之禍物也滋甚其有能去之者有功於物者也繁而息之者物之讎也人之壞元氣隂陽也亦滋甚墾原田伐山林鑿泉以井飲窾墓以送死而又穴為堰溲築為牆垣城郭臺榭觀游疏為川瀆溝血陂池燧木以燔革金以鎔陶甄琢磨悴然使天地萬物不得其情幸幸衝衝攻殘敗橈而未嘗息其為禍元氣隂陽也不甚於蟲之所為乎吾意有能殘斯人使日薄歲削禍元氣隂陽者滋少是則有功於天地者也繁而息之者天地之讎也今夫人舉不能知天故為是呼且怨也吾意天聞其呼且怨則有功者受賞必大矣其禍焉者受罰亦大矣子以吾言為何如柳子曰子誠有激而為是邪則信辨且美矣吾能終其說彼上而玄者世謂之天下而黃者世謂之地渾然而中處者世謂之元氣寒而暑者世謂之隂陽是雖大無異果蓏㿈痔草木也假而有能去其攻穴者是物也其能有報乎繁而息之者其能有怒乎天地大果蓏也元氣大癰痔也隂陽大草木也其烏能賞功而罰禍乎功者自功禍者自禍欲望其賞罰者大謬矣呼而怨欲望其哀且仁者亦大謬矣子而信子之仁義以遊其內生而死爾烏置存亡得喪於果蓏癰痔草木邪天論上并序世之言天者二道焉拘於昭昭者則曰天與人實影響禍必以罪降福必以善徠窮厄而呼必可聞隱痛而祈必可答如有物的然以宰者故隂騭之說勝焉泥於冥冥者則曰天與人實相異霆震于畜木未嘗在罪春滋乎堇荼未嘗擇善跖蹻焉而遂孔顔焉而厄是茫乎無有宰者故自然之說勝焉余之友河東解人柳子厚作天說以折韓退之之言文信美矣蓋有激而云非所以盡天人之際故余作天論以極其辨云大凡入形器者皆有能有不能天有形之大者也人動物之尤者也天之能人固不能也人之能天亦有所不能也故余曰天與人交相勝爾其說曰天之道在生植其用在彊弱人之道在法制其用在是非陽而阜生隂而肅殺水火傷物木堅金利壯而武健老而耗毦氣雄相君力雄相長天之能也陽而藝樹隂而揫斂防害用濡禁焚用酒斬材窾堅液礦硎鋩義制彊訐一作禦禮分長幼右賢尚功建極間邪人之能也人能勝乎天者法也法大行則是為公是非為公非天下之人蹈道必賞違善必罰當其賞雖三旌之貴萬鍾之祿處之咸曰宜何也為善而然也當其罰雖族屬之夷刀鋸之慘處之咸曰宜何也為惡而然也故其人曰天何預乃人事邪唯告䖍報夲肆類授時之禮曰天而巳矣福兮可以善取禍兮可以惡召奚預乎天邪法小㢮則是非駮賞不必盡善罰不必盡惡或賢而尊顯時以不肖參焉或過而僇辱時以不辜參焉故其人曰彼宜然而信然理也彼不當然而固然豈理邪天也福或可以詐取而禍或可以苟􅊵人道駮故天命之說亦駮焉法大㢮則是非易位賞恆在佞而罰恆在直義不足以制其彊刑不足以勝其非人之能勝天之實盡喪矣夫實巳喪而名徒存彼昧者方挈挈然提無實之名欲抗乎言天者斯數窮矣故曰天之所能者生萬物也人之所能者治萬物也法大行則其人曰天何預人邪我蹈道而巳法大㢮則其人曰道竟何為邪任人而巳法小㢮則天人之論駮焉今以一已之窮通而欲質天云有無惑矣余曰天恆執其所能以臨乎下非有預乎治亂云爾人恆執其所能以仰乎天非有預乎寒暑云爾生乎治者人道明咸知其所自故德與怨不歸乎天生乎亂者人道昧不可知故由人者舉歸乎天非天預乎人爾天論中或曰子之言天與人交相勝其理微庸使户曉盍取諸譬焉劉子曰若知旅乎夫旅者羣適乎莽蒼求休乎茂木飲乎水泉必彊有力者先焉否則雖聖且賢莫能競也斯非天勝乎羣次乎邑郛求隂于華榱飽于餼牢一作牽必聖且賢者先焉否則彊有力莫能競也斯非人勝乎苟道乎虞芮雖莽蒼猶郛邑然苟由乎匡宋雖郛邑猶莽蒼然是一日之途天與人交相勝矣吾固曰是非存焉雖在野人理勝也是非亡焉雖在邦天理勝也然則天非務勝乎人者也何哉人不宰則歸乎天也人誠務勝乎天者也何哉天無私故人可務乎勝也吾於一日途而明乎天人取諸近也巳或者曰若是則天之不相去聲乎人也信矣古之人曷引天為答曰若知操舟乎夫舟行乎濰湽伊洛者疾徐存乎人次舍存乎人風之怒號不能鼓為濤也流之泝洄不能峭為魁也適有迅而安亦人也適有覆而膠亦人也舟中之人未嘗有言天者何哉理明故也彼行乎江河淮海者疾徐不可得而知也次舍不可得而必也鳴條之風可以沃日車蓋之雲可以見怪恬然濟亦天也黯然沈亦天也阽危而僅存亦天也舟中之人未嘗有不言天者何哉理昧故也問者曰吾見其駢焉而濟者風水等爾而有沈有不沈非天曷司歟答曰水與舟二物也夫物之合并必有數存乎其閒焉數存然後勢形乎其閒焉一以沈一以濟適當其數乘其勢爾彼勢之附乎物而生猶影響也夲乎徐者其勢緩故人得以曉也夲乎疾者其勢遽故難得以曉也彼江海之覆猶伊湽之覆也勢有疾徐故有不曉爾問者曰子之言數存而勢生非天也天果狹於勢邪答曰天形恆圎而色恆青周回可以度得晝夜可以表候非數之存乎恆髙而不卑恆動而不巳非勢之乘乎今夫蒼蒼然者一受其形于髙大而不能自還於卑小一乘其氣於動用而不能自休於俄頃又惡能逃乎數而越乎勢邪吾固曰萬物之所以為無窮者交相勝而巳矣還相用而巳矣天與人萬物之尤者爾問者曰天果以有形而不能逃乎數彼無形者子安所寓其數邪答曰若所謂無形者非空乎空者形之希微者也為體也不妨乎物而為用也恆資乎有必依於物而後形焉今為室廬而髙厚之形藏乎內也為器用而規矩之形起乎內也音之作也有大小而響不能踰表之立也有曲直而影不能踰非空之數歟夫目之視非能有光也必因乎日月火炎一作焰而後光存焉所謂晦而幽者目有所不能燭爾彼狸猩犬鼠之目庸謂晦為幽邪吾固曰以目而視得形之粗者也以智而視得形之微者也烏有天地之內有無形者邪古所謂無形蓋無常形爾必因物而後見爾烏能逃乎數邪天論下或曰古之言天之曆象有宣夜渾天周髀之書言天之髙逺卓詭有鄒子今子之言有自乎答曰吾非斯人之徒也大凡入乎數者由小而推大必合由人而推天亦合以理揆之萬物一貫也今夫人之有顔目耳鼻齒毛頥口百骸之粹美者也然而其夲在乎腎腸心腑天之有三光懸㝢萬象之神明者也然而其夲在乎山川五行濁為清母重為輕始兩位既儀還相為庸噓為雨露噫為雷風乘氣而生羣分彚從植類曰生按尚書傳云海隅蒼生謂草木也動類曰蟲倮蟲之長為智最大能執人理與天交勝用天之利立人之紀紀綱或壞復歸其始堯舜之書首曰稽古不曰稽天幽厲之詩首曰上帝不言於人事在舜之庭元凱舉焉曰舜用之不曰天授在殷中宗襲亂而興心知說賢乃曰帝賚堯民之餘難以神誣商俗巳訛引天而驅由是而言天預人乎劉夢得文集卷第十二
