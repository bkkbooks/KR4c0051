front:
  text: 劉夢得文集卷第十三
  hash: sha256:eb1ecdb9645e84e8c9c72385af20fa894d9d6e37c6f3f074ac90509160caaadc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_013-1a}
body:
  text: 易論辯易辯易九六并大衍論與董生言易乾之爻皆九而坤六何也世之儒曰吾聞諸孔穎逹云陽尊得兼乎隂隂不得兼乎陽也他日予與董生言及易生曰吾聞諸畢中和云舉老而稱也請徴諸揲蓍夫端䇿者一變而遇少與歸竒而爲五再變而遇少與歸竒而爲四三變如之是老陽之數分措于指閒者十有三䇿焉其餘世有六四而運得九是巳故易繫注云乾一爻世六䇿也一變而遇多與歸竒而爲九再變而遇多與歸竒而爲八三變如之是老隂之數分措于指閒者二十有五䇿焉其餘二十有四四四而運得六是巳故易繫注云坤一爻二十四䇿也借如一變而遇少再變三變而遇多是少陽之數分措于指閒者二十有一䇿其餘二十有八四四而運得七一變而遇多再變三變而遇少是少隂之數分措于指閒者十有七䇿其餘三十有二四四而運得八故九與六爲老老爲變爻七與八爲少少爲定位故曰舉老而稱亦曰尚變而稱且夫筮爲乾者常遇七斯乾矣常遇九斯得坤矣筮爲坤者常遇八斯坤矣常遇六斯得乾矣在左氏國語有之晉公子親筮之曰尚有晉國得貞屯悔豫皆八八非變爻故不曰有所之按坎二十而爲屯屯之六二爲世爻震一世而爲豫豫之初六爲世爻屯之二豫之初皆少隂不變斯非八乎卦由老數而舉曰六筮由蓍數故斥曰八在左氏春秋傳有之曰穆姜薨于東宫始往而筮之遇艮之八史曰是謂艮之隨夫艮艮下艮上之隨震下兊上唯二不動斯遇八也餘五位皆九六故反焉筮法以少爲卦主變者五而定者一故以八爲占艮之六二曰艮其腓不拯其隨其心不快史以爲東宫實幽也遇此爲不利故從變爻而占苟以恱姜也何則卦以少爲主若定者五而變者一即宜曰之某卦觀之否師之臨類是也變與定均即決以内外今變者五定者一宜從少占懼不吉而更之故曰是謂艮之隨是謂之云者苟以恱也故穆姜終死于東宫與艮㑹耳而杜元凱於此注以爲雜用三易故有遇八之云非臻極之理也劉子曰余與董生言九六之義信與理㑹爲不誣矣余又於左氏二書參焉若合形影然而世人往往攘臂于其閒曰生之名孰與穎逹著邪而材孰與元凱賢邪歷載曠日未甞有聞人明是說者雖余憤然用口舌爭時兒從者什一二焉嗟乎由數立文所如皆合昭昭乎若觀三辰其不晦也如此然猶貴聽而賤視齗齗五姦反然莫可更也矧無形之理不可見之道邪余獨悲而志之以俟夫後覺初董生言夲畢中和中和夲其師師之學夲一行云第一指餘一益三餘二益二餘三益一餘四益四第二指餘一益二餘三益四餘二益一餘四益三第三指與第二指同右揲蓍數卦從下起指亦自下始第一指法地故益成偶第二法天故益成竒第三人極法天故同第一指遇一益三并卦一爲五遇三遇二並謂之少與一同第二指遇一益二并卦一爲四第三指遇一益二并卦一爲四右三指俱遇少通計十三䇿其餘三十六䇿四四運之得九爲老陽故易繫云乾之䇿二百一十有六注云陽爻六一爻三十六䇿六爻二百一十有六第一指遇四益四與卦一爲九第二指遇四益三與卦一爲八遇三亦同第三指遇四益三與卦一爲八遇三亦同右三指俱遇多通計二十五䇿其餘二十四䇿四四運之得六爲老隂故易繫云坤之䇿百四十有四注云隂爻六一爻二十四䇿六爻一百四十四䇿第一指遇一益三并卦一爲五第二指遇四益三并卦一爲八第三指遇四益三并卦一爲八右初指少第二第三指多以少爲主通計二十一䇿其餘二十八䇿四四運之得七爲少陽第一指遇四益四并卦一爲九第二指遇一益二并卦一爲四第三指遇一益二并卦一爲四右初指多第二第三指少以多爲主通計一十七䇿其餘三十二䇿四四而運得八爲少隂第一指遇少謂一二三也並止於五第二指遇多謂三四也並止於八第三指又遇少謂一二也並止於四右初指少第二指多第三指又少以多爲主通計一十七䇿其餘三十二䇿四四而運得八爲少隂第一指遇多謂四也止於九第二指又遇多謂三四也止於八第三指遇少謂一二也止於四右初指多第二指並多第三指少以少爲主通計二十一䇿其餘二十八䇿四四運之得七爲少陽第一指遇少止於五第二指又遇少止於四第三指遇多止於八右初指二指並少三指獨多以多爲主通計一十七䇿其餘三十二䇿四四運之得八爲少隂穆姜薨于東宫始往而筮之遇艮之八史曰是謂艮之隨夫艮艮下艮上之隨震下兊上唯六二爻不動餘五盡變變者遇九六也二不動者遇八也晉公子親筮之曰尚有晉國得貞屯悔豫皆八夫屯震下坎上六位盡不遇六九故不動旣無所之即以世爻爲占按屯是坎宫二世卦故以六二爲占則遇八夫豫坤下震上是震宫一世卦以初六爲占亦遇八韋昭於此注云内曰貞外曰悔震下坎上爲屯坤下震上爲豫言得此兩卦震在屯爲貞在豫爲悔八謂震兩隂爻在貞在悔皆不動所以筮史占之謂閉而不通者爻無爲也乾之䇿二百一十有六謂陽爻九一爻三十六䇿六爻當二百一十六言三十六者舉老陽也坤之䇿一百四十有四謂隂爻六一爻二十四䇿六爻當百四十有四言二十四者舉老隂也凡三百有六十當朞之日二篇之䇿萬有一千五百二十當萬物之數也凡六十四卦都三百八十四爻隂陽相半各一百九十二爻陽爻一爻三十六䇿合爲六千九百一十二隂爻一爻二十四䇿合爲四千六百八右六九之數一行大衍論云三變皆剛太陽之象也三變皆柔太隂之象也一剛二柔少陽之象也一柔二剛少隂之象也少陽之剛有始有牡有究少隂之柔有始有牡有究因綜四象之變而成八象焉八象之位而八卦之夲列矣注云太陽始動施於太隂而生震象之七謂少陽之七爲震初九再動于壯而生坎象之七謂再索而得男也三動于究而生艮象之七謂三索而得男也太隂始動施于太隂而生巽象之八謂少隂之八爲巽初六再動于牡而生离象之八謂再索而得女也三動于究而生兊象之八謂三索而得女也是以九六七八分爲八象右大衍論國語又云董因迎公于河公問焉曰吾其濟乎對曰臣筮之得泰之八曰是謂天地配亨小往大來今及之矣何不濟之有韋昭云泰三至五震象爲侯隂爻不動其數皆八與貞屯悔豫義同劉子曰昭此說用玄體有震按董因之言天地配亨是六五帝乙歸妺以祉元吉之爻夫泰乾坤體全内外位正内爲身外爲事卜得國事以外卦爲占六五居尊位故統論卦下辭曰小往大來爻遇歸妺故曰天地配亨何必取玄體也右與董生言易劉夢得文集卷第十三
