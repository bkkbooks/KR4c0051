body:
  text: 記天平軍節度廳壁汴州刺史廳壁鄭門新亭國學五經壁鄭州刺史廳壁管城新驛和州刺史廳壁山南節度廳壁山南西道新修驛路天平軍節度使廳壁元和十四年春二月王師平河南負固之地十有二州憲宗視地圖户版俾參其地三月有詔其以曹濮隸鄆為一隅按部三郡統兵三萬乃新其軍錫號天平蓋承天威以平暴勃志勳楊休在稱為雄新邦始徠汚俗猶用朝廷革之以漸故命功臣或辨吏以帥焉大和三年冬天平監軍使以故侯病聞上方注意治夲乃以牙璋玉節鼎右僕射官稱賜東都留守令狐公曰豫擇文武惟汝兼前年鎮汴州有顯庸往年弼憲宗有素貴徒得君重剛吾四支公西拜稽首登車有耀不踰旬抵治所夾清河而域之惟鄆州在春秋為須句之國涉漢為濟東蓋禹貢兖州之域宣精在上奎為文宿畫野在下魯為儒鄉故其人知書風俗信厚天寶末大憝起於幽都虜將因兵鋒取其地右勇左德積六十年公之來思如古醫之治劇病宣泄頥養氣還神復大凡抗詔條國式於身以先之示菲約以𥙿人信賞罰以格物物力日完人風自移涉月報政踰年鼎治牙門之容暨暨而恭壘門之容仡仡而和里中之容闐闐而遂勞者以安去者以歸分星不搖田祖降福凡革前非罷供第無名錢歲巨萬菽粟如之錦繒且千兩去苛法急徴毀家償租之令故流庸自占四萬室衆無吁咨和氣乃來三田仍稔草木咸瑞豈偶爾哉初斯堂西墉有刺史記而元戎雄尊之位虛其左方豈有待邪公命愚志之俾來者仰公知變風之自大和五年夏四月二十六日記汴州刺史㕔壁夲朝以浚儀為汴州刺史治所自隋釃新渠吸黃河而東行州含其樞為天下劇內屏王室東雄諸侯居無事時常帶廉察使兵興巳還益以節旄用人得否繫國輕重長慶四年詔書命河南尹敦煌令狐公來蒞來刺錫之介圭使印兵符汴人交賀肴驛騰貴惟是邦始都于魏惠王始郡于宇文周星躔回環天駟垂光地為四戰故其俗右武人具五都故其氣習豪公自為宰相時巳熟四方之利病凡所戾止參然前知既視事三日挹羣吏與之言曰吾食止圭田吾用止公入凡他給過制傷廉浼潔者悉罷之一歸乎公藏凡曲防苛禁不情乖體者悉剗之一出乎令典凡關征船算奪時專利者悉更之一遵乎詔條然後刑麗事而詳賞以時而均興學以勸藝示寬以化勇居數月而汴州人恂恂然無復故態明年大成議者若曰惟浚都國之咽頥咀清咽和旁暢四支東夏黕焉由我以肥是浚之治非所澤于所履而巳初公七代祖在隋為納言大業中持節居此亦號刺史距今餘二百年公實能似既拜闕發魚書合左右契由阼階躋遐踵前武歆然如聞其馨香肅然如覩其形容信乎君子之澤逺而有光輝也他日命遊梁客志之書于㕔事謹按前賢之在此堂者張平原首之陸氏撰節度使記揭于東壁詳矣今公命為刺史記書于右端謹月而日之以公為冠大和元年夏五月某日記汴州鄭門新亭亭于西門尊闕路也實相公以心規羣僚以辭叶而百工以樂成斧斤無聲丹素有嚴王人肅客落以金石走鄭之門嶔為右垣黃河一支滉漾北軒前瞻東顧甍動軌直含景生姿遡空欲翔汴城具八方之人殊形詭言而目一恱初公來臨擁節及門馭吏曰此鄭州門公心非之若曰野哉居無何即舊號而更之曰鄭門故事王人大僚之去來元侯前驅翊門而旋率立馬坌中挹䇿為禮公心不然之乃下亭令于執事按亭東西函丈者三之有竒而南北五之有贏樂縣宴豆前後以位棊闔對明弭掀順時修梁衡建中虛上荷圎脊方廉髙卑中經簾爐茵奕文椸睆榻儲以應猝周用而宜乃命尹􅕡視亭長抱關視掌固啓閉除是謹是孜錫命賜胙勞迎贈餞我當躬行汝先去汝蠲挾膳提醪生芻縞衣我僚展事靡問文武汝唯上汝從凡入而修容凡出而修軷裼襲威儀勿籍勿訶繇是貴人稱諸朝羣吏詠於家行者誇於道與人同其安者人人驛其聲而吟之始乎諓諓而成乎厖鴻欲無文字不可也公遂條白其所以然逺命學古者書之公姓令狐氏以文章典內外書命以謨明登左右相以飛語䇿􅊵以思材復徴自有浚帥無如今治文武兩熾其古之大臣歟國學新修五經壁初大曆中名儒張參為國子司業始詳定五經書于論堂東西廂之壁辨齊魯之音取其宜考古今之文取其正繇是諸生之師心曲學偏聽臆說咸束之而歸于大同揭揭髙懸積六十歲崩剝汚衊一作穢淟然不鮮今天子尚文章尊典籍於苑囿不加尺椽而成均以治學上言遽賜千萬時祭酒皥實尸之博士公肅實佐之國庠重嚴過者必式遂以羡贏再新壁書懲前土塗不克以壽乃折堅木負墉而庇之其制如版牘而髙廣其平如粉澤而潔滑背施隂關使衆如一附離之際無迹而尋堂皇靚深兩廡相照申命國子能通法書者分章揆日遜其業而繕寫焉筆削既成讎校既精白黑彬斑瞭然飛動以蒙來求煥若星辰以敬來趨肅如神明以疑來質決若蓍蔡由京師而風天下覃及九譯咸知宗師非止服逢掖者鑽仰而巳於是學官陳師正等暨生徒凡四百二十有八人請金石刻且歌之曰我有學宇既傾而成之我有壁經既昧而明之孰規摹之孰發揮之祭酒維齊博士維韋俾我學徒絃歌以時切切祁祁不敖不嬉庶乎遒人來采我詩時余為禮部郎凡瞽宗之事得以關決故書之以移史官宜附于藝文志鄭州刺史東廳壁古諸侯之居公私皆曰寢其他室曰便坐今凡視事之所皆曰廳其他室以辨方為稱今年鄭州刺史楊君作東廳既成而落之且以書抵豫為記按國章以甲乙第方域大凡環天子之居為雄州鄭實邇王畿故望雄視其版多貴人且當大逵故務劇君侯始來三日司稅椽舉七縣董租之吏纍百君曰此百螣也悉罷之用户符而輸入益辦司貢掾舉梨林之征請户曉君曰盡㢮之勿籍用平賈而果益精里無吏迹民去痼疾授牘占租如臨詛盟土毛人力日夕相長故周歲而完焉比年而愈肥雖軍興餽挽旁午大將牙旗往復相踵而里中清夷雞犬音和人既寧而物有餘政既成而日多暇圜視舊宇宜有以更之且書得時亦以謹始因列名氏授受月而日之庶乎繼踐于兹者知貫珠之首其山望澤寖土風氓俗與前賢之耿光備于正位有天寶中詞人杜頠之文在大和四年某月日記管城新驛大和二年閏三月滎陽守歸厚上書言臣治所直天下大逵肘武牢而咽東夏誰何宜謹啓閉宜度先是驛于城中馹遽不時四門牡鍵通夕弗禁請更于外隧永永便安制曰可守臣奉詔無徴命無奪時糜羡財募游手逮八月既望新驛成鄭人胥恱琢石而紀曰在兊之方面玄負陽門銜周道牆䕃行桑境勝于外也逺購名材旁延世工墍塗宣晢瓴甓剛滑術精于內也蘧廬有甲乙牀帳有冬夏庭容牙節廡卧囊橐示禮而不慁也內庖外廄髙倉邃庫積薪就陽峙芻就燥有素而不愆也主吏有第役夫有區師行者有饗亭孥行者有別邸周以髙墉乃樓其門勞迎展蠲潔之敬餞別起登臨之思溱洧波瀾嵩丘雲煙四時萬象來貺于我走轂奔蹄遄征急宣入而忘勞出必屢顧其傳舍之尤乎太守姓楊氏字貞一華隂引農人鄭為雄州非聞人大吏不得在其選夫驛之宜遷于外也前此二千石嘗言之而重改作若貞一可謂果於從政而決行其言惜乎未施於大也和州刺史廳壁歷陽古楊州之邑於天文直南斗魁下在春秋實勾吳之封後為楚所取秦并天下以隸九江而六為九江治所晉平吳復隸淮南至永興初自析為郡益之以烏江宋臺建目為南豫州又益之以龍亢梁之亡北齊圖霸功擁貞陽侯以歸王僧辨來迎㑹于兹地二國和協故更名和州陳隋閒無所革國朝因隋武德中更龍亢為含山初開元詔書以口算第郡縣為三品是下州元和中復命有司參校之遂進品第一按見户萬八千有竒輸緡錢十六萬歲貢纎紵二篚吳牛蘇二鈞糝鱏九罋茅搜七千兩鎮曰梁山䆮曰歷湖田藝四榖豢全六擾罏有旨酒庖有腴魚神仙故事在郊在藪玄元有臺彭鏗有洞名山曰雞籠名塢曰濡須異有血閫祥有沸井城髙而堅亞父所營州師五百環峙于東南瀕江畫中流為水疆揭旗樹蕝十有六戍自孫權距陳出入六代常謂宿兵之地多以材能人處之夲朝混一號為善部然用人差輕非復曩時之比也始余以尚書郎得譴刺連山今由巴東來牧考前二邦之籍與版圖才什伍六而地征三之究其所從來生植有夲女工尚完堅一經一緯無文章交錯之竒男夫尚墾闢功苦戀夲無即山近盬之逸市無嗤眩工無雕彤無游人異物以遷其志副徴令者率非外求凡百為一出於農桑故也繇是而言瘠天下者其在多巧乎寶曆元年六月二十一日刺史中山劉某記山南西道節度使廳壁文皇帝初元始畫天下為十道古荆梁之地舉曰山南厥後析為東西天漢之邦實居右部按梁州為都督治所領十有五州縣道帶蠻夷山川扼隴蜀故二千石有採訪防禦之名兵興多故其任益重澄清節鉞二柄兼委建中末德宗南巡狩偃翠華而徘徊簫勺之音洽于巴漢戡難清宫六龍言旋乃下詔復除征繇升州為府等威班制與𡵨益同地既尊大用人隨異故自興元至大和五十年間以勳庸佩相印者三以謨明歷真相者九由台席授鉞未幾復入相者再焉磊落震耀冠于天下去年夏四月今丞相趙郡公徴還泰階遂命左僕射燉煌公往踐其武嚮之九相及公而十焉初公自河陽節度使入操國柄其後鎮宣武以禮悛獷悍治天平以清去掊剋居太鹵以仁蘇荐飢今來是都躡二三大君子之躅道同氣協無所改更如鼓和琴布指成韻羌夷砥平旱麓發生人無左言樂有夏聲俗既富庶居多間暇圜視府局素闕者補之先是公堂嘗為行殿人不敢斥別營侯居應門有閌􅙶㦸未具公乃條白上言詔下有司可其奏軍門肅清方有眉目趨而入者聳然生敬焉惟梁山國也其節用虎出揚其威入貯宜潔舊處仄陋黷其雄稜公遂分宅之別齊且據便地署曰節室卜剛日乃遷焉敬君命而一民心軍中增氣而知禮㦸衣既垂帥節既嚴流盼屋壁見前修之名氏列于坐右第有梁州刺史鼎興元尹記與今稱謂不合因發函進牘于不佞且曰我以飾東壁以新志纍子於是按南梁故事起自始登齊壇之後為記云時開成二年歲在丁巳春二月某日記山南西道新修驛路開成四年梁州牧缺上玩其印凝旒深思曰伊爾卿族歸氏以文儒再世居喉舌今天官二卿融能嗣其耿光嘗自內庭歷南臺尹轂下政事以試可為元侯乃付印綬進秩大宗伯兼御史大夫玊節獸符鎮于媯墟公稽首曰臣融敢揚王休于天漢之域既蒞止咨于羣執事求急病者先之咸曰華陽黑水昔稱醜地近者嘗為王所百態丕變人風邑屋與山水俱一都之㑹目為善部矣唯馹遽之途欹危隘束其醜尚存使如周道在公頥指爾於是因年有秋因府無事軍逸農隙人思賈餘乃懸墾山刋木之墉募其力揆鑽鑿撞祕之用庀其工具舁輦畚鍾之器應其要鼕鼓以程之糗醪以犒之恱使之令既下奮行之徒坌集我之提封踞右扶風觸劒閣千一百里自散關抵褒城次舍十有五牙門將賈黯董之自褒而南逾利州至于劒門次舍十有七同節度副使石文頴董之兩將受命分曹星馳並山當蹊頑石萬狀拗者垤者兀者銛者磊落傾欹波翻獸蹲熾炭以烘之嚴醯以沃之潰為埃煤一篲可掃棧閣盤虛下臨㰹呀層崖峭絶枘木亘鐵因而廣之限以鈎欄狹徑深陘銜尾相接從而拓之方駕從容急宣之騎宵夜不惑郤曲稜層一朝坦夷興役得時國人不知繇是駃行者志其勞吉行者徐其驅孥行者家以安貨行者肩以不病徒行者足不繭乘行者蹄不刓公談私詠溢于人聽伊彼金其牛而誘之以利曷若我子其民而來之以義乎既訖役南梁人書事于牘請紀之以附于史官地理志劉夢得文集卷第二十六
