  text: 劉夢得文集卷第十四
  hash: sha256:3e85056aedd8df75cfc36a42788991f8c40dd1c5529d4d389049bc9f669cd819
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_014-1a}
body:
  text: 書上杜司徒獻權舎人代荅于襄州荅元使君荅竇中丞荅柳子厚與柳子厚荅薛郎中論方書與刑部韓侍郎論書儀上杜司徒時元和元年月日故吏守朗州司馬貟外置同正貟劉某謹齋沐致誠命㒒夫持書敢獻于司徒相公閤下昔稱韓非善著書而說難孤憤尤爲激切故司馬子長深悲之爲著于篇顯白其事夫以非之書可謂善言人情使逢時遇合之士觀之固無以異於佗書矣而獨深悲之者豈非遭罹世故益感其言之至邪小人受性顓蒙渉道未至末學見淺少年氣粗常謂盡誠可以絶嫌猜徇公可以弭讒愬謂愼獨防微爲近隘謂艱貞用晦爲廢忠蒭狗巳陳刻舟徒識罟檴隨足倀然無知事去凝想時時自笑然後知韓非之善說司馬子長之深悲跡符理㑹千古相見雖欲勿悲可乎大凡恒人之所以靈於庶類以其能羣以勝物也烈士之所以異於恒人以其伏節以死誼也然則交相喪者世與道難合并者機與時是以有死誼之心而卒不獲其所者世人悲之獲其所矣而一旦如不得終焉者君子悲之世人之悲悲其不遇無成而虧故其感也近君子之悲悲其不幸旣得而喪故其感也深其悲則同其所以爲悲則異若小人者其不幸歟閒者昧於藩身推致危地始以飛謗生釁終成公議抵刑旬朔之閒再投裔土外黷相公知人之鑒内貽慈親非疾之憂常恐恩義兩乖家國同負寒心銷志以生爲慙雖欲瀝血以自明籲天以自訴適足來衆多之誚豈復有特逹見知者邪遂用詛盟於心不復自白以内咎爲弭謗之具以吞聲爲窒隙之媒庶乎日月至焉而是非乃辨㑹友人江陵法曹掾韓愈以不幸相悲且曰相國扶風公之遇子也厚非獨余知之天下之人皆知之矣余聞初子之橫爲口語所中獨相國深明之及不得巳而退則爲之流涕以訣又不得巳而譴則爲之擇地以居求之於今難與侔矣抑余又聞曩子之介于司徒府奉誠敬於山園上公亟稱於人以爲不懈于位今則有脩儀以賛其詔相者有備物以賛其容衛者七月禮畢一朝慶行誥言敡之授以顯秩子獨足趾一跌而前勞併捐祝網之辰動絓踈目可封之代乃爲窮人斯常情之所悲矧知子之厚者夫踣者思起必謼而求拯疾者思愈必呻而求醫子謼於有力而呻於有術如何以箝口自絶爲智以甘心受誣爲賢嗛然自咎求知於黙彼李斯逐焉而爲上卿鄒陽囚焉而爲上客二子者豈黙以求知者邪若可訴而不言則䧟於畏可言而辯則隣於怨畏與怨君子之所不處子其處之哉韓生之言未及竟而小人不知感從中來始𧹞然以愧又缺然以慄終悄然以悲悲斯歎歎斯憤憤必有泄故見乎辭敢聞左右投所閔也嗟夫人之至信者心目也天性者父子也不惑者聖賢也然而於竊鈇而知心目之可亂於掇蜂而知父子之可閒於拾煤而知聖賢之可疑況乎道謝孔顔恩異天性是非之際愛惡相攻爭先利途虞相軋則釁起希合貴意雖無嫌而謗生魯酒致邯鄲之圍飛鳶生愽者之禍伯仁之殺由偶對伯奢之寃以器聲動罹險中皆出意表雖欲周防去亦難曲施加以吠聲者多辯實者寡飛語一發臚言四馳萌牙始奮枝葉俄茂方謂語怪終成禍梯嗚呼人必求知不能自逹何投分效節有積塵之難何譖行愛㢮有決防之易何將進之日必自見其可而後親何將退之時乃人言其否而遂棄良由邪人必微邪謀必隂隂則難明微則易信罔極泰甚古今同途是以前脩鑒其若此姑以推心取信不以循迹生嫌由是求忠臣於孝子求良婦於罵己食子盡節也推其忍可以疑心放麛違命也推其仁可以屬國若謂其孝於親未必能忠專於夫未必能貞忍於子未必能忍於其他仁於獸未必能仁於其類則是天下之人盡不可信而盡可誣固不然也凡人之行己必恒於所安苟非狂易不能甚異小人自居門下僅踰十年未甞信宿而不侍坐率性所履固無遁逃言行之閒足見眞態伏惟推心以明其迹追往以鑒于今苟謂其甞掩人以自售矣甞近名以冒進矣甞欺謾於言說矣甞踏貪於求取矣甞狎比其瑣細矣甞媒孽其僚友矣甞矯激以買直矣甞詀讘以取容矣甞漏言於諮諏矣甞販務於簿書矣有一于此雖人謂其賢我得而刑也豈止於弃乎苟或反是雖人謂其盜我得而任也庸可而弃乎由是而言小人之善否不在衆人所以受譴巳還行及半歳當食而歎聞絃尚驚不以衆人之善爲是非唯以相公之意爲衡準自違閒左右亟蒙簡書慰誨勤勤窮悴增感伏想仁念必思有以拯之況禮道貴終人情尚舊甞盡其力必加以仁於犬馬之微有帷蓋之報顧異如是豈無庶幾儻浮言可以事乆而明衆嗤可以時乆而息弘我大信以祛羣疑使惸惸微志無巳矣之歎覬乎異日得夷平民然後裹足西嚮謝恩有所復以塵纓黧貌稱故吏於相門此言朝遂可以夕死何則復於變者其義重拯於危者其感深睽而後合亦終不可睽也否而後泰亦終不及否也獲寶於巳喪得途於旣迷與夫平居不爲艱故所激者其味異矣伏以大君繼明元宰柄用鴻鈞播平分之氣懸象廓無私之照渙汗大號與人惟新昭回汪濊旁下郡國投荒爲民者咸釋拲梏遂還里閭繫於稍食猶在羈絆伏讀赦令許移近郊今武陵距京師贏二千者無幾小人祖先壤樹在京索閒瘠田可耕陋室未毀濡露增感臨風永懷伏希閔其至誠而少加推恕命東曹補吏置籍於滎陽伍中得奉安輿而西拜先人松檟誓當齎志没齒盡力於井臼之閒斯遂心之願也如或官謗未塞私欲未從雖爲裔民乃有善地則北距澧浦資宿舂而可行無道途之勤蠲僕賃之費重以鎭南用和輔理扇仁風於上游霽嚴施惠得以自遂斯便家之願也伏惟降意詳察擇可行者處之乞恩於指顧之閒爲惠有生成之重雖百糓之仰膏雨豈諭其急焉嗟哉小生仕逢聖日豈曰不辰知有相君豈曰不遇而乗運鍾否俾躬罹災同生無手足之助終歳有病貧之厄孰不求逹而獨招嫌孰不求安而獨乗坎賦命如此雖悔可追湘沅之濵寒暑一候陽鴈纔到華言罕聞猿哀鳥思啁啾異響暮夜之後併來愁腸懷郷倦越吟之苦舉目多似人之喜俯視遺體仰安髙堂悲愁惴慄常集方寸盡意之具固不在言身逺與寡捨兹何託是以因言以見意恃舊以求哀敢希末光下燭幽蟄孤志多感重恩難忘顧瞻門館慙戀交㑹伏紙流涕不知所云禹錫惶悚再拜獻權舎人禹錫在兒童時巳蒙見器終荷薦寵始見知名衆之指目忝閤下門客懼無以報稱故厚自淬琢靡遺分隂乃念道未施於人所蓄者志見志之具匪文謂何是用顓顓懇懇於其閒思有所寓非篤好其章句泥溺於浮華時態衆尚病未能也故拙於用譽直繩朗鑒樂所趨也故銳於求益今謹録近所論撰凡十數篇蘄端較是非敢關于左右猶夫礦朴納於鎔範甞聞昔宋廣平之沈下僚也蘇公味道時爲繡衣直指使者廣平投以梅花賦蘇盛稱之自是方列于聞人之目是知英賢卓犖可外文字然猶用片言借說於先逹之口席其勢而後驤首當時矧碌碌者疇能自異今閤下之名之位過於蘇公之曩日而鄙生所賦或鉅於梅花則沈泥干霄懸在指顧其詞汰而喻僭誠黷禮也繄游藩之乆覬尚舊而霽嚴禹錫惶悚再拜代京兆李尹荅于襄州二首閤下以大墓世在三原而去河南益逺尚繫望於數百年之外於義不安遂奮然移羣從率先行古占數爲京兆人且命使者修敬於鄙薄缺然不敢當此之重洪惟閤下世雄朔易四姓之冠其崇勲有八柱之貴其碩德有三老之重因都入雒錫之土田自生齒巳上列于侯籍與夫其先甞爲編户民者大殊謹按永徽格貫在兩都者無害爲夲部官蓋神州赤縣尊有所厭非他土之比實待罪輦轂下閤下宣風江漢爲諸侯師介圭入覲必參大政其展禮措事宜爲羣倫所觀非據之榮𧹞然汗下不宣實再拜又實白前辱閤下書厚自枉屈執州人之禮兼示移羣從書明所以去河南從京兆爲望之旨於古儀爲得然而通行之自乆或獻疑焉是以前書不敢不逡巡牢讓亦有以發閤下之雄辯使㬭然爲世程者今月某日函使至果貽理言大明時人之所以失而我獨障頽波而逢其源旣一辭不獲命又學淺不堪往復敢不敬從前史稱以大將軍而有揖客豈不爲重循汲直之言則有以略其禮而增髙者今鄙人之不讓適有以增閤下之重爾實白荅饒州元使君傳使至蒙致書一函辱示政事與治兵之要明體以及用通經以知權視隂陽慘舒之節取震􅊒澤濡之象知天而不泥於神怪知人而不遺於委瑣先郷社之治以浹于舉郡首隊伍之法以及于成師猶言數者起一而至萬操律者夲黃鍾而極八音誠通人之說章章必可行者也鄙生渉吏日淺甞耳剽老成人之言熟矣今研覈至論淵乎有味非游言架空之徒喜未甞不至抃也故揚攉所見以累下執事云蓋豐荒異政繫乎時也夷夏殊法牽乎俗也因時在乎善相因俗在乎便安不知發斂重輕之道雖歳有順成猶水旱也不知日用樂成之義雖俗方阜安猶蕩㭊也徙木之信必行則民不惑此政之先也置水之清必勵則人知敬此政之夲也缿筩之機或行則姦不敢欺此政之助也則有以其㢮張雄雌唯變所適古之賢而治者稱謂各異非至黨有二也顧遭時不同爾夫民足則懷安安則自重而畏法乏則思濫濫則迫利而輕禁故文景之民厚其生爲吏者率以仁恕顯武宣之民亟於役爲吏者率以武健稱其寛猛迭用猶質文循環必稽其弊而矯之是宜審其救奪爾太史公云身脩者官未甞亂也然則脩身而不能及治者有矣未有不自巳而能及民者今之號爲有志於治者咸能知民困於杼柚罷於征傜則曰司牧之道莫先於簡廉奉法而巳其或材拘於局促智限於罷懦不能斟酌盈虚使人不倦以不知事爲簡以清一身爲廉以守舊弊爲奉法是心清於棖闑之内而柄移於胥吏之手歳登事簡猶可理也歳札理叢則潰然攜矣故曰身脩而不及理者有矣若執事之言政詣理切情斥去迂緩簡而通和而毅其脩整非止乎一身心將及物也其程督非務乎一切心將經逺也坊民之理甚周而不至皎察字民之方甚𥙿而不使侵蛑知革故之有悔審料民之多撓厚發姦之賞峻欺下之誅調賦之權不關於猾吏逋亡之責不遷於豐室因有年之利以補販汰不急之用以嗇財爲邦之要深切著明若此其悉也推是言按是理而篤行之烏有不及治邪古稱言之必可行非樂垂空文爾有人民社稷固可踐其言也瀕江之郡饒爲大履番禺之故地漸甌越之遺俗餘干音翰有畝鍾之地武林有千章之材其民牟利鬪力狃於輕悍故用暴虐聞重以山茂檟苦金豐鐐銑齊民徃往投鎡基而即鏟鑄損絲枲而工搴擷乗時詭求其息倍稱閒聞主分土者盡籠其利而斡之坐簿書舛錯爲中執法所劾事下三府以受賕論其刑甚渥于今列郡不寒而慄彼邦人聆其風聲固曰彼浚民者上罪之若此其念民也至矣今二千石以前失職非其罪執事者即人心而用之彼邦人是必翹然須其至而安矣以思治之民遇習治之守欲不至於富庶得乎昌黎韓宣英好實蹈中之士也前爲司封郎以餘刃剸劇于計曹號無逋事能承其家法而紹明之庭堅仲容之族也坐事爲彼郡司馬更閏餘者再焉是必能知風俗之良窳采僚之善否盍甞問焉足爲羣疑之寶龜也至於否臧文律戢翫之戒均權以制動亟隷一作疑以稔勇平居使不墯萃聚使不譁坐作疾徐心和氣振誠纎悉於所示也故置之以須執事異日承進律之命握獸符而駕寅車然後貢其瞽言重曉左右爾荅容州竇中丞健歩劉子良至猥奉書教以愚爲希儒之徒重言一發華衮非貴世之服儒衣冠道古語居學官者爲不鮮矣求其所以然者幾何人借曰有之未必不詬病爾今夫挾弓注矢遡空而發者人自以爲皆羿可矣移之於澤宫則噤而不敢言何哉有的不可欺故也今夫儒者函矢相攻蜩螗相喧不啻於彀弓射空者矣孰爲其的哉異日兄道大行則言益重使儒者之的懸於舌端不得讓也由是知辱教之喜可勝旣乎閒承得一二易生列侍絳帳荒服之外持經鼎來爭捐珠璣以易編簡不疾而速其君子之德風歟南裔憬俗巳丕變矣顧其風候非民和可移地泄恒燠冬無嚴氣其在嗇神以佑藥兼味以禦祲所謂養賢以及萬民頥之時義不可不順苟以有待及物爲心則養己與養民非二道也矧羣情之顒顒乎禹錫再拜荅柳子厚禹錫白零陵守以函置足下書貟來屑末三幅小章書僅千言申申亹亹茂勉甚悉相思之苦懷膠結贅聚至是泮然以銷所不如晤言者無幾書竟獲新文二篇且戲余曰將子爲巨衡以揣其鈞石銖黍余吟而繹之顧其辭甚約而味奫然以長氣爲幹文爲支跨躒古今鼓行乗空附離不以鑿柄咀嚼不有文字端而曼苦而腴佶然以生癯然以清余之衡誠懸于心其揣也如是子之戲余果何如哉夫矢發乎羿彀而中微存乎佗人子無曰必我之師能我衡苟然則譽羿者皆羿也可乎索居三歳理言蕪而不治臨書軋軋不具禹錫白與柳子厚閒發書得箏郭師墓誌一篇以爲其工獨得於天􅐾使木聲絲聲均其所自出抑折愉繹學者無能如繁休伯之言薛訪車子不能曲盡如此能令鄙夫沖然南望如聞善音如見其師㝷文寤事神騖心得倘佯伊鬱乆而不能平嗟夫郭師與不可傳者死矣弦張柱差楚宜反枵然貌存中有至音含糊弗聞噫人亡而器存布方冊者是巳余之伊鬱也豈獨爲郭師發邪想足下因僕書重有槩爾不宣禹錫白荅道州薛侍郎論方書禹錫再拜初兄出中臺守江華人咸曰函牛之鼎以之烹小鮮惜乎餘地澶漫而無庸也愚獨心有槩焉以爲君子受乾陽健行之氣不可以息苟吾位不足以充吾道是宜寄餘術百藝以洩神用其無暇日與得位同乆欲以是理求有得於兄而未有路㑹崔生來辱書教果惠以所著竒方十通商古今之宜而去其并猥以一物足以了病者居多非累試輒效不在是族或取諸屑近亦以捃拾慮恒人多怠忽不省必建言顯白揚其功於巳然其佗立論率以弭病於將然爲先而攻治爲後言君臣必以時言宣補必以性言砭火必夲其輸榮言䘠攘必因其風俗齊和之宜炮剔之良暴炙有隂陽之候煎烹有少多之取撓火髙反勞以制駃露置以養㓗味有所走薫有所歸存諸纎悉易則生患非愽極遐覽之士孰能知其所從來哉愚少多病猶省爲童兒時夙具襦袴保姆抱之以如醫巫家鍼烙灌餌咺然啼號巫嫗輒陽陽滿志引手直求竟未知何等方何等藥餌及壯見里中兒年齒比者必睨一作睆然武健可愛羞己之不如遂從世醫號富於術者借其書伏讀之得小品方於羣方爲最古又得藥對知夲草之所自出考素問識榮衛經絡百骸九竅之相成學切脉以探表候而天機昬淺布指於位不能分累菽之重輕第知息至而巳然於藥石不爲懵矣爾來垂三十年其術足以自衛或行乎門内疾輒良巳家之嬰兒未甞詣醫門求治者頃因欲編次巳試者爲一家方書顧力不足今兄能我先所以辱貺之喜信踰拱璧有以賞音適道爾常思世人居平不讀一方病則委千金於庸夫之手至於甚殆而曰不幸豈眞不幸邪甚者或乗少壯之氣笑人言醫以爲非急昌言曰飴口飽腹藥其如我何所乗之氣有時而旣於禱神佞佛遂甘心焉兄以愚言覆觀之其人固比肩耳前蒙示藥焙法謹如教地之慝果不能傷雖茈音柴胡水寫喜速朽者率乆居而無害萬物不可以無法謂生不由養致其誣乎山川匪遐事使之逺形不接而諭者莫賢乎書臨𥿄怡悵不宣與刑部韓侍郎退之從丞相平戎還以功爲第一官然猶議者慊然如未遷陟此非特用文章學問有以當衆心也乃在恢廓器度以推賢盡材爲孜孜故人心樂其道行行必及物故爾前日赦書下郡國有弃過之目以大國材富而失職者多千鈞之機固省度而釋豈鼷䑕所宜承當然譬諸蟄蟲坏户而俯者與夫槁死無以異矣春雷一振必歆然翹首與生爲徒況有吹律者召東風以薫之其化也益速雷且奮矣其知風之自乎旣得位當行之無忽禹錫再拜荅道州薛郎中論書儀吾兄不知愚無似猥以書見攻其非且曰我與子中外屬當爲伯仲其抵我書執禮太卑按舊儀凡兄姊之齒有惟無伏佗以是爲衰其於匹敵即前云願後云白而巳大曆初李賛皇賈常侍猶守之無渝二公何人也我與子何人也烏有從末俗以姑息爲禮而不虞識者所窺邪其旨云爾愚得書退而思惟愀然自賀曰在恒人爲宜而在愚爲過豈不甚幸歟故盡言於兄期有以相暢爾夫禮之文爲著定宜尊宜卑猶四方上下左右前後稱謂一立古先聖賢所不敢移管敬仲不敢當命卿之享虞人不敢承士之招先禮而後身也汲黯不爲大將軍而虧九卿王祥不爲録尚書而屈三公先道而後時也是則非據之榮雖君命有所不受非道之利雖衆尚有所不爲兄長於大曆初甞接前輩游故其風采去承平時不甚相逺愚長於貞元中所與游皆後來諸生然猶於稠人廣坐時聞老成人之說灌注耳目斑斑然不絶如綫其後爲御史四方諸侯率以書來賀校其禮皆駮不同唯洪州牧李常侍巽潭州牧楊中丞憑始言執事其他如儀而同在憲司者咸以二牧爲不遜愚時與其僚柳宗元昌言於衆曰監察八品也當衣碧言執事爲宜不當輕怪衆咸听然而咍復謂愚云子奚不碧其服邪其不堪執事色深不可以言解及謫官十年居僻陋不聞世論所以書相問訊皆昵親密友不容變更而時態髙下無從知爾前年祗召抵京師偶故人席夔談因及是事乃知與十年前大殊至有同姓屬尊致書於屬卑而貴者其𥿄尾言起居新婦䕫獨竊笑之而巳然猶不敢顯言詆之今有人謂東爲西者一言發則凡人嗤爲騃且狂苟不衆非之則東西易位乆矣尊卑失其儀恬而不怪安得使人如東西不敢易之哉曾子有云君子之愛人也以德細人之愛人也以姑息謂古人悉朴且賢則斯言不當發於洙泗閒爾蓋三代之尚未甞無弊由野以至僿豈一日之爲漸靡使之然也嫉其弊而救之以歸于中道必俟乎薦紳先生德與位并者揭然建明之斯易也語曰俟自直之箭則百代無一矢俟自圎之木則千歳無一輪執矯揉之器者視之灌叢無非良材爾竊觀今之人於文章無不慕古甚者或失於野於書䟽獨陋古而汩於浮二者同出於言而背馳非不能盡如古也蓋爲古文者得名聲爲今出者無悔咎如水走爲下文缺劉夢得文集卷第十四
