body:
  text: 律詩春日退朝經九公主舊院作蜀先主廟觀八陣圖夜翫月許給事見示詩和崔舎人翫月和李相公早秋凱旋成詠武陵書懷經伏波神祠聞董評事疾贈髙大夫宿誠禪師山房晚泊牛渚罷郡歸洛陽間居城東間遊歸洛陽寄友人雪後眺望途中早發初至長安詔賜觀秋稼早秋集賢院金陵懷古池上亭獨吟蒙李相公書問和二相公述懐賀門下相公加冊命謝一二禪客病中見問春日退朝紫陌夜來雨南山朝下看㦸枝迎日動閣影助松寒瑞氣卷綃縠遊光泛波瀾御溝新柳色處處拂歸鞍經東都安國觀九公主舊院作仙院御溝東今來事不同門開青草日樓閉緑楊風將犬昇天路披霓赴月宫武皇曾駐蹕親問主人翁蜀先主廟漢末謡曰黄牛白腹五銖當復天下英雄氣千秋尚凜然勢分三尺鼎業復五銖錢得相能開國生兒不象賢淒涼蜀故妓來舞魏宫前觀八陣圖軒皇傳上略蜀相運神機水落龍蛇岀沙平鵝鸛飛波濤無動勢鱗介避餘威㑹有知兵者臨流指是非八月十五日夜翫月天將今夜月一遍洗寰瀛暑退九霄淨秋澄萬景清星辰讓光彩風露發晶英能變人閒世翛然是玉京許給事見示哭工部劉尚書詩因命同作從叔自渭北節度以疾歸朝比及拜尚書竟不中謝漢室賢王後從叔望在河閒孔門髙第人濟時成國器樂道任天眞特逹圭無玷堅貞竹有筠緫戎寛得衆布義貴能貧護塞無南牧馳心拱北辰乞身來闕下賜告卧漳濵榮耀初題劒清羸巳拖紳宫星徒列位隙日不逥輪自昔追飛侣今爲侍從臣素絃哀巳絶青簡歎猶新未遂揮金樂空悲撤瑟晨淒涼竹林下無復見清塵奉和中書崔舎人八月十五日夜翫月二十韻暮景中秋爽隂靈旣望圎騰精浮碧海分照接虞淵逈見孤輪出高從倚蓋旋二儀含皎澈萬象共澄鮮整御當西陸舒光麗上玄從星變風雨順日助陶甄逺近同時望晶熒此夜偏運行調玉燭絜白應金天曲沼疑瑶鏡通衢若象筵逢人盡冰雪遇境即神仙引素吞銀漢凝清洗緑煙臯禽警露下鄰杵思風前水是還珠浦山成種玉田劒沈三尺影燈罷九枝然象外行無迹寰中影有遷稍當雲闕正未映斗城懸靜對揮宸翰間臨襞綵牋境同牛渚上宿在鳳池邊興掩㝷安道詞勝命仲宣從今紙貴後不復詠陳篇奉和淮南李相公早秋即事寄成都武相公李中書自楊州見示詩夲因命仰和八柱共承天東西別隱然逺夷爭慕化眞相故臨邊竝進夔龍位仍齊龜鶴年相公詩有齊年並進之句同心舟巳濟造膝璧常聮對領專征寄遥持造物權斗牛添氣色井絡靜氛煙獻可通三略分甘出萬錢漢南趨節制趙北賜山川玉帳觀渝舞虹旌獵楚田歩嫌雙綬重夢入九城偏秋與離情動詩從樂府傳聆音還竊抃不覺撫幺絃元和癸巳歳仲秋詔發江陵偏師問罪蠻徼後命宣慰釋兵歸降凱旋之辰率爾成詠寄荆南嚴司空蠻水阻朝宗兵符下渚宫前籌得上策無戰巳成功漢使星飛入夷心草偃同歡謡開竹棧拜舞擲桑弓就日知冰釋投人念鳥窮網羅三面解章奏九門通卉服聮操袂雕題盡鞠躬降幡秋練白驛騎晝塵紅火號休傳警機橋罷亘空登山不見虜振斾自生風江逺煙波靜軍囬氣色雄佇看聞喜後金石賜元戎武陵書懐五十韻并序按天官書武陵當翼軫之分其在春秋及戰國時皆楚地後爲秦惠王所并置黔中郡漢興更名曰武陵東徙于今治所常林義陵記云初項籍殺義帝于郴武陵人曰天下憐楚而興今吾王何罪乃見殺郡民縞素哭于招屈亭髙祖聞而義之故亦曰義陵今郡城南東亭是其所也晉宋齊梁閒皆以分王子弟事存于其書永貞元年余始以尚書貟外郎岀𥙷連山守道貶爲是郡司馬至則以方志所載而質諸其人民顧山川風物皆騷人所賦乃具所聞見而成是詩因自述其出處之所以然故用書懐爲目云西漢開支郡南朝號戚藩四封當列宿百雉俯清沅髙岸朝霞合驚湍激箭奔積隂春暗度將霽霧先昬俗尚東皇祀謡傳義帝冤桃花迷隱迹練葉慰忠魂戸筭資漁獵郷豪恃子孫照山畬火動踏月俚歌喧擁楫舟爲市連甍竹覆軒披沙金粟見拾羽翠翹翻茗拆滄溪秀蘋生枉渚暄滄溪茶爲邑人所重措枉渚亦在郭東禽驚格磔起魚戲噞喁繁按夲草云紅日鷓鴣聲如鈎輈格磔是也沈約臺榭故李衡墟落存隱侯臺木奴洲並在湘靈悲鼓曲泉客泣酬恩露變蒹葭浦星懸橘柚村虎咆空野震鼉作滿川渾鄰里皆遷客兒童盡左言火天無洌井霜月見芳蓀清白家傳遺詩書志所敦列科叨甲乙從宦岀丘樊結友多心契馳聲尚氣吞士安曾重賦元禮許登門草檄嫖姚幕巡兵戊巳屯築臺先自隗送客獨留髠遂結王畿綬來觀衢室樽鳶飛入鷹隼魚目麗璵璠曉燭羅馳道朝陽闢帝􅕡王正㑹夷夏月朔盛旗幡獨立當瑶闕傳呵歩紫垣按章清犴獄視祭潔蘋蘩御曆昌期逺傳家寶炸蕃繇文光夏啓神教畏軒轅内禪因天性膺圖授化元繼明懸日月出震統乾坤大孝三朝備洪恩九族惇百川宗渤澥五岳輔崑崙何幸逢休運微班識至尊校緡資筦㩁復土奉山園時以夲官判度支鹽鐵等案兼充崇陵使判官一失貴人意徒聞太學論直廬辤錦帳逺守愧朱轓巢幕方猶鷰槍榆尚笑鯤邅逥過荆郢流落感涼温旅望花無色愁心醉不惽春江千里草暮雨一聲猿問卜安冥數看方理病源帶賖衣改製塵澀劒成痕三秀悲中散二毛傷虎賁來憂禦魅魑歸願牧鷄豚就日秦京逺臨風楚奏煩南登無㶚岸旦夕上髙原經伏波神祠蒙蒙篁竹下有路上壷頭漢壘麏鼯鬪蠻溪霧雨愁懷人敬遺像閱世想東流自負覇王略安知恩澤侯郷園辤石枉筋力盡炎洲一以功名累翻思馬少游聞董評事疾因以詩贈董生奉内典繁露傳家學青蓮譯梵書火風乖四大文字廢三餘欹枕晝眠晚折巾秋鬢踈武皇思視草誰許茂林居贈澧州髙大夫司馬霞寓前年収錦城焉踏血泥行千里追戎首三軍許勇名殘兵疑鶴唳空壘辨烏聲一誤雲中級南游湘水清宿誠禪師山房題贈二首宴坐白雲端清江直下看來人望金刹講席繞香壇虎嘯夜林動鼉鳴秋㵎寒衆音徒起滅心在淨中觀不岀孤峯上人閒四十秋視身如傳舎閱丗甚東流法爲因縁立心從次第修中宵問眞偈有住是吾憂晚泊牛渚蘆葦晚風起秋江鱗甲生殘霞忽改色逺鴈有餘聲戍鼓音響絶漁家燈火明無人能詠史獨自月中行罷郡歸洛陽間居十年江外守旦夕有歸心及此西還日空成東武吟花閒數盞酒月下一張琴聞說功名事依前惜寸隂城東間遊借問池臺主多居要路津千金買絶境永日屬間人竹徑縈紆入花林委曲循斜陽衆客散空鏁一園春罷郡歸洛陽寄友人逺謫年猶少初歸鬢巳衰門間故吏去室靜老僧期不見蜘蛛集頻爲僂句欺頴微囊未岀寒甚谷難吹濩落唯心在平生有己知商歌夜深後聽者竟爲誰陜州河亭陪韋五大夫雪後眺望因以留別與韋有布衣之舊經遷貶歸一别二紀雪霽大陽津城池表裏春河流添馬頰原色動龍鱗萬里獨歸客一杯逢故人因髙向西望關路正無塵途中早發中庭望啓明促促事晨征寒樹鳥初動霜橋人未行水流白煙起日上彩霞生隱士應髙枕無由知姓名初至長安時自外郡再受郎官左遷凡二紀重見帝城春老大歸朝客平安出嶺人每行經舊處却想似前身不改南山色其餘事事新大和戊申歳大有年詔賜百寮岀城觀秋稼謹書盛事以俟采詩者長安銅雀鳴秋稼與雲平玉燭調寒暑金風報順成川原呈上瑞恩澤賜間行欲及重城掩猶聞歌吹聲早秋集賢院即事時為學士金數巳三伏火星正西流樹含清露曉閣倚碧天秋灰琯應新律銅壷添夜籌商颷從朔塞爽氣入神洲蕙草香書殿槐花點御溝山明眞色見水淨濁煙收早歳忝華省再來成白頭幸依羣玉府有路嚮瀛州金陵懷古潮滿冶城渚日斜征虜亭蔡洲新草緑幕府舊煙青興廢由人事山川空地形後庭花一曲幽怨不堪聽晝居池上亭獨吟日午樹隂正獨吟池上亭靜看蜂敎誨間想鶴儀形法酒調神氣清琴入性靈浩然機巳息几杖復何銘分司東都蒙襄陽李司徒相公書問因以奉寄早忝金馬客晚爲商洛翁如名四海内多病一生中舉丗往還盡何人心事同幾時登峴首恃舊揖三公奉和吏部楊尚書太常李卿二相公䇿免後即事述懐贈荅十韻文雅關西族衣冠趙北都有聲眞漢相無纇勝隨珠當軸龍爲友臨池鳳不孤九天開内殿百辟看晨趨誡滿懲欹器成功别大鑪餘芳在公論積慶是神扶歩武離台席徊翔集帝梧銓材秉秦鏡典樂去齊竽蕭洒風塵外逢迎詩酒徒唯應待華皓更食萬錢廚門下相公榮加冊命天下同歡忝沐眷私輒敢申賀冊命岀宸衷官儀自古崇特膺平土拜光賛格天功再佩扶楊印常乗鮑氏騘七賢遺老在猶得詠清風病中一二禪客見問因以謝之勞動諸賢者同來問病夫添鑪壽鷄舌灑水淨龍鬚身是芭蕉喻行須卭竹扶醫王有妙藥能乞一丸無劉夢得文集卷第三劉夢得外集卷第三詩汴州新政書事對紫微花和令狐贈荅和謝蒲萄和送趙鍊師令狐相公賜詩詶令狐贈別詶寄賀遷拜詶早秋見寄和翫白菊寄令狐相公和贈竹和令狐入潼關和㝷白閣老雪中逰玄都觀南亭看雪別牡丹詶令狐留守春晚對花春日言懷令狐相公言懷聞思帝郷詶令狐相公謝令狐相公書問賀令狐相公重詶前寄秋懷詶令狐相公新詩詶寄詶令狐相公見寄歳暮逺懷詶令狐相公即事首夏間居庭前白菊謝季冬南郊宿齋題伏毒寺杏園花下飲和令狐相公題雙文瓜花題龍回寺晚泛漢江初栽桂樹早春南望詶令狐相公春思見寄新栽蕙蘭南齋小宴詠梔子花新蟬對黃白二菊花荅令狐相公荅令狐僕射客有話汴州新政書事寄令狐相公天下咽喉今太寧軍城喜氣徹青冥庭前劒㦸朝迎日筆底文章夜應星三省壁中題姓字萬人頭上見儀形汴州忽復承平事正月看燈户不扄和令狐相公郡齋對紫微花明麗碧天霞䒠茸紫綬花香聞荀令宅豔入孝王家幾歳自榮樂髙情方歎嗟有人移上苑猶足占年華令狐相公示河中楊少尹贈荅兼命繼聲兩首新詩百字餘朱絃玉磬韻難如漢家丞相重徴後梁苑仁風一變初四靣諸侯瞻節制八方通貨溢河渠自從郄縠爲元帥大將歸來盡把書和令狐相公謝太原李侍中寄蒲萄珍果出西域移相到北方昔年隨漢使今日寄梁王上相芳緘至行臺綺席張魚鱗含宿潤馬乳帶殘霜染指鈆粉􅕹滿喉甘露香醖成千日酒味敵五雲漿咀嚼停金盞稱嗟響畫堂慙非末至客不得一枝甞和令狐相公送趙常盈鍊師與中貴人同拜嶽及天台投龍畢却赴京銀璫謁者引霓旌霞帔仙官到赤城白鶴迎來天樂動金龍擲下海神驚元君伏奏歸中禁武帝親齋禮上清何事夷門請詩送梁王文字上聲名令孤相公俯贈篇章斐然仰謝鄂渚臨流別梁園衝雪來旅愁隨凍釋歡意待花開城曉烏頻起池春鴈欲回飲和心自醉何必管絃催詶令狐相公贈别越聲長苦有誰聞老向湘山與楚雲海嶠新辭永嘉守夷門重見信陵君田園松菊今迷路霄漢鴛鴻乆絶羣幸遇甘泉尚詞賦不知何客薦雄文詶令狐相公寄賀遷拜之什邅回二紀重爲郎洛下遥分列宿光不見當關呼早起曽無侍史與焚香三花秀色通春幌十字清波遶宅牆白首青衫誰比數相憐只是有梁王相公昔曽以天僚分司故有同病相憐之句詶令狐相公早秋見寄公來第四秋樂國號無愁軍士遊書肆商人占酒樓熊羆交黒矟賔客滿清油今日文章主梁王不姓劉和令狐相公翫白菊家家菊盡黃梁國獨如霜瑩靜眞琪樹分明對玉堂仙人披雪氅素女不紅粧粉蝶來難見麻衣拂更香向風揺雨扇含露滴瓊漿髙豔遮銀井繁枝覆象牀桂叢慙並發梅援妬先芳一入瑶華詠從兹播樂章夏日寄宣武令狐相公長憶梁王逸興多西園花盡興如何近來溽暑侵亭館應覺清談勝綺羅境入篇章髙韻發風穿號令衆心和承明欲謁先相報願拂朝衣逐曉珂令狐相公見示贈竹二十韻仍命繼和髙人必愛竹寄興良有以峻節可臨戎虚心冝得士衆芳信妍媚威鳯難栖止遂於鼙鼓間移植東南羙封以梁園土澆之浚泉水得地色不移凌空勢方起新青排故葉餘粉籠踈理猶復隔牆藩何因出塵滓兹辰去前蔽永日勞瞪視槭槭林已成熒熒玉相似親摹起心匠洗滌在頥指曲直旣瞭然孤髙何卓爾垂梢覆内屏迸筍侵前戺妓席拂雲鬟賔階廕珠履抱琴恣閒翫執卷堪斜倚露下懸明璫風來韻清徴堅貞貫四候標格殊百卉歳晚當自知繁華豈云比古詩無贈竹髙唱從此始一聽清瑶音琤然長在耳和令狐相公入潼關寒光照旌節關路曉無塵吏謁前丞相山迎舊主人東瞻軍府靜西望敕書頻心共黃河水同昇天漢津和令狐相公㝷白閣老見留小飲因贈殻士更逢酒樂天仍對花文章管星暦情興占年華宦逹翻思退名髙却不誇唯存浩然氣相共賞煙霞詶令狐相公雪中遊玄都觀見憶好雪動髙情心期在玉京人披鶴氅出馬踏象筵行照耀樓臺變淋漓松桂清玄都留五字使入歩虚聲和令狐相公以司空裴相見招南亭看雪四韻重門不下關樞務有餘間上客同看雪髙亭盡見山瑞呈霄漢外興入笑言閒知是平陽㑹人人帶酒還和令狐相公別牡丹平章宅裏一欄花臨到開時不在家莫道兩京非逺別春明門外即天涯詶令狐留守巡内至集賢院見寄仙院文房隔舊宫當時盛事盡成空墨池半在頽垣下書帶猶生蔓草中巡内因經九重苑裁詩又繼二南風爲兄手冩慇勤句遍歴三台各一通和鄆州令狐相公春晚對花朱門退公後髙興對花枝望闕無窮思看書欲盡時含芳朝競發凝豔晚相宜人意慇勤惜狂風豈得知詶令狐相公春日言懷見寄前陪看花處隣里近王昌今想臨戎地旌旗出汶陽營飛柳絮雪門耀㦸枝霜東望清河水心隨艑上郎和令狐相公言懷寄河中楊少尹章句慙非第一流世閒才子昔陪遊吳宫巳嘆芙蓉死張司業詩云吴宫四靣秋江水天清露白芙蓉死邊月空悲蘆管秋李白書任向洛陽稱傲吏分司白賔客苦教河上領諸侯天平相公石渠甘對圖書老關外楊公安穏不遥和令狐相公坐中聞思帝郷有感當初造曲者爲誰說得思郷戀闕時滄海西頭舊丞相停杯處分不湏吹詶令狐相公見寄羣玉山頭住四年每聞笙鶴看諸仙何時得把浮丘袖白日將昇第九天途次大梁雪中奉天平令狐相公書問兼示新什因思曩歳從此拜辭形於短篇以申仰謝逺守宦情薄故人書信來共曽花下別今獨雪中迴𥿄尾得新什眉頭還暫開此時同鴈鶩池上一徘徊令狐相公自天平移鎭太原以詩申賀相公昔爲并州從事北都留守將天兵出入香街宿禁扄鼙鼓夜聞驚朔鴈旌旗曉動拂參星孔璋舊檄家家有叔度新歌處處聽夷落遥知眞漢相爭來屈膝看儀形重詶前寄邊烽寂寂盡收兵宫樹蒼蒼靜掩扄戎羯歸心如内地天狼無角比凡星新成麗句開緘後便入清歌滿坐聽呉苑晉詞遥望處可憐南北太相形詶令狐相公秋懷見寄寂寞蟬聲靜差池鷰羽回秋鄰多越絶朔氣想臺駘相去數千里無因同一杯慇勤望飛鴈新自塞垣來詶令狐相公六言見寄巳嗟離別太逺更被光隂苦催吴苑鷰辭人去汾川鴈帶書來愁吟月落猶望憶夢天明未迴今日便令歌者唱兄詩送一杯令狐相公自太原累示新詩因以酬寄飛蓬卷盡塞雲寒戰馬間嘶漢地寛萬里胡天無警急一籠烽火報平安燈前妓樂留賔宴雪後山河出獵看珍重新詩逺相寄風情不似四登壇詶太原令狐相公見寄書信來天外瓊瑶滿匣中衣冠南渡逺旌節北門雄鶴唳華亭月馬嘶榆塞風山川幾千里惟有兩心同詶令狐相公歳暮逺懷見寄依韻別侣孤鶴怨冲天威鳯歸容光一以閒夢想是耶非芳訊逺珍重知音老更稀不如湖上鴈北向整毛衣詶令狐相公親仁郭家花下即事見寄荀令園林好山公遊賞頻豈無花下侣逺望眼中人斜日漸移影落英紛委塵一吟相思曲惆悵江南春詶令狐相公首夏間居書懷見寄蕙草芳未歇緑槐隂巳成金罍唯獨酌瑶瑟有離聲翔泳各殊勢篇章空寄情應憐三十載未變使君名貞元中自郎官出守至今三十一年詶令狐相公庭前白菊花謝偶所懷見寄數叢如雪色一旦冒霜開寒蘂差池落清香斷續來思深含怨别芳謝惜年催千里難同賞看看又早梅詶令狐相公季冬南郊宿齋見寄壇下雪初霽城南凍欲生齋心祠上帝髙歩領名卿沐浴含芳澤周旋聽珮聲猶憐廣平守寂寞竟何成貞元中侍郎舅氏牧華州時余再忝科第前後由華覲謁陪登伏毒寺屢焉亦曾賦詩題於梁棟今典馮翊暇日登樓南望三峯浩然生思追想昔年之事因成篇題舊寺曽作關中客頻經伏毒巖晴煙沙苑樹晚日渭川帆昔是青春貌今悲白雪髯郡樓空一望含意卷髙簾詶令狐相公杏園花下飲有懷見寄年年曲江上花發即經過未飲心先醉臨風思倍多三春看又盡兩地欲如何日望長安道空成勞者歌和令狐相公春早朝回鹽鐵使院中作柳動御溝清威遲堤上行城隅日未過山色雨初晴鸎避傳呼起花臨府署明簿書盈几案要自有髙情令狐相公見示題洋州崔侍郎宅雙木瓜花頃接侍郎同舎陪宴樹下吟翫來什輒成和章金牛蜀路逺玉樹帝城春榮耀華館裏逢迎欠主人簾前疑小雪牆外麗行塵來去皆回首情深是德隣和令狐僕射相公題龍回寺兹地回鑾日皇家禪聖時路無胡馬跡人識漢官儀天子旌旗度法王龍象隨知懷去家歎經此益遲遲相公家夲咸陽有喬木之思和令狐相公晩泛漢江書懷寄洋州崔侍郎閬州髙舎人二曹長雨過逺山出江澄暮霞生因浮濟川舟遂作適野行郊樹映緹騎水禽避紅旌田夫捐畚鍤織婦窺柴荆古岸夏花發遥林晚蟬清㳂洄方翫境鼓角巳登城部内有良牧望中寄深情臨觴念佳期泛瑟動離聲寂寞一病士夙昔接羣英多謝謫仙侶幾時還玉京詶令狐相公使宅別齋初栽桂樹懷作淸淮南岸家山樹黒水東邊第一栽影近畫梁迎曉日香隨緑酒入金杯根留本土依江潤葉起寒稜映月開早晚隂成比梧竹九霄還放綵鶵來令狐相公頻示新什早春南望遐想漢中因杼短章以寄誠素軍城臨漢水旌斾起春風逺思見江草歸心看塞鴻野華㳂古道新葉映行宫唯有詩兼酒朝朝兩不同詶令狐相公見寄才兼文武播雄名遺愛芳塵滿洛城身在行臺爲僕射書來角里訪先生間遊占得嵩山色醉卧高聽洛水聲千里相思難命駕七言詩裏寄深情令狐相公春思見寄一紙書封四句詩芳晨對酒逺相思長吟盡日西南望猶及殘春花落時令狐相公見示新裁蕙蘭二章之什兼命同作上國庭前草移來漢水潯朱門雖易地玉樹有餘隂豔彩凝還泛清香絶復㝷光華童子佩柔輭美人心惜晚含逺思賞幽空獨吟寄言知音者一奏風中琴和令狐相公南齋小宴聽阮咸陋巷久蕪沈四絃有遺音雅聲發蘭室逺思含竹林座絶衆賔語庭移芳樹隂飛觴助真氣寂聽無流心影似白團扇調諧朱絃琴一毫不平意幽怨古猶今和令狐相公詠栀子花蜀國花已盡越桃今正開色疑瓊樹倚香似玉京來且賞同心處那憂別葉催佳人如擬詠何必待寒梅酬令狐相公新蟬見寄相去三千里聞蟬同此時清吟曉露葉愁噪夕陽枝忽爾絃斷絶俄聞管參差洛橋碧雲晚西望佳人期和令狐相公九日對黃白二菊花見懷素萼迎寒秀金英帶露香繁華照旄鉞榮盛對銀黃琮璧交輝映衣裳雜綵章晴雲遥蓋覆秋蝶近悠揚空想逢九日何由陪一觴滿叢佳色在未肯委嚴霜城内花園頗曽遊玩令公居守亦有素期適春霜一夕委謝書實以荅令狐相公見謔樓下花園早占春年年結侶採花頻繁霜一夜相撩冶不似佳人似老人令狐僕射與予投分素深縱山川阻峭然音問相繼今年十一月僕射疾不起聞予已承訃書寢門長慟後日有使者兩輩持書并詩計其日時已是卧疾手筆盈幅翰墨尚新新詞一篇音韻彌切收淚握管以成報章雖廣陵之絃於今絶矣而蓋泉之感猶庶聞焉焚之繐帳之前附於舊編之末前日寢門慟至今悲有餘已嗟萬化盡方見八行書滿紙傳相憶裁詩怨索居危絃音有絶哀玉韻猶虚忽歎幽明異俄驚歲月除文章雖不朽精魄竟焉如零淚沾青簡傷心見素車淒涼從此後無復望雙魚劉夢得外集卷第三
