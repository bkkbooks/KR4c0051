  text: 劉夢得文集卷第五
  hash: sha256:eca412fdfd0d2751c79ec82ae0e4a8b9741d914c0e45e20966e1583f9ac546eb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_005-1a}
body:
  text: 雜體詩翠微寺有感觀莫徭獵西山觀舞柘枝君山懷古秋江晚泊臨江寓望秋日送客登武陵城謝寄三癖詩寄上都同舍寄京師親友請告東歸題湖城驛池亭平蔡州平齊行城西行説笛歌試茶歌偃松答東陽于令贈致仕滕庶子詠紅柿子庭竹臺城懷古題壽安甘棠館與歌者米嘉榮聽穆氏唱歌渾侍中牡丹看牡丹與歌者何戡與歌童田順郎題破屏風賞牡丹寄陜州姚中丞酬崔郎中翠微寺有感吾王昔遊幸離宫雲際開朱旗迎夏畢涼軒避暑來湯餅賜都尉寒冰頒上才龍髯不可望玉坐生浮埃連州臘日觀莫徭獵西山海天殺氣薄蠻軍部伍囂林紅葉盡變原黑草初燒圍合繁鉦息禽興大斾搖張羅依道口嗾大上山腰猜鷹屢奮迅驚麏時局跳瘴雲四面起臘雪半空銷箭頭餘鵠血鞍傍見雉翹日暮還城邑金笳發麗譙觀舞柘枝二首胡服何葳㽔仙仙登綺墀神飈獵紅蕖龍燭映金枝垂帶覆纎腰安鈿當嫵眉翹袖中繁鼓傾牟遡華榱燕餘有舊曲淮南多冶辭欲見傾城處君看赴莭時山雞臨清鏡石燕赴遙津何如上客會長袖入華茵體輕似無骨觀者皆聳神曲盡回身去曽波猶注人君山懷古屬車八十一此地阻長風千載威靈盡赭山寒水中秋江晚泊長泊起秋色空江涵霽暉暮霞千萬狀賓鴻次第飛古戍見旗迥荒村聞犬稀軻峨艑上客勸酒夜相依步出武陵東亭臨江寓望鷹至感風候霜餘變林麓孤帆帶日來寒江轉沙曲戍遙旗影動津晚櫓聲促月上綵霞收漁歌遠相續秋日送客候吏立沙際田家連竹溪楓林社日鼓茅屋午時雞雀噪晚禾地蝶飛秋草畦驛樓宮樹近疲馬再三嘶晚嵗登武陵城顧望水陸悵然有作星象承烏翼蠻陬想犬牙俚人祠竹節仙洞閉桃花城基厯漢魏江源自賨巴華表廖立墓菜地黃瓊家霜輕菊秀晚石淺水文斜樵音繞故壘汲路明寒沙清風稍改葉盧橘如含葩野橋鳴驛騎叢祠發迥笳跳鱗避舉網倦鳥寄行查路塵髙出樹山火遠連霞夕曛轉赤岸浮藹起蒼葭軋軋渡溪槳連連赴林鴉呌閽道非逺賜環期自賖孤臣本危涕喬木在天涯湖州崔郎中曹長寄三癖詩自言癖在詩與琴酒其詞逸而髙吟詠不足昔柳吳興亭臯隴首之句王融書之白團扇故為四韻以謝之視事畫屏中自稱三癖翁管絃泛春渚旌斾拂晴虹酒對青山月琴韻白蘋風會書團扇上知君文字工為郎分司寄上都同舍籍通金馬門身在銅駝陌省闥晝無塵宫樹遠凝碧荒街淺深轍古渡潺湲石唯有嵩丘雲堪誇早朝客登陕州城北樓郤憶京師親友獨上百尺樓目窮思亦愁初日遍露草野田荒悠悠塵息長道白林清宿煙收回首雲深處永懷帝鄉遊請告東歸發霸槗郤寄諸僚友征途出霸涘回首傷如何故人雲雨散滿目山川多行車無停軌流景同迅波前歡漸成昔感歎益勞歌秋晚題湖城驛池上亭秋次池上館林塘照南榮塵衣紛未解幽思浩已盈風蓮墜故萼露菊含晚英恨為一夕客愁懷晨雞鳴平蔡州三首蔡州城中衆心死祅星夜落照壕水漢家飛將下天來馬箠一揮門洞開賊徒崩騰望旗拜有若羣蟄驚春雷狂童面縛登檻車大帛夭矯垂捷書相公從容來鎮撫常侍郊迎負文弩四人歸業閭里間小兒跳踉健兒舞汝南晨雞喔喔鳴城頭鼓角音和平路傍老人憶舊事相與感激皆涕零老人收淚前致辭官軍入城人不知忽驚元和十二載重見天寶承平時門衢車馬渾渾流使臣來獻淮西囚四夷聞風失匕箸天子受賀登髙樓祅童擢髮不足數血汚城西一壞土南峯無火楚澤間夜行不鎖穆陵關䇿勳禮畢天下泰猛士按劒看常山時唯常山不庭平齊行二首胡塵昔起薊北門河南地屬平盧軍貂裘代馬繞東嶽嶧陽孤桐削為角地形十二虜意驕恩澤含容歷四朝魯人皆科帶弓箭齊人不復聞簫韶今朝天子聖神武手握玄符平九土初哀狂童襲故事文告不來方震怒去秋詔下誅東平官軍四合猶嬰城春來羣烏噪且驚氣如壞山墯其庭牙門大將有劉生夜半射落攙搶星帳中虜血流滿地門外三軍舞臂盟一作連臂盟驛騎函首過黃河城中無賊天氣和朝廷侍郎來慰撫耕夫滿野行人歌泰山沈寇六十年旅祭不饗生愁煙今逢聖君欲封禪神使隂兵來助戰祅氣掃盡河水清日觀杲杲卿雲見開元皇帝東封時百神受職爭奔馳千鈞猛簴順流下洪波涵淡浮熊羆侍臣燕公秉文筆玉檢告天無愧詞當今睿孫承聖祖嶽神望幸河宗舞青門大道屬車塵共待葳蕤翠華舉城西行城西蔟蔟三叛族叛者為誰蔡吳蜀中使提刀出禁來九衢車馬轟成雷臨刑與酒杯未覆仇家百官先請肉守吏能然董卓臍飢烏來覘桓玄目城西人散泰街平雨洗血䀶春草生武昌老人説笛歌武昌老將七十餘手把庾令相問書自言少小學吹笛早事曹王曾賞激往年鎮戍到蘄州楚山蕭蕭笛竹秋當時買林恣搜索典却身上烏貂裘古苔蒼蒼封老節石山孤生飽風雪髙聲五音隨指發水中龍應行雲絶曾將黃鶴樓上吹一聲占盡秋江月如今老去語猶遲音韻髙低耳不知氣力巳無心尚在時時一曲夢中吹西山蘭若試茶歌山僧後簷茶數叢春來映竹抽新茸莞然為客振衣起自傍芳叢摘鷹觜斯須碾成滿室香便酌砌下金沙水驟雨松聲入鼎來白雲滿碗若徘徊悠揚噴鼻宿酲散清峭徹骨煩襟開陽崖隂嶺各殊氣未若竹下莓苔地炎帝雖嘗未解煎桐君有籙那知味新芽連拳半未舒自摘至煎俄頃餘木蘭墜露香微似瑶草臨波色不如僧言靈味宜幽寂采采翹英為嘉客不辭緘封寄郡齋甎井銅爐損摽格何況蒙山顧渚春白泥赤印走風塵欲知花乳清泠味須是眠雲卧石人廟庭偃松并引侍中後閣前有小松不待年而偃丞相晉公為賦詩美其猶龍蛇然植于髙簷喬木間上嶔軋盤蹙傾亞似不得天和者公以遂物性為意乃加憐焉命畚土以壯其趾使無欹索綯以牽其幹使不仆盥漱之餘以潤之顧盼之輝以照之發於仁心感召和氣無復夭閼坐能敷舒嚮之跧蹙化為竒古故雖袤文而有偃號焉豫嘗詣閣白事公為道所以且示以詩竊感嘉木之逢時斐然成韻勢軋枝偏根巳危髙情一見與扶持忽從憔悴有生意却為離披無俗姿影入巖廊行樂處韻含天籟宿齋時謝公莫道東山去待取隂成滿鳯池答東陽于令涵碧圖并引東陽令于興宗丞相燕國公之猶子生綺襦紈袴間所見皆貴盛而潔然有心如山東書生前年白有司願為親民官以自效遂補東陽及蒞官以簡易為治故多暇日一旦於縣五里偶得竒境埋沒於蘙薈中于生自以有持操而生於公侯家由覆廕入仕常忽忽歎息因移是心開抉泉石芟去蘿蔦斧凡材畚息壤而清溪翠巖森立坌來因搆亭其端題曰涵碧流貫于庭中如青龍蜿蜒冰去聲徹射人樹石雲霞列于前昏旦萬狀惜其居地不得有聞於時故圖之來乞詞既無負尤物豫亦久蘙薈蘿蔦者覩之慨然遂賦七言以貽後之文士矣東陽夲是佳山水何況曾經沈隱侯化得邦人解吟詠如今縣令亦風流新開潭洞疑仙境逺寫丹青到雍州落在尋常畫師手猶能三伏凛生秋贈致仕滕庶子先輩時及第人中最長朝服歸來晝錦榮登科記上更無兄壽觴每使曾孫獻勝境長攜衆妓行矍鑠據鞍能騁健殷勤把酒尚多情凌寒却嚮山隂去衣繡郎君雪裏迎時令子為御史主務在越中詠紅柿子曉連星影出晚帶日光懸夲因遺採掇翻自保天年庭竹露滌鉛粉節風搖靑玉枝依依似君子無地不相宜臺城懷古清江悠悠王氣沈六朝遺事何處尋宫牆隱嶙圍野澤鸛鶂夜鳴秋色深題壽安甘棠館二首公館似仙家池清竹徑斜山禽忽驚起衝落半巖花門前洛陽道門裏桃源路塵土與煙霞其間十餘步與歌者米嘉榮唱得涼州意外聲舊人唯數米嘉榮近來時世輕先輩好染髭鬚事後生聽舊宫中樂人穆氏唱歌曾隨織女渡天河記得雲間第一歌休唱貞元供奉曲當時朝士巳無多渾侍中宅牡丹徑尺千餘朵人間有此花今朝見顔色更不嚮諸家唐郎中宅與諸公同飲酒看牡丹今日花前飲甘心醉數杯但愁花有語不為老人開與歌者何戡二十餘年別帝京重聞天樂不勝情舊人唯有何戡在更與殷勤唱渭城與歌童田順郎天下能歌御史娘花前月底奉君王九重深處無人見分付新聲與順郎燕耳館破屏風所畫至精人多歎賞題之畫時應遇空亡日賣處難逢識別人唯有多情往來客強將衫袖拂埃塵賞牡丹庭前芍藥妖無格池上芙蕖淨少情惟有牡丹真國色花開時節動京城寄陜州姚中丞時分司東都八月天地肅二陵風雨收旌旗闕下來雲日關東秋禹迹想前事漢臺餘故丘徘徊襟帶地左右帝王州留滯悲昔老恩光榮徹侯相思望棠樹一寄商聲謳奉酬湖州崔郎中見寄山陽昔相遇灼灼晨葩鮮同遊翰墨場和樂塤箎然一落遊宦途浩如乘風船況當衰暮日卧理淮海壖猶期謝病後共樂桑榆年劉夢得文集卷第五劉夢得外集卷第五雜詩赴上都贈別秋日寄懷酬送張貟外文石枕贈壁州鞭文宣王廟釋奠敬酬徹公見寄酬元九院長別竇司直酬竇貟外和竇中丞郡內書懷寄楊八拾遺郡齋宴客旬休早涼酬楊侍郎馬大夫惠著述再酬馬大夫郴州紀事書情玩郡齋紫薇花和馬大夫山薑花王侍御贈答詩登洭口戍見寄獻通草茇葜酒答楊八絶句鄂渚留別答表臣贈別寄表臣懷表臣重寄表臣寄唐州楊八重寄絶句春日寄楊八寄朗州溫右史新漲驛池酬楊八副使酬楊司業酬崔博士酬馮舍人宿贈別答張侍御賈喜再登科自洛赴上都贈別又被時人寫姓名春風引路入京城知君憶得前身事分付鶯花與後生和武中丞秋日寄懷簡諸僚故退朝還公府騎吹息繁音吏散秋庭寂鳥啼煙樹深威生奉白簡道勝外華簪風物清逺目功名懷寸隂雲衢念前侣綵翰寫沖襟涼菊照幽援敗荷攢碧潯感時江海思報國松筠心空愧壽陵步芳塵何處尋赴連州途經洛陽諸公置酒相送張貟外賈以詩見贈率爾酬之謫在三湘最逺州邊鴻不到水南流如今暫寄樽前笑明日辭君步步愁贈元九侍御文石枕以詩獎之文章似錦氣如虹宜薦華簪緑殿中縱使商飈生旦夕猶堪拂拭愈頭風酬元九侍御贈壁州鞭長句碧玉孤根生在林美人相贈比雙金初開郢客緘封後想見巴山冰雪深多節本懷端直性露青猶有歲寒心何時䇿馬同歸去關樹扶踈敲鐙吟和李六侍御文宣王廟釋奠作歎息魯先師生逢周室卑有心律天道無位救陵夷歷聘不能用領徒空爾為儒風正禮樂旅象入蓍龜西狩非其應中都安足施丗衰由我賤泣下為人悲遺教光文德興王叶夢期土田封後胤冕服飾虛儀鐘鼓膠庠薦牲牢郡邑祠聞君喟然歎偏在上丁時敬酬徹公見寄二首淒涼沃洲僧憔悴柴桑宰別來二十年唯餘兩心在越江千里鏡越嶺四時雪中有逍遙人夜深觀水月酬兀九院長自江陵見寄無事尋花至仙境等間栽樹比封君金門通籍真多士黃𥿄除書每日聞韓十八侍御見示嶽陽樓別竇司直詩因令屬和重以自述故足成六十二韻楚望何蒼然層瀾七百里孤城寄逺目一寫窮無巳蕩漾浮天蓋回環宣地里積漲在三秋混成非一水冬遊見清淺春望多洲沚雲錦逺沙明風煙青草靡火星忽南見月魄方東迤雪波西山來隱若長城起獨專朝宗路駃悍不可止支川讓其威蓄縮空南委熊武走蠻落熊武二溪名瀟湘來奧鄙炎蒸動泉源積潦搜山趾歸往無旦夕包含通逺邇行當白露時眇視秋光裏曙色未昭晣露華遙斐亹浩爾神骨清如觀混元始我風忽震蕩驚浪迷津涘怒激鼓鏗鍧蹙成山巋硊鵾鵬疑變化罔象何恢詭噓吸寫樓臺騰驤露鰭尾景移羣動息波靜繁音弭明月出中央青天絶纎滓素光淡無際緑靜平如砥空影渡鵷鴻秋聲思蘆葦鮫人弄機杼貝闕駢紅紫珠蛤吐玲瓏文鰩翔旖旎水鄉吳蜀限地勢東南􅋻翼軫粲垂精衡巫屹環峙名雄七澤數國辨三苗氏唐羿斷修蛇荆王憚下逹反青兕秦狩迹猶在虞巡路從此軒后奏宫商騷人詠蘭芷茅嶺潛相應橘洲傍可指郭璞驗幽經羅含著前紀觀津戚里族按道侯家子聮袂登髙樓臨軒笑相視假守亦髙卧竇時權領郡事墨曹正垂耳韓亦量移江陵法曹契闊話涼溫壷觴慰遷徙地偏山水秀客重杯盤侈紅袖花欲然銀燈晝相似興酣更抵掌樂極同啓齒筆鋒不能休藻思一何綺伊余負微尚夙昔慙知己出入金馬門交結青雲士襲芳踐蘭室學古遊槐市䇿慕宋前軍文師漢中壘陋容昧俯仰孤志無依倚衛足不如葵漏川空歎蟻幸逢萬物泰獨處窮途否鎩翮重疊傷兢魂再三禠蘧瑗亦屢化左丘猶有恥桃源訪仙官薜服祠山鬼故人南臺舊一別如弦矢今朝會荆蠻斗酒相宴喜為余出新什笑抃隨伸𥿄曄若觀五彩歡然臻四美委曲風濤事分明窮達旨洪韻發華鍾淒音激清徴羊濬要史共和江淹多雜擬徒欲仰髙山焉能追逸軌湘州路四達巴陵城百雉何必顔光祿留詩張內酬竇貟外使君寒食日途次松滋渡先寄示四韻楚鄉寒食橘花時野渡臨風駐綵旗草色連雲人去住水文如縠燕差池朱輪尚憶羣飛雉青綬初縣左顧龜非是湓城魚司馬水曹何事與新詩時自水部郎出牧和竇中丞晚入容江作漢郡三十六鬱林東南遙人倫選清臣天外頒詔條桂水涉秋浪火山凌霧朝分圻辨風物入境聞謳謡莎岸見長亭煙林隔麗譙日落舟益駃川平旗自飄珠浦逺明滅金沙晴動搖一吟道中作離思懸層霄吕八見寄郡內書懷因而戲和文苑振金聲循良冠百城不知今史氏何處列君名寄楊八拾遺時出為國子主簿分司東都之什八貟外亦轉國子博士同在洛陽聞君前日獨廷爭漢帝偏知白馬生忽領簿書遊太學寧勞侍從厭承明洛陽夲自冝才子海內而今有直聲為謝同寮老博士范雲來歲即公卿酬竇貟外郡齋宴客偶命柘枝因見寄兼呈張十一院長元九侍郎貟外時兼節度判官佐平蠻之略張𥘉罷郡元方從事分憂餘刃又從公白羽胡牀嘯詠中綵筆諭戎矜倚馬華堂留客看驚鴻渚宫油幕方髙步澧浦甘棠有幾叢若問騷人何處所門臨寒水落江楓酬竇貟外旬休早涼見示時奉書報詰朝有宴新秋十日浣朱衣鈴閣無聲公吏歸風韻漸髙梧葉動露光初重槿花稀四時苒苒催容鬢三爵油油忘是非更報明朝池上酌人知太守字玄暉酬楊侍郎憑見寄二首翔鸞闕底謝皇恩纓上滄浪舊水痕踈傅揮金忽相憶逺擎長句與招魂十年毛羽催頽一旦天書召回看看瓜時欲到故侯也好歸來南海馬大夫見惠著述三通勒成四秩上自遂古達于國朝采其菁華至簡而富欽受嘉貺詩以謝之紅旗閲五兵絳帳領諸生味道輕鼎食退公猶筆耕青箱傳學逺金匱納書成一瞬見前事九流當抗行編蒲曽苦思垂竹愧無名今日承芳訊誰言贈衮榮南海馬大夫逺示著述兼酬拙詩輒著微誠再有長句時蔡戎未殄故見於末篇漢家旌斾付雄才百越南溟統外臺身在絳紗傳六藝腰懸青綬亞三台連天浪靜長鯨息映日帆多寶舶來聞道楚氛猶未滅終須旌斾掃雲雷和楊侍郎初至郴州紀事題郡齋八韻旌節下朝臺分圭從北回城頭鶴立處驛樹鳳栖來蘇寂傳云後化為仙鶴止城東北隅牆上又州北栖鳳驛圖經云常有威鳳降于庭梧也舊路芳塵在新恩馹騎催里閭風偃草鼓舞抃成雷吏散山禽囀庭香夏蘂開郡齋堪四望壁記有三台人訝徴黃晚文非弔屈哀一吟梁甫曲知是卧龍才和郴州楊侍郎玩郡齋紫薇花十四韻幾年丹霄上出入金華省暫別萬年枝看花桂陽嶺南方足竒樹公府成佳境緑隂交廣除明豔透蕭屏雨餘人吏散燕語簾櫳靜懿此含晚芳翛然忘簿領紫茸垂組綬金縷攢鋒頴露溽暗傳香風輕徐就影苒弱多意思從容占光景得地在侯家移根近仙井開樽好凝睇倚瑟仍回頸遊蜂駐彩冠舞鶴迷煙頂興生紅藥後愛與甘棠並不學夭桃姿浮榮在俄頃和南海馬大夫聞楊侍郎出守郴州因有寄上之作忽驚金印駕朱轓遂別鳴珂聽曉猿碧落仙來雖暫謫赤泉侯在是深恩玉環慶逺瞻台坐銅柱勳髙壓海門一詠瓊瑶百憂散何勞更樹北堂萱和鄭相公以考功十弟山薑花俯賜篇詠採擷黃薑蘂封題青鎖闈供聞調膳日正是退朝歸響為纎筳發情隨彩翰飛故將天下寶萬里與光輝馬大夫見示浙西王侍御贈答詩因命同作大夫榮踐舊府又歷交趾桂林南人歌之列在風什王侍御公易一别歲除寄詞夫篇以代札憶逐年車凡幾時今來舊府統成師象筵照室會詞客銅鼓臨軒舞海夷百越酋豪稱故史十洲風景助新詩秣陵從事何年別一見瓊章如素期酬馬大夫登洭口戍見寄新辭金印拂朝纓臨水登山四體輕猶念天涯未歸客瘴雲深處守孤城酬馬大夫以愚獻通草茇葜酒感通拔二字因而寄別之作泥沙難振拔誰復問窮通莫訝提壷贈家傳枕麴風成謡獨酌後深意片言中不進終無已應須荀令公答楊八敬之絶句楊生時亦謫居飽霜孤竹聲偏切帶火燋桐韻夲悲今日知音一留聽是君心事不平時鄂渚留別李二十一表臣大夫髙檣起行色促柱動離聲欲問江深淺應如逺別情答表臣贈別二首昔為瑶池侶飛舞集蓬萊今作江漢別風雪一徘徊嘶馬立未還行舟路將轉江頭瞑色深揮袖依稀見始發鄂渚寄表臣二首祖帳管絃絶客帆淒風生回車已不見猶聽馬嘶聲曉發柳林戍遙城聞五鼓憶與故人眠此時猶晤語出鄂州界懷表臣二首離席一揮杯别愁今尚醉遲遲有情處却恨江帆駃夢覺疑連榻舟行忽千里不見黃鶴樓寒沙雪相似重寄表臣二首對酒臨流奈别何君今巳醉我蹉跎分明記取星星鬢他日相逢應更多世間人事有何窮過後思量盡是空早晚同歸洛陽陌卜鄰須近祝雞翁寄唐州楊八歸厚淮安古地擁州師畫角金鐃旦夕吹淺草遙迎鷫鸘馬春風亂颭辟邪旗謫仙年月今應滿戇諫聲名衆所知何況遷喬舊同伴一雙先入鳳凰池時徐晦楊嗣復二舍人與唐州同年及第重寄絶句淮西既是平安地鴉路今無羽檄飛聞道唐州最清靜戰場耕盡野花稀春日寄楊八唐州二首淮西春草長淮水逶迤光燕入新村落人耕舊戰場可憐行春守立馬看斜桑漠漠淮上春莠苗生故壘梨花方城路荻筍蕭陂水髙齋有謫仙坐嘯清風起寄朗州溫右史曹長暫别瑶墀鴛鷺行彩旗雙引到沅湘城邊流水桃花過簾外春風杜若香史筆枉將書紙尾朝纓不稱濯滄浪雲臺功業家聲在徴詔何時出建章和東川王相公新漲驛池八韻今日池塘上初移造物權苞藏成別島沿濁致清漣變化生言下蓬瀛落眼前泛觴驚翠羽開幕對紅蓮逺寫風光入明含氣象全渚煙籠驛樹波日漾賔筵曲岸留緹騎中流轉彩船無因接元禮共載比神仙酬楊八副使將赴湖南途中見寄一絶知逐征南冠楚才逺勞書信到陽臺明朝若上君山上一道巴江自此來酬楊司業巨源見寄璧雍流水近靈臺中有詩篇絶丗才渤海歸人將集去梨園弟子請詞來瓊枝未識魂空斷寶匣初臨手自開莫道專城管雲雨其如心似不然灰酬國子崔博士立之見寄健筆髙科早絶倫後來無不揖芳塵遍看今日乘軒客多是昔年呈卷人胄子執經瞻講坐郎官共食接華茵煩君逺寄相思曲慰問天南一逐臣酬馮十七舍人宿衛贈别五韻少年為别日隋宫楊柳隂白首相逢處巴江煙浪深使星三蜀酒春雨霑衣襟王程促速意夜語殷勤心却歸天上去遺我雲間音劉夢得外集卷第五
