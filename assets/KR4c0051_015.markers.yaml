  - {type: line-break, offset: 0, content: '', id: KR4c0051_SBCK_015-1a01}
  - {type: variant, offset: 0, length: 1083, content: 劉夢得文集卷第十五表並代淮南杜相公佑作代讓同平章事代謝平章事代謝手詔代謝貸錢物代謝赴行營代謝加朱鄭官代賀赦吳少誠代賀除䖍王代慰公主薨代慰王太尉薨代讓同平章事臣某言髙品吳千金至奉制某月日加臣銀青光禄大夫同中書門下平章事兼徐泗濠等州節度使觀察處置等使餘如故者初受恩榮若登霄漢退思塵忝如履春冰臣某誠惶誠恐頓首頓首臣聞以德詔官以勞定賞苟或虚授人無勸心臣自守方隅累更時歳荷唐虞宣力之寄乏齊魯報政之能愧無可稱以荅髙位豈意聖慈弘獎天澤荐加以夑賛之崇名被庸虚之陋質懼速官謗有玷大猷伏以宰相之職安危是注其在當否繫于慘舒惟以材昇例無平進舉不失德則副蒼生之心苟非其人或致外夷之哂臣雖愚昩甞覽前言豈敢冒榮遂安竊位輒思事理冀盡蒭蕘若以汴河要津漕運所切徐方俶擾師旅未寧謹當上稟睿謀下貞師律剋期而進屈指可平勵衆率先是臣之志旣行其事必在正名所加節制安敢飾讓至於銀青貴服金鉉重名勲績無聞豈冝濫及伏乞賜寢前命俯亮愚衷微臣有知止之宜聖朝無不稱之服名器斯愼退讓有聞遐邇聆風孰不知勸其新授官告謹重封進無任代謝平章事臣某言伏蒙獎拔超踐鈞衡慮玷大猷昩死陳讓再奉嚴旨不令固辤恩厚命輕位髙責重中謝臣聞天下安危注意將相處論道具瞻之地當緫戎作鎭之權雖恊夢而求無聞秉鉞之寄登壇以拜不兼調鼎之榮授受惟艱伊昔猶爾況臣庸瑣何以克堪陛下玄造曲成大明私照俾掌戎律復參廟謨寵光之崇在臣巳格毫髮之效於國何施謹當罄竭微誠奉遵至教仗天威以攝不類敷聖澤以遂羣生上分旰食之憂下塞素餐之責力誠不足心實念兹伏乞皇明俯賜昭鑒臣恪居官次遐守藩維不獲伏謝彤庭陳露丹慊心存闕下同犬馬之戀恩身在淮濆仰雲天而結思無任代謝手詔詔後批云朕自書臣某言中使閭忠信至奉宣聖旨存問兼賜臣手詔拜捧紫泥跪伸金簡承旨見聖神之略感恩知身命之輕中謝臣素乏異能幸逢昌運猥當旄鉞之寄未靖祅氛榮分台鼎之名何階啓沃竊位斯乆速尤是虞豈謂玄化曲成鴻私荐及特紆睿思親灑仙毫降自九重粲然五色初喜麗天之象逺燭輝光旋驚垂露之蹤曲覃霈澤鸞鳳騫翔而變態煙雲舒卷以呈姿賦彩飛文聳神蕩目恭惟國寶何幸家藏感極涕零莫知上荅應縁軍旅庶務謹具別狀奏聞無任代謝貸錢物臣某言中使南宮懷珍至奉宣聖旨存問兼賜臣墨詔天光下濟睿澤曲流銜恩未酬居寵彌懼中謝臣受任斯極微功莫施昨以封略未寧干戈猶動壽春固壘以備盜淮甸興師以扞姦經費所資數盈鉅萬餽餉時乆供億力殫慮始圖終不敢緘黙輒陳管見上黷宸聦伏蒙聖慈特遂誠請逺承如綍之旨特假聚人之財軍須不愆士氣彌振糗糧旣備永無半菽之虞襦袴足頒逺超挾纊之感是爲恱使咸願先豋臣忝緫戎倍百欣荷伏以上分國用俯濟軍興候清煙塵謹備償納無任代謝赴行營臣某言臣自守淮濆巳周星紀䖍奉朝典粗安遐方素效未聞新恩荐及身曵兩綬寄深, WYG: ''}
