  - {type: variant, offset: 1075, length: 1204, content: 隅蚊蚋負山力誠不足鷹鸇逐鳥志則有餘臣再授兵符夙參軍幕被堅執銳雖未經於戎行制勝伐謀亦甞習於事業自忝藩翰屬時淸平無施汗馬之勞但詠櫜弓之什今則幸遇殊獎委之專征以臣率先是臣素志況聞徐州士衆夲無叛心倉卒之閒危疑至此臣請自臨疆場親領紀綱裂帛繫書諭其禍福一作悔椎牛饗士養以威聲冀宣皇風煦兹蠢類以忠義感脅從之伍以含弘安反側之徒革靣悛心期乎不日其楊州留務請令行軍司馬路應權知伏乞聖慈俯賜照鑒無任代謝加兵馬使朱鄭官初除侍御史續除中丞異姓王臣某言奏事官韋温回特蒙聖恩重賜朱鄭等官告宸象昭回煥然下燭榮分右職光賁遐藩中謝臣伏以朱鄭朴忠爲心沈毅見色當建封禦侮之寄見張愔提孩之年昨者隷職徐州分鎭蘄縣繹騷之際綆亮彌彰歷險而來寔繁其旅詳探夲末有足襃稱輒具奏聞恐須獎勸伏蒙睿鑒俯亮微誠優詔先行巳階直指之目殊私荐至超昇獨坐之崇户領三千爵踰五等恩生非次感異常倫轅門有光武旅增氣遂使感激之士希勇爵以捐軀猖狂之徒聆聖澤而悛性風行草偃其勢必然臣忝緫戎倍百欣荷無任代賀赦吳少誠復官爵臣某言中使宋惟澄至奉宣聖旨存問兼賜臣墨詔及昭示洗雪吳少誠等事天地弘覆燾之恩雷雨施渙汗之澤瑕累咸滌危疑獲安中謝臣伏以少誠擅興兵戈事生詿誤自王師致討天威下臨曾無悖辭但聞引咎初懷疑懼雖擁衆以偷生旋感聖神屢拜章而請命陛下仁深解網慮軫納隍念餽餉飛輓之勤閔戰爭暴露之苦舉兹宥過之典副彼效順之誠一方承再造之恩九有覩惟新之化敷鴻霈而覃及蠢類鼓仁風而臻于大和罷柝銷鋒自兹而始臣謬膺重寄䖍守遐藩不獲稱慶瑶墀陳露丹懇仰瞻宸極倍百常情無任代賀除䖍王臣某言中使李國眞至奉宣聖旨存問兼賜臣墨詔鴻澤決下大明燭幽曉諭便蕃慰安稠疊中謝臣伏覩天書恭承睿旨弘愛人屈巳之道酌因時適變之宜擇賢王作鎭徐方俾張愔便主留務上則成邦家盤石之固下則副士衆拜章之請戚藩之寄斯重舊勲之祀獲全丕變猖狂之徒咸躋仁壽之域旣弘在宥坐見止戈率土人臣孰不欣恱臣素乏方略謬荷寵光猥塵將相之名無施分寸之績遭逢若此報效蔑聞官謗巳興渥刑宜及陛下恩深覆載道務含弘恤公私餽餉之勤念吏士鋒鏑之苦特紆神筭昭發德音危疑獲安制宜惟固好生宥過誠陛下開網之仁尸一作有位無功重微臣素餐之責周章跼蹐胡顔自安但以遐守藩條恪居官次不獲叩謝雲陛陳露血誠未遂周任知止之言敢逃臧文竊位之咎無任代慰義陽公主薨臣某言伏承義陽公主薨伏惟聖懷傷悼增切伏以公主妍姿令則冠絶天人稟敎皇宫巳挺柔嘉之德降嬪卿族益彰貞粹之儀方期作範壼闈長榮邸第豈意遘兹短曆奄謝昌辰伏慮陛下軫念未捐深慈莫遣有虧常膳罷設宫懸臣子之情不任愓戀況聖凡禮異家國制殊伏願道齊殤彭理逹修短割肌膚之愛慰寰海之心率土人臣孰不相慰無任代慰王太尉薨臣某言伏承成德軍節度使太尉兼中書令王武俊今月某日薨殁伏以武俊生逢昌時天授忠節奮揚義勇茂建勲庸秩冠朝端參夑和於台鉉姻連戚里承嘉慶於雲霄榮掩等夷事髙今昔方膺作翰之寄遽迫歸泉之期鼎臣云亡梁木斯壞伏惟陛下君臣義重存殁感深臨冊禭以興懷聽鼓鼙而軫念臣恪居官守奉慰無階悲慟之誠有加常品劉夢得文集卷第十五, WYG: ''}
