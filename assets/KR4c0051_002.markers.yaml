  - {type: line-break, offset: 0, content: '', id: KR4c0051_SBCK_002-1a01}
  - {type: variant, offset: 0, length: 2807, content: 劉夢得文集卷第二古詩效阮公體偶作古調寓興昬鏡詞飬􅋧詞武夫詞賈客詞調瑟詞弔張曲江庭梅詠詠古詠史苦雨行萋兮吟經檀道濟故壘題欹器圖聚蚊謡百舌吟飛鳶操秋螢引華山謌磨鏡篇有獺吟效阮公體三首少年負志氣信道不從時只言繩自直安知室可欺百勝難慮敵三折乃良醫人生不失意焉能慕己知朔風悲老驥秋霜動􅋧禽出門有逺道平野多層隂滅没馳絶塞振迅拂華林不因感衰節安能激壯心昔賢多使氣憂國不謀身目覽千載事心交上古人侯門有仁義靈臺多苦辛不學腰如磬徒使甑生塵偶作二首終朝對罇酒嗜興非嗜甘終日偶衆人縱言不縱談丗情間盡見藥性病多諳寄謝嵇中散予無甚不堪萬卷堆牀書學者識其眞萬里長江水征夫度要津養生非但藥悟佛不因人燕石何須辨逢時即至珍古調二首軒后初冠冕前旒爲蔽明安知從複道然後見人情簿領乃俗士清談信古風吾觀蘇令綽朱墨一何同寓興二首常談即至理安事非常情寄語何平叔無爲輕老生丗途多禮數鵬鷃各逍遥何事陶彭澤拋官爲折腰昬鏡詞并引鏡之工列十鏡于賈奩發而視其一皎如其九霧如或曰良苦之不侔甚矣工解頥謝曰非不能盡良也蓋賈之意唯售是念今來市者必歷鑒周睞求與已宜彼皎者不能隱芒杪之瑕非美容不合是用什一其數也予感之作昬鏡詞昬鏡非美金漠然喪其晶陋容多自欺謂若他鏡明瑕疵旣不見妍態隨意生一日四五照自言美傾城飾帶以文繡裝匣以瓊瑛秦宫豈不重非適乃爲輕飬􅋧詞并引途逢少年志在逐禽獸方呼鷹隼以襲飛走因縱觀之卒無所獲行人有常從事於斯者曰夫􅋧禽飢則爲用今哺之過篤故然也予感之作養􅋧詞飬􅋧非玩形所資撃鮮力少年昩其理日日哺不息探雛網黃口旦暮有餘食寜知下韝時翅重飛不得毰毸止林表狡兔自南北飲啄旣巳盈安能勞羽翼武夫詞并引有武夫過詫余以從軍之樂翌日質于通武之善經者則曰果有樂也夫威恣而賞勞則樂用威雌而賞虣則樂橫去聲顧其樂安出耳予惕然作是詞武夫何洸洸衣紫襲絳裳借問胡爲爾列校在鷹揚依倚將軍勢交結少年場探丸害公吏袖刄妬名倡家産旣不事顧盼自生光酣歌髙樓上袒裼大道傍昔爲編戸人秉耒甘哺糠今來從軍樂躍馬飫峙粱猶思風塵起無種取侯王賈客詞并引五方之賈以財相雄而鹽賈尤熾或曰賈雄則農傷予感之作是詞賈客無定遊所遊唯利并眩俗雜良苦乗時取重輕心計析秋毫捶鈎侔懸衡錐刀旣無弃轉化日巳盈邀福禱波神施財遊化城妻約雕金釧女垂貫珠纓髙貲比封君竒貨通倖卿趨時􅋧鳥思藏鏹盤龍形大艑浮通川髙樓次旗亭行止皆有樂關梁自無征農夫何爲者辛苦事寒耕調瑟詞并引里有富豪翁厚自奉養而嚴督臧獲力屈形削然猶役之無何一旦不堪命亡者過半追亡者亦不來復翁悴沮而追昨非之莫及也予感之作調瑟詞調瑟在張絃絃平音自足朱絲二十五闕一不成曲美人愛髙張瑶軫再三促上絃雖獨響下應不相屬日暮聲未和寂寥一枯木却顧膝上絃流淚難相續弔張曲江并引丗稱張曲江爲相建言放臣不宜與善地多徙五谿不毛之郷及今讀其文張自内職牧始安有瘴癘之歎自退相守荆州一作南有拘囚之思託諷禽鳥寄詞草樹鬱然與騷人同風嗟夫身丗出於遐陬一失意而不能堪矧華人士族而必致醜地然後快意哉議者以曲江爲良臣識胡鶵有反相羞與凡器同列密啓廷爭雖古哲人不及而燕翼無似終爲餒魂豈忮心失恕隂謫最大雖二美莫贖邪不然何袁公一言明楚獄而鍾祉四葉以是相較神可誣乎予讀其文因爲詩以弔聖言貴忠恕至道重觀身法在何所恨色傷斯爲仁良時難乆恃隂謫豈無因寂寞韶陽廟魂歸不見人庭梅詠寄友人早花常犯寒繁實常苦酸何事上春日坐令芳意闌夭桃定相笑遊妓肯逥看君問調金鼎方知正味難詠古有所寄二首車音想轔轔不見纂下塵可憐平陽第歌舞嬌靑春金屋容色在文園詞賦新一朝復得幸應知失意人寂寂照鏡臺遺基古南陽眞人昔來遊翠鳯相隨翔目誠在桑野志遂貯椒房豈無三千女初心不可忘詠史二首驃騎非無勢少卿終不去世道劇頽波我心如砥柱賈生明王道衛綰工車戲同遇漢文時何人居貴位苦雨行悠悠飛走情同樂在陽和歳中三百日常苦風雨多天人信遐遠時節易蹉跎洞房有明燭無乃酣且歌萋兮吟天涯浮雲生爭蔽日月光窮巷秋風起先摧蘭蕙芳萬貨列旗亭恣心注明璫名髙毀所集言巧智難防勿謂行大道斯須成太行莫吟萋兮什徒使君子傷經檀道濟故壘萬里長城壞荒營野草秋秣陵多士女猶唱白符鳩史云當時人歌曰可憐白符鳩枉殺檀江州題欹器圖嬴相功成思稅駕晉臣名遂歎危機無因上蔡牽黃犬願作丹徒一布衣聚蚊謡沈沈夏夜間堂開飛蚊伺暗聲如雷嘈然欻起初駭聽殷殷若自南山來喧騰鼓舞喜昬黒昩者不分聦者惑露華滴瀝月上天利觜迎人看不得我軀七尺爾如芒我孤爾衆能我傷天生有時不可遏爲爾設幄潛藜牀清商一來秋日曉羞爾微形飼丹鳥百舌吟曉星寥落春雲低初聞百舌閒關啼花枝滿空迷處所摇動繁英墜紅雨笙簧百囀音韻多黃鸝吞聲鷰無語東方朝日遲遲昇迎風弄景如自矜數聲不盡又飛去何許相逢緑楊路綿蠻宛轉似娱人一心百舌何紛紜􅋳顔俠少停歌聽墮珥妖姬和睡聞可憐光景何時盡誰能低逥避鷹隼廷尉張羅自不關潘郎挾彈無情損天生羽族爾何微舌端萬變乗春輝南方朱鳥一朝見索漠無言蒿下飛飛鳶操鳶飛杳杳青雲裏鳶鳴蕭蕭風四起旗尾飄揚勢漸髙箭頭砉騞聲相似長空悠悠霽日懸六翮不動飛凝煙遊鶤翔鴈出其下慶雲清景相回旋忽聞飢烏一噪聚瞥下雲中爭腐鼠騰音礪吻相喧呼仰天大嚇疑鵷鶵畏人避犬投髙處俛啄無聲猶屢顧青鳥自愛玉山禾仙禽徒貴華亭露樸樕危巢向暮時毰毸飽腹蹲枯枝遊童挾彈麾肘臆碎羽分飛人不悲天生衆禽各有類威鳯文章在仁義鷹隼儀形螻蟻心雖能唳天何足貴秋螢引漢陵秦苑遥蒼蒼陳根腐葉秋螢光夜空寂寥金氣淨千門九陌飛悠揚紛綸暉映平明滅金鑪星噴燈花發露華洗濯清風吹攢茅不定招揺垂髙麗罘罳過珠網斜歷琁題舞羅幌曝衣樓上拂香裙承露臺前轉仙掌槐市諸生夜對書北牎分明辨魯魚行子東山起征思中郎騎省悲秋氣銅雀人歸自入簾長門悵望來照淚誰言向晦常自明童兒走步嬌女爭天生有光非自衒逺近低昂暗中見撮蚊祅鳥亦夜飛翅如車輪人不見華山謌洪鑪作髙山元氣鼓其橐俄然神功就峻拔在寥廓靈蹤露指瓜殺氣見稜角凡木不敢生神仙聿來託天資帝王宅以我爲關鑰能令萬國人一見換神骨髙山固無限如此方爲嶽丈夫無特逹雖貴猶碌碌磨鏡篇流塵翳明鏡歳乆看如漆門前負局生爲我一磨拂萍開緑池滿暈盡金波溢白日照空心圎光走幽室山神祅氣沮野魅眞形出却思未磨時瓦礫來唐突有獺吟有獺得嘉魚自謂天見憐先祭不敢食捧鮮望清玄人立寒沙上心專脰肩肩漁翁以爲祅舉塊投其咽呼兒貫魚歸與獺同烹煎關關黃金鶚大翅揺江煙下見盈㝷魚投身擘洪漣攫拏隱嶙去哺鶵林岳巔鴟烏欲伺隙遥噪莫敢前長居青雲路彈射無由縁何地無江湖何水無鮪鱣天意不宰割菲祭徒䖍䖍空餘知禮重載在淹中篇劉夢得文集卷第二劉夢得外集卷第二詩和微之深春好贈別白侍郎洛中戲呈馮尹荅白賔客始聞蟬有懷憶樂天樂天寄新詩月夜憶樂天詶令狐相公吟白君哭崔兒荅樂天所寄池北新葺水齋詶別樂天贈樂天詶別樂天醉荅樂天和樂天耳順吟見樂天題詩早夏郡中書事見元相公題名寄贈小樊憶春草報白君送令狐相公秋夕不寐冬日晨興詶樂天見寄荅樂天見憶誚失婢牓者晚逹喜崔賔客歸洛傷小姬英英洛下醉吟郡齋書懷詶樂天即事公主舊宅吟樂天自問中秋翫月秋日書懷詶貽賀金紫初冬早寒傷微之敦詩晦叔泛舟聮句杏園聮句醉中聮句興花池亭聮句西池聮句首夏猶清和聮句薔薇花聮句西池落泉聮句和樂天柘枝和題眞娘墓, WYG: ''}
