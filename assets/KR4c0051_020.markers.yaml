  - {type: variant, offset: 2420, length: 0, content: '', WYG: 光榮曲被猥承推食之恩駑蹇未施益重素餐之責舉其匕筯若負丘山無任戰荷踴躍之至為東都韋留守謝賜食狀具官臣某右臣今日發至長樂驛中使某奉宣聖㫖賜臣食者伏以味兼海陸品溢圓方降自御厨光臨傳舍臣初辭魏闕倍懐犬馬之誠猥受珍羞更切稻粱之感無任欣躍為裴相公進東封圖狀集賢殿御書院開元東封圖一面右臣謹按開元十三年𤣥宗皇帝以天下太平登封東岳聲明文物振耀古今伏惟陛下丕承耿光再闡鴻業祖宗盛事紹復有期臣所以寫成此圖輒敢上獻至於繢畫躬自指揮徵史氏之文纂禮容之要山川氣象悉擬真形羽衛威儀咸稽故實所冀叡情一覽遐想𤣥蹤臣叨榮過深抱疾巳久望陛下告成之日心必前知嗟老臣將謝之年身恐不見疾羸之際感激倍深前件圖謹差某官某謹詣光順門上進謹奏舉崔監察羣自代狀御史臺宣歙池等州都團練判官監察御史裏行崔羣右臣䝉恩授監察御史伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官在諸生中號為國器縶維外府人咸惜之臣既深知敢舉自代貞元十九年閏十月日舉開州栁使君公綽自代狀尚書屯田某官等守開州刺史栁公綽右臣䝉恩授尚書屯田員外郎伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官以賢良方正再敭王庭在流輩間號為端士昨除逺郡人皆惜之臣初䝉授官得以論薦多士之内非無其人竊惟用材宜自逺始謹具如前謹録奏聞伏聴敕㫖貞元}
