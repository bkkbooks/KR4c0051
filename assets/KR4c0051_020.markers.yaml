  - {type: variant, offset: 2418, length: 1, content: 卷, WYG: 巻十六欽定四庫全書劉賔客文集巻十七唐劉禹錫撰狀為淮南杜相公論新羅請廣利方狀淮南節度觀察處置等使敕賜貞元廣利方五巻右臣得新羅賀正使朴如言狀稱請前件方一部將歸本國者伏以纂集神效出自聖衷藥必易求疾無隠狀搜方伎之祕要拯生靈之夭瘥坐比華胥咸躋仁夀遂令絶域逖聴風聲美兹豐功爰有誠請臣以其久稱藩附素混車書航海獻琛既已通於華禮釋痾蠲癘豈獨隔於外區正當四海為家冀覩十全之效臣即欲冩付未敢自専謹録奏聞為京兆韋尹降誕日進衣狀衣一副四事黄折造衫一領白吳綾汗衫一領白花羅半臂一領白花羅袴一腰右伏以正陽令月誕聖嘉辰運協千年慶流萬國凡在臣子合有獻陳敢傾就日之心願奉如山之夀輕瀆宸扆無任兢惶為京兆李尹降誕日進衣狀衣一副四事右伏以水徳方清真龍下降天長地久瞻北極以常尊獻夀稱觴配南山而永固臣地居宗屬職忝尹京慶賀之誠倍萬常品前件衣服謹詣銀臺門奉進輕瀆旒扆伏用兢惶貞元十九年四月十九日為京兆韋尹進野猪狀右伏以收穫之餘田獵有獲異於芻豢著在方書既堪充庖輒敢上獻前件野猪謹隨狀進謹奏為杜相公自淮南追入長安至長樂驛謝賜酒食狀具官臣某右臣今日至長樂驛髙品某奉宣聖㫖賜臣酒食者伏以恩降王人榮分御膳未展儀於雙闕先受賜於八珍品越脤膰味兼醪醴頓驚凡口倍益歡心無任欣躍為杜相公謝就宅賜食狀具官臣某右髙品某奉宣聖㫖賜臣食者出自大官飫于私}
