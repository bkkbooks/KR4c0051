  - {type: variant, offset: 5267, length: 1561, content: 夢得外集卷第六律詩遊道林嶽麓寺和韓元二君子張籍逺寄長句詶湖州崔郎中喜韓吳興同遷秋日書懷歎梅雨酬嚴給事荅張祕書謝馬和中書即事見寄藍橋懷舊和裴侍中留別省中四松豐安里舊居李相公宴餞惠班竹杖楊給事製新樓春晚即事牛相公述舊詶鄭州權舎人和裴令公夜宴李侍郎惠藥物宫城早秋新墅溪竹追感韋裴六相和牛相公感傷和牛相公寓懷雨後寓懷林亭雨後偶成所寄太湖石和王尚書牛相公寓言南溪醉歌牛相公同遊詶大尹裴侍郎詶太原狄尚書詶崔大夫暮秋乆雨喜晴唐侍御寄遊道林嶽麓二寺詩并沈中丞姚貟外所和見徴繼作湘西古刹雙蹲蹲羣峯朝拱如駿奔青松歩障深五里龍官黯黯神爲􅕡髙殿呀然壓蒼巘俯瞰長江疑欲吞橘洲泛浮金實動水郭繚繞朱樓騫語餘百響入天籟衆竒引歩輕翻翻泉清石布博碁子蘿密鳥韻如簧言回廊架險髙且曲新徑穿林明復昬淺流忽濁山獸過古木半空天火痕星使雙飛出禁垣元侯餞之遊石門紫髯翼從紅袖舞竹風松雪香温馨逺持青瑣照巫峽一戞驚斷三聲猿靈山會中身不與吟想峭絶愁精魂恨無黃金千萬餅布地買取爲丘園遥和韓睦州元相公二君子玉人紫綬相輝映却要霜髯一兩莖其奈無成空老去每臨明鏡若爲情張郎中籍逺寄長句開緘之日巳及新秋因舉目前仰酬髙韻南宫詞客寄新篇清似湘靈促柱絃京邑舊遊勞夢想歷陽秋色正澄鮮雲銜日脚成山雨風駕潮頭入渚田對此獨吟還獨酌知音不見思蒼然詶湖州崔郎中見寄風箏吟秋空不有指爪聲髙人靈府閒律吕侔咸英昔年與兄遊文似馬長卿今來寄新詩乃類陶淵明磨礱老益智吟詠間彌精豈非山水郷蕩漾神機清渚煙蕙蘭動溪雨虹蜺生憑君虚上舎待余乗興行詶楊八庶子喜韓吳興與余同遷見贈依本韻次用早遇聖明朝鴈行登九霄吳興與余中外兄弟文輕傅武仲酒逼盖寛饒捨矢同瞻鵠當筵共賽梟吳興與余同年判入等第琢磨三益重唱和五音調臺栢煙常起池荷香暗飄吳興與余同爲御史臺外有蓮池也星文辭北極旗影度東遼吳興自度支郎中出爲行軍司馬所從即范僕射昔范眀友爲度遼將軍直道由來黜浮名豈敢要三湘與百越雨散又雲揺逺守慙侯籍徴還荷詔條顇容唯舌在別恨幾魂銷滿眼悲陳事逢人少舊僚煙霞爲老伴蒲柳任先凋虎綬懸新印龍理去橈斷腸天北郡攜手洛陽橋幢盖今雖貴弓旌㑹見招其如草玄客空宇乆寥寥秋日書懷寄河南王尹公府想無事西池秋水清去年爲狎客永日奉髙情況有臺上月如聞雲外笙不知桑落酒今歳與誰傾浙東元相公歎梅雨欝蒸之候因寄七言稽山自與岐山別何事連年鸑鷟飛百辟商量舊相入九天祗候謫仙歸平湖晚泛窺清鏡髙閤晨開掃翠微今日看書最惆悵爲聞梅雨損朝衣嚴給事賀加五品兼簡同制水部李郎中九天雨露傳青詔八舎郎官換緑衣初佩銀魚隨仗入宜乗白馬退朝歸雕盤賀喜開瑶席彩筆題詩出鎻闈聞道水曹偏得意霞朝霧夕有光輝裴相公大學士見示荅張祕書謝馬詩并羣公屬和因命追作草玄門户少塵埃丞相并州寄馬來初自塞垣銜苜蓿忽行幽逕破莓苔㝷花緩轡威遲去帶酒垂鞭躞蹀迴不與王侯與詞客知輕富貴重清才和司空裴相公中書即事通簡舊僚之作談笑在巖廊人人盡所長儀形見山立文字動星光日運丹青筆時看赤白囊佇聞戎馬息入賀領鴛行微之鎭武昌中路見寄藍橋懷舊之作悽然繼和兼寄安平今日油幢引他年黃紙追同爲三楚客獨有九霄期宿草恨長在傷禽飛尚遲武昌應巳到新柳映紅旗奉和裴侍中將赴漢南留別坐上諸公金貂曉出鳳池頭玉節前臨南雍州暫輟洪鑪觀劒㦸還將大筆注春秋管絃席上留髙韻山水途中入勝遊峴首風煙看未足便應重拜富人侯和兵部鄭侍郎省中四松詩十韻松是中書相公任侍郎時栽右相歷中臺移松武庫栽紫茸抽組綬青實長玫瑰便有干霄勢看成構厦材數分天柱半影逐日輪迴舊賞台階去新知谷口來息隂常仰望翫境幾徘徊翠粒晴懸露蒼鱗雨起苔凝音助瑶瑟飄蘂泛金罍月桂花遥燭星榆半對開終須似雞樹榮茂近昭回和蘇郎中㝷豐安里舊居寄主客張郎中漳濵卧起恣間遊宣室徴還未白頭舊隱來㝷通德里新篇冩出畔牢愁池看科斗成文字鳥聽提壷憶獻酬同學同年又同舎許君雲路竝華輈將赴蘇州途出洛陽留守李相公申宴餞寵行話舊形於篇章謹杼下情以申仰謝歳杪風物動雪餘宫苑晴兔園, WYG: ''}
