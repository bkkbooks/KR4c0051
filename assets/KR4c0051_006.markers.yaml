  - {type: variant, offset: 6962, length: 2102, content: 皆是郎吏詶淅東李侍郎越州春晚即事長句越中藹藹繁華地秦望峯前禹穴西湖草初生邊鴈去山花半謝杜䳌啼青油晝卷臨髙閣紅斾晴翻繞古堤明日漢庭徴舊德老人爭出若邪溪後漢劉寵爲㑹稽大治及徴還山隂縣有五六老叟自若邪山谷閒出人賫百錢以送寵勞之荅曰自明府下車民不見吏年老遇值聖明故奉送寵爲人選一大錢受之也詶淮南牛相公述舊見貽少年曽忝漢庭臣晚歳空餘老病身初見相如成賦日㝷爲丞相掃門人追思往事咨嗟乆喜奉清光笑語頻猶有登朝舊冠冕待公三入拂埃塵詶鄭州權舎人見寄十二韻朱户凌晨啓碧梧含早涼人從滎澤至書到漆沮傍抃㑹因佳句情深取斷章愜心同笑語入耳勝笙篁憶昔三條路居鄰數仞墻舎人舊宅光福時忝東鄰學堂青玉案彩服紫羅囊麟角看成就龍駒見柳楊彀中飛一箭雲際落雙鶬舎人一舉登科又判入等第甸邑叨前列天臺媿後行鄙人離渭南主簿十年舎人方尉此邑及罹譴謫重入南宫爲禮部郎中舎人方在考功貟外鯉庭傳事業雞樹遂翺翔書殿連鳴鵲神池接鳳凰追遊蒙尚齒惠好結中腸鄙人在集賢與西掖接近日夕追遊鎩翮方擡舉危根易損傷一麾憐弃置五字借恩光鄙人出牧姑蘇舎人草制汝海崆峒秀溱流芍藥芳風能行偃草境靜不爭桑鄙人轉臨汝舎人收滎陽轉斾趨關右頒條匝渭陽病吟猶有思老醉巳無狂塵滿鴻溝道沙驚白狄郷竚聞黃紙詔促召紫微郎奉和裴令公夜宴天下蒼生望不休東山雖有但時遊從來海上仙桃樹肯逐人閒風露秋病卧李侍郎見惠藥物謔以文星之句隱几支頥對落暉故人書信到柴扉周南留滯商山老星象如今屬少微詶留守牛相公宫城早秋寓言見寄曉月映宫樹秋光起天津涼風稍動葉宿露未生塵景氣尚芳麗曠望感心神揮毫成逸韻開閤遲來賔擺去將相印漸爲逍遥身如招後房宴却要白頭人牛相公留守旯示城外新墅有溪竹秋月親情多往宿遊恨不得去因成四韻兼簡洛中親故之什兼命同作別墅洛城外月明村墅通光輝滿地上絲管發舟中堤豔菊花露島涼松葉風髙情限清禁寒漏滴深宫和僕射牛相公追感韋裴元相登庸皆四十餘未五十薨殁豈早榮早枯之義今年將六十猶粗強徤因親故勸酒率然成篇并見寄之作坐鎭清朝獨殷然間徴故事數前賢用才同踐鈞衡地稟氣終分大小年威鳳夲池思泛泳仙查舊路望回旋猶憐綺季深山裏唯有松風與石田和僕射牛相公以離闕庭七年班行親故亡殁十無一人再覩龍顔喜慶雖極感歎風燭能不愴然因成四韻并示集賢中書二相公所和乆辭龍闕擁紅旗喜見天顔拜赤墀三省英寮非舊侣萬年芳樹長新枝交朋接武居仙院幕客追風入鳳池雲母屏風即施設可憐榮耀冠當時和僕射牛相公見示長句靜得天和興自濃不縁宦逹性靈慵大鵬六月有間意仙鶴千年無躁容流輩盡來多歎息官班髙後少過從唯應加築露臺上䞉見終南雲外峯和牛相公夏末雨後寓懷見示金火交爭正抑揚蕭蕭飛雨助清商曉看紈扇恩情薄夜覺紗燈刻數長樹上早蟬纔發響庭中百草巳無光當年富貴亦惆悵何況悲翁髮似霜牛相公林亭雨後偶成飛雨過池閣浮光生草樹新竹開粉奩初蓮爇香炷野花無時節水鳥自來去若問知境人人閒第一處牛相公題姑蘇所寄太湖石兼寄李蘇州震澤生竒石沈濳得地靈初辭水府出猶帶龍宫腥發自江湖國來榮卿相庭從風夏雲勢上漢古查形拂拭魚鱗見鏗鏘玉韻聆煙波含宿潤苔蘚助新青嵌穴胡鶵貌纎鋩蟲篆銘孱顔傲林薄飛動向雷霆煩熱近還散餘酲見便醒凡禽不敢息浮壒莫能停靜稱垂松蓋鮮冝映鶴翎忘憂常目繫素尚與心冥眇小欺湘鷰團圎笑落星徒然想融結安可測年齡採取詢郷耊搜求按舊經垂鈎入空隙隔浪動晶熒有獲人爭賀歡謡衆共聽一州驚閱寶千里逺楊舲覩物洛陽陌懷人吴御亭寄言垂天翼早晚起滄溟和陳許王尚書酬白少傅侍郎長句因通簡汝洛舊遊之什寥廓髙翔不可追風雲失路暫相隨方同洛下書生詠又建軍前大將旗雪裏命賔開玉帳飲中請號駐金巵竹林一自王戎去嵇阮雖貧興未衰和僕射牛相公寓言二首兩度竿頭立定誇回眸舉袖拂青霞盡抛今日貴人㨾復振前朝名相家御史近來休直宿尚書依舊趂參衙具瞻尊重誠無敵猶憶洛陽千樹花心如止水鑒常明見盡人閒萬物情鵰鶚騰空猶逞俊驊騮齒足自無驚時來未覺權爲祟貴了方知退是榮只恐重重丗縁在事須三度副蒼生和牛相公南溪醉歌見寄脫屣將相守冲謙惟於山水獨不廉枕伊背洛得勝地鳴臯少室來軒簷相去聲形面勢然指畫言下變化隨顧瞻清池曲榭人所致野趣幽芳天與添有時轉入潭島閒珍木如幄藤爲簾忽然便有江湖思沙礫平淺草纎纎怪石釣出太湖底珠樹移自天台尖崇蘭迎風緑泛豔坼蓮含露紅襜脩廊架空逺岫入弱柳覆檻流波霑渚蒲抽英劒脊動岸荻迸筍錐頭銛攜觴命侣極永日此會雖數心無猒人皆置莊身不到富貴難與逍遥兼唯公出處得自在決就放曠辭炎炎坐賔盡歡恣談謔媿我掉頭還奮髯能令商於多病客亦覺自適非沈濳詶僕射牛相公晉國池上別後至甘棠館忽夢同游因成口号見寄巳嗟池上別魂驚忽報夢中攜手行此夜獨歸還乞夢老人無睡到天明裴侍郎大尹雪中遺酒一壷兼示喜眼疾初平一絶有間行把酒之句斐然仰詶卷盡輕雲月更明金篦不用且間行若傾家釀招來客何必池塘春草生詶太原狄尚書見寄家聲烜赫冠前賢時望穹崇鎭北邊身上官銜如坐主幕中談笑取同年幽并俠少趨鞭弭燕趙佳人奉管絃仍把天兵書號筆逺題長句寄山川詶宣州崔大夫見寄白衣曽拜漢尚書今日恩光到弊廬再入龍樓稱綺季應縁狗監說相如中郎南鎭權方重内史髙齋興有餘遥想敬亭春欲暮百花飛盡柳花初詶皇甫十少尹暮秋乆雨喜晴有懷見示雨餘獨坐卷簾帷便得詩人喜霽詩揺落從來長年感慘舒偏是病身知掃開雲霧呈光景流盡潢汙見路𡵨何況菊香新酒熟神州司馬好狂時劉夢得外集卷第六, WYG: 撰}
