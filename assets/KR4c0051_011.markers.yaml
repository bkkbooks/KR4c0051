  - {type: variant, offset: 5092, length: 0, content: '', WYG: 月許人以新儒宫成来告且乞詞欲行乎逺也公名悰字永裕故丞相岐國公之孫岐公弼諧三帝碩學冠天下嘗著書二百餘篇言禮樂刑政古今損益統名曰通典蔵在石室副行人間今孝孫聿脩之形乎事業播于聲詩懿哉能世其家也禹錫昔年忝岐公門下生四參公府近年牧汝州道許昌躬閱其政故不得讓遂銘于麗牲之碑銘曰許分韓魏四征之地兵興已還其鬬㘖㘖亦有儒宫軋于兵間賢侯戾止思樂泮水俾人向學王化之始便地爰相新規鬱起廟貌斯嚴堂皇有煒秩秩禮物祁祁胄子入于門牆如造闕里春誦夏弦載颺淑聲風于閭閻浹于郊坰途讓班白家尊父兄與化而遷其猶性成昔之委巷相詬交侮今逢親戚不道媟語昔之連營誇力使酒今遇賔客斂容拱手魯有泮林鳥革其音許崇學斆民説其教鐫于圭石以志新廟唐故朝散大夫檢校尚書吏部郎中兼御史中丞賜紫金魚袋清河縣開國男贈太師崔公神道碑太師名倕字某清河東武城人太公望既封于營丘子伋嗣侯伋之孫曰穆伯食邑于崔遂以為氏後十四世至秦末東萊侯意如東萊之子伯基始居清河又十五葉生琰為魏名臣又九葉生休仕後魏為七兵尚書七兵之弟曰寅為樂安太守公即樂安八代孫始以門子補鄭州參軍力行好學於子道以孝聞處伯仲間以友聞讀易至編絶以精義聞至徳中戎羯猾夏王師出征公少有竒志思因時以自奮乃作伐鯨鯢賦上獻既聞爾矣果器之㑹第五丞相以善言利得幸盡付利權始有鹽鐵使之目慎選寮屬表公為介轉臨晉縣丞處繁應卒鋩刃不頓府罷再遷至太子司議郎韓晉公時為户部侍郎掌邦賦急於用材薦公為監察御史主河東租庸之務尋轉侍御史充京東平糴使建中初徳宗始親萬機儲精治本有漢宣與我共理之歎謂大臣求可當良二千石者遂以公帶本官權知袁州刺史期月有成詔書顯揚就加真秩益以金紫居無何韓晉公為丞相制國用思公前績乃傳召之抵京師授檢校户部郎中兼侍御史斡池鹽于蒲修牢盆謹衡石煎和既精飴散乃盈商通而荐至吏懼而循法民不絓網而國用益饒嵗杪㑹其所入贏羡什百詔下襃其能轉吏部正郎兼御史中丞且加五等之爵方倚以重任天富其材而不遐其福享齡六十有五貞元七年某月某日遘疾終于治所上聞悼之因降愍冊贈鄭州刺史賚錢三百萬以備飾終之禮明年某月某日返𦵏于成周之偃師從世墓也累贈至太師夫人隴西李氏汾州司倉參軍咸一之女生才子六人長曰邠及公時已為左拾遺後至太常次曰酆至太府卿次曰郾至外臺尚書次曰郇今為廷尉次曰鄯至執金吾季曰鄲今為太常卿同中書門下平章事惟夫人姑臧冠族以蘋蘩組紃輔佐君子為令妻積三十餘年以慈儉忠厚訓誡諸子為賢母二十有三年當永貞初順宗踐祚澤流累葉長子邠時為詞臣草冊書以文當進階遂上疏乞移榮於親優詔允之特封清河郡太君士林聳慕皆自痛其不及邠為太常酆為大農咸白髮貴綬以奉膳羞諸季各以簪裾給事左右愉愉然先意無違言世榮者舉無與比以子貴累封贈至涼國太夫人元和八年三月十六日捐館舍夀七十有九是嵗十月某日合祔惟太常及尚書暨今相國皆自中書舍人為禮部侍郎凡五貢賢能書得士百四十有八人言兄弟者許為人瑞崔氏之門六人皆入文昌宫其間三人歴八侍郎統而論之三大卿兩連率二翰林學士一執金吾言冠冕者許為世雄與姑臧李范陽盧世為婚媾入于姻黨無第二流言門閥者許為時表太常二子亦以才能同入尚書璜為吏部郎瓘為司勲郎其它支孫未登金閨籍者詵詵然魚貫而進文業甚似而孝謹不衰猗歟君子之澤其所從來逺而有光乎開成已未嵗七月甲辰相君受詔于明庭始操國柄仲月奉嘗事于家禮成起慕悄然永懐曰古者卿大夫廟有鼎墓有碑皆銘之以紀先徳也今備位宰相敢不敭前人之耿光乃俾家老條白事功咨扵學古者徴其詞尚信也又命宗祝卜柔日告于廟盡誠也儀甚備而敬有餘斯所謂達禮之君子遂刋勒如式掲于道周銘曰奕奕四姓崔為之冠瞻其門牆倬若雲漢善積家肥子孫多材如彼榱棟必生徂徠太公之後彌二千祀炯如貫珠焯見圖史顯允太師丕承徳基構于其堂亦既塈茨生逢艱虞戎夏交師獻賦伐叛忠存乎詞兵興事叢飛輓四馳歴踐劇職視屯如夷乃主平糴乃分竹使治粟為邦其道一致蒲實近地鹽為利泓使車來思剗弊立程吏亷商通嵗倍其贏奏課連最徳音襃明就加執法好爵兼榮天賦之才不與夀并生樹徳本没揚淑聲上聞軫懐侑樂為停贈禭之禮侔于公卿萬石貽訓根於孝友太丘種徳乃稔身後家有令子妻為夀母三十餘年人倫之首六子來侍如龍如虎衆婦來饋維筐及筥佩玉鳴環交響庭户申申秩秩歡不踰矩昔為甲族今為興門天爵人爵蔚然兩尊先徳䕃之黕如重雲孕和含粹濯潤本根景亳之原圖書之川陽陵帝壇磅礴回環世安其神世嗣其賢聆徳風者拜于碑前唐故宣歙池等州都團練觀察處置使宣州刺史兼御史中丞贈左散騎常侍王公神道碑常侍諱質字華卿始得姓自周靈王太子晉賔天而僊時人曰王子因去姬為王氐自秦漢以還世多顯名由今而上十有一代名傑仕元魏為并州刺史子孫因家遂為太原祁人并州六代孫名通字仲淹在隋朝諸儒唯通能明王道隠居白牛谿㳺其門皆天下儁傑著書行於世既没諡曰文中子文中生福祚為蔡州上蔡主簿上蔡生勉舉進士徴賢良皆上第仕至河中府寶鼎令寶鼎即公之曽祖也祖諱怡渝州司户參軍考諱潛揚州天長縣丞贈尚書吏部郎中公其季子也始文中先生有重名於隋末其弟績亦以有道顯於國初自號東臯子文章髙逸傳乎人間議者謂兄以大中立言弟游方外遂性二百年間君子稱之雖四夷亦聞其名字公雅有逺志常自忖度我大名之後不宜無見焉遂力學厚自淬琢扵春秋得其公是於禮得之約僑居淝水上躬督穡事善積於已而淮楚間羣彦多與之游公歉然自少無進取意與游者激之曰卿文儒家子篤志如是盍求發聞去聲俾家聲不頽今夫以文學茫洋當世者誰如華卿庸自棄耶入謀于閨門咸以外言為是因決䇿而西在貢士籍天和内充不以時尚屑意角逐攻取初無此心如楩楠生于深林未始自貴而度材者一眄歆然在懐故以不争而速售既登第東諸侯交辟之從主者書記于嶺南授正字㕘謀于淮右進協律郎其後佐許下暨梓潼南梁率為上介官至兼監察御史司憲聞其賢徴入南臺轉殿内歴侍御史改尚書户部外郎復為知已所薦遷檢校司封郎中攝御史中丞紫衣金章充山南西道節度副使入為尚書户部郎中以方雅特立除諌議大夫㑹宋丞相坐狷直為飛語所陷抱不測之罪大僚進言無益公率諫官數輩日晏伏閤上為不時開便殿公於旅進中獨感激雪涕居多由是上怒稍解得從輕比公終以言責為憂求為虢州刺史宰相惜去又重違誠請増之以兼御史中丞用示異於人也大凡以智謀而進者有時而衰以朴厚而知者無迹而固公雅為今揚州牧賛皇公所知人不見其迹方其虢略賛皇入相擢為左曹給事中凡有大官缺必寵薦居數月遷河南尹又未㡬鎮宛陵是三者中外所注意不旬嵗而周歴之時論不以為黨河南帝之别京其治尚體度風采而别白區處之宣城國之奥壤其治在束吏恵下蘇罷羸讋剽輕而勞徕澄汰之公兩得其道不由一檢率身以儉而素風存任人以誠而羣務舉遇中貴人以禮而故態革内潔其志下盡其忠外無以撓扵理三者具求政之有秕曷由哉在鎮三載開成元年十二月八日薨于位享年六十三監軍使上言有詔軫悼不視朝贈左散騎常侍明年八月十一日𦵏于河南府永寧縣洛川鄉史原從舊阡也初公娶于滎陽鄭氏生三女而没今葢祔焉一子曰慶存方齓矣猶子前太原府㕘軍扶執宗長書来請曰扶也蚤孤荷世父常侍之覆露今其嗣幼未任克家姑封琴書司管鑰以俟其長竊懼世父之徳音不敭思有以垂于後者以誠告于従叔大司農復命曰俞謹礱貞石以乞詞無忽余昔為郎與常侍同列已熟其行實及讀墓誌即今丞相益州牧趙郡李公之文自稱為忘形友其在宣州李公再入相議以第一官處之牢讓不取羔鴈所禮則河東裴夷直天水趙晢隴西李行方呉郡陸紹梁國劉蕡博陵崔珦人咸曰得士夫揚州少與也而見器益州寡合也而見親六從事才不一也而畢樂用是足以觀徳庸可勿紀焉銘曰隋有文中紹敭㣲言當時偉人咸出其門粹氣紆餘鍾于後昆常侍恂恂文中來孫發源髙麓中沫後大蘭牙茁然秀出叢薈善不近名其聲日彰行勇於退其道愈光哲者知之寘于周行以正持憲以文為郎以和佐戎以恵臨邦以直司諫以公駮政守于三川頑民底定乃鎮于宣先馳淑聲邑中婆娑瞻我斾旌問誰詢謀濟濟君子問誰出内潔潔亷士道本乎心暢于四支治本乎正形于百為黠吏斂手齊民揚眉江淮藪空夜柝弗施公卧于齋邦民悽悽公衣升屋邦民行哭牙璋斯来栁翣言旋棠樹未老周人慕焉熊耳之陽泱泱洛川佳城在兹既固且安松楸飋然石馬矯然過者必敬宛陵之阡唐故邠寧慶等州節度觀察處置使朝散大夫檢校户部尚書兼御史大夫賜紫金魚袋贈右僕射史公神道碑僕射名孝章字得仁本北方之强世雄朔野其後因仕中國遂為靈武建康人曽祖道徳贈右散騎常侍封懐澤郡王祖周洛銀青光禄大夫檢校太常卿兼御史中丞北海郡王贈太子太保考憲成蚤以武勇絶人積功至魏博節度使終于河中晉絳慈隰等州節度觀察使檢校司徒兼侍中河中尹贈太保其薨也大臣中書令晉國公裴氏為之碑其名益顯公即侍中之元子母曰冀國夫人李氏幼而聰寤父母賢而加愛焉及長好學遷善秀出儕輩鄴下諸兒號為書生元和中太尉愬為魏帥下令掄材於轅門取大將家翹秀者為子弟軍列于諸校之上公獨昌言願效文職太尉深竒之遂假魏州大都督府㕘軍長慶二年常山衆叛害其帥沂國公田司徒於帳下沂公發跡于魏人猶懐之詔命其子布以尚書授鉞統魏兵問罪于北疆且報家禍布既啟行士氣不振渙然内潰獨與冗從之旅偃旗而歸百憤攻中卒自引決先侍中時為中軍都知兵馬使兼御史中丞全師在野鬨然推戴之請為假侯以鎮定中貴人飛驛上聞穆宗夜召翰林學士草詔書以真侯命之實有魏土從衆而合權也是嵗公自攝官轉本府士曹㕘軍兼監察御史賜朱衣銀印推恩以及子也一旦跪於父母前進苦言曰臣竊惟大河之北地雄兵精而天下賢士心侮之目曰河朔間視猶夷狄何也蓋有土者多乗兵機際㑹非以義取今臣家父侯母封化為貴門君恩至矣非痛折節礪行彰信於朝廷無以弭識者之譏寤明君之意節著於外福延于家乗時蹈機禍不旋踵言訖泣下數行父俞母賛天性交感三心既叶萬衆潛化天子聞而嘉之曰彼真有子乃授檢校太子左諭徳兼侍御史充節度副使累遷至散騎常侍兼御史大夫賜金印紫綬既貳軍政事如命卿弛張損益得以㕘決潛革故態人知嚮方太和二年滄景節度使李全略卒其子同捷竊據故地詔下以文告弗革遂用大刑先侍中表請率先諸侯使元子以督戰制曰可公承君父之命乃捐其軀一舉而下平原壓滄壘由是加工部尚書及王師凱旋上表願一識承明廬詔允之遂赴北闕下得覿於便殿上曰嚮吾始征滄州議者皆曰彼魏之姻也慮隂為寇謀吾發使數輩以偵之其還也僉曰爾父瀝款於賔筵爾毋抗詞於簾下願絶姻以立效其經始啓發出於爾心今滄海底平䇿勲之日宜貴爾三族命爾父為侍中遷鎮于近地加爾禮部尚書析相衞澶三州為鎮以居之俾爾一門大榮以誇天下公拜稽首謝父遷讓已爵禮無違者翌日詔下于明庭人咸曰史氏之寵光古無有也牙旗碧幢方指東道侍中以帳下生變聞泰極而否當歌而哭迎柩于路仰天長號因𦵏于洛陽之邙山冀國夫人祔焉寢苫枕塊以所仇同天為大酷未㡬詔舉金革之義起為右金吾將軍累表陳乞有司以違命督之輿疾即路間嵗擢授鄜坊丹延等州節度觀察處置等使居四年遷鎮于滑一嵗入為右領軍衞大將軍旋改右金吾大將軍又授鉞于邠土孟秋至治所首冬遘疾拜章入覲不克展和鸞鞗革之儀薨于靖恭里之私第享齡三十九當開成三年十月二十日上聞而悼之不視朝一日贈尚書右僕射明年二月歸𦵏于洛都夫人琅邪王氏祔焉繼室深澤縣君博陵崔氏有一子曰煥生七年而孤僕射之喪自復魄至𦵏當門户備祭祀建碑表皆縣君之能且命其家老具事功來請曰􅄔不恤家而憂幼嗣不知其先人之官業乞詞以傳于後也君子以為知禮謹書之銘曰斗極之下崆峒播氣鍾于侍中孔武且貴奉上致命宜昌後嗣僕射承之良弓不墜耳煩鉦鼓心説文字虎穴之中生此騏驥太和紀元滄景不䖍子弄父兵跳浪海壖有隣隂交蝟起雞連詔下薄伐艮隅騷然時惟侍中實統魏師蓄銳未發衆心危疑僕射為子陳謀盡詞興言涕零有感尊慈絶姻效節精貫神祗滄波底寧王師襃之乃遷元侯来鎮近畿乃胙元子别建旌麾一門四節焜燿當時倐忽變生魏郊紛披喬木雖大盲風不知干雲之臺列缺焚之哀哀孝嗣丁此大酷迎䕶幃輤𦵏于東洛訴天觸地血染縗服禮有金革詔書敦促不遂枕戈驟膺推轂雕隂白馬暨于邠谷雖榮三鎮不荷百禄綺紈之間珪組纍纍如彼晨葩日中而萎有妻名家有子稺齒行號執禮歸窆蒿里洛水之陽循邙之趾昭尊穆敬幽顯同理舊松新栢亦象橋梓刻石紀功垂千萬祀劉賔客文集巻三欽定四庫全書劉賔客文集巻四唐劉禹錫撰碑下釋門銘記附大唐曹溪第六祖大鑒禪師第二碑元和十一年某月日詔書追襃曹溪第六祖能公諡曰大鑒實廣州牧馬惣以疏聞繇是可其奏尚道以尊名同歸善善不隔異教一字之襃華夷孔懷得其所故也馬公敬其事且謹始以垂後遂咨於文雄今栁州刺史河東栁君為前碑後三年有僧道琳率以其徒由曹溪來且曰願立第二碑學者志也雖如來滅後中五百嵗而摩騰竺法蘭以經來華人始聞其言猶夫重昏之見曶爽後五百嵗而達摩以法來華人始傳其心猶夫昧旦之覩白日自達摩六傳至大鑒如貫意珠有先後而無同異世之言真宗者所謂頓門初達摩與佛衣俱來得道傳付以為真印至大鑒置而不傳豈以是為筌蹄邪芻狗邪將人人之莫已若而不若置之邪吾不得而知也按大鑒生新州三十出家四十七年而没百有六年而謚始自蘄之東山從第五師得授記以歸髙宗使中貴人再徵不奉詔第以言為貢上敬行之銘曰至人之生無有種類同人者形出人者智蠢蠢南裔降生傑異父乾母坤獨肖元氣一言頓悟不踐初地五師相承授以寳器宴坐曹溪世號南宗學徒爰來如水之東飲以妙藥差其瘖聾詔不能致許為法雄去佛日逺羣言積億著空執有各走其域我立真筌掲起南國無修而修無得而得能使學者還其天識如黒而迷仰見斗極得之自然竟不可傳口傳手付則礙於有留衣空堂得者天授佛衣銘并引吾既為僧琳撰曹溪第二碑且思所以辯六祖置衣不傳之㫖作佛衣銘曰佛言不行佛衣乃爭忽近貴逺古今常情尼父之生土無一里夢奠之後履存千祝惟昔有梁如象之狂達摩救世來為醫王以言不痊因物乃遷如執符節行乎復闗民不知官望車而畏俗不知佛得衣為貴壞色之衣道不在兹由之信道所以為寳六祖未彰其出也微既還狼荒憬俗蚩蚩不有信器衆生曷歸是開便門非止傳衣初必有終傳豈無已物必歸盡衣胡久恃先終知終用乃不窮我道無朽衣於何有其用巳陳孰非芻狗唐故衡嶽大師湘潭唐興寺儼公碑佛法在九州間隨其方而化中夏之人汩於榮破榮莫若妙覺故言禪寂者宗嵩山北方之人鋭以武攝武莫若示現故言神通者宗清涼山南方之人剽而輕制輕莫若威儀故言律藏者宗衡山是三名山為莊嚴國必有達者與山比崇南嶽律門以津公為上首津之後雲峯證公承之證之後湘潭儼公承之星月麗天珠璣同貫由其門者為正法焉公號智儼曹氏子世為郴之右姓兆形在孕母不嗜葷成童在侣獨不嗜戲其夙植因厚者歟生九年樂為僧父不能奪其志抱經笥入岣嶁山從名師執業凡進品受具聞經傳印皆當時大長老我入明門不住諸乘我行覺路徑入智地居室方丈名聞大千䕶法大臣多所賔禮嗣曹王臯之鎮湖南請為人師自是登壇莅事三十有八載由我得度者萬有餘人人持寳衣解瓔珞為禮公色受之謂門弟子曰彼以有相求我我以有為應之凡建寳幢修廢寺飾大像皆極其工應物故也元和十三年九月二十七日中夜具湯沐剃頤頂與門人告别即寂而視身與色無有壊相嗚呼豈生能全吾真故死不速朽將有願力邪余不得而知也問年八十二問臘六十一葬于寺東北隅傳律弟子中巽道準傳經弟子圓皎貞璨與其徒圓靜文外恵榮明素存政等欲其師之道光且逺故咨余乞詞乃作長句偈以銘之曰祝融靈山禹所治非夫有道不可止中有毗尼出塵士以津視儼猶孫子登壇人師四十祀南方學徒宗奥㫖幼無童心至兒齒識滅形全異凡死長沙潭西幾五里陶侃故居石頭寺門前一帶湘江水吁嗟律席之名兮與湘流而不巳牛頭山第一祖融太師新塔記初摩訶迦葉授佛心印得其人而傳之至師子比丘凡二十五葉而達摩得焉東來中華華人奉之為第一祖又三傳至雙峯信公雙峯廣其道而岐之一為東山宗能秀寂其後也一為牛頭宗巖持威鶴林徑山其後也分慈氏之一支為如來之别子咸有祖稱粲然貫珠大師號法融姓韋氏延陵人少為儒博極羣書既而歎曰此仁誼言耳吾志求出世間法遂入句曲依僧炅改逢掖而緇之徙居是山晏坐石室以慧力感通故旱麓泉涌以神功示現故皓雪蓮生巨蛇摧伏羣鹿聴法貞觀中雙峯過江望牛頭頓錫曰此山有道氣宜有得之者乃來果與大師相遇性合神授至于無言同躋智地密付真印掲立江左名聞九圍學徒百千如水歸海由其門而為天人師者皆脈分焉顯慶二年報身示滅道在後覺神依故山戒香不絶龕坐未飾夫豈不思乎葢神期冥數必有所待太和三年潤州牧浙江西道觀察使檢校禮部尚書趙郡李公在鎮三閏百為大備尚理信古儒𤣥交修始下令禁桑門販佛以眩人者而於真實相深達焉常謂大師像設宜從本教言自我啟因自我成乃召主吏籍我月入得緡錢二十萬俾秣陵令如符經營之三月甲子新塔成事嚴而工人盡蓻誠達而山神來䕶願力既從衆心知歸撞鍾告白龍象大㑹諸天聲香之藴如見如聞即相生敬明幽同感尚書欲傳信于後逺命愚志之夫上士解空而離相中士著空而嫉有不因相何以示覺不由有何以悟無彼達真諦而得中道者當知為而不有賢乎以不修為無為也袁州萍鄉縣楊岐山故廣禪師碑天生人而不能使情欲有節君牧人而不能去威勢以理至有乘天工之隙以補其化釋王者之位以遷其人則素王立中區之教懋建大中慈氏起西方之教習登正覺至哉乾坤定位而聖人之道參行乎其中亦猶水火異氣成味也同徳輪轅異象致逺也同功然則儒以中道御羣生罕言性命故世衰而寖息佛以大悲救諸苦廣啟因業故刦濁而益尊自白馬東來而人知像教佛衣始傳而人知心法𢎞以權實示其攝修味真實者即清淨以觀空存相好者怖威神而遷善厚於求者植因以覬福罹於苦者證業以銷寃革盜心於冥昧之間泯愛縁於死生之際隂助教化總持人天所謂生成之外别有陶冶刑政不及曲為調柔其方可言其㫖不可得而言也惟四海之大羣倫之富必有以得其門而㑹其宗者為世導師焉禪師諱乘廣其生容州姓張氏七嵗尚儒以俎豆為戲十三慕道遵壊削之儀至衡陽依天柱想公以啟初地至洛陽依荷澤㑹公以契真乘洪鐘藴聲扣之斯應陽燧合焰晞之乃明始由見性終得自在常謂機有淺深法無髙下分二宗者衆生存頓漸之見説三乘者如來開方便之門名自外得故生分别道由内證則無異同遂以攝化為心經行不倦愍彼南裔不聞佛經由是結廬此山心與境寂應念以起教隨方而立因居涉旬而善根者知歸逮周月而帶縛者漸悟以月倍日以年倍時瘖矇洞開荒憬潛革邑中長者十方善衆咸發信願大其藩垣法堂四阿股引僧舍身心恒寂象馬交馳墮其去來皆得利益踰嶺之北涉湘而南仰兹髙山知道有所在此地縁盡翛然化俱神歸佛境悲結人世自趺坐而滅至于茶毗三百有六旬矣爪髮加長容澤差衰真子號呼圍繞薪火得舍利如珠璣者數十百焉於戲肖圓方之形故寂滅以示盡入菩提之位故殊相以現靈亦猶鳯毛成字麟角生肉必有以異不知其然於是服勤聞法之上首曰甄升乃率其徒圓寂道𢎞如亮如海等相與抆淚具役建塔于禪室之右端從衆也初廣公始生之辰嵗在丁巳當𤣥宗之中元生三十而受且更臘五十二而終終之夕嵗直戊寅當徳宗之後元三月既望之又十日也後九年其門人還源以為崇塔以存神與建銘以垂休皆憑像寄懷不可以闕一謬謂余為習於文者故蠒足千里以誠相攻大懼其先師徳音與時寖逺且曰白月中黒東川無還颺于金石傳信百刧彼墮淚之感豈儒家者流專之敬酬斯言銘示真俗文曰如來説法徧滿大千得勝義者强名為禪至道不二至言無辯心法東行羣迷丕變七葉無嗣四魔潛扇佛衣生塵佛法如綿吾師覺者冥極道樞承受密印端如貫珠一室寥然髙山之隅為法來者千百人俱裔民嗤嗤户有犀渠攝以方便家藏佛書願力既普度門斯盛合為一乘散為萬行即動求靜故能常定絶縁離覺乃得究竟生非我樂死非我病現滅者身常圓者性本無言説付囑其誰等空無得後覺得之像閟虚塔迹留仁祠十方四輩瞻禮於斯䕫州始興寺移鐵像記佛薪盡于乾竺而象教東行是法平等故所至為淨土是身應供故隨念如降生先是魚復人有以利金為彌勒像者重千鈞晬容瑞相人天兩足鳬氏卒事而它工未備故寓于西偏不知其㡬年矣寺僧法照瞻禮發信赤肩白足入諸大城乃至聚落無空過者積十餘年得信財無量繇是購工以嘗巧募徒而畢力四輩増増工麾以肱中樞外脈隂轉陽動欻如地踴岌如山行大匠無言尊容嚮明青蓮承趺金獸捧持藻井花鬘葱蘢四垂邑人膜拜如佛出世法照以願力能就泣于佛前因持片石乞詞以示後按此寺始於宇文周初瀕江碑庳皇唐神龍中為水所壞有波那賴耶國僧廣照浮海而至頓錫不去遂移於今道場所山曰磨刀嶺曰虎岡其經始與克修皆蕃僧是力後之有志者豈無人哉法照䕫人姓穆氏年十有五出家依江陵名僧受具肇自貞元二十年甲申歸此寺願崇建有為凡修大殿立菩薩大弟子侍佛左右逮長慶癸卯有成其善植徳本者歟毗盧遮那佛華蔵世界圖讃佛説華嚴經直入妙覺不由諸乘非大圓智不能信解徳宗朝有龍象觀公能於是經了第一義居上都雲華寺名聞十方沙門嗣肇是其上足以經中九㑹纂成華藏俾人瞻禮即色生敬因請余讃之即説讃曰清淨不染花中蓮捧持世界百億千踴出香海浩無邊風輪負之晝夜旋大雄九㑹化諸天釋梵八部來森然從昏至覺不依縁初初極極性自圓寫之綃素色相全是色非色言非言成都府新修福成寺記益城右門銜大逵坦然西馳曰石笋街街之北有仁祠形焉直啟曰福成寺寺之殿臺與城之樓交錯相輝繡于碧霄望之如崑閬間物太和四年蜀帥非將材不修邊備南詔君長諜得内空乘隙坌入鬬于城下或縦火以駭衆此寺乃焚髙門修廊委為寒燼如是者再嵗帝念坤維丞相復來山川如迎父老相識環視故地寺為燋墟載興起廢之歎爰有植因之願乃命主俸吏以吾緍錢三十萬為經營之基自公來思蜀號無事時康嵗稔人樂檀施公言既先應如決川乃傾囊褚乃出懷袖勝因化愚慧力攝慳男奔女驟急於徴令匠者度材以指衆徒藝者運思以役衆技斤鋸磨礱丁丁登登陶者儲精圬者效龍欻自火宅復為金繩沿故鼎新因毁成妍華夷縱觀萬目同聳既告訖役公來慶成雲鮮日潤輝映前後於是都人舞抃而謠曰昔公去此福成以燬今公重還福成復完民安軍治亦如此寺庸可勿紀乎公實聞斯言遂折簡見命謹月而日之時太和某年某某月日大檀越具官封爵段氏其它發大願者程功董事者自中貴人及賔寮將吏若僧徒偕籍之而刻于石劉賔客文集巻四欽定四庫全書劉賔客文集巻五唐劉禹錫撰論上}
