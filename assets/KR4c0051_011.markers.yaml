  - {type: variant, offset: 5090, length: 0, content: '', WYG: 三請如式以奉宗廟制曰可是嵗仲冬申命長男孟堅祔其主于三室明年公入為御史大夫復以十二月躬行烝祭間嵗公出梁州就拜司空禮崇異數廟加祀室太和二年増新室既成祔顯考于尊位告饗由禮觀之者以為世程第一室曰上儀同􅃎州别駕府君諱元政以妣博陵崔氏配第二室曰湖州安吉縣令贈尚書刑部員外郎府君諱實以妣贈扶風縣太君馬氏配第三室曰朝散大夫青州司馬贈户部侍郎府君諱祚以妣贈武威郡太夫人賈氏配第四室曰温州刺史贈太尉府君諱冕以妣贈魯國太夫人博陵崔氏配初周靈王太子晉遇浮丘公化為神􅋖時人號曰王家其後遂以命氏顯於秦者曰翦三世將秦師子孫分居晉代間東漢有徵君霸霸孫甲亦號徵君徙居祁縣為著姓故至于今為太原人自漢涉魏益以熾昌凡十葉至後魏度支尚書廣陽侯冏廣陽有二子神念神感神念南奔梁神感北仕齊惟儀同府君廣陽侯五代孫也唐興于太原實従義旗佐成王業故有開府儀同之寵惟刑部府君以功臣子理二邑不躋貴仕故有錫羨後大之祥惟户部府君幼孤以孝聞於鄉曲未冠以文售於有司由前進士補延州臨安縣主簿㑹詔徵賢良策在甲科授瀛州饒陽尉嵗滿遷渭南天后在神都而東畿差重遂由渭南轉河陽適逢建萬象神宫甸内吏分董其役因上書切諫繇是名益聞開元初以大理司直馳軺車聨讞大獄閩禺朔漠所至決平蚤以欒棘傷生晚成劇恙樂就夷曠故不至大官惟太尉府君生於治平時以文學自奮年十有五賁然従秋賦明年春升名于司徒又一年𤣥宗御層樓發徳音懸文詞政術科以罝髦士府君策最髙授太常寺太祝未㡬復以能通道徳南華沖虛三真經進盩厔尉天寳中歴右拾遺左補闕禮部司駕二外郎屬幽陵亂華遣兵南服因佐閩粤改檢校比部郎中行軍司馬時中原甫寧江南為吉地二千石多用名徳乃以府君牧温州朝廷虛公卿以俟髙第及聞訃永嘉人輟舂罷社搢紳間以不淑相弔焉雖位負于道而邁徳垂矩後之人得以纉承丕揚之其儲休啟祐有自云爾生三子皆聰明絶人長曰沼以神童仕至檢校禮部郎中次曰潔以竒文仕至國子司業今代郡公實季子也蚤在文士籍射策連中咸世其家貞元中徳宗聞其名自藍田尉召入禁中視草厥後三典書命再參内廷憲宗器之付以國柄翊賛有道雖冊免常居大僚今年自梁州請覲上思用舊臣為羽儀遂領太常其公府如故以一心事六君顯官重務靡不揚歴且夫起諸生至三公而心愈卑道益廣出授黄鉞以伯諸侯入服華章以謁家廟追崇極大位血食備多室享全榮而奉昭薦嗚呼公侯之孝歟宜書廟器以視喬公之三鼎其辭曰閟宇神庭邃清而嚴上公之儀四室耽耽犧以潔牲粢以大糦交神尚敬合魄尚氣子姪宗工駿奔奏事副笄侈袂儼恪居次孝孫兢兢執爵而升以祼以擩以伏以興水陸具來羶薌畢登列于圜方其器増増乃禴乃嘗敬而追逺二昭二穆孝以尊本瞻瞻几幄蹜蹜堂梱禮成起慕涕落𤣥衮濡露踐霜誰無永懐不如達者哀與榮偕逢時奮庸誰不得位不如仁人以道為貴惟公之達兮名以顯親惟公之仁兮徳以澡身六朝之清臣一代之全人宜其世家翼翼振振罔不肅祗于廟之門彭陽侯令狐氏先廟碑今上元年七月十三日汴州刺史宣武軍節度副大使知節度事汴宋亳等州觀察處置使銀青光禄大夫檢校禮部尚書兼御史大夫上柱國彭陽縣開國伯令狐公西嚮拜章上言守臣楚䝉被恩澤列為先侯得立家廟以奉常祀制書下其奏于有司於是善相考祥得地於京師通濟里居無何新廟成公以守藩故申命季弟監察御史定卜牲練日越八月丁亥祔饗三室塪墉以尚幽設幄以迎精禮無尤違神用寧謐第一室曰秦州上邽縣尉諱濬以妣太原王氏配第二室曰綿州昌明縣令贈吏部尚書諱崇亮以妣贈太原郡夫人河東柳氏配第三室曰太原府功曹參軍贈太子太保諱承簡以妣贈魏國太夫人富春孫氏配明年十月公由浚郊以介圭入覲真拜户部尚書進爵為魯侯既辭戎㫋得以列侯謁三廟是嵗南至上不視朝又得以時展祭先期致齋栗然以敬既齊盡志歆然永思奉其百順陳以具物始躋而處恭終獻而汍瀾既卒事顧麗牲之石宜有刋紀乃俾家老授其牒于所知云令狐晉邑也晉大夫魏顆以輔氏之功始封焉其易名曰文國語所謂令狐文子是已其先周文王之昭畢公髙之裔畢萬為晉卿始封于魏自萬至顆葢四世其後三十七世藍田侯蚪仕拓跋魏為燉煌郡太守子孫因家遂占數為郡人藍田之孫熈在隋為納言惟上邽府君納言之𤣥孫道克肖而位不至惟尚書府君西州之右族光未輝而徳已基惟太保府君志為君子儒以經明居上第調補陽安縣主簿歴正平尉汾州司法參軍陜州大都督府兵曹終于太原府首掾始以顓經進既仕旁通百家愛穀梁子清而婉左丘明國語辨而工司馬遷史記文而不華咸手筆朱墨究其㣲㫖愷悌以肥家信誼以急人徳充齒耋獨享天爵故休祐集于身後徽章流乎佳城凡以子貴承澤降命書告第者始贈尚書祠部郎中再贈禮部尚書三加右僕射四為今稱一作四進太保五為上公先夫人亦四徙封宻印纍纍邦族聳慕生三子皆才彭陽公為嗣次子從端實肅給今為檢校膳部郎中參河東軍事季子前所謂監察御史今主柱下方書温敏而有文綽綽然真令兄弟唯彭陽以詞筆取科名累參侍從由博士主尚書牋奏典内外書命遂登樞衡言文章者以為冠擁節總戎率身和衆留恵于盟津變風于浚都言方略者以為能夫浚師嚄唶難治乗釁竊發寖成習俗莅止五載飲和革心束馬來朝熊羆隕涕問公還期觴必祝之留為常伯旋命居守汴人聞公之東近而愈懐翹翹瞿瞿盡西其首言遺愛者可紀焉貴而率禮老而能慕怵惕乎霜露齋莊乎廟祧睦其仲季施及鄉黨言孝悌者歸厚焉勒銘于碑以代夷鼎文曰已孤之孝莫如備物顯顯新廟四阿三室時惟仲月卜用柔日醴醆苾芬牲牷博腯籩甒在堂蕭膋在庭孝孫烝烝躬若奉盈低簪委紳薦俎登鉶肹蠁交感涕流縁纓禮以備儀誠以致美祖考來格錫之丕祉工祝告訖退循軒戺乃授風人作詩以紀猗歟彭陽之寵光佐憲皇穆穆皇皇西省東臺迭為侍郎國之大政咨爾平章敬宗凝旒俾鎮雝丘入為地官令守東州彭陽之忠厚宜介福以夀東郊既釐可復朝右緜緜其胄系于周舊由我顯起必昌其後太和紀元作廟之首刻碑廟門龍集巳酉髙陵令劉君遺愛碑縣内之大夫鮮有遺愛在其去者葢邑居多豪政出權道非有卓然異績結于人心浹于骨髓安能久而愈思太和四年髙陵人李士清等六十三人思前令劉君之徳詣縣請金石刻縣令以狀申府府以狀考于明法吏吏上言謹按寳應詔書凡以政績將立碑者其具所紀之文上尚書考功有司考其詞宜有紀者乃奏明年八月庚午詔曰可今書其章明有以結人心者掲于道周云涇水東行注白渠釃而為三以沃闗中故秦人常得善嵗按水部式決洩有時畎澮有度居上游者不得擁泉而顓其腴毎嵗少尹一人行視之以誅不式兵興已還寖失根本涇陽人果擁而顓之公取全流浸原為畦私開四竇澤不及下涇田獨肥它邑為枯地力既移地征如初人或赴訴泣迎尹馬而占涇之腴皆權倖家榮勢足以破理訴者覆得罪繇是咋舌不敢言吞寃銜忍家視孫子長慶三年髙陵令劉君勵精吏治視人之瘼如熛疽在身不忍決去乃循故事考式文暨前後詔條又以新意請更水道入于我里請杜私竇使無棄流請遵田令使無越制别白纎悉列上便宜掾吏依囘不決居二嵗距寶歴元年端士鄭覃為京兆秋九月始具以聞事下丞相御史御史屬元谷實司察視持詔書詣渠上盡得利病還奏青規中上以谷奉使有狀乃俾太常撰日京兆下其符司録姚康士曹掾李紹實成之縣主簿談孺直實董之冬十月百衆雲奔憤與喜并口謡手運不屑鼛鼓揆功什七八而涇陽人以竒計賂術士上言田白渠下髙祖故墅在焉子孫當恭敬不宜以畚鍤近阡陌上聞命京兆立止絶君馳詣府控告具發其以賂致前事又謁丞相請以顙血汚車茵丞相彭原公歛容謝曰明府真愛人陛下視元元無所恡苐未周知情偽耳即入言上前翌日果有詔許訖役仲冬新渠成涉季冬二日新堰成駛流渾渾如脈宣氣蒿荒漚冒迎耜澤澤音釋開塞分寸皆如詔條有秋之期投鍤前定孺直告已事君率其寮躬勞俫之烝徒讙呼奮襏襫而舞咸曰吞恨六十年明府雪之擿姦犯豪䘚就施為嗚呼成功之難也如是請名渠曰劉公而名堰曰彭城按股引而東千七百步其廣四尋而深半之兩涯夾植杞柳萬本下垂根以作固上生材以備用仍嵗旱沴而渠下田獨有秋渠成之明年涇陽三原二邑中又􅗙其衝為七堰以折水勢使下流不厚君詣京兆索言之府命従事蘇特至水濵盡撤不當􅗙者繇是邑人享其長利生子以劉名之君諱仁師字行輿彭城人武徳名臣刑部尚書徳威之五代孫大歴中詩人商之猶子少好文學亦以籌畫干東諸侯遂參幕府歴尹劇縣皆以能事見陟率不時而遷既有績于髙陵轉昭應令俄兼檢校水曹外郎充渠堰副使且錫朱衣銀章計相愛其能表為檢校屯田郎中兼侍御史斡池鹽于蒲錫紫衣金章嵗餘以課就加司勲正郎中執法理人為循吏理財為能臣一出於清白故也先是髙陵人䝉被恵風而惜其捨去發於胸懐播為聲詩今采其㫖而變其詞志于石文曰噫涇水之逶迤溉我公兮及我私水無心兮人多僻錮上游兮亁我澤時逢理兮官得材墨綬繠兮劉君来能愛人兮恤其隠心既公兮言既盡縣申府兮府聞天積憤刷兮沈疴痊劃新渠兮百畎流行龍虵兮止膏油遵水式兮復田制無荒區兮有良嵗嗟劉君兮去翺翔遺我福兮牽我腸紀成功兮鐫美石求信詞兮昭懿績唐故朝議郎守尚書吏部侍郎上柱國賜紫金魚袋贈司空奚公神道碑嗚呼有唐清臣尚書吏部侍郎奚公貞元十五年十月甲子薨于位詔贈禮部尚書太常考行諡曰某是嵗臘月丁酉葬于萬年縣之某原後三十有四年子為諸侯為大夫門户有煒於是門下生琢石紀徳掲于我阡云公諱陟字殷衡其先在夏為車正以功封于薛下故以降為譙郡人或因仕適楚復之秦今為京兆人隋唐之際再世以明經為博士家有賜書曽祖簡亦以文學為太子司議郎大父乾繹仕至光州刺史烈考諱某有道而尚晦終徐州司功參軍贈和州刺史由子貴也天以大運生萬物而以正氣鍾賢人至和來宅其徳乃具公實有焉幼而擢陵苕之秀長而成清廟之器羣倫月旦咸以第一流處之及從鄉賦暨升名太常果居上第明年詔郡國徴賢良設四科以盡材公居文詞清麗之目授𢎞文館校書郎時徳宗新即位聲怛虜庭西戎畏威底貢内附詔諫議大夫崔河圖持節即虜帳以報之使臣欲盛其賔寮以自大遂嘿表公為介換大理評事除書到門公方為人子不敢許以逺稱病弗果行歸寧夀春養志盡敬丞相楊炎勇於用才擢公為左拾遺奉安輿而西未㡬再集荼蓼居後喪將闋是嵗建中四年京師急變黄屋順動狩于巴梁公徒行間道以歸王所既中月而詔授起居郎充翰林學士創鉅愈遲病不拜職改太子司議郎従大駕回入尚書為司金元士且參𣙜筦之務有頃持愍冊宣恩于薊門將行錫銀朱於青蒲上復命稱㫖轉吏部外郎是曹在南宫為眉目在選士為司命公執直筆閱簿書紛挐盤錯一瞬而剖時文昌缺左右丞都曹差重遂轉左司郎中尋遷中書舍人執事者繄公識精以斟酌大政非獨用文飾也㑹江淮間民被水禍上愍焉特命公宣撫之許以便宜及物赤車所至如東風變枯條其利病復奏咸可轉刑部侍郎時主計臣延齡以險刻貴倖而與京兆尹相惡以危事中之尹坐譴已又逮繫其吏峻繩之事下司宼主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽君子聞之善其知道不私刑曹既清以餘刃兼領選事居一年授權知吏部侍郎又一年即真是秩言能審官者本朝有裴馬盧李四君子物論以公嫓焉時得疾發癰有國醫方直禁中上促遣如第且敕之曰某賢臣也悉術以治之及有司以不起聞上震悼加等公娶琅邪王氏石泉公之曽孫友壻皆一時彦士長子某蚤不禄第二子敬則歴太僕少卿今為濮州刺史兼御史中丞賜金紫以連最就加貴秩俾視九卿第三子敬𤣥以詞蓺似續登文科歴左補闕今為尚書刑部郎中第四子炅舉進士最小子某咸砥礪纂修宜為名公家子其邁徳垂裕之光乎公少以名器自任及顯達急於推賢視其所舉則在西省薦權丞相由右史掌訓詞在中銓表楊僕射由地曹郎綜吏部二公後為天下偉人凡執文章權衡以揣量多士一入中禁考䇿詞三在天官第章句披沙剖璞由我而顯者落落然居多推是風鑒移于大冶則鎔範之内無非祥金嗟乎天不遐其福而孤民望使由庚之什不作於貞元中惜也初公既齊終詔贈大宗伯後以第三子在郎位被霈澤再追襃至司空故昔之葬儀用常伯而今之碑制用三公云銘曰仁麟智龍為瑞一辰未若君子瑞于人倫惟唐徳宗道類漢宣責實繩下風稜言言公丁斯時籍在雋賢從難表節執羈而還帝曰汝器黄流瑟然可為大僚左右化源乃飾王度乃馳輶軒既執刑柄亦操吏權陽和熈熈貯在顔間守法持正嶷如秋山火不侵玉倖臣畏服鳯鳴祥烟梟噪低跧帝方倚用天不假年公寐無寤其名愈逺門人達者赤舄𤣥衮公居甚卑其徳愈尊兩子朝服駢驅朱輪佳城何在胄貴之里螭首龜趺徳煇是紀嗚呼後人下拜于此劉賔客文集巻二欽定四庫全書劉賔客文集巻三唐劉禹錫撰碑中唐故福建等州都團練觀察處置使福州刺史兼御史中丞贈左散騎常侍薛公神道碑薛在三代為侯國介于鄒魯間傳世三十有一為齊所并其公子犇楚錫土田于沛漢末避仇之成都曹魏平蜀徙家汾隂遂為河東臨晉人自奚仲為夏車服大夫距今數千年乗軒服冕舄奕冠世言氏族者署為闗内甲姓天意若曰始有功於車服錫爾子孫世世有之公諱謇字某曽祖寶𦙍以名家子且有學行歴尚書郎雝州司馬邠州刺史王父繪有儁材刺三郡金宻緜皆以治聞累績至銀青光禄大夫封龍門侯烈考承矩以文亡害仕至大理丞公幼承前人之覆露補崇文生嵗滿得調主簿書于亳之譙苦二邑又尉于東畿之河清貞元中上方與丞相調兵食思得通吏治而習邊事者計相以公為對乃授監察御史裏行充京兆水運使局居鴈門主穀糴具舟檝募勇壯且便弓矢者為榜夫千有餘人隸尺籍伍符制如舟師詔以中貴人䕶之聲震塞上每發粟泝河北行涉戎落以饋縁邊諸軍及乗障者雖河塞回逺必克期如合符一嵗中省費萬計累加侍御史内供奉賜飛魚袋有司條白其勞入拜殿内史未㡬淮海節將以戎倅缺聞事下丞相御史擇可者僉曰公政事巳試遂授檢校户部外郎兼御史淮南軍司馬尋轉駕部郎中錫以金紫遇府遷申命真相趙國公帶中書侍郎代之公主行臺留務趙公文茵及境視置郵供帳及郊視將迎部伍下車視簾幃器備乃曰信竒才也此不足以展驥朝廷知之擢為泗濵守既報政就加御史中丞俄遷福建都團練觀察使閩有負海之饒其民悍而俗鬼居洞砦音寨家桴筏者與華言不通公兼戎索以治之五州民咸説元和十年某月某日薨于位年六十七贈左散騎常侍夫人趙郡李氏無兒蚤世繼夫人隴西李氏檢校禮部尚書河東節度使説之女生子凝為嗣季子茂𢎞以諸侯禮儀返塟故里蛾眉原従周也後二十有三年元曰開成凝為平盧従事謹按令甲礱碑石來乞詞以垂于悠久初公治粟于朔陲愚方冠恵文冠察行馬外事聆風相厚謂可妻也以元女歸之明年愚入尚書為郎職隸計司因白計相召公來㑹府行有日矣遇内禪惟新愚以縁坐左貶間闗外役竟不克面然而公之徳善灌注心耳孝悌為根柢誠明枝葉之直方為天質禮讓縁飾之所至藹然繇此道也公初下世故人丞相李太師誌其墓其畧曰𢎞深莊重幹敏絶人此與遊者傳信之詞也豈誣也哉故作銘曰河汾奫淪鼎氣歊雲散為昌光凝為賢人常侍之生其宗孔碩従祖昆弟詵詵三百文館入仕幽龍未光尺木為階欻然欲翔司會知材績宣朔方邊師萬喉俟我贏糧泝于黄河路出戎疆募乃勇士皁衣挽航膺索臂弧穹廬在旁虜聞公名憚不敢攘安北以南列城相望率有儲㣥皆成金湯入居殿中分巡輦下淮海軍大往為司馬軍中之治可移諸民乃牧于泗乃亷于閩閩悍而囂夷風脆急恩信綏之妥然如蟄閩方不淑天奪其福公薨于寢𤣥頳以復天王廢朝贈之金貂莓莓晉原鬱矣中條大墓舊阡松楸蕭蕭笳鼓以歸徳音孔昭許州文宣王新廟碑嵗在丙辰元曰開成許州牧尚書杜公作文宣王廟暨學舍于兊隅革故而鼎新也前年公受社與鉞且董淮揚汝南之師八月上丁釋菜于宣父之室陋宇荒階不足回旋巳事而歎乃詢黄髮有鄉先生前致辭曰自盜起幽陵許為兵衝連戰交捽率無寧嵗耳説鉦鼓不聞弦歌目不知書不害為智爾來生聚教養起居祖習壹出於軍容今幸天子憐許民為擇賢侯此人人思治之時也公曰諾吾當先後之於是元年修戎律以通衆志次年成郡政以蠲民瘼季年崇教本以厚民風我言既従乃卜新宫潩水之瀕城池在東登登其杵坎坎其斧繩之墨之鑿枘枝梧載塈載塗􅀈焉陵虛寝廟𢎞敞齋宫嚴閟軒墀廂廡儼雅清潔門庭牆仞望之生敬外飾觚稜中設黼幄嚮明當宁用王禮也堯頭禹身華冠象佩之容取之自鄒魯及門覩奥偶形畫像之儀取之自太學尊彞籩豆青黄規矩之器秉周禮也犧牲制幣薦獻陞降之節遵國章也蔵經于重檐斂器于庋櫝講筵有位鼓篋有室授經有博士督課有助教指蹤有役夫灑埽有廟幹公又割隙地為廣圃蒔其柔蔬而常菹㫖蓄之禦備捨己俸為子錢𣙜其孳贏而鹽酪釭膏之用給濟濟莘莘化行風驅家慕恭儉户知敬讓父誨其子兄規其弟不遊學堂與撻市同繇是縻勇爵戴鶡冠者往往弭雄姿而觀習禮矜甲胄者知根於忠信服縵胡者不敢侮逢掖教化之移人也如置郵焉冬}
