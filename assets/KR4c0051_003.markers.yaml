  - {type: variant, offset: 0, length: 3299, content: 劉夢得文集卷第三律詩春日退朝經九公主舊院作蜀先主廟觀八陣圖夜翫月許給事見示詩和崔舎人翫月和李相公早秋凱旋成詠武陵書懷經伏波神祠聞董評事疾贈髙大夫宿誠禪師山房晚泊牛渚罷郡歸洛陽間居城東間遊歸洛陽寄友人雪後眺望途中早發初至長安詔賜觀秋稼早秋集賢院金陵懷古池上亭獨吟蒙李相公書問和二相公述懐賀門下相公加冊命謝一二禪客病中見問春日退朝紫陌夜來雨南山朝下看㦸枝迎日動閣影助松寒瑞氣卷綃縠遊光泛波瀾御溝新柳色處處拂歸鞍經東都安國觀九公主舊院作仙院御溝東今來事不同門開青草日樓閉緑楊風將犬昇天路披霓赴月宫武皇曾駐蹕親問主人翁蜀先主廟漢末謡曰黄牛白腹五銖當復天下英雄氣千秋尚凜然勢分三尺鼎業復五銖錢得相能開國生兒不象賢淒涼蜀故妓來舞魏宫前觀八陣圖軒皇傳上略蜀相運神機水落龍蛇岀沙平鵝鸛飛波濤無動勢鱗介避餘威㑹有知兵者臨流指是非八月十五日夜翫月天將今夜月一遍洗寰瀛暑退九霄淨秋澄萬景清星辰讓光彩風露發晶英能變人閒世翛然是玉京許給事見示哭工部劉尚書詩因命同作從叔自渭北節度以疾歸朝比及拜尚書竟不中謝漢室賢王後從叔望在河閒孔門髙第人濟時成國器樂道任天眞特逹圭無玷堅貞竹有筠緫戎寛得衆布義貴能貧護塞無南牧馳心拱北辰乞身來闕下賜告卧漳濵榮耀初題劒清羸巳拖紳宫星徒列位隙日不逥輪自昔追飛侣今爲侍從臣素絃哀巳絶青簡歎猶新未遂揮金樂空悲撤瑟晨淒涼竹林下無復見清塵奉和中書崔舎人八月十五日夜翫月二十韻暮景中秋爽隂靈旣望圎騰精浮碧海分照接虞淵逈見孤輪出高從倚蓋旋二儀含皎澈萬象共澄鮮整御當西陸舒光麗上玄從星變風雨順日助陶甄逺近同時望晶熒此夜偏運行調玉燭絜白應金天曲沼疑瑶鏡通衢若象筵逢人盡冰雪遇境即神仙引素吞銀漢凝清洗緑煙臯禽警露下鄰杵思風前水是還珠浦山成種玉田劒沈三尺影燈罷九枝然象外行無迹寰中影有遷稍當雲闕正未映斗城懸靜對揮宸翰間臨襞綵牋境同牛渚上宿在鳳池邊興掩㝷安道詞勝命仲宣從今紙貴後不復詠陳篇奉和淮南李相公早秋即事寄成都武相公李中書自楊州見示詩夲因命仰和八柱共承天東西別隱然逺夷爭慕化眞相故臨邊竝進夔龍位仍齊龜鶴年相公詩有齊年並進之句同心舟巳濟造膝璧常聮對領專征寄遥持造物權斗牛添氣色井絡靜氛煙獻可通三略分甘出萬錢漢南趨節制趙北賜山川玉帳觀渝舞虹旌獵楚田歩嫌雙綬重夢入九城偏秋與離情動詩從樂府傳聆音還竊抃不覺撫幺絃元和癸巳歳仲秋詔發江陵偏師問罪蠻徼後命宣慰釋兵歸降凱旋之辰率爾成詠寄荆南嚴司空蠻水阻朝宗兵符下渚宫前籌得上策無戰巳成功漢使星飛入夷心草偃同歡謡開竹棧拜舞擲桑弓就日知冰釋投人念鳥窮網羅三面解章奏九門通卉服聮操袂雕題盡鞠躬降幡秋練白驛騎晝塵紅火號休傳警機橋罷亘空登山不見虜振斾自生風江逺煙波靜軍囬氣色雄佇看聞喜後金石賜元戎武陵書懐五十韻并序按天官書武陵當翼軫之分其在春秋及戰國時皆楚地後爲秦惠王所并置黔中郡漢興更名曰武陵東徙于今治所常林義陵記云初項籍殺義帝于郴武陵人曰天下憐楚而興今吾王何罪乃見殺郡民縞素哭于招屈亭髙祖聞而義之故亦曰義陵今郡城南東亭是其所也晉宋齊梁閒皆以分王子弟事存于其書永貞元年余始以尚書貟外郎岀𥙷連山守道貶爲是郡司馬至則以方志所載而質諸其人民顧山川風物皆騷人所賦乃具所聞見而成是詩因自述其出處之所以然故用書懐爲目云西漢開支郡南朝號戚藩四封當列宿百雉俯清沅髙岸朝霞合驚湍激箭奔積隂春暗度將霽霧先昬俗尚東皇祀謡傳義帝冤桃花迷隱迹練葉慰忠魂戸筭資漁獵郷豪恃子孫照山畬火動踏月俚歌喧擁楫舟爲市連甍竹覆軒披沙金粟見拾羽翠翹翻茗拆滄溪秀蘋生枉渚暄滄溪茶爲邑人所重措枉渚亦在郭東禽驚格磔起魚戲噞喁繁按夲草云紅日鷓鴣聲如鈎輈格磔是也沈約臺榭故李衡墟落存隱侯臺木奴洲並在湘靈悲鼓曲泉客泣酬恩露變蒹葭浦星懸橘柚村虎咆空野震鼉作滿川渾鄰里皆遷客兒童盡左言火天無洌井霜月見芳蓀清白家傳遺詩書志所敦列科叨甲乙從宦岀丘樊結友多心契馳聲尚氣吞士安曾重賦元禮許登門草檄嫖姚幕巡兵戊巳屯築臺先自隗送客獨留髠遂結王畿綬來觀衢室樽鳶飛入鷹隼魚目麗璵璠曉燭羅馳道朝陽闢帝􅕡王正㑹夷夏月朔盛旗幡獨立當瑶闕傳呵歩紫垣按章清犴獄視祭潔蘋蘩御曆昌期逺傳家寶炸蕃繇文光夏啓神教畏軒轅内禪因天性膺圖授化元繼明懸日月出震統乾坤大孝三朝備洪恩九族惇百川宗渤澥五岳輔崑崙何幸逢休運微班識至尊校緡資筦㩁復土奉山園時以夲官判度支鹽鐵等案兼充崇陵使判官一失貴人意徒聞太學論直廬辤錦帳逺守愧朱轓巢幕方猶鷰槍榆尚笑鯤邅逥過荆郢流落感涼温旅望花無色愁心醉不惽春江千里草暮雨一聲猿問卜安冥數看方理病源帶賖衣改製塵澀劒成痕三秀悲中散二毛傷虎賁來憂禦魅魑歸願牧鷄豚就日秦京逺臨風楚奏煩南登無㶚岸旦夕上髙原經伏波神祠蒙蒙篁竹下有路上壷頭漢壘麏鼯鬪蠻溪霧雨愁懷人敬遺像閱世想東流自負覇王略安知恩澤侯郷園辤石枉筋力盡炎洲一以功名累翻思馬少游聞董評事疾因以詩贈董生奉内典繁露傳家學青蓮譯梵書火風乖四大文字廢三餘欹枕晝眠晚折巾秋鬢踈武皇思視草誰許茂林居贈澧州髙大夫司馬霞寓前年収錦城焉踏血泥行千里追戎首三軍許勇名殘兵疑鶴唳空壘辨烏聲一誤雲中級南游湘水清宿誠禪師山房題贈二首宴坐白雲端清江直下看來人望金刹講席繞香壇虎嘯夜林動鼉鳴秋㵎寒衆音徒起滅心在淨中觀不岀孤峯上人閒四十秋視身如傳舎閱丗甚東流法爲因縁立心從次第修中宵問眞偈有住是吾憂晚泊牛渚蘆葦晚風起秋江鱗甲生殘霞忽改色逺鴈有餘聲戍鼓音響絶漁家燈火明無人能詠史獨自月中行罷郡歸洛陽間居十年江外守旦夕有歸心及此西還日空成東武吟花閒數盞酒月下一張琴聞說功名事依前惜寸隂城東間遊借問池臺主多居要路津千金買絶境永日屬間人竹徑縈紆入花林委曲循斜陽衆客散空鏁一園春罷郡歸洛陽寄友人逺謫年猶少初歸鬢巳衰門間故吏去室靜老僧期不見蜘蛛集頻爲僂句欺頴微囊未岀寒甚谷難吹濩落唯心在平生有己知商歌夜深後聽者竟爲誰陜州河亭陪韋五大夫雪後眺望因以留別與韋有布衣之舊經遷貶歸一别二紀雪霽大陽津城池表裏春河流添馬頰原色動龍鱗萬里獨歸客一杯逢故人因髙向西望關路正無塵途中早發中庭望啓明促促事晨征寒樹鳥初動霜橋人未行水流白煙起日上彩霞生隱士應髙枕無由知姓名初至長安時自外郡再受郎官左遷凡二紀重見帝城春老大歸朝客平安出嶺人每行經舊處却想似前身不改南山色其餘事事新大和戊申歳大有年詔賜百寮岀城觀秋稼謹書盛事以俟采詩者長安銅雀鳴秋稼與雲平玉燭調寒暑金風報順成川原呈上瑞恩澤賜間行欲及重城掩猶聞歌吹聲早秋集賢院即事時為學士金數巳三伏火星正西流樹含清露曉閣倚碧天秋灰琯應新律銅壷添夜籌商颷從朔塞爽氣入神洲蕙草香書殿槐花點御溝山明眞色見水淨濁煙收早歳忝華省再來成白頭幸依羣玉府有路嚮瀛州金陵懷古潮滿冶城渚日斜征虜亭蔡洲新草緑幕府舊煙青興廢由人事山川空地形後庭花一曲幽怨不堪聽晝居池上亭獨吟日午樹隂正獨吟池上亭靜看蜂敎誨間想鶴儀形法酒調神氣清琴入性靈浩然機巳息几杖復何銘分司東都蒙襄陽李司徒相公書問因以奉寄早忝金馬客晚爲商洛翁如名四海内多病一生中舉丗往還盡何人心事同幾時登峴首恃舊揖三公奉和吏部楊尚書太常李卿二相公䇿免後即事述懐贈荅十韻文雅關西族衣冠趙北都有聲眞漢相無纇勝隨珠當軸龍爲友臨池鳳不孤九天開内殿百辟看晨趨誡滿懲欹器成功别大鑪餘芳在公論積慶是神扶歩武離台席徊翔集帝梧銓材秉秦鏡典樂去齊竽蕭洒風塵外逢迎詩酒徒唯應待華皓更食萬錢廚門下相公榮加冊命天下同歡忝沐眷私輒敢申賀冊命岀宸衷官儀自古崇特膺平土拜光賛格天功再佩扶楊印常乗鮑氏騘七賢遺老在猶得詠清風病中一二禪客見問因以謝之勞動諸賢者同來問病夫添鑪壽鷄舌灑水淨龍鬚身是芭蕉喻行須卭竹扶醫王有妙藥能乞一丸無劉夢得文集卷第三劉夢得外集卷第三詩汴州新政書事對紫微花和令狐贈荅和謝蒲萄和送趙鍊師令狐相公賜詩詶令狐贈別詶寄賀遷拜詶早秋見寄和翫白菊寄令狐相公和贈竹和令狐入潼關和㝷白閣老雪中逰玄都觀南亭看雪別牡丹詶令狐留守春晚對花春日言懷令狐相公言懷聞思帝郷詶令狐相公謝令狐相公書問賀令狐相公重詶前寄秋懷詶令狐相公新詩詶寄詶令狐相公見寄歳暮逺懷詶令狐相公即事首夏間居庭前白菊謝季冬南郊宿齋題伏毒寺杏園花下飲和令狐相公題雙文瓜花題龍回寺晚泛漢江初栽桂樹早春南望詶令狐相公春思見寄新栽蕙蘭南齋小宴詠梔子花新蟬對黃白二菊花荅令狐相公荅令狐僕射, WYG: ''}
