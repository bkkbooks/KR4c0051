  - {type: variant, offset: 0, length: 4630, content: 劉夢得文集卷第二十五雜說弔馬文口兵戒猶子蔚適越戒觀愽觀市論書劉氏集略說名子說丞相府論學事魏生兵要述救沈志弔馬文馬乾類蓋健而善馳君子之所宜求爲獸也故法求於力或逸而喜駭求於和或乾而易仆由德而稱者鮮焉曩予知善馬之難遭也不求于肆而于其郷一旦果得隂山之阿蠖略其形蕭然其鳴長顧逺視順而能力顧其低軀非騫然而偉也雖士得以乗之始予被皂衣于朝朝之人多三四其壯一作牲以迭馭予無兼焉水轍之淋灕淖途之汪洋結爲确犖融爲拗堂前有僨輈後有濡裳我䇿垂空我鑣方揚振鬛軒昂矯如飛翔翹翹其雄也非力而何烈火之具舉鈎膺之疊舞一蹊千趾駢比齟齬㢁者斯擠悍者斯怒我鞍如山我轡如組弭毛容與宛若孤處靡靡其柔也非慧而何前日予之獲譴于闕下背商顔趣昭丘日中而踰舎循門之南非騎所宜夷則沮洳髙則􅋂巇虎咆空林䰥一作􅈮鬪荒馗風雨孤征簡書之威俾予弗顚我馬焉依屑屑其勞也非德而何予至武陵居沅水傍或踰月未甞跨焉以故莫得伸其所長跼蹐顧望兮頓望其鏁韁飲齕日削兮精耗氣傷寒櫪騷騷兮瘁毛蒼涼路聞躞􅰭兮巴馬騰驤朔雲深兮邊草逺意欲往兮聲不揚隤然似不得其所而死故其嗟也兼常初玄宗羈大宛而盡有名馬命典牧以時起居洎西幸蜀往往民閒得其種而蕃焉故良也色者率非中土類也稽是毛物豈祖於宛歟漢之歌曰龍爲友武陵有水曰龍泉遂歸骨于是川且弔之曰生于磧礰善馳走萬里南來困丘阜青菰寒菽何適口病聞北風猶舉首金壷巳平骨空朽投之龍荆從爾友口兵戒余讀蒙莊書曰兵莫慘於志鏌釾爲下缺然知志士之傷夫生也他日讀逺祖中壘校尉書曰口者兵也衋然知言之爲兵又慘乎志因愽考前載極其兩端夫志兵之薄人激烈抗憤不過無從容於世耳口兵之起其刑渥焉繇是知吾祖之言爲急作戒以書于盤盂五刃之傷藥之可平一言成痾智不能明人或罹兵道塗犇救投方效技思恐其後人或罹譖比肩狐疑借有解紛毀輒隨之故曰舌端之蘗慘乎楚鐵夷竈誠謀執戈以驅掩人誠智折笄以詈賢者誨予信其有旨發言之難伸舌猶爾辯爲詐謀黙爲德基玉櫝不啓焉能瑕疵犨麋深居孰謂可嗤我口之啓爾心之門無爲我兵當爲我藩以愼爲鍵以忍爲􅕡可以多食勿以多言猶子蔚適越戒猶子蔚晨跪于席端曰某㓜承叔父訓始勾萌至于扶踈前日不自意有司以名汚賢能書又自不意被丞相府召爲從事重兢累媿懼貽叔父羞今當行乞辭以爲戒余曰若知彞器乎始乎斵輪因人規矩中度外枵然而有容者理膩質堅後加宻石焉風戾日晞不副不聱五吏反然後青黄之鳥獸之飾乎瑶金貴在清廟其用也羃以養絜其藏也櫝以養光苟措非其所一有毫髮之傷儡然與破甑爲伍矣汝之始成人猶器之作朴是宜力學爲礱斵親賢爲青黃睦僚友爲瑶金忠所奉爲清廟盡敬以爲羃愼微以爲櫝去怠以護傷在勤而行之爾設有人思披重霄而挹顥氣病無階而升有力者揭層梯而倚泰山然而一舉足而一髙非獨揭梯者所能也尺大位未甞曠故世多貴人唯天爵并者乃可偉爾夫偉人之一顧踰乎華章而一非亦慘乎黥刖行矣愼諸吾見垂天之雲在爾肩腋閒矣昔吾友柳儀曹甞謂吾文俊而膏味無窮而炙愈出也遲汝到丞相府居一二日袖吾文入謁以取質焉丞相吾友也汝事所從如事諸父借有不如意推起敬之心以奉焉無忽觀愽客有以愽戲自任者遲余觀焉初主人執握槊之器寘于廡下曰主進者要約之旣揖讓即次有愽齒二異乎齒負之齒其制用骨觚稜四均鏤以朱墨耦而合數取應朞月視其轉止依以爭道是制也通行之乆矣莫詳所祖以其用必投擲故以博投詔之是日客抵骨于局且祝之曰其來如趨其去如脫事先赼趄命中無蹉跌無從彼呼無戾我詛分曹遒迫自朝至于日中稷而率與所祝異焉客視骨如有情焉如或憑焉悉詈之不泄又從而齕齧蹂􅏳之莫顧其十目之咍讓也乃曰非予術之不工是朽骼者不予卑也請刷恥于弈棊主人促命燭以續騖神黙計巧竭智匱主進者書勝負之數于牘視其所喪又倍前籍焉觀者曰以夫人之褊心亦將詬棊而抵枰矣旣乃恬而不恤𧹞然有失鵠求身之色人咸異之子劉子曰先人者制人愽投是巳從人者制於人枰棊是巳二者豈有數存乎其閒哉何處之勢異爾是知當軸者易生嫌而退身者易爲譽易生之嫌不足貶也易爲之譽不足多也在辨其所處而巳觀市由命士巳上不入於市周禮有焉乃今觀之蓋因也元和三年沅南不雨自季春至于六月毛澤將盡郡守有志于民誠信而雩遂徧山川方社又不雨遂遷市于城門之逵余得自麗譙而俯焉肇下令之日布市籍者咸至夾軌道而分次焉其左右前後班閒錯跱如在闤之制其列區牓揭價名物參外夷之貨馬牛有緯私屬有閑在巾笥者織文及素焉在几閣者彫彤及質焉在筐筥者白黒巨細焉業于饔者列饔饎陳䴵餌而苾然業于酒者舉酒旗滌盃盂而澤然鼓刀之人設髙俎解豕羊而赫然華實之毛畋漁之生交蜚走錯水陸羣狀夥名入隧而分韞藏而待價者負挈而求沽者乗射其時者竒贏以游者坐賈顒顒行賈遑遑利心中驚貪目不瞬於是質劑之曹較固之倫合彼此而騰躍之冒良苦之巧言斁量衡於險手抄忽之差鼓舌傖儜詆欺相髙詭態橫出鼓囂譁坌煙埃奮羶腥疊巾屨囓而合之異致同歸雞鳴而爭赴日中而駢闐萬足一心恐人我先交易而退陽光西徂幅貟不移徑如初中無求隙地俱爲守犬鳥烏樂得腐餘是日倚衡而閱之三感其盈虚之相㝷也速故著于篇云論書或問曰書足以記姓名而巳工與拙何損益於數哉荅曰此誠有之蓋舉下之說爾非蹈中之說亦猶言居室曰避燥濕而已言衣裳曰適寒燠而已言飲食曰充腹而巳言車馬曰代勞而已言禄位曰代耕而巳今夫考居室必以閌門豐屋爲美笥衣裳必以文章鮮澤爲甲評飲食必以精良海陸爲貴第車馬必以華輈絶足爲髙干禄位必以重侯累封爲意是數者皆不行舉下之說奚獨於書也行之邪禮曰士依於德游於藝德者何曰至曰敏曰孝之爲謂藝者何禮樂射御書數之爲謂是則藝居三德之後而士必游之也書居數之上六藝之一也語曰飽食終日無所用心難乎哉不有愽弈者乎爲之猶賢乎巳是則愽弈不得列於藝差愈於飽食無所用心爾吾觀今之人適有面詆之曰子書居下品矣其人必逌爾而笑或謷然不屑有詆之曰子握槊弈棊居下品矣其人必𧹞然而媿或艴然而色是故時敢以六藝斥人不敢以六博斥人嗟乎衆尚之移人也問者曰然則彼魏晉宋齊閒亦甞尚斯藝矣至有君臣爭名父子不讓何哉荅曰吾姑欲求中道爾子寧以尚之之弊規我歟且夫信者美德也秦繆尚之而賢臣莫贖黃老者至道也竇后尚之而儒臣見刑道德且不可尚矧由道德以下者哉所謂中道而言書者何處之文學之下六博之上材鈞而善者得以加譽遇鈞而善者得以議能所加在乎譽非實也不黷于賞所議在乎過非罪也不紊于刑夫如是庶乎六書之學不堙墜而巳乎劉氏集略說子劉子曰五逹之井百汲而盈科未必涼而甘所處之勢然也人之詞待扣而揚猶井之利汲爾始余爲童兒居江湖閒喜與屬詞者游謬以爲可教視長者所行止必操觚從之及冠舉秀才一幸而中說有司懼不厭於衆亟以口譽平之長安中多循空言以爲誠果有名字益與曹輩畋漁于書林宵語途話琴酒調謔一出於文章俄𬒳召爲記室參軍㑹出師淮上恒磨墨於楯鼻或寢止羣書中居一二歳由甸服升諸朝凡三進班而所掌猶外府或官課平或爲人所倩昌言奏記移讓告諭奠神誌葬咸猥并焉及謫于沅湘閒爲江山風物之所蕩往往指事成歌詩或讀書有所感輙立評議窮愁著書古儒者之大同非髙冠長劔之比爾前年蒙恩澤授以郡符居海壖多雨慝作適晴喜躬曬書于庭得已書四十通逌爾自哂曰道不加益烏用是空文爲眞可供醬蒙藥褚爾他日子壻愽陵崔生關言曰某也曏游京師偉人多問丈人新書幾何且欲取去而某應曰無有輒媿起於顔閒今當復西期有以弭媿者繇是刪取四之一爲集略以貽此郎非敢行乎逺也名子說魏司空王昶名子制誼咸得立身之要前史是之然則書紳銘器孰若發言必稱之乎今余名示長子曰咸允字信臣次曰同廙字敬臣欲示於人無賢愚於事無小大咸推以信同施以敬俾物從而衆恱其庶幾乎夫忠孝之於人如食與衣不可斯須離也豈俟余勗哉仁義道深非訓所及可勉而企者故存乎名夫朋友字之非吾職也顧名旨所在遂從而釋之孝始於親終扵事君偕曰臣知終也奏記丞相府論學事十一月七日使持節都督夔州諸軍事夔州刺史劉某謹奏記相公閤下凡今能言者皆謂天下少士而不知養材之道鬱堙而不揚非天不生材也亦猶不耕者不歎廩庾之無餘非地不産百榖也伏以貞觀中增築學舎千二百區生徒三千餘人時外夷上䟽請遣子弟入附于三雍者五國雖菁菁者莪育材之道不足比也今之膠庠不聞絃歌而室廬圯廢生徒衰少非學官不欲振舉也病無貲財以給其用鯫生今有一見使太學立富幸遇相公在位可以索言之禮云凡學官春釋奠于其先師斯禮止于辟雍頖宮非及天下也今四海郡縣咸以春秋上丁有事孔子廟其禮不應於古且非孔子意也炎漢初定羣臣皆起屠販爲公卿故孝惠髙后之閒置原廟於郡國逮孝元時韋玄成以碩儒爲丞相遂建議罷之夫以子孫尚不敢違禮以饗其祖況後學師先聖之道而首違之祭義曰祭不欲數語云祭神如神在與其煩於舊饗孰若行其教道今夫子之教日頽靡而以非禮之祀媚之斯儒者之所宜憤悱也竊觀歷代無有是事皇家武德二年詔於國學立周公孔子廟四時致祭貞觀十一年又詔修宣尼廟於兖州至二十年許敬宗等奏乃遣天下諸州縣置三獻官其他如方社敬宗非通儒不能典禮開元中玄宗嚮學與儒臣議繇是發德音其罷郡縣釋奠牲牢唯酒脯以薦後數年定令時王孫林甫爲宰相不渉學委御史中丞王敬從刋之敬從非文儒遂以明衣牲牢編在學令是首失於敬宗而終失於林甫習以爲常罕有敢非之者謹按夲州四縣一歲釋奠物之直緡錢十六萬有竒舉天下之郡縣當千七百不啻羈縻者不在數中凡歳中所出於經費過四千萬適資三獻官飾衣裳飴妻子而巳於尚學之道無有補焉前日詔書許列郡守臣得以上言便事今謹條奏某乞下禮官愽士詳議典制罷天下縣邑牲牢衣幣如有生徒春秋依開元敕旨用酒醴暇脩腒鱐榛栗示敬其事而州府許如故儀然後籍其資半附益所隷州使增學校其半率歸國庠猶不下萬計築學室具器用豐篹食增掌固以備使令凡儒官各加稍食其𥿄筆鈆黄視所出州率令折入學徒旣備明經日課繕書若干𥿄進士命讎校亦如之則貞觀之風粲然不殊其他郡國皆立程督投紱懷璽棫樸皇華良可詠矣伏惟相公發迹咸自諸生其尊素王之道儀形四方宜在今日是以小生敢㳂故事以奏記于左右姑舉其大較至於證據纎悉條奏具之章下之日某乞留神省察不勝大願惶恐拜手稽首魏生兵要述余爲書殿學士四年所與居皆鴻生彦士一旦詔下懷吳郡章而東門下生咸惜是行且曰吳中富士必有知書宜爲太守所禮者及下車閱客籍森然三千有鉅鹿魏生持所著書來謁曰不佞始讀書爲文章凡二十年在貢士中孤鳴甚哀卒無善聽者退而收視易慮伏北牎下考前言成兵要十編度諸侯未遑是事將笈而西求一言以生羽翼予取其書觀之始自黃帝伏蚩尤至于隋氏平江南語春秋戰國事最備磅礴下上數千年閒其攟摭評議無遺䇿用是以干握兵符貴人宜有虚巳而樂聞者子盍行乎吾知元侯上舎不獨善雞鳴彈長鋏三五九九之伎顓之而巳救沈志貞元季年夏大水熊武五谿鬪泆于沅突舊防毀民家躋髙望之溟涬葩華山腹爲坻林端如莎湍道駃悍不風而怒崱嶷前邁浸淫旁掩柔者靡之固者脫之規者旋環之矩者倒顚之輕而汎浮者硠礚之重而髙大者前却之生者力音殪者㢮形蔽流而東若木柹然有僧愀焉檐於路曰浮圖之慈悲救生最大能援彼於溺我當爲魁里中兒願從四三輩皆狎川勇游者相與乗堅舟挾善器維以脩䋏􅍻于崇丘水當洄洑人易寘力凝矑執用俟可而拯大凡室處之類穴居之彚在牧之羣在豢之馴上羅黔首下逮毛物拔乎洪瀾致諸生地者數十百焉適有摯獸如鴟夷而前攫持流枿首用不䧟隅目傍睨其姿弭然甚如六擾之附人者其徒將取焉僧趣音促訶之曰第無濟是爲自之可里所而不能有所持矣舟中之人曰吾聞浮圖之教貴空空生普普生慈不求報施之謂空不擇善惡之謂普不逆困窮之謂慈曏也生必救而今也窮見廢無乃計善惡而忘普與慈乎僧曰甚矣問之迷且妄也吾之教惡乎無善惡哉六塵者在身之不善也佛以賊視之末伽聲聞在彼之未寤也佛以邪目之惡乎無善惡也吾曏也所援而出死地者衆矣形乾氣還各復夲狀蹄者躑躅然羽者翹蕭然而言者諓諓然隨其所之吾不尸其施也不德吾則巳烏能害爲彼形之乾髬髵之姿也彼氣之還暴悖之用也心足反噬而齒甘最靈是必肉吾屬矣庸能躑躅諓諓之比歟夫虎之不可使知恩猶人之不可使爲虎也非吾自遺患焉爾且將貽患于衆多吾罪大矣子劉子曰余聞善人在患不救不祥惡人在位不去亦不祥僧之言逺矣故志之劉夢得文集卷第二十五, WYG: ''}
