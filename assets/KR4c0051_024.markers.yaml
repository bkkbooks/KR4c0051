  - {type: variant, offset: 2787, length: 2, content: 卷第, WYG: 巻六欽定四庫全書劉賔客文集巻七唐劉禹錫撰論下辯易九六論乾之爻皆九而坤六何也世之儒曰吾聞諸孔穎達云陽尊得兼乎隂隂不得兼乎陽也它日劉子與董生言及易生曰吾聞諸畢中和云舉老而稱也請徵諸揲蓍夫端策者一變而遇少與歸竒而為五再變而遇少與歸竒而為四三變如之是老陽之數分措于指間者十有三策焉其餘三十有六四四而運得九是已故易繫注云乾一爻三十六策也一變而遇多與歸竒而為九再變而遇多與歸竒而為八三變如之是老隂之數分措于指間者二十有五策焉其餘二十有四四四而運得六是已故易繫注云坤一爻}
