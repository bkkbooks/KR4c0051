  - {type: line-break, offset: 1881, content: '', id: KR4c0051_SBCK_018-7a05}
  - {type: variant, offset: 1883, length: 570, content: 言伏見今月七日制書大赦天下者帝遊出震聖澤如春神人以和天地交泰中謝伏惟皇帝陛下丕承鴻業光闡睿圖吉日展嚴祀之儀告天陳太平之盛九廟成禮百神降祥鑾輅旋衡風雲改色殊私廣被再弘莫大之恩寶曆惟新更啓無疆之祚兩宫承慶四海永寧率土臣子上千萬壽夔州論利害二首臣某言伏凖元和十二年四月十八日敕諸州刺史如有利害可言者不限時節任自上表聞奏者伏見貞觀中詔許羣臣各上書言利便馬周時布衣遂因中節將常何獻䇿二十餘事太宗深竒之盡行其言擢周爲御史至龍朔中壁州刺史鄧弘慶進平索看精四字堪爲酒令髙宗嘉之亦行其言遷弘慶爲朗州刺史則知苟有所見雖布衣之賤逺守之微亦可施用況臣早受國恩德宗朝忝爲御史逮今歷事四朝頻領藩條當陛下至明之時是微臣竭節之日伏以守在遐郡不敢廣有所陳謹准敕上利害及當州公務各具別狀以聞伏乞聖慈俯賜照鑒又臣某言伏准今年正月五日德音宜令諸道觀察使刺史各具當處利害附驛以聞者伏惟皇帝陛下睿哲自天纉承列聖善述先志發揚徳音率土人臣不勝慶幸臣䖍奉詔旨宣示蒸黎伏以華夏不同士宜各異詳求利病謹具奏聞伏乞聖慈俯賜照鑒臣伏覽國史竊見開元十八年朝集使至京玄宗臨軒親問利害時宣州刺史裴耀卿上便宜事論轉運甚詳竟不行下至二十一年耀卿爲京兆尹再以前事奏論方見允納此及三年漕運七百萬石省脚三十餘萬貫當耀卿前不見納必有人非之及後數年方展其效臣僻守逺郡敢望言行祗奉詔書或冀萬一伏惟明主擇之夔州謝上臣某言伏奉, WYG: ''}
