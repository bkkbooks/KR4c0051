  - {type: variant, offset: 1654, length: 228, content: 制書授臣使持節和州諸軍事守和州刺史臣自理巴賨不聞善政恩私忽降慶抃失容中謝伏惟皇帝陛下丕承寶祚光闡鴻猷有漢武天人之姿稟周成睿哲之徳發言合古舉意通神委用得人動植咸恱理平之速從古無倫微臣何幸獲覩昌運臣業在辭學早歳榮名德宗尚文擢爲御史出入中外歷事五朝累承恩光三換符竹在分憂之寄禄祑非輕而素蓄所長效用無日臣聞一物失所前王軫懷今逢聖朝豈患無位臣即以今月二十六日到所任上訖伏以地在江淮俗參吳楚災旱之後綏撫誠難謹當奉宣皇恩慰彼蒸黎乆於其道冀使知方伏乞聖慈俯賜照鑒賀改元赦臣, WYG: ''}
