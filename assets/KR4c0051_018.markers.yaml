  - {type: variant, offset: 2862, length: 2, content: 嶺隅, WYG: 巴南不獲稱賀闕庭無任踴躍屏營之至長慶三年正月日慰國哀表臣某言上天降禍大行皇帝奄棄萬國奉諱號擗糜潰五情伏惟皇帝陛下孝思至性攀號罔極臣恭守所部不獲陪位西宫伏増感慕之至謹奉表陳慰以聞長慶四年二月日賀龍飛表臣某言伏見詔書正月二十六日皇帝陛下嗣登寳位萬國同歡日月繼明乾坤交泰伏惟皇帝陛下欽承顧命惟懐永圖以大孝奉宗祧以至仁蘇品物洞照寰海統和神人聖祚延長従今無極羣生鼓舞自此大寧臣守遐藩恪居官次不獲奔馳拜舞稱賀闕庭無任抃躍屏營之至長慶四年二月日賀皇太子牋使持節都督夔州刺史劉某叩頭伏惟皇太子殿下祗膺詔冊光啟儲闈展至性於三朝承本枝於百代宗祏永固神人以和四嶽仰維嵩之髙百川承少海之潤某限以職守不獲隨例稱慶宫庭無任抃躍之至賀赦表臣某言伏見今月三日制書大赦天下者大明初昇萬物咸覩渙汗一發神人以和伏惟皇帝陛下天資叡聖神啟昌期端拱受萬國之朝承顔奉兩宫之慶初嗣大位克揚孝心三光協明和氣來應臣伏讀赦令首於奉園陵盡誠敬親九族蘇兆人次及定章程止進獻已逋責滌夙瑕内照于九重則歸嬪嬙放鷹犬外明于四目則求隠士開直聲柔逺以仁則還其係虜賞延以禮則澤及後昆菲食遵夏禹之規弋綈法漢文之儉墜典咸舉舊章再明昇平之期正在今日發號之始疾於春風殊私所及霈若時雨臣幸逢昌運歴事五朝出守遐藩僅垂二紀欣承靁雨作解之澤不勝犬馬戀主之誠瞻望帝鄉無任屏營懇悃之至長慶四年三月二十七日賀冊太皇太后表臣某言伏見制書以二月十八日冊立太皇太后徽章克備慶賜逺行榮冠古今澤周寰海伏惟皇帝陛下纉承列聖歡奉兩宫太皇太后含飴保和重光疊慶漢儀盛於長信周祚興於太任方之聖朝彼有慙徳臣逺守巴峽不獲稱賀闕庭無任抃躍屏營之至長慶四年三月日賀冊皇太后表臣某言伏見制書以二月二十五日冊立皇太后盛禮畢陳徳音逺被一人有慶萬國同歡伏惟皇太后稟靈作合誕聖表祥徽號極域中之尊慈仁為天下之母陛下君臨有國子道無違長樂宮中永獻南山之夀濯龍門上再揚東漢之風率土臣子不勝歡抃臣逺守荒服}
