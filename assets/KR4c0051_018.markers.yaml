  - {type: variant, offset: 2872, length: 0, content: '', WYG: 踴躍屏營之至和州謝上表臣某言伏奉制書授臣使持節和州諸軍事守和州刺史臣自理巴賨不聞善最恩私忽降慶抃失容伏惟皇帝陛下丕承寶祚光闡鴻猷有漢武天人之姿稟周成叡哲之徳發言合古舉意通神委用得人動植咸説理平之速従古無倫微臣何幸獲覩昌運臣業在詞學蚤嵗策名徳宗尚文擢為御史出入中外歴事五朝累承恩光三換符竹在分憂之寄禄秩非輕而素蓄所長效用無日臣聞一物失所前王軫懷今逢聖朝豈患無位臣即以今月二十六日到所任上訖伏以地在江淮俗參呉楚災旱之後綏撫誠難謹當奉宣皇恩慰彼黎庶久於其道冀使知方伏乞聖慈俯賜昭鑒臣逺守藩服不獲拜舞闕庭無任懇悃屏營之至謹差當州軍事衙官章興奉表陳謝以聞長慶四年十月二十六日}
