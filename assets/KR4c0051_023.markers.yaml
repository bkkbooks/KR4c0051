  - {type: variant, offset: 0, length: 5867, content: 劉夢得文集卷第二十三集紀唐故李相國集唐故韋公集唐故令狐公集唐故盧公集唐故吕君集唐故柳君集董氏武陵集澈上人文集唐故相國李公集天以正氣付偉人必飾之使光耀于世粹和絪緼積于中鏗鏘發越形乎文文之細大視道之行止故得其位者文非空言咸繫于訏謨宥宻庸可不紀惟唐以神武定天下羣慝旣讋驟示以文韶英之音與鉦鼓相襲故起文章爲大臣者魏文貞以諫諍顯馬髙唐以智略奮岑江陵以潤色聞無草昩汙馬之勞而任遇在功臣上唐之貴文至矣哉後王纂承多以國柄付文士元和初憲宗遵聖祖故事視有宰相器者貯之内庭繇是釋筆硯而操化權十八九公寔得時而光焉公諱絳字深之趙郡人在貢士中傑然有竒表旣豋太常第又以詞賦升甲科授秘書省校書郎歳滿從調有司設甲乙問以觀決斷復居髙品𥙷渭南尉擢拜監察御史未幾以夲官充翰林學士居中轉尚書主客貟外郎歷司勲郎中知制誥遷中書舎人風儀峻整敷奏儻切言事感動上輒目送之一旦召至浴堂門與語半省曰將柄用子大冝稔熟民聴遂出爲戸部侍郎遷中書侍郎同平章事殷然有直聲及冊免而聞望益大周旋公卿閒五爲尚書歷御史大夫左僕射一以三公領太常刺近輔居保釐登齋壇皆再焉太和三年以司空鎭南鄭居二歳坐氣剛玉折海内冤惜之後三年嗣子前京兆府户曹掾璆次子前監察御史裏行頊等泣持遺草請編之肇白從試有司至于宰天下詞賦詔誥封章啓事謌詩贈餞金石颺功凡四百餘篇勒成二十卷上所以知君臣啓沃之際下所以備風雅詩聲之義洪鍾駭聽瑶瑟清骨其在翰苑及登台庭亟言大事誠貫理直感通神祇龍鱗收怒天日回照古所謂一言興邦者信哉始愚與公爲布衣游及仕畿服幸公同邑其後雖翔泳勢異而不以名數革初心今考其文至論事䟽感人肺肝毛髮皆聳嗚呼其盛唐之遺直歟唐故中書侍郎平章事韋公集漢庭以賢良文學徴有道之士公孫弘條對第一席其勢鼓行人閒取丞相且侯使漢有得人之聲伊弘發也皇唐文物與漢同風故天后朝燕國公說以詞摽文苑徴玄宗朝曲江公九齡以道侔伊吕徴德宗朝天水姜公公輔杜陵韋公執誼河東裴公垍以賢良方正徴憲宗朝河南元公稹京兆韋公惇以才識兼茂徴隴西牛公僧孺李公宗閔以能直言極諫徴咸用對䇿甲於天下繼爲有聲宰相古今相望落落然如騎星辰與夫起版築飯牛者異矣公夲名惇舉進士登賢良旣仕方更名處厚字德載漢丞相扶陽侯之裔孫後周逍遥公夐之八代孫右僕射某之元子生而聦明絶人在提孩發言成詩未幾能賦受經於先君僕射學文於伯舅許公孟容及壯通六經旁貫百氏咨天人之際探曆數明天官窮性命之源以至于佛書尤邃初爲集賢殿校書郎宰相李趙公監修國史引公直東觀就改咸陽尉遷右拾遺轉左𥙷闕世稱有史才而能諫諍入尚書爲郎歷禮部考功皆人望所在上方用威武以讋不庭宿兵䆮乆韋丞相貫之酌人情上言不合意冊免因歷詆所善公在伍中岀爲開州刺史居三年執友崔敦詩爲相徴拜户部郎中至闕下旬歳閒以夲官知制誥穆宗新即位注意近臣召入翰林充侍講學士初授諫議大夫續換中書舎人侍游蓬萊池延問大義退而進六經法言二十編優詔荅之賜以金紫㝷遷權知兵部侍郎知制誥翰林侍講史館修撰長慶四年春敬宗踐祚以公用經術左右先帝五年稔聞其德尤所欽倚内署故事與外庭不同凡言内翰學士必草詔書有侍講者專備顧問雖官爲中書舎人或他官知制誥第用其班次爾不竄言於訓詞至是上器公且有以寵之乃使内謁者申命去侍講之稱慮未諭于百執事居數日降命書重舉舊官以明新意㝷眞拜夏官貳卿由是内庭詞臣無出其右者凡密旨必承乎權輿故號承旨學士上富春秋未親庶政或有凝滯視公如蓍龜寶暦季年宫壼閒一夕生變人情大駭雖鼎臣無所關決唯内署得參焉羣議閧胡貢反然俟公一言而定戡難纉服再維乾綱今上繼明䇿勲第一擢拜中書侍郎同中書門下平章事以髙材遇英主功顯人伏言無不從筆端膚寸澤及天下盡罷冗食請歸才人事先有司物止常貢城社無託巖廊益尊感恩盡瘁不嗇神用大和二年十二月上前言事未及畢詞疾作暴僨以朝服委地同列白奏搢笏扶持之不能起上命中貴人在右翼輔歸于中書如大醉狀上震驚咨嗟徴醫賜藥旁午疊委㑹暮肩輿至第詰旦以不起聞贈禭加常禮後十年嗣子蕃以太子舎人直弘文館編次遺文七十通銜哀貢誠乞詞以冠其首謹按公未爲近臣巳前所著讃論記述銘志皆文士之詞也以才麗爲主自入爲學士至宰相以往所執筆皆經綸制置財成潤色之詞也以識度爲宗觀其發德音福生人沛然如時雨襃元老諭功臣穆然如景風命相之冊和而莊命將之誥昭而毅薦賢能其氣似孔文舉論經學其博似劉子駿發十難以摧言利者其辯似管夷吾噫逢時得君奮智謀以取髙位而令名隨之豈不偉哉初蕃旣纂修父書咨于先執李習之請文爲領袖許而未就習之悄然謂蕃曰翺昔與韓吏部退之爲文章盟主同時倫輩惟柳儀曹宗元劉賔客夢得爾韓柳之逝乆矣今翺又𬒳病慮不能自述有孤前言賷恨無巳將子薦誠于劉君乎無何習之夢奠于襄州蕃具道其語余感相國之平昔嘉蕃之䖍敬庶幾能世其家固不讓云唐故相國贈司空令狐公集起文章而陟大位丹青景化焜燿藩方如霏煙祥風縁飾萬物而與令名相終始者有唐文臣令狐公實當之公名楚字殻士燉煌人今古數于長安右部天授神敏性能無師始學語言乃恊宫徴故五歳巳爲詩成章旣即冠參貢士果有名字時司空杜公以重德知貢舉擢居甲科瑯瑘王拱識公於童丱雅器異之至是拱自虞部正郎領桂州銳於辟賢以酬不次之遇先拜章而後告公旣而授試弘文館校書郎公爲人子重難逺行稟命而去居一歳竟迫方寸而歸家在并汾閒急於禄養捧從事檄于并州凡更三牧官至監察御史元和初憲宗聞其名徴拜右一作左拾遺歷太常博士入爲尚書禮部貟外郎性至孝旣孤以善居喪聞喪除爲刑部貟外郎時帝女下嫁相禮缺官以夲官攝愽士當問名之荅上親臨帳幄簾内窺之禮容甚偉聲氣朗徹上目送良乆謂左右曰是官可用記其姓名未幾改職方知制誥詞鋒犀利絶人逺甚適有旨選司言髙第者視草内庭宰臣以爲首遂轉夲司郎中充翰林學士滿歳遷中書舎人專掌内制武帳通奏栢梁陪讌嘉猷髙韻冠于一時會淮右稽誅上遣丞相即戎以督戰公草詔書詞有渉嫌者相府上言有命中書參詳竄定因罷内職歸閣中而君心眷然將有大用且出入以試之及牧華州兼御史中丞錫以金紫居鎭七月遷大夫充河陽三城懷州節度使又七月急召抵京師拜中書侍郎同中書門下平章事天下然後知上心倚以爲相非一朝也是歳元和十四年秋明年正月憲宗晏駕惜其在位日淺遭時大變穆宗踐祚轉門下侍郎平章事萬機百度別有所付第以舊相署位充山陵使七月禮畢部下吏有以贓狀聞者朝典用責率之義是以左授宣歙池等州都團練觀察處置等使兼御史大夫恩顧一異媒㜸隨生旋又貶衡州刺史移郢州轉太子賔客分司東都㝷起爲陜􅉑觀察使或有上封者稱前以奉陵寢不檢下獲譴今陵土猶濕未宜遽用次陜一日重爲賔客分司長慶四年改河南尹其秋授檢校禮部尚書兼汴州刺史充宣武軍節度管内觀察處置等使汴州爲四戰之地擇帥先有功峻刑右武疑似沈命號爲危邦者積年公但以清儉自律以恩信待人以夷坦去羣疑以禮讓汰慘急自上化下速於置郵泮林革音無復故態璽書勞之就加大司馬文宗纂服三年冬上表以大臣未識天子願朝正月制曰可操節入覲遷户部尚書俄爲東都留守又轉檢校尚書右僕射兼鄆州刺史太平軍節度使後以王業之始實爲北京移鎭太原從人望也以吏部尚書徴換太常卿眞拜尚書左僕射太和九年冬十一月京師有急兵起上方御正殿即日還宫是夕召公決事禁中以見賢遍反事傳古義爲對其詞讜切無所顧望上心嘉之居一二日守夲官兼諸道鹽鐵轉運使以斡利權旣非素尚仡許乙反牢讓故復爲檢校左僕射興元尹山南西道節度觀察使兼御史大夫開成二年十一月十二日薨于漢中官舎享年七十齊終之前一日自修遺表初述感恩陳力之大義中及朝廷刑政之或闕意竊言盡神識不昬上深悼之形于愍冊未登三事故以贈之歸泉之夕有大星殞于正寢之上光燭于庭天意若曰旣稟之而生亦有涯而落其文章貴壽之氣焰歟初憲宗覽國書見五王復辟之際狄梁公實尸之公爲台臣獨召便殿問曰仁傑有後乎公以其支孫試校書郎兼謨爲對即日拜左拾遺公遂草制他日相銜者因扶其詞以爲非春秋諱魯之旨穆宗新即位謙讓不自決遂有衡州之貶公議冤之嗟乎天之於賦予也甚嗇而難周公獨富文華丁良時歷名卿至元老蓋忠廉孝友愛才與物合是粹美以將之邪可謂全德矣旣免喪嗣子左𥙷闕綯集公之文成一百三十卷因長子太子左諭德子弘分司東都負其笥來謁泣曰先正司空與丈人爲顯交撤懸之前五日所賦詩寄友非他人也今手澤尚存言之嗚噎長號予亦爲之大慟收淚而視分當編次之始公參大鹵記室以文雄邊議者謂一方不足以騁用徴拜於朝累遷儀曹郎乃登西掖入内署訏謨密勿遂委魁柄斯以文雄於國也嗚呼咫尺之管文敏者執而運之所如皆合在藩聳萬夫之觀望立朝賁羣寮之頰舌居内成大政之風霆導畎澮於章奏鼓洪瀾於訓誥筆端膚寸膏潤天下文章之用極其致矣而又餘力工於篇什古文士所難兼焉昔王珣爲晉僕射夢人授大筆如椽覺而謂人曰此必有大手筆事後孝武哀冊文乃珣之詞也公爲宰相奉詔撰憲宗聖神章武孝皇帝哀冊文時稱乾陵崔文公之比今考之而信故以爲首冠尊重事也其他各以類聚著于篇唐故尚書主客貟外郎盧公集心之精微發而爲文文之神妙詠而爲詩猶夫孤桐朗玉自有天律能事具者其名必髙名猶實生故乆而益大尚書郎盧公諱象字緯卿始以章句振起於開元中與王維崔顥比肩驤首鼓行於時妍詞一發樂府傳貴由前進士𥙷秘書省校書郎轉右衛倉曹椽丞相曲江公方執文衡揣摩後進得公深器之擢爲左𥙷闕河南府司録司勲貟外郎名盛氣髙少所卑下爲飛語所中左遷齊汾鄭三郡司馬入爲膳部貟外郎時大盜起幽陵入洛師東夏衣冠不克歸王所爲虜劫執公墮脅從伍中初謪果州長史又貶永州司户移吉州長史天下無事朝廷思用宿舊徴拜主客貟外郎道病留武昌遂不起故相崔太傅時爲右史方在鄂以文誌其墓其一詞曰噫公妙年有聲振耀當代翺翔雲路不虞矰則層反繳盛名先物易生癘疵三至郎署坐成遺耋蹭蹬江臯栖栖没齒見知者恨之公逺祖元魏北齊後周皆爲帝師公之叔父嵩山逸人諌議大夫顥然眞隱者也公下世後七十三年其孫元符捧遺草來乞詞以表之常經亂離多所散落今之存者十有二卷凡若干篇唐故衡州刺史吕君集五行秀氣得之若多者爲俊人其色㶑灩於顔閒其聲發而爲文章天之所與有物來相彼由學而致者如工人染夏以視羽畎有生死之殊矣初貞元中天子之文章煥乎垂光慶霄在上萬物五色天下文人爲氣所召其生乃蕃靈芝萐莆與百果齊坼然煌煌翹翹出乎其類終爲偉人者幾希矣東平呂和叔寔生是時而絶人逺甚始以文學震三川三川守以爲貴士之冠名聲西馳速如羽檄長安中諸生咸避其鋒丙一作兩科連中鋩刃愈出德宗聞其名自集賢殿校書郎擢爲左拾遺明年犬戎請和上問能使絶域者君以竒表有專對材膺選轉殿内史錫之銀章還拜尚書户部貟外郎轉司封遷刑部郎中兼侍御史副治書之職㑹中執法左遷縁坐道州刺史以政聞改衡州年四十而没後十年其子安衡泣捧遺草來謁咨余伸之成一家言凡二百篇和叔名温別字化光祖考皆以文學至大官蚤聞詩禮於先侍郎又師吳郡陸質通春秋從安定梁肅學文章勇於藝能咸有所祖年益壯志益大遂撥去文字與俊賢交重氣槩覈名實歆然以致君及物爲大欲每與其徒講疑考要皇王覇強之際臣子忠孝之道出入上下百千年閒詆訶角逐疊發連袵得一善輒盱衡擊節揚袂頓足信容得色舞于眉端以爲按是言循是理合乎心而氣將之昭昭然若揭日月而行孰能閼其勢而爭天光者乎嗚呼言可信而時異道甚長而命窄精氣爲物其有所歸乎古之爲書者先立言而後體物賈生之書首過秦而荀卿亦後其賦和叔年少遇君而卒以謫似賈生能明王道似荀卿故余所先後視二書斷自人文化成論至諸葛武侯廟記爲上篇其他咸有爲而爲之始學左氏書故其文微爲富豔夫羿之關弓唯巴蛇九日乃能盡其彀而回注鷃爵亦要中於㝷常之閒非羿之手弓有能有不能所遇然也後之逹解者推而廣之知余之素交不相索於文字之内而已唐故柳州刺史柳君集八音與政通而文章與時髙下三代之文至戰國而病渉秦漢復起漢之文至列國而病唐興復起夫政庬而土裂三光五嶽之氣分扶問反大音不完故必混一而後大振初貞元中上方嚮文章昭回之光下飾萬物天下文士爭執所長與時而奮粲然如繁星麗天而芒寒色正人望而敬者五行而已河東柳子厚斯人望而敬者歟子厚始以童子有竒名於貞元初至九年爲名進士十有九年爲材御史二十有一年以文章稱首入尚書爲禮部貟外郎是歳以踈俊少檢獲訕出牧邵州又謫佐永州居十年詔書徴不用遂爲柳州刺史五歳不得召歸病且革留書抵其友中山劉某曰我不幸卒以謫死以遺草累故人某執書以泣遂編次爲三十通行於世子厚之喪昌黎韓退之誌其墓且以書來弔曰哀哉若人之不淑吾甞評其文雄深雅健似司馬子長崔蔡不足多也安定皇甫湜文章少所推讓亦以退之言爲然凡子厚名氏與仕與年曁行己之大有退之之誌若祭文在今附于第一通之末云董氏武陵集片言可以明百意坐馳可以役萬景工於詩者能之風雅體變而興同古今調殊而理冥逹於詩者能之工生於才逹生於明二者還相爲用而後詩道備矣余甞執斯評爲公是且衡而度之誠懸乎心黙揣羣才鈞銖㝷尺隨限而盡如是所閱者百態一旦得董生之詞杳如搏翠屏浮層瀾視聽所遇非風塵閒物亦猶明金綷羽得于遐裔雖欲勿寶可乎生名侹字庶中幼恃屬詩者晚而不衰心源爲鑪筆端爲炭鍜鍊元夲雕礱羣形糾紛舛錯逐意犇走因故㳂濁恊爲新聲甞所與游皆青雲之士聞名如盧杜盧貟外象杜貟外甫髙韻如包李包祭酒佶李侍郎紆迭以章句揚於當時末路寡徒值余歡甚因相謂曰閒身以廷尉屬爲荆州從事移疾罷去幽卧於武陵迨今四年言未信於世道不施於人寓其性懷播爲味咏時發笥紛然盈前凡五十篇因地爲目吾子常號知我盍表而志之爲生羽翼余不得讓而著于篇因系之曰詩者其文章之藴邪義得而言喪故微而難能境生於象外故精而寡和千里之繆不容秋毫非有的然之姿可使户曉必俟知者然後鼓行於時自建安距永明巳還詞人比肩唱和相發有以朔風零雨髙視天下蟬噪鳥鳴蔚在史䇿國朝因之粲然復興由篇章以躋貴仕者相踵而起兵興巳還右武尚功公卿大夫以憂濟爲任不暇器人於文什之閒故其風􅎊息樂府恊律不能足去聲新詞以度曲夜諷之職寂寥無紀則董生之貧卧于裔土也其不得於時者歟其不試故藝者歟澈上人文集釋子工爲詩尚矣休上人賦別怨約法師哭范尚書咸爲當時才士之所傾歎厥後比比有之上人生於㑹稽夲湯氏子聦察嗜學不肯爲凡夫因辤父兄出家號靈澈字源澄雖受經論一心好篇章從越客嚴維學爲詩遂籍籍有聞去維卒乃抵吳興與長老詩僧皎然游講藝益至皎然以書薦于詞人包侍郎佶包得之大喜又以書致于李侍郎紆是時以文章風韻主盟於世者曰包李以是上人之名由二公而颺如雲得風柯葉長王以文章接才子以禪理恱髙人風儀甚雅談笑多味貞元中西遊京師名振輦下緇流疾之造飛語激動中貴人因侵誣得罪徙汀州㑹赦歸東越時吳楚閒諸侯多賔禮招延一作迓之元和十一年終於宣州開元寺七十有一門人遷之建塔於越之山隂天柱峯之陲從夲敎也初上人在吳興居何山與晝公爲侣皎然字晝時以字行時予方以兩髦執筆硯陪其吟詠皆曰孺子可敎後相遇于京洛與友許之契焉上人殁後十七年予爲吳都其門人秀峯捧先師之文來乞詞以志且曰師甞在吳賦詩僅二千首今刪取百篇勒爲十卷自大曆至元和凡五十年閒接詞客聞人詶唱別爲十卷今也思行乎昭世求一言羽翼之因爲評曰世之言詩僧多出江左靈一導其源護國襲之清江揚其波法振㳂之如么絃孤韻瞥入人耳非大樂之音獨吳興晝公能備衆體晝公後澈公承之至如芙蓉園新寺詩云經來白馬寺僧到赤烏年謫汀州云青蠅爲弔客黃犬寄家書可謂入作者閫域豈獨雄於詩僧閒邪劉夢得文集卷第二十三, WYG: ''}
