  - {type: variant, offset: 0, length: 2793, content: 劉夢得文集卷第八樂府團扇歌荆州歌紀南歌宜城歌順陽歌馬嵬行視刀環歌三閤詞更衣曲淮隂行競渡曲堤上行採菱行秋風引莫徭歌蠻子歌洞庭秋月行踏歌詞華淸詞步虚詞桃源行魏宫詞阿嬌怨九華山歌送春曲初夏曲柳花詞送春詞秋詞團扇歌團扇復團扇奉君清暑殿秋風入庭樹從此不相見上有乗鸞女蒼蒼網蟲遍明年入懷袖別是機中練荆州歌二首渚宫楊柳暗麥城朝雉飛可憐踏青伴乗䁔著輕衣今日好南風商旅相催發沙頭檣竿上始見春江闊紀南歌風煙紀南城塵土荆門路天寒多獵騎走上樊姬墓宜城歌野水遶空城行塵起孤驛荒臺側生樹石碣陽鐫額靡靡度行人温風吹宿麥順陽歌朝辤官軍驛前望順陽路野水齧荒墳秋蟲鏤官樹曾聞天寶末胡馬西南鶩城守魯將軍拔城從此去馬嵬行緑野扶風道黃塵馬嵬驛路邊楊貴人墳髙三四尺乃問里中兒皆言幸蜀時軍家誅佞倖天子捨祅姬羣吏伏門屏貴人牽帝衣低徊轉美目風日爲無暉貴人飲金屑倐忽蕣英暮平生服杏丹顔色眞如故屬車塵巳逺里巷來窺覷共愛宿妝妍君王畫眉處履綦無復有履組光未滅不見巖畔人空見凌波襪郵童愛蹤跡私手解縏結傳看千萬眼縷絶香不歇指環照骨明首飾敵連城將入咸陽市猶得賈胡驚視刀環歌常恨言語淺不如人意深今朝兩相視脉脉萬重心三閣詞四首呉聲貴人三閣上日晏未梳頭不應有恨事嬌甚却成愁珠箔曲瓊鈎子細見楊州北兵那得度浪語聲悠悠沈香帖閣柱金縷畫門楣迴首降幡下巳見黍離離三人岀眢井一身登檻車朱門漫臨水不可見鱸魚更衣曲博山烱烱吐香霧紅燭引至更衣處夜如何其夜漫漫鄰鷄未鳴寒鴈度庭前雪壓松桂叢廊下點點懸紗籠滿堂醉客爭笑語嘈嘈琵琶音幕中淮隂行五首并引古有長干行言三江之事悉矣余甞阻風淮隂作淮隂行以禆樂府蔟蔟淮隂市竹樓縁岸上好日起檣竿烏飛驚五兩今日轉舡頭金烏指西北煙波與春草千里同一色舩頭大銅鐶摩挲光陣陣早晚使風來沙頭一眼認何物令儂羨羨郎舩尾燕銜泥趂檣竿宿食長相見隔浦望行舩頭昂尾幰幰無柰洗菜時清淮春浪軟競渡曲競渡始於武陵及今舉楫而相和之其音咸呼之何在斯招屈之義事見圖經沅江五月平堤流邑人相將浮彩舟靈均何年歌巳矣哀謡振楫從此起楊枹擊節雷闐闐亂流齊進聲轟然蛟龍得雨鰭鬛動螮蝀飲河形影聮刺史臨流褰翠幃揭竿命爵分雄雌先鳴餘勇爭鼓舞末至銜枚顔色沮百勝夲自有前期一飛由來無定所風俗如狂重此時縱觀雲委江之湄綵旂夾岸照鮫室羅襪凌波呈水嬉曲終人散空愁暮招屈亭前水東注堤上行三首酒旗相望大堤頭堤下連檣堤上樓日暮行人爭渡急槳聲幽軋在中流江南江北望煙波入夜行人相應歌桃葉傳情竹枝怨水流無限月明多長堤繚繞水徘徊酒舎旗亭次第開日晚上樓招估客軻峩大艑落帆來採菱行武陵俗嗜芡菱歳秋矣有女郎盛遊于白馬湖薄言采之歸以禦客古有採菱曲罕傳其詞故賦之以俟采詩者白馬湖平秋日光紫菱如錦綵鴛翔盪舟遊女滿中央採菱不顧馬上郎爭多逐勝分相嚮時轉蘭橈破輕浪長鬟弱袂動參差釵影釧文浮蕩漾笑語哇咬顧晚暉蓼花㳂岸扣舷歸歸來共到市橋歩野蔓繫舩萍滿衣家家竹樓臨廣陌下有連檣多估客攜觴薦芰夜經過醉踏大堤相應歌屈平祠下沅江水月照寒波白煙起一曲南音此地聞長安北望三千里秋風引何處秋風至蕭蕭送鴈羣朝來入庭樹孤客最先聞莫傜歌莫傜自生長名字無符籍市易雜鮫人㛰姻通木客星居占泉眼火種開山脊夜渡千仭谿含沙不能射蠻子歌蠻貊鈎輈音蠻衣斑斕布熏狸掘沙䑕時節祠盤瓠忽逢乗馬客怳若驚􅍪顧腰斧上髙山意行無舊路洞庭秋月行洞庭秋月生湖心層波萬頃如鎔金孤輪徐轉光不定遊氣濛濛隔寒鏡是時白露三秋中湖平月上天地空岳陽城頭暮角絶蕩漾巳過君山東山城蒼蒼夜寂寂水月逶迤繞城白盪槳巴童歌竹枝連檣估客吹羗笛勢髙夜乆隂力全金氣肅肅開清躔浮雲野鳥歸四裔欄干星斗當中天天鷄相呼曙霞出劒影含光讓朝日日出喧喧人不間夜來晴景非人間踏歌詞四首春江月出大堤平堤上女郎連袂行唱盡新詞觀不見紅霞映樹鷓鴣鳴桃蹊柳陌好經過燈下妝成月下歌爲是襄王故宫地至今猶自細腰多新詞宛轉遞相傳振袖傾鬟風露前月落烏啼雲雨散遊童陌上拾花鈿日暮江頭聞竹枝南人行樂北人悲自從雪裏唱新曲直到三春花盡時華清詞日出驪山東徘徊照温泉樓臺影玲瓏稍稍開白煙言昔太上皇常居此祈年風中聞清樂往往來列仙翠華入五雲紫氣歸上玄哀哀生人淚泣盡弓劒前聖道夲自我凡情徒顒然小臣感玄化一望青冥天歩虚詞二首阿母種桃雲海際花落子成二千歳海風吹折最繁枝跪捧瓊盤獻天帝華表千年一鶴歸凝丹爲頂雪爲衣星星仙語人聽盡却向五雲翻翅飛桃源行漁舟何招招浮在武陵水拕綸擲餌信流去誤入桃源行數里清源㝷盡花綿綿踏花覓逕至洞前洞門蒼黒煙霧生暗行數歩逢虚明俗人毛骨驚仙子爭來致詞何至此須臾皆破冰雲顔笑言委曲問人間因嗟隱身來種玉不知人世如風燭筵羞石髓勸客飡燈爇松脂留客宿鷄聲犬聲遥相聞曉光䓗籠開五雲漁人振衣起出户滿庭無路花紛紛翻然恐迷郷縣處一息不肯桃源住桃花滿谿水似鏡塵心如垢洗不去仙家一出㝷無蹤至今水流山重重魏宫詞二首日晚長秋簾外報望陵歌舞在明朝添爐火欲熏衣麝憶得分明不忍燒日映西陵松栢枝下臺相顧一相悲朝來樂府長歌曲唱著君王自作詞阿嬌怨望見葳蕤舉翠華試開金屋掃庭花須臾宫女傳來信言幸平陽公主家九華山歌并引九華山在池州青陽縣西南九峯競秀神采竒異昔予仰太華以爲此外無竒愛女几荆山以爲此外無秀及今見九華始悼前言之容易也惜其地偏且逺不爲世所稱故歌以大之竒峯一見驚魂魄意想洪爐始開闢疑是九龍夭矯欲攀天忽逢霹靂一聲化爲石不然何至今攸攸億萬年氣勢不死如騰仚音媽䡖舉皃雲含幽兮月添冷日凝暉兮江漾影結根不得要路津逈秀長在無人境軒皇封禪登雲亭大禹㑹計臨東溟乗樏不來廣樂絶獨與猿鳥愁青熒君不見敬亭之山黃索漠兀如斷岸無稜角宣城謝守一首詩遂使名聲齊五嶽九華山九華山自是造化一尤物焉能籍甚乎人閒送春曲三首春向晚春晚思悠哉風雲日巳改花葉自相催漠漠空中去何時天際來春巳暮冉冉如人老映葉見殘花連天是青草可憐桃與李從此同桑棗春景去此去何時迴遊人千萬恨落日上髙臺寂寞繁花盡流鸎歸不來初夏曲三首銅壷方促夜斗柄暫南迴稍嫌單衣重初憐北户開西園花巳盡新月爲誰來時節遇繁華隂隂千萬家巢禽命子戲園果墜枝斜寂寞孤飛蝶窺叢覓晚花緑水風初暖青林露早晞麥田雉朝雊桑野人暮歸百舌悲花盡無聲來去飛柳花詞三首開從緑條上散逐香風遶故取花落時悠揚占春草輕飛不假風輕落不委地撩亂舞晴空發人無限思晴天點點雪來送青春暮無意似多晴千家萬家去送春詞昨來樓上迎春處今日登樓又送歸蘭蘂殘妝含露泣柳條長袖向風揮佳人對鏡容色改楚客臨江心事違萬古至今同此恨無如一醉盡忘機秋詞二首自古逢秋悲寂寥我言秋日勝春朝晴空一鶴排雲上便引詩情到碧霄山明水淨夜來霜數樹深紅岀淺黃試上髙樓清入骨豈如春色嗾人狂劉夢得文集卷第八劉夢得外集卷第八律詩寄楊給事巫山神女廟柳絮陪崔大尚書曹剛登望梅樓別蘇州送處州奚使君題報恩寺渡楊子津館娃宫姑蘇臺贈陳長史寄韓中丞有感楊柳枝海陽十詠送周魯儒赴舉送曹璩歸越中㝷汪道士不遇桃源翫月遊建康田順郎歌米嘉榮自江陵㳂流別夔州官吏夜聞舡中箏聞道士彈思歸引喜康將軍見訪贈劉景擢第次德宗山陵甞茶梁國祠九日登髙謝柳子厚硯元日感懷謝崔相公賜馬南中書來題招隱寺寄山中友人望洞庭魚復江中歷陽書事寄, WYG: ''}
