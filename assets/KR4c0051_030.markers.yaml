  - {type: variant, offset: 3749, length: 0, content: '', WYG: 耳韓栁之逝久矣今翺又被病慮不能自述有孤前言齎恨無已將子薦誠于劉君乎無何習之夢奠于襄州蕃具道其語余感相國之平昔且嘉蕃之䖍䖍孝敬庶幾能世其家故不讓云唐故相國贈司空令狐公集紀起文章而陟大位丹青景化焜燿藩方如非煙祥風縁飾萬物而與令名相終始者有唐文臣令狐公實當之公名楚字殻士燉煌人今占數于長安右部天授神敏性能無師始學語言乃協宫徵故五嵗已為詩成章既冠參貢士果有名字時司空杜公以重徳知貢舉擢居甲科琅琊王拱識公於童丱雅器重之至是拱自虞部正郎領桂州鋭於辟賢以酬不次之遇先拜章而後告公既而授試𢎞文館校書郎公為人子重難逺行稟命而去居一嵗竟迫方寸而歸家在并汾間急於禄養捧從事檄于并州凡更三牧官至監察御史元和初憲宗聞其名徵拜右拾遺歴太常博士入尚書為禮部員外郎性至孝既孤以善居喪聞中月除刑部員外時帝女下嫁相禮闕官公以本官攝博士當問名之荅上親臨帳幄簾内以窺之禮容甚偉聲氣朗徹上目送良久謂左右曰是官可用記其姓名未幾改職方知制誥詞鋒犀利絶人逺甚適有㫖選司言髙第者視草内庭宰臣以公為首遂轉本司郎中充翰林學士滿嵗遷中書舍人専掌内制武帳通奏栢梁陪燕嘉猷髙韻冠于一時會淮右稽誅上遣丞相即戎以督戰公草詔書詞有涉嫌者相府上言有命中書參詳竄定因罷内職歸閤中而君心眷然將有大用且出入以試之乃牧華州兼御史中丞錫以金紫居鎮七月遷大夫充河陽三城懐州節度使又七月急召抵京師拜中書侍郎同中書門下平章事天下然後知上心倚以為相非一朝也是嵗元和十四年秋明年正月憲宗晏駕惜其在位日淺遭時大變穆宗踐阼轉門下侍郎平章事萬幾百度别有所付第以舊相署位充山陵使七月禮畢部下吏有以贓狀聞者朝典用責率之義是以左授宣歙池等州都團練觀察處置使兼御史大夫恩顧一異媒孽隨生旋又貶衡州刺史移郢州轉太子賔客分司東都尋起為陜虢觀察使或有上封者稱前以奉陵寢不檢下獲譴今陵土猶濕未宜遽用次陜一日重為賔客分司長慶四年改河南尹其秋授檢校禮部尚書兼汴州刺史充宣武軍節度管内觀察處置等使汴州為四戰之地擇帥先有功峻刑右武疑似沈命號為危邦者積年公始以清儉自律以恩信待人以夷坦去羣疑以禮讓汰慘急自上化下速於置郵泮林革音無復故態璽書勞之就加大司馬文宗纂服三年冬上表以大臣未識天子願朝正月制曰可操節入覲遷户部尚書俄為東都留守又轉檢校尚書右僕射兼鄆州刺史天平軍節度使後以王業之始實為北京移鎮太原從人望也以吏部尚書徴續換太常卿真拜尚書左僕射太和九年冬十一月京師有急兵起上方御正殿即日還宫是夕召公決事禁中以見賢遍反事傅古義為對其詞讜切無所顧望上心嘉之居一二日守本官兼諸道鹽鐵轉運使以斡利權既非素尚仡仡牢讓故復為檢校左僕射興元尹山南西道節度觀察使兼御史大夫開成二年十一月十二日薨于漢中官舍享年七十齊終之前一日自修遺表初述感恩陳力之大義中及朝廷刑政之或闕意切言盡神識不昏上深悼之形于愍冊未登三事故以贈之歸全之夕有大星殞于正寢之上光燭于庭天意若曰既稟之而生亦有涯而落其文章貴夀之氣熖歟初憲宗覽國書見五王復辟之際狄梁公實尸之公為台臣獨召便殿問曰仁傑有後乎公以其支孫試校書郎兼謩為對即日拜左拾遺公遂草制它日相銜者因扶其詞以為非春秋諱魯之㫖穆宗新即位謙讓不自決遂有衡州之貶公議寃之嗟乎天之於賦予也甚嗇而難周公獨富文華丁良時歴名卿至元老葢忠亷孝友愛才與物合是粹美以將之邪可謂全徳矣既免喪嗣子左補闕綯集公之文成一百三十巻因長子太子左諭徳𢎞分司東都負其笥來謁泣曰先正司空與丈人為顯交撤懸之前五日所賦詩寄友非他人也今手澤尚存言之嗚咽長號予為之慟收淚而視分當編次之始公參大鹵記室以文雄於邉議者謂一方不足以騁用徴拜於朝累遷儀曹郎乃登西掖入内署訏謨密勿遂委魁柄斯以文雄於國也嗚呼咫尺之管文敏者執而運之所知皆合在藩聳萬夫之觀望立朝賁羣寮之頰舌居内成大政之風霆導畎澮於章奏鼓洪瀾於訓誥筆端膚寸膏潤天下文章之用極其至矣而又餘力工於篇什古文士所難兼焉昔王珣為晉僕射夢人授大筆如椽覺而謂人曰此必有大手筆事後孝武哀冊文乃珣之詞也公為宰相奉詔撰憲宗聖神章武孝皇帝哀冊文時稱乾陵崔文公之比今考之而信故以為首冠尊重事也其它各以類聚著于篇唐故尚書主客員外郎盧公集紀心之精微發而為文文之神妙詠而為詩猶夫孤桐朗玉自有天律能事具者其名必髙名由實生故久而益大尚書郎盧公諱象字緯卿始以章句振起於開元中與王維崔顥比肩驤首鼓行於時妍詞一發樂府傳貴由前進士補祕書省校書郎轉右衛倉曹掾丞相曲江公方執文衡揣摩後進得公深器之擢為左補闕河南府司録司勲員外郎名盛氣髙少所卑下為飛語所中左遷齊汾鄭三郡司馬入為膳部員外郎時大盜起幽陵入洛師東夏衣冠不克歸王所為虜刼執公墮脇從伍中初謫果州長史又貶永州司户移吉州長史天下無事朝廷思用宿舊徵拜主客員外郎道病留武昌遂不起故相崔太傅時為右史方在鄂以文誌其墓其一詞曰噫公妙年有聲振耀當代翺翔雲路不虞矰則層反繳盛名先物易生癘疵三至郎署坐成遺耋蹭蹬江臯棲棲没齒見知者恨之公逺祖元魏北齊後周皆為帝師公之叔父嵩山逸人諫議大夫顥然真隠者也公下世後七十三年其孫元符捧遺草來乞詞以表之嘗經亂離多所散落今之存者十有二巻凡若干篇唐故衡州刺史吕君集紀五行秀氣得之居多者為俊人其色㶑灧於顔間其聲發而為文章天之所與有物來相彼由學而致者如工人染夏以視羽畎有生死之殊矣初貞元中天子之文章煥乎垂光慶霄在上萬物五色天下文人為氣所召其生乃蕃靈芝萐莆與百果齊坼然煌煌翹翹出乎其類終為偉人者幾希矣東平吕和叔實生是時而絶人逺甚始以文學震三川三川守以為貢士之冠名聲西馳速如羽檄長安中諸生咸避其鋒兩科連中芒刃愈出徳宗聞其名自集賢殿校書郎擢為左拾遺明年西域請和上問能使絶域者君以竒表有専對材膺選轉殿内史錫之銀章還拜尚書户部員外郎轉司封遷刑部郎中兼侍御史副治書之職會中執法左遷縁坐道州刺史以政聞改衡州年四十而没後十年其子安衡泣捧遺草來謁咨余繹之成一家言凡二百篇和叔名温别字化光祖考皆以文學至大官蚤聞詩禮於先侍郎又師吳郡陸質通春秋從梁肅學文章勇於藝能咸有所祖年益壯志益大遂撥去文學與雋賢交重氣槩覈名實歆然以致君及物為大欲每與其徒講疑考要王霸富彊之術臣子忠孝之道出入上下百千年間詆訶角逐疊發連注得一善輒盱衡撃節揚袂頓足信容得色舞于眉端以為按是言循是理合乎心而氣將之昭昭然若揭日月而行孰能閼其勢而争夫光者乎嗚呼言可信而時異道甚長而命窄精氣為物其有所歸乎古之為書者先立言而後體物賈生之書首過秦而荀卿亦後其賦和叔年少遇君而卒以謫似賈生能明王道似荀卿故余所先後視二書斷自人文化成論至諸葛武侯廟記為上篇其它咸有為而為之始學左氏書故其文微為富豔夫羿之闗弓唯巴蛇九日乃能盡其彀而囘注鷃爵亦要失中於尋常之間非羿之手弓有能有不能所遇然也後之達解者推而廣之知余之素交不相索於文字之内而已唐故尚書禮部員外郎栁君集紀八音與政通而文章與時髙下三代之文至戰國而病涉秦漢復起漢之文至列國而病唐興復起夫政龎而土裂三光五嶽之氣分扶問反大音不完故必混一而後大振初貞元中上方嚮文章昭囘之光下飾萬物天下文士争執所長與時而奮粲焉如繁星麗天而芒寒色正人望而敬者五行而巳河東栁子厚斯人望而敬者歟子厚始以童子有竒名於貞元初至九年為名進士十有九年為材御史二十有一年以文章稱首入尚書為禮部員外郎是嵗以疎雋少檢獲訕出牧邵州又謫佐永州居十年詔書徴不用遂為栁州刺史五嵗不得召病且革留書抵其友中山劉某曰我不幸卒以謫死以遺草累故人某執書以泣遂編次為三十通行於世子厚之喪昌黎韓退之誌其墓且以書來弔曰哀哉若人之不淑吾嘗評其文雄深雅健似司馬子長崔蔡不足多也安定皇甫湜於文章少所推讓亦以退之之言為然凡子厚名氏與仕與年暨行已之大方有退之之誌若祭文在今附于第一通之末云董氏武陵集紀片言可以明百意坐馳可以役萬景工於詩者能之風雅體變而興同古今調殊而理冥達於詩者能之工生於才達生於明二者還相為用而後詩道備矣余嘗執斯評為公是且衡而度之誠懸乎心黙揣羣才鈞銖尋尺隨限而盡如是所閲者百態一旦得董生之詞杳如搏翠屏浮層瀾視聴所遇非風塵間物亦猶明金綷羽得于遐裔雖欲勿寳可乎生名挺字庶中幼嗜屬詩晚而不衰心源為鑪筆端為炭鍛鍊元本雕礱羣形糺紛舛錯逐意奔走因故沿濁協為新聲嘗所與游皆青雲之士聞名如盧杜盧員外象杜員外甫髙韻如包李包祭酒佶李侍郎紓迭以章句揚於當時未路寡徒值余歡甚因相謂曰間身以廷尉屬為荆州從事移疾罷去幽卧於武陵迨今四年言未信於世道不施於人寓其性懐播為吟詠時復發笥紛然盈前凡五十篇因地為目吾子常號知我盍表而志之為生羽翼余不得讓而著于篇因系之曰詩者其文章之藴邪義得而言喪故微而難能境生於象外故精而寡和干里之繆不容秋毫非有的然之姿可使户曉必俟知者然後鼓行於時自建安距永明已還詞人比肩唱和相發有以朔風零雨髙視天下蟬噪鳥鳴蔚在史䇿國朝因之粲然復興由篇章以躋貴仕者相踵而起兵興已還右武尚功公卿大夫以憂濟為任不暇器人於文什之間故其風寖息樂府協律不能足去聲新詞以度曲夜諷之職寂寥無紀則董生之貧卧于裔土也其不得於時者歟其不試故藝者歟澈上人}
