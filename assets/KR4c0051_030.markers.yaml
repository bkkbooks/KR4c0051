  - {type: variant, offset: 3755, length: 0, content: '', WYG: 有九天果以有形而不能脱乎數立象以推莢既成而遺之古所謂神交造物者非空言耳軒皇受天命其佐皆聖人故得之惟唐繼天徳如黄帝有外臣一行亦聖之徒與刋歴考元書成化去今丹徒人惟良生而能知非自外求以乾坤之莢當十期之數凝神運指上感躔次視𤣥黄溟涬無倪有常絶機泯知獨以神㑹數起於復之初九音生乎黄鍾之宫積微本隠言與化合夫天人之數極而含變變而靡不通神趨鬼懾不足駭也惟良得一行之道故亦慕其為外臣謬謂余為世間聰明孑孑來訪初以説合至于不言言息而理冥復申之以嗟歎曰師其庶幾乎信神與之而不能測神之所以付信術通之而不能知術之所以淺哉余聞乎曽井蛙醯雞之不若也長慶四年冬十一月甲子語至夜艾遂為詩以志焉髙齋灑寒水是夕山僧至𤣥牝無闗鎖瓊書捨文字鐙明香滿室月午霜凝地語到不言時世間人盡睡送元簡上人適越孤雲出岫本無依勝境名山即是歸久向吴門遊好寺還思越水洗塵機浙江濤驚師子吼稽嶺峯疑靈鷲飛更入天台石橋路垂珠璀璨拂三衣送宗宻上人歸南山草堂寺因詣河南尹白侍郎宿習脩來得慧根多聞第一卻忘言自從七祖傳心印不要三乗入便門東泛滄江尋古跡西歸紫閣出塵喧河南白尹大檀越好把真經相對飜劉賔客文集巻二十九欽定四庫全書劉賔客文集巻三十唐劉禹錫撰哀挽悲傷三十八首徳宗神武孝文皇帝挽歌二首出震清多難乗時播大鈞操弦調六氣揮翰動三辰運偶升天日哀深率土人瑶池無轍跡誰見屬車塵鳯翣擁銘旌威遲異吉行漢儀陳祕器楚挽咽繁聲駐綍辭清廟凝笳背直城唯應留内傳知是向蓬瀛敬宗睿武昭愍孝皇帝挽歌三首寳歴方無限仙期忽有涯事親崇漢禮傳聖法殷家晚出芙蓉闕春歸棠棣華玉輪今日動不是畫雲車任賢勞夢寐登位富春秋欲逐東人幸寜虞杞國憂長楊收羽騎太液泊龍舟唯有衣冠在年年愴月遊講學金華殿親耕鈎盾田侍臣容諫獵方士信求仙虹影俄侵日龍􅐖不上天空餘水銀海長照夜鐙前文宗元聖昭獻孝皇帝挽歌三首繼體三才理承顔九族親禹功留海内殷歴付天倫調露曲長在秋風詞尚新本支方百代先讓棣華春月落宫車動風凄儀仗閒路唯瞻鳯翣人尚想龍顔御宇方無事乗雲遂不還聖情悲望處兄日下西山享國十五載升天千萬年龍鑣仙路逺騎吹禮容全日下初陵外人悲舊劒前周南有遺老掩淚望秦川故相國燕國公于司空挽歌二首彤弓封舊國黒矟繼前功十年鎮南雍九命作司空池臺樂事盡簫鼓葬儀雄一代英豪氣曉㪚白楊風隂山貴公子來塟五陵西前馬悲無主猶帶朔風嘶漢水青山郭襄陽白銅蹄至今有遺愛日暮人悽悽重至衡陽傷柳儀曹并引元和乙未嵗與故人栁子厚臨湘水為别栁浮舟適栁州余登陸赴連州後五年余從故道出桂嶺至前别處而君没於南中因賦詩以投弔憶昨與故人湘江岸頭别我馬映林嘶君颿轉山滅馬嘶循故道颿滅如流電千里江蘺春故人今不見謫居悼往二首邑邑何邑邑長沙地卑濕樓上見春多花前恨風急猿愁腸㫁叫鶴病翹趾立牛衣獨自眠誰哀仲卿泣鬱鬱何鬱鬱長安逺於日終日念鄉闗燕來鴻復還潘岳嵗寒思屈平顦顇顔殷勤望歸路無雨即登山哭吕衡州時余方謫居一夜霜風彫玉芝蒼生望絶士林悲空懐濟世安人略不見男婚女嫁時遺草一函歸太史旅墳三尺近要離朔方徙嵗行當滿欲為君刋第二碑遙傷段右丞江湖舊遊南宫交代江海多豪氣朝廷有直聲何言馬蹄下一旦是佳城傷桃源薛道士壇邊松在鶴巢空白鹿閑行舊逕中手植紅桃千樹發滿山無主任春風王思道碑堂下作蒼蒼宰樹起寒烟尚有威名海内傳四府舊聞多故吏幾人垂淚拜碑前遙傷丘中丞并引河南丘絳有詞藻與余同升進士科從事鄴下不幸遇害故為傷詞鄴下殺才子蒼忙寃氣凝枯楊映漳水野火上西陵馬鬛今無所龍門昔共登何人為弔客唯是有青蠅傷獨孤舍人并引貞元中余以御史監祠事河南獨孤生始仕為奉禮郎有事宗廟郊畤必與之俱繇是甚熟及余謫武陵九年間獨孤生仕至中書舍人視草禁中上方許以宰相元和十年春余祗召抵京師次都亭日舍人疾不起余聞因作傷詞以為弔昔别一年少今悲䘮國華逺來同社燕不見早梅花途次敷水驛伏覩華州舅氏昔日行縣題詩處潸然有感昔日股肱守朱輪兹地遊繁華曰已謝章句此空留蔓草佳城閉故林棠樹秋今來重垂淚不忍過西州湖南觀察使故相國袁公挽歌三首五驅龍虎節一入鳯凰池令尹自無喜羊公人不疑天歸京兆日葉下洞庭時湘水秋風至凄涼吹素旗丹旐發江臯人悲雁亦號湘南罷亥市漢上改詞曹表墓雙碑立尊名一字褒常聞平楚獄為報里門高返葬三千里荆衡達帝畿逢人即故吏拜奠盡沾衣地得青烏相賔驚白鶴飛五公碑尚在今日亦同歸代靖安佳人怨二首并引靖安丞相武公居里名也元和十一年六月公將朝夜漏未盡三刻騎出里門遇盜薨于牆下初公為郎余為御史繇是有舊故今守于逺服賤不可以誄又不得為歌詩聲于楚挽故代作佳人怨以埤于樂府寳馬鳴珂蹋曉塵魚文匕首犯車茵適來行哭里門外昨夜華堂歌舞人秉燭朝天遂不回路人彈指望髙臺牆東便是傷心地夜夜秋螢飛去來傷愚溪三首并引故人柳子厚之謫永州得勝地結茅樹蔬為沼沚為臺榭目曰愚溪柳子没三年有僧遊零陵告余曰愚溪無復曩時矣一聞僧言悲不能自勝遂以所聞為七言以寄恨溪水悠悠春自來草堂無主燕飛回隔簾惟見中庭草一樹山榴依舊開草聖數行留壁壊木奴千樹屬鄰家唯見里門通徳榜殘陽寂寞出樵車柳門竹巷依依在野草青苔日月多縱有鄰人解吹笛山陽舊侣更誰過碧澗寺見元九侍御和展上人詩有三生之句因以和廊下題詩滿壁塵塔前松樹已鱗皴古來唯有王文度重見平生竺道人傷秦姝行并引河南房開士前為虞部郎中為余話曰我得善筝人于長安懐逺里其後開士為赤縣牧容州求國工而誨之藝工而夭今年開士遺予新詩有悼佳人之目顧予知所自也惜其有良妓獲所從而不克久乃為傷詞以貽開士長安二月花滿城插花女兒㺯銀筝南宫仙郎下朝晚曲頭駐馬聞新聲馬蹄逶遲心蕩􅃞髙樓已逺猶頻望此時意重千金輕鳥傳消息紺輪迎芳筵銀燭一相見淺笑低鬟初目成蜀弦錚摐指如玉皇帝弟子常家曲青牛文梓赤金簧玫瑰寳柱秋雁行斂蛾收袂凝清光抽弦緩調怨且長八鸞鏘鏘渡銀漢九雛威鳯鳴朝陽曲終韻盡意不足餘思悄絶愁空堂從郎鎮南别城闕樓船理曲瀟湘月馮夷躚躚舞渌波鮫人出聴停綃梭北池含煙瑶草短萬松亭下清風滿北池萬松皆容州勝槩秦聲一曲此時聞嶺泉嗚咽南雲㫁來自長陵小市東舜華零落瘴江風侍兒掩泣收銀甲鸚鵡不言愁玉籠博山鑪中香自滅鏡奩塵暗同心結從此東山非昔遊長嗟人與弦俱絶夔州竇員外使君見示悼妓詩顧余嘗識之因命同作前年曽見兩鬟時今日驚吟悼妓詩鳯管學成知有籍龍媒欲换歎無期空廊月照常行地後院花開舊折枝寂寞魚山青草裏何人更立智瓊祠竇夔州見寄寒食日憶故姬小紅吹笙因和之鸞聲窈眇管參差清韻初調衆樂隨幽院妝成花下㺯髙樓月好夜深吹忽驚莫槿飄零盡唯有朝雲夢想期聞道今年寒食日東山舊路獨行遲傷循州渾尚書貴人淪落路人哀碧海連天丹旐回遙想長安此時節朱門深巷百花開哭龎京兆少年有俊氣嘗擢制科之首俊骨英才氣襃然䇿名飛步冠羣賢逢時已自致髙位得疾還因倚少年天上别歸京兆府人間空歎茂陵阡今朝繐帳哭君處前日見鋪歌舞筵再傷龎尹京兆歸何處章臺空暮塵可憐鸞鏡下哭殺畫眉人哭王僕射相公名播時兼鹽鐵暴薨于侯一日病滕公千載歸門庭颯已變風物慘無輝羣吏謁新府舊賔沾素衣歌堂忽暮哭賀雀盡驚飛傷韋賔客縝自工部尚書除賔客韋公八十餘位至六尚書五福唯無富一生誰得如桂枝攀最久蘭省出仍初海内時流盡何人動素車再經故元九相公宅池上作故池春又至一到一傷情雁鶩羣猶下蛙蠙衣已生竹叢身後長臺勢雨來傾六尺孤安在人間未有名劉賔客文集巻三十欽定四庫全書劉賔客外集巻一唐劉禹錫撰詩翰林白二十二學士見寄詩一百篇因以荅貺吟君遺我百篇詩使我獨坐形神馳玉琴清夜人不語琪樹春朝風正吹郢人斤斵無痕跡仙人衣裳棄刀尺世人方内欲相尋行盡四維無處覔始至雲安寄兵部韓侍郎中書白舍人二公近曽逺守故有屬焉天外巴子國山頭白帝城波清蜀村盡雲散荒臺傾迅瀨下哮吼兩岸勢争衡隂風鬼神過暴雨蛟龍生硤斷見孤邑江流照飛甍蠻軍撃嚴鼓筰馬引雙旌望闕遙拜舞分庭備將迎銅符一以合文墨紛來縈暮色四山起愁猿數處聲重闗羣吏散靜室寒燈明故人青霞意飛舞集蓬瀛昔曽在池籞應知魚鳥情白舍人自杭州寄新詩有栁色春蔵蘇小家之句因而戲酬兼寄浙東元相公錢塘山水有竒聲暫謫仙官領百城女妓還聞名小小使君誰許喚卿卿鼇驚震海風雷起蜃鬬噓天樓閣成莫道騷人在三楚文星今向斗牛明春日書懐寄東洛白二十二楊八二庶子曽向空門學坐禪如今萬事盡忘筌眼前名利同春夢醉裏風情敵少年野草芳菲紅錦地遊絲撩亂碧羅天心知洛下閒才子不作詩魔即酒顛白舍人見酬拙詩因以寄謝雖陪三品散班中資歴従來事不同名姓也曽鐫石柱詩篇未得上屏風甘陵舊黨凋零盡魏闕新知禮數崇烟水五湖如有伴猶應堪作釣魚翁白舍人曹長寄新詩有遊宴之盛因以戲酬蘇州刺史例能詩西掖今來替左司二八城門開道路五千兵馬引旌旗水通山寺笙歌去騎過虹橋劍㦸隨若共呉王鬭百草不如應是欠西施蘇州白舍人寄新詩有歎早白無兒之句因以贈之莫嗟華髮與無兒却是人間久逺期雪裏髙山頭白早海中仙果子生遲于公必有髙門慶謝守何煩曉鏡悲幸免如新分非淺祝君長咏夢熊詩髙山本髙于門使之髙二義故殊古之詩流曉此和汴州令狐相公到鎮改月偶書所懐二十二韻受脤新梁苑和羮舊傅巖援毫動星宿垂釣取韜鈐赤奕三川至歡呼百姓瞻緑油貔虎擁青紙鳯皇銜外壘曽無警中㕑亦罷監推誠人自服去殺令逾嚴赳赳容皆飾幡幡口盡鉗為兄憐庾翼選婿得蕭咸鬱屈咽喉地駢臻水陸兼渡橋鳴紺幰入肆颺雲帆端月當中氣東風應逺占管弦喧夜景燈燭掩寒蟾酒每傾三雅書能發百函詞人羞布鼓逺客獻貂襜歌榭白團扇舞筵金縷衫旌旗遙一簇舄履近相攙花樹當朱閣晴河逼翠簾暎鏁窺艷艷隔袖見纎纎謝傅何由接桓伊定不凡應憐郡齋老旦夕鑷霜髯白太守行聞有白太守棄官歸舊谿蘇州十萬户盡作嬰兒啼太守駐行舟閶門草萋萋揮袂謝啼者依然兩眉低朱户非不崇我心如重狴華池非不清意在寥廓栖夸者竊在怪賢者黙思齊我為太守行題在隠起珪詶樂天揚州初逢席上見贈巴山楚水悽凉地二十三年棄置身懐舊空吟聞篴賦到鄉翻似爛柯人沈舟側畔千帆過病樹前頭萬木春今日聴君歌一曲暫憑杯酒長精神同樂天登棲靈寺塔步步相攜不覺難九層雲外倚闌干忽然語笑半天上無限遊人舉眼看罷郡歸洛途次山陽留辭郭中丞使君自到山陽不許辭髙齋日夜有佳期管絃正合看書院語笑方酬各詠詩銀漢雪晴褰翠幕清淮月影落金巵洛陽歸客明朝去容趂城東花發時楚州開元寺北院枸杞臨井繁茂可觀羣賢賦詩因以繼和僧房藥樹依寒井井有香泉樹有靈翠黛葉生籠石甃殷紅子熟照銅瓶枝繁本是仙人杖根老新成瑞犬形上品功能甘露味還知一勺可延齡和樂天鸚鵡養來鸚鵡觜初紅宜在朱樓繡户中頻學喚人縁性慧偏能識主為情通斂毛睡足難銷日嚲翅愁時願見風誰遣聰明好顔色事須安置入深籠嵗杪將發楚州呈樂天楚澤雪初霽楚城春欲歸清淮變寒色逺樹含清暉原野巳多思風霜潛減威與君同旅鴈北向刷毛衣洛中逢白監同話遊梁之樂因寄宣武令狐相公曽經謝病各遊梁今日相逢憶孝王少有一身兼將相更能四面占文章開顔坐内催飛盞迴首庭中看舞槍借問風前兼月下不知何客對胡床河南王少尹宅燕張常侍白舍人兼呈盧郎中李員外二副使將星夜落使星來三省清臣到外臺事重各銜天子詔禮成同把故人盃捲簾松竹雪初霽滿院池塘春欲迴第一林亭迎好客殷勤莫惜玉山頽鶴歎二首并序友人白樂天去年罷呉郡挈雙鶴雛以歸余相遇于揚子津閒翫終日翔舞調態一符相書信華亭之尤物也今年春樂天為祕書監不以鶴隨置之洛陽第一旦予入門問訊其家人鶴軒然來睨如記相識裵􅏆俛仰似含情顧慕填膺而不能言者因作鶴歎以贈樂天寂寞一雙鶴主人在西京故巢呉苑樹深院洛陽城徐引竹間步逺含雲外情誰憐好風月鄰舍夜吹笙東鄰即王家丹頂宜承日霜翎不染泥愛池能久立看月未成棲一院春草長三山歸路迷主人朝謁早貪養汝南雞有所嗟二首庾令樓中初見時武昌春柳似腰肢相逢相笑盡如夢為雨為雲今不知鄂渚濛濛烟雨㣲女郎䰟逐暮雲歸只應長在漢陽渡化作鴛鴦一隻飛答樂天臨都驛見贈北固山邊波浪東都城裏風塵世事不同心事新人何似故人再贈樂天一政政官軋軋一年年老駸駸身外名何足算别來詩且同吟和裴相公傍水閒行為愛逍遙第一篇時時閒步賞風烟看花臨水心無事功業成來二十年和宣武令狐相公郡齋對新竹新竹脩翛韻曉風隔牕依砌尚䝉籠數間素壁初閒後一段清光入座中敧枕閒看知自適含毫朗咏與誰同此君若欲長相見政事堂東有舊叢答白刑部聞新蟬蟬聲未發前巳自感流年一入凄凉耳如聞斷續絃晴清依露葉晚急畏霞天何事秋卿咏逢時亦悄然和裴相公寄白侍郎求雙鶴皎皎華亭鶴來隨太守船白君罷具郡太守攜雙鶴來青雲意長在滄海到經年留滯清洛苑裵􅏆明月天何如鳯池上雙舞入祥烟和樂天送鶴上裴相公别鶴之作昨日看成送鶴詩髙籠提出白雲司朱門乍入應迷路玉樹容棲莫揀枝雙舞庭中花落處數聲池上月明時三山碧海不歸去且向人間呈羽儀終南秋雪南嶺見秋雪千門生早寒閒時乗馬望髙處巻簾看霧散瓊枝出日斜鉛粉殘偏宜曲江上倒影入清瀾闕下待傳㸃呈諸同舍禁漏晨鐘聲欲絶旌旗組綬影相交殿含佳氣當龍首閣倚晴天見鳯巢山色蔥蘢丹檻外霞光泛灧翠松梢多慙再入金門籍不敢為文學解嘲和樂天早寒雨引苔侵壁風驅葉擁堦久留閒客話宿請老僧齋酒甕新陳接書籖次第排翛然自有處搖落不傷懐和樂天以鏡換酒把取菱花百鍊鏡換他竹葉十旬杯嚬眉厭老終難去蘸甲須歡便到來妍醜太分迷忌諱松喬俱傲絶嫌猜校量功力相千萬好去從空白玉臺同樂天送河南馮尹學士可憐玉馬風流地暫輟金貂侍從才閣上掩書劉向去門前脩刺孔融來崤陵路靜寒無雨洛水橋長晝起雷共羨府中棠棣好先於城外百花開同白二十二贈王山人愛名之世忘名客多事之時無事身古老相傳見來久嵗年雖變貌常新飛章上達三清路受籙平交五嶽神笑聴鼕鼕朝暮鼓只能催得市朝人題集賢閣鳯池西畔圖書府玉樹玲瓏景氣閒長聴餘風送天樂時登髙閣望人寰青山雲繞欄干外紫殿香來步武間曽是先賢翔集地每看壁記一慙顔杏園花下詶樂天見贈二十餘年作逐臣歸來還見曲江春遊人莫笑白頭醉老醉花間有㡬人和令狐相公初歸京國賦詩言懐凌雲羽翮掞天才揚歴中樞與外臺相印昔辭東閣去將星還拱北辰來殿庭捧日彯纓入閣道看山曳履迴口不言功心自適吟詩釀酒待花開曲江春望鳯城烟雨歇萬象含佳氣酒後人倒狂花時天似醉三春車馬客一代繁華地何事獨傷懐少年曽得意和令狐相公春日尋花有懐白侍郎閣老芳菲滿雍州鸞鳳許同遊花逕須深入時光不少留色鮮由樹嫩枝亞為房稠靜對仍持酒髙看特上樓晴宜連夜賞雨便一年休共憶秋官處餘霞曲水頭和樂天南園試小樂閒步南園烟雨晴遙聞絲竹出牆聲欲抛丹筆三川去先教清商一部成花木手栽偏有興歌詞自作别生情多才遇景皆能咏當日人傳滿鳳城和樂天春詞新粧粉面下朱樓深鎖春光一院愁行到中庭數花朶蜻蜓飛上玉搔頭和嚴給事聞唐昌觀玉蕋花下有游仙二絶玉女來看玉蕋花異香先引七香車攀枝弄雪時迴顧驚怪人間日易斜雪蕋瓊絲滿院春衣輕步步不生塵君平簾下徒相問長伴吹簫别有人歎水别白二十二水至清盡美従一勺至千里利人利物時行時止道性浄皆然交情淡如此君遊金谷堤上我在石渠署裏兩心相憶似流波潺湲日夜無窮巳答樂天戲贈才子聲名白侍郎風流雖老尚難當詩情逸似陶彭澤齋日多如周太常矻矻將心求浄法時時偷眼看春光知君技癢思歡讌欲倩天魔破道場同樂天送令狐相公赴東都留守自户部尚書拜尚書劍履出明光居守旌旗赴洛陽世上功名兼將相人間聲價是文章衙門曉闢分天仗賔幕初開辟省郎從發坡頭向東望春風處處有甘棠自華陵至河南皆故林也劉賔客外集巻一欽定四庫全書劉賔客外集巻二唐劉禹錫撰詩同樂天和微之深春二十首同用家花車斜四韻何處深春好春深萬乗家宫門皆映栁輦路盡穿花池色連天漢城形象帝車旌旗暖風裏獵獵向西斜何處深春好春深阿母家瑤池長不夜珠樹正開花橋峻通星渚樓暄近日車層城十二闕相對日西斜何處深春好春深執政家恩光貪捧日貴重不看花玉饌堂交印沙隄柱礙車多門一巳閉直道更無斜何處深春好春深大鎮家前旌光照日後騎蹙成花節院收衙隊毬場簇看車廣筵歌舞散書號夕陽斜何處深春好春深貴戚家櫪嘶無價馬庭發有名花欲進宫人食先薫命婦車晚歸長帶酒冠葢甚傾斜何處深春好春深恩澤家爐添龍腦炷綬結虎頭花賔客珠成履嬰孩錦縛車畫堂簾幕外來去燕飛斜何處深春好春深京兆家人眉新柳葉馬色醉桃花盜息無鳴鼓朝迴自走車能令帝城外不敢逕由斜何處深春好春深刺史家夜闌猶命樂雨甚亦尋花傲客多憑酒新姬苦上車公門吏散後風擺㦸衣斜何處深春好春深羽客家芝田繞舍色杏樹滿山花雲是淮王宅風為列子車古壇操簡處一逕入林斜何處深春好春深小隠家芟庭留野菜撼樹去狂花醉酒一千日貯書三十車推衾従露體不敢有餘斜何處深春好春深富室家唯多貯金帛不擬負鶯花國樂呼聨轡行㕑載滿車歸來看理曲燈下寳釵斜何處深春好春深豪士家多沽味濃酒貴買色深花巳臂鷹隨馬連催妓上車城南踏青處村落逐原斜何處深春好春深貴胄家迎呼偏熟客㨂選最多花飲饌開華幄笙歌出鈿車興酣罇易罄連瀉酒瓶斜何處深春好春深唱第家名傳一紙牓興管九衢花薦聴諸侯樂來隨計吏車杏園抛曲處揮袖向風斜何處深春好春深少婦家能偷新禁曲自剪入時花追逐同遊伴平章貴價車従來不墮馬故遣髻鬟斜何處深春好春深幼女家雙鬟梳頂髻兩面綉裙花粧壊頻臨鏡身輕不占車鞦韆爭次第牽拽綵繩斜何處深春好春深蘭若家當香收百葉養蜜近梨花野逕宜行藥遊人盡駐車菜園籬落短遙見桔橰斜何處深春好春深老宿家小欄圍蕙草髙架引藤花四字香書印三乗壁畫車遲迴聴句偈雙樹晚隂斜何處深春好春深種蒔家分畦十字水接樹兩般花櫛比裁籬槿咿啞轉井車可憐髙處望棊布不曽斜何處深春好春深稚子家爭騎一竿竹偷折四鄰花笑撃羊皮鼓行牽犢頷車中庭貪夜戲不覺玉繩斜刑部白侍郎謝病長告改賔客分司以詩贈别鼎食華軒到眼前拂衣髙坐豈徒然九霄路上辭朝客四皓叢中作少年他日卧龍終得雨今朝放鶴且沖天洛陽舊有衡茆在亦擬抽身伴地仙遙賀白賔客分司初到洛中戲呈馮尹西辭望花去東占洛陽才度嶺無歸思看山不懊來冥鴻何所慕遼鶴乍飛迴洗竹通新逕攜琴上舊臺塵埃長者轍風月故人杯聞道龍門峻還因上客開和留守令狐相公答白賔客蛟龍和風吹樹枝商山逸客出闗時身無拘束起長晚路足交親行自遲官拂象筵終日待私將雞黍㡬人期君來不用飛書報萬户先従紙貴知始聞蟬有懐白賔客去嵗白有聞蟬見寄詩云秪應催我老兼遣報君知之句蟬韻極清切始聞何處悲人含不平意景值欲秋時此嵗方晼晚誰家無别離君言催我老已是去年詩憶樂天尋常相見意殷勤别後思量夢更頻每遇登臨好風景羨他天性少人情樂天寄洛下新詩兼喜微之欲到因以抒懐也松間風未起萬葉不自吟池上月未來清輝同夕隂宫徵不獨運塤箎自相尋一従别樂天詩思日已沈吟君洛中作精絶百錬金乃知孤鶴情月露為知音微之従東來威鳯鳴歸林羨君先相見一豁平生心月夜憶樂天兼寄微之今宵帝城月一望雪相似遙想洛陽城清光正如此知君當此夕亦望鏡湖水展轉相憶心月明千萬里酬鄆州令狐相公官舍言懐見寄兼呈樂天詞人各在一涯居聲味雖同跡自疎佳句傳音多好事尺題稀鴈不便書已通戎畧逢黄石仍占星文耀碧虛聞説朝天在來嵗霸陵春色待來車吟白樂天哭崔兒二篇愴然寄贈吟君苦調我霑纓能使無情盡有情四望車中心未釋千秋亭下賦初成庭梧已有雛棲處池鶴今無子和聲従此期君比瓊樹一枝吹折一枝生答樂天所寄咏懐且適其枯樹之歎衙前有樂饌常精宅内連池酒甚傾自是官髙無狎客不論年長少歡情驪龍含被探珠去老蚌胚還應月生莫羨三春桃與李桂花成實向秋榮白侍郎大尹自河南寄示池北新葺水齋即事招賔十四韻兼命同作公府有髙政新齋池上開再吟佳句後一似畫圖來結搆疎林下寅縁曲岸隈緑波穿户牖碧甃疊瓊瓌幽異當軒滿清光繞砌迴潭心澄晚鏡渠口起晴雷瑤草縁堤種松烟上島栽遊魚驚撥刺浴鷺喜毰毸為客烹林笋因僧採石苔酒缾常不罄書案任成堆簷外青雀舫坐中鸚鵡杯蒲根抽九節蓮萼捧重臺芳訊此時到勝遊何日陪共譏呉太守自占洛陽才赴蘇州酬别樂天呉郡魚書下紫宸長安廏吏送朱輪二南風化承遺愛八咏聲名躡後塵梁氏夫妻為寄客陸家兄弟是州民江城春日追隨處共憶東歸舊主人贈樂天一别舊遊盡相逢俱涕零在人雖晚達於樹似冬青痛飲連宵醉狂吟滿坐聴終期抛印綬共占少㣲星福先寺雪中酬别樂天龍門賔客㑹龍宫東去旌旗駐上東二八笙歌雲幕下三千世界雪花中離堂未暗排紅燭别曲含凄颺曉風才子従今一分散便將詩咏向呉儂醉答樂天洛城洛城何日歸故人故人今轉稀莫嗟雪裏暫時别終擬雲間相逐飛和樂天耳順吟兼寄敦詩吟君新什慰蹉􅋸屈指同登耳順科鄧禹功成三紀事孔融書就八年多巳經將相誰能爾抛却丞郎爭奈何獨恨長洲數千里且隨魚鳥泛烟波到郡未浹日登西樓見樂天題詩因即事以寄樂天自此郡謝病西歸湖上收宿雨城中無盡塵樓依新柳貴池帶亂苔春雲水正一望簿書來繞身烟波洞庭路愧彼扁舟人早夏郡中書事水禽渡殘月飛雨灑髙城華堂封嘉樹簾廡含曉清拂鏡整危冠振衣步前楹將吏儼成列簿書紛來縈言下辨曲直筆端破交爭虛懷詢病苦懐律操剽輕閽吏告無事歸來解簪纓高簾覆朱閣忽坐聞調笙虎丘寺見元相公二年前題名愴然有詠前年滻橋送之武昌滻水送君君不還見君題字虎丘山因知早貴兼才子不得多時在世間寄贈小樊花面了頭十三四春來綽約向人時終須買取名春草處處將來步步隨憶春草憶春草處處多情洛陽道金谷園中見日遲銅駝陌上迎風早河南大尹頻出難只得池塘十步看府門閉後滿街月㡬處遊人草頭歇館娃宫外姑蘇臺鬱鬱芊芊撥不開無風自偃君知否西子裙裾曽拂來樂天寄憶舊遊因作報白君以答報白君别來已渡江南春江南春色何處好燕子雙飛故官道春城三百七十橋夾岸朱樓隔柳條了頭小兒蕩畫槳長袂女郎簪翠翹郡齋北軒巻羅幕碧池逶迤遶畫閣池邊緑竹桃李花花下舞筵鋪彩霞呉娃足情言語黠越客有酒巾冠斜坐中皆言白太守不負風光向杯酒酒酣襞牋飛逸韻至今傳在人人口報白君相思空望嵩丘雲其奈錢塘蘇小小憶君淚㸃石榴裙白君在城近自洛歸錢塘和白侍郎送令狐相公鎮太原十萬天兵貂錦衣晉城風日斗生輝行臺僕射深恩重從事中郎舊路歸疊鼓蹙成汾水浪閃旗驚斷塞鴻飛邊庭自此無烽火擁節還來坐翠微秋夕不寐寄樂天洞户夜簾巻華堂秋簟清螢飛過池影蛩思遶階聲老枕知將雨髙窻報欲明何人諳此景逺問白先生冬日晨興寄樂天庭樹曉禽動郡樓殘㸃聲燈挑紅燼落酒暖白光生髮少嫌梳利顔衰恨鏡明獨吟誰應和須寄洛陽城酬樂天見寄元君後輩先零落崔相同年不少留華屋坐來能㡬日夜臺歸去便千秋背時猶自居三品三川呉郎品同得老終須卜一丘投老之日願樂天為鄰若使吾徒還早達亦應簫鼓入松楸答樂天見憶興老無期約到來如等閒偏傷朋友盡移興子孫間筆底心無毒盃前膽不呼闗反唯遺憶君夢飛過武牢闗和樂天誚失婢牓者把鏡朝猶在添香夜不歸鴛鴦拂瓦去鸚鵡透籠飛不逐張公子即隨劉武威新知正相樂従此脱青衣樂天寄重和晚達冬青一篇因成再答風雲變化饒年少光景蹉跎屬老夫秋隼自能凌汗漫寒龜飲氣受泥塗東隅有失誰能免北叟之言豈便無振臂猶堪一呼擲爭知掌下不成盧河南白尹有喜崔賔客歸洛兼見懷長句因而繼和㡬年侍従作名臣却向青雲索得身朝士忽為方外士主人仍是眼中人雙鸞遊處天京好五馬行時海嶠春遙羨光隂不虛擲肯令絲竹暫生塵和楊師臯給事傷小姬英英見學胡琴見藝成今朝追想㡬傷情撚絃花下呈新曲放撥燈前謝改名但是好花皆易落従來尤物不長生鸞臺夜直衣衾冷雲雨無因入禁城和樂天洛下醉吟寄太原令狐相公兼見懷長句舊相臨戎非稱意詞人作尹本多情従容自使邊塵靜談笑不聞桴鼓聲章句新添塞下曲風流舊占洛陽城昨來亦有呉趨詠惟寄東都與北京郡齋書懷寄江南白尹兼簡分司崔賔客謾讀圖書三十車年年為郡老天涯一生不得文章力百口空為飽煖家綺季衣冠稱鬢面呉公政事副詞華還思謝病今歸去同醉城東桃李花詶樂天七月一日夜即事見寄夜樹風韻清天河雲彩輕故花多露草隔城聞鶴鳴搖落従此始别離含逺情聞君當是夕倚瑟吟商聲外物豈不足中懷向誰傾秋來念歸去同聴嵩陽笙題于家公主舊宅樹滿荒臺葉滿池簫聲一絶草蟲悲鄰家猶學宫人髻園客爭偷御菓枝馬埒蓬蒿蔵狡兔鳯棲烟雨笑愁鴟何郎獨在無恩澤不似當初傅粉時吟樂天自問愴然有作親友闗心皆不見風光滿眼倍傷神洛陽城裏多池館㡬處花開有主人八月十五日夜半雲開然後翫月因詩一時之景兼呈樂天半夜碧雲收中天素月流開城邀好客置酒賞新秋影透衣香潤光凝歌黛愁斜輝猶可翫移宴上西樓秋日書懷寄白賔客州逺雄無益年髙健亦衰興情逢酒在筋力上樓知蟬噪芳意盡鴈來愁望時商山紫芝客應不向愁悲詶樂天見貽賀金紫之什久學文章含白鳯却因政事賜金魚郡人未識聞謠詠天子知名與詔書珍重和詩呈錦繡願言歸計並園廬舊來詞客多無位金紫同遊誰得如詶樂天初冬早寒見寄乍起衣猶冷微吟帽半敧霜凝南至瓦雞唱後園枝洛水碧雲曉呉宫黄葉時兩傳千里意書札不如詩樂天見示傷微之敦詩晦叔三君子皆有深分因成是詩以寄吟君歎逝雙絶句使我傷懐奏短歌世上空驚故人少集中惟覺祭文多芳林新葉催陳葉流水前波讓後波萬古到今同此恨聞琴淚盡欲如何春池泛舟聨句鳯池新雨後池上好風光上相公禹錫取酒愁春盡留賔喜日長度送户部柳絲迎畫舸水鏡寫雕梁羣送賈院長潭洞迷仙府烟霞認醉鄉餗送張司業鶯聲隨雨語行色入壺觴籍送主客晚景含澄澈時芳得艷陽禹錫飛鳬拂輕浪緑柳暗回塘度逸韻追安石髙居勝辟疆羣杯停新令舉詩動綵牋忙餗顧謂同來客歡遊不可忘籍杏園聨句杏園千樹欲隨風一醉同人此暫同羣上司空老態忽忘絲管裏衰顔宜解酒杯中絳上白二十二曲江日暮殘紅在翰苑年深舊事空居易上主客二十四年流落者故人相引到花叢禹錫花下醉中聨句共醉風光地花飛落酒杯絳送劉二十八殘春猶可賞晚景莫相催禹錫送白侍郎酒幸年年有花應嵗嵗開居易送兵部相公且當金韻擲莫遣玉山頽絳送庾閣長髙㑹彌堪惜良時不易陪承宣送主客誰能拉花住爭換得春回禹錫送吏部我輩尋常有佳人早晚來嗣復送兵部寄言三相府欲散且裵回居易時户部相公同㑹宴興慶池亭送白二十二東歸聨句東洛言歸去西園告别來白頭青眼客池上手中杯度離瑟殷勤奏仙舟委曲回征輪今欲動賔閣為誰開禹錫坐弄瑠璃水行登緑縟堆花低粧炤影萍散酒吹醅居易岸䕃新抽竹亭香欲變梅隨遊多笑傲遇勝且裵􅏆籍澄澈連天鏡潺湲出地雷林塘難共賞鞍馬莫相催度信及魚還樂機忘鳥不猜晚晴槐起露新暑石添苔禹錫擬作雲泥别尤思頃刻陪歌停珠貫斷飲罷玉峯頽居易雖有逍遙志其如磊落才㑹當重入用此去肯悠哉籍西池送白二十二東歸兼寄令狐相公聨句促坐宴回塘送君歸洛陽彼都留上宰為我説中腸度威鳯池邊别冥鴻天際翔披雲見居守望日拜封章禹錫春盡年華少舟通景氣長送行歡共惜寄逺意難忘籍東道瞻軒蓋西園醉羽觴謝公深眷眄商皓信輝光行武舊徳推三友新篇代八行缺首夏猶清和聨句記得謝家詩清和即此時居易餘花數種在宻葉㡬重垂度芳謝人人惜隂成處處宜禹錫水萍爭㸃綴梁燕共追隨行武亂蝶憐疎蕋殘鶯戀好枝籍草香殊未歇雲勢漸多竒居易單服初寧體新篁已出籬度與春為别近覺日轉行遲禹錫遶樹風光少侵階苔蘚滋行武惟思奉歡樂長得在西池籍薔薇花聨句似錦如霞色連春接夏開禹錫波紅分影入風好帶香來度得地依東閣當階奉上台行武淺深皆有態次第暗相催禹錫滿地愁英落縁堤惜棹迴度芳濃濡雨露明麗隔塵埃行武似著燕脂染如經巧婦裁居易奈花無别計只有酒殘杯籍西池洛泉聨句東閣聴泉落能令野興多行武散時猶帶沫淙處即跳波度徧洗磷磷石還驚泛泛鵞籍色清塵不染光白月相和居易噴雪縈絲竹攅珠濺芰荷禹錫對吟時合響觸樹更搖柯籍照圃紅分藥侵堦緑浸莎居易日斜車馬散餘韻逐鳴珂禹錫和樂天柘枝柘枝本出楚王家玉面添嬌舞態奢鬆鬢改梳鸞鳯髻新衫别織鬭雞紗鼓催殘拍腰身軟汗透羅衣雨㸃花畫席曲終辭别去便隨王母上烟霞和樂天題真娘墓薝蔔林中黄土堆羅襦繡黛巳成灰芳䰟雖死人不怕蔓草逢春花自開幡蓋向風疑舞袖鏡燈臨曉似粧臺呉王嬌女墳相近一片行雲應往來劉賔客外集巻二欽定四庫全書劉賔客外集巻三唐劉禹錫撰詩客有話汴州新政書事寄令狐相公天下咽喉今大寧軍城喜氣徹青冥庭前劒㦸朝迎日筆底文章夜應星三省壁中題姓字萬人頭上見儀形汴州忽復承平事正月看燈户不扃和令狐相公郡齋對紫薇花明麗碧天霞丰茸紫綬花香聞荀令宅艷入孝王家㡬嵗自榮樂髙情方歎嗟有人移上苑猶是占年華令狐相公見示河中楊少尹贈答兼命繼之兩首新詩百字餘朱絃玉磬韻難如漢家丞相重徵後梁苑仁風一變初四面諸侯瞻節制八方通貨溢河渠自従郄縠為元帥大將歸來盡把書和令狐相公謝太原李侍中寄蒲桃珍果出西域移根到北方昔年隨漢使今日寄梁王上相芳緘至行臺綺席張魚鱗含宿潤馬乳帶殘霜染指鉛粉膩滿喉甘露香醖成十日酒味敵五雲漿咀嚼停金盞稱嗟響畫堂慙非末至客不得一枝嘗和令狐相公送趙常盈鍊師與中貴人同拜嶽及天台投龍畢却赴京師銀璫謁者引蜺旌霞帔仙官到赤城白鶴迎來天樂動金龍擲下海神驚元君伏奏歸中禁武帝親齋禮上清何事夷門請詩送梁王文字上聲名令狐相公俯贈篇章斐然仰謝鄂渚臨流别梁園衝雪來旅愁隨凍釋歡意待花開城曉烏頻起池春鴈欲回飲和心自醉何必管絃催詶令狐相公贈别越聲長苦有誰聞老向湘山與楚雲海嶠新辭永嘉守夷門重見信陵君田園松菊今迷路霄漢鴛鴻久絶羣幸遇甘泉尚詞賦不知何客薦雄文酬令狐相公寄賀遷拜之什邅迴二紀重為郎洛下遙分列宿光不見當闗呼早起曽無侍史與焚香三花秀色通春幌十字清波遶宅牆白首青衫誰比數相憐只是有梁王相公昔曽以大僚分司故有同病相憐之句酬令狐相公早秋見寄公來第四秋樂國號無愁軍士遊書肆商人占酒樓熊羆交黒矟賔客滿青油今日文章主梁王不姓劉和令狐相公翫白菊家家菊盡黄梁國獨如霜瑩靜真琪樹分明對玉堂仙人披雪􅌁素女不紅粧粉蝶來難見麻衣拂更香向風搖羽扇含露滴瓊漿髙豔遮銀井繁枝覆象床桂叢慙並發梅蕋妒先芳一入瑤華詠従兹播樂章夏日寄宣武令狐相公長憶梁王逸興多西園花盡興如何近來溽暑侵亭館應覺清談勝綺羅境入篇章髙韻發風穿號令衆心和承明欲謁先相報願拂朝衣逐曉珂令狐相公見示贈竹二十韻仍命繼和髙人必愛竹寄興良有以峻節可臨戎虛心宜得士衆芳信妍媚威鳯難棲止遂於鼙鼓間移植東南美封以梁國土澆之浚泉水得地色不移凌空勢方起新青排故葉餘粉籠疎理猶復隔牆藩何因出塵滓兹辰去前蔽永日勞瞪視槭槭林已成熒熒玉相似親摹起心匠洗滌在頥指曲直既瞭然孤髙何卓爾垂梢覆内屏迸笋侵前戺妓席拂雲鬢賔階廕珠履抱琴恣閒翫執巻堪斜倚露下懸明璫風來韻清徵堅貞貫四候標格殊百卉嵗晚當自知繁華豈云比古詩無贈竹髙唱従此始一聴清瑤音崢然長在耳和令狐相公入潼闗寒光照旌節闗路曉無塵吏謁前丞相山迎舊主人東瞻軍府靜西望􅃯書頻心共黄河水同昇天漢津和令狐相公尋白閣老見留小飲因贈傲士更逢酒樂天仍對花文章管星歴情興占年華宦達飜思退名髙却不誇惟存浩然氣相共賞烟霞酬令狐相公雪中遊𤣥都見憶好雪動髙情心期在玉京人披鶴􅌁出馬踏象筵行照耀樓臺變淋漓松桂清𤣥都留五字使入步虛聲和令狐相公以司空裴相見招南亭看雪四韻重門不下闗樞務有餘閒上客同看雪髙亭盡見山瑞呈霄漢外興入笑言間知是平陽㑹人人帶酒還和令狐相公别牡丹平章宅裏一欄花臨到開時不在家莫道兩京非逺别春明門外即天涯酬令狐留守巡内至集賢院見寄仙院文房隔舊宫當時盛事盡成空墨池半在頽垣下書帶猶生蔓草中巡内因經九重苑裁詩又繼二南風為兄手寫殷勤句遍歴三台各一通和鄆州令狐相公春晚對花朱門退公後髙興對花枝望闕無窮思看書欲盡時含芳朝競發凝艷晚相宜人意殷勤惜狂風豈得知酬令狐相公春日言懐見寄前陪看花處鄰里近王昌今想臨戎地旌旗出汶陽營飛柳絮雪門耀㦸枝霜東望清河水心隨艑上郎和令狐相公言懐寄河中楊少尹章句慙非第一流世間才子暗陪遊呉宫已歎芙蓉死張司業詩云呉宫四面秋江水天清露白芙蓉死邊月空悲蘆管秋李尚書任向洛陽稱傲吏分司白賔客苦教河上領諸侯天平相公石渠甘對圖書老闗外楊公安穏不遙和令狐相公坐中聞思帝鄉有感當初造曲者為誰説得思鄉戀闕時滄海西頭舊丞相停杯處分不須吹酬令狐相公見寄羣玉山頭住四年每聞笙鶴看諸仙何時得把浮丘袖白日將昇第九天途次大梁雪中奉天平令狐相公書問兼示新什因思曩嵗従此拜辭形於短篇以申仰謝逺守宦情薄故人書信來共曽花下别今獨雪中回紙尾得新什眉頭還暫開此時同鴈鶩池上一徘徊令狐相公自天平移鎮太原以詩申賀相公昔為并州從事北都留守將天兵出入香街宿禁扃鼙鼓夜聞驚朔鴈旌旗曉動拂參星孔璋舊檄家家有叔度新歌處處聴夷落遙知真漢相爭來屈膝看儀形重酬前寄邊烽寂寂盡收兵宫樹蒼蒼靜掩扃戎羯歸心如内地天狼無角比凡星新成麗句開緘後便入清歌滿坐聴呉苑晉祠遙望處可憐南北太相形酬令狐相公秋懐見寄寂寞蟬聲靜差池燕羽回秋鄰多越絶朔氣想臺駘相去數千里無因同一杯殷勤望飛鴈新自塞垣來酬令狐相公六言見寄巳嗟離别太逺更被光隂苦催呉苑燕辭人去汾川鴈帶書來愁吟月落猶望憶夢天明未回今日便令歌者唱兄詩送一杯令狐相公自太原累示新詩因以酬寄飛蓬巻盡塞雲寒戰馬閒嘶漢地寛萬里氷天無警急一籠烽火報平安燈前妓樂留賔燕雪後山河出獵看珍重新詩逺相寄風情不似四登壇酬太原令狐相公見寄書信來天外瓊瑤滿匣中衣冠南渡逺旌節北門雄鶴唳華亭月馬嘶榆塞風山川㡬千里惟有兩心同酬令狐相公嵗暮逺懐見寄别侣孤鶴怨沖天威鳯歸容光一以間夢想是耶非芳訊逺彌重知音老更稀不如湖上鴈北向整毛衣酬令狐相公親仁郭家花下即事見寄荀令園林好山公遊賞頻豈無花下侣逺望眼中人斜日漸移影落英紛委塵一吟相思曲惆悵江南春酬令狐相公首夏閒居書懐見寄蕙草芳未歇緑槐隂巳成金罍唯獨酌瑤瑟有離聲翔泳各殊勢篇章空寄情應憐三十載未變使君名貞元中自郎官出守至今三十一年酬令狐相公庭前白菊花謝偶書所懐見寄數叢如雪色一旦冒霜開寒蕋差池落清香斷續來思深含别怨芳謝惜年催千里難同賞看看又早梅酬令狐相公季冬南郊宿齋見寄壇下雪初霽南城凍欲生齋心祠上帝髙步領名卿沐浴含芳澤周旋聴佩聲猶憐廣平守寂寞竟何成貞元中侍郎舅氏牧華州時余再忝科第前後由華覲謁陪登伏毒寺屢焉亦曽賦詩題於梁棟今典馮翊暇日登樓南望三峰浩然生思追想昔年之事因成篇題舊寺曽作闗中客頻經伏毒巖晴烟沙苑樹晚日渭川帆昔是青春貌今悲白雪髯郡樓空一望含意巻髙簾酬令狐相公杏花園下飲有懐見寄年年曲江望花發即經過未飲心先醉臨風思倍多三春看又盡兩地欲如何日望長安道空成勞者歌和令狐相公春早朝回鹽鐵使院中作柳動御溝清威遲堤上行城隅日未過山色雨初晴鶯避傳呼起花臨府署明簿書盈几案要自有髙情令狐相公見示題洋州崔侍郎宅雙木𤓰花頃接侍郎同舍陪宴樹下吟翫來什輒成和章金牛蜀路逺玉樹帝城春榮耀生華館逢迎欠主人簾前疑小雪牆外麗行塵來去皆回首情深是徳鄰和令狐僕射相公題龍回寺兹地回鑾日皇家禪聖時路無胡馬跡人識漢官儀天子旌旗度法王龍象隨知懷去家歎經此益遲遲相公家本咸陽有喬木之思和令狐相公晚泛漢江書懐寄洋州崔侍郎閬州髙舍人二曹長雨過逺山出江澄暮霞生因浮濟川舟遂作適野行郊樹映緹騎水禽避紅旌田夫捐畚鍤織婦窺柴荆古岸夏花發遙林晚蟬清沿洄方翫境鼓角巳登城部内有良牧望中寄深情臨觴念佳期泛瑟動離聲寂寞一病士夙昔接羣英多謝謫仙侣㡬時還玉京酬令狐相公使宅别齋初栽桂樹見懐之作清淮南岸家山樹黒水東邊第一栽影近畫梁迎曉日香隨緑酒入金杯根留本土依江潤葉起寒稜映月開早晚隂成比梧竹九霄還放綵鵬來令狐相公頻示新什早春南望遐想漢中因抒短章以寄情愫軍城臨漢水旌斾起春風逺思見江草歸心看塞鴻野花沿古道新葉映行宫惟有詩兼酒朝朝兩不同酬令狐相公見寄才兼文武播雄名遺愛芳塵滿洛城身在行臺為僕射書來甪里訪先生閒遊占得嵩山色醉臥髙聴洛水聲千里相思難命駕七言詩裏寄深情令狐相公春思見寄一紙書封四句詩芳晨對酒逺相思長吟盡日西南望猶及殘春花落時令狐相公見示新栽蕙蘭二草之什兼命同作上國庭前草移來漢水潯朱門雖易地玉樹有餘隂豔彩凝還泛清香絶復尋光華童子佩柔軟美人心惜晚含逺思賞幽空獨吟寄言知音者一奏風中琴和令狐相公南齋小讌聴阮咸陋巷久蕪沈四絃有遺音雅聲發蘭室逺思含竹林座絶衆賔語庭移芳樹隂飛觴助真氣寂聴無流心影似白團扇調諧朱絃琴一毫不平意幽怨古猶今和令狐相公詠梔子花蜀國花已盡越桃今已開色凝瓊樹倚香似玉京來且賞同心處那憂别葉催佳人如擬詠何必待寒梅酬令狐相公新蟬見寄相去三千里聞蟬同此時清吟曉露葉愁噪夕陽枝忽爾絃斷絶俄聞管參差洛橋碧雲晚西望佳人期和令狐相公九日對黄白二菊花見懷素萼迎寒秀金英帶露香繁華照旄鉞榮盛對銀黄琮璧交輝暎衣裳雜彩章晴雲遙葢覆秋蝶近悠揚空想逢九日何由陪一觴滿叢佳色在未肯委嚴霜城内花園頗曽遊翫令君居守亦有素期適春霜一夕委謝書實以答令狐相公見謔樓下芳園最占春年年結侣採花頻繁霜一夜相撩冶不似佳人似老人令狐僕射與余投分素深縦山川阻峭然音問相繼今年十一月僕射疾不起聞予巳承訃書寝門長慟後日有使者兩輩持書并詩計其日時已是卧疾手筆盈幅翰墨尚新詞一篇音韻彌切收淚握管以成報章雖廣陵之絃於今絶矣而葢泉之感猶庶聞焉焚之繐帳之前附于舊編之末前日寢門慟至今悲有餘巳嗟萬花盡方見八行書滿紙傳相憶裁詩怨索居危絃音有絶哀玉韻由虛忽歎幽明異俄驚嵗月除文章雖不朽精魄竟焉如零淚霑青簡傷心見素車凄凉從此後無復望雙魚劉賔客外集巻三欽定四庫全書劉賔客外集巻四唐劉禹錫撰詩郡内書情獻裴侍中留守功成頻獻乞身章擺落襄陽鎮洛陽萬乗旌旗分一半八方風雨㑹中央兵符今奉黄公畧書殿曽隨翠鳯翔心寄華亭一雙鶴日陪髙步繞池塘詶樂天閒卧見寄散誕向陽眠將閑敵地仙詩情茶助爽藥力酒能宣風碎竹間日露明池底天同年未同隠縁乞買山錢詶樂天小亭寒夜有懷寒夜隂雲起疎林宿鳥驚斜風閃燈影迸雪打窻聲竟夕不能寐同年知此情漢皇無奈老何況本書生奉和裴晉公凉風亭睡覺驪龍睡後珠元在仙鶴行時步又輕方寸瑩然無一事水聲來似玉琴聲和樂天閒園獨賞八韻前以蜂鶴拙句寄呈今辱蝸蟻妍詞見答因成小巧以取大咍永日無人事芳園注興行陶廬樹可愛潘宅雨新晴傅粉琅玕節薫香菡萏莖榴花裙色好桐子藥圓成柳蠧枝偏亞桑閒葉再生睢盱欲鬬雀索漠不言鶯動植隨四氣飛沈含五情槍榆與水擊小大强為名詶樂天衫酒見寄酒法衆傳呉米好舞衣偏向越羅輕動搖浮蟻香濃甚装束輕鴻意態生閱曲定知能自適舉杯應歎不同傾終朝相憶終年别對景臨風無限情兩何如詩謝裴令公贈别二首一言一顧重重何如今日陪遊清洛苑昔年别入承明廬一東一西别别何如終期大冶再鎔鍊願託扶搖翔碧虛將之官留辭裴令公留守祖帳臨伊水前旌指渭河風烟里數少雲雨别情多重疊受恩久邅迴如命何東山與東閣終異再經過詶喜相遇同州與樂天替代舊託松心契新交竹使符行年同甲子筋力羨丁夫别後詩成帙攜來酒滿壺今朝停五馬不獨為羅敷前章所言春草白君之舞妓也故有此答奉和裴令公新成緑野堂即書藹藹鼎門外澄澄洛水灣堂皇臨緑野坐卧看青山位極却忘貴功成欲愛閒官名思管籥心術去機闗禁苑凌晨出園花及露攀池塘魚拔刺竹逕鳥綿蠻志在安瀟灑嘗經歴險艱髙情方造適衆意望徵還好客交珠履華筵舞玉顔無因隨賀燕翔集畫梁間自左馮歸洛下詶樂天兼呈裴令公新恩通籍在龍樓分務神都近舊丘自有園公紫芝侣時賔行四人盡在洛中仍追少傅赤松遊華林霜葉紅霞晚伊水晴光碧玉秋更接東山文酒㑹始知江左未風流王儉云江左風流宰相唯有謝安秋齋獨坐寄樂天兼呈呉方之大夫空齋寂寂不生塵藥物方書繞病身纎草數莖勝静地幽禽忽至似佳賔世間憂喜雖無定釋氏銷磨盡有因同向洛陽閒度日莫教風景屬他人和樂天齋戒月滿夜對道場偶懷詠常脩清靜去繁華人識王城長者家案上香烟鋪貝葉佛前燈焰透蓮花持齋已滿招閒客理曲先聞命小娃明日若過方丈室還應問為法來耶呉方之見示獨酌小醉首篇樂天續有詶答皆含戲謔極至風流兩篇之中並䝉見屬輒呈濫吹益美來章閒門共寂任張羅靜室同虛養太和塵世歡娯開意少醉鄉風景獨遊多散金疎傅尋常樂枕麴劉生取次歌計㑹雪中爭挈榼鹿裘鶴􅌁逓相過詶樂天齋滿日裴令公置宴席上戲贈一月道場齋戒滿今朝華幄管絃迎銜杯本自多狂態事佛無妨有佞名酒力半酣愁已散文鋒未鈍老猶爭平陽不獨容賔醉聴取喧呼吏舍聲詶樂天偶題酒瓮見寄従君勇斷抛名後世路榮枯見㡬回門外紅塵人自走甕頭清酒我初開三冬學任胷中有萬户侯須骨上來何幸相招同醉處洛陽城裏好池臺答裴令公雪中訝白二十二與諸公不相訪之什玉樹瓊樓滿眼新的知開閤待諸賔遲遲未去非無意擬作梁園坐右人詶樂天請裴令公開春加宴髙名大位能兼有恣意遨遊是特恩二室烟霞成步障三州風物是家園晨窺苑樹韶光動晚度河橋春思繁絃管常調客常滿但逢花處即開樽樂天示過敦詩舊宅有感一篇吟之泫然追想昔事因成繼和以寄苦懐凄凉同到故人居門枕寒流古木疎向秀心中嗟棟宇蕭何身後散圖書本營歸計非無意唯算生涯尚有餘忽憶前因更惆悵丁寧相約速懸車敦詩與予及樂天三人同甲子平生相約同休洛中呉方之見示聴江西故吏朱幼恭歌三篇頗有懐故林之思吟諷不足因而和之侯家故吏歌聲發逸處能髙怨處低今嵗洛中無雨雪眼前風景是江西閒坐憶樂天以詩問酒熟未案頭開縹帙肘後檢青囊唯有達生理應無治老方減書存眼力省事養心王君酒何時熟相攜入醉鄉和樂天洛城春齊梁體八韻帝城宜春入遊人喜意長草生季倫谷花出莫愁坊斷雲發山色輕風漾水光樓前戲馬地樹下鬬雞場白頭自為侣緑酒亦滿觴潘園觀種植謝墅閱池塘至門似隠逸過老不悲傷相問焉功徳銀黄遊故鄉三月三日與樂天及河南李尹奉陪裴令公泛洛禊飲各賦十二韻洛下今脩禊羣賢勝㑹稽盛筵陪玉鉉通籍盡金閨波上神仙妓岸傍桃李蹊水嬉如鷺振歌響雜鶯啼歴覽風光好沿洄意思迷棹歌能儷曲墨客競分題翠幄連雲起香車向道齊人誇綾步障馬惜錦障泥塵暗宫牆外霞明苑樹西舟形隨鷁轉橋影與虹低川色晴猶逺烏聲暮欲棲唯餘踏青伴待月魏王堤寄和東川楊尚書慕巢兼寄西川繼之二公近従弟兄情分偏睦早忝遊舊因成是詩太華蓮峯降嶽靈兩川棠樹接郊坰政同兄弟人人樂曲奏塤箎處處聴楊葉百穿榮㑹府芝泥五色耀天庭各抛筆硯誇旄鉞莫遣文星讓將星秋中暑退贈樂天暑服宜秋著清琴入夜彈人情皆向菊風意欲摧蘭嵗稔貧心泰天凉病體安相逢取次第却甚少年歡和樂天洛中雪中宴集寄汴州李尚書洛城無事足杯盤風雪相和嵗欲闌樹上因依見寒鳥坐中收拾盡閒官笙歌要請頻何爽笑語忘機拙更歡遙想兔園今日㑹瓊林滿眼映旂竿喜遇劉二十八偶書兩韻聨句病來佳興少老去舊遊稀笑語縦横作盃觴絡繹飛度清談如水玉逸韻貫珠璣髙位當金鉉虛懐似布衣禹錫巳榮狂取樂仍任醉忘機捨眷將何適留歡便是歸居易鳳儀常欲附蛟力自知微願假樽罍末膺門自此依紳劉二十八自汝赴左馮塗經洛中相見聨句不歸丹掖去銅竹漫云云唯喜因過我須知未賀君度詩聞安石詠香見令公熏欲首函闗路來披緱嶺雲居易貂蟬公獨步鴛鷺我同羣插羽先飛酒交鋒便戰文紳鎮嵩知表徳定鼎為銘勲顧鄙容商洛徵歡候汝墳禹錫頻年多謔浪此夕任喧紛故態猶應在行期未要聞度游藩榮已久捧袂惜將分詎厭杯行疾唯愁日向曛居易窮隂初莽蒼離思漸氤氲殘雪午橋岸斜陽伊水濆紳上謨尊右掖全畧靜東軍萬頃徒稱量滄溟詎有垠禹錫予自到洛中與樂天為文酒之㑹時時搆詠樂不可支則慨然共憶夢得而夢得亦分司至止歡愜可知因為聨句成周文酒㑹吾友勝鄒枚唯憶劉夫子而今又到來度欲迎先倒屣亦坐便傾盃飲許伯倫右詩推公幹才並以本事居易久曽聆郢唱重喜上燕臺晝話牆隂轉宵歡斗柄迴禹錫新聲還共聴故態復相咍遇物皆先賞従花半未開度起時烏帽側散處玉山頽墨客諠東閣文星犯上台居易詠吟君稱首疎放我為魁憶戴何勞訪隨夢得夢得分司而來留髠不用猜宴席上老夫暫起樂天宻坐不動足奉觴承麴蘖落筆捧瓊瑰醉弁無妨側詞鋒不可摧此兩韻美令公也居易水軒看翡翠石徑踐莓苔童子能騎竹佳人解詠梅陪遊南宅之境禹錫洛中三可矣鄴下七悠哉自向風光急不須絃管催度樂觀魚踴躍閒愛鸖裵􅏆烟柳青凝黛波萍緑撥醅居易春榆初改火律管又飛灰紅藥多遲發碧松宜亂栽禹錫馬嘶駞陌上鷁泛鳯城隈色色時堪惜㱔㱔病莫推度涸流尋軋軋餘刃轉恢恢従此知心伏無因敢自媒禹錫室隨親客入席許舊寮陪逸興嵇將阮交情陳與雷此二句屬夢得也居易洪爐思哲匠大厦要羣材佗日登龍路應知免曝鰓禹錫洛中早春贈樂天漠漠復靄靄半晴將半隂春來自何處無迹日以深韶嫩水後木輕盈烟際林藤生欲有託柳弱不自任花意已含蓄鳥言尚沈吟期君當此時與我恣追尋飜愁闌漫後春暮却傷心和樂天讌李周美中丞宅池上賞櫻桃花櫻桃千萬枝照耀如雪天王孫讌其下隔水疑神仙宿露發清香初陽動暄妍妖姬滿鬢插酒客折枝傳同此賞芳月㡬人有華筵杯行勿遽辭好醉逸三年和牛相公遊南莊醉後寓言戲贈樂天兼見示城外園林初夏天就中野趣在西偏薔薇亂發多臨水鸂鶒雙遊不避船水底逺山雲似雪橋邊平岸草如烟白家唯有盃觴興欲把頭盤打少年思黯南墅賞牡丹花偶然相遇人間世合在増城何姥家有此傾城好顔色天教晚發賽諸花樂天少傅五月長齋廣延緇徒謝絶文友坐成暌間因以戲之五月長齋戒深居絶送迎不離通徳里便是法王城舉目皆僧事全家少俗情精脩無上道結念未來生賔閤緇衣占書堂信鼓鳴戲童為塔象啼鳥學經聲黍用青菰角葵承玉露烹馬家供薏苡劉氏餉蕪菁暗網籠歌扇流塵晦酒鐺不知何次道作佛㡬時成樂天池館夏景方妍白蓮初開綵舟空泊唯邀緇侣因以戲之池館今正好主人何寂然白蓮方出水碧樹未鳴蟬靜室宵聞磬齋㕑晚絶烟蕃僧如共載應不是神仙詶樂天晚夏閑居欲相訪先以詩見貽池榭堪臨泛翛然散鬱陶步因驅鸖緩吟為聴蟬髙林宻添新竹枝低縋晚桃酒醅晴易熟藥圃夏頻薅老是班行舊閒為鄉里豪經過更何處風景屬吾曹詶樂天感秋凉見寄庭晚初辨色林秋微有聲槿衰猶强笑蓮迥却多情簷燕歸心動韝鷹俊氣生閑人占閒景酒熟且同傾樂天以愚相訪沽酒致歡因成七言聊以奉答少年曽醉酒旗下同輩黄衣頷亦黄蹴踏青雲尋入仕蕭條白髮且飛觴令徵古事歡生雅客喚閒人興任狂猶勝獨居荒草院蟬聲聴盡到寒螿秋晚新晴夜月如練有懷樂天雨歇晚霞明風調夜景清月髙微暈散雲薄細鱗生露草百蟲思秋林千葉聲相望一步地脈脈萬重情和思黯南莊見示丞相新家伊水頭智囊心匠日増脩化成池沼無痕跡奔走清波不自由臺上看山徐舉酒潭中見月慢回舟従來天下推尤物合屬人間第一流同留守王僕射各賦春中一物從一韻至七鶯能語多情春將半天欲明始逢南陌復集東城林疎時見影花宻但聞聲營中縁催短笛樓上來定哀箏千門萬户垂楊裏百囀如簧烟景晴和樂天春詞依憶江南曲拍為句春去也多謝洛城人弱柳従風疑舉袂叢蘭裛露似霑巾獨坐亦含嚬謝樂天聞新蟬見贈碧樹有蟬後烟雲改容光瑟然引秋氣芳草日夜黄夾道喧古槐臨池思垂楊離人下憶淚忠士激剛腸昔聞阻山川今聴同匡牀人情便所遇音韻豈殊常因之比笙竽送我遊醉鄉新秋對月寄樂天月露發光彩此時方見秋夜凉金氣應天靜火星流蛩響偏依井螢飛直過樓相知盡白首清景復追遊詶樂天小臺晚坐見憶小臺堪逺望獨上清秋時有酒無人勸看山祗自知幽禽轉新竹孤蓮落靜池髙門勿遽掩好客無前期早秋雨後寄樂天夜雲起河漢朝雨洒髙林梧葉先風落草蟲迎濕吟簟凉扇恩薄室靜琴思深且喜炎前别安能懐寸隂和樂天秋凉閒卧暑退人體輕雨餘天色改荷珠貫索斷竹粉殘粧在髙僧掃室請逸客登樓待槐柳漸蕭疎閒門少光彩秋晚病中樂天以詩見問力疾奉酬耳虛多聴逺展轉晨雞鳴一室背燈卧中夜掃葉聲蘭芳經雨敗鸖病得秋輕肯踏衡門草唯應是友生和樂天燒藥不成命酒獨醉九轉欲成就百神應主持鶯啼鼎上去老貌鏡中悲却顧空丹竈回心向酒巵醺然耳熱後暫似少年時詶樂天詠老見示人誰不願老老去有誰憐身瘦帶頻減髮稀冠自偏廢書縁惜眼多炙為隨年經事還諳事閱人如閱川細思皆幸矣下此便翛然莫道桑榆晚為霞尚滿天嵗夜詠懐彌年不得意新嵗又如何念昔同遊者而今有㡬多以閒為自在將夀補蹉跎春色無新故幽居亦見過元日樂天見過因舉酒為賀漸入有年數喜逢新嵗來震方天籟動寅位帝車回門巻掃殘雪林園驚早梅與君同甲子夀酒讓先杯裴令公見示詶樂天寄奴買馬絶句斐然仰和且戲樂天常奴安得似方回爭望追風絶足來若把翠娥酬緑耳始知天下有竒才詶思黯代書見戲官冷如漿病滿身凌寒不易過天津少年留守多情興請待花時作主人詶思黯見示小飲四韻抛却人間第一官俗情驚怪我方安兵符相印無心戀洛水嵩雲恣意看三足鼎中知味久百尋竿上擲身難追呼故舊連宵飲直到天明興未闌詶樂天醉後狂吟十韻來章有移家惟醉和之句散誕人間樂逍遙地上仙詩家登逸品釋氏悟真筌制誥留臺閤歌詞入管絃處身於木鴈任世變桑田吏隠情兼遂儒𤣥道兩全八闗齊適罷三雅興尤偏文墨中年舊松筠晚嵗堅魚書曽替代香火有因縁陸法和云與梁元帝於空王寺佛前訂香火因緣欲向醉鄉去猶為色界牽好吹楊柳曲為我舞金鈿詶牛相公獨飲偶醉寓言見示宫漏夜丁丁千門閉霜月華堂列紅燭絲管靜中發歌眉低有思舞體輕無骨主人啓酡顔酣暢浹映髮猶思城外客阡陌不可越春意日夕深此歡無斷絶和僕射牛相公春日閒坐見懐官曹崇重難頻入第宅清閒且獨行階蟻相逢如偶語園蜂速去恐違程人於紅藥惟看色鶯到垂楊不惜聲東洛池臺怨抛擲移文非久㑹應成牛相公見示新什謹依本韻次用以抒下情劇韻新篇至因難始有能雨天龍變化晴日鳳騫騰遊海驚何極聞韶素不曽愜心時拊髀擊節自麾肱符彩添俞墨波瀾起剡藤揀金光熠熠累璧勢層層珠媚多蔵賈花撩欲定僧封來真寳物寄與媿文朋巳老無時疾時洛中時癘多傷少年長貧望嵗登雀羅秋寂寂蟲翅曉薨薨羸驥方辭絆虛舟已絶絙榮華甘死别健羨亦生憎玉柱琤瑽韻金觥雹凸稜何時良宴㑹促膝對華燈秋霖即事聨句三十韻蕭索窮秋月蒼茫苦雨天泄雲生棟上行潦入庭前居易送上僕射苔色侵三徑波聲想五絃井蛙爭入户轍鮒亂歸泉起送上中丞大監髙霤愁晨坐空階警夜眠鶴鳴猶未已蟻穴亦頻遷禹錫送上少傅侍郎散漫疎還宻空濛斷又連竹霑青玉潤荷滴白珠圓居易地濕灰蛾滅池添水馬憐有苗霑霢霂無月弄潺湲起籬菊潛開秀園蔬已罷鮮斷行隨鴈翅孤嘯聳鳶肩禹錫橋柱黏黄菌牆衣㸃緑錢草荒行藥路沙淀釣魚船居易長者車猶阻髙人榻且懸此思劉台之來也金烏何日見玉爵㡬時傳起近井桐先落當簷石欲穿趨風誠有戀披霧邈無縁禹錫以答懸榻之召廩米陳生醭庖薪濕起烟鳴鷄潜起曉急景暗彫年居易葢洒髙松上絲繁細柳邊拂叢時起蝶墜葉乍驚蟬起巾角皆爭墊裙裾别似湔人多䝉翠被馬盡著連乾禹錫好客無來者貧家但悄然寒泥印鶴跡漏壁絡蝸涎居易蚊聚雷侵室鷗翻浪滿川上樓愁羃羃遶舍厭濺濺起律候今秋矣歡娯久曠焉但令髙興在晴後奉周旋禹錫喜晴聨句苦雨晴何喜喜於未雨時氣收雲物變聲樂鳥烏知居易送上僕射蕙泛光風圃蘭開皎月池千峯分逺近九陌好追隨起送上尚書白日開天路𤣥隂巻地維餘清在林薄新照入漣漪禹錫碧樹凉先落青蕪濕更滋㬠毛經浴鶴曳尾出泥龜居易舞去商羊速飛來野馬遲柱邊無潤礎臺上有遊絲起橋淨行塵息堤長禁柳垂宫城開睥睨觀闕麗罘罳禹錫洛水澄清鎮嵩烟展翠帷梁成虹乍見市散蟣初移居易藉草風猶暖攀條露已晞屋穿添碧瓦牆缺召金縋起迥澈來雙目昏煩去四支霞文晚煥爛星彩夕參差禹錫爽助門庭肅寒摧草木衰黄乾向陽菊紅洗得霜梨居易假葢閑誰惜彈絃燥更悲散蹄良馬穏炙背野人宜起洞户晨輝入空庭宿霧披推牀出書目傾笥上衣椸禹錫道路行非阻軒居望可期無辭訪圭竇且願見瓊枝居易山閣蓬萊客古以祕書喻蓬萊儲宫羽翼師此言少傅每優陪麗句何暇覿英姿起以酬圭竇之言翫景方搔首懷人尚斂眉因吟仲文什髙興盡於斯禹錫㑹昌春連宴即事元年寒食日上已暮春天雞黍三家㑹鶯花二節連居易光風初淡蕩美景漸暄妍簮組蘭亭上車輿曲水邊禹錫松聲添奏樂草色助鋪筵雀舫宜閒泛螺杯任漫傳起園蔬香帶露㕑柳暗蔵烟麗句輕珠玉清談勝管絃居易陌喧金距鬭樹動綵繩懸姹女粧梳豔遊童衣服鮮禹錫圃香知種蕙池暖憶開蓮怪石雲疑觸夭桃火欲燃起正歡唯恐散雖醉未思眠嘯傲人間世追隨地上仙居易燕來雙涎涎鴈去累翩翩行樂真吾事尋芳獨我先禹錫滯周慙太史太史公留滯周南今榮示慙古人矣入洛繼先賢此言劉白聲價與二陸爭長矣昔恨多分手今歡謬比肩起病猶陪讌飲老更奉周旋望重青雲客情深白首年居易遍嘗珍饌後許入畫堂前舞袖翻紅炬歌鬟插寳蟬禹錫斷金多感激倚玉貴遷延説史吞顔注論詩笑鄭箋起松筠寒不變膠漆冷彌堅興伴王尋戴謂隨僕射過尚書也榮同隗在燕居易自謂擲盧誇使氣刻燭鬬成篇實藝皆三捷虛名愧六聨禹錫興闌猶舉白話靜毎思𤣥更説歸時好亭亭月正圓起僕射來示有三春向晚四者難并之説誠哉是言輒引起題重為聨句疲兵再戰勍敵難降下筆之時囅然自哂走呈僕射兼簡尚書三春今向晚四者昔難并借問低眉坐何如攜手行居易舊遊多過隙新宴且尋盟鸚鵡林須樂麒麟閣未成起分隂當愛惜遲景好逢迎林野薫風起樓臺穀雨晴禹錫牆低山半出池廣水初平橋轉長虹曲舟回小鷁輕居易殘花猶布繡宻竹自聞笙欲過芳菲節難忘宴慰情起月輪行似箭時物勢如傾見鴈隨兄去聴鶯來友聲禹錫蕙長書帶展菰嫩剪刀生坐宻衣裳暖堂虛絲管清居易峯巒侵碧落草木近朱明與㸃非沂水陪膺是洛城白嘗為三川守故云起撥醅爭緑醑卧酪待朱櫻㡬處能留客何人喚解酲禹錫舊儀尊右揆新命寵春卿有喜鵲頻語無機鷗不驚居易青林思小隠白雪仰芳名訪舊殊千里登髙賴九城起鄼侯司管鑰疎傅傲簮纓綸綍曽同掌烟霄即上征禹錫册庭嘗接武書殿忝連衡蘭室春彌馥松心晚更貞居易琴招翠羽下釣掣紫鱗呈只願回烏景誰能避兕觥起方知醉兀兀應勝走營營鳯閣鸞臺路従他年少爭居易更呈二公樂天是月長齋鄙夫此時愁卧里閭非逺雲霧難披因以寄懐遂為聨句所期解悶焉敢驚禪五月長齋月文心苦行心蘭蔥不入户薝蔔自成林夢得䕶戒先辭酒嫌喧亦徹琴塵埃賔位靜香火道場深樂天我靜馴狂象餐餘施衆禽定知於佛佞豈復向書淫夢得欄藥凋紅豔庭槐換緑隂風光徒滿目雲霧未披襟樂天樹為清凉倚池因盥漱臨蘋芳遭燕拂蓮坼待蜂尋夢得舍下環流水窻中列逺岑苔斑錢剝落石怪玉嶔崟樂天鵲頂迎秋秃鶯喉入夏瘖柳絲垂色綖棘刺露長針夢得散秩身猶幸趨朝力不任官將方共拙年與病交侵樂天徇樂非時選忘機似陸沈鑒容稱四皓捫腹有三壬夢得攜手慙連璧同心許斷金紫芝雖繼唱前後各在賔客白雪少知音樂天憶罷呉門守相逢楚水潯舟中頻曲宴夜後各加斟夢得濁酒銷殘漏絃聲間逺砧酡顔舞長袖宻坐接華簪樂天持論峯巒峻戰文矛㦸森笑言誠莫逆造次必相箴夢得往事應如昨餘歡迄至今迎君常倒屣訪我輒攜衾樂天隂魄初離畢將有後雨陽光正在參五月之節待公休一食縦飲共狂吟夢得劉賔客外集巻四欽定四庫全書劉賔客外集巻五唐劉禹錫撰雜詩答張侍御賈喜再登科後自洛赴上都贈别又被時人寫姓名春風引路入京城知君憶得前身事分付鶯花與後生和武中丞秋日寄懷簡諸僚故退朝還公府騎吹息繁音吏散秋庭寂鳥啼烟樹深威生奉白簡道勝外華簪風物清逺目功名懷寸隂雲衢念前侣綵翰寫沖襟凉菊照幽院敗荷攅碧潯感時江海思報國松筠心空愧夀陵步芳塵何處尋赴連州途經洛陽諸公置酒相送張員外賈以詩見贈率爾詶之謫在三湘最逺州邊鴻不到水南流如今暫寄尊前笑明日辭君步步愁贈元九侍御文石枕以詩奬之文章似錦氣如虹宜薦華簪緑殿中縱使真飇生旦夕猶堪拂拭愈頭風詶元九侍御贈璧竹鞭長句碧玉孤根生在林美人相贈比雙金初開郢客緘封後想見巴山氷雪深多節本懐端直性露青猶有嵗寒心何時策馬同歸去闗樹扶疎敲鐙吟和李六侍御文宣王廟釋奠作歎息魯先師生逢周室卑有心律天道無位救陵夷歴聘不能用領徒空爾為儒風正禮樂旅象入蓍龜西狩非其應中都安足施世衰由我賤泣下為人悲遺教光文徳興王叶夢期土田封後𦙍冕服飾虛儀鐘鼓膠庠薦牲牢郡邑祠聞君喟然歎偏在上丁時敬詶徹公見寄二首凄凉沃洲僧憔悴柴桑宰别來二十年唯餘兩心在越江千里鏡越嶺四時雪中有逍遙人夜深觀水月詶元九院長自江陵見寄無事尋花至仙境等閒栽樹比封君金門通籍真多士黄紙除書每日聞韓十八侍御見示岳陽樓别竇司直詩因令屬和重以自述故足成六十二韻楚江何蒼然曽瀾七百里孤城寄逺目一寫無窮巳蕩漾浮天葢四環宣地里積漲在三秋混成非一水冬遊見清淺春望多洲渚雲錦逺沙明風烟青草靡火星忽南見月硤方東迤雪波西山來隠若長城起獨専朝宗路駛悍不可止支川讓其威蓄縮至南委熊武走蠻落熊武二溪名瀟湘來奥鄙炎蒸動泉源積潦捜山趾歸往無旦夕包含通逺邇行當白露時眇視秋光裏曙色未昭晰露華遙斐亹浩耳神骨清如觀混元始我風忽震盪驚浪迷津涘怒激鼔鏗訇蹙成山巋硊鵾鵬疑變化罔象何恢詭噓吸寫樓臺騰驤露鬐尾景移羣動息波靜繁音弭明月出中央青天絶纎滓素光淡無際緑靜平如砥空影渡鵷鴻秋聲思蘆葦鮫人弄機杼貝闕駢紅紫珠蛤吐玲瓏文鰩翔旖旎水鄉呉蜀限地勢東南庳翼軫粲垂精衡巫屹環峙名雄七澤藪國辨三苗氏唐羿斷脩虵荆王憚下逆反青兕秦狩跡猶在虞巡路従此軒后奏宫商騷人詠蘭芷茅嶺潜相應橘洲傍可指郭璞驗幽經羅含著前紀觀律戚里族按道侯家子聨袂登髙樓臨軒笑相視假守亦髙卧竇時權領郡事墨曹正垂耳韓亦量移江陵法曹契闊話温凉壺觴慰遷徙地偏山水秀客重杯盤侈紅袖花欲然銀燈晝相似興含更抵掌樂極同啟齒筆鋒不能休藻思一何綺伊余負微尚夙昔慙知已出入金馬門交結青雲士襲芳踐蘭室學古遊槐市策慕宋前軍文師漢中壘陋容昧俯仰孤志無依倚衞足不如葵漏川空歎蟻幸逢萬物泰獨處窮途否鎩翮重疊傷兢䰟再三禠蘧瑗亦屢化左丘猶有恥桃源訪仙宫薛服祠山鬼故人南臺舊一别如弦矢今朝㑹荆巒斗酒相宴喜為余出新什笑抃隨伸紙奕若觀五色歡然臻四美委曲風濤事分明窮達㫖洪韻發華鐘凄音激清徵羊濬要平聲共和江淹多雜擬徒欲仰髙山焉能追逸軌湘洲路四達巴陵城百雉何必顔光禄留詩張内史詶竇員外使君寒食日途次松滋渡先寄示四韻楚鄉寒食橘花時野渡臨風駐綵旗草色連雲人去住水紋如縠燕差池朱輪尚憶羣飛雉青綬初縣左顧龜非是湓城魚司馬水曹何事與新詩和竇中丞晚入容江作漢郡三十六鬱林東南遙人倫選清臣天外頒詔條桂水步秋浪火山凌霧朝分圻辨風物入境聞謳謠莎岸見長亭烟林隔麗譙日落舟益駛川平旗自飄珠浦逺明滅金沙晴動搖一吟道中作離思懸層霄吕八見寄郡内書懐因而戲和文苑振金聲循良冠百城不知今史氏何處列君名寄楊八拾遺時出為國子主簿分司東都韓十八員外亦轉國子博士同在洛陽聞君前日獨庭爭漢帝偏知白馬生忽領簿書遊太學寧勞侍従厭承明洛陽本自宜才子海内而今有直聲為謝同寮老博士范雲來嵗即公卿詶竇員外郡齋宴客偶命柘枝因見寄兼呈張十一院長元九侍郎員外時兼節度判官佐平蠻之畧張初罷都官元方従事分憂餘刃又従公白羽胡床嘯詠中綵筆諭戎矜倚馬華堂留客看驚鴻渚宫油幕方髙步澧浦甘棠有㡬叢若問騷人何處所門臨寒水落江楓謝竇員外旬休早凉見示詩奉書報詰朝有宴新秋十日澣朱衣鈴閣無聲公吏歸風韻漸髙梧葉動露光初重槿花稀四時苒苒催容鬢三爵油油忘是非更報明朝池上酌人知太守字𤣥暉詶楊侍郎憑見寄二首翔鸞闕底謝皇恩纓上滄浪舊水痕疎傅揮金忽相憶逺擎長句與招䰟十年毛羽催頽一旦天書召回看看花時欲到故侯也好歸來南海馬大夫見恵著述三通勒成四帙上自遂古達于國朝采其菁華至簡如富欽受嘉貺詩以謝之紅旗閱五兵絳帳領諸生味道輕鼎食退公猶筆耕青箱傳學逺金匱納書成一瞬見前事九流當抗行編蒲曽苦思垂竹媿無名今日承芳訊誰言贈衮榮南海馬大夫逺示著述兼詶拙詩輒著微誠再有長句時蔡戎未弭故見於末篇漢家旌斾付雄才百越南溟統外臺身在絳紗傳六藝腰懸青綬亞三台連天浪靜長鯨息映日帆多寳舶來聞道楚氛猶未滅終須旌斾掃雲雷和楊侍郎初至郴州紀事書情題郡齋八韻旌節下朝臺分圭従北回城頭鸖立處驛樹鳳栖來蘇躭傳云後化為仙鶴止城東北偶人上又州北栖鳯麟圖經云常有威鳳降於寒梧也舊路芳塵在新恩馹騎催里閭風偃草鼓舞抃成雷吏散山禽囀庭香夏蕊開郡齋堪四望壁記有三台人訝徵黄晚文非弔屈哀一吟梁甫曲知是卧龍才和郴州楊侍郎翫郡齋紫薇花十四韻㡬年丹霄上出入金華省暫别萬年枝看花桂陽嶺南方多竒樹公府成佳境緑隂交廣除明豔透蕭屏雨餘人吏散燕語簾櫳靜懿此含曉芳翛然忘簿領紫茸垂組縷金樓攅鋒穎露溽暗傳香風輕徐就影苒弱多意思従容占光景得地在侯家移根近仙井開罇好凝睇倚瑟仍回頸遊蜂駐綵冠舞鶴迷烟頂興生紅藥後愛與甘棠並不學夭桃姿浮榮有俄頃和南海馬大夫聞楊侍郎出守郴州因有寄上之作忽驚金印駕朱轓遂别鳴珂聴曉猿碧落仙來雖暫謫赤泉侯在是深恩玉環慶逺瞻台座銅柱勲髙壓海門一詠瓊瑤百憂散何勞更樹北堂萱奉和鄭相公以考功十弟山薑花俯賜篇什採擷黄薑蘂封題青鎖闈共聞調膳日正是退朝歸響為纎筵發情隨緑翰飛故將天下寶萬里與光輝馬大夫見示浙西王侍御贈答詩因命同作大夫榮踐舊府又歴交趾桂林南人歌之列在風什王侍御公易一别嵗除寄末篇以代札憶逐羊車凡㡬時今來舊府統戎師象筵照室㑹詞客銅鼓臨軒舞海夷百越酋豪稱故吏十洲風景助新詩秣陵従事何年别一見瓊章如素期詶馬大夫登涯口戍見寄新辭金印拂朝纓臨水登山四體輕猶念天涯未歸客瘴雲深處守孤城詶馬大夫以愚獻通茇葜酒感通拔二字因而寄别之作泥沙難振拔誰復問窮通莫訝提壺贈家傳枕麴風成謠獨酌後深意片言中不進終無巳應須荀令公答楊八敬之絶句楊生時亦謫居飽霜孤竹聲偏切帶火燋桐韻本悲今日知音一留聴是君心手不平時鄂渚留别李二十一表臣大夫髙檣起行色促柱動離聲欲問江深淺應如逺别情答表臣贈别二首昔為瑤池侣飛舞集蓬萊今作江漢别風雪一徘徊嘶馬立未還行舟路將轉江頭暝色深揮袖依稀見始發鄂渚寄表臣二首祖帳管絃絶客帆凄風生回車巳不見猶聴馬嘶聲曉發柳林戍遙城聞五鼓憶與故人眠此時猶晤語出鄂州界懐表臣二首離席一揮杯别愁今尚醉遲遲有情處却恨江帆駛夢覺疑連榻舟行忽千里不見黄鶴樓寒沙雪相似重寄表臣二首對酒臨流奈别何君今巳醉我蹉跎分明記取星星鬢他日相逢應更多世間人事有何窮過後思量盡是空早晚同歸洛陽陌卜鄰須近祝雞翁寄唐州楊八歸厚淮安古地雍州師畫角金鐃旦夕吹淺草遙迎鷫鸘馬春風亂颭辟邪旗謫仙年月今應滿戇諫聲名衆所知何況遷喬舊同伴一雙先入鳳凰池時徐晦楊嗣復二舍人與唐州同年及第重寄絶句淮西既是平安地鵶路今無羽檄飛聞道唐州最清靜戰場耕盡野花稀春日寄楊八唐州二首淮西春草長淮水逶迤光燕入新村路人耕舊戰場可憐行春守立馬看斜桑漠漠淮上春莠苗生故壘梨花方城路荻笋蕭陂水髙齋有謫仙坐嘯清風起寄朗州温右史曹長暫别瑤墀鴛鷺行綵旗雙引到沅湘城邊流水桃花過簾外春風杜若香史筆枉將書紙尾朝纓不稱濯滄浪雲臺公業家聲在徵詔何時出建章和東川王相公新漲驛池八韻今日池塘上初移造物權苞蔵成别島沿濁致清漣變化生言下蓬瀛落眼前泛觴驚翠羽開幕對紅蓮逺寫風光入明含氣象全渚烟籠驛樹波日漾賔筵曲岸留緹騎中流轉綵船無因接元禮共載比神仙詶楊八副使將赴湖南途中見寄一絶知逐征南冠楚材逺勞書信到陽臺明朝若上君山上一道巴江自此來詶楊司業巨源見寄壁雍流水近靈臺中有詩篇絶世才渤海歸人將集去棃園弟子請詞來瓊枝未識䰟空斷寳匣初臨手自開莫道専城管雲雨其如心似不燃灰詶國子崔博士立之見寄健筆髙科早絶倫後來無不揖芳塵遍看今日乗軒客多是昔年呈巻人胄子執經瞻講座郎官共食接華裀煩君逺寄相思曲慰問天南一逐臣詶馮十七舍人宿衞贈别五韻少年為别日隋宫楊柳隂白首相逢處巴江烟浪深使星三蜀酒春雨霑衣襟王程促速意夜語殷勤心却歸天上去遺我雲間音劉賔客外集巻五欽定四庫全書劉賔客外集巻六唐劉禹錫撰詩唐侍御寄遊道林嶽麓二寺詩并沈中丞姚員外所和見徵繼作湘西古刹雙蹲蹲羣峯朝拱如駿奔青松步障深五里龍宫黯黯神為閽髙殿呀然壓蒼巘俯瞰長江疑欲吞橘州泛浮金實動水郭繚繞朱樓騫語餘百響入天籟衆竒引步輕翻翻泉清石布博棊子蘿密鳥韻如簧言囘廊架險髙且曲新徑穿林明復昏淺流忽濁山獸過古木半空天火痕星使雙飛出禁垣元侯餞之遊石門紫髯翼從紅袖舞竹風松雪香温黁逺持青瑣照巫峽一戛驚斷三聲猿靈山會中身不預吟想峭絶愁精魂恨無黄金千萬餅布地買取為丘園遙和韓睦州元相公二君子玉人紫綬相輝映却要霜髯一兩莖其奈無成空老去每臨明鏡若為情張郎中籍逺寄長句開緘之日巳及新秋因舉目前仰酬髙韻南宫詞客寄新篇清似湘靈促柱絃京邑舊遊勞夢想歴陽秋色正澄鮮雲銜日脚成山雨風駕潮頭入渚田對此獨吟還獨酌知音不見思蒼然酬湖州崔郎中見寄風筝吟秋空不肖指爪聲髙人靈府間律吕伴咸英昔年與兄遊文似馬長卿今來寄新詩乃類陶淵明磨礱老益智吟詠閒彌精豈非山水鄉蕩漾神機清渚烟蕙蘭動溪雨虹蜺生馮君虛上舍待我乘興行酬楊八庶子喜韓吳興與余同遷見贈依本韻次用早遇聖明朝鴈行登九霄吳興與余中外兄弟文輕傅武仲酒逼葢寛饒捨矢同瞻鵠當筵共賽梟吳興與余同年判入等第琢磨三益重唱和五音調臺栢烟長起池荷香暗飄吳興與余同為御臺門外有蓮池也星文辭北極旗影度東遼呉興自度支郎中出為行軍司馬所從即范僕射昔范明友為度遼將軍直道由來黜浮名豈敢要三湘與百越雨散又雲遙逺守慙侯籍徴還荷詔條顇容唯舌在别恨幾魂銷滿眼悲陳事逢人少舊僚烟霞為老伴蒲栁任先凋虎綬懸新印龍􅀈理去橈斷膓天北郡攜手洛陽橋幢葢今雖貴弓旌會見招其如草𤣥客空手久寥寥秋日書懐寄河南王尹公府想無事西池秋水清去年為狎客永日奉髙情況有臺上月如聞雲外笙不知桑落酒今嵗與誰傾浙東元相公書歎梅雨鬱䒱之候因寄七言嵇山自與岐山别何事連年鸑鷟飛百辟商量舊相入九天祗候老臣歸平湖晚泛窺清鏡髙閤晨開掃翠微今日看書最惆悵為聞梅雨損朝衣酬嚴給事賀加五品兼簡同制水部李郎中九天雨露傳青詔八舍郎官換緑衣初佩銀魚隨仗入宜乘白馬退朝歸彫盤賀喜開瑤席綵筆題詩出瑣闈聞道水曹偏得意霞朝霧夕有光輝裴相公大學士見示答張秘書謝馬詩并羣公屬和因命追作草𤣥門户少塵埃丞相并州送馬來初自塞垣銜苜蓿忽行幽徑破莓苔尋花緩轡威遲去帶酒垂鞭躞蹀囘不與王侯與詞客知輕富貴重清才奉和司空裴相公中書即事通簡舊僚之作談笑在巖廊人人盡所長儀形見山立文字動星光日運丹青筆時看赤白囊佇聞戎馬息入賀領鴛行微之鎮武昌中路見寄藍橋懐舊之作悽然繼和兼寄安平今日油幢引他年黄紙追同為三楚客獨有九霄期宿草恨長在傷禽飛尚遲武昌應已到新栁映紅旗奉和裴侍中將赴漢南留别座上諸公金貂曉出鳯池頭玉節前臨南雍州暫輟洪鑪觀劒㦸還將大筆注春秋管絃席上留髙韻山水途中入勝遊峴首風烟看未足便應重拜富民侯和兵部鄭侍郎省中四松詩十韻松是中書相公任侍郎手栽右相歴中臺移松武庫栽紫茸抽組綬青實長玫瑰便有干霄勢看成構厦材數分天柱半影逐日輪囘舊賞台階去新知谷口來息隂常仰望翫境幾徘徊翠粒晴懸露蒼鱗雨起苔凝音助瑤瑟飄蘃泛金罍月桂花遙燭星榆半對開終須似雞樹榮茂近昭囘和蘇郎中尋豐安里舊居寄主客張郎中漳濵卧起恣閒遊宣室徴還未白頭舊隠來尋通徳里新篇寫出畔牢愁池看科斗成文字鳥聴提壺憶獻酬同學同年又同舍許君雲路並華輈將赴蘇州途出洛陽留守李相公累申宴餞寵行話舊形於篇章謹抒下情以申仰謝嵗杪風物動雪餘宫苑晴兔園賔客至金谷管絃聲洛水故人别吳宫新燕迎越郎憂不淺懐袖有瓊英吳興敬郎中見惠斑竹杖兼示一絶聊以謝之一莖炯炯琅玕色數節重重玳瑁文拄到髙山未登處青雲路上願逢君和浙西王尚書聞常州楊給事製新樓因寄之作文昌星象盡東來油幕朱門次第開且上新樓看風景㑹乘雲雨一時囘尚書在南宫為左丞給事與禹錫皆是郎吏酬浙東李侍郎越州春晚即事長句越中藹藹繁華地秦望峯前禹穴西湖草初生邉鴈去山花半謝杜鵑啼青油畫捲臨髙閣紅斾晴翻繞古堤明日漢庭徴舊徳老人爭出若耶溪後漢劉寵為㑹稽太守及徵為將作大匠山隂縣有五六老叟自若耶山谷間出人齎百錢以送寵寵勞之答曰自明府下車狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言耶勤苦父老為人選一大錢受之酬淮南牛相公述舊見貽少年曽忝漢庭臣晚嵗空餘老病身初見相如成賦日尋為丞相掃門人追思徃事咨嗟久喜奉清光笑語頻猶有登朝舊冠冕待公三入拂埃塵酬鄭州權舍人見寄十二韻朱户凌晨啟碧梧含早凉人從桔柣至書到漆沮傍抃㑹因佳句情深取斷章愜心同笑語入耳勝笙簧憶昔三條路居鄰數仞牆舍人舊宅光福里時忝為東鄰學堂青玉案綵服紫羅囊麟角看成就龍駒見抑揚彀中飛一箭雲際落雙鶬舍人一舉登科又判入等第甸邑叨前列天臺媿後行鄙人離渭南主簿十年舍人方尉其邑及罹譴謫重入南宫禮部郎中舍人方任考功員外鯉庭傳事業雞樹遂翺翔書殿連鳴鵲神池接鳯凰追遊䝉尚齒惠好結中膓鄙人在集賢與西掖接近日夕追遊鎩翮方擡舉危根易損傷一麾憐弃置五字借恩光鄙人出牧姑蘇舍人草制汝海崆峒秀溱流芍藥芳風行能偃草境静不争桑鄙人轉臨汝舍人牧滎陽轉斾趨闗右頒條匝渭陽病吟猶有思老醉巳無狂塵滿鴻溝道沙驚白狄鄉佇聞黄紙詔促召紫微郎奉和裴令公夜宴天下蒼生望不休東山雖有但時遊從來海上仙桃樹肯逐人間風露秋洛濵病卧李侍郎見惠藥物謔以文星之句隠几支頥對落暉故人書信到柴扉周南留滯商山老星象如今屬少微詶留守牛相公宫城早秋寓言見寄曉月映宫樹秋光起天津涼風稍動葉宿露未生塵景氣尚芳麗曠望感心神揮毫成逸韻開閤遲來賔擺去將相印漸為逍遥身如招後房宴却要白頭人牛相公留守見示城外新墅有溪竹秋月親情多徃宿遊恨不得去因成四韻兼簡洛中親故之什兼命同作别墅洛城外月明村㙒通光輝滿地上絲管發舟中堤豔菊花露島涼松葉風髙情限清禁寒漏滴深宫和僕射牛相公追感韋裴六相登庸皆四十餘未五十薨殁豈早榮早枯之義今年將六十猶粗强健因親故勸酒率然成篇并見寄之作坐鎮清朝獨殷然閒徵故事數前賢用才同踐鈞衡地稟氣終分大小年威鳯本池思泛泳仙查舊路望囘旋猶憐綺季深山裏唯有松風與石田和僕射牛相公以離闕庭七年班行親故亡殁十無一人再覩龍顔喜慶雖極感歎風燭能不愴然因成四韻并示集賢中書二相公所和久辭龍闕擁紅旗喜見天顔拜赤墀三省英寮非舊侣萬年芳樹長新枝交朋接武居仙院幕客追風入鳯池雲母屏風即施設可憐榮耀冠當時和僕射牛相公見示長句静得天和興自濃不縁宦達性靈傭大鵬六月有閒意仙鶴千年無躁容流輩盡來多歎息官班髙後少過從唯應加築露臺上䞉見終南雲外峯和牛相公雨後寓懐見示金火交争正抑揚蕭蕭飛雨助清商曉看紈扇恩情薄夜覺紗燈刻數長樹上早蟬纔發響庭中百草已無光當年富貴亦惆悵何況悲翁髮似霜牛相公林亭雨後偶成飛雨過池閣浮光生草樹新竹開粉奩初蓮􅅡香注野花無時節水鳥自來去若問知境人人間第一處和牛相公題姑蘇所寄太湖石兼寄李蘇州震澤生竒石沉潜得地靈初辭水府出猶帶龍宫腥發自江湖國來榮卿相庭從風夏雲勢上漢古查形拂拭魚鱗見鏗鏘玉韻聆烟波含宿潤苔蘚助新青嵌穴波斯貌纎鋩蟲篆銘孱顔傲林薄飛動向雷霆煩熱近還散餘酲見便醒凡禽不敢息浮􅙟莫能停静稱垂松葢鮮宜映鶴翎㤀憂常目擊素尚與心冥眇小欺湘燕團圓笑落星徒然想融結安可測年齡採取詢鄉耋搜求按舊經垂鈎入空隙隔浪動晶熒有獲人争賀歡謠衆共聴一州驚閲寳千里逺揚舲覩物洛陽陌懐人吳御亭寄言垂天翼早晚起滄溟和陳許王尚書酬白少傅侍郎長句因通簡汝洛舊遊之什寥廓髙翔不可追風雲失路暫相隨方同洛下書生詠又見軍前大將旗雪裏命賔開玉帳飲中請號駐金巵竹林一日王戎去嵇阮雖貧興未衰和僕射牛相公寓言二首兩度竿頭立定誇囘眸舉袖拂青霞盡抛今日貴人様復振前朝名相家御史定來休直宿尚書依舊趂參衙具瞻尊重誠無敵猶憶洛陽千樹花心如止水鑒常明見盡人間萬物情鵰鶚騰空猶逞俊驊騮齒足自無驚時來未覺權為祟貴了方知退是榮只恐重重世縁在事須三度副蒼生和牛相公南溪醉歌見寄脱屣將相守沖謙唯於山水獨不亷枕伊背洛得勝地鳴臯少室來軒簷相去聲形面勢黙指畫言下變化隨顧瞻清池曲榭人所致野趣幽芳天與添有時轉入潭島間珍木如幄藤為簾忽然便有江湖思沙礫平淺草纎纎怪石釣出太湖底珠樹移自天台尖崇蘭迎風緑泛艶坼蓮含露紅􅀈襜修廊架空逺岫入弱栁覆檻流波霑渚蒲抽莢劒脊動岸荻迸笋錐頭銛攜觴命侣極永日此會雖數心無厭人皆置莊身不到富貴難與逍遙兼唯公出處得自在決就放曠辭炎炎座賔盡歡恣談謔愧我掉頭還奮髯能令商於多病客亦覺自適非沉潜詶僕射牛相公晉國池上别後至甘棠館忽夢同遊因成口號見寄已嗟池上别魂驚忽報夢中攜手行此夜獨歸還乞夢老人無睡到天明裴侍郎大尹雪中遺酒一壺兼示喜眼疾平一絶有閒行把酒之句斐然仰酬巻盡輕雲月更明金箆不用且閒行若傾家釀招來客何必池塘春草生詶太原狄尚書見寄家聲烜赫冠前賢時望穹崇鎮北邉身上官銜如座主幕中談笑取同年幽并俠少趨鞭弭燕趙佳人奉管絃仍把天兵書號筆逺題長句寄山川詶宣州崔大夫見寄白衣曽拜漢尚書今日恩光到敝廬再入龍樓稱綺季應縁狗監説相如中郎南鎮權方重内史髙齋興有餘遙想敬亭春欲暮百花飛盡栁花初詶皇甫十少尹暮秋久雨喜晴有懐見示雨餘獨坐巻簾帷便得詩人喜霽詩搖落從來長年感慘舒偏是病身知掃開雲霧呈光景流盡潢汙見路岐何況菊香新酒熟神州司馬好狂時劉賔客外集巻六欽定四庫全書劉賔客外集巻七唐劉禹錫撰詩和浙西李大夫霜夜對月聴小童吹觱篥歌依本韻海門雙青暮烟歇萬頃金波湧明月侯家小兒能觱篥對此清光天性發長江凝練樹無風瀏慄一聲霄漢中涵胡畫角怨邉草蕭瑟清蟬吟野叢沖融頓挫心使指雄吼如風轉如水思婦多情珠淚垂仙禽欲舞雙翅起郡人寂聴衣滿霜江城月斜樓影長纔驚指下繁韻息已見樹杪明星光謝公髙齋吟激楚戀闕心同在羇旅一奏荆人白雪歌如聞雒客扶風鄔吳門水驛接山隂文字殷勤寄意深欲識陽陶能絶處少年榮貴道傷心浙西李大夫述夢四十韻并浙東元相公詶和斐然繼聲位是才能取時因際會遭羽儀呈鸑鷟鋩刃試豪曹洛下推年少山東許地髙門承金鉉鼎家有玉璜韜吕仍嗣侯海浪扶鵬翅天風引驥髦便知蓬閣閟不識魯衣褒興發春塘草魂交益部刀形開猶抱膝燭盡遽揮毫昔仕當初筮逢時詠載櫜懐鈆辨蟲蠧染素學鵝毛車騎方休汝歸來欲效陶大夫罷太原從事歸京師南臺資謇諤内署選風騷羽化如乘鯉樓居舊冠鼇美香焚濕麝名菓賜乾萄議赦蠅棲筆邀歌蟻泛醪代言無所戲謝表自稱叨蘭焰凝芳澤芝泥瑩玉膏對頻聲價出直久夢魂勞草詔令歸馬批章答獻􅋙幽冀歸闕兩戎乞盟事並具注前銀花懸院牓翠羽映簾絛諷諌欣然納竒觚率爾操禁中時諤諤天下免忉忉右顧龜成印雙飛鵠織袍謝賔縁地密潔己是心豪五日思歸沐三春羨衆邀茶爐依緑笋棊局就紅桃溟海桑潜變隂陽炭暗熬仙成脱屣去臣戀捧弓號建節辭烏栢宣風看鷺濤土山京口峻䥫瓮郡城牢舊説潤州城如䥫瓮事見歸浣南征記曲島花千樹官池水一篙鶯來和絲管鴈起拂麾旄宛轉傾羅扇囘旋墮玉搔罰籌長豎纛觥盞様如舠山是千重嶂江為四面濠卧龍曽得雨浙東孤鶴尚鳴臯浙西劒用雄開匣二公弓閒蟄受弢自謂鳯姿嘗在竹二公鷃羽不離蒿自謂吳越分雙鎮東西接萬艘今朝比潘陸江海更滔滔和浙西李大夫晚下北固山喜徑松成隂悵然懐古偶題臨江亭并浙東元相公所和依本韻一辭温室樹幾見武昌栁荀謝年何少韋平望已久種松夾石道紆組臨沙阜目覽帝王州心存股肱守葉動驚綵翰波澄見頳首晉宋齊梁都千山萬江口烟散隋宫出濤來海門吼風俗太伯餘衣冠永嘉後江長天作限山固壤無朽自古稱佳麗非賢誰奄有八元邦族盛萬石門風厚天柱揭東溟文星照北斗髙亭一騁望舉酒共為夀因賦詠懐詩逺寄同心友禁中晨夜直江左東西偶筆手握兵符儒腰盤貴綬頒條風有自立事言無茍農野聞讓耕軍人不使酒用材當搆厦知道寜窺牖誰為青雲髙鵬飛終背負和浙西李大夫伊川卜居早入八元數嘗承三接恩飛鳴天上路鎮壓海西門清望寰中許髙情物外存時來誠不讓歸去每形言洛下思招隠江干厭作藩按經修道具依様買山村馬葛堂為御史大夫將置宅命畫工圖其狀戒所使曰依此様求之開鑿隨人化幽隂為律暄逺移難得樹立變舊荒園絶塞通潜徑平泉占上原烟霞遙在想簿領益為繁丹禁虛東閣蒼生望北轅徒令雙白鶴五里自翩飜和滑州李尚書上已憶江南禊事白馬津頭春日遲沙州歸鴈拂旌旗栁營唯有軍中戲不似江南三月時詶滑州李尚書秋日見寄一入石渠署三聞宫樹蟬丹霄未得路白髮又添年雙節外臺貴洞簫中禁傳徴黄在旦夕早晚發南燕吐綬鳥詞并序滑州牧尚書李公以吐綬鳥詞見示兼命繼聲葢尚書前為御史時所作有翰林二學士同賦之今所謂追和也鳥之所異具于首篇越山有鳥翔寥廓嗉中天綬光若若越人偶見而竒之因名吐綬江南知四明天姥神仙地朱鳥星精鍾異氣赤玉彫成彪炳毛紅綃剪出玲瓏翅湖烟始開山日髙迎風吐綬盤花絛臨波似染瑯琊草映葉疑開阿母桃花紅草緑人間事未若靈禽自然貴鶴吐明珠暫報恩鵲銜金印空為瑞春和秋霽野花開翫景尋芳處處來翠幕雕籠非所慕珠丸柘彈莫相猜棲月啼烟凌縹緲髙林先見金霞曉三山仙路寄遙情刷羽揚翹欲上征不學碧雞依井絡願隨青鳥向層城太液池中有黄鵠憐君長向髙枝宿如何一借羊角風來聴簫韶九成曲和西川李尚書漢州微月遊房太尉西湖木落漢川夜西湖懸玉鈎旌旗環水次舟檝泛中流目極想前事神交如共遊瑤琴久已絶松韻自悲秋和重題林端落照盡湖上逺嵐清水榭芝蘭室仙舟魚鳥情人琴久寂寞烟月若平生一泛釣璜處再吟鏘玉聲和遊房公舊竹亭聞琴絶句尚有竹間路永無綦下塵一聞流水曲重憶食霞人西州李尚書知愚與元武昌有舊逺示二篇吟之泫然因以繼和二首來詩云元公令陳從事求蜀琴將以為寄而武昌之訃聞因陳生㑹葬如何贈琴日巳是絶絃時無復雙金報空餘掛劎悲寳匣從此閒朱絃誰復調秪應隨玉樹同向土中銷和西川李尚書傷韋令孔雀及薛濤之什玉兒已遂金環塟翠羽先隨秋草萎唯見芙蓉含曉露數行紅淚滴清池後魏元樹南陽王橲之子南奔到建業數年後北歸愛姬朱玉兒脱金指環為贈樹至魏却以指環寄玉兒示有還意詶李相公喜歸鄉國自鞏縣夜泛洛水見寄鞏樹烟月上清光含碧流且無三已色猶泛五湖舟鵬息風還起鳯歸林正秋雖攀小山桂此地不淹留和李相公平泉潭上喜見初月家山見初月林壑悄無塵幽境此何夕清光如為人潭空破鏡入風動翠蛾嚬㑹向瑣窓望追思伊洛濵和李相公初歸平泉過龍門南嶺遙望山居即事暫别明庭去初隨優詔還曽為鵩鳥賦喜過鑿龍山新墅烟火起野程泉石間巖廊人望在只得片時閒和李公以平泉新墅獲方外之名因為詩以報洛中士君子兼見寄之什業繼韋平後家依崑閬間恩華辭北第蕭洒愛東山滿室圖書在入門松菊閒華天雖暫息一舉出人寰詶栁栁州家雞之贈日日臨池弄小雛還思寫論付官奴栁家新様元和脚且盡薑牙劒手徒答前篇小兒弄筆不能嗔涴壁書窓且當勤聞彼夢熊猶未兆女中誰是衛夫人答後篇昔日傭工記姓名逺勞辛苦寫西京近來漸有臨池興為報元常欲抗行再授連州至衡陽酬栁栁州贈别去國十年同赴召渡湘千里又分岐重臨事異黄丞相三黜名慙栁士師歸目併隨囘鴈盡愁膓正遇斷猿時桂江東過連山下相望長吟有所思重别二十年來萬事同今朝岐路忽西東皇恩若許歸田去嵗晚當為鄰舍翁三贈信書誠自誤經事漸知非今日臨湘别何年休汝歸題淳于髠墓生為齊贅壻死作楚先賢應以客卿塟故臨官道邉寓言本多興放意能合權我有一石酒置君墳樹前懐妓四首玉釵重合兩無縁魚在深潭鶴在天得意紫鸞休舞鏡能言青鳥罷銜牋金盆巳覆難收水玉軫長拖不續絃若向蘼蕪山下過遙將紅淚洒窮泉鸞飛逺樹栖何處鳯得新巢已去心紅壁尚留香漠漠碧雲初斷信沉沉情知㸃汚投泥玉猶自經營買笑金從此山頭似人石丈夫形狀淚痕深但曽行處遍尋看雖是生離死一般買笑樹邉花已老畫眉牕下月猶殘雲蔵巫峽音容斷路隔星橋過徃難莫怪詩成無淚滴盡傾東海也須乾三山不見海沉沉豈有仙蹤更可尋青鳥去時雲路斷姮娥歸處月宫深紗窓遙想春相憶書幌誰憐夜獨吟料得夜來天上鏡只應偏照兩人心登清暉樓潯陽江色朝添滿彭蠡秋聲鴈送來南望廬山千萬仞共誇新出棟梁材省試風光草際浮熙熙春景霽草緑春光麗的歴亂相鮮葳蕤互虧蔽乍疑芊綿裏稍動丰茸際影碎翻崇蘭浮香轉叢蕙含烟絢碧綵帶露如珠綴幸因採掇日況此臨芳嵗赴和州於武昌縣再遇毛仙翁十八兄因成一絶武昌山下蜀江東重向仙舟見葛洪又得案前親禮拜大羅天訣玉函封劉賔客外集巻七欽定四庫全書劉賔客外集巻八唐劉禹錫撰詩寄毗陵楊給事三首揮毫起制來東省躡足修名謁外臺好看櫜鞬莫惆悵出文入武是全才曽主魚書輕刺史今朝自請左魚來青雲直上無多地却要斜飛取勢囘東城南陌昔同遊坐上無人第二流屈指如今已零落且須歡喜作鄰州巫山神女廟巫山十二鬱蒼蒼片石亭亭號女郎曉霧乍開疑巻幔山花欲謝似殘粧星河好夜聞清珮雲雨歸時帶異香何事神仙九天上人間來就楚襄王栁絮飄颺南陌起東鄰漠漠濛濛暗度春花巷暖隨輕舞蝶玉樓晴拂豔粧人縈迴謝女題詩筆㸃綴陶公漉酒巾何處好風偏似雪隋河隄上古江津陪崔大尚書及諸閣老宴杏園更將何面上春臺百事無成老又催唯有落花無俗態不嫌憔悴滿頭來曹剛大絃嘈􅓐小絃清噴雪含風意思生一聴曹剛彈薄媚人生不合出京城發蘇州後登虎丘寺望梅樓獨宿望梅樓夜深珍木冷僧房已閉户山月方出嶺碧池涵劒彩寳刹搖星影却憶郡齋中虚眠此時景别蘇州二首三載為吳郡臨期祖帳開雖非謝桀黠且為一裵􅏆流水閶門外秋風吹栁條從來送客處今日自魂銷松江送處州奚使君吳越古今路滄波朝夕流從來别離地能使管絃愁江草帶烟暮海雲含雨秋知君五陵客不樂石門遊題報恩寺雲外支硎寺名聲敵虎丘石文留馬跡峯勢聳牛頭泉眼潜通海松門預帶秋遲囘好風景王謝昔曽遊罷郡姑蘇北歸渡揚子津幾嵗悲南國今朝賦北征歸心渡江勇病體得秋輕海濶石門小城髙粉堞明金山舊遊寺過岸聴鐘聲館娃宫在舊郡西南硯石山上前瞰姑蘇臺傍有采香徑梁天監中置佛寺曰靈嵒即故宫也信為絶境因賦二章宫館貯嬌娃當時意大誇艶傾呉國盡笑入楚王家月殿移椒壁天花代舜華唯餘采香徑一帶入山斜姑蘇臺故國荒臺在前臨震澤波綺羅隨世盡麋鹿古時多築用金鎚力摧因石䑕窠昔年雕輦路唯有采樵歌贈同年陳長史員外明州長史外臺郎憶昔同年翰墨場一自分襟多嵗月相逢滿眼是凄涼推賢有愧韓安國論舊唯存盛孝章所歎謬遊東閣下看君無計出恓惶寄湖州韓中丞老郎日日憂蒼鬢逺守年年厭白蘋終日相思不相見長頭相見是何人有感死且不自覺其餘安可論昨宵鳯池客今日雀羅門騎吏塵未息銘旌風已翻平生紅粉愛惟解哭黄昬楊栁枝揚子江頭烟景迷隋家宫樹拂金堤嵯峨猶是當時色半蘸波中水鳥棲海陽十咏并引元次山始作海陽湖後之人或立亭榭率無指名及余而大備每疏鑿搆置必揣稱以標之人咸曰有㫖異日遷官裴侍郎為十咏以示余頗明麗而不虚美因捃拾裴詩所未道者從而和之一云余為吏隠亭述言海陽之所從來詳美異日下與此同吏隠亭結搆得竒勢朱門交碧潯外來始一望寫盡平生心日軒漾波影月砌鏤松隂幾度欲歸去囘眸情更深切雲亭逈破林烟出俯窺石潭空波搖杏梁日松韻碧窓風隔水生别島帶橋如斷虹九疑南面事盡入寸眸中雲英潭芳幄覆雲屏石奩開碧鏡支流日飛洒深處身疑瑩潜去不見迹清音常滿聴有時病朝酲來此心神醒𤣥覽亭瀟灑青林際夤縁碧潭隈淙流冒石下輕波逐砌囘香風逼人度幽花覆水開故令無四壁晴夜月光來裴溪時御史已遇新恩楚客憶闗中疏溪想汾水縈紆非一曲意態如千里倒影羅文動微波笑顔起君今賜環歸何人承玉趾飛練瀑晶晶擲巖端潔光如可把瓊枝曲不折雪片晴猶下石堅激清響葉動承餘洒前時明月中見是銀河瀉䝉池瀠渟幽壁下深浄如無力風起不成文月來同一色地靈草木瘦人逺烟霞逼徃徃疑列仙圍碁在巖側棼絲瀑飛流透嵌隟噴洒如絲棼含暈迎初旭翻光破夕曛餘波遶石去碎響隔溪聞却望瓊沙際逶迤見脈分雙溪流水遶雙島碧溪相並深浮花擁曲處逺影落中心閒鷺久獨立曝龜驚復沉蘋風有時起滿谷簫韶音月窟濺濺潄幽石注入團圓處有如常滿杯承彼清夜露巖曲月斜照林寒春晚煦遊人不敢觸恐有蛟龍䕶送周魯儒赴舉詩并引晝居外次晨門曰有九疑生持一刺來謁立西階以須生危冠方袂淺拱舒拜且前致辭稱贄其文頗涉獵前言居五六日復褏來益引古事以相劘切與之言能言其得姓因家之所自暨縣道鄉亭之風俗望水名山之槩狀羅含所未記朱贑之未條咸得之於生由是始列於賔籍臨觴而司斟觀博而竄言有日矣初邑中人聞有生來而二千石客之駢然來觀遷客裴御史遇生於坐抵掌曰人固有貌類而族殊者周生疑羅玠也衆咸囅然而熟視生疑也愈甚夫形似古所有也優孟似叔敖而楚君欲以為相人殊而貌肖猶或欲用之玠生於衡山而生生於九疑其似誠匹也無乃躡其武昇俊造仕甸服佐君藩為御史乎古文人無避事即有而書之尚實也行李之貺則徴夫詩曰宋日營陽内史孫因家占得九疑村童心便有愛書癖手指今餘把筆痕自握虵珠辭白屋欲憑雞卜謁金門若逢廣坐問羊酪從此知名在一言送曹璩歸越中舊隠詩并引余為連州諸生以進士書刺者浩不可紀獨曹生崖然自稱為山夫及與語以徵其實則曰所嗜者名嘗逺遊以索之抗喉舌胘胝脢以干東諸侯見之日率莞然曰秀才者天下是不禮庸何傷今方依名山以揚其聲將掛幘於南嶽生之言未及休余遽曰在巳不在山若子之言依山而為髙是鍊神叩寂捐日月而不顧名聞而老至持是焉用生聞言愀然如晦色見於眉睫因留止道士院從余求書以觀居三時而功陪一時讀史書自皇帝至吳魏間班班能言之然而絶口不敢言衡山知山夫不販而贏也十一月告余歸隠於㑹稽且曰知求名之自矣乞詞以發之遂賦七言詩以鑒其志詩曰行盡瀟湘萬里餘少逢知已憶吾廬數間茅屋閒臨水一盞秋燈夜讀書地逺何當隨計吏䇿成終自詣公車剡中若問連州事唯有千山畫不如尋汪道士不遇仙子東南秀泠然善馭風笙歌五雲裏天地一壺中受籙金華洞焚香玉帶宫我來君閉户應是向崆峒八月十五日夜桃源翫月塵中見月心亦閒况是清秋仙府間凝光悠悠寒露墜此時云在最髙山碧虚無雲風不起山上長松山下水羣動翛然一顧中天髙地平千萬里少君引我昇玉壇禮空遙請真仙官雲駢欲下星斗動天樂一聲肌骨寒金霞昕昕漸東上輪敧影促猶頻望絶景良時難再并他年此日應惆悵叔父元和中故昔時為桃源行後貶官武陵復為翫月作並題於觀壁爾來暑紀再周蔇牽故此郡迎見文字闇缺伏慮他年轉將塵没故鐫在貞石以期不朽太和四年蔇謹記罷和州遊建康秋水清無力寒山暮多思官閒不計程徧上南朝寺田順郎歌清歌不是世間音玉殿嘗聞稱主心唯有順郎全學得一聲飛出九重深米嘉榮一别嘉榮三十載忽聞舊曲尚依然如今世俗輕前輩好染髭鬚事少年自江陵㳂流道中三千三百西江水自古如今要路津月夜歌謠有漁父風天氣色屬商人沙村好處多逢寺山葉紅時覺勝春行到南朝征戰地古來名將盡為神别䕫州官舍三年楚國巴城守一去揚州揚子津青帳聯延喧驛步白頭俯傴到江濵巫山暮色常含雨峽水秋來不恐人惟有九歌詞數首里中留與賽蠻神夜聞商人船中筝大艑髙船一百尺新聲促柱十三絃揚州市裏商人女來占江西明月天聞道士彈思歸引仙公一奏思歸引逐客初聞自泫然莫怪殷勤悲此曲越聲長苦巳三年喜康將軍見訪謫居愁寂似幽棲百草當門茅舍低夜獵將軍忽相訪鷓鴣驚起繞籬啼贈劉景擢第湘中才子是劉郎望在長沙住桂陽昨日鴻都新上第五陵年少讓清光赴連山途次徳宗山陵寄張員外常時並冕奉天顔委珮低簪彩仗間今日獨來張樂地萬重雲水望橋山嘗茶生拍芳叢鷹觜牙老郎封寄謫仙家今宵更有湘江月照出霏霏滿盌花梁國詞梁國三郎威徳尊女巫簫鼓走鄉村萬家長見空山上雨氣蒼茫生廟門九日登髙世路山河險君門烟霧深年年上髙處未省不傷心謝栁子厚寄疊石硯常時同硯席寄此感離羣清越敲寒玉參差疊碧雲烟嵐餘斐亹水墨兩氛氲好與陶貞白松窓寫紫文元日感懐振蟄春潜至湘南人未歸身加一日長心覺去年非燎火委虛燼兒童􅃷彩衣異鄉無舊識車馬到門稀謝宣州崔相公賜馬浮雲金絡膝昨日别朱輪銜草如懐戀嘶風尚意頻曽將比君子不是換佳人從此西歸路應容躡後塵南中書來君書問風俗此地接炎州淫祀多青鬼居人少白頭旅情偏在夜鄉思豈唯秋每羨朝宗水門前盡日流題招隠寺隠士遺塵在髙僧精舍開地形臨渚斷江勢觸山迴楚野花多思南禽聲例哀殷勤最髙頂閒却望鄉來思歸寄山中友人蕭條對秋色相憶在雲泉木落病身死潮平歸思懸涼鐘山頂寺暝火渡頭船此地非吾土閒留又一年望洞庭湖光秋月兩相和潭面無風鏡未磨遙望洞庭山水翠白雲盤裏一青螺魚復江中扁舟盡室貧相逐白髮蔵冠鑷更加逺水自澄終日緑晴林長落過春花客情浩蕩逢鄉語詩意留連重物華風檣好住貪程去斜日青帘背酒家歴陽書事七十韻并引長慶四年八月余自䕫州轉歴陽浮岷山觀洞庭歴夏口涉潯陽而東友人崔敦詩罷丞相鎮宛陵緘書來招曰必我覿而之藩不十日飲不置子故余自池州道宛陵如其素敦詩出祖於敬亭祠下由姑孰西渡江乃吾圉也至則考圗經參見事為之詩俟采之夜諷者一夕為湖地千年列郡名霸王迷路處亞父所封城漢置東南尉梁分肘腋兵本呉風俗剽兼楚語音傖沸井今無湧烏江舊有名土臺遊柱史石室隠彭鏗老君適楚有臺在焉彭鏗石室在含山縣曹操祠猶在濡須塢未平海潮隨月大江水應春生一昨深山裏終朝看火耕魚書來北闕鷁首下南荆雲雨巫山暗蕙蘭湘水清章華樹已失鄂渚草來迎廬阜香爐出湓城粉堞明鴈飛彭蠡莫鵶噪大雷晴平野分風使恬和趂夜程貴池登陸峻春穀渡橋鳴駱驛主人問悲歡故舊情幾年方一面卜晝便三更助喜杯盤盛㤀機笑語訇管清疑警鶴絃巧似嬌鶯熾炭烘蹲獸華茵織鬭鯨囘裾飄霧雨急節墮瓊英斂黛疑愁色施鈿耀翠晶容華本南國粧梳學西京日落方收鼔天寒更炙笙促筵交履舄痛飲倒簪纓謔浪容優孟嬌憐許智瓊蔽明添翠帟命燭拄金莖坐久羅衣皺盃傾粉面騂興來從請曲意墮即飛觥令急重須改歡馮醉盡呈詰朝還選勝來日又尋盟道别殷勤惜邀筵次第争唯聞嗟短景不復有餘酲衆散扄朱户相攜話素誠晤言猶亹亹殘漏自丁丁出祖千夫擁行厨五熟烹離亭臨野水别思入哀筝接境人情洽方冬饌具精中流為界道隔岸數飛甍沙浦王渾鎮滄州謝眺城望夫人化石夢帝日環營半渡趨津吏縁堤簇郡甿場黄堆晚稻籬碧見冬菁里社争來獻壺漿各自擎鴟夷傾底舄粔籹鬭成闕采石風傳柝新林暮撃鉦繭綸牽撥刺犀焰照澄泓露冕觀原野前驅抗斾旌分庭展賔主望闕拜恩榮比屋惸嫠輩連年水旱并遐思常後巳下令必先庚逺岫低屏列支流曲帶縈湖魚香勝肉官酒重於餳憶惜泉源變斯須地軸傾雞籠為石顆龜眼入泥坑事繫人風重官從物論輕江春俄澹蕩樓月幾虧盈栁長千絲宛田塍一線絣遊魚將婢從野雉見媒驚波浄攅鳬鵲洲香發杜蘅一鐘菰葑米千里水葵羮受譴時方久分憂政未成比瓊雖碌碌於鐡尚錚錚早忝豋三署曽聞奏六英無能甘負弩不慎在提衡口語成中遘毛衣阻上征時聞闗利鈍智亦有聾盲昔媿山東妙今慙海内兄後来登甲乙早巳在蓬瀛心托秦明鏡才非楚白珩齒衰親藥物宦薄傲公卿捧日皆元老宣風盡大彭好令朝集使結束赴新正劉賔客外集巻八欽定四庫全書劉賔客外集巻九唐劉禹錫撰雜著為淮南杜相公論西戎表臣某言臣一辭闕庭已僅二載官當重任身受重恩既懐子牟戀闕之心又負臧文竊位之責思所以歌頌聖徳裨補箴規塵露至微不任懇迫臣逺祖詩顯名漢代出牧南陽讜言善䇿隨事獻納忠醇之至聞于中外遺風可襲有激愚衷臣是以輒竭聞見粗陳梗槩雖不盡陛下聖明萬分之一然臣子之心有直必獻伏惟皇帝陛下徳合天地道躋文武弛張普博事法隂陽氣均生成人霑亭育凡是氛沴覆以春和銷除容納皆如聖意寛宥肆赦實賴皇明河中誅鋤不勞兵革淮右底定不戮一人慶浹萬邦事出千古近又西戎背約寇犯王師陛下寛貸豺狼矜其兇悍布以恩澤果爾知慙功因徳成不以兵制故詩云獫狁孔熾書稱蠻夷猾夏臣觀自古帝王不忍小忿貽大患故竭耗中國盡力邉陲至如滅昆明之城平大宛之種豈是發輝皇猷増榮簡冊故聖哲之論薄衛霍之功陛下鏡歴代無益之端修大君文徳之教遂得北狄深蔵五城晏閑百蠻嚮化四海無虞惟此小番尚述聲教陛下示之大信加以舊恩雖闗防暫驚而烽燧旋罷臣負恩方鎮初懼寇戎正於憂迫之時果聞仁聖之諭攘却兇孽不勞干戈臣静思逺圖久計莫若存信施惠以愧其心嵗通玉帛待以客禮昭宣聖徳擇奉誼之臣恢拓皇威選謹邉之將積粟塞下坐甲闗中以逸待勞以髙御下重其金玉之贈結以舅甥之歡小來則慰安大至則嚴備明其斥候不撓不侵則戎狄為可封之人沙塲無戰死之骨若天下無事人安嵗稔然後訓兵命将破虜摧衡原州營田靈武盡復舊地通使安西國家長筭悉在於此計熟事定舉必有功茍未可圖豈宜容易此皆陛下朝夕倦談之事前後立騐之謀臣質性頑疎籌畫庸近受恩非據敢㤀獻忠犬馬之心實所罄盡謹遣某官某奉表謝上連州刺史表臣某言伏奉去三月七日制授臣使持節連州刺史恭承睿㫖跪奉詔書皇恩重於丘山聖恩深於雨露抃舞失次神魂再揚臣某中謝臣性愚拙謬學文詞幸遇休明累登科第出身入仕並不因人徳宗臨御之時臣忝御史陛下龍飛之日臣忝郎官恭守章程勤修職業權臣奏用葢聞虚名實非曲求可以覆視跡卑易枉無路自明亦縁臣有微才所以嫉臣者衆競生口語廣肆加誣伏賴陛下至仁時從寛典舉以縁坐貶佐遐藩屢變星霜頻經恩赦犬馬懐戀寢興匪寜唯讀佛經願延聖夀昨䝉昭命追赴上都隨列授官俾居逺郡在臣之分榮幸巳多伏荷陛下孝理純深皇明照燭哀臣老母羸疾憫臣一身零丁特降所恩得移善部光榮廣被母子再生凡在人臣皆感聖徳凡為人子皆荷聖慈豈唯賤臣獨受恩造不覺喜極至于涕零昔殷王俯念於前禽且聞解網漢帝有感於少女爰命罷刑方之聖朝不足多尚感召和氣慰安羣生非臣隕越所能上報伏以南方厲疾多在夏中臣自發栁州便染瘴瘧扶䇿在道不敢停留即以今月十一日到州上訖謹宣聖㫖以示逺人恭述詔條所期富庶無任含輝洞述河東薛公景晦以文無害為尚書刑部郎中以訕為道州刺史居郡大理至於無事清機羨益盡付山水一旦以書來誇曰吾得異境于近郊自城西門並南山俯江水有石穹然如夏屋其左右前後又如囘廊曲房藻繡彫彤之象雲生日入怪狀迭發水石卉木香非人寰意其當為食霞御氣者之所遊息委蛻而去不知其幾千百年逮今得諸黄冠野夫及請而往因名其地曰含輝洞葢詩家流所謂山水含清輝者是已吾子常以詞雄於世盍為我誌焉愚得書退而深惟若薛公者少居江湖間遊名山東探禹穴止四明句曲金華陽羨南過九江薄匡廬以涉彭蠡天下山水之籍存乎胸中第其髙下銖兩不失及是而口呿不能名顧謂竒信矣若江華者九疑三湘之佳麗地也前此二千石御史中執法河南元次山諫大夫北平陽亢宗司刑大夫東平吕和叔皆碩人也考槃招隠之致恒汲汲然卒使諸境貴于異日豈地愛其寳有時而發耶顧謂異信矣夫物之有作俟言而逺故述焉以書于洞隂曰營陽鬱鬱山水第一洞有含輝遊人忘歸公也孔樂請言其㣲先是斯境翳于榛薄天姿孤絶凡目所忽閟其清光有待而發公之來思探竒翫竒茇野憇林而民悦之既悦其至益知所嗜捫陘歴峴來適公志偶得竒絶聿來告公駕言從之谷岸溟濛有石如門又如垣墉樛蔓交木似綸似組乃芟乃治乃可布武伸脰掉臂空洞無阻左右囘環儼若廊廡飛泉出竇練縋花吐觸石吹沙珮搖絃撫側逕夤縁豁然見天有石如堂度之五筵東西二門與日明昏奥者如室宣者如軒因其髙下爰搆亭榭匠生於心隨指如化開山剪木後以私屬結構暨茨子來嬉嬉無事而就邦人不知淑清之辰休澣之時雅步幅巾琴壺以隨前無俗人與白雲期年日盡適形神不羈元氣顥然觀吾朶頥遵渚之鴻有時而飛石門之下可以棲遲此谷而盈彼丘而夷維公之跡永在于斯吏隠亭述元和十五年再牧于連州作吏隠亭海陽胡壖入自外閒不知藏山歴級東望怳非人寰前有四榭隔水相鮮凝靄蒼蒼深流布懸架險通蹊有梁如蜺輕泳徐轉有舟如翰登霞􅃞月若在天漢視被廣輪千畆之半翠麗于是與世珠貫澂明峭絶藿靡葱蒨炎景有宜昏旦迭變疑昔神鼇負山而抃摧其别島置此髙岸海陽之名自元先生先生元結有銘其碣元維假符予維左遷其間相距十五餘年封境服人其猶比肩天下山水非無美人地偏人逺空樂魚鳥謝公開山涉月忘還豈曰無娛伊險且艱溪山為友城池為伍却倚佛寺左聯仙府勢拱臺殿光含廂廡窈如壺中别見天宇石堅不老水流不腐不知何人為今為古終堅焉老終流焉竭不知何時再融再結傳信方述余為連州四年江華守河東薛景晦以所著古今集驗方十通為贈其志在於拯物予故申之以書異日景晦復寄聲相謝且咨所以補前方之闕醫拯道貴廣庸可以學淺為辭遂於篋中得巳試者五十餘方用塞長者之問皆有所自故以傳信為目云元和十三年六月八日中山劉禹錫述彭陽唱和集引丞相彭陽公始由貢士以文章為羽翼怒飛于㝠㝠及貴為元老以篇詠佐琴壺取適乎閒讌鏘然如朱絃玉磬故名聞于世間鄙人少時亦嘗以詞藝梯而航之中途見險流落不試而胷中之氣伊鬱蜿蜒泄為章句以遣愁沮悽然如燋桐孤竹亦名聞于世間雖窮達異趣而音英同域故相遇甚歡其㑹面必抒懐其離居必寄興重酬累贈體備今古好事者多傳布之今年公在并州余守吳門相去迴逺而音徽如近且有書來抵曰三川守白君編録與吾子贈答緘縹囊以遺余白君為詞以冠其前號曰劉白集悠悠思與所賦亦盈于巾箱盍次第之以塞三川之請於是緹綴凡百有餘篇以彭陽唱和集為目勒成兩軸爾後繼賦附于左方太和七年二月五日中山劉禹錫述彭陽唱和集後引貞元中予為御史彭陽公從事于太原以文章相徃来有日矣無何予受譴南遷十餘年間公登用至宰相出為衡州方獲㑹面輸寫藴積相視泫然爾後或雜賦詩贈答編成兩軸太和五年余領吳郡公鎮太原常發函寓書必有章句絡繹於數千里内無曠旬時八年公為吏部尚書予牧臨汝有詩歎七年之别著其後云集巻自此為第三未幾予轉左馮公登左揆每恨近而不見形於詠言開成元年公鎮南梁予以太子賔客分司東都新韻繼至率云三軸成矣二年冬忽寄一章詞調悽切似有永訣之㫖伸紙悸歎居數日果承訃書嗚呼聆風相悦者四十年㑹面交歡者十九年以詩見投凡七十九首勒成三巻以副平生之言吳蜀集引長慶四年余為歴陽守今丞相趙郡李公時鎮南徐州毎賦詩飛函相示且命同作爾後出處乖逺亦如隣封凡酬唱始於江南而終於劒外故以吳蜀為目云汝洛集引太和八年予自姑蘇轉臨汝樂天罷三川守復以賔客分司東都未幾有詔領馮翊辭不拜職授太子少傅分務以遂其髙時予代居左馮明年予罷郡以賔客入洛日以章句交歡因而編之命為汝洛集子劉子自傳子劉子名禹錫字夢得其先漢景帝賈夫人子勝封中山王諡曰靖子孫因封為中山人也七代祖亮事北朝為冀州刺史散騎常侍遇遷都洛陽為北部都昌里人世為儒而仕墳墓在洛陽北山其後也陿不可依乃塟滎陽之檀山原田大王父已還一昭一穆如平生曽祖凱官至博州刺史祖鍠由洛陽主簿察視行馬外事嵗滿轉殿中丞侍御史贈尚書祠部郎中父諱緒亦以儒學天寳末應進士遂及大亂舉族東遷以違患難因為東諸侯所用後為浙西從仕本府就加鹽鐡副使遂轉殿中主務于埇橋其後罷歸浙右至揚州遇疾不諱小子承夙訓稟遺教眇然一身奉尊夫人不敢殞滅後忝登朝或領郡䝉恩澤先府君累贈至吏部尚書先太君盧氏由彭城縣太君贈至范陽郡太夫人初禹錫既冠舉進士一幸而中試間嵗又以文登吏部取士科授太子校書官司閒曠得以請告奉温凊是時年少名浮於實士林榮之及丁先尚書憂迫禮不死因成痼疾既免喪相國揚州節度使杜公領徐泗素知遂請為掌書記捧檄入告太夫人曰吾不樂江淮間汝宜謀之於始因白丞相以請曰諾居數月而罷徐泗而河洛猶艱難遂改為揚州掌書記涉二年而道無虞前約乃行調補京兆渭南主簿明年冬擢為監察御史貞元二十一年春徳宗新棄天下東宫即位時有寒雋王叔文以善奕棊得通籍博望因間隙得言及時事上大竒之如是者積久衆未知之至是起蘇州掾超拜起居舍人充翰林學士遂隂薦丞相杜公為度支鹽鐡等使翊日叔文以本官及内職兼充副使未幾特遷户部侍郎賜金紫貴振一時愚前巳為杜丞相奏署崇陵使判官居月餘日至是改屯田員外郎判度支鹽鐡等按初叔文北海人自言猛之後有逺祖風唯東平吕温隴西李景儉河東栁宗元以為言然三子者皆與予厚善日夕過言其能叔文實工言治道能以口辨移人既得用自春至秋其所施為人不以為非當時上素被疾至是尤劇詔下内禪自為太上皇後諡曰順宗東宫即皇帝位是時太上久寢疾宰臣及用事者都不得召對宫掖事祕而建桓立順功歸貴臣於是叔文首貶渝州後命終死宰相貶崖州予出為連州途至荆南又貶朗州司馬居九年詔徵復授連州自連歴䕫和二郡又除主客郎中分司東都明年追入充集賢殿學士轉蘇州刺史賜金紫移汝州兼御史中丞又遷同州充本州防禦長春宫使後被足疾改太子賔客分司東都又改秘書監分司一年加檢校禮部尚書兼太子賔客行年七十有一身病之日自為銘曰不夭不賤天之祺兮重屯累厄數之竒兮天興所長不使施兮人或加訕心無疵兮寢於北牖盡所期兮塟近大墓如生時兮魂無不之庸詎知兮唐故監察御史贈尚書右僕射王公神道碑公諱倰字真長其先葉黄帝夫聖人之後與庶姓不同如河出崑崙潜於厚地欻焉振起奮為汪洋奔騰自天非衆川也故自黄帝八代而生舜武王克殷求有媯之𦙍滿封於陳是為胡公十三葉生完自以公子國難不得立乃抱樂器奔齊桓公以卿禮接之下又十一葉和以久為政隂浹于人遂有齊國三代稱王至建為秦所滅項羽入秦封建孫安為濟北王漢興失國齊人謂之王家因以為氏安子涓仕漢為鎮東将軍青州牧封劇縣伯自涓至彤凡一十九代兩漢公卿牧守如家牒然十代祖猛字景畧苻秦尚書令伉秦成霸業與孔明佐蜀同功故時人謂之王葛史云北海劇人遂著為族望九代祖休儀曹尚書八代祖鎮惡佐命宋長安擒姚𢎞至北齊五代祖􅀈七兵部尚書兄弟九人時號王氏九龍於齊史有傳云髙祖顗字君粹北齊著作郎燕郡太守曽祖敬忠成州刺史大父上客髙宗封嶽進士及第歴侍御史主客兵部員外郎累遷兵右金吾衛將軍冀州刺史靈州都督朔方道總管見職官儀及衣闕烈考瞰宣州宣城縣令贈工部郎中娶河東裴氏乃生僕射少而敦敏工為文始以崇文生應深謀祕䇿考入上第拜監察御史天之賦予莫能兩大既揚令名而不以景福享齡五十五塟于河南府偃師縣亳邑鄉後以子貴累贈禮部尚書至右僕射夫人江夏李氏祔焉李門多竒才父暄起居舍人暄子鄘門下侍郎平章事髙叔祖善蘭臺郎崇文館學士注文選行於時善子邕北海郡太守有重名四方之士求為碑銘者傾天下故夫人於盛宗禮範可法累贈至江夏郡夫人僕射有三子長子早終次子處𤣥少嬰沉恙慕道士養生之術髙尚其趣强仕而没積善不試後來果大焉季子彦威字子美始以五經登甲科歴太常博士祠部員外郎遷屯田郎中轉户部司封並充禮儀使判官宏文館學士京兆少尹諫議大夫史館修撰以直諫出為河南少尹入為少府監司農卿改淄青節度使徵拜户部侍郎判度支勢逼生患出為衛尉卿分司東都尋起為陳許節度使檢校禮部尚書充汴宋亳等州節度觀察處置等使北海縣開國子食邑五百户娶潁川韓氏主客員外郎衢之女國子祭酒楊頊之外孫夫人有三弟皆材無子早謝已如禮祔塟于亳邑原僕射厚徳覆露之尚書丕承之以蚤孤鋭意嚮學嘗閲詩至蓼莪篇感激流涕故其志如刃始淬及學成立成為鴻儒入用為能臣參定儀制財成經費起書生擁旌節今又領全師鎮上游握神符垂三組皆嚮時感發之所激也志就而學成名聞而身達欲報無所外榮中悲人子之孝在乎揚其先徳以耀于逺乃俾學古者書本系所自且銘于龜趺螭首云銘曰山積而髙澤積而長聖人之後必大而昌由聖與賢或為霸强建不克嗣濟北疏疆齊人徳之其族稱王佐于苻秦北海重光僕射之主負材而起䇿于萬乘擢為御史同時條對千目仰視桂林一枝拾芥相似名動海内夫豈不偉種徳而牙乃生令子出入鼎貴理財統師流根之澤密印纍纍峻其追崇幽顯有輝孝嗣之志歉然弗怡春露秋霜感傷履之時久能慕禄豐益悲明發不寢永懷孝思攄之無窮曷若豐碑景亳之原佳城在斯乃金石刻揭于道陲松耶栢耶有洛之湄過者必下來觀信辭劉賔客外集巻九欽定四庫全書劉賔客外集巻十唐劉禹錫撰墓誌祭文故荆南節度推官董府君墓誌銘元和七年夏四月某日前荆州部從事董府君以疾終于故府私第年若干其孤泣書前人之爵里耿光求我以銘于幽且先志也故重為之董姓出于豢龍氏至辛有而分在晉為良史在趙佐簡子為能臣項羽主盟為翟王髙皇帝舉兵漢中刼其兵衆不克其土後裔遂為隴西人凡稱事不稱名不待事而彰也始予謫於武陵人多中之賢有董生為守令客既而以士相見之禮成與之言能言墳典數旁捃百氏之學弱年嗜屬詩工奕棊用是索合於貴游多所慰中年奉浮圖説三乘用是貢誠於清賢多被辟書脱巾為崇文館校書郎再選至大理評事咸視真秩而不纍其章職繫於外是也晚節尚道故投劾於幕府治扁舟浮江沲泛洞庭登熊耳訪浮丘以探異賦枉渚以寄傲居數嵗投老於南荆迷邦縱性委和從化逮夫寢巨室也自含襚至於卜竁皆仁人之賻焉是嵗五月十二日卜塟于龍山之某崗外姻至矣君名侹字庶中大父曰思簡位至汝南太守父承祖殁于試守太子舍人始為君求婦于鄭之里生嗣子夏卿既立而天今未之從其後又娶于閻氏生二子曰周卿雲卿嫠也繐裳髽首有正家之道嗚呼道愈富而室愈貧志甚修而知甚寡士以隴西為貴將在令名與銘曰學待問而文藻身藝不試兮名孰聞大道甚夷兮此我辰何生不茂兮非我春修門之達兮連岡膴膴蔓草如蘭兮新墳若斧吁嗟董生兮於焉終古絶編生墓表顧彖呉郡人食力於武陵沅水上以讀易聞病且死飭其子曰吾年十有五而受易於師積六十三年於兹未嘗一日不吟乎繫象里中兒從吾讀其文多矣死則必塟我于黨庠之側尚其有知且聞吾書君子曰若彖者可謂志篤于學矣因以絶編生諡之且表其墓後之讀功令者或采焉予既謫居是邦始至之日問能道古語可與言者邑子以生為對既而執贄請見之生危冠大袂闊視雅拜及門知讓候肅而後入又肅而躋階心存聖言潤徹眉睫有野態而無茍容問其所執曰幼學易老而尤嗜問安學曰始聞於師晚熱于心自尼父兼三才絀八索繫辭焉以通微言與伏羲文王並行猶天三辰同麗太極秦脱大患完文顯行漢之田丁京劉而東京有馬魏鄭與何荀兩王而吳有韋陸前者導源後之洒之渢融混合百派犇奏唐興沙門一行方洩天幾以探古人神友造物智斟人事制動也有柅變道也無方曏之支流委輸于我其他紬繹祖述三十有餘家朱藍之樸斵之為羽翼為鼓吹疇咨天人之際旁魄上下騖精於攟摭匱巧於穿鑿猶制氏之於樂鏗鏘而已徐氏之於禮善容而巳然而前修之盡心也得以味腴搴芳焉手胝於運管目䁾於臨燭而氣耗於咏呻家居無訾不能與計偕地偏且逺無有能晤語心愈苦而跡愈卑寒膚嗛腹以至於耄老微夫子之問持是安施乎他日予造其室廬瓢簞在左汙尊在右有龜枵然有筴甚澤余擫蓍指骨而訊之曰是亹亹者曽不予欺乎生攸爾而對云古先聖人知道之妙不可博而得也故設象以致意使有取有用取當其粗用當其精夫權衡所以揣輕重不為捶鈎者設也尋尺所以商逺邇不為運斤者設也龜筴所以決羣疑不為知幾者設也幾存乎人是則以天時為卦體以地理為爻位外附人事以象焉内取諸身以彖焉得樞於寰中迎數於象外自然之理不知其然雖欲强名措説無地彼枯莖朽殻安能與於此乎今夫揲之以至刓灼之以殆盡徒與夫蚩蚩者問歉穰占熊虺起訟需食亡羊喪牛之間耳資其握粟以餬予口烏足為夫子道哉余以斯言邃於易故書之噫國有大學學有館以延顓門若生者苦形役志如是其顓也茹經于腹湮滅糞壤壁水湯湯不聞其聲摧蔵樸遫與山木同朽豈地逺然耶彼文甲綷毛剽筋夀革嶺嶠之華實炎溟之蜃蝦飛苞驛篚所至而貴夫豈貴邇也哉悦者衆故也生之死在元和七年秋七月由死之日推而上求直治生之辰得四百有七十甲子塟在征渚西右磯上其墳可隠東望里塾尚行其志云祭栁員外文維元和十五年嵗次庚子正月戊戌朔日孤子劉禹錫銜哀扶力謹遣所使黄孟萇具清酌庶羞之奠敬祭于亡友栁君之靈嗚呼子厚我有一言君其聞否惟君平昔聰明絶人今雖化去夫豈無物意君所死乃形質耳魂氣何托聴余哀詞嗚呼痛哉嗟余不天甫遭閔凶未離所部三使來弔憂我哀痛諭以苦言情深禮至欵密重複期以中路更申願言途次衡陽云有栁使謂復前約忽承訃書驚號大叫如得狂病良久問故百哀攻中涕洟迸落魂魄震越伸紙窮竟得君遺書絶絃之音悽愴徹骨初托遺嗣知其不孤末言歸輤從祔先域凡此數事職在吾徒永言素交索居多逺鄂渚差近表臣分深想其聞訃必勇於義巳命所使持書徑行友道尚終當必加厚退之承命改牧宜陽亦馳一函候於便道勒石垂後屬于伊人安平宣英會有還使悉巳如禮形於具書嗚呼子厚此是何事朋友凋落從古所悲不圖此言乃為君發自君失意沉伏逺郡近遇國士方伸眉頭亦見遺草恭辭舊府志氣相感必踰常倫顧余負釁營奉方重猶冀前路望君銘旌古之達人朋友則服今有所厭其禮莫申朝脯臨後出就别次南望桂水哭我故人孰云宿草此慟何極嗚呼子厚卿真死矣終我此生無相見矣何人不達使君終否何人不老使君夭死皇天后土胡寜忍此知悲無益奈恨無巳君之不聞余心不理含酸執筆輒復中止誓使周六同於巳子魄兮來思知我深㫖嗚呼哀哉尚饗重祭栁員外文嗚呼自君之没行已八月每一念至忽忽猶疑今以喪來使我臨哭安知世上真有此事既不可贖翻哀獨生嗚呼出人之才竟無施為炯炯之氣戢于一木形與人等今既如斯識與人殊今復何託生有髙名没為衆悲異服同志異音同歡唯我之哭非弔非傷來與君言不成言哭千哀萬恨寄以一聲唯識真者乃相知耳庶幾儻聞君儻聞乎嗚呼痛哉君有遺美其事多梗桂林舊府感激生持俾君内弟得以義勝平昔所念今則無違旅魂克歸崔生實主幼穉甬上故人撫之敦詩退之各展其分安平來賵禮成而歸其他赴告咸復于素一以誠告君儻聞乎嗚呼痛哉君為巳矣余為茍生何以言别長號數聲冀乎異日展我哀誠嗚呼痛哉尚饗為鄂州李大夫祭栁員外文嗚呼至人以在生為傳舍以軒冕為儻來達於理者未嘗惑此昔余與君論之詳熟孔氏四科罕能相備惟公特立秀出幾於全器才之何豐運之何否大川未濟乃失巨艦長途始半而喪良驥搢紳之倫孰不墮淚昔者與君交臂相傳一言一笑未始有極馳聲日下騖名天衢射䇿差池髙科齊驅攜手書殿分曹藍曲心志諧同追歡相續或秋月銜觴或春日馳轂甸服載朞同升憲府察視之列斯焉接武君遷外郎予侍内闈出處雖間音塵不虧勢變時移遭罹多故中復賜環上京良遇曽不踰月君又即路逺持郡符栁江之壖居陋行道疲人歌焉予來夏口忽復三年離索則久音貺屢傳篋盈草𨽻架滿文篇鍾索繼美班揚差肩賈誼賦鵩屈原問天自古有死奚論後先痛君未老美志莫宣邅囘世路奄忽下泉嗚呼哀哉令妻早謝穉子四嵗天喪斯文而君永逝翩翩丹旐來自遐裔聞君旅櫬既及岳陽寢門一慟貫裂衷膓執紼禮乖出疆路阻故人奠觴莫克親舉馳神假夢冀獲寤語平生密懐願君遣吐遺孤之才與不才敢同巳子之相許嗚呼哀哉尚饗祭韓吏部文髙山無窮太華削成人文無窮夫子挺生典訓為徒百家抗行當時勍者皆出其下古人中求為敵葢寡貞元之中帝鼓薫琴奕奕金馬文章如林君自幽谷升于髙岑鸞鳯一鳴蜩螗革音手持文柄髙視寰海權衡低昂瞻我所在三十餘年聲名塞天公鼎侯碑志隧表阡一字之價輦金如山權豪來侮人虎我䑕然諾洞開人金我灰親親尚舊丹其夀考天人之學可與論道二者不至至者其誰豈天與人好惡背馳昔遇夫子聰明勇奮常操利刃開我混沌子長在筆予長在論持矛舉楯卒不能困時惟子厚竄言其間賛詞愉愉辨道顔顔磅礴上下羲農以還㑹於有極服之言詮胡合我而長逝徒泣涕而漣漣吁嗟乎岐山威鳯不復鳴華亭别鶴中夜驚畏簡書兮拘印綬思臨慟兮志莫就生芻一束酒一盃故人故人歆此來祭興元李司空文維大和四年月日禮部郎中集賢殿直學士劉禹錫謹以清酌之奠敬祭於故相國山南西道節度使贈司空李公之靈嗚呼龜靈而刳龍知而屠古今同之天不可呼公之挺生徳與位并如瞻日月豈贊其明何以致之姑話平生追懐周旋彌四十年射䇿校文接武聯翩甸服同邑明庭比肩公乘迅飊凌厲非烟愚觸駭機迸落深泉一持化權一謫海壖本同末異如矢别弦雲龍井蛙勢不相見二紀迴泊一朝㑹面公為故相愚似悲翁契闊相遇凄涼萬重復以郎吏交歡上公披襟道舊劇談小酒清洛泛舟鑿龍攜手公入西闗愚亦徵還削去苛禮招邀清閒廣陌聯鑣髙臺看山尋春適野醉舞花間忽復登壇總戎于外子午危棧巴梁古岸夷風傖儜獽俗䧟害隂謀密備兇黨千輩如嗾羣犬以逼騶虞如縱炎火以焚瑾瑜時耶命耶不慮不圖物理神道安知有無嗚呼痛哉𤣥天甚髙上訴何時長夜無曉斯焉永歸風凄日昬鼓咽簫悲沉埋玉樹誰不霑衣平生故人零落已稀委花而盡然猶怨咨如何國楨有此遭罹挺災賦命孰主張之有肴在筵有酒盈巵神其來歆已矣長辭尚饗代裴相祭李司空文四年月日特進守司空兼門下侍郎平章事裴度謹以清酌少牢之奠敬祭于故相國魏郡公之靈嗚呼玉貞而折不能瓦合鸞鎩而萎不同雞羣生兮若浮守道不屈惟公之生福自維嵩金石髙韻珪璋徳容元和之初左右憲宗以才視草以望登庸振起直聲激揚清風實有正氣號為名公名成身退猶係人望入為羽儀出領藩方既師百辟又副丞相道冠搢紳事參翼亮某與公遊四十餘年風期合契禄位相先某忝司言公持化權應同宫徵馥若蘭荃猥以姓名稱於上前發迹從微芳徽獲宣某為免相待罪梁山公拜右揆來從東川極其歡娛著在詩篇某忝三入公東亦還里門相邇賔閤常閒退朝休澣道舊開顔嗟乎山川間之忽在旦夕豈意倉卒遂成今昔衣冠喪氣風物含戚强魂訴天寃血成碧嗚呼哀哉某在病中訃書始至無力以哭不言垂淚今聞裧輤首路而歸隠几臨風其心孔悲嘉肴百籩㫖酒一巵寄此情素神其來思嗚呼哀哉代諸郎中祭王相國文維大和四年月日某官等敬祭于故相國贈太尉太原王公之靈嗚呼天以和氣鍾於貴人含光不曜照物如春發自貢士驟為廷臣鴻鴈聯行其凌青雲既操利權兼秉國鈞食禄甚厚奉身如貧井絡之隅益部為大斗牛之下揚州繁㑹受社臨戎油幢曲葢印綬重疊恩華滂霈簿領如山處之若閒搉筦之權往而復還炎炎暐暐出入二紀未曽傷神屢有薦士急難友弟謹厚訓子顔間熈熈不形愠喜處巳無咎得君如此若木方髙商飊歘起三台之氣變現在時五福之來盛衰有期曉下黄閤車騎威遲夕歸華堂言笑嘻怡詰朝愀然有志求醫未撤琴瑟俄懸素旂宸衷震悼朝右悽悲詔下褒崇恩殊等夷靈輀既駕真宅將歸笳簫咽而復揚風日慘而無輝𤣥亮等或早挹清塵或晚承泛愛昔修禮于門閫今纒悲于祖載幽顯雖異音徽未昧神之格思歆此誠酹尚饗祭福建桂尚書文維大和六年月日蘇州刺史劉禹錫謹以清酌之奠敬祭于故福建團練使桂公之靈鵾化鵬征擘波沖天士逢其時捨笈乘軒始識尚書貞元季年詣我南省袖文一編便坐接語其容温然星嵗未幾鄙夫南遷滯留江湘魚鳥周旋尚書遇知變化如蟬秉憲朝右剖符江壖交趾化行容州績宣凡曰循吏莫居我先太和之初再遂良覿分務東洛門里同陌余復郎位公為賔客蔚然貴臣綬紫鬚白俄俱西還列于清班來訪書殿登樓看山見領八屯循街九闗賀遷閩越紅斾雙殷克有淑聲搢紳之間惸嫠鼓舞强悍低路延平古津峭壁孱顔豈意龍劒沉晶不還復魄侯堂歸舟建浦雙表何在虎丘之下恭承嘉命來牧吾土言念昔遊忽成千古哀哀孝嗣率禮無違言奉几席歸乎洛師敬陳奠筵泣對靈帷平生不㤀歆此一巵嗚呼哀哉祭虢州楊庶子文維太和六年月日蘇州刺史劉禹錫謹遣軍吏某乙具少牢清酌之奠敬祭于故虢州楊公之靈嗚呼利劒多缺真玉喜折俊人不夀為氣所齧子之少孤率性自然早有名字結交世賢席勢馳聲龍秋鳥仚試文再售毛翮愈鮮歴佐侯藩拾遺君前伏閤論事氣奪内權克揚直聲不愠左遷一斥于外君門邈然五剖竹符皆有聲績南湘潜化巴人啞啞比陽布和戰地盡闢夀春武㫁姦吏奪魄榮波砥平士庶同適朝典陟明俾臨本州錫以貴綬腰金晝遊輿疾而來風烟為愁静治三載卧分主憂直氣潜銷頹几不留九天難問萬化同休嗚呼惜哉與君交歡巳過三紀維私之愛與衆無比乃命長嗣為君半子誰無外姻君實知已昔與君遊俱為壯年怒人言命笑人言天閲事未多信書太堅方階尺木巳墜九泉誦年易深潜病難痊不見南楚方知北軒嗚呼嗟哉見幾不早追悔已晚猶希茍老容或宣轉以閒相期以晦相勉一丘可樂萬累皆遣翫圖散秩婆娑京輦天命不長願言莫展嗚呼痛哉君卧𢎞農余來姑蘇飛書相約言念鼎湖我車載脂為子疾驅入境閴寂唯逢素書發函驚視翰不自濡相去一舍豈無肩輿君為病嬰我為吏拘兩不如意嗟哉命夫君今往矣無復可道我今泛然一委𤣥造平生親友零落太早無望拔茅盡悲宿草到郡浹辰君不起聞寢門一慟心哀如焚彭彭輤車來葬洛濵敬修賻禮泣送行人萬夫之羞薦君明魂三赤之板寫予哀文凄涼山河慘淡風雲巳矣長别嗟我楊君劉賔客外集巻十}
