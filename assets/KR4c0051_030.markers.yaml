  - {type: variant, offset: 3754, length: 0, content: '', WYG: 品二道皆足以取幸於士大夫宜薰餘習以深入也㑹吴郡以山水冠世海陽又以竒甲一州師慕道於泉石宜篤故攜之以嬉及言旋復引與共載於湖上奕於樹石間以植沃州之因縁且賦詩具道其事近郭有殊境獨遊常鮮懽逢君駐緇錫觀白稱林巒湖滿景方霽野香春未闌愛泉移席近聞石輟棋看風止松猶韻花繁露晚乾橋形出樹曲巖影落池寒湘東架險凡四橋山下出泉逗嵓為池泓澄可愛者不可遍舉故狀其境以貽好事别路千嶂裏詩情莫雲端它年買山處似此得隳官觀棋歌送儇師西遊長沙男子東林師閒讀藝經工奕棋有時凝思如入定暗覆一局誰能知今年訪余來小桂方袍袖中貯新勢山城無事愁日長白晝懵懵眠匡牀因君臨局看鬭智不覺遲景沈西牆自從山人遇樵子直到開元王長史前身後身付餘習百變千化無窮已初疑磊落曙天星次見搏撃三秋兵雁行布陳衆未曉虎穴得子人皆驚行盡三湘不逢敵終日饒人損機格自言臺閣有知音悠然逺起西遊心商山夏木隂寂寂好處裵􅏆駐飛錫忽思争道畫平沙獨笑無言心有適藹藹京城在九天貴遊豪士足華筵此時一行出人意賭取聲名不要錢贈别約師并引荆州人文約市井生而雲鶴性故去葷為浮圖生寤而證入與南抵六祖始生之墟得遺教甚悉今年訪余于連州且曰貧道昔浮湘川㑹柳儀曹謫零陵宅于佛寺幸聫棟而居者有年繇是時人大士得落耳界夫聞為見因今日之來曩時之因耳時儀曹牧柳州與八句贈别師逢吴興守相伴住禪扄春雨同栽樹秋鐙對講經廬山曽結社桂水逺揚舲話舊還惆悵天南望柳星送鴻舉師江南并引始余謫朗州爾時是師振麻衣斐然而前持文篇以為僧贄唧唧而清如蟲吟秋自然之響無有假合有足佳者故為賦二章以聲之距今年遇于建平赤􅀈益蕃文思益深而内外學益富既訊已探裓中出前所與詩閱之紙勞墨瘁與我同來因思夫苒苒之光渾渾之輪時而言有初中後之分日而言有今昨明之稱身而言有幼壯艾之期乃至一謦欬一彈指中際皆具何必求三生以異身邪然而視余之文昔與今有莛楹之别視余之書昔與今有鈞石之懸視余之仕昔與今乃唯阿之差耳豈有工拙之數存乎其間哉葢可勉而進者與日月而至矣彼儻來外物雖日月無能至焉是嵗師告余遊江西復為賦七言以為遊地爾禪客學禪兼學文出山初似無心雲從風巻舒來處處繚繞巴山不得去山州古寺好閒居讀盡龍王宫裏書使君灘頭揀石硯白帝城邊尋野蔬忽然登髙心瞥起又欲浮桮信流水烟波浩淼魚鳥情東去三千三百里荆門硤㫁無盤渦湘平漢濶清光多廬山霧開見瀑布江西月浄聞漁歌鍾陵八部多名守半是西方社中友與師相見便談空想得髙齋獅子吼送霄韻上人遊天台曲江僧向松江見又道天台看石橋鶴戀故巢雲戀岫比君猶自不逍遙送義舟師卻還黔南并引黔之鄉在秦楚為争地近世人多過言其幽荒以談笑聞者又從而張皇之猶夫束蕰逐原燎或近乎語妖適有沙門義舟道黔江而來能畫地為山川及條其風俗纎悉可信且曰貧道以一錫遊它方衆矣至黔而不知其逺始遇前節使而聞今節使益賢而文故其佐多才士摩圍之下曳裾秉筆彬然與園同風蕃僧以外學嗜篇章時或攝衣為末至客其來也約王人乗秋風而還今乞詞以颺之如捧意珠行住坐卧知相好耳余曰唯命筆為七言以應之黔江秋水浸雲霓獨泛慈航路不迷猿狖窺齋林葉動蛟龍聞呪浪花低如蓮半偈心常悟問菊新詩手自攜常説摩圍似靈鷲卻將山屐上丹梯送景𤣥師東歸并引廬山僧景𤣥袖詩一軸來謁往往有句輕而遒如鶴雛襹䙕未有六翮而步舒視逺戞然一唳乃非泥滓間物獻詩已斂裓而辭且曰其來也與故山秋為期夫丐者僧事也今無它請唯文是求故賦一篇以代瓔珞耳東林寺裏一沙彌心愛當時才子詩山下偶隨流水出秋來卻赴白雲期灘頭躡屐挑沙菜路上停舟讀古碑想到舊房抛錫杖小松應有過檐枝送元曉上人歸稽亭重疊稽亭路山僧歸獨行逺峯斜日影本寺舊鐘聲徒侣問新事烟雲含别情應誇乞食處蹋遍鳯凰城送惟良上人并引以貌窺天者曰乾然健單于然而髙以數迎天者曰其用四}
