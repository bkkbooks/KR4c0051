  - {type: variant, offset: 3751, length: 1, content: 卷, WYG: 紀釋子工為詩尚矣休上人賦别怨約法師哭范尚書咸為當時才士之所傾歎厥後比比有之上人生於會稽本湯氏子聰察嗜學不肯為凡夫因辭父兄出家號靈澈字源澄雖受經論一心好篇章從越客嚴維學為詩遂籍籍有聞去聲維卒乃抵吳興與長老詩僧皎然游講藝益至皎然以書薦于詞人包侍郎佶包得之大喜又以書致于李侍郎紓是時以文章風韻主盟於世者曰包李以是上人之名由二公而颺如雲得風柯葉張王以文章接才子以襌理説髙人風儀甚雅談笑多味貞元中西遊京師名振輦下緇流疾之造飛語激動中貴人因侵誣得罪徙汀州㑹赦歸東越時吳楚間諸侯多賔禮招延之元和十一年終於宣州開元寺七十有一門人遷之建塔於越之山隂天柱峯之陲從本教也初上人在吳興居何山與晝公為侣皎然字晝時以字行時予方以兩髦執筆硯陪其吟詠皆曰孺子可教後相遇于京洛與支許之契焉上人没後十七年予為吳郡其門人秀峯捧先師之文來乞詞以志且曰師嘗在吳賦詩僅二千首今刪取三百篇勒為十巻自大歴至元和凡五十年間接詞客聞人酬唱别為十巻今也思行乎昭世求一言羽翼之因為評曰世之言詩僧多出江左靈一導其源䕶國襲之清江揚其波法振沿之如么弦孤韻瞥入人耳非大樂之音獨吳興晝公能備衆體晝公後澈公承之至如芙蓉園新寺詩云經來白馬寺僧到赤烏年謫汀州云青蠅為吊客黄耳寄家書可謂入作者閫域豈獨雄於詩僧間邪劉賔客文集巻十九欽定四庫全書劉賔客文集巻二十唐劉禹錫撰傷我馬詞馬龍類葢健而善馳君子之所宜求為嘼也故法求於力或逸而喜駭法求於和或乾而易仆由徳稱者鮮焉曩予知善馬之難遭也不求于肆而于其鄉一旦果得隂山之阿蠖畧其形蕭蕭其鳴長顧逺視順而能力顧其軀非騫然而偉也雖士得以乘之始予被皂衣于朝朝之人多四三其牡以迭馭予無兼焉水轍之淋灕淖途之汪洋結為确犖融為坳堂前有僨輈後有濡裳我䇿垂空我鑣方揚振鬛軒昻矯如飛翔翹翹其雄也非力而何烈火之具舉鈎膺之疊舞一蹊千趾駢比齟齬㢁者斯擠悍者斯怒我鞍如山我轡如組弭毛容與宛若孤處靡靡其柔也非彗而何前日予之獲譴于闕下背商顔趣昭丘日中而踰舍修門之南非騎所宜夷則沮洳髙則􅋂巘虎咆空林䰥鬭荒馗風雨孤征簡書之威俾予弗顛我馬焉依屑屑其勞也非徳而何予至武陵居沅水傍或踰月未嘗跨焉以故莫得伸其所長跼蹐顧望兮頓其鎖韁飲齕日削兮精耗神傷寒櫪騷騷兮瘁毛蒼涼路間躞蹀兮逸氣騰驤朔雲深兮邉草逺意欲往兮聲不揚隤然似不得其所而死故其嗟也兼常初𤣥宗羈大宛而盡有名馬命典牧以時起居洎西幸蜀徃徃民間得其種而蕃焉故良毛色者率非中土類也稽是毛物豈祖於宛歟漢之歌曰龍為友武陵有水曰龍泉遂歸骨于是川且弔之曰生于磧礰善馳走萬里南來困丘阜青菰寒菽非適口病聞北風猶舉首金臺已平骨空朽投之龍淵從爾友口兵戒余讀䝉莊書曰兵莫慘於志莫邪為下缺然知志士之傷夫生也它日讀逺祖中壘校尉書曰口者兵也䀌然知言之為兵又慘乎志因博考前載極其兩端夫志兵之薄人激烈抗憤不過無從容於世耳口兵之起其刑渥焉繇是知吾祖之言為急作戒以書于盤盂五刃之傷藥之可平一言成痾智不能明人或罹兵道塗奔救投方效技思恐其後人或罹譖比肩狐疑借有解紛毁輒隨之故曰舌端之孽慘乎楚鐵夷竈誠謀執戈以驅掩人誠智折笄以詈賢者誨子信其有㫖發言之難伸舌猶爾辯為詐媒黙為徳基玉櫝不啟焉能瑕疵犫麋深居孰謂可嗤戒哉我口之啟爾心之門無為我兵當為我藩以慎為鍵以忍為閽可以多食勿以多言猶子蔚適越戒猶子蔚晨跪于席端曰臣㓜承叔父訓始句萌至于扶疎前日不自意有司以名汚賢能書又不自意被丞相府召為從事重兢累媿懼貽叔父羞今當行乞辭以為戒余曰若知彛器乎始乎斵輪因入規矩刳中亷外枵然而有容者理膩質堅然後加密石焉風戾日晞不副不聱五交反然後青黄之鳥獸之飾乎瑤金貴在清廟其用也羃以養潔其藏也櫝以養光茍措非其所一有毫髮之傷儡然與破甑為伍矣汝之始成人猶器之作朴是宜力學為礱斵親賢為青黄睦僚友為瑤金忠所奉為清廟盡敬以為羃慎微以為櫝去怠以䕶傷在勤而行之耳設有人思被重霄而挹顥氣病無階而升有力者揭層梯而倚泰山然而一舉足而一髙非獨揭梯者所能也凡大位未嘗曠故世多貴人唯天爵并者乃可偉耳夫偉人之一顧踰乎華章而一非亦慘乎黥刖行矣慎諸吾見垂天之雲在爾肩腋間矣昔吾友栁儀曹嘗謂吾文雋而膏味無窮而炙愈出也遲汝到丞相府居一二日褏吾文入謁以取質焉丞相吾友也汝事所從如事諸父借有不如意推起敬之心以奉焉無忽觀博客有以博戲自任者速余觀焉初主人執握槊之器寘于廡下曰主進者要約之既揖讓即次有博齒二異乎古之齒其制用骨觚稜四均鏤以朱墨耦而合數取應期月視其轉止依以争道是制也通行之久矣莫詳所祖以其用必投擲故以博投詔之是日客抵骨于局且祝之曰其來如趨其去如脱事先趦趄命中無蹉跌無從彼呼無戾我恒分曹遒迫自朝至于日中稷稷􅉴也穀梁而率與所祝異焉客視骨如有情焉如或馮焉悉詈之不泄又從而齕齧蹂躪之莫顧其十目之咍讓也乃曰非予術之不工是朽骼者不予畀也請刷恥于奕棊主人促命燭以續之騖神黙計巧竭智匱主進者書勝負之數于牘視其所喪又倍前籍焉觀者曰以夫人之褊心亦將詬棊而抵枰矣既乃恬而不恤報然有失鵠求身之色人咸異之子劉子曰先人者制人博投是已從人制於人枯棊是巳二者豈有數存乎其間哉但處之勢異耳是知當局者易生嫌而退身者易為譽易生之嫌不足貶也易為之譽不足多也在辯其所處而巳觀市由命士已上不入於市周禮有焉乃今觀之葢有因也元和二年沅南不雨自季春至于六月毛澤將盡郡守有志于民誠信而雩遂徧山川方社又不雨遂遷市于城門之逵余得自麗譙而俯焉肇下令之日布市籍者咸至夾軌道而分次焉其左右前後班間錯跱如在闤之制其列題區榜揭價名物參外夷之貨馬牛有縴私屬有閒在巾笥者織文及素焉在几閤者彫彤及質焉在筐筥者白黒巨細焉業于􅛰者列􅛰饎陳䴵餌而苾然業于酒者舉酒旗滌桮盂而澤然鼓刀之人設膏俎解豕羊而赫然華實之毛畋漁之生交蜚走錯水陸羣狀夥名入隧而分韞藏而待價者負挈而求沽者乘射其時者竒贏以遊者坐賈顒顒行賈遑遑利心中驚貪目不瞬於是質劑之曹較固之倫合彼此而騰躍之冒良苦之巧言斁量衡於險手杪忽之差鼓舌傖儜詆欺相髙詭態横出鼓囂譁坌烟埃奮羶腥疊巾屨囓而合之異致同歸雞鳴而争赴日中而駢闐萬足一心恐人我先交易而退陽光西徂幅員既移徑衢如初中無人焉隙地虛如雞犬鳥烏樂得腐餘是日倚衡而閲之三感其盈虚之相尋也速故著于篇云論書或問曰書足以記姓名而已工與拙何損益於數哉荅曰此誠有之葢舉下之説爾非蹈中之説亦猶言居室曰避燥濕而已言衣裳曰適寒燠而巳言飲食曰充腹而巳言車馬曰代勞而巳言禄位曰代耕而巳今夫考居室必以閌門豐屋為美笥衣裳必以文章遒澤為甲評飲食必以精良海陸為貴第車馬必以華輈絶足為髙干禄位必以重侯累封為意是數者皆不行舉下之説奚獨於書也行之邪禮曰士依於徳游於藝徳者何曰至曰敏曰孝之謂藝者何禮樂射御書數之謂是則藝居三徳之後而士必游之也書居數之上而六藝之一也語曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已是則博奕不得列於藝差愈於飽食無所用心耳吾觀今之人適有面詆之曰子書居下品矣其人必逌爾而笑或謷然不屑詆之曰子握槊奕棊居下品矣其人必赧然而媿或艴然而色是故敢以六藝斥人不敢以六博斥人嗟乎衆尚之移人也問者曰然則彼魏晉宋齊間亦嘗尚斯藝矣至有君臣争名父子不讓何哉荅曰吾始欲求中道耳子寜以尚之之弊規我歟且夫信者美徳也秦繆尚之而賢臣莫贖黄老者至道也竇后尚之而儒臣見刑道徳且不可尚矧由道徳以下者哉所謂中道而言書者何處之文學之下六博之上材鈞而善者得以加譽遇一作過鈞而善者得以議能所加在乎譽非實也不黷于賞所議在乎過非實也不紊于刑夫如是庶乎六書之學不堙墜而巳乎劉氏集畧説子劉子曰五達之井百汲而盈科未必涼而甘所處之勢然也人之詞待扣而揚猶井之利汲耳始余為童兒居江湖間喜與屬詞者游謬以為可教視長者所行止必操觚從之及冠舉秀才一幸而中説有司懼不厭於衆亟以口譽之長安中多循空言以為誠果有名字益與曹輩畋漁于書林宵語途話琴酒調謔一出於文章俄被召為記室參軍㑹出師淮上恒磨墨於楯鼻或寢止羣書中居一二嵗由甸服升諸朝凡三進班而所掌猶外府或官課或為人所倩昌言奏記移讓告諭奠神志葬咸猥并焉及謫于沅湘間為江山風物之所蕩徃徃指事成歌詩或讀書有所感輒立評議窮愁著書古儒者之大同非髙冠長劒之比耳前年䝉恩澤授以郡符居海壖多雨慝作適晴喜躬曬書于庭得已書四十通逌爾自哂曰道不加益焉用是空文為真可供醤䝉藥楮耳它日子壻博陵崔生闗言曰某也曏游京師偉人多問丈人新書幾何且欲取去而某應曰無有輒媿起於顔間今當復西期有以弭媿者繇是刪取四之一為集畧以貽此郎非敢行乎逺也名子説魏司空王昶名子制誼咸得立身之要前史是之然則書紳銘器孰若發言必稱之乎今余名爾長子曰咸允字信臣次曰同廙字敬臣欲爾於人無賢愚於事無小大咸推以信同施以敬俾物從而衆説其庶幾乎夫忠孝之於人如食與衣不可斯須離也豈俟余朂哉仁義道徳非訓所及可勉而企者故存乎名夫朋友字之非吾職也顧名㫖所在遂從而釋之孝始於親終於事君偕曰臣知終也奏記丞相府論學事十一月七日使持節都督䕫州諸軍事䕫州刺史劉某謹奏記相公閤下凡今能言者皆謂天下少士而不知養材之道鬱堙而不揚非天不生材也亦猶不耕者不歎廩庾之無餘非地不産百穀也伏以貞觀中増築學舍千二百區生徒三千餘人時外夷上疏請遣子弟入附于三雝者五國雖菁菁者莪育材之道不足比也今之膠庠不聞弦歌而室廬圯廢生徒衰少非學官不欲振學也病無貲財以給其用鯫生今有一見使大學立富幸遇相公在位可以索言之禮云凡學官春釋奠于其先師斯禮止于辟廱頖宫非及天下也今四海郡縣咸以春秋上丁有事孔子廟其禮不應於古且非孔子意也炎漢初定羣臣皆起屠販為公卿故孝惠髙后之間置原廟於郡國逮孝元時韋𤣥成以碩儒為丞相遂建議罷之夫以子孫尚不敢違禮以饗其祖況後學師先聖之道而首違之乎祭義曰祭不欲數語云祭神如神在與其煩於舊饗孰若行其教道今夫子之教日頽靡而以非禮之祀媚之斯儒者所宜憤悱也竊觀歴代無有是事皇家武徳二年詔於國學立周公孔子廟四時致祭貞觀十一年又詔修宣尼廟於兖州至二十年許敬宗等奏乃遣天下諸州縣置三獻官其他如方社敬宗非通儒不能稽典禮開元中𤣥宗饗學與儒臣議繇是發徳音其罷郡縣釋奠牲牢唯酒脯以薦後數年定令時王孫林甫為宰相不涉學委御史中丞王敬從刋之敬從非文儒遂以明衣牲牢編在學令是首失於敬宗而終失於林甫習以為常罕有敢非之者謹按本州四縣一嵗釋奠物之直緍錢十六萬有竒舉天下之郡縣當千七百不啻羈縻者不在數中凡嵗中所出於經費過四千萬適資三獻官飾衣裳飴妻子而巳於尚學之道無有補焉前日詔書許列郡守臣得以上言便事今謹條奏某乞下禮官博士詳議典制罷天下縣邑牲牢衣幣如有生徒春秋依開元敕㫖用酒醴腶修腒䐹榛栗示敬其事而州府許如故儀然後籍其資半附益所𨽻州使増學校其半率歸國庠猶不下萬計築學室具器用豐篹食増掌故以備使令凡儒官各加稍食其紙筆鉛黄視所出州率令折入學徒既備明經日課繕書若干紙進士命讐校亦如之則貞觀之風粲然不殊其它郡國皆立程督投紱懐璽棫樸華華良可詠矣伏惟相公發迹咸自諸生其尊素王之道儀刑四方宜在今日是以小生敢沿故事以奏記于左右姑舉其大較至於證據纎悉條奏具之章下之日乞留神省察不勝大願惶恐拜手稽首澤宫詩澤宫送士嵗貢也晉昌唐如晦以信誼為良弓文學為菆矢規爵禄猶衆禽密彀持滿遡風蜚繳者數矣有措桮之妙而無雙鶬之獲韔弓收視歸究其術繇是跡愈屈而名愈聞君子益多之彼不由其術一幸而中者雖懸貊在廷君子未嘗多也嵗殫矣告予以西余為賦澤宫一章庶見子之弓弗再張也已秩秩澤宫有的維鵠祁祁庶士于以干禄彼鵠斯微若止若翔千里之差起于毫芒我矢既直我弓既良依于髙墉因我不臧髙墉伊何維器與時視之以心誰謂鵠微魏生兵要述余為書殿學士四年所與居皆鴻生彦士一旦詔下懐吳郡章而東門下生咸惜是行且曰吳中富士必有知書宜為太守所禮者及下車閲客籍森然三千有鉅鹿魏生持所著書來謁曰不佞始讀書為文章凡二十年在貢士中孤鳴甚哀卒無善聴者退而收視易慮伏北窻下考前言成兵要十編度諸侯未遑是事將笈而西求一言以生羽翼予取書觀之始自皇帝伏蚩尤至于隋氏平江南語春秋戰國事最備磅礴下上數千年間其攟摭評議無遺䇿用是以干握兵符貴人宜有虛巳而樂聞者子盍行乎吾知元侯上舍不獨善鷄鳴彈長鋏三五九九之伎顓之而已救沈志貞元季年夏大水熊武五溪鬬決于沅突舊防毁民家躋髙望之溟涬葩華山腹為坻林端如莎湍道駛悍不風而怒崱嶷前邁浸淫旁掩柔者靡之固者脱之規者旋環之矩者倒顛之輕而泛浮者硠􅐀之重而髙大者前卻之生者力音殪者弛形蔽流而東若木柹然有僧愀焉誓於路曰浮圖之慈悲救生最大能援彼於溺我當為魁里中兒願從三四輩皆狎川勇游者相與乘堅舟挾善器維以修䋏杙于崇丘水當洄洑人易寘力凝矑執用俟可而拯大凡室處之類穴居之彚在牧之羣在豢之馴上羅黔首下逮毛物投乎洪瀾致諸生地者數十百焉適有摯獸如鴟夷而前攫持流枿首用不陷隅目傍睨其姿弭然甚如六擾之附人者其徒將取焉僧趣音促訶之曰第無濟是為目之可里所而不能有所持矣舟中之人曰吾聞浮圖之數貴空空生普普生慈不求報施之謂空不擇善惡之謂普不逆困窮之謂慈曏也生必救而今也窮見廢無乃計善惡而忘普與慈乎僧曰甚矣問之迷且妄也吾之教惡乎無善惡哉六塵者在身之不善也佛以賊視之末伽聲聞者在彼之未寤也佛以邪目之惡乎無善惡邪吾曏也所援而出死地者衆矣形乾氣還各復本狀蹄者躑躅然羽者翹蕭然而言者諓諓然隨其所之吾不尸其施也不徳吾則已烏能害為彼形之乾髤髵之姿也彼氣之還暴悖之用也心足反噬而齒甘最靈是必肉吾屬矣庸能躑躅諓諓之比歟夫虎之不可使知恩猶人之不可使為虎也非吾自遺患焉爾且將貽患于衆多吾罪大矣子劉子曰余聞善人在患不救不祥惡人在位不去亦不祥僧之言逺矣故志之劉賔客文集巻二十欽定四庫全書劉賓客文集巻二十一唐劉禹錫撰雜興三十一首學阮公體三首少年負志氣信道不從時只言繩自直安知室可欺百勝難慮敵三折乃良醫人生不失意焉能慕已知朔風悲老驥秋霜動鷙禽出門有逺道平野多層陰滅没馳絶塞振迅拂華林不因感衰節安能激壯心昔賢多使氣憂國不謀身目覽千載事心交上古人侯門有仁義靈臺多苦辛不學腰如磬徒使甑生塵偶作二首終朝對尊酒嗜興非嗜甘終日偶衆人縱言不縱談世情閒盡見藥性病多諳寄謝嵇中散予無甚不堪萬巻堆牀書學者識其真萬里長江水征夫度要津養生非但藥悟佛不因人燕石何須辯逢時即至珍古調二首一作諷古軒后初冠冕前旒為蔽明安知從複道然後見人情簿領乃俗士清談信古風吾觀蘇令綽朱墨一何工寓興二首常談即至理安事非常情寄語何平叔無為輕老生世途多禮數鵬鷃各逍遥何事陶彭澤抛官為折腰昏鏡詞并引鏡之工列十鏡于賈區發奩而視其一皎如其九霧如或曰良苦之不侔甚矣工解頥謝曰非不能盡良也蓋賈之意唯售是念今來市者必厯鑒周睞求與已宜彼皎者不能隠芒杪之瑕非美容不合是用什一其數也予感之作昏鏡詞昏鏡非美金漠然䘮其晶陋容多自欺謂若他鏡明瑕疵既不見妍態隨意生一日四五照自言美傾城飾帯以紋繡装匣以瓊瑛秦宫豈不重非適乃為輕養鷙詞幷引途逢少年志在逐獸方呼鷹隼以襲飛走因縱觀之卒無所獲行人有常從事於斯者曰夫鷙禽饑則為用今哺之過篤故然也予感之作養鷙詞養鷙非玩形所資撃鮮力少年昧其理日夜哺不息探雛網黄口旦莫有餘食寧知下韝時翅重飛不得毰毸止林表狡兔自南北飲啄既巳盈安能勞羽翼武夫詞并引有武夫過詫余以從軍之樂翌日質于通武之善經者則曰果有樂也夫威恣而賞勞則樂用威雄而賞虣則樂横去聲顧其樂安出耳予惕然作是詞武夫何洸洸衣紫襲絳裳借問胡為爾列校在鷹揚依倚將軍勢交結少年場探丸害公吏袖刃妬名倡家産既不事顧眄自生光酣歌髙樓上袒裼大道旁昔為編戸人秉耒甘哺穅今來從軍樂躍馬飫膏粱猶思風塵起無種取侯王賈客詞五方之賈以財相雄而鹽賈尤熾或曰賈雄則農傷予感之作是詞賈客無定遊所遊唯利并眩俗雜良苦乗時取重輕心計析秋毫捶鉤侔懸衡錐刀既無棄轉化日巳盈徼福禱波神施財遊化城妻約雕金釧女垂貫珠纓髙貲比封君奇貨通倖卿趨時鷙鳥思藏鏹盤龍形大艑浮通川髙樓次旗亭行止皆有樂闗梁自無征農夫何為者辛苦事寒耕調瑟詞并引里有富豪翁厚自奉養而嚴督臧獲力屈形削然猶役之無蓺極一旦不堪命亡者過半追亡者亦不來復翁顇沮而追昨非之莫及也予感之作調瑟詞調瑟在張弦弦平音自足朱絲二十五闕一不成曲美人愛髙張瑶軫再三促上弦雖獨響下應不相屬日莫聲未和寂寥一枯木却顧膝上弦流淚難相續讀張曲江集作并引世稱張曲江為相建言放臣不宜與善地多徙五溪不毛之鄉及今讀其文自内職牧始安有瘴癘之歎自退相守荆門有拘囚之思託諷禽鳥寄詞草樹鬱然與騷人同風嗟夫身出於遐陬一失意而不能堪矧華人士族而必致醜地然後快意哉議者以曲江為良臣識禄山有反相羞凡器與同列宻啟廷争雖古哲人不及而燕翼無似終為餒魂豈忮心失恕隂謫最大雖二美莫贖邪不然何袁公一言明楚獄而鍾祉四葉以是相較神可誣乎予讀其文因為詩以弔聖言貴忠恕至道重觀身法在何所恨色傷斯為仁良時難久恃隂謫豈無因寂寞韶陽廟魂歸不見人庭梅詠寄人蚤花常犯寒繁實常苦酸何事上春日坐令芳意䦨夭桃定相笑遊妓肯囘看君問調金鼎方知正味難詠古二首有所寄車音想轔轔不見綦下塵可憐平陽第歌舞嬌青春金屋容色在文園詞賦新一朝復得倖應知失意人寂寂照鏡臺遺基古南陽真人昔來遊翠鳯相隨翔目成在桑野志遂貯椒房豈無三千女初心不可忘詠史二首驃騎非無勢少卿終不去世道劇頽波我心如砥柱賈生明王道衛綰工車戲同遇漢文時何人居貴位苦雨行悠悠飛走情同樂在陽和嵗中三百日常恐風雨多天人信遐逺時節易蹉跎洞房有明燭無乃酣且歌萋兮吟天涯浮雲生争蔽日月光窮巷秋風起先摧蘭蕙芳萬貨列旗亭恣心注明璫名髙毁所集言巧智難防勿謂行大道斯須成太行莫吟萋兮什徒使君子傷經檀道濟故壘萬里長城壊荒營野草秋秣陵多士女猶唱白符鳩史云當時人歌曰可憐白符鳩枉殺檀江州題敧器圖秦國功成思税駕晉臣名遂歎危機無因上蔡牽黄犬願作丹徒一布衣聚蚊謠沈沈夏夜蘭堂開飛蚊伺暗聲如雷嘈然欻起初駭聴殷殷若自南山來喧騰鼓舞喜昏黒昧者不分聰者惑露花滴瀝月上天利嘴迎人著不得我軀七尺爾如芒我孤爾衆能我傷天生有時不可遏為爾設幄潛匡牀清商一來秋日曉羞爾㣲形飼丹鳥百舌吟曉星寥落春雲低初聞百舌間闗啼花樹滿空迷處所揺動繁英墜紅雨笙簧百囀音韻多黄鸝吞聲燕無語東方朝日遲遲升迎風弄景如自矜數聲不盡又飛去何許相逢緑楊路緜蠻宛轉似娱人一心百舌何紛紛酡顔俠少停歌聴墜珥妖姬和睡聞可憐光景何時盡誰能低囘避鷹隼廷尉張羅自不闗潘郎挾彈無情損天生羽族爾何微舌端萬變乗春輝南方朱鳥一朝見索漠無言蒿下飛飛鳶操鳶飛杳杳青雲裏鳶鳴蕭蕭風四起旗尾飄揚勢漸髙箭頭砉劃聲相似長空悠悠霽日懸六翮不動凝飛烟遊鶤朔鴈出其下慶雲清景相囘旋忽聞饑烏一噪聚瞥下雲中争腐鼠騰音礪吻相喧呼仰天大嚇疑鴛雛畏人避犬投髙處俛吻無聲猶屢顧青鳥自愛玉山禾仙禽徒貴華亭露檏樕危巢向莫時毰毸飽腹蹲枯枝遊童挾彈一麾肘臆碎羽分人不悲天生衆禽各有類威鳯文章在仁義鷹隼儀形螻蟻心雖能戾天何足貴秋螢引漢陵秦苑遥蒼蒼陳根腐葉秋螢光夜空寂寥金氣浄千門九陌飛悠揚紛綸暉映互明滅金鑪星噴鐙花發露華洗濯清風吹攢昂不定招揺垂髙麗罘罳照珠網斜厯璇題舞羅幌暴衣樓上拂香帬承露臺前轉仙掌槐市諸生夜對書北䆫分明辯魯魚行子東山起征思中郎騎省悲秋氣銅雀人歸自入簾長門帳開來照淚誰言向晦常自明童兒走步嬌女争天生有光非自􅃷逺近低昻暗中見撮蚊祅鳥亦夜飛翅如車輪人不見華山謌洪鑪作髙山元氣鼔其槖俄然神功就峻㧞在寥廓靈蹤露指爪殺氣見稜角凡木不敢生神仙聿來託天資帝王宅以我為闗鑰能令下國人一見換神骨髙山固無限如此方為嶽丈夫無特達雖貴猶碌碌摩鏡篇流塵翳明鏡嵗久看如漆門前負局生為我一摩拂苹開綠池滿暈盡金波溢白日照空心圓光走幽室山神祅氣沮野魅真形出却思未摩時瓦礫來唐突有獺吟有獺得嘉魚自謂天見憐先祭不敢食捧鱗望清𤣥人立寒沙上心專脰著肩漁翁以為妖舉塊投其前呼兒貫魚歸與獺同烹煎闗闗黄金鶚大翅搖江煙下見盈尋魚投身擘洪漣攫拏隠鱗去哺雛林岳巔鴟烏欲伺隙遙噪莫敢前長居青雲路彈射無由縁何地無江湖何水無鮪鱣天意不宰割菲祭徒䖍䖍空餘知禮重載在淹中篇劉賔客文集巻二十一欽定四庫全書劉賔客文集巻二十二唐劉禹錫撰五言今體三十首春日退朝紫陌夜來雨南山朝下看㦸枝迎日動閣影助松寒瑞氣巻綃縠遊光泛波瀾御溝新栁色處處拂歸鞍經東都安國觀九仙公主舊院作仙院御溝東今來事不同門開青草日樓閉緑楊風將犬昇天路披霓赴月宫武皇曽駐驆親問主人翁蜀先主廟漢末謡黄牛白腹五銖當復天下英雄氣千秋尚凛然勢分三足鼎業復五銖錢得相能開國生兒不象賢淒涼蜀故妓來舞魏宫前觀八陣圖軒皇傳上畧蜀相運神機水落龍蛇出沙平鵝鸛飛波濤無動勢鱗介避餘威㑹有知兵者臨流指是非八月十五日夜玩月天將今夜月一遍洗寰瀛暑退九霄浄秋澄萬景清星辰讓光彩風露發晶英能變人間世翛然是玉京許給事見示哭工部劉尚書詩因命同作漢室賢王後從叔望在河間孔門髙第人濟時成國器樂道任天真特達圭無玷堅貞竹有筠總戎寛得衆市義貴能貧護塞無南牧馳心拱北辰乞身來闕下賜告卧漳濵榮耀初題劒清羸已拕紳宫星徒列位隙日不囘輪自昔追飛侣今為侍從臣素弦哀已絶青簡歎猶新未遂揮金樂空悲撤瑟晨淒涼竹林下無復見清塵從叔自渭北節度以疾歸朝比及拜尚書竟不克中謝奉和中書崔舎人八月十五日夜玩月二十韻莫景中秋爽隂靈既望圓騰精浮碧海分照接虞淵逈見孤輪出髙從倚蓋旋二儀含皎澈萬象共澄鮮整御當西陸舒光麗上𤣥從星變風雨順日助陶甄逺近同時望晶熒此夜偏運行調玉燭潔白應金天曲沼疑瑶鏡通衢若象筵逢人盡冰雪遇境即神仙引素吞銀漢凝清洗綠烟臯禽警露下鄰杵思風前水是還珠浦山成種玉田劒沈三尺影鐙罷九枝然象外行無迹寰中影有遷稍當雲闕正未映斗城懸静對揮宸翰閑臨襞彩牋境同牛渚上宿在鳯池邊興掩尋安道詞勝命仲宣從今紙貴後不復詠陳篇奉和淮南李相公蚤秋即事寄成都武相公八柱共承天東西别隠然逺夷争慕化真相故臨邊並進䕫龍位仍齊龜鶴年相公詩有齊年並進之句也同心舟已濟造膝璧常聨對領專征寄遙持造物權斗牛添氣色井絡静氛􅃄獻可通三畧分甘出萬錢漢南趨節制趙北賜山川玉帳觀渝舞虹旌獵楚田步嫌雙綬重夢入九城偏秋與離情動詩從樂府傳聆音還竊抃不覺撫么弦李中書自揚州見示詩本因命仰和元和癸巳嵗仲秋詔發江陵偏師問罪蠻徼後命宣慰釋兵歸降凱旋之辰率爾成詠寄荆南嚴司空蠻水阻朝宗兵符下渚宫前籌得上策無戰巳成功漢使星飛入夷心草偃同歡謠開竹棧拜舞擲桑弓就日知冰釋投人念鳥窮網羅三面解章奏九門通卉服聨操袂雕題盡鞠躬降幡秋練白驛騎晝塵紅火號休傳警機橋罷亘空登山不見虜振斾自生風江逺烟波静軍囘氣色雄佇看聞喜後金石賜元戎武陵書懷五十韻并引按天官書武陵當翼軫之分其在春秋及戰國時皆楚地後為秦惠王所并置黔中郡漢興更名曰武陵東徙于今治所常林義陵記云初項籍殺義帝于郴武陵人曰天下憐楚而興今吾王何罪乃見殺郡民縞素哭于招屈亭髙祖聞而義之故亦曰義陵今郡城東南亭舎其所也晉宋齊梁間皆以分王子弟事存于其書永貞元年余始以尚書外郎出補連山守道貶為是郡司馬至則以方志所載而質諸其人民顧山川風物皆騷人所賦乃具所聞見而成是詩因自述其出處之所以然故用書懷為目云西漢開支郡南朝號戚藩四封當列宿百雉俯清沅髙岸朝霞合驚湍激箭奔積隂春暗度將霽霧先昏俗尚東皇祀謡傳義帝寃桃花迷隠迹棟葉慰忠魂戸筭資漁獵鄉豪恃子孫照山畬火動蹋月俚歌喧擁檝舟為市連甍竹覆軒披沙金粟見拾羽翠翹飜茗折滄溪秀蘋生枉渚暄滄溪茶為邑人所重枉渚近在郭東禽驚格磔起魚戲噞喁繁按本草經曰鷓鴣聲如鈎輈格磔者是也沈約臺榭故李衡墟落存隠侯臺木奴洲並在湘靈悲鼔瑟泉客泣酬㤙露變蒹葭浦星懸橘柚村虎咆空野震鼉作滿川渾隣里皆遷客兒童習左言炎天無洌井霜月見芳蓀清白家傳遺詩書志所敦列科叨甲乙從宦出丘樊結友心多契馳聲氣尚吞士安曽重賦元禮許登門草檄嫖姚幕廵兵戊巳屯築臺先自隗送客獨留髠遂結王畿綬來觀衢室尊鳶飛入鷹隼魚目􅓻璵璠曉燭羅馳道朝陽闢帝閽王正㑹夷夏月朔盛旗幡獨立當瑤闕傳訶步紫垣按章清犴獄視祭潔蘋蘩御厯昌期逺傳家寳祚蕃繇文光夏啟神教畏軒轅内禪因天性膺圖授化元繼明懸日月出震統乾坤大孝三朝備洪㤙九族惇百川宗渤澥五岳輔崑崙何幸逢休運㣲班識至尊校緍資筦𣙜復土奉山園時以本官判度支鹽鐵等兼崇陵使判官一失貴人意徒聞大學論直廬辭錦帳逺守愧朱轓巢幕方猶燕搶榆尚笑鯤邅囘過荆郢流落感涼温旅望花無色愁心醉不惛春江千里草莫雨一聲猿問卜安㝠數㸔方理病源帶賖衣改製塵澀劒成痕三秀悲中散二毛傷虎賁來憂禦魑魅歸願牧雞豚就日秦京逺臨風楚奏煩南登無㶚岸旦夕上髙原經伏波神祠蒙蒙篁竹下有路上壺頭漢壘麏鼯鬬蠻溪霧雨愁懷人敬遺像閲世指東流自負霸王畧安知㤙澤侯鄉園辭石柱筋力盡炎洲一以功名累飜思馬少逰聞董評事疾因以書贈董生奉内典繁露傳家學青蓮譯梵書火風乖四大文字廢三餘敧枕晝眠晚折巾秋鬢疎武皇思視草誰許茂陵居贈澧州髙大夫司馬霞寓前年收錦城馬蹋血泥行千里追戎首三軍許勇名殘兵疑鶴唳空壘辨烏聲一誤雲中級南游湘水清宿誠禪師山房題贈二首宴坐白雲端清江直下㸔來人望金刹講席繞香壇虎嘯夜林動鼉鳴秋澗寒衆音徒起滅心在浄中觀不出孤峯上人間四十秋視身如傳舎閲世甚東流法為因縁立心從次第修中宵問真偈有住是吾憂晚泊牛渚蘆葦晚風起秋江鱗甲生殘霞忽改色遊鴈有餘聲戍鼔音響絶漁家鐙火明無人能詠史獨自月中行罷郡歸洛陽閑居十年江外守旦夕有歸心及此西還日空成東武吟花間數琖酒月下一張琴聞説功名事依前惜寸隂城東閑遊借問池臺主多居要路津千金買絶境永日屬閑人竹逕縈紆入花林委曲廵斜陽衆客散空鎻一園春罷郡歸洛陽寄友人逺謫年猶少初歸鬢巳衰門閑故吏去室静老僧期不見蜘蛛集頻為僂句欺穎微囊未出寒甚谷難吹濩落唯心在平生有已知商歌夜深後聴者竟為誰陜川河亭陪韋五大夫雪後眺望因以留别與韋有布衣之舊一别二紀經遷貶而歸雪霽大陽津城池表裏春河流添馬頰原色動龍鱗萬里獨歸客一桮逢故人因髙向西望闗路正飛塵途中蚤發中庭望啓明促促亊晨征寒樹鳥初動霜橋人未行水流白煙起日上彩霞生隠士應髙枕無人問姓名初至長安時自外郡再授郎官左遷凡二紀重見帝城春老大歸朝客平安出嶺人毎行經舊處却想似前身不改南山色其餘事事新大和戊申嵗大有年詔賜百寮出城觀秋稼謹書盛事以俟采詩者長安銅雀鳴秋稼與雲平玉燭調寒暑金風報順成川原呈上瑞㤙澤賜閑行欲及重城掩猶聞歌吹聲蚤秋集賢院即事時為學士金數巳三伏火星正西流樹含秋露曉閣倚碧天秋灰琯應新律銅壺添夜籌商飊從朔塞爽氣入神州蕙草香書殿槐花㸃御溝山明真色見水浄濁煙收蚤嵗忝華省再來成白頭幸依羣玉府有路向瀛洲金陵懷古潮滿冶城渚日斜征虜亭蔡洲新草綠幕府舊煙青興廢由人事山川空地形後庭花一曲幽怨不堪聴晝居池上亭獨吟日午樹隂正獨吟池上亭静㸔蜂教誨閑想鶴儀形法酒調神氣清琴入性靈浩然機已息几杖復何銘分司東都䝉襄陽李司徒相公書問因以奉寄蚤忝金馬客晚為商洛翁知名四海内多病一生中舉世徃還盡何人心事同㡬時登峴首恃舊揖三公奉和吏部楊尚書太常李卿二相公䇿免後即事述懷贈答十韻文雅闗西族衣冠趙北都有聲真漢相無纇勝隋珠當軸龍為友臨池鳯不孤九天開内殿百辟看晨趨誡滿澄敧器成功别大鑪餘芳在公論積慶是神扶步武離台席徊翔集帝梧銓材秉秦鏡典樂去齊竽蕭灑風塵外逢迎詩酒徒唯應待華皓更食萬錢厨門下相公榮加冊命天下同歡忝沐眷私輒敢申賀冊命出宸𠂻官儀自古崇特膺平土拜光贊格天功再佩扶陽印常乗鮑氏驄七賢遺老在猶得詠清風病中一二禪客見問因以謝之勞動諸賢者同來問病夫添鑪𢷬雞舌灑水浄龍鬚身是芭蕉喻行須卭竹扶醫王有妙藥能乞一丸無劉賔客文集巻二十二欽定四庫全書劉賔客文集巻二十三唐劉禹錫撰古調十六首登司馬錯故城秦昭王命錯征五溪蠻城在武陵沅江南將軍將秦師西南奠遐服故壘清江上蒼煙晦喬木登臨值蕭辰周覽壯前躅塹平陳葉滿墉髙秋蔓綠廢井抽寒菜毁臺生櫓榖耕人得古器宿雨多遺鏃楚塞鬱重疊蠻溪紛詰曲留此數仞基幾人傷逺目卧病聞常山旋師䇿勲宥過王澤大洽因寄李六侍御寂寂重寂寂病夫卧秋齋夜蟲思幽壁槁葉鳴空階南國異氣候火旻尚昏霾瘴􅃄跕飛羽沴氣傷百骸昨聞凱歌旋飲至酒如淮無戰陋丹水垂仁經藁街清廟既策勲圜丘俟燔柴車書一以混幽逺靡不懷逐客顦顇久故鄉雲雨乖禽魚各有化予欲聞齊諧謁枉山㑹禪師我本山東人平生多感概弱冠遊咸京上書金馬外結交當世賢馳聲溢四塞勉修貴及蚤狃捷不知退錙銖揚芬馨尋尺招瑕纇淹留郢南鄙摧穨羽翰碎安能咎往事且欲去沈痗吾師得真如自在人寰内哀我墮名網有如翾飛輩曈曈掲智炬照使出昏昧静見𤣥闗啓歆然初心㑹夙尚一何微今得信可大覺路明證入便門通懴悔悟理言自㤀處屯道猶泰色身豈吾寳慧性非形礙思此靈山期未來何年載善巻壇下作在柱山上先生見堯心相與去九有斯民既已治我得安林藪道為自然貴名是無窮夀瑤壇在此山識者常囘首武陵觀火詩楚鄉祝融分災火常為虞是時直突􅃄發自晨炊徒盲風扇其威白晝曛陽烏操綆不暇汲循墻寜避踰怒如列缺光迅與棼輪俱聨延掩四達赫奕成洪鑪洶疑雲濤翻颯若鬼神趨當前迎焮赩是物同膏腴金烏入梵天赤龍遊𤣥都騰烟透忩戸飛熖生欒櫨火山摧半空星雨灑中衢瑤壇被髹漆寳樹攅珊瑚花縣與琴焦旗亭無酒濡市人委百貨邑令遺雙鳬餘勢下隈隩長熛烘舳艫吹熒照水府炙浪愁天吴災罷雲日晚心驚視聴殊髙灰辨廪庾黒土連闉闍衆燼合星羅遊氛鑠人膚厚地藏宿熱遙林呈驟枯火徳資生人庸可一日無御之失其道敲石彌天隅晉庫走龍劒吴宫傷燕雛五行有沴氣先哲垂訏謨宋鄭同日起時當賢大夫無苛自可樂弭患非所圗賢守恤人瘼臨􅃄駐驪駒弔傷色慘怛言失詞劬愉下令蠲里布指期輕市租閈垣適未立苫蓋自相娱山木行翦伐江泥宜墐塗魯臣不必葺何用徵越巫崔元受少府自貶所還遺山薑花以詩答之故人博羅尉遺我山薑花彩從碧海上來自謫僊家雲濤潤孤根隂火照晨葩淨揺扶桑日豔對瀛洲霞世人愛芳辛搴擷忘幽遐傳名入帝里飛馹辭天涯王濟本尚味石崇方鬬奢雕盤多不識綺席乃増華驛馬損筋骨貴人滋齒牙顧予藜藿士持此空嘆嗟途中蚤發馬蹋塵上霜月明岡頭路行人朝氣鋭宿鳥相辭去流水隔逺村縵山多紅樹悠悠闗塞内來往無閒步和董庶中古散調詞贈尹果毅昔聴東武吟壯年心已悲如何今濩落聞君辛苦辭言有窮巷士弱齡頗尚奇讀得𤣥女符生當事邊時借名遊俠窟結客幽并兒往來長楸間能帶雙鞬馳崩騰天寳末塵暗燕南垂爟火入咸陽詔徵神武師是時占軍募插羽揚金羈萬夫列轅門觀射中㦸支誓當雪國讐親愛從此辭中宵倚長劒起視蚩尤旗介馬晨蕭蕭陣雲竟天涯隂風獵白草旗槊光參差勇氣貫中腸視身忽如遺曽擒白馬將虜騎不敢追貴臣上戰功名姓隨意移終嵗肌骨苦他人印纍纍謁者既清宫諸侯各罷戲上將賜北第門㦸不可窺眥血下沾襟天髙問無期却尋故鄉路孤影空相隨行逢里中舊檏遫昔所嗤一言合侯王腰佩黄金龜問我何自苦可憐真數奇遲囘顧徒御得色懸雙眉飜然悮世途撫已昧所宜田園已蕪没流浪江海湄鷙禽毛翮摧不見翔雲姿衰容蔽逸氣孑孑無人知寂寞草𤣥徒長吟下書帷為君發哀韻若扣瑶林枝有客識其真潺湲涕交頥勸爾一桮酒陶然足自怡望衡山東南倚蓋卑維嶽資柱石前當祝融居上拂朱鳥翮青冥結精氣磅礴宣地脈還聞膚寸隂能致彌天澤逰桃源一百韻沅江清悠悠連山鬱岑寂囘流抱絶巘皎鏡含虚碧昏旦遞明媚烟嵐紛委積香蔓垂緑潭暴龍照孤磧山下潭名緑蘿磧名暴龍淵明著前志子驥思逺蹠子驥事見陶先生本記寂寂無何鄉宻爾天地隔金行太元嵗漁者偶探頥尋花得幽蹤窺洞穿闇隙依㣲聞雞犬豁達值阡陌居人互將迎笑語如平昔廣樂雖交奏海禽心不懌揮手一來歸故溪無處覔緜緜五百載市朝幾遷革有路在壺中無人知地脈皇家感至道聖祚自天錫金闕傳本枝玉函留寳厯禁山開祕宇復戸潔靈宅詔𨽻二十户免徭以奉􅎈埽藥檢香氛氲醮壇烟羃羃我來塵外躅瑩若朝酲析崖轉對翠屏水窮留畫鷁三休俯喬木千級攀峭壁旭日聞撞鐘綵雲迎躡屐遂登最髙頂縱目還楚澤平湖見草青逺岸連霞赤幽尋如夢想緜思屬空閴寅緣且忘疲耽玩近成癖清猿伺曉發瑤草陵寒坼祥禽舞葱蘢珠樹搖玓瓅羽人顧我笑勸我税歸軛霓衣何飄颻童顔潔白晢重巖是藩屏馴鹿受羈靮樓居邇清霄蘿蔦成翠帟仙翁遺竹杖王母留桃核姹女飛丹沙青童護金液寳氣浮鼎耳神光生劒脊虚無天樂來僁窣鬼兵役丹丘肅朝禮玉扎工紬繹枕中淮南方牀下阜鄉舄明鐙坐遙夜幽籟聴淅瀝因話近世僊聳然心神惕乃言瞿氏子骨狀非凡格往事黄先生群兒多侮劇謷然不屑意元氣貯肝鬲往往遊不歸洞中觀博奕言髙未易信猶復加訶責一旦前致辭自云仙期迫言師有道骨前事嘗被謫如今三山上名字在真籍悠然謝主人後嵗當來覿言畢依庭樹如􅃄去無迹觀者皆失次驚追紛絡繹日莫山逕窮松風自蕭槭適逢修虵見瞑目光激射如嚴三清居不使恣搜索唯餘步綱勢八趾在沙礫至今東北隅表以壇上石列仙徒有名世人非目撃如何庭廡際白日振飛翮洞天豈幽逺得道如咫尺一氣無死生三光自遷易因思人間世前路何湫窄瞥然此生中善祝期滿百大方播羣類秀氣肖翕闢性静本同和物牽成阻阨是非鬬方寸葷血昏精魄遂令多夭傷猶喜見斑白喧喧車馬馳苒苒桑榆夕共安緹繡榮不悟泥途適紛吾本孤賤世業在逢掖九流宗指歸百氏旁攟摭公卿偶慰薦鄉曲謬推擇居安白社貧志傲𤣥纁辟功名希自取簮組俟揚厯書府蚤懷鈆射宫曽發的起草香生帳坐曹烏集柏賜宴聆簫韶侍祠閲琮璧嘗聞履忠信可以行蠻貊自迷希古心妄恃干時畫巧言忽成錦苦志徒食蘗平地生峯巒深心有矛㦸曽波一震盪弱植果淪溺北渚弔靈均長岑思亭伯禍來昧幾兆事去空歎惜塵累與時深流年隨漏滴才能疑木鴈報施迷夷跖楚奏繫鍾儀商歌勞寗戚禀生非懸解對境方感激自從嬰網羅毎事問龜䇿王正降雷雨環玦賜遷斥儻復夷平人誓將依羽客買山構精舎領徒開講席冀無身外憂自有閑中益道牙期日就塵慮乃冰釋且欲遺姓名安能慕竹帛長生尚學致一溉豈虛擲芝术資糇糧煙霞拂巾幘黄石履看墮洪崖肩可拍聊復嗟蜉蝣何頻哀虺蜴青囊既深味瓊葩亦屢摘縱無西山姿猶免長戚戚客有為余話登天壇遇雨之狀因以賦之清晨登天壇半路逢隂晦疾行穿雨過却立視雲背白日照其上風雷走于内滉瀁雪海翻槎牙玉山碎蛟龍露鬐鬛神鬼含變態萬狀互相生百音以繁㑹俯觀羣動静始覺天宇大山頂自晶明人間巳霶霈豁然重昏斂渙若春冰潰反照入松門瀑流飛縞帶遥光泛物色餘韻吟天籟洞府撞仙鐘村墟起夕靄却見山下侣已如迷世代問我何處來我來雲雨外有僧言羅浮事因為詩以冩之君言羅浮上容易見九垠漸髙元氣壯洶湧來翼身夜宿最髙峯瞻望浩無隣海黒天宇曠星辰來逼人是時當朏魄隂物恣騰振日光吐鯨背劒影開龍鱗倐若萬馬馳旌旗聳奫淪又如廣樂奏金石含悲辛疑其有巨靈怪物盡來賔隂陽迭用事乃俾夜作晨咿喔天雞鳴扶桑色昕昕赤波千萬里踴出黄金輪下視生物息霏如隙中塵醯鷄仰􅀢口亦謂雲漢津世人信耳目方寸度大鈞安知視聴外怪愕不可陳悠悠想大方此乃桮水濵知小天地大安能識其真秋江蚤發輕隂迎曉日霞霽秋江明草樹含逺思襟懷有餘清凝睇萬象起朗吟孤憤平渚鴻未矯翼而我已遐征因思市朝人方聴晨鷄鳴昏昏戀衾枕安見元氣英納爽耳目變玩奇筋骨輕滄洲有奇趣浩蕩吾將行裴祭酒尚書見示春歸城南青松塢别墅寄王左丞髙侍郎之什命同作蚤宦閲人事晚懐生道機時從學省出獨望郊園歸野彴度春水山花映巖扉石頭解金章林下步緑薇青松鬱成塢修竹盈尺圍吟風起天籟蔽日無炎威危逕盤羊腸連甍聳翬飛幽谷響樵斧澄潭環釣磯因髙見帝城冠蓋揚光輝白雲難持寄清韻投所希二公如長離比翼翔太㣲含情謝林壑酬贈駢珠璣顧予久郎潜愁寂對芳菲一聞丘中趣再撫黄金徽和河南裴尹侍郎宿齋太平寺詣九龍祠祈雨二十韻有事九龍廟㓗齋梵王祠玉簫何時絶碧樹空涼颸吏散埃􅅽息月髙庭宇宜重城肅穆閉澗水潺湲時人稀夜復閑慮静境亦隨􅒺懷斷鼇足凝想乗鸞姿朱明盛農節膏澤方愆期瞻言五靈瑞能救百穀萎咿喔晨雞鳴闌干斗柄垂修容謁神像注意陳正詞驚飊起泓泉若召雷雨師黒烟聳鱗甲灑液如棼絲豐隆震天衢列缺揮火旗炎空忽凄𦂳髙霤懸綆縻生物已霶霈濕雲稍離披丹霞啓南陸白水含東菑熈熈飛走適藹藹草樹滋浮光動宫觀逺思盈川坻吴公敏於政謝守工為詩商山有病客言賀舒厖眉冬夜宴河中李相公中堂命筝歌送酒朗朗鵾雞弦華堂夜多思簾外雪已深坐中人半醉翠蛾發清響曲盡有餘意酌我莫憂狂老來無逸氣劉賔客文集巻二十三欽定四庫全書劉賔客文集巻二十四唐劉禹錫撰七言五十六首西塞山懷古王濬樓舩下益州金陵王氣黯然收千尋鐵鎖沈江底一片降幡出石頭人世幾囘傷往事山形依舊枕寒流今逢四海為家日故壘蕭蕭蘆荻秋陽山廟觀賽神梁松南征至此遂為其神在朗州漢家都尉舊征蠻血食如今配此山曲蓋幽深蒼檜下洞蕭愁絶翠屏間荆巫脈脈傳神語野老娑娑啟醉顔日落風生廟門外幾人連蹋竹歌還漢夀城春望古荆州刺史治亭其下有子胥廟兼楚王故墳漢夀城邊野草春荒祠古墓對荆榛田中牧竪燒芻狗陌上行人看石麟華表半空經霹靂碑文纔見滿埃塵不知何日東瀛變此地還成要路津後梁宣明二帝碑堂下作玉馬朝周從此辭園陵寂寞對豐碑千行宰樹荆州道莫雨蕭蕭聞子規荆州道懷古南國山川舊帝畿宋臺梁館尚依俙馬嘶古樹行人歇麥秀空城澤雉飛風吹落葉填宫井火入荒陵化寳衣徒使詞臣庾開府咸陽終日苦思歸朗州竇員外見示與澧州元郎中郡齋贈答長句二篇因而繼和鴛鷺差池出建章綵旗朱戸鬱相望新㤙共理犬牙地昨日同含雞舌香白芷江邊分驛路山桃蹊外接甘棠應憐一罷金閨籍枉渚逢春十度傷蚤春對雪奉寄澧州元郎中新賜魚書墨未乾賢人暫屈逺人安朝驅旌斾行時令夜見星辰憶舊官梅蘂覆階鈴閤煗雪峯當戸㦸枝寒寧知楚客思公子北望長吟澧有蘭竇朗州見示與澧州元郎中蚤秋贈答命同作鄰境諸侯同舎郎芷江蘭浦恨無梁秋風門外旌旗動曉露庭中橘柚香玉簟㣲涼宜白晝金笳入莫應清商騷人昨夜聞題鴂不歎流年惜衆芳衢州徐員外使君遺以縞紵兼竹書箱因成一篇用答佳貺按此郡本自婺州析置徐自台州遷爛柯山下舊仙郎列宿來添婺女光逺放歌聲分白紵知傳家學與青箱水朝滄海何時去蘭在幽林亦自芳聞道天台有遺愛人將琪樹比甘棠唐秀才贈端州紫石硯以詩答之端州石硯人間重贈我應知正草𤣥闕里廟中空舊物開方竈下豈天然玉蠩吐水霞光静綵翰搖風絳錦鮮此日慵工記名姓因君數到墨池前覽董評事思歸之什因以詩贈幾年油幕佐征東却泛滄浪狎釣童敧枕醉眠成戲蝶抱琴閑望送歸鴻文儒自襲膠西相倚伏能齊塞上翁更説扁舟動鄉思青菰已熟奈秋風松滋渡望硤中渡頭輕雨灑寒梅雲際溶溶雪水來夢渚草長迷楚望夷陵土黒有秦灰巴人淚應猿聲落蜀客舩從鳥道囘十二碧峯何處所永安宫外是荒臺揚州春夜李端公益張侍御登段侍御平仲宻縣李少府畼秘書張正字復元同㑹於水館對酒聨句追刻燭擊銅鉢故事遲輒舉觥以飲之逮夜艾羣公沾醉紛然就枕余偶獨醒因題詩於段君枕上以志其事寂寂獨看金燼落紛紛只見玉山頽自羞不是髙陽侣一夜星星騎馬囘逢王十二學士入翰林因以詩贈時貞元二十年王以藍田尉充學士廏馬翩翩禁外逢星槎上漢杳難從定知欲報淮南詔促召王褒入九重闕下口號呈栁儀曹綵仗神旗獵曉風雞人一唱鼔逢逢銅壺漏水何時歇如此相催即老翁監祠夕月壇書事其禮用晝西皥司分晝夜平羲和亭午太隂生鏗鏘揖讓秋光裏觀者如雲出鳯城戲贈崔干牛學道深山虚老人留名萬代不闗身勸君多買長安酒南陌東城占取春元和甲午嵗詔書盡徵江湘逐客余自武陵赴京宿於都亭有懷續來諸君子雲雨江湘起卧龍武陵樵客躡仙蹤十年楚水楓林下今夜初聞長樂鐘江陵嚴司空見示與成都武相公唱和因命同作南荆西蜀大行臺幕府旌門相對開名重三司平水土威雄八陣役風雷彩雲朝望青城起錦浪秋經白帝來不是郢中清唱發誰當丞相掞天才徵還京師見舊番官馮叔達前者怱怱􅀈被行十年顦顇到京城南宫舊吏來相問何處淹留白髮生故洛城古牆粉落椒飛知幾春風吹雨灑旋成塵莫言一片危基在猶過無窮來徃人元和十一年自朗州承召至京戯贈㸔花諸君子紫陌紅塵拂面來無人不道㸔花囘𤣥都觀裏桃千樹盡是劉郎去後栽再逰𤣥都觀絶句并引余貞元二十一年為屯田員外郎時此觀未有花是嵗出牧連州尋貶朗州司馬居十年召至京師人人皆言有道士手植仙桃滿觀如紅霞遂有前篇以志一時之事旋又出牧今十有四年復為主客郎中重遊𤣥都蕩然無復一樹唯兔葵燕麥動揺於春風耳因再題二十八字以俟後遊時大和二年三月百畝中庭半是苔桃花浄盡菜花開種桃道士歸何處前度劉郎今又來望夫石正對和州郡樓終日望夫夫不歸化為孤石苦相思望來已是幾千載只似當時初望時金陵五題并序余少為江南客而未遊秣陵嘗有遺恨後為厯陽守跂而望之適有客以金陵五題相示逌爾生思歘然有得他日友人白樂天掉頭苦吟歎賞良久且曰石頭詩云潮打空城寂寞囘吾知後之詩人不復措詞矣餘四詠雖不及此亦不孤樂天之言爾石頭城山圍故國周遭在潮打空城寂寞囘淮水東邊舊時月夜深還過女牆來烏衣巷朱雀橋邊野草花烏衣巷口夕陽斜舊來王謝堂前燕飛入尋常百姓家臺城臺城六代競豪華結綺臨春事最奢萬戸千門成野草只縁一曲後庭花生公講堂生公説法鬼神聴身後空堂夜不扄髙坐寂寥塵漠漠一方明月可中庭江令宅南朝詞臣北朝客歸來唯見秦淮碧池臺竹樹三畝餘至今人道江家宅謝寺雙檜揚州法雲寺謝鎮西宅古檜存焉雙檜蒼然古貌奇含烟吐霧鬱參差晚依禪客當金殿初對將軍映畫旗龍象界中成寳蓋鴛鴦瓦上出髙枝長明鐙是前朝焰曽照青青年少時韓信廟將畧兵機命世雄蒼黄鍾室歎良弓遂令後代登壇者毎一尋思怕立功秋夜安國觀聞笙織女分明銀漢秋桂枝梧葉共颼飀月露滿庭人寂寂霓裳一曲在髙樓洛中寺北樓見賀監草書題詩髙樓賀監昔曽登壁上筆蹤龍虎騰中國書流讓皇象北朝文士重徐陵偶因獨見空驚目恨不同時便伏膺唯恐塵埃轉磨滅再三珍重囑山僧聞韓賔擢第歸覲以詩美之兼賀韓十五曹長時韓牧永州零陵香草滿郊坰丹穴雛飛入翠屏孝若歸來呈畫讚孟陽别後有山銘蘭陔舊地多纔結桂樹新枝色更青為報儒林丈人道如今從此鬢星星寄楊八夀州風獵紅旗入夀春滿城歌舞向朱輪八公山下清淮水千騎塵中白面人桂嶺雨餘多鶴迹茗園晴望似龍鱗聖朝方用敢言者次第應須舊諫臣李賈二大諫拜命後寄楊八夀州諫省新登二直臣萬方驚喜捧絲綸則知天子明如日肯放淮陽髙卧人宣上人逺寄賀禮部王侍郎放牓後詩因而繼和禮闈新牓動長安九陌人人走馬㸔一日聲名徧天下滿城桃李屬春官自吟白雪銓詞賦指示青雲借羽翰借問至公誰印可支郎天眼定中觀贈東岳張鍊師東岳真人張鍊師髙情雅澹世間希堪為烈女書青簡久事元君住翠㣲金縷機中抛錦字玉清壇上著霓衣雲衢不要吹簫伴只擬乗鸞獨自飛祕書崔少監見示墜馬長句因而和之麟臺少監舊仙郎洛水橋邊墮馬傷塵汙腰間青盭綬風飄掌上紫遊韁上車著作應來問折臂三公定送方猶賴徳全如醉者不妨吟詠入篇章寄楊虢州與之舊姻避地江湖知幾春今來本郡擁朱輪阮郎無復里中舊楊㒒却為闗外人各繫一官難命駕毎懷前好易沾巾玉城山裏多靈藥擺落功名且養神秋日題竇員外崇徳里新居竇時判度支案長愛街西風景閑到君居處暫開顔清光門外一渠水秋色牆頭數㸃山踈種碧松通月朗多栽紅藥待春還莫言堆案無餘地認得詩人在此間䝉㤙轉儀曹郎依前充集賢學士舉韓湖州自代因寄七言翔鸞闕下謝㤙初通籍由來在石渠暫入南宫判祥瑞還歸内殿閲圗書故人猶在三江外同病凡經二紀餘今日薦君嗟久滯不唯文體似相如途次華州陪錢大夫登城北樓春望因覩李崔令狐三相國唱和之什翰林舊侣繼踵華城山水清髙鸞鳯翔集皆忝夙眷遂題是詩城樓四望出風塵見盡闗西渭北春百二山河雄上國一雙旌斾委名臣壁中今日題詩處天上同時草詔人莫怪老郎呈濫吹官途雖别舊情親三鄉驛樓伏覩𤣥宗望女几山詩小臣斐然有感開元天子萬事足唯惜當時光景促三鄉陌上望仙山歸作霓裳羽衣曲僊心從此在瑤池三清八景相追隨天上忽乗白雲去世間空有秋風詞洛中初冬拜表有懷上京故人鳯樓南面控三條拜表郎官蚤渡橋清洛曉光鋪碧簟上陽霜葉翦紅綃省門簮組初成列雲路鴛鸞想退朝寄謝殷懃九天侣槍榆水擊各逍遥尉遲郎中見示自南遷牽復却至洛城東舊居之作因以和之曽遭飛語十年謫新受㤙光萬里還朝服不妨遊洛浦郊園依舊㸔嵩山竹含天籟清商樂水繞庭臺碧玉環留作功成退身地如今只是暫時閒洛中酬福建陳判官見贈潦倒聲名擁腫材一生多故苦邅廻南宫舊籍遙相管東洛閒門晝未開静對道流論藥石偶逢詞客與瓊瑰怪君近日文鋒利新向延平㸔劒來始聞秋風昔㸔黄菊與君别今聴𤣥蟬我却囘五夜颼飀枕前覺一年顔狀鏡中來馬思邊草拳毛動鵰盼青雲睡眼開天地肅清堪四望為君扶病上髙臺和蘇十郎中謝病閑居時嚴常侍蕭給事同過訪歎初有二毛作清羸隠几望雲空左掖鴛鸞到室中一巻素書銷永日數莖斑鬢對秋風菱花照後容雖改蓍草占來命已通莫怪人人驚蚤白縁君合是黒頭翁詶淮南廖參謀秋夕見過之作林公昔為揚州從事參謀從釋子反初服揚州從事夜相尋無限新詩月下吟初服已驚𤣥髮長髙情猶向碧雲深語餘時舉一杯酒坐久方聞數處砧不逐繁華訪閑散知君擺落俗人心題王郎中宣義里新居愛君新買街西宅客到如遊鄠杜間雨後退朝貪種樹申時出省趁㸔山門前巷陌三條近牆内池亭萬境閑見擬移居作鄰里不論時節請開闗詶朗州崔員外與任十四兄侍御同過鄙人舊居見懷之什時守呉郡昔日居鄰招屈亭楓林橘樹鷓鴣聲一辭御苑青門去十見蠻江白芷生自此曽沾宣室召如今又守闔閭城何人萬里能相憶同舎仙郎與外兄任侍御予外兄崔員外南宫同官美温尚書鎮定興元以詩寄賀旌旗入境犬無聲戮盡鯨鯢漢水清從此世人開耳目始知名將出書生劉駙馬水亭避暑千竿竹翠數蓮紅水閣虚涼玉簟空琥珀琖烘疑漏酒水精簾瑩更通風賜冰滿盌沈朱實法饌盈盤覆碧籠盡日逍遙避煩暑再三珍重主人翁述舊賀遷寄陜虢孫常侍南宫左輔兩處交代南宫幸襲芝蘭後左輔曽交印綬來多病未離清洛苑新㤙巳厯望仙臺闗頭古塞桃林静城下長河竹箭囘聞道隨車有零雨此時偏動子荆才詶端州吴大夫夜泊湘川見寄一絶夜泊湘川逐客心月明猿苦血沾襟湘妃舊竹痕猶淺從此因君染更深劉賔客文集巻二十四欽定四庫全書劉賔客文集巻二十五唐劉禹錫撰雜體三十九首翠㣲寺有感吾王昔遊幸離宫雲際開朱旗迎夏畢涼軒避暑來湯䴵賜都尉寒冰頒上才龍􅐖不可望玉坐生浮埃連州臘日觀莫徭獵西山海天殺氣薄蠻軍部伍囂林紅葉盡變原黒草初燒圍合繁鉦息禽興大斾揺張羅依道口嗾犬上山腰猜鷹慮奮迅驚麏時跼跳瘴雲四面起臘雪半空銷箭頭餘鵠血鞍傍見雉翹日莫還城邑金笳發麗譙觀舞柘枝二首長裾何葳蕤僊僊登綺墀神飊獵紅蕖龍燭然金枝垂帶覆纎腰安鈿當嫵眉翹袖中繁鼔傾眸遡華榱燕餘有舊曲淮南多冶詞欲見傾城處君㸔赴節時山雞臨清鏡石燕赴遙津何如上客㑹長袖入華茵體輕似無骨觀者皆聳神曲盡囘身去曽波猶注人君山懷古屬車八十一此地阻長風千載威靈盡赭山寒水中秋江晚泊長泊起秋色空江涵霽暉莫霞十萬狀賔鴻次第飛古戍見旗逈荒村聞犬稀軻峨艑上客勸酒夜相依步出武陵東亭臨江寓望鷹至感風候霜餘變林麓孤颿帶日來寒江轉沙曲戍遥旗影動津晚㯭聲促月上綵霞收漁歌逺相續秋日送客至潛水驛候吏立沙際田家連竹溪神林社日鼓茅屋午時雞雀噪晚禾地蝶飛秋草畦驛樓宫樹近疲馬再三嘶晚嵗登武陵城顧望水陸悵然有作星象承鳥翼蠻陬想犬牙俚人祠竹節仙洞開桃花城基厯漢魏江源自賨巴華表廖王墓菜地黄瓊家霜輕菊秀晚石淺水文斜樵音遶故壘汲路明寒沙清風稍改葉盧橘如含葩野橋鳴驛騎叢祠發逈笳跳鱗避舉網倦鳥寄行查路塵髙出樹山火逺連霞夕曛轉赤岸浮靄起蒼葭軋軋渡溪槳連連赴林鵶叫閽道非逺賜環期自賖孤臣本危涕喬木在天涯湖州崔郎中曽長寄三癖詩自言癖在詩與琹酒其詞逸而髙吟詠不足昔栁吴興亭臯隴首之句王融書之白團扇故為四韻以謝之視事畫屏中自稱三癖翁管絃泛春渚旌斾拂晴虹酒對青山月琴韻白蘋風㑹書團扇上知君文字工為郎分司寄上都同舎籍通金馬門身在銅駝陌省闥晝無塵宫樹逺凝碧荒街淺深轍古渡潺湲石唯有嵩丘雲堪誇蚤朝客登陜州城北樓卻寄京師親友獨上百尺樓目窮思亦愁初日徧露草野田荒悠悠塵息長道白林清宿􅃄收囘首雲深處永懷帝鄉遊請告東歸發灞橋卻寄諸僚友征途出灞涘囘首傷如何故人雲雨散滿目山川多行車無停軌流景同迅波前歡漸成昔感歎益勞歌秋晚題湖城驛池上亭秋次池上館林塘照南榮塵衣紛未解幽思浩已盈風蓮墜故蕚露菊含晚英恨為一夕客愁聴晨雞鳴平蔡州三首蔡州城中衆心死妖星夜落照壕水漢家飛將下天來馬箠一揮門洞開賊徒崩騰望旗拜有若羣蟄驚春雷狂童面縛登檻車大帛夭矯垂捷書相公從容來鎮撫常侍郊迎負文弩四人歸業閭里閑小兒跳跟健兒舞汝南晨雞喔喔鳴城頭鼔角音和平路傍老人憶舊事相與感激皆涕零老人收泣前致辭官軍入城人不知忽驚元和十二載重見天寳承平時九衢車馬渾渾流使臣來獻淮西囚四夷聞風失匕筯天子受賀登髙樓妖童擢髮不足數血汗城西一坏土南峯無火楚澤閒夜行不鎻穆陵闗䇿勲禮畢天下泰猛士按劒㸔常山時唯常山不庭平齊行二首邊塵昔起薊北門河南地屬平盧軍貂裘代馬繞東岳嶧陽孤桐削為角地形十二虜意驕㤙澤含容厯四朝魯人皆解帶弓箭齊人不復聞簫韶今朝天子聖神武手握𤣥符平九土初哀狂童襲故事文告不來方震怒去秋詔下誅東平官軍四合猶嬰城春來羣鳥噪且驚氣如壞山墮其庭牙門大將有劉生夜半射落攙搶星帳中虜血流滿地門外三軍舞連臂馹騎函首過黄河城中無賊夭氣和朝廷侍郎來慰撫耕夫滿野行人歌泰山沈寇六十年旅祭不饗生愁烟今逢聖君欲封禪神使隂兵來助戰祅氛埽盡河水清日觀杲杲卿雲見開元皇帝東封時百神受職争奔馳千鈞猛簴順流下洪波涵淡浮熊羆侍臣燕公秉文筆玉檢告天無愧詞當今叡孫承聖祖岳神望幸河宗舞青門大道屬車塵共待葳蕤翠華舉城西行城西簇簇三叛族叛者為誰蔡吴蜀中使提刀出禁來九衢車馬轟成雷臨刑與酒桮未覆仇家白官先請肉守吏能然董卓臍饑烏來覘桓𤣥目城西人散泰街平雨洗血痕春草生武昌老人説笛歌武昌老將七十餘手把庾令相問書自言少小學吹笛蚤事曹王曽賞激往年鎮戍到蘄州楚山蕭蕭笛竹秋當時買林恣捜索典卻身上烏貂裘古苔蒼蒼封老節石上孤生飽風雪商聲五音隨指發水中龍應行雲絶曽將黄鶴樓上吹一聲占盡秋江月如今老去興猶遲音韻髙低耳不知氣力已無心尚在時時一曲夢中吹西山蘭若試茶歌山僧後檐茶數叢春來映竹抽新茸苑然為客振衣起自傍芳叢摘鷹觜斯須炒成滿室香便酌砌下金沙水驟雨松聲入鼎來白雲滿盌花裵囘悠揚噴鼻宿酲散清峭徹骨煩襟開陽崖隂嶺各殊氣未若竹下莓苔地炎帝雖嘗未解煎桐君有籙那知味新芽連拳半未舒自摘至煎俄頃餘木蘭墜露香微似瑤草臨波色不如僧言靈味宜幽寂采采翹英為嘉客不辭緘封寄郡齋甎井銅鑪損標格何況蒙山顧渚春白泥赤印走風塵欲知花乳清泠味須是眠雲跂石人廟庭偃松詩并引侍中後閤前有小松不待年而偃丞相晉公為賦詩美其猶龍蛇然植于髙檐喬木間上嶔旁軋盤蹙傾亞似不得天和者公以遂物性為意乃加憐焉命畚土以壯其趾使無敧索綯以牽其榦使不仆盥潄之餘以潤之顧眄之輝以照之發於仁心感召和氣無復夭閼坐能敷舒曏之跧蹙化為奇古故雖袤丈而有偃號焉予嘗詣閤白事公為道所以且示以詩竊感嘉木之逢時斐然成詠勢軋枝偏根已危髙情一見與扶持忽從顦顇有生意卻為離披無俗姿影入巖廊行樂處韻含天籟宿齋時謝公莫道東山去待取隂成滿鳯池答東陽于令涵碧圗詩并引東陽令于興宗丞相燕國公之猶子生綺襦紈袴間所見皆貴盛而挈然有心如山東書生前年白有司願為親民官以自效遂補東陽及莅官以簡易為治故多暇日一旦於縣五里偶得奇境埋没於翳薈中于生自以有特操而生於公侯家由覆廕入仕常忽忽歎息因移是心開抉泉石芟去蘿䔍斧凡材畚息壤而清溪翠巖森立坌來因構亭其端題曰涵碧碧流貫于庭中如青龍蜿蜒冰去聲澈射人樹石雲霞列于前昏旦萬狀惜其居地不得有聞於時故圖之來乞詞既無負尤物予亦久翳蘿蔦者睹之慨然遂賦七言以貽後之文士東陽本是佳山水何況曽經沈隠侯化得邦人解吟詠如今縣令亦風流新開潭洞疑仙境逺寫丹青到雝州落在尋常畫師手猶能三伏凛生秋贈致仕滕庶子先輩時及第人中最長朝服歸來晝錦榮登科記上更無名夀觴毎使曽孫獻勝境長攜衆妓行矍鑠據鞍時騁健殷勤把酒尚多情凌寒卻向山隂去衣繡郎君雪裏迎時令子為御史主務在越中詠樹紅柿子曉連星影出晚帶日光懸本因遺採掇飜自保天年庭竹露滌鈆粉節風揺青玉枝依依似君子無地不相宜臺城懷古清江悠悠王氣沈六朝遺事何處尋宫牆隠嶙圍野澤鸛鶂夜鳴秋色深題夀安甘棠館二首公館似仙家池清竹逕斜山禽忽驚起衝落半巖花門前洛陽道門裏桃源路塵土與烟霞其間十餘步與歌者米嘉榮唱得涼州意外聲舊人唯數米嘉榮近來時世輕先輩好染頿須事後生聴舊宫中樂人穆氏唱歌曽隨織女渡天河記得雲間第一歌休唱貞元供奉曲當時朝士已無多渾侍中宅牡丹徑尺千餘朶人間有此花今朝見顔色更不向諸家唐郎中宅與諸公同飲酒㸔牡丹今日花前飲甘心醉數杯但愁花有語不為老人開與歌者何戡二十餘年别帝京重聞天樂不勝情舊人唯有何戡在更與殷勤唱渭城與歌童田順郎天下能歌御史娘花前月底奉君王九重深處無人見分付新聲與順郎燕尓館破屏風所畫至精人多歎賞題之畫時應遇空亡日賣處難逢識别人唯有多情往來客強將衫袖拂埃塵賞牡丹庭前芍藥妖無格池上芙蕖浄少情唯有牡丹真國色花開時節動京城寄陜州姚中丞時分司東都八月天地肅二陵風雨收旌旗闕下來雲日闗東秋禹跡想前事漢臺餘故丘裵囘襟帶地左右帝王州留滯悲昔老㤙光榮徹侯相思望棠樹一寄商聲謳奉酬湖州崔郎中見寄五韻山陽昔相遇灼灼晨葩鮮同遊翰墨場和樂塤箎然一落名宦途浩如乗風船行當衰莫日卧理淮海壖猶期謝病後共樂桑榆年劉賓客文集巻二十五欽定四庫全書劉賔客文集巻二十六唐劉禹錫撰樂府上團扇歌團扇復團扇奉君清暑殿秋風入庭樹從此不相見上有乘鸞女蒼蒼網蟲遍明年入懐袖别是機中練荆州歌二首渚宫楊栁暗麥城朝雉飛可憐蹋青伴乘煗著輕衣今日好南風商旅相催發沙頭檣竿上始見春江濶紀南歌風烟紀南城塵土荆門路天寒多獵騎走上樊姬墓宜城歌野水遶空城行塵起孤驛荒臺側生樹石碣陽鐫額靡靡度行人温風吹宿麥順陽歌朝辭官軍驛前望順陽路野水齧荒墳秋蟲鏤官樹曽聞天寳末胡馬西南騖城守魯將軍拔城從此去馬嵬行緑野扶風道黄塵馬嵬驛路邉楊貴人墳髙三四尺乃問里中兒皆言幸蜀時軍家誅佞倖天子捨妖姬羣吏伏門屏貴人牽帝衣低回轉美目風日為無暉貴人飲金屑倐忽蕣英莫平生服杏丹顔色真如故屬車塵已逺里巷來窺覷共愛宿妆妍君王畫眉處履綦無復有履組光未滅不見巖畔人空見陵波襪郵童愛蹤跡私手解槃結傳看千萬眼縷絶香不歇指環照骨明首飾敵連城將入咸陽市猶得賈胡驚視刀環歌常恨言語淺不如人意深今朝兩相視脈脈萬重心三閣辭四首吴聲貴人三閣上日晏未梳頭不應有恨事嬌甚卻成愁珠箔曲瓊鉤子細見揚州北兵那得度浪語判悠悠沈香帖閣柱金縷畫門楣回首降旛下已見黍離離三人出眢井一身登檻車朱門漫臨水不可見鱸魚更衣曲博山炯炯吐香霧紅燭引至更衣處夜如何其夜漫漫鄰雞未鳴寒雁度庭前雪壓松桂叢廊下㸃㸃懸紗籠滿堂醉客争笑語嘈􅓐琵琶青幕中淮隂行五首古有長千行言三江之事悉矣余嘗阻風淮隂作淮隂行以禆樂府蔟蔟淮隂市行樓縁岸上好日起檣竿烏飛驚五兩金日轉船頭金烏指西北烟波與春草千里同一色船頭大銅鐶摩挲光陳陳蚤晚使風來沙頭一眼認何物令儂羨羨郎船尾燕銜泥趂檣竿宿食長相見隔浦望行船頭昻尾幰幰無奈挑菜時清淮春浪軟競渡曲競渡始於武陵至今舉檝而相和之其音咸呼云何在斯招屈之義事見圗經沅江五月平隄流邑人相將浮綵舟靈均何年歌已矣哀謡振檝從此起揚枹擊節雷闐闐亂流齊進聲轟然蛟龍得雨鬐鬛動螮蝀飲河形影聫刺史臨流褰翠幃揭竿命爵分雄雌先鳴餘勇争鼓舞未至銜枚顔色沮百勝本自有前期一飛由來無定所風俗如狂重此時縱觀雲委江之湄綵旗夾岸照鮫室羅襪陵波呈水嬉曲終人散空愁莫招屈亭前水東注隄上行三首酒旗相望大隄頭隄下連檣隄上樓日莫行人争渡急槳聲幽軋滿中流江南江北望烟波入夜行人相應歌桃葉傳情竹枝怨水流無限月明多長隄繚繞水裵回酒舍旗亭次第開日晚上簾招估客軻峩大艑落颿來采菱行武陵俗嗜芰菱嵗秋矣有女郎咸遊于馬湖薄言采之歸以御客古有采菱曲罕傳其詞故賦之以俟采詩者白馬湖平秋日光紫菱如錦綵鴛翔盪舟遊女滿中央采菱不顧馬上郎争多逐勝紛相向時轉蘭橈破輕浪長鬟弱袂動參差釵影釧文浮蕩漾笑語哇咬顧晚暉蓼花縁岸扣船歸歸來共到市橋步野蔓繫船萍滿衣家家竹樓臨廣陌下有連檣多估客攜觴薦芰夜經過醉蹋大隄相應歌屈平祠下沅江水月照寒波白烟起一曲南音此地聞長安北望三千里秋風引何處秋風至蕭蕭送雁羣朝來入庭樹孤客最先聞莫猺歌莫猺自生長名字無符籍市易雜鮫人婚姻通木客星居占泉眼火種開山脊夜渡千仞谿含沙不能射蠻子歌蠻語鈎輈音蠻衣斑斕布熏狸掘沙䑕時節祠盤瓠忽逢乗馬客怳若驚麕顧腰斧上髙山意行無舊路洞庭秋月行洞庭秋月生湖心曽波萬頃如鎔金孤輪徐轉光不定遊氣濛濛隔寒鏡是時白露三秋中湖平月上天地空岳陽城頭莫角絶蕩漾已過君山東山城蒼蒼夜寂寂水月逶迤繞城白盪槳巴童歌竹枝連檣估客吹羌笛勢髙夜久隂力全金氣肅肅開清躔浮雲野馬歸四裔首冠星斗當中天天雞相呼曙霞出斂影含光讓朝日日出喧喧人不閑夜夜清景非人間蹋歌詞四首春江月出大隄平隄上女郎連袂行唱盡新詞歡不見紅霞映樹鷓鴣鳴桃蹊柳陌好經過鐙下妆成月下歌為是襄王故宫地至今猶自細腰多新詞宛轉遞相傳振袖傾鬟風露前月落烏啼雲雨散遊童陌上拾花鈿日莫江南聞竹枝南人行樂北人悲自從雪裏唱新曲直到三春花盡時華清詞日出驪山東裵􅏆照温泉樓臺影玲瓏稍稍開白烟言昔太上皇常居此祈年風中聞清樂往往來列仙翠華入五雲紫氣歸上𤣥哀哀生人淚泣盡弓劒前聖道本自我凡情徒顒然小臣感𤣥化一望青冥天步虚詞二首阿母種桃雲海際花落子城二千嵗海風吹折最繁枝跪捧瓊槃獻天帝華表千年一鶴歸凝丹為頂雪為衣星星仙語人聴盡卻向五雲飜趐飛桃源行漁舟何招招浮在武陵水拕綸擲餌信流去誤入桃源行數里清源尋盡花綿綿蹋花覔徑至洞前洞門蒼黒烟霧生暗行數步逢虚明俗人毛骨驚仙子争來致詞何至此須臾皆破冰雪顔笑言委曲問人間因嗟隠身來種玉不知人世如風燭筵羞石髓勸客餐鐙爇松脂留客宿雞聲犬聲遥相聞曉光葱籠開五雲漁人振衣起出户滿庭無路花紛紛飜然恐迷鄉縣處一息不肯桃源住桃花滿溪水似鏡塵心如垢洗不去仙家一出尋無蹤至今水流山重重魏宫詞二首日晚長秋簾外報望陵歌舞在明朝添鑪火欲熏衣麝憶得分時不忍燒日映西陵松栢枝下臺相顧一相思朝來樂府長歌曲唱著君王自作詞阿嬌怨望見葳㽔舉翠華試開金屋埽庭花須臾宫女傳來信言幸平陽公主家九華山并引九華山在池州青陽縣西南九峯競秀神采竒異昔予仰太華以為此外無竒愛女几荆山以為此外無秀及今見九華始悼前言之容易也惜其地偏且逺不為世所稱故歌以大之竒峯一見驚魂魄意想洪鑪始開闢疑是九龍夭矯欲攀天忽逢霹靂一聲化為石不然何至今悠悠億萬年氣勢不死如騰仚音騫輕舉皃雲含幽兮月添冷日凝輝兮江􅃞影結根不得要路津逈秀長在無人境軒皇封禪登云亭大禹㑹計臨東溟乗樏力追反山行具不來廣樂絶獨與猿鳥愁青熒君不見敬亭之山黄索漠兀如㫁岸無稜角宣城謝守一首詩遂使名聲齊五岳九華山九華山自是造化一尤物焉能籍甚乎人間送春曲春向晚春晚思悠哉風雲日已改花葉自相催漠漠空中去何時天際來春已暮冉冉如人老映葉見殘花連天是青草可憐桃與李從此同桑棗春景去此去何時回遊人千萬恨落日上髙臺寂寞繁花盡流鶯歸不來初夏曲三首銅壺方促夜斗柄暫南回稍嫌單衣重初憐北户開西園花已盡新月為誰來時節過繁華隂隂千萬家巢禽命子戯園果墜枝斜寂寞孤飛蝶窺叢覔晚花緑水風初暖青林露早晞麥田雉朝雊桑野人莫歸百舌悲花盡無聲來去飛柳花詞三首開從緑條上散逐香風逺故取花落時悠揚占春晚輕飛不假風輕落不委地撩亂舞晴空發人無限思晴天黯黯雪来送青春莫無意似多情千家萬家去送春詞昨來樓上迎春處今日登樓又送歸蘭蘂殘妆含露泣柳條長袖向風揮佳人對鏡容色改楚客臨江心事違萬古至今同此恨無如一醉盡忘機秋詞二首自古逢秋悲寂寥我言秋日勝春朝晴空一鶴排雲上便引詩情到碧霄山明水浄夜來霜數樹深紅出淺黄試上髙樓清入骨豈知春色嗾人狂劉賔客文集巻二十六欽定四庫全書劉賔客文集巻二十七唐劉禹錫撰樂府下泰娘歌并引泰娘本韋尚書家主謳者初尚書為吴郡得之命樂工誨之琵琶使之歌且舞無幾何盡得其術居一二嵗攜之以歸京師京師多新聲善工於是又捐去故技以新聲度曲而泰娘名字往往見稱於貴遊之間元和初尚書薨於東京泰娘出居民間久之為蘄州刺史張愻所得其後愻坐事謫居武陵郡愻卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭其音燋殺以悲雒客聞之為歌其事以續于樂府云泰娘家本閶門西門前緑水環金隄有時妆成好天氣走上臯橋折花戯風流太守韋尚書路傍忽見停隼旟斗量明珠鳥傳意紺幰迎入專城居長鬟如雲衣似霧錦茵羅薦承輕步舞學驚鴻水榭春歌傳上客蘭堂莫從郎西入帝城中貴遊簪組香簾櫳低鬟緩視抱明月纎指破撥生胡風繁華一旦有消歇題劒無光履聲絶洛陽舊宅生草萊杜陵蕭蕭松栢哀妆奩蟲網厚如繭博山爐側傾寒灰蘄州刺史張公子白馬新到銅駝里自言買笑擲黄金月墮雲中從此始安知鵩鳥坐隅飛寂寞旅魂招不歸秦嘉鏡有前時結韓夀香銷故篋衣山城少人江水碧㫁雁哀猿風雨夕朱弦已絶為知音雲鬢未秋私自惜舉目風煙非舊時夢尋歸路多參差如何將此千行淚更灑湘江斑竹枝秋扇詞莫道恩情無重來人間榮謝遞相催當時初入君懐袖豈念寒鑪有死灰搗衣曲爽砧應秋律繁杵含凄風一一逺相續家家音不同户庭凝露清伴侣明月中長裾委襞積輕佩垂􅋛瓏汗餘衫更馥鈿移麝半空報寒驚邊雁促思聞候蟲天狼正芒角虎落定相攻盈篋寄何處征人如轉蓬七夕二首河鼓靈旗動姮娥破鏡斜滿空天是幕徐轉斗為車機罷猶安石橋成不礙查寜知觀津女竟夕望雲涯天衢啓雲帳神馭上星橋初喜渡河漢頻驚轉斗杓餘霞張錦幛輕電閃紅綃非是人間世還悲後㑹遥龍陽縣歌縣門白日無塵土百姓縣前挽魚罟主人引客登大隄小人縱觀黄犬怒鷓鴣驚鳴遶籬落橘柚垂芳照窻户沙平草緑見吏稀寂歴斜陽照懸鼓度桂嶺歌桂陽嶺下下復髙髙人稀鳥獸駭地逺草木豪寄言千金子知余歌者勞插田歌并引連州城下俯接村墟偶登郡樓適有所感遂書其事為俚歌以俟采詩者岡頭花草齊燕子東西飛田塍望如線白水光參差農婦白紵裙農夫緑蓑衣齊唱田中歌嚶儜如竹枝但聞怨響音不辨俚語詞時時一大笑此必相嘲嗤水平苗漠漠烟火生墟落黄犬往復還赤雞鳴且啄路傍誰家郎烏帽衫袖長自言上計吏年初離帝鄉田夫語計吏君家儂定諳一來長安罷眼大不相參計吏笑致辭長安真大處省門髙軻峩儂入無度數昨來補衞士唯用筒竹布君看二三年我作官人去畬田作何處好畬田團團縵山腹鑚龜得雨卦上山燒卧木驚麏走且顧羣雉聲咿喔紅熖逺成霞輕煤飛入郭風引上髙岑獵獵度青林青林望靡靡赤光低復起照潭出老蛟爆竹驚山鬼夜色不見山孤明星漢間如星復如月俱逐曉風滅木從敲石光遂致烘天熱下種暖灰中乗陽坼牙孽蒼蒼一雨後苕穎如雲發巴人拱手吟耕耨不闗心由來得地勢徑寸有餘隂蒲桃歌野田生蒲桃纒繞一枝蒿移來碧墀下張王日日髙分岐浩繁縟脩蔓蟠詰曲揚翹向庭柯意思如有屬為之立長架布濩當軒緑米液溉其根理疎看滲漉繁葩組綬結懸實珠璣蹙馬乳帯輕霜龍鱗躍初旭有客汾隂至臨堂瞪雙目自言我晉人種此如種玉醸之成美酒令人飲不足為君博一斗往取涼州牧鶗鴂吟朝陽有吟鳯不聞千萬祀鶗鴂催衆芳晨間先入耳秋風白露晞從是爾啼時如何上春日唧唧滿庭飛牆隂歌白日左右浮天潢朝晡影入東西牆昔為兒童在隂戯當時意小覺日長東隣侯家吹笙簧隨隂促促移象牀西隣田舍乏糟糠就影汲汲舂黄粱因思九州四海外家家只占牆隂内莫言牆隂數尺間老卻主人如等閒君看眼前光景促中心莫學太行山觀雲篇興雲感隂氣疾走如見機晴來意態行有若功成歸葱籠含晚景潔白凝秋暉夜深度銀漢漠漠仙人衣踏潮歌并引元和十年夏五月終風駕濤南海羨溢南人曰􅂿潮也率三更嵗一有之余為連州客或為予言其狀因歌之附于南越志屯門積日無回飇滄波不歸成􅂿潮轟如鞭石矻且揺亘空欲駕黿鼉橋驚湍蹙縮悍而驕大陵髙岸失岧嶤四邊無阻音響調背負元氣掀重霄介鯨得性方逍遥仰鼻嘘吸揚朱翹海人狂顧迭相招罽衣髽首聲嘵嘵征南將軍登麗譙赤旗指麾不敢囂翌日風回沴氣消歸濤納納景昭昭烏泥白沙復滿海海色不動如青瑶百花行長安百花時風景宜輕薄無人不沽酒何處不聞樂春風連夜動微雨陵曉濯紅熖出牆頭雪光映樓角繁紫韻松竹逺黄遶籬落臨路不勝愁輕飛去何託滿庭蕩魂魄照廡成丹渥爛熳嗾顛狂飄零勸行樂時節易晼晚清隂覆池閣唯有安石榴當軒慰寂寞春有情篇為問遊春侣春情何處尋花含欲語意草有鬭生心雨頻催發色雲輕不作隂縱令無月夜芳興暗中深路傍曲南山宿雨晴春入鳯皇城處處聞弦管無非送酒聲白鷺兒白鷺兒最髙格毛衣新成雪不敵衆禽喧呼獨凝寂孤眠芊芊草久立潺潺石前山正無雲飛去入遥碧壯士行隂風振寒郊猛虎正咆哮徐行出燒地連吼入黄茅壮士走馬去鐙前彎玉弰叱之使人立一發如鈹交悍睛忽星墮飛血濺林梢彪炳為我席羶腥充我庖里中欣害除賀酒紛號呶明日長橋上傾城看斬蛟邊風行邊馬蕭蕭鳴邊風滿磧生暗添弓箭力半上鼓鼙聲襲月寒暈起吹雲隂陳成將軍占氣候出號夜翻營一作安號畏飜城竹枝詞并引四方之歌異音而同樂嵗正月余來建平里中兒聫歌竹枝吹短笛撃鼔以赴節歌者揚袂睢舞以曲多為賢聆其音中黄鍾之羽卒章激訐如吴聲雖傖儜不可分而含思宛轉有淇濮之豔昔屈原居沅湘間其民迎神詞多鄙陋乃為作九歌到于今荆楚鼓舞之故余亦作竹枝詞九篇俾善歌者颺之附于末後之聆巴歈知變風之自焉白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動鄉情山桃紅花滿上頭蜀江春水拍山流花紅易衰似郎意水流無限似儂愁江上朱樓新雨晴瀼西春水縠文生橋東橋西好楊柳人來人去唱歌行日出三竿春霧消江頭蜀客駐蘭橈慿寄狂夫書一紙住在成都萬里橋兩岸山花似雪開家家春酒滿銀桮昭君坊中多女伴永安宫外蹋青來城西門前灩澦堆年年波浪不能摧懊惱人心不如石少時東去復西來瞿唐嘈嘈十二灘此中道路古來難長恨人心不如水等閒平地起波瀾巫峽蒼蒼烟雨時清猿啼在最髙枝箇裏愁人腸自㫁由來不是此聲悲山上層層桃李花雲間烟火是人家銀釧金釵來負水長刀短笠去燒畬楊柳枝詞九首塞北梅花羌笛吹淮南桂樹小山詞請君莫奏前朝曲聴唱新飜楊柳枝南陌東城春蚤時相逢何處不依依桃紅李白皆誇好須得垂楊相發揮鳯闕輕遮翡翠幃龍池遥望麴塵絲御溝春水相暉映狂殺長安年少兒金谷園中鶯亂飛銅駝陌上好風吹城東桃李須臾盡争似垂楊無限時花萼樓前初種時美人樓上鬭腰支如今抛擲長街裏露葉如啼欲恨誰煬帝行宫汴水濵數株殘柳不勝春晚來風起花如雪飛入宫牆不見人御陌青門拂地垂千條金縷萬條絲如今綰作同心結將贈行人知不知城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管别離輕盈嫋娜占年華舞榭妆樓處處遮春盡絮飛留不得隨風好去落誰家浪淘沙詞九首九曲黄河萬里沙浪淘風簸自天涯如今直上銀河去同到牽牛織女家洛水橋邊春日斜碧流輕淺見瓊砂無端陌上狂風急驚起鴛鴦出浪沙汴水東流虎眼文清淮曉色鴨頭春君看渡口淘沙處渡卻人間多少人鸚鵡舟頭浪颭沙青樓春望日將斜銜泥燕子争歸舎獨自狂夫不憶家濯錦江邊兩岸花春風吹浪正淘沙女郎剪下鴛鴦錦將向中流定晚霞日照澄洲江霧開淘金女伴滿江隈美人首飾侯王印盡是沙中浪底來八月濤聲吼地來頭髙數丈觸山回須臾卻入海門去巻起沙堆似雪堆莫道讒言如浪深莫言遷客似沙沈千淘萬灑雖辛苦吹盡狂沙始到金流水淘沙不暫停前波未滅後波生令人忽憶瀟湘渚回唱迎神三兩聲瀟湘神二首湘水流湘水流九疑雲物至今愁君問二妃何處所零陵香草露中秋斑竹枝斑竹枝淚痕㸃㸃寄相思楚客欲聴瑶瑟怨瀟湘深夜月明時抛毬樂詞二首五綵繡團圓登君瑇瑁筵最宜紅燭下偏稱落花前上客如先起應須贈一船春蚤見花枝朝朝恨發遲及看花落後卻憶未開時幸有抛毬樂一桮君莫辭楊柳枝詞二首迎得春光先到來淺黄輕緑映樓臺只縁裊娜多情思便被春風長請挼巫峽巫山楊柳多朝雲莫雨逺相和因想陽臺無限事為君回唱竹枝歌竹枝詞二首楊柳青青江水平聞郎江上唱歌聲東邊日出西邊雨道是無晴還有晴楚水巴山江雨多巴人能唱本鄉歌今朝北客思歸去回入紇那披緑羅紇那曲詞二首楊柳鬱青青竹枝無限情周郎一回顧聴唱紇那聲蹋曲興無窮調同詞不同願郎千萬夀長作主人翁右已上詞先不入集伏縁播在樂章今附于巻未劉賔客文集巻二十七欽定四庫全書劉賔客文集巻二十八唐劉禹錫撰送别四十六首送工部張侍郎入蕃弔祭時張兼修史月窟賔諸夏雲官降九天飾終隣好重錫命禮容全水咽猶登隴沙鳴稍極邊路因乗驛近志為飲冰堅毳帳差池見鳥旗揺曳前歸來賜金石榮耀自編年蚤秋送臺院楊侍御歸朝兄弟四人遍歴諸科二人同在仙署棣華春當時已絶倫今朝丹闕下更入白眉人重振髙陽族分居要路津一門科第足五府辟書頻鷙鳥得秋氣法星懸火旻聖朝寰海静所至不埋輪送工部蕭郎中刑部李郎中並以本官兼中丞分命充京西京北覆糧使霜簡映金章相輝同舍郎天威巡虎落星使出鴛行尊俎成全䇿京坻閱見糧歸來虜塵滅畫地奏明光送李尚書鎮滑州自浙西觀察徴拜兵部侍郎月餘有此拜南徐報政入文昌東郡須才别建章視草名髙同蜀客擁旄年少勝荀郎黄河一曲當城下緹騎千重照路傍自古相門還出相如今人望在巖廊其後果繼韋平之族送渾大夫赴豐州自大鴻臚拜家承舊勲鳯銜新詔降恩華又見旌旗出渾家故吏來辭辛屬國精兵願逐李輕車氊裘君長迎風懼錦領酋豪蹋雪衙其奈明年好春日無人喚看牡丹花送源中丞充新羅冊立使侍中之孫相門才子稱華簮持節東行捧徳音身帶霜威辭鳯闕口傳天語到雞林煙開鼇背千尋碧日浴鯨波萬頃金想見扶桑受恩後一時西拜盡傾心送陸侍御歸淮南使府五韻用年字江左重詩篇陸生名久傳鳯城來已熟羊酪不嫌羶歸路芙蓉府離堂瑇瑁筵秦山呈臘雪隋柳布新年曽忝揚州薦因君達短牋時段丞相鎮揚州嘗辱表薦送太常蕭博士棄官歸養赴東都時元兄罷相為少師仲兄為郎官並􅀆司洛邑兄弟盡鴛鸞歸心切問安貪榮五采服遂挂兩梁冠侍膳曽調鼎循陔更握蘭從今别君後長向徳星看送王司馬之陜州自太常丞授工為詩暫輟清齋出太常空攜詩巻赴甘棠府公既有朝中舊司馬應容酒後狂案牘來時唯署字風煙入興便成章兩京大道多遊客每遇詞人戰一場洛中送楊處厚入闗便遊蜀謁韋令公洛陽秋日正淒淒君去西秦更向西舊學三冬今轉富曽傷六翮養初齊王城曉入窺丹鳯蜀路晴來見碧雞蚤識卧龍應有分不妨從此躡丹梯洛中逢韓七中丞之吴興口號五首昔年意氣結羣英幾度朝回一字行海北天南零落盡兩人相見洛陽城自從雲散各東西每日歡娱却慘悽離别苦多相見少一生心事在書題今朝無意訴離桮何況清弦急管催本欲醉中輕逺别不知飜引酒悲來駱駝橋上蘋風起鸚鵡桮中箬下春水碧山青知好處開顔一笑向何人溪中士女出芭籬溪上鴛鴦避畫旗何處人間似仙境春山攜妓採茶時送周使君罷渝州歸郢州别墅君思郢上吟歸去故自渝南擲郡章野戍岸邊留畫舸緑蘿隂下到山莊池荷雨後衣香起庭草春深綬帶長只恐鳴騶催上道不容待得晚菘嘗發華州留别張侍御一作賈束簡下延閣買符驅短轅同人惜分袂結念醉芳樽切切别弦思蕭蕭征騎煩臨岐無限意相視却忘言張詩云夫子生知者相期妙理中遂有忘言之句奉送家兄歸王屋山隠居二首據道書王屋山一名陽洛山陽洛天壇上依俙似玉京夜分先見日月浄逺聞笙雲路将雞犬丹臺有姓名古來成道者兄弟亦同行春來山事好歸去憶逍遙水净苔莎色露香芝术苗登臺吸瑞景飛步翼神飊願薦塤箎曲相將學玉簫送王師魯協律赴湖南使幕即永穆公之孫翩翩馬上郎驅傳渡三湘橘樹沙洲暗松醪酒肆香素風傳竹帛高價騁琳琅楚水多蘭若何人事搴芳别友人後得書因以詩贈前時送君去揮手青門橋路轉不相見猶聞馬蕭蕭今得出闗書行塵日已遙春還遲君至共結芳蘭苕奉送浙西李僕射相公赴鎮奉送至臨泉驛書禮見徴拙詩時在汝州建節東行是舊逰歡聲喜􅂔滿吴州郡人重得黄丞相童子争迎郭細侯詔下初辭温室樹夢中先到景陽樓自憐不識平津閤遙望旌旗汝水頭重送浙西李相公頃廉問江南已經七載後歴滑臺劒南兩鎮遂入相今復領舊地新加旌旄江北萬人看玉節江南千騎引金鐃鳳從池上遊滄海鶴到遼東識舊巢城下清波含百谷窻中逺岫列三茅碧雞白馬回翔久却憶朱方是樂郊送華隂尉張苕赴邕府使幕張即燕公之孫坐事除名昔黍南宫郎往來東觀頻嘗披燕文傳聳若窺三辰翊聖崇國本保賢正朝倫髙視緬今古清風夐無鄰蘭錡照通衢一家十朱輪鄼國嗣侯絶蒍鄉貴業貧夫子承大名少年振芳塵青袍仙掌下矯首陵煙旻公冶本非罪潘郎一為民風霜苦揺落堅白無緇磷一旦逢良時天光燭幽淪重為長裾客佐彼觀風臣分野窮禹畫人煙過虞巡不言此行逺所樂相知新雨起巫山陽鳥鳴湘水濵離筵出蒼莽别曲多愁辛今朝一桮酒明日千里人彼此孤舟去悠悠天海春送湘陽熊判官孺登府罷歸鍾陵因寄呈江西裴中丞二十三兄射䇿志未就從事府云除篋留馬卿賦袖有劉𢎞書忽見夏木深悵然憶吾廬復持州民刺歸謁専城居君家誠易知勝絶傾里閭人言北郭生門有卿相輿鍾陵藹千里帶郭西江水朱檻照河宫旗亭緑雲裏前年初缺守慎簡由宸扆臨軒㺯郡章得人方付此是時左馮翊天下第一理貴臣持牙璋優詔發青紙迎風汚吏免先令疲人喜何武劾腐儒陳蕃禮髙士昔升君子堂腰下綬猶黄中丞時為萬年尉汾隂有寳氣赤堇多竒鋩束簡下曲臺佩鞬來歴陽綺筵陪一笑蘭室襲餘芳風水忽異勢江湖遂相忘因君儻借問為話老滄浪中丞為博士製相國柳宜城諡議識者韙之頃授予以其本厥後牧和州節度使杜司徒以中丞材譽俱髙欲令軍装以重戎府故授以本州團練使滿坐觀腰鞬禮成驩甚相視而笑後房燕樂卜夜縦談予忝司徒之賔時獲末坐初中丞自尚書屯田員外郎出守踵其武者今給事中穆公代給事者右丞段公予不佞繼右丞之後故曰襲餘芳焉送韋秀才道沖赴制舉驚禽一辭巢棲息無少安秋扇一離手流塵蔽霜紈故侣不可追涼風日已寒逺逢杜陵士别盡平生歡逐客無印綬楚江多芷蘭因君時暇遊長鋏不復彈閱書南軒霽絙瑟清夜䦨萬境身外寂一桮腹中寛伊昔𤣥宗朝冬卿冠鴛鸞肅穆升内殿從容領儒冠游夏無措詞陽秋垂不刋至今羣玉府學者空縱觀世人希徳門揭若攀峯巒之子向明訓鏘如振琅玕一旦西上書斑裳拂征鞍荆臺宿莫雨漢水浮春瀾君門起天中多士如星攅烟霞覆雙闕抃舞羅千官清漏滴銅壺仙厨下雕盤熒煌仰金榜錯落飛濡翰古來長䇿人所歎遭時難一鳴從此始相望青雲端送李䇿秀才還湖南因寄幕中親故兼簡衡州吕八郎中深春風日浄争長幽鳥鳴僕夫前致辭門有白面生攝衣相問訊解帶坐南榮端志見眉睫苦言發精誠因出懐中文調孤詞亦清悄如促柱弦掩抑多不平乃言本蜀士世降岷山靈前人秉懿文髙視來上京曳綬司徒府所從信國楨析薪委空林善響難繼聲何處翳附郭幾人思郈城雲天望喬木風水悲流萍前與計吏西始列貢士名森然就筆札從試春官卿帝城岐路多萬足伺晨星茫茫風塵中工拙同有營寒女勞夜織山苗榮寸莖侯門方撃鍾衣褐誰將迎弱羽果摧頽壯心鬱怦怦諒無蟠木容聊復蓬累行昨日訊靈龜繇言利艱貞當求捨拔中必在審已明誓將息薄遊焦思窮筆精蒔蘭在幽渚安得揚棻馨曰余摧落者散質負華纓一聆苦辛詞再動伊鬱情身棄言不重愛才心尚驚恨無羊角風使爾化北溟論罷情益親涉旬忘歸程日攜邑中客閒眺江上城晝渴命金壘宵談轉璿衡蕙風香麈尾月露濡桃笙忽被戒羸驂薄言事南征火雲蔚千里旅思浩已盈湘江含碧虚衡嶺浮翠晶豈伊山水異適與人事并油幕似崑丘粲然疊瑶瓊庾樓見清月孔坐多緑􅌬復有衡山守本自雲龍庭至和在靈府發越侔咸英一麾出營陽惠彼嗤嗤氓隼旟辭瀟水居者皆涕零惟昔與伊人交歡在夙齡一從雲雨散滋我鄙恡萌北渚不堪愁南音誰復聴離憂若去水浩漾無時停嘗聞祝融峯上有神禹銘古石琅玕姿祕文螭虎形聖功奠逺服神物擁休禎賢人在其下仿像疑蓬瀛君行歴郡齋大袂拂雙旌飾容遇朗鑒肝鬲可以呈昔日焉相如臨卭坐盡傾勉君刷羽翰蚤取凌青冥送張盥赴舉并引古人以偕受學為同門友今人以借升名為同年友其語熟見搢紳者皆道焉余於張盥為丈人由是道也曩吾見爾之始生以老成為祝今吾見爾之成人以未立為憂吾不幸嚮所謂同年友當其盛時聫袂齊鑣亘絶九衢若屏風然今來落落如曙星之相望借曰㑹合不煩異席可長太息哉然而尚書右丞衞大受兵部侍郎武庭碩二君者當時偉人咸萬夫之望足以訂十朋之多也第如京師無騷騷爾無􅀈􅀈爾時秋也吾為若叩商之謳幸有感夫二君子爾生始懸弧我作坐上賔引箸舉湯餅祝詞天麒麟今成一丈夫坎軻愁風塵長裾來謁我自號廬山人道舊與撫孤悄然傷我神依依見眉睫嘿嘿含悲辛永懐同年友追想出谷晨三十二君子齊飛陵烟旻曲江一㑹時後㑹已彫淪況今三十載閲世難重陳盛時一已過來者日日新不如揺落樹重有明年春火後見琮璜霜餘識松筠肅機乃獨秀武部亦絶倫爾今持我詩西見二重臣成賢必念舊保貴在安貧清時為丞郎氣力侔陶鈞乞取斗升水因之雲漢津送裴處士應制舉并引晉人裴昌禹讀書數千巻於周官小戴禮尤邃性是古敢言雖侯王不能卑下故與世相參差凡抵有位以索合行天下幾户依反遍常歎諸侯莫可遊欲一見天子而未有路㑹今年詔書徵賢良昌禹大喜以為盡可以豁平生搏髀爵躍曰一觀雲龍庭足矣繇是裹三月糧而西徂咨余以七言為西遊之資藉耳裴生久在風塵裏氣勁言髙少知已注書曽學鄭司農歴國多於孔夫子往年訪我到連州無窮絶境終日遊登山雨中試蠟屐入洞夏裏披貂裘白帝城邊又相遇斂翼三年不飛去忽然結束如秋蓬自稱對䇿明光宫人言䇿中説何事掉頭不荅看飛鴻彤庭翠松迎曉日鳯銜金牓雲間出中貴腰鞭立傾酒宰臣委佩觀揺筆古稱射䇿如彎弧一發偶中何時無由來草澤無忌諱努力滿挽當雲衢憶得童年識君處嘉禾驛後聫牆住垂鈎鬭得王餘魚蹋芳共登蘇小墓此事今同夢想間相看一笑且開顔老大希逢舊鄰里為君扶病到方山和州送錢侍御自宣州幕拜官便於華州覲省五綵繡衣裳當年正相稱春風舊闗路歸去真多興蘭陔行可採蓮府猶回瞪楊家紺幰迎侍御即王相公貴壻謝守瑶華贈宣州崔相公有詩贈行御街草泛灎臺栢烟含凝曽是平昔遊無因理歸乗將赴汝州途出浚下留辭李相公長安舊遊四十載鄂渚一别十四年後來富貴已零落嵗寒松栢猶依然初逢貞元尚文主雲闕天池共翔舞相看却數六朝臣屈指如今無四五夷門天下之咽喉昔時往往生瘡疣聫翩舊相來鎮壓四海吐納皆通流久别凡經幾多事何由説得平生意千思萬慮盡如空一笑一言真可貴世間何事最殷勤白頭將相逢故人功成名遂㑹歸老請向東山為近隣送令狐相公自僕射出鎮南梁夏木正隂成戎装出帝京沾襟辭闕淚回首别鄉情雲樹襃中路風烟漢上城前旌轉谷去後騎蹋橋聲久領鴛行重無嫌虎綬輕終當提一筆再入副蒼生送趙中丞自司金外郎轉官參山南令狐僕射幕府趙氏兄弟皆僕射門客緑樹滿襃斜西南蜀路賒驛門臨白社縣道過黄花相府開油幕門生逐絳紗行看布政後還從入京華奉送裴司徒令公自東都留守再命太原本封晉國公兩任相去十六年星使出闗東兵符賜上公山河歸舊國管籥換離宫行色旌旗動軍聲鼓角雄愛棠餘故吏騎竹見新童漢壘三秋静邊塵萬里空其如天下望旦夕詠清風奉送李户部侍郎自河南尹再除本官歸闕昔年内署振雄詞今日東都結去思宫女猶傳洞簫賦國人先詠衮衣詩華星却復文昌位别鶴重歸太一池想到金門待通籍一時驚喜見風儀送蘄州李郎中赴任楚闗蘄水路非賒東望雲山日夕佳薤葉照人呈夏簟松花滿盌試新茶樓中飲興因明月江上詩情為晚霞北地交親長引領蚤將𤣥鬢到京華洛中春末送杜録事赴蘄州尊前花下長相見明日忽為千里人君過午橋回首望洛城猶自有殘春夜宴福建盧侍御宅因送之鎮暫駐旌旗洛水隄綺筵紅燭醉蘭閨美人美酒長相逐莫怕猿聲發建溪洛中送崔司業使君扶侍赴唐州緑野方城路殘春柳絮飛風鳴驌驦馬日照老萊衣洛苑魚書至江村雁户歸相思望淮水雙鯉不應稀送河南皇甫少尹赴絳州祖帳臨周道前旌指晉城午橋羣吏散亥字老人迎詩酒同行樂别離方見情從兹洛陽社吟詠欠書生送前進士蔡京赴學究科時舊相楊尚書掌選耳聞戰鼓帶經鋤振發名聲自里閭已是世間能賦客更攻窻下絶編書朱門達者誰能識絳帳諸生盡不如幸遇天官舊丞相知君無翼上空虚送唐舍人出鎮閩中暫辭鴛鷺出蓬瀛忽擁貔貅鎮粤城閩嶺夏雲迎皂葢建溪秋樹映紅旌山川逺地由來好富貴當年别有情了却人間婚嫁事復歸朝右作公卿送盧處士歸嵩山别業世業嵩山隠雲深無四鄰藥鑪燒姹女酒􅀢貯賢人曉日華隂霧秋風函谷塵送君從此去鈴閤少談賔送李友路秀才赴舉誰憐相門子不語望秋山生長紈綺内辛勤筆硯間榮親在名字好學棄宫班佇俟明年桂髙堂開笑顔送國子令狐博士赴興元覲省相門才子髙陽族學省清資五品官諌院過時榮棣萼謝庭歸去蹋芝蘭山頭花帶烟嵐晚棧底江涵雪水寒伯仲到家人盡賀栁營蓮府遞相歡送李二十九兄員外赴邠寜使幕家襲韋平身業文素風清白至今貧南宫通籍新郎吏西候從戎舊主人城外草黄秋有雪烽頭煙静虜無塵鼎門為别霜天晚賸把離觴三五巡送分司陳郎祗召直史館重修三聖實録蟬鳴官樹引行車言自成周赴玉除逺取南朝貴公子重修東觀帝王書常時載筆窺金匱暇日登樓到石渠若問舊人劉子政如今頭白在商於送李中丞赴楚州緹騎朱旗入楚城士林皆賀振家聲兒童但喜迎賢守故吏猶應記小名萬頃水田連郭秀四時煙月映淮清憶君初得崑山玉同向揚州攜手行送李庚先輩赴選一家何啻十朱輪諸父雙飛秉大鈞曽脱素衣參幕客却為精舍讀書人離筵洛水侵桮色征路函闗向晚塵今日山公舊賔主知君不負帝城春送廖參謀東遊二首九陌逢君又别離行雲别鶴本無期望嵩樓上忽相見看過花開花落時繁花落盡君辭去緑草垂楊引征路東道諸侯皆故人留連必是多情處送從弟郎中赴浙西并引從弟三復十餘年間凡三為浙右從事往年主公入相薦敭登朝中復從公鎮南未幾而罷昨以尚書外郎奉使至洛旋承新命改轅而東三從公皆在舊地徵諸故事夐無其倫故賦詩贈之以志異也銜命出尚書新恩換使車漢庭無右者梁苑重歸歟又食建業水曽依京口居劉前軍傳云本莒人世家京口共經何限事賔主兩如初劉賔客文集巻二十八欽定四庫全書劉賔客文集巻二十九唐劉禹錫撰送僧二十四首贈别君素上人并引曩予習禮之中庸至不勉而中不思而得􅌶然知聖人之徳學以至于無學然而斯言也猶示行者以室廬之奥耳求其徑術以布武未易得也晚讀佛書見大雄念物之普級寳山而梯之髙揭慧火巧鎔惡見廣疎便門旁求邪徑其所證入如舟沿川未始念於前而日逺矣夫何勉而思之邪是余知穾音窈奥於中庸啓鍵闗於内典㑹而歸之猶初心也不知予者誚予困而後援佛謂道有二焉夫悟不因人在心而已其證也猶喑人之享太牢信知其味而不能形於言以聞于耳也口耳之間兼寸耳尚不可使聞它人之不吾知宜矣開士君素偶得予於所親一麻棲草千里來訪素以道眼視予予以所視視之不由陛級攜手智地居數日告有得而行乃為詩以見志云窮巷唯秋草髙僧獨扣門相歡如舊識問法到無言水為風生浪珠非塵可昏去來皆是道此别不銷魂送深法師遊南岳上人本在資聖寺師在白雲鄉名登善法堂十方傳句偈八部㑹壇場飛錫無定所寳書留舊房唯應銜草雁相送至衡陽廣宣上人寄在蜀與韋令公唱和詩巻因以令公手札答詩示之碧雲佳句久傳芳曽向成都住草堂振錫常過長者宅披文猶帶令公香一時風景添詩思八部人天入道場若許相期同結社吾家本自有柴桑送僧仲剬東遊兼寄呈靈澈上人釋子道成神氣閑住持曽上清涼山晴空禮拜見真像金毛五髻卿雲間西遊長安𨽻僧籍本是門前曲江碧松間白月照寳書竹下香泉灑瑶席前時學得經綸成奔馳象馬開禪扄髙筵談柄一麾拂講下聴徒如醉醒舊聞南方多長老次第來入荆門道荆州本自重彌天南朝塔廟猶依然宴坐東陽枯樹下經行居止故臺邊忽憶遺民社中客為我衡陽駐飛錫講罷同尋相鶴經閑來共蠟登山屐一旦揚眉望沃州自言王謝許同遊慿將雜擬三十首寄與江南湯慧休送僧元暠南遊并引予䇿名二十年百慮而無一得然後知世所謂道無非畏途唯出世間法可盡心耳繇是在席硯者多旁行胡岡反四句之書備將迎者皆赤頿白足之侣罙入智地静通還源客塵觀盡妙氣來宅内視胷中猶煎鍊然開士元暠姓陶氏本丹陽居家世有人爵不藉其資於毗尼禪那極細牢之義於中後日習總持之門妙音奮迅願力昭荅雅聞子事佛而佞亟來相從或問師隳形之自對曰小失怙恃推棘心以求上乗積四十年有羸老將至而不懈始悲浚泉之有洌今痛防墓之未遷塗芻莫備薪火恐滅諸相皆離此心長懸雖萬性歸佛盡為釋種如何入海無復水名然其一切智者豈遺百行求無量義者寜容㫁思今聞南諸侯雅多大士思扣以苦調而希其末光無容至前有足悲者予聞是説已力不足而悲有餘因為詩以送之庶乎踐霜露者聆之有惻寳書飜譯學初成振錫如飛白足輕彭澤因家凡幾世靈山預㑹是前生傳鐙已悟無為理濡露猶懐罔極情從此多逢大居士何人不願解珠瓔送如智法師遊辰州兼寄許評事前日過蕭寺看師上講筵都人禮白足施者散金錢方便無非教經行不廢禪還知習居士發論達彌天贈長沙讃頭陀外道邪山千萬重真言一發盡摧峯有時明月無人夜獨向昭潭制惡龍送慧則法師上都因呈廣宣上人并引師精浄名經佛示滅後大弟子演聖言而成經傳心印曰法承法而能專曰宗由宗而分教曰友坐而攝化者勝義皆空之宗也行而宣教者摧破邪山之友也釋子慧則生於像季思濟劫濁乃學於一友開彼羣迷以為盡妙理者莫如法門變凡夫者莫如佛土悟無染者莫如散花故業于浄名深達實相自京師涉漢沔歴鄢郢登熊湘聴徒百千耳感心化法無住道行而歸顧予有社内之因故言别之日愛縁瞥起時也秋盡詠江淹雜擬以送之前見宣上人為我多謝昨日東林看講時都人象馬蹋瑠璃雪山童子應前世金粟如來是本師一錫言歸九城路三衣曽拂萬年枝休公久别如相問楚客逢秋心更悲秋日過鴻舉法師寺院便送歸江陵并引梵言沙門猶華言去欲也能離欲則方寸地虚虚而萬景入入必有所泄乃形乎詞詞妙而深者必依于聲律故自近古而降釋子以詩聞于世者相踵焉因定而得境故翛然以清由慧而遣詞故粹然以麗信禪林之蘤萼而誡河之珠璣耳初鴻舉學詩於荆郢間私試竊詠發於餘習葢榛楛之翠羽弋者未之眄焉今年至武陵二千石始竒之有起予之歎以方袍親絳紗者十有餘旬繇是名稍聞而藝愈變閏八月余步出城東門謁仁祠而鴻舉在焉與之言移時因告以將去且曰貧道雅聞東諸侯之工為詩者莫若武陵今幸承其話言如得法印寳山之下宜有所持豈徒衣裓之中衆花而已余聞是説乃叩商而吟成一章章八句郡守以坐嘯餘詠激清徵而應之師其行乎足以資一時中之學矣看畫長廊遍尋僧一徑幽小池兼鶴浄古木帶蟬秋客至茶煙起禽歸講席收浮杯明日去相望水悠悠重送鴻舉赴江陵謁馬逢侍御西北秋風彫蕙蘭洞庭波上碧雲寒茂陵才子江陵住乞取新詩合掌看送僧方及南謁柳員外并引九江僧方及既出家依厈山一時中頗屬詩以攄思古詩人暨今號為能賦有輒求其詞吟呻之拳拳然多多益嗜影不出山者十年常登最髙峯四望天海沖然有逺遊之志頓錫而言曰神馳而形閡者方内之徒及吾無方間於何者繇是耳得必目探之意行必身隨之雲遊鳥仚虚筵反無迹而逺予為連州居無何而方及至出裓中詩一篇以貺予其詞甚富留一嵗觀其行結矩如教益多之一旦以行日來告且曰雅聞鳥咮之下有賢諸侯願躋其門如蹈十地敢乞詞以抵之予唯而賦顧其有重請之色起於顔間耳昔事廬山逺精舍虎溪東朝陽照瀑水樓閣虹霓中騁望羨游雲振衣若秋蓬舊房閉松月逺思吟江風古寺歴頭陀竒峯攀祝融南登小桂嶺卻望歸塞鴻衣裓貯文章自言學雕蟲搶榆念陵厲覆籄圖穹崇逺郡多暇日有詩訪禪宫石門聳峭絶竹院含空濛幽響滴巖溜晴芳飄野叢海雲懸􅄓母山果屬狙公忽憶吴興郡白蘋正葱蘢願言挹風采邈若窺華嵩桂水夏瀾急火山宵熖紅三衣濡菵露一錫飛煙空勿謂飜譯徒不為文雅雄古來賞音者樵爨得孤桐按狙公宜斥賦芧者而越絶書有猿公張衡賦南都有猿父長嘯之句古文士又云權父繇是而言謂猿為父舊矣贈日本僧智藏浮桮萬里過滄溟遍禮名山適性靈深夜降龍潭水黒新秋放鶴野田青身無彼我那懐土心㑹真如不讀經為問中華學道者幾人雄猛得寜馨贈眼醫婆羅門僧三秋傷望逺終日泣途窮兩目今先暗中年似老翁看朱漸成碧羞日不禁風師有金箆術如何為發蒙海陽湖别浩初師并引瀟湘間無土山無濁水民乗是氣往往清慧而文長沙人浩初生既因地而清矣故去葷洗慮剔顛毛而壊其衣居一都之殷易與士㑹得執外教盡捐苛禮自公侯守相必賜其清問耳目灌注習浮於性而里中兒賢適與浩初比者嬰冠帶豢妻子吏得以乗陵之汩没天慧不得自奮莫可望浩初之清光於侯門上坐第自吟羨而已浩初益自多其術尤勇於近達者而歸之往年之臨賀唁侍郎楊公留嵗餘公遺以七言詩手筆于素前年省柳儀曹于龍城又為賦三篇皆章書今復來連山以前所得雙南金出於裓亟請余賡之按師為詩頗清而奕棋至}
