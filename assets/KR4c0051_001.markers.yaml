  - {type: variant, offset: 3583, length: 0, content: '', WYG: 斜銜泥燕子争歸舎獨自狂夫不憶家濯錦江邊兩岸花春風吹浪正淘沙女郎剪下鴛鴦錦將向中流定晚霞日照澄洲江霧開淘金女伴滿江隈美人首飾侯王印盡是沙中浪底來八月濤聲吼地來頭髙數丈觸山回須臾卻入海門去巻起沙堆似雪堆莫道讒言如浪深莫言遷客似沙沈千淘萬灑雖辛苦吹盡狂沙始到金流水淘沙不暫停前波未滅後波生令人忽憶瀟湘渚回唱迎神三兩聲瀟湘神二首湘水流湘水流九疑雲物至今愁君問二妃何處所零陵香草露中秋斑竹枝斑竹枝淚痕㸃㸃寄相思楚客欲聴瑶瑟怨瀟湘深夜月明時抛毬樂詞二首五綵繡團圓登君瑇瑁筵最宜紅燭下偏稱落花前上客如先起應須贈一船春蚤見花枝朝朝恨}
