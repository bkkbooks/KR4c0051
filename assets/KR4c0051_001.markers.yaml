  - {type: variant, offset: 3502, length: 0, content: '', WYG: 尋歸路多參差如何將此千行淚更灑湘江斑竹枝秋扇詞莫道恩情無重來人間榮謝遞相催當時初入君懐袖豈念寒鑪有死灰搗衣曲爽砧應秋律繁杵含凄風一一逺相續家家音不同户庭凝露清伴侣明月中長裾委襞積輕佩垂􅋛瓏汗餘衫更馥鈿移麝半空報寒驚邊雁促思聞候蟲天狼正芒角虎落定相攻盈篋寄何處征人如轉蓬七夕二首河鼓靈旗動姮娥破鏡斜滿空天是幕徐轉斗為車機罷猶安石橋成不礙查寜知觀津女竟夕望雲涯天衢啓雲帳神馭上星橋初喜渡河漢頻驚轉斗杓餘霞張錦幛輕電閃紅綃非是人間世還悲後㑹遥龍陽縣歌縣門白日無塵土百姓縣前挽魚罟主人引客登大隄小人縱觀黄犬怒鷓鴣驚鳴遶籬落橘柚垂芳照窻户沙平草緑見吏稀寂歴斜陽照懸鼓度桂嶺歌桂陽嶺下下復髙髙人稀鳥獸駭地逺草木豪寄言千金子知余歌者勞插田歌并引連州城下俯接村墟偶登郡樓適有所感遂書其事為俚歌以俟采詩者岡頭花草齊燕子東西飛田塍望如線白水光參差農婦白紵裙農夫緑蓑衣齊唱田中歌嚶儜如竹枝但聞怨響音不辨俚語詞時時一大笑此必相嘲嗤水平苗漠漠烟火生墟落黄犬往復還赤雞鳴且啄路傍誰家郎烏帽衫袖長自言上計吏年初離帝鄉田夫語計吏君家儂定諳一來長安罷眼大不相參計吏笑致辭長安真大處省門髙軻峩儂入無度數昨來補衞士唯用筒竹布君看二三年我作官人去畬田作何處好畬田團團縵山腹鑚龜}
