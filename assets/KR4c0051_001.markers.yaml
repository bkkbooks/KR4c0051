  - {type: variant, offset: 3591, length: 1, content: 王, WYG: 公之孫坐事除名昔黍南宫郎往來東觀頻嘗披燕文傳聳若窺三辰翊聖崇國本保賢正朝倫髙視緬今古清風夐無鄰蘭錡照通衢一家十朱輪鄼國嗣侯絶蒍鄉貴業貧夫子承大名}
