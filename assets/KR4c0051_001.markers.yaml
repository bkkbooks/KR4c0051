  - {type: variant, offset: 3500, length: 0, content: '', WYG: 歌休唱貞元供奉曲當時朝士已無多渾侍中宅牡丹徑尺千餘朶人間有此花今朝見顔色更不向諸家唐郎中宅與諸公同飲酒㸔牡丹今日花前飲甘心醉數杯但愁花有語不為老人開與歌者何戡二十餘年别帝京重聞天樂不勝情舊人唯有何戡在更與殷勤唱渭城與歌童田順郎天下能歌御史娘花前月底奉君王九重深處無人見分付新聲與順郎燕尓館破屏風所畫至精人多歎賞題之畫時應遇空亡日賣處難逢識别人唯有多情往來客強將衫袖拂埃塵賞牡丹庭前芍藥妖無格池上芙蕖浄少情唯有牡丹真國色花開時節動京城寄陜州姚中丞時分司東都八月天地肅二陵風雨收旌旗闕下來雲日闗東秋禹跡想前事漢臺餘故丘裵囘襟帶地左右帝王州留滯悲昔老㤙光榮徹侯相思望棠樹一寄商聲謳奉酬湖州崔郎中見寄五韻山陽昔相遇灼灼晨葩鮮同遊翰墨場和樂塤箎然一落名宦途浩如乗風船行當衰莫日卧理淮海壖猶期謝病後共樂桑榆年}
