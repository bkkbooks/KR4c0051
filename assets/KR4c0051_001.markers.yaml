  - {type: variant, offset: 3584, length: 0, content: '', WYG: 遲及看花落後卻憶未開時幸有抛毬樂一桮君莫辭楊柳枝詞二首迎得春光先到來淺黄輕緑映樓臺只縁裊娜多情思便被春風長請挼巫峽巫山楊柳多朝雲莫雨逺相和因想陽臺無限事為君回唱竹枝歌竹枝詞二首楊柳青青江水平聞郎江上唱歌聲東邊日出西邊雨道是無晴還有晴}
