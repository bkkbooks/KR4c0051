  - {type: variant, offset: 3585, length: 0, content: '', WYG: 水巴山江雨多巴人能唱本鄉歌今朝北客思歸去回入紇那披緑羅紇那曲詞二首楊柳鬱青青竹枝無限情周郎一回顧聴唱紇那聲蹋曲興無窮調同詞不同願郎千萬夀長作主人翁右已上詞先不入集伏縁播在樂章今附于巻未劉賔客文集巻二十七欽定四庫全書劉賔客文集巻二十八唐劉禹錫撰送别四十六首送工部張侍郎入蕃弔祭時張兼修史月窟賔諸夏雲官降九天飾終隣好重錫命禮容全水咽猶登隴沙鳴稍極邊路因乗驛近志為飲冰堅毳帳差池見鳥旗揺曳前歸來賜金石榮耀自編年蚤秋送臺院楊侍御歸朝兄弟四人遍歴諸科二人同在仙署棣華春當時已絶倫今朝丹闕下更入白眉人重振髙陽族分居要路津一門科第足五府辟書頻鷙鳥得秋氣法星懸火旻聖朝寰海静所至不埋輪送工部蕭郎中刑部李郎中並以本官兼中丞分命充京西京北覆糧使霜簡映金章相輝同舍郎天威巡虎落星使出鴛行尊俎成全䇿京坻閱見糧歸來虜塵滅畫地奏明光送李尚書鎮滑州自浙西觀察徴拜兵部侍郎月餘有此拜南徐報政入文昌東郡須才别建章視草名髙同蜀客擁旄年少勝荀郎黄河一曲當城下緹騎千重照路傍自古相門還出相如今人望在巖廊其後果繼韋平之族送渾大夫赴豐州自大鴻臚拜家承舊勲鳯銜新詔降恩華又見旌旗出渾家故吏來辭辛屬國精兵願逐李輕車氊裘君長迎風懼錦領酋豪蹋雪衙其奈明年好春日無人喚看牡丹花送源中丞充新羅冊立使侍中之孫相門才子稱華簮持節東行捧徳音身帶霜威辭鳯闕口傳天語到雞林煙開鼇背千尋碧日浴鯨波萬頃金想見扶桑受恩後一時西拜盡傾心送陸侍御歸淮南使府五韻用年字江左重詩篇陸生名久傳鳯城來已熟羊酪不嫌羶歸路芙蓉府離堂瑇瑁筵秦山呈臘雪隋柳布新年曽忝揚州薦因君達短牋時段丞相鎮揚州嘗辱表薦送太常蕭博士棄官歸養赴東都時元兄罷相為少師仲兄為郎官並􅀆司洛邑兄弟盡鴛鸞歸心切問安貪榮五采服遂挂兩梁冠侍膳曽調鼎循陔更握蘭從今别君後長向徳星看送王司馬之陜州自太常丞授工為詩暫輟清齋出太常空攜詩巻赴甘棠府公既有朝中舊司馬應容酒後狂案牘來時唯署字風煙入興便成章兩京大道多遊客每遇詞人戰一場洛中送楊處厚入闗便遊蜀謁韋令公洛陽秋日正淒淒君去西秦更向西舊學三冬今轉富曽傷六翮養初齊王城曉入窺丹鳯蜀路晴來見碧雞蚤識卧龍應有分不妨從此躡丹梯}
