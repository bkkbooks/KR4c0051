  - {type: variant, offset: 3508, length: 2, content: 詩荅, WYG: 雨後苕穎如雲發巴人拱手吟耕耨不闗心由來得地勢徑寸有餘隂蒲桃歌野田生蒲桃纒繞一枝蒿移來碧墀下張王日日髙分岐浩繁縟脩蔓蟠詰曲揚翹向庭柯意思如有屬為之立長架布濩當軒緑米液溉其根理疎看滲漉繁葩組綬結懸實珠璣蹙馬乳帯輕霜龍鱗躍初旭有客汾隂至臨堂瞪雙目自言我晉人種此如種玉醸之成美酒令人飲不足為君博一斗往取涼州牧鶗鴂吟朝陽有吟鳯不聞千萬祀鶗鴂催衆芳晨間先入耳秋風}
