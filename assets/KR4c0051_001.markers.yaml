  - {type: variant, offset: 3716, length: 0, content: '', WYG: 留守再命太原本封晉國公兩任相去十六年星使出闗東兵符賜上公山河歸舊國管籥換離宫行色旌旗動軍聲鼓角雄愛棠餘故吏騎竹見新童漢壘三秋静邊塵萬里空其如天下望旦夕詠清風奉送李户部侍郎自河南尹再除本官歸闕昔年内署振雄詞今日東都結去思宫女猶傳洞簫賦國人先詠衮衣詩華星却復文昌位别鶴重歸太一池想到金門待通籍一時驚喜見風儀送蘄州李郎中赴任楚闗蘄水路非賒東望雲山日夕佳薤葉照人呈夏簟松花滿盌試新茶樓中飲興因明月江上詩情為晚霞北地交親長引領蚤將𤣥鬢到京華洛中春末送杜録事赴蘄州尊前花下長相見明日忽為千里人君過午橋回首望洛城猶自有殘春夜宴福建盧侍御宅因送之鎮暫駐旌旗洛水隄綺筵紅燭醉蘭閨美人美酒長相逐莫怕猿聲發建溪洛中送崔司業使君扶侍赴唐州緑野方城路殘春柳絮飛風鳴驌驦馬日照老萊衣洛苑魚書至江村雁户歸相思望淮水雙鯉不應稀送河南皇甫少尹赴絳州祖帳臨周道前旌指晉城午橋羣吏散亥字老人迎詩酒同行樂别離方見情從兹洛陽社吟詠欠書生送前進士蔡京赴學究科時舊相楊尚書掌選耳聞戰鼓帶經鋤振發名聲自里閭已是世間能賦客更攻窻下絶編書朱門達者誰能識絳帳諸生盡不如幸遇天官舊丞相知君無翼上空虚送唐舍人出鎮閩中暫辭鴛鷺出蓬瀛忽擁貔貅鎮粤城閩嶺夏雲迎皂葢建溪秋樹映紅旌山川逺地由來好富貴當年别有情了却人間婚嫁事復歸朝右作公卿送盧處士歸嵩山别業世業嵩山隠雲深無四鄰藥鑪燒姹女酒􅀢貯賢人曉日華隂霧秋風函谷塵送君從此去鈴閤少談賔送李友路秀才赴舉誰憐相門子不語望秋山生長紈綺内辛勤筆硯間榮親在名字好學棄宫班佇俟明年桂髙堂開笑顔送國子令狐博士赴興元覲省相門才子髙陽族學省清資五品官諌院過時榮棣萼謝庭歸去蹋芝蘭山頭花帶烟嵐晚棧底江涵雪水寒伯仲到家人盡賀栁營蓮府遞相歡送李二十九兄員外赴邠寜使幕家襲韋平身業文素風清白至今貧南宫通籍新郎吏西候從戎舊主人城外草黄秋有雪烽頭煙静虜無塵鼎門為别霜天晚賸把離觴三五巡送分司陳郎祗召直史館重修三聖實録蟬鳴官樹引行車言自成周赴玉除逺取南朝貴公子重修東觀帝王書常時載筆窺金匱暇日登樓到石渠若問舊人劉子政如今頭白在商於送李中丞赴楚州緹騎朱旗入楚城士林皆賀振家聲兒童但喜迎賢守故吏猶應記小名萬頃水田連郭秀四時煙月映淮清憶君初得崑山玉同向揚州攜手行送李庚先輩赴選一家何啻十朱輪諸父雙飛秉大鈞曽脱素衣參幕客却為精舍讀書人離筵洛水侵桮色征路函闗向晚塵今日山公舊賔主知君不負帝城春送廖參謀東遊二首九陌逢君又别離行雲别鶴本無期望嵩樓上忽相見看過花開花落時繁花落盡君辭去緑草垂楊引征路東道諸侯皆故人留連必是多情處送從弟郎中赴浙西并引從弟三復十餘年間凡三為浙右從事往年主公入相薦敭登朝中復從公鎮南未幾而罷昨以尚書外郎奉使至洛旋承新命改轅而東三從公皆在舊地徵諸故事夐無其倫故賦詩贈之以志異也銜命出尚書新恩換使車漢庭無右者梁苑重歸歟又食建業水曽依京口居劉前軍傳云本莒人世家京口共經何限事賔主兩如初劉賔客文集巻二十八欽定四庫全書劉賔客文集巻二十九唐劉禹錫撰送僧二十四首贈别君素上人并引曩予習禮之中庸至不勉而中不思而得􅌶然知聖人之徳學以至于無學然而斯言也猶示行者以室廬之奥耳求其徑術以布武未易得也晚讀佛書見大雄念物之普級寳山而梯之髙揭慧火巧鎔惡見廣疎便門旁求邪徑其所證入如舟沿川未始念於前而日逺矣夫何勉而思之邪是余知穾音窈奥於中庸啓鍵闗於内典㑹而歸之猶初心也不知予者誚予困而後援佛謂道有二焉夫悟不因人在心而已其證也猶喑人之享太牢信知其味而不能形於言以聞于耳也口耳之間兼寸耳尚不可使聞它人之不吾知宜矣開士君素偶得予於所親一麻棲草千里來訪素以道眼視予予以所視視之不由陛級攜手智地居數日告有得而行乃為詩以見志云窮巷唯秋草髙僧獨扣門相歡如舊識問法到無言水為風生浪珠非塵可昏去來皆是道此别不銷魂送深法師遊南岳上人本在資聖寺師在白雲鄉名登善法堂十方傳句偈八部㑹壇場飛錫無定所寳書留舊房唯應銜草雁相送至衡陽廣宣上人寄在蜀與韋令公唱和詩巻因以令公手札答詩示之碧雲佳句久傳芳曽向成都住草堂振錫常過長者宅披文猶帶令公香一時風景添詩思八部人天入道場若許相期同結社吾家本自有柴桑送僧仲剬東遊兼寄呈靈澈上人釋子道成神氣閑住持曽上清涼山晴空禮拜見真像金毛五髻卿雲間西遊長安𨽻僧籍本是門前曲江碧松間白月照寳書竹下香泉灑瑶席前時學得經綸成奔馳象馬開禪扄髙筵談柄一麾拂講下聴徒如醉醒舊聞南方多長老次第來入荆門道荆州本自重彌天南朝塔廟猶依然宴坐東陽枯樹下經行居止故臺邊忽憶遺民社中客為我衡陽駐飛錫講罷同尋相鶴經閑來共蠟登山屐一旦揚眉望沃州自言王謝許同遊慿將雜擬三十首寄與江南湯慧休送僧元暠南遊并引予䇿名二十年百慮而無一得然後知世所謂道無非畏途唯出世間法可盡心耳繇是在席硯者多旁行胡岡反四句之書備將迎者皆赤頿白足之侣罙入智地静通還源客塵觀盡妙氣來宅内視胷中猶煎鍊然開士元暠姓陶氏本丹陽居家世有人爵不藉其資於毗尼禪那極細牢之義於中後日習總持之門妙音奮迅願力昭荅雅聞子事佛而佞亟來相從或問師隳形之自對曰小失怙恃推棘心以求上乗積四十年有羸老將至而不懈始悲浚泉之有洌今痛防墓之未遷塗芻莫備薪火恐滅諸相皆離此心長懸雖萬性歸佛盡為釋種如何入海無復水名然其一切智者豈遺百行求無量義者寜容㫁思今聞南諸侯雅多大士思扣以苦調而希其末光無容至前有足悲者予聞是説已力不足而悲有餘因為詩以送之庶乎踐霜露者聆之有惻寳書飜譯學初成振錫如飛白足輕彭澤因家凡幾世靈山預㑹是前生傳鐙已悟無為理濡露猶懐罔極情從此多逢大居士何人不願解珠瓔送如智法師遊辰州兼寄許評事前日過蕭寺看師上講筵都人禮白足施者散金錢方便無非教經行不廢禪還知習居士發論達彌天贈長沙讃頭陀外道邪山千萬重真言一發盡摧峯有時明月無人夜獨向昭潭制惡龍送慧則法師上都因呈廣宣上人并引師精浄名經佛示滅後大弟子演聖言而成經傳心印曰法承法而能專曰宗由宗而分教曰友坐而攝化者勝義皆空之宗也行而宣教者摧破邪山之友也釋子慧則生於像季思濟劫濁乃學於一友開彼羣迷以為盡妙理者莫如法門變凡夫者莫如佛土悟無染者莫如散花故業于浄名深達實相自京師涉漢沔歴鄢郢登熊湘聴徒百千耳感心化法無住道行而歸顧予有社内之因故言别之日愛縁瞥起時也秋盡詠江淹雜擬以送之前見宣上人為我多謝昨日東林看講時都人象馬蹋瑠璃雪山童子應前世金粟如來是本師一錫言歸九城路三衣曽拂萬年枝休公久别如相問楚客逢秋心更悲秋日過鴻舉法師寺院便送歸江陵并引梵言沙門猶華言去欲也能離欲則方寸地虚虚而萬景入入必有所泄乃形乎詞詞妙而深者必依于聲律故自近古而降釋子以詩聞于世者相踵焉因定而得境故翛然以清由慧而遣詞故粹然以麗信禪林之蘤萼而誡河之珠璣耳初鴻舉學詩於荆郢間私試竊詠發於餘習葢榛楛之翠羽弋者未之眄焉今年至武陵二千石始竒之有起予之歎以方袍親絳紗者十有餘旬繇是名稍聞而藝愈變閏八月余步出城東門謁仁祠而鴻舉在焉與之言移時因告以將去且曰貧道雅聞東諸侯之工為詩者莫若武陵今幸承其話言如得法印寳山之下宜有所持豈徒衣裓之中衆花而已余聞是説乃叩商而吟成一章章八句郡守以坐嘯餘詠激清徵而應之師其行乎足以資一時中之學矣看畫長廊遍尋僧一徑幽小池兼鶴浄古木帶蟬秋客至茶煙起禽歸講席收浮杯明日去相望水悠悠重送鴻舉赴江陵謁馬逢侍御西北秋風彫蕙蘭洞庭波上碧雲寒茂陵才子江陵住乞取新詩合掌看送僧方及南謁柳員外并引九江僧方及既出家依厈山一時中頗屬詩以攄思古詩人暨今號為能賦有輒求其詞吟呻之拳拳然多多益嗜影不出山者十年常登最髙峯四望天海沖然有逺遊之志頓錫而言曰神馳而形閡者方内之徒及吾無方間於何者繇是耳得必目探之意行必身隨之雲遊鳥仚虚筵反無迹而逺予為連州居無何而方及至出裓中詩一篇以貺予其詞甚富留一嵗觀其行結矩如教益多之一旦以行日來告且曰雅聞鳥咮之下有賢諸侯願躋其門如蹈十地敢乞詞以抵之予唯而賦顧其有重請之色起於顔間耳昔事廬山逺精舍虎溪東朝陽照瀑水樓閣虹霓中騁望羨游雲振衣若秋蓬舊房閉松月逺思吟江風古寺歴頭陀竒峯攀祝融南登小桂嶺卻望歸塞鴻衣裓貯文章自言學雕蟲搶榆念陵厲覆籄圖穹崇逺郡多暇日有詩訪禪宫石門聳峭絶竹院含空濛幽響滴巖溜晴芳飄野叢海雲懸􅄓母山果屬狙公忽憶吴興郡白蘋正葱蘢願言挹風采邈若窺華嵩桂水夏瀾急火山宵熖紅三衣濡菵露一錫飛煙空勿謂飜譯徒不為文雅雄古來賞音者樵爨得孤桐按狙公宜斥賦芧者而越絶書有猿公張衡賦南都有猿父長嘯之句古文士又云權父繇是而言謂猿為父舊矣贈日本僧智藏浮桮萬里過滄溟遍禮名山適性靈深夜降龍潭水黒新秋放鶴野田青身無彼我那懐土心㑹真如不讀經為問中華學道者幾人雄猛得寜馨贈眼醫婆羅門僧三秋傷望逺終日泣途窮兩目今先暗中年似老翁看朱漸成碧羞日不禁風師有金箆術如何為發蒙海陽湖别浩初師并引瀟湘間無土山無濁水民乗是氣往往清慧而文長沙人浩初生既因地而清矣故去葷洗慮剔顛毛而壊其衣居一都之殷易與士㑹得執外教盡捐苛禮自公侯守相必賜其清問耳目灌注習浮於性而里中兒賢適與浩初比者嬰冠帶豢妻子吏得以乗陵之汩没天慧不得自奮莫可望浩初之清光於侯門上坐第自吟羨而已浩初益自多其術尤勇於近達者而歸之往年之臨賀唁侍郎楊公留嵗餘公遺以七言詩手筆于素前年省柳儀曹于龍城又為賦三篇皆章書今復來連山以前所得雙南金出於裓亟請余賡之按師為詩頗清而奕棋至第三品二道皆足以取幸於士大夫宜薰餘習以深入也㑹吴郡以山水冠世海陽又以竒甲一州師慕道於泉石宜篤故攜之以嬉及言旋復引與共載於湖上奕於樹石間以植沃州之因縁且賦詩具道其事近郭有殊境獨遊常鮮懽逢君駐緇錫觀白稱林巒湖滿景方霽野香春未闌愛泉移席近聞石輟棋看風止松猶韻花繁露晚乾橋形出樹曲巖影落池寒湘東架險凡四橋山下出泉逗嵓為池泓澄可愛者不可遍舉故狀其境以貽好事别路千嶂裏詩情莫雲端它年買山處似此得隳官觀棋歌送儇師西遊長沙男子東林師閒讀藝經工奕棋有時凝思如入定暗覆一局誰能知今年訪余來小桂方袍袖中貯新勢山城無事愁日長白晝懵懵眠匡牀因君臨局看鬭智不覺遲景沈西牆自從山人遇樵子直到開元王長史前身後身付餘習百變千化無窮已初疑磊落曙天星次見搏撃三秋兵雁行布陳衆未曉虎穴得子人皆驚行盡三湘不逢敵終日饒人損機格自言臺閣有知音悠然逺起西遊心商山夏木隂寂寂好處裵􅏆駐飛錫忽思争道畫平沙獨笑無言心有適藹藹京城在九天貴遊豪士足華筵此時一行出人意賭取聲名不要錢贈别約師并引荆州人文約市井生而雲鶴性故去葷為浮圖生寤而證入與南抵六祖始生之墟得遺教甚悉今年訪余于連州且曰貧道昔浮湘川㑹柳儀曹謫零陵宅于佛寺幸聫棟而居者有年繇是時人大士得落耳界夫聞為見因今日之來曩時之因耳時儀曹牧柳州與八句贈别師逢吴興守相伴住禪扄春雨同栽樹秋鐙對講經廬山曽結社桂水逺揚舲話舊還惆悵天南望柳星送鴻舉師江南并引始余謫朗州爾時是師振麻衣斐然而前持文篇以為僧贄唧唧而清如蟲吟秋自然之響無有假合有足佳者故為賦二章以聲之距今年遇于建平赤􅀈益蕃文思益深而内外學益富既訊已探裓中出前所與詩閱之紙勞墨瘁與我同來因思夫苒苒之光渾渾之輪時而言有初中後之分日而言有今昨明之稱身而言有幼壯艾之期乃至一謦欬一彈指中際皆具何必求三生以異身邪然而視余之文昔與今有莛楹之别視余之書昔與今有鈞石之懸視余之仕昔與今乃唯阿之差耳豈有工拙之數存乎其間哉葢可勉而進者與日月而至矣彼儻來外物雖日月無能至焉是嵗師告余遊江西復為賦七言以為遊地爾禪客學禪兼學文出山初似無心雲從風巻舒來處處繚繞巴山不得去山州古寺好閒居讀盡龍王宫裏書使君灘頭揀石硯白帝城邊尋野蔬忽然登髙心瞥起又欲浮桮信流水烟波浩淼魚鳥情東去三千三百里荆門硤㫁無盤渦湘平漢濶清光多廬山霧開見瀑布江西月浄聞漁歌鍾陵八部多名守半是西方社中友與師相見便談空想得髙齋獅子吼送霄韻上人遊天台曲江僧向松江見又道天台看石橋鶴戀故巢雲戀岫比君猶自不逍遙送義舟師卻還黔南并引黔之鄉在秦楚為争地近世人多過言其幽荒以談笑聞者又從而張皇之猶夫束蕰逐原燎或近乎語妖適有沙門義舟道黔江而來能畫地為山川及條其風俗纎悉可信且曰貧道以一錫遊它方衆矣至黔而不知其逺始遇前節使而聞今節使益賢而文故其佐多才士摩圍之下曳裾秉筆彬然與園同風蕃僧以外學嗜篇章時或攝衣為末至客其來也約王人乗秋風而還今乞詞以颺之如捧意珠行住坐卧知相好耳余曰唯命筆為七言以應之黔江秋水浸雲霓獨泛慈航路不迷猿狖窺齋林葉動蛟龍聞呪浪花低如蓮半偈心常悟問菊新詩手自攜常説摩圍似靈鷲卻將山屐上丹梯送景𤣥師東歸并引廬山僧景𤣥袖詩一軸來謁往往有句輕而遒如鶴雛襹䙕未有六翮而步舒視逺戞然一唳乃非泥滓間物獻詩已斂裓而辭且曰其來也與故山秋為期夫丐者僧事也今無它請唯文是求故賦一篇以代瓔珞耳東林寺裏一沙彌心愛當時才子詩山下偶隨流水出秋來卻赴白雲期灘頭躡屐挑沙菜路上停舟讀古碑想到舊房抛錫杖小松應有過檐枝送元曉上人歸稽亭重疊稽亭路山僧歸獨行逺峯斜日影本寺舊鐘聲徒侣問新事烟雲含别情應誇乞食處蹋遍鳯凰城送惟良上人并引以貌窺天者曰乾然健單于然而髙以數迎天者曰其用四十有九天果以有形而不能脱乎數立象以推莢既成而遺之古所謂神交造物者非空言耳軒皇受天命其佐皆聖人故得之惟唐繼天徳如黄帝有外臣一行亦聖之徒與刋歴考元書成化去今丹徒人惟良生而能知非自外求以乾坤之莢當十期之數凝神運指上感躔次視𤣥黄溟涬無倪有常絶機泯知獨以神㑹數起於復之初九音生乎黄鍾之宫積微本隠言與化合夫天人之數極而含變變而靡不通神趨鬼懾不足駭也惟良得一行之道故亦慕其為外臣謬謂余為世間聰明孑孑來訪初以説合至于不言言息而理冥復申之以嗟歎曰師其庶幾乎信神與之而不能測神之所以付信術通之而不能知術之所以淺哉余聞乎曽井蛙醯雞之不若也長慶四年冬十一月甲子語至夜艾遂為詩以志焉髙齋灑寒水是夕山僧至𤣥牝無闗鎖瓊書捨文字鐙明香滿室月午霜凝地語到不言時世間人盡睡送元簡上人適越孤雲出岫本無依勝境名山即是歸久向吴門遊好寺還思越水洗塵機浙江濤驚師子吼稽嶺峯疑靈鷲飛更入天台石橋路垂珠璀璨拂三衣送宗宻上人歸南山草堂寺因詣河南尹白侍郎宿習脩來得慧根多聞第一卻忘言自從七祖傳心印不要三乗入便門東泛滄江尋古跡西歸紫閣出塵喧河南白尹大檀越好把真經相對飜劉賔客文集巻二十九欽定四庫全書劉賔客文集巻三十唐劉禹錫撰哀挽悲傷三十八首徳宗神武孝文皇帝挽歌二首出震清多難乗時播大鈞操弦調六氣揮翰動三辰運偶升天日哀深率土人瑶池無轍跡誰見屬車塵鳯翣擁銘旌威遲異吉行漢儀陳祕器楚挽咽繁聲駐綍辭清廟凝笳背直城唯應留内傳知是向蓬瀛敬宗睿武昭愍孝皇帝挽歌三首寳歴方無限仙期忽有涯事親崇漢禮傳聖法殷家晚出芙蓉闕春歸棠棣華玉輪今日動不是畫雲車任賢勞夢寐登位富春秋欲逐東人幸寜虞杞國憂長楊收羽騎太液泊龍舟唯有衣冠在年年愴月遊講學金華殿親耕鈎盾田侍臣容諫獵方士信求仙虹影俄侵日龍􅐖不上天空餘水銀海長照夜鐙前文宗元聖昭獻孝皇帝挽歌三首繼體三才理承顔九族親禹功留海内殷歴付天倫調露曲長在秋風詞尚新本支方百代先讓棣華春月落宫車動風凄儀仗閒路唯瞻鳯翣人尚想龍顔御宇方無事乗雲遂不還聖情悲望處兄日下西山享國十五載升天千萬年龍鑣仙路逺騎吹禮容全日下初陵外人悲舊劒前周南有遺老掩淚望秦川故相國燕國公于司空挽歌二首彤弓封舊國黒矟繼前功十年鎮南雍九命作司空池臺樂事盡簫鼓葬儀雄一代英豪氣曉㪚白楊風隂山貴公子來塟五陵西前馬悲無主猶帶朔風嘶漢水青山郭襄陽白銅蹄至今有遺愛日暮人悽悽重至衡陽傷柳儀曹并引元和乙未嵗與故人栁子厚臨湘水為别栁浮舟適栁州余登陸赴連州後五年余從故道出桂嶺至前别處而君没於南中因賦詩以投弔憶昨與故人湘江岸頭别我馬映林嘶君颿轉山滅馬嘶循故道颿滅如流電千里江蘺春故人今不見謫居悼往二首邑邑何邑邑長沙地卑濕樓上見春多花前恨風急猿愁腸㫁叫鶴病翹趾立牛衣獨自眠誰哀仲卿泣鬱鬱何鬱鬱長安逺於日終日念鄉闗燕來鴻復還潘岳嵗寒思屈平顦顇顔殷勤望歸路無雨即登山哭吕衡州時余方謫居一夜霜風彫玉芝蒼生望絶士林悲空懐濟世安人略不見男婚女嫁時遺草一函歸太史旅墳三尺近要離朔方徙嵗行當滿欲為君刋第二碑遙傷段右丞江湖舊遊南宫交代江海多豪氣朝廷有直聲何言馬蹄下一旦是佳城傷桃源薛道士壇邊松在鶴巢空白鹿閑行舊逕中手植紅桃千樹發滿山無主任春風王思道碑堂下作蒼蒼宰樹起寒烟尚有威名海内傳四府舊聞多故吏幾人垂淚拜碑前遙傷丘中丞并引河南丘絳有詞藻與余同升進士科從事鄴下不幸遇害故為傷詞鄴下殺才子蒼忙寃氣凝枯楊映漳水野火上西陵馬鬛今無所龍門昔共登何人為弔客唯是有青蠅傷獨孤舍人并引貞元中余以御史監祠事河南獨孤生始仕為奉禮郎有事宗廟郊畤必與之俱繇是甚熟及余謫武陵九年間獨孤生仕至中書舍人視草禁中上方許以宰相元和十年春余祗召抵京師次都亭日舍人疾不起余聞因作傷詞以為弔昔别一年少今悲䘮國華逺來同社燕不見早梅花途次敷水驛伏覩華州舅氏昔日行縣題詩處潸然有感昔日股肱守朱輪兹地遊繁華曰已謝章句此空留蔓草佳城閉故林棠樹秋今來重垂淚不忍過西州湖南觀察使故相國袁公挽歌三首五驅龍虎節一入鳯凰池令尹自無喜羊公人不疑天歸京兆日葉下洞庭時湘水秋風至凄涼吹素旗丹旐發江臯人悲雁亦號湘南罷亥市漢上改詞曹表墓雙碑立尊名一字褒常聞平楚獄為報里門高返葬三千里荆衡達帝畿逢人即故吏拜奠盡沾衣地得青烏相賔驚白鶴飛五公碑尚在今日亦同歸代靖安佳人怨二首并引靖安丞相武公居里名也元和十一年六月公將朝夜漏未盡三刻騎出里門遇盜薨于牆下初公為郎余為御史繇是有舊故今守于逺服賤不可以誄又不得為歌詩聲于楚挽故代作佳人怨以埤于樂府寳馬鳴珂蹋曉塵魚文匕首犯車茵適來行哭里門外昨夜華堂歌舞人秉燭朝天遂不回路人彈指望髙臺牆東便是傷心地夜夜秋螢飛去來傷愚溪三首并引故人柳子厚之謫永州得勝地結茅樹蔬為沼沚為臺榭目曰愚溪柳子没三年有僧遊零陵告余曰愚溪無復曩時矣一聞僧言悲不能自勝遂以所聞為七言以寄恨溪水悠悠春自來草堂無主燕飛回隔簾惟見中庭草一樹山榴依舊開草聖數行留壁壊木奴千樹屬鄰家唯見里門通徳榜殘陽寂寞出樵車柳門竹巷依依在野草青苔日月多縱有鄰人解吹笛山陽舊侣更誰過碧澗寺見元九侍御和展上人詩有三生之句因以和廊下題詩滿壁塵塔前松樹已鱗皴古來唯有王文度重見平生竺道人傷秦姝行并引河南房開士前為虞部郎中為余話曰我得善筝人于長安懐逺里其後開士為赤縣牧容州求國工而誨之藝工而夭今年開士遺予新詩有悼佳人之目顧予知所自也惜其有良妓獲所從而不克久乃為傷詞以貽開士長安二月花滿城插花女兒㺯銀筝南宫仙郎下朝晚曲頭駐馬聞新聲馬蹄逶遲心蕩􅃞髙樓已逺猶頻望此時意重千金輕鳥傳消息紺輪迎芳筵銀燭一相見淺笑低鬟初目成蜀弦錚摐指如玉皇帝弟子常家曲青牛文梓赤金簧玫瑰寳柱秋雁行斂蛾收袂凝清光抽弦緩調怨且長八鸞鏘鏘渡銀漢九雛威鳯鳴朝陽曲終韻盡意不足餘思悄絶愁空堂從郎鎮南别城闕樓船理曲瀟湘月馮夷躚躚舞渌波鮫人出聴停綃梭北池含煙瑶草短萬松亭下清風滿北池萬松皆容州勝槩秦聲一曲此時聞嶺泉嗚咽南雲㫁來自長陵小市東舜華零落瘴江風侍兒掩泣收銀甲鸚鵡不言愁玉籠博山鑪中香自滅鏡奩塵暗同心結從此東山非昔遊長嗟人與弦俱絶夔州竇員外使君見示悼妓詩顧余嘗識之因命同作前年曽見兩鬟時今日驚吟悼妓詩鳯管學成知有籍龍媒欲换歎無期空廊月照常行地後院花開舊折枝寂寞魚山青草裏何人更立智瓊祠竇夔州見寄寒食日憶故姬小紅吹笙因和之鸞聲窈眇管參差清韻初調衆樂隨幽院妝成花下㺯髙樓月好夜深吹忽驚莫槿飄零盡唯有朝雲夢想期聞道今年寒食日東山舊路獨行遲傷循州渾尚書貴人淪落路人哀碧海連天丹旐回遙想長安此時節朱門深巷百花開哭龎京兆少年有俊氣嘗擢制科之首俊骨英才氣襃然䇿名飛步冠羣賢逢時已自致髙位得疾還因倚少年天上别歸京兆府人間空歎茂陵阡今朝繐帳哭君處前日見鋪歌舞筵再傷龎尹京兆歸何處章臺空暮塵可憐鸞鏡下哭殺畫眉人哭王僕射相公名播時兼鹽鐵暴薨于侯一日病滕公千載歸門庭颯已變風物慘無輝羣吏謁新府舊賔沾素衣歌堂忽暮哭賀雀盡驚飛傷韋賔客縝自工部尚書除賔客韋公八十餘位至六尚書五福唯無富一生誰得如桂枝攀最久蘭省出仍初海内時流盡何人動素車再經故元九相公宅池上作故池春又至一到一傷情雁鶩羣猶下蛙蠙衣已生竹叢身後長臺勢雨來傾六尺孤安在人間未有名劉賔客文集巻三十欽定四庫全書劉賔客外集巻一唐劉禹錫撰詩}
