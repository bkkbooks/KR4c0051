  - {type: variant, offset: 3525, length: 0, content: '', WYG: 唧唧滿庭飛牆隂歌白日左右浮天潢朝晡影入東西牆昔為兒童在隂戯當時意小覺日長東隣侯家吹笙簧隨隂促促移象牀西隣田舍乏糟糠就影汲汲舂黄粱因思九州四海外家家只占牆隂内莫言牆隂數尺間老卻主人如等閒君看眼前光景促中心莫學太行山觀雲篇興雲感隂氣疾走如見機晴來意態行有若功成歸葱籠含晚景潔白凝秋暉夜深度銀漢漠漠仙人衣踏潮歌并引元和十年夏五月終風駕濤南海羨溢南人曰􅂿潮也率三更嵗一有之余為連州客或為予言其狀因歌之附于南越志屯門積日無回飇滄波不歸成􅂿潮轟如鞭石矻且揺亘空欲駕黿鼉橋驚湍蹙縮悍而驕大陵髙岸失岧嶤四邊無阻音響調背負元氣掀重霄介鯨得性方逍遥仰鼻嘘吸揚朱翹海人狂顧迭相招罽衣髽首聲嘵嘵征南將軍登麗譙赤旗指麾不敢囂翌日風回沴氣消歸濤納納景昭昭烏泥白沙復滿海海色不動如青瑶百花行長安百花時風景宜輕薄無人不沽酒何處不聞樂春風連夜動微雨陵曉濯紅熖出牆頭雪光映樓角繁紫韻松竹逺黄遶籬落臨路不勝愁輕飛去何託滿庭蕩魂魄照廡成丹渥爛熳嗾顛狂飄零勸行樂時節易晼晚清隂覆池閣唯有安石榴當軒慰寂寞春有情篇為問遊春侣春情何處尋花含欲語意草有鬭生心雨頻催發色雲輕不作隂縱令無月夜芳興暗中深路傍曲南山宿雨晴春入鳯皇城處處聞弦管無非送酒聲白鷺兒白鷺兒最髙格毛衣新成雪不敵衆禽喧呼獨凝寂孤眠芊芊草久立潺潺石前山正無雲飛去入遥碧壯士行隂風振寒郊猛虎正咆哮徐行出燒地連吼入黄茅壮士走馬去鐙前彎玉弰叱之使人立一發如鈹交悍睛忽星墮飛血濺林梢彪炳為我席羶腥充我庖里中欣害除賀酒紛號呶明日長橋上傾城看斬蛟邊風行邊馬蕭蕭鳴邊風滿磧生暗添弓箭力半上鼓鼙聲襲月寒暈起吹雲隂陳成將軍占氣候出號夜翻營一作安號畏飜城竹枝詞并引四方之歌異音而同樂嵗正月余來建平里中兒聫歌竹枝吹短笛撃鼔以赴節歌者揚袂睢舞以曲多為賢聆其音中黄鍾之羽卒章激訐如吴聲雖傖儜不可分而含思宛轉有淇濮之豔昔屈原居沅湘間其民迎神詞多鄙陋乃為作九歌到于今荆楚鼓舞之故余亦作竹枝詞九篇俾善歌者颺之附于末後之聆巴歈知變風之自焉白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動鄉情山桃紅花滿上頭蜀江春水拍山流花紅易衰似郎意水流無限似儂愁江上朱樓新雨晴瀼西春水縠文生橋東橋西好楊柳人來人去唱歌行日出三竿春霧消江頭蜀客駐蘭橈慿寄狂夫}
