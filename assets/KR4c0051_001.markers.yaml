  - {type: variant, offset: 3501, length: 0, content: '', WYG: 賓客文集巻二十五欽定四庫全書劉賔客文集巻二十六唐劉禹錫撰樂府上團扇歌團扇復團扇奉君清暑殿秋風入庭樹從此不相見上有乘鸞女蒼蒼網蟲遍明年入懐袖别是機中練荆州歌二首渚宫楊栁暗麥城朝雉飛可憐蹋青伴乘煗著輕衣今日好南風商旅相催發沙頭檣竿上始見春江濶紀南歌風烟紀南城塵土荆門路天寒多獵騎走上樊姬墓宜城歌野水遶空城行塵起孤驛荒臺側生樹石碣陽鐫額靡靡度行人温風吹宿麥順陽歌朝辭官軍驛前望順陽路野水齧荒墳秋蟲鏤官樹曽聞天寳末胡馬西南騖城守魯將軍拔城從此去馬嵬行緑野扶風道黄塵馬嵬驛路邉楊貴人墳髙三四尺乃問里中兒皆言幸蜀時軍家誅佞倖天子捨妖姬羣吏伏門屏貴人牽帝衣低回轉美目風日為無暉貴人飲金屑倐忽蕣英莫平生服杏丹顔色真如故屬車塵已逺里巷來窺覷共愛宿妆妍君王畫眉處履綦無復有履組光未滅不見巖畔人空見陵波襪郵童愛蹤跡私手解槃結傳看千萬眼縷絶香不歇指環照骨明首飾敵連城將入咸陽市猶得賈胡驚視刀環歌常恨言語淺不如人意深今朝兩相視脈脈萬重心三閣辭四首吴聲貴人三閣上日晏未梳頭不應有恨事嬌甚卻成愁珠箔曲瓊鉤子細見揚州北兵那得度浪語判悠悠沈香帖閣柱金縷畫門楣回首降旛下已見黍離離三人出眢井一身登檻車朱門漫臨水不可見鱸魚更衣曲博山炯炯吐香霧紅燭引至更衣處夜如何其夜漫漫鄰雞未鳴寒雁度庭前雪壓松桂叢廊下㸃㸃懸紗籠滿堂醉客争笑語嘈􅓐琵琶青幕中淮隂行五首古有長千行言三江之事悉矣余嘗阻風淮隂作淮隂行以禆樂府蔟蔟淮隂市行樓縁岸上好日起檣竿烏飛驚五兩金日轉船頭金烏指西北烟波與春草千里同一色船頭大銅鐶摩挲光陳陳蚤晚使風來沙頭一眼認何物令儂羨羨郎船尾燕銜泥趂檣竿宿食長相見隔浦望行船頭昻尾幰幰無奈挑菜時清淮春浪軟競渡曲競渡始於武陵至今舉檝而相和之其音咸呼云何在斯招屈之義事見圗經沅江五月平隄流邑人相將浮綵舟靈均何年歌已矣哀謡振檝從此起揚枹擊節雷闐闐亂流齊進聲轟然蛟龍得雨鬐鬛動螮蝀飲河形影聫刺史臨流褰翠幃揭竿命爵分雄雌先鳴餘勇争鼓舞未至銜枚顔色沮百勝本自有前期一飛由來無定所風俗如狂重此時縱觀雲委江之湄綵旗夾岸照鮫室羅襪陵波呈水嬉曲終人散空愁莫招屈亭前水東注隄上行三首酒旗相望大隄頭隄下連檣隄上樓日莫行人争渡急槳聲幽軋滿中流江南江北望烟波入夜行人相應歌桃葉傳情竹枝怨水流無限月明多長隄繚繞水裵回酒舍旗亭次第開日晚上簾招估客軻峩大艑落颿來采菱行武陵俗嗜芰菱嵗秋矣有女郎咸遊于馬湖薄言采之歸以御客古有采菱曲罕傳其詞故賦之以俟采詩者白馬湖平秋日光紫菱如錦綵鴛翔盪舟遊女滿中央采菱不顧馬上郎争多逐勝紛相向時轉蘭橈破輕浪長鬟弱袂動參差釵影釧文浮蕩漾笑語哇咬顧晚暉蓼花縁岸扣船歸歸來共到市橋步野蔓繫船萍滿衣家家竹樓臨廣陌下有連檣多估客攜觴薦芰夜經過醉蹋大隄相應歌屈平祠下沅江水月照寒波白烟起一曲南音此地聞長安北望三千里秋風引何處秋風至蕭蕭送雁羣朝來入庭樹孤客最先聞莫猺歌莫猺自生長名字無符籍市易雜鮫人婚姻通木客星居占泉眼火種開山脊夜渡千仞谿含沙不能射蠻子歌蠻語鈎輈音蠻衣斑斕布熏狸掘沙䑕時節祠盤瓠忽逢乗馬客怳若驚麕顧腰斧上髙山意行無舊路洞庭秋月行洞庭秋月生湖心曽波萬頃如鎔金孤輪徐轉光不定遊氣濛濛隔寒鏡是時白露三秋中湖平月上天地空岳陽城頭莫角絶蕩漾已過君山東山城蒼蒼夜寂寂水月逶迤繞城白盪槳巴童歌竹枝連檣估客吹羌笛勢髙夜久隂力全金氣肅肅開清躔浮雲野馬歸四裔首冠星斗當中天天雞相呼曙霞出斂影含光讓朝日日出喧喧人不閑夜夜清景非人間蹋歌詞四首春江月出大隄平隄上女郎連袂行唱盡新詞歡不見紅霞映樹鷓鴣鳴桃蹊柳陌好經過鐙下妆成月下歌為是襄王故宫地至今猶自細腰多新詞宛轉遞相傳振袖傾鬟風露前月落烏啼雲雨散遊童陌上拾花鈿日莫江南聞竹枝南人行樂北人悲自從雪裏唱新曲直到三春花盡時華清詞日出驪山東裵􅏆照温泉樓臺影玲瓏稍稍開白烟言昔太上皇常居此祈年風中聞清樂往往來列仙翠華入五雲紫氣歸上𤣥哀哀生人淚泣盡弓劒前聖道本自我凡情徒顒然小臣感𤣥化一望青冥天步虚詞二首阿母種桃雲海際花落子城二千嵗海風吹折最繁枝跪捧瓊槃獻天帝華表千年一鶴歸凝丹為頂雪為衣星星仙語人聴盡卻向五雲飜趐飛桃源行漁舟何招招浮在武陵水拕綸擲餌信流去誤入桃源行數里清源尋盡花綿綿蹋花覔徑至洞前洞門蒼黒烟霧生暗行數步逢虚明俗人毛骨驚仙子争來致詞何至此須臾皆破冰雪顔笑言委曲問人間因嗟隠身來種玉不知人世如風燭筵羞石髓勸客餐鐙爇松脂留客宿雞聲犬聲遥相聞曉光葱籠開五雲漁人振衣起出户滿庭無路花紛紛飜然恐迷鄉縣處一息不肯桃源住桃花滿溪水似鏡塵心如垢洗不去仙家一出尋無蹤至今水流山重重魏宫詞二首日晚長秋簾外報望陵歌舞在明朝添鑪火欲熏衣麝憶得分時不忍燒日映西陵松栢枝下臺相顧一相思朝來樂府長歌曲唱著君王自作詞阿嬌怨望見葳㽔舉翠華試開金屋埽庭花須臾宫女傳來信言幸平陽公主家九華山并引九華山在池州青陽縣西南九峯競秀神采竒異昔予仰太華以為此外無竒愛女几荆山以為此外無秀及今見九華始悼前言之容易也惜其地偏且逺不為世所稱故歌以大之竒峯一見驚魂魄意想洪鑪始開闢疑是九龍夭矯欲攀天忽逢霹靂一聲化為石不然何至今悠悠億萬年氣勢不死如騰仚音騫輕舉皃雲含幽兮月添冷日凝輝兮江􅃞影結根不得要路津逈秀長在無人境軒皇封禪登云亭大禹㑹計臨東溟乗樏力追反山行具不來廣樂絶獨與猿鳥愁青熒君不見敬亭之山黄索漠兀如㫁岸無稜角宣城謝守一首詩遂使名聲齊五岳九華山九華山自是造化一尤物焉能籍甚乎人間送春曲春向晚春晚思悠哉風雲日已改花葉自相催漠漠空中去何時天際來春已暮冉冉如人老映葉見殘花連天是青草可憐桃與李從此同桑棗春景去此去何時回遊人千萬恨落日上髙臺寂寞繁花盡流鶯歸不來初夏曲三首銅壺方促夜斗柄暫南回稍嫌單衣重初憐北户開西園花已盡新月為誰來時節過繁華隂隂千萬家巢禽命子戯園果墜枝斜寂寞孤飛蝶窺叢覔晚花緑水風初暖青林露早晞麥田雉朝雊桑野人莫歸百舌悲花盡無聲來去飛柳花詞三首開從緑條上散逐香風逺故取花落時悠揚占春晚輕飛不假風輕落不委地撩亂舞晴空發人無限思晴天黯黯雪来送青春莫無意似多情千家萬家去送春詞昨來樓上迎春處今日登樓又送歸蘭蘂殘妆含露泣柳條長袖向風揮佳人對鏡容色改楚客臨江心事違萬古至今同此恨無如一醉盡忘機秋詞二首自古逢秋悲寂寥我言秋日勝春朝晴空一鶴排雲上便引詩情到碧霄山明水浄夜來霜數樹深紅出淺黄試上髙樓清入骨豈知春色嗾人狂劉賔客文集巻二十六欽定四庫全書劉賔客文集巻二十七唐劉禹錫撰樂府下泰娘歌并引泰娘本韋尚書家主謳者初尚書為吴郡得之命樂工誨之琵琶使之歌且舞無幾何盡得其術居一二嵗攜之以歸京師京師多新聲善工於是又捐去故技以新聲度曲而泰娘名字往往見稱於貴遊之間元和初尚書薨於東京泰娘出居民間久之為蘄州刺史張愻所得其後愻坐事謫居武陵郡愻卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭其音燋殺以悲雒客聞之為歌其事以續于樂府云泰娘家本閶門西門前緑水環金隄有時妆成好天氣走上臯橋折花戯風流太守韋尚書路傍忽見停隼旟斗量明珠鳥傳意紺幰迎入專城居長鬟如雲衣似霧錦茵羅薦承輕步舞學驚鴻水榭春歌傳上客蘭堂莫從郎西入帝城中貴遊簪組香簾櫳低鬟緩視抱明月纎指破撥生胡風繁華一旦有消歇題劒無光履聲絶洛陽舊宅生草萊杜陵蕭蕭松栢哀妆奩蟲網厚如繭博山爐側傾寒灰蘄州刺史張公子白馬新到銅駝里自言買笑擲黄金月墮雲中從此始安知鵩鳥坐隅飛寂寞旅魂招不歸秦嘉鏡有前時結韓夀香銷故篋衣山城少人江水碧㫁雁哀猿風雨夕朱弦已絶為知音雲鬢未秋私自惜舉目風煙非舊時}
