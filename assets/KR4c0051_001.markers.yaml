  - {type: variant, offset: 3588, length: 0, content: '', WYG: 韓七中丞之吴興口號五首昔年意氣結羣英幾度朝回一字行海北天南零落盡兩人相見洛陽城自從雲散各東西每日歡娱却慘悽離别苦多相見少一生心事在書題今朝無意訴離桮何況清弦急管催本欲醉中輕逺别不知飜引酒悲來駱駝橋上蘋風起鸚鵡桮中箬下春水碧山青知好處開顔一笑向何人溪中士女出芭籬溪上鴛鴦避畫旗何處人間似仙境春山攜妓採茶時送周使君罷渝州歸郢州别墅君思郢上吟歸去故自渝南擲郡章野戍岸邊留畫舸緑蘿隂下到山莊池荷雨後衣香起庭草春深綬帶長只恐鳴騶催上道不容待得晚菘嘗發華州留别張侍御一作賈束簡下延閣買符驅短轅同人惜分袂結念醉芳樽切切别弦思蕭蕭征騎煩臨岐無限意相視却忘言張詩云夫子生知者相期妙理中遂有忘言之句奉送家兄歸王屋山隠居二首據道書王屋山一名陽洛山陽洛天壇上依俙似玉京夜分先見日月浄逺聞笙雲路将雞犬丹臺有姓名古來成道者兄弟亦同行春來山事好歸去憶逍遙水净苔莎色露香芝术苗登臺吸瑞景飛步翼神飊願薦塤箎曲相將學玉簫送王師魯協律赴湖南使幕即永穆公之孫翩翩馬上郎驅傳渡三湘橘樹沙洲暗松醪酒肆香素風傳竹帛高價騁琳琅楚水多蘭若何人事搴芳别友人後得書因以詩贈前時送君去揮手青門橋路轉不相見猶聞馬蕭蕭今得出闗書行塵日已遙春還遲君至共結芳蘭苕奉送浙西李僕射相公赴鎮奉送至臨泉驛書禮見徴拙詩時在汝州建節東行是舊逰歡聲喜􅂔滿吴州郡人重得黄丞相童子争迎郭細侯詔下初辭温室樹夢中先到景陽樓自憐不識平津閤遙望旌旗汝水頭重送浙西李相公頃廉問江南已經七載後歴滑臺劒南兩鎮遂入相今復領舊地新加旌旄江北萬人看玉節江南千騎引金鐃鳳從池上遊滄海鶴到遼東識舊巢城下清波含百谷窻中逺岫列三茅碧雞}
