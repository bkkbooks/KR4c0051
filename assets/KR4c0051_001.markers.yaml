  - {type: variant, offset: 3497, length: 1, content: 卷, WYG: 巻二十三欽定四庫全書劉賔客文集巻二十四唐劉禹錫撰七言五十六首西塞山懷古王濬樓舩下益州金陵王氣黯然收千尋鐵鎖沈江底一片降幡出石頭人世幾囘傷往事山形依舊枕寒流今逢四海為家日故壘蕭蕭蘆荻秋陽山廟觀賽神梁松南征至此遂為其神在朗州漢家都尉舊征蠻血食如今配此山曲蓋幽深蒼檜下洞蕭愁絶翠屏間荆巫脈脈傳神語野老娑娑啟醉顔日落風生廟門外幾人連蹋竹歌還漢夀城春望古荆州刺史治亭其下有子胥廟兼楚王故墳漢夀城邊野草春荒祠古墓對荆榛田中牧竪燒芻狗陌上行人看石麟華表半空經霹靂碑文纔見滿埃塵不知何日東瀛變此地還成要路津後梁宣明二帝碑堂下作玉馬朝周從此辭園陵寂寞對豐碑千行宰樹荆州道莫雨蕭蕭聞子規荆州道懷古南國山川舊帝畿宋臺梁館尚依俙馬嘶古樹行人歇麥秀空城澤雉飛風吹落葉填宫井火入荒陵化寳衣徒使詞臣庾開府咸陽終日苦思歸朗州竇員外見示與澧州元郎中郡齋贈答長句二篇因而繼和鴛鷺差池出建章綵旗朱戸鬱相望新㤙共理犬牙地昨日同含雞舌香白芷江邊分驛路山桃蹊外接甘棠應憐一罷金閨籍枉渚逢春十度傷蚤春對雪奉寄澧州元郎中新賜魚書墨未乾賢人暫屈逺人安朝驅旌斾行時令夜見星辰憶舊官梅蘂覆階鈴閤煗雪峯當戸㦸枝寒寧知楚客思公子北望長吟澧有蘭竇朗州見示與澧州元郎中蚤秋贈答命同作鄰境諸侯同舎郎芷江蘭浦恨無梁秋風門外旌旗動曉露庭中橘柚香玉簟㣲涼宜白晝金笳入莫應清商騷人昨夜聞題鴂不歎流年惜衆芳衢州徐員外使君遺以縞紵兼竹書箱因成一篇用答佳貺按此郡本自婺州析置徐自台州遷爛柯山下舊仙郎列宿來添婺女光逺放歌聲分白紵知傳家學與青箱水朝滄海何時去蘭在幽林亦自芳聞道天台有遺愛人將琪樹比甘棠唐秀才贈端州紫石硯以詩答之端州石硯人間重贈我應知正草𤣥闕里廟中空舊物開方竈下豈天然玉蠩吐水霞光静綵翰搖風絳錦鮮此日慵工記名姓因君數到墨池前覽董評事思歸之什因以詩贈幾年油幕佐征東却泛滄浪狎釣童敧枕醉眠成戲蝶抱琴閑望送歸鴻文儒自襲膠西相倚伏能齊塞上翁更説扁舟動鄉思青菰已熟奈秋風松滋渡望硤中渡頭輕雨灑寒梅雲際溶溶雪水來夢渚草長迷楚望夷陵土黒有秦灰巴人淚應猿聲落蜀客舩從鳥道囘十二碧峯何處所永安宫外是荒臺揚州春夜李端公益張侍御登段侍御平仲宻縣李少府畼秘書張正字復元同㑹於水館對酒聨句追刻燭擊銅鉢故事遲輒舉觥以飲之逮夜艾羣公沾醉紛然就枕余偶獨醒因題詩於段君枕上以志其事寂寂獨看金燼落紛紛只見玉山頽自羞不是髙陽侣一夜星星騎馬囘逢王十二學士入翰林因以詩贈時貞元二十年王以藍田尉充學士廏馬翩翩禁外逢星槎上漢杳難從定知欲報淮南詔促召王褒入九重闕下口號呈栁儀曹綵仗神旗獵曉風雞人一唱鼔逢逢銅壺漏水何時歇如此相催即老翁監祠夕月壇書事其禮用晝西皥司分晝夜平羲和亭午太隂生鏗鏘揖讓秋光裏觀者如雲出鳯城戲贈崔干牛學道深山虚老人留名萬代不闗身勸君多買長安酒南陌東城占取春元和甲午嵗詔書盡徵江湘逐客余自武陵赴京宿於都亭有懷續來諸君子雲雨江湘起卧龍武陵樵客躡仙蹤十年楚水楓林下今夜初聞長樂鐘江陵嚴司空見示與成都武相公唱和因命同作南荆西蜀大行臺幕府旌門相對開名重三司平水土威雄八陣役風雷彩雲朝望青城起錦浪秋經白帝來不是郢中清唱發誰當丞相掞天才徵還京師見舊番官馮叔達前者怱怱􅀈被行十年顦顇到京城南宫舊吏來相問何處淹留白髮生故洛城古牆粉落椒飛知幾春風吹雨灑旋成塵莫言一片危基在猶過無窮來徃人元和十一年自朗州承召至京戯贈㸔花諸君子紫陌紅塵拂面來無人不道㸔花囘𤣥都觀裏桃千樹盡是劉郎去後栽再逰𤣥都觀絶句并引余貞元二十一年為屯田員外郎時此觀未有花是嵗出牧連州尋貶朗州司馬居十年召至京師人人皆言有道士手植仙桃滿觀如紅霞遂有前篇以志一時之事旋又出牧今十有四年復為主客郎中重遊𤣥都蕩然無復一樹唯兔葵燕麥動揺於春風耳因再題二十八字以俟後遊時大和二年三月百畝中庭半是苔桃花浄盡菜花開種桃道士歸何處前度劉郎今又來望夫石正對和州郡樓終日望夫夫不歸化為孤石苦相思望來已是幾千載只似當時初望時金陵五題并序余少為江南客而未遊秣陵嘗有遺恨後為厯陽守跂而望之適有客以金陵五題相示逌爾生思歘然有得他日友人白樂天掉頭苦吟歎賞良久且曰石頭詩云潮打空城寂寞囘吾知後之詩人不復措詞矣餘四詠雖不及此亦不孤樂天之言爾石頭城山圍故國周遭在潮打空城寂寞囘淮水東邊舊時月夜深還過女牆來烏衣巷朱雀橋邊野草花烏衣巷口夕陽斜舊來王謝堂前燕飛入尋常百姓家臺城臺城六代競豪華結綺臨春事最奢萬戸千門成野草只縁一曲後庭花生公講堂生公説法鬼神聴身後空堂夜不扄髙坐寂寥塵漠漠一方明月可中庭江令宅南朝詞臣北朝客歸來唯見秦淮碧池臺竹樹三畝餘至今人道江家宅謝寺雙檜揚州法雲寺謝鎮西宅古檜存焉雙檜蒼然古貌奇含烟吐霧鬱參差晚依禪客當金殿初對將軍映畫旗龍象界中成寳蓋鴛鴦瓦上出髙枝長明鐙是前朝焰曽照青青年少時韓信廟將畧兵機命世雄蒼黄鍾室歎良弓遂令後代登壇者毎一尋思怕立功秋夜安國觀聞笙織女分明銀漢秋桂枝梧葉共颼飀月露滿庭人寂寂霓裳一曲在髙樓洛中寺北樓見賀監草書題詩髙樓賀監昔曽登壁上筆蹤龍虎騰中國書流讓皇象北朝文士重徐陵偶因獨見空驚目恨不同時便伏膺唯恐塵埃轉磨滅再三珍重囑山僧聞韓賔擢第歸覲以詩美之兼賀韓十五曹長時韓牧永州零陵香草滿郊坰丹穴雛飛入翠屏孝若歸來呈畫讚孟陽别後有山銘蘭陔舊地多纔結桂樹新枝色更青為報儒林丈人道如今從此鬢星星寄楊八夀州風獵紅旗入夀春滿城歌舞向朱輪八公山下清淮水千騎塵中白面人桂嶺雨餘多鶴迹茗園晴望似龍鱗聖朝方用敢言者次第應須舊諫臣李賈二大諫拜命後寄楊八夀州諫省新登二直臣萬方驚喜捧絲綸則知天子明如日肯放淮陽髙卧人宣上人逺寄賀禮部王侍郎放牓後詩因而繼和禮闈新牓動長安九陌人人走馬㸔一日聲名徧天下滿城桃李屬春官自吟白雪銓詞賦指示青雲借羽翰借問至公誰印可支郎天眼定中觀贈東岳張鍊師東岳真人張鍊師髙情雅澹世間希堪為烈女書青簡久事元君住翠㣲金縷機中抛錦字玉清壇上著霓衣雲衢不要吹簫伴只擬乗鸞獨自飛祕書崔少監見示墜馬長句因而和之麟臺少監舊仙郎洛水橋邊墮馬傷塵汙腰間青盭綬風飄掌上紫遊韁上車著作應來問折臂三公定送方猶賴徳全如醉者不妨吟詠入篇章寄楊虢州與之舊姻避地江湖知幾春今來本郡擁朱輪阮郎無復里中舊楊㒒却為闗外人各繫一官難命駕毎懷前好易沾巾玉城山裏多靈藥擺落功名且養神秋日題竇員外崇徳里新居竇時判度支案長愛街西風景閑到君居處暫開顔清光門外一渠水秋色牆頭數㸃山踈種碧松通月朗多栽紅藥待春還莫言堆案無餘地認得詩人在此間䝉㤙轉儀曹郎依前充集賢學士舉韓湖州自代因寄七言翔鸞闕下謝㤙初通籍由來在石渠暫入南宫判祥瑞還歸内殿閲圗書故人猶在三江外同病凡經二紀餘今日薦君嗟久滯不唯文體似相如途次華州陪錢大夫登城北樓春望因覩李崔令狐三相國唱和之什翰林舊侣繼踵華城山水清髙鸞鳯翔集皆忝夙眷遂題是詩城樓四望出風塵見盡闗西渭北春百二山河雄上國一雙旌斾委名臣壁中今日題詩處天上同時草詔人莫怪老郎呈濫吹官途雖别舊情親三鄉驛樓伏覩𤣥宗望女几山詩小臣斐然有感開元天子萬事足唯惜當時光景促三鄉陌上望仙山歸作霓裳羽衣曲僊心從此在瑤池三清八景相追隨天上忽乗白雲去世間空有秋風詞洛中初冬拜表有懷上京故人鳯樓南面控三條拜表郎官蚤渡橋清洛曉光鋪碧簟上陽霜葉翦紅綃省門簮組初成列雲路鴛鸞想退朝寄謝殷懃九天侣槍榆水擊各逍遥尉遲郎中見示自南遷牽復却至洛城東舊居之作因以和之曽遭飛語十年謫新受㤙光萬里還朝服不妨遊洛浦郊園依舊㸔嵩山竹含天籟清商樂水繞庭臺碧玉環留作功成退身地如今只是暫時閒洛中酬福建陳判官見贈潦倒聲名擁腫材一生多故苦邅廻南宫舊籍遙相管東洛閒門晝未開静對道流論藥石偶逢詞客與瓊瑰怪君近日文鋒利新向延平㸔劒來始聞秋風昔㸔黄菊與君别今聴𤣥蟬我却囘五夜颼飀枕前覺一年顔狀鏡中來馬思邊草拳毛動鵰盼青雲睡眼開天地肅清堪四望為君扶病上髙臺和蘇十郎中謝病閑居時嚴常侍蕭給事同過訪歎初有二毛作清羸隠几望雲空左掖鴛鸞到室中一巻素書銷永日數莖斑鬢對秋風菱花照後容雖改蓍草占來命已通莫怪人人驚蚤白縁君合是黒頭翁詶淮南廖參謀秋夕見過之作林公昔為揚州從事參謀從釋子反初服揚州從事夜相尋無限新詩月下吟初服已驚𤣥髮長髙情猶向碧雲深語餘時舉一杯酒坐久方聞數處砧不逐繁華訪閑散知君擺落俗人心題王郎中宣義里新居愛君新買街西宅客到如遊鄠杜間雨後退朝貪種樹申時出省趁㸔山門前巷陌三條近牆内池亭萬境閑見擬移居作鄰里不論時節請開闗詶朗州崔員外與任十四兄侍御同過鄙人舊居見懷之什時守呉郡昔日居鄰招屈亭楓林橘樹鷓鴣聲一辭御苑青門去十見蠻江白芷生自此曽沾宣室召如今又守闔閭城何人萬里能相憶同舎仙郎與外兄任侍御予外兄崔員外南宫同官美温尚書鎮定興元以詩寄賀旌旗入境犬無聲戮盡鯨鯢漢水清從此世人開耳目始知名將出書生劉駙馬水亭避暑千竿竹翠數蓮紅水閣虚涼玉簟空琥珀琖烘疑漏酒水精簾瑩更通風賜冰滿盌沈朱實法饌盈盤覆碧籠盡日逍遙避煩暑再三珍重主人翁述舊賀遷寄陜虢孫常侍南宫左輔兩處交代南宫幸襲芝蘭後左輔曽交印綬來多病未離清洛苑新㤙巳厯望仙臺闗頭古塞桃林静城下長河竹箭囘聞道隨車有零雨此時偏動子荆才詶端州吴大夫夜泊湘川見寄一絶夜泊湘川逐客心月明猿苦血沾襟湘妃舊竹痕猶淺從此因君染更深劉賔客文集巻二十四欽定四庫全書劉賔客文集巻二十五唐劉禹錫撰雜體三十九首翠㣲寺有感吾王昔遊幸離宫雲際開朱旗迎夏畢涼軒避暑來湯䴵賜都尉寒冰頒上才龍􅐖不可望玉坐生浮埃連州臘日觀莫徭獵西山海天殺氣薄蠻軍部伍囂林紅葉盡變原黒草初燒圍合繁鉦息禽興大斾揺張羅依道口嗾犬上山腰猜鷹慮奮迅驚麏時跼跳瘴雲四面起臘雪半空銷箭頭餘鵠血鞍傍見雉翹日莫還城邑金笳發麗譙觀舞柘枝二首長裾何葳蕤僊僊登綺墀神飊獵紅蕖龍燭然金枝垂帶覆纎腰安鈿當嫵眉翹袖中繁鼔傾眸遡華榱燕餘有舊曲淮南多冶詞欲見傾城處君㸔赴節時山雞臨清鏡石燕赴遙津何如上客㑹長袖入華茵體輕似無骨觀者皆聳神曲盡囘身去曽波猶注人君山懷古屬車八十一此地阻長風千載威靈盡赭山寒水中秋江晚泊長泊起秋色空江涵霽暉莫霞十萬狀賔鴻次第飛古戍見旗逈荒村聞犬稀軻峨艑上客勸酒夜相依步出武陵東亭臨江寓望鷹至感風候霜餘變林麓孤颿帶日來寒江轉沙曲戍遥旗影動津晚㯭聲促月上綵霞收漁歌逺相續秋日送客至潛水驛候吏立沙際田家連竹溪神林社日鼓茅屋午時雞雀噪晚禾地蝶飛秋草畦驛樓宫樹近疲馬再三嘶晚嵗登武陵城顧望水陸悵然有作星象承鳥翼蠻陬想犬牙俚人祠竹節仙洞開桃花城基厯漢魏江源自賨巴華表廖王墓菜地黄瓊家霜輕菊秀晚石淺水文斜樵音遶故壘汲路明寒沙清風稍改葉盧橘如含葩野橋鳴驛騎叢祠發逈笳跳鱗避舉網倦鳥寄行查路塵髙出樹山火逺連霞夕曛轉赤岸浮靄起蒼葭軋軋渡溪槳連連赴林鵶叫閽道非逺賜環期自賖孤臣本危涕喬木在天涯湖州崔郎中曽長寄三癖詩自言癖在詩與琹酒其詞逸而髙吟詠不足昔栁吴興亭臯隴首之句王融書之白團扇故為四韻以謝之視事畫屏中自稱三癖翁管絃泛春渚旌斾拂晴虹酒對青山月琴韻白蘋風㑹書團扇上知君文字工為郎分司寄上都同舎籍通金馬門身在銅駝陌省闥晝無塵宫樹逺凝碧荒街淺深轍古渡潺湲石唯有嵩丘雲堪誇蚤朝客登陜州城北樓卻寄京師親友獨上百尺樓目窮思亦愁初日徧露草野田荒悠悠塵息長道白林清宿􅃄收囘首雲深處永懷帝鄉遊請告東歸發灞橋卻寄諸僚友征途出灞涘囘首傷如何故人雲雨散滿目山川多行車無停軌流景同迅波前歡漸成昔感歎益勞歌秋晚題湖城驛池上亭秋次池上館林塘照南榮塵衣紛未解幽思浩已盈風蓮墜故蕚露菊含晚英恨為一夕客愁聴晨雞鳴平蔡州三首蔡州城中衆心死妖星夜落照壕水漢家飛將下天來馬箠一揮門洞開賊徒崩騰望旗拜有若羣蟄驚春雷狂童面縛登檻車大帛夭矯垂捷書相公從容來鎮撫常侍郊迎負文弩四人歸業閭里閑小兒跳跟健兒舞汝南晨雞喔喔鳴城頭鼔角音和平路傍老人憶舊事相與感激皆涕零老人收泣前致辭官軍入城人不知忽驚元和十二載重見天寳承平時九衢車馬渾渾流使臣來獻淮西囚四夷聞風失匕筯天子受賀登髙樓妖童擢髮不足數血汗城西一坏土南峯無火楚澤閒夜行不鎻穆陵闗䇿勲禮畢天下泰猛士按劒㸔常山時唯常山不庭平齊行二首邊塵昔起薊北門河南地屬平盧軍貂裘代馬繞東岳嶧陽孤桐削為角地形十二虜意驕㤙澤含容厯四朝魯人皆解帶弓箭齊人不復聞簫韶今朝天子聖神武手握𤣥符平九土初哀狂童襲故事文告不來方震怒去秋詔下誅東平官軍四合猶嬰城春來羣鳥噪且驚氣如壞山墮其庭牙門大將有劉生夜半射落攙搶星帳中虜血流滿地門外三軍舞連臂馹騎函首過黄河城中無賊夭氣和朝廷侍郎來慰撫耕夫滿野行人歌泰山沈寇六十年旅祭不饗生愁烟今逢聖君欲封禪神使隂兵來助戰祅氛埽盡河水清日觀杲杲卿雲見開元皇帝東封時百神受職争奔馳千鈞猛簴順流下洪波涵淡浮熊羆侍臣燕公秉文筆玉檢告天無愧詞當今叡孫承聖祖岳神望幸河宗舞青門大道屬車塵共待葳蕤翠華舉城西行城西簇簇三叛族叛者為誰蔡吴蜀中使提刀出禁來九衢車馬轟成雷臨刑與酒桮未覆仇家白官先請肉守吏能然董卓臍饑烏來覘桓𤣥目城西人散泰街平雨洗血痕春草生武昌老人説笛歌武昌老將七十餘手把庾令相問書自言少小學吹笛蚤事曹王曽賞激往年鎮戍到蘄州楚山蕭蕭笛竹秋當時買林恣捜索典卻身上烏貂裘古苔蒼蒼封老節石上孤生飽風雪商聲五音隨指發水中龍應行雲絶曽將黄鶴樓上吹一聲占盡秋江月如今老去興猶遲音韻髙低耳不知氣力已無心尚在時時一曲夢中吹西山蘭若試茶歌山僧後檐茶數叢春來映竹抽新茸苑然為客振衣起自傍芳叢摘鷹觜斯須炒成滿室香便酌砌下金沙水驟雨松聲入鼎來白雲滿盌花裵囘悠揚噴鼻宿酲散清峭徹骨煩襟開陽崖隂嶺各殊氣未若竹下莓苔地炎帝雖嘗未解煎桐君有籙那知味新芽連拳半未舒自摘至煎俄頃餘木蘭墜露香微似瑤草臨波色不如僧言靈味宜幽寂采采翹英為嘉客不辭緘封寄郡齋甎井銅鑪損標格何況蒙山顧渚春白泥赤印走風塵欲知花乳清泠味須是眠雲跂石人廟庭偃松詩并引侍中後閤前有小松不待年而偃丞相晉公為賦詩美其猶龍蛇然植于髙檐喬木間上嶔旁軋盤蹙傾亞似不得天和者公以遂物性為意乃加憐焉命畚土以壯其趾使無敧索綯以牽其榦使不仆盥潄之餘以潤之顧眄之輝以照之發於仁心感召和氣無復夭閼坐能敷舒曏之跧蹙化為奇古故雖袤丈而有偃號焉予嘗詣閤白事公為道所以且示以詩竊感嘉木之逢時斐然成詠勢軋枝偏根已危髙情一見與扶持忽從顦顇有生意卻為離披無俗姿影入巖廊行樂處韻含天籟宿齋時謝公莫道東山去待取隂成滿鳯池答東陽于令涵碧圗詩并引東陽令于興宗丞相燕國公之猶子生綺襦紈袴間所見皆貴盛而挈然有心如山東書生前年白有司願為親民官以自效遂補東陽及莅官以簡易為治故多暇日一旦於縣五里偶得奇境埋没於翳薈中于生自以有特操而生於公侯家由覆廕入仕常忽忽歎息因移是心開抉泉石芟去蘿䔍斧凡材畚息壤而清溪翠巖森立坌來因構亭其端題曰涵碧碧流貫于庭中如青龍蜿蜒冰去聲澈射人樹石雲霞列于前昏旦萬狀惜其居地不得有聞於時故圖之來乞詞既無負尤物予亦久翳蘿蔦者睹之慨然遂賦七言以貽後之文士東陽本是佳山水何況曽經沈隠侯化得邦人解吟詠如今縣令亦風流新開潭洞疑仙境逺寫丹青到雝州落在尋常畫師手猶能三伏凛生秋贈致仕滕庶子先輩時及第人中最長朝服歸來晝錦榮登科記上更無名夀觴毎使曽孫獻勝境長攜衆妓行矍鑠據鞍時騁健殷勤把酒尚多情凌寒卻向山隂去衣繡郎君雪裏迎時令子為御史主務在越中詠樹紅柿子曉連星影出晚帶日光懸本因遺採掇飜自保天年庭竹露滌鈆粉節風揺青玉枝依依似君子無地不相宜臺城懷古清江悠悠王氣沈六朝遺事何處尋宫牆隠嶙圍野澤鸛鶂夜鳴秋色深題夀安甘棠館二首公館似仙家池清竹逕斜山禽忽驚起衝落半巖花門前洛陽道門裏桃源路塵土與烟霞其間十餘步與歌者米嘉榮唱得涼州意外聲舊人唯數米嘉榮近來時世輕先輩好染頿須事後生聴舊宫中樂人穆氏唱歌曽隨織女渡天河記得雲間}
