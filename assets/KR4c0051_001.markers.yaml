  - {type: variant, offset: 0, length: 269, content: 劉夢得文集卷第一古詩澤宫登司馬錯故城寄李六侍御謁枉山㑹禪師善卷壇下作武陵觀火荅崔元受途中早發贈尹果毅望衡山遊桃源賦登天壇寫羅浮事秋江早發歸城南別墅和裴尹祈雨命箏歌送酒澤宫并序澤宫送士歳貢也晉昌唐如誨以信誼爲良弓文學爲菆矢規爵禄猶衆禽密彀持滿遡風蜚繳者數矣有措杯之妙而無雙鶬之獲韔弓收視歸究其術繇是跡愈屈而名愈聞君子益多之彼不由其術一幸而中者雖懸貆在庭君子未甞多也歳殫矣告予以西余爲賦澤宫一章庶見子之弓弗再張也巳秩秩澤宫有的維鵠祁祁庶士于以干禄彼鵠斯微若止若翔千里之差起于毫芒我矢旣直我弓旣良依于髙墉罔我不臧髙墉伊何維器與時視之以心誰謂鵠微, WYG: ''}
