  - {type: variant, offset: 3620, length: 4, content: 竹聞新蟬, WYG: 不如揺落樹重有明年春火後見琮璜霜餘識松筠肅機乃獨秀武部亦絶倫爾今持我詩西見二重臣成賢必念舊保貴在安貧清時為丞郎氣力侔陶鈞乞取斗升水因之雲漢津送裴處士應制舉并引晉人裴昌禹讀書數千巻於周官小戴禮尤邃性是古敢言雖侯王不能卑下故與世相參差凡抵有位以索合行天下幾户依反遍常歎諸侯莫可遊欲一見天子而未有路㑹今年詔書徵賢良昌禹大喜以為盡可以豁平生搏髀爵躍曰一觀雲龍庭足矣繇是裹三月糧而西徂咨余以七言為西遊之資藉耳裴生久在風塵裏氣勁言髙少知已注書曽學鄭司農歴國多於孔夫子往年訪我到連州無窮絶境終日遊登山雨中試蠟屐入洞夏裏披貂裘白帝城邊又相遇斂翼三年不飛去忽然結束如秋蓬自稱對䇿明光宫人言䇿中説何事掉頭不荅看飛鴻彤庭翠松迎曉日鳯銜金牓雲間出中貴腰鞭立傾酒宰臣委佩觀揺筆古稱射䇿如彎弧一發偶中何時無由來草澤無忌諱努力滿挽當雲衢憶得童年識君處嘉禾驛後聫牆住垂鈎鬭得王餘魚蹋芳共登蘇小墓此事今同夢想間相看一笑且開顔老大希逢舊鄰里為君扶病到方山}
