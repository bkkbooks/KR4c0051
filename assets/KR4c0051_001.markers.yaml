  - {type: variant, offset: 3619, length: 0, content: '', WYG: 大袂拂雙旌飾容遇朗鑒肝鬲可以呈昔日焉相如臨卭坐盡傾勉君刷羽翰蚤取凌青冥送張盥赴舉并引古人以偕受學為同門友今人以借升名為同年友其語熟見搢紳者皆道焉余於張盥為丈人由是道也曩吾見爾之始生以老成為祝今吾見爾之成人以未立為憂吾不幸嚮所謂同年友當其盛時聫袂齊鑣亘絶九衢若屏風然今來落落如曙星之相望借曰㑹合不煩異席可長太息哉然而尚書右丞衞大受兵部侍郎武庭碩二君者當時偉人咸萬夫之望足以訂十朋之多也第如京師無騷騷爾無􅀈􅀈爾時秋也吾為若叩商之謳幸有感夫二君子爾生始懸弧我作坐上賔引箸舉湯餅祝詞天麒麟今成一丈夫坎軻愁風塵長裾來謁我自號廬山人道舊與撫孤悄然傷我神依依見眉睫嘿嘿含悲辛永懐同年友追想出谷晨三十二君子齊飛陵烟旻曲江一㑹時後㑹已彫淪況今三十載閲世難重陳盛時一已過來者日日}
