  - {type: variant, offset: 3603, length: 3, content: 臨都驛, WYG: 望喬木風水悲流萍前與計吏西始列貢士名森然就筆札從試春官卿帝城岐路多萬足伺晨星茫茫風塵中工拙同有營寒女勞夜織山苗榮寸莖侯門方撃鍾衣褐誰將迎弱羽果摧頽壯心鬱怦怦諒無蟠木容聊復蓬累行昨日訊靈龜繇言利艱貞當求捨拔中必在審已明誓將息薄遊焦思窮筆精蒔蘭在幽渚安得揚棻馨曰余摧落者散質負華纓一聆苦辛詞}
