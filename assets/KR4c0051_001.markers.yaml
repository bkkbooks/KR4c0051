  - {type: variant, offset: 3607, length: 3, content: 贈樂天, WYG: 動伊鬱情身棄言不重愛才心尚驚恨無羊角風使爾化北溟論罷情益親涉旬忘歸程日攜邑中客閒眺江上城晝渴命金壘宵談轉璿衡蕙風香麈尾月露濡桃笙忽被戒羸驂薄言事南征火雲蔚千里旅思浩已盈湘江含碧虚衡嶺浮翠晶豈伊山水異適與人事并油幕似崑丘粲然疊瑶瓊庾樓見清月孔坐多緑􅌬復有衡山守本自雲龍庭至}
