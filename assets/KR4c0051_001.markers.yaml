  - {type: variant, offset: 3526, length: 3, content: 懷寄詶, WYG: 一紙住在成都萬里橋兩岸山花似雪開家家春酒滿銀桮昭君坊中多女伴永安宫外蹋青來城西門前灩澦堆年年波浪不能摧懊惱人心不如石少時東去復西來瞿唐嘈嘈十二灘此中道路古來難長恨人心不如水等閒平地起波瀾巫峽蒼蒼烟雨時清猿啼在最髙枝箇裏愁人腸自㫁由來不是此聲悲山上層層桃李花雲間烟火是人家銀釧金釵來負水長刀短笠去燒畬楊柳枝詞九首塞北梅花羌笛吹淮南桂樹小山詞請君莫奏前朝曲聴唱新飜楊柳枝南陌東城春蚤時相逢何處不依依桃紅李}
