  - {type: variant, offset: 3593, length: 3, content: 尹宅鶴, WYG: 年振芳塵青袍仙掌下矯首陵煙旻公冶本非罪潘郎一為民風霜苦揺落堅白無緇磷一旦逢良時天光燭幽淪重為長裾客佐彼觀風臣分野窮禹畫人煙過虞巡不言此行逺所樂相知新雨起巫山陽鳥鳴湘水濵離筵出蒼莽别曲多愁辛今朝一桮酒明日千里人彼此孤舟去悠悠天海春送湘陽熊判官孺登府罷歸鍾陵因寄呈江西裴中丞二十三兄射䇿志未就從事府云除篋留馬卿賦袖有劉𢎞書忽見夏木深悵然憶吾廬復持州民刺歸謁専城居君家誠易知勝絶傾里閭人言北郭生門有卿相輿鍾陵藹千里帶郭西江水朱檻照河宫旗亭緑雲裏前年初缺守慎簡由宸扆臨軒㺯郡章得人方付此是時左馮翊天下第一理貴臣持牙璋優詔發青紙迎風汚吏免先令疲人喜何武劾腐儒陳蕃禮髙士昔升君子堂腰下綬猶黄中丞時為萬年尉汾隂有寳氣赤堇多竒鋩束簡下曲臺佩鞬來歴陽綺筵陪一笑蘭室襲餘芳風水忽異勢江湖遂相忘因君儻借問為話老滄浪中丞為博士製相國柳宜城諡議識者韙之頃授予以其本厥後牧和州節度使杜司徒以中丞材譽俱髙欲令軍装以重戎府故授以本州團練使滿坐觀腰鞬禮成驩甚相視而笑後房燕樂卜夜縦談予忝司徒之賔時獲末坐初中丞自尚書屯田員外郎出守踵其武者今給事中穆公代給事者右丞段公予不佞繼右丞之後故曰襲餘芳焉送韋秀才道沖赴制舉驚禽一辭巢棲息無少安秋扇一離手流塵蔽霜紈故侣不可追涼風日已寒逺逢杜陵士别盡平生歡逐客無印綬楚江多芷蘭因君時暇遊長鋏不復彈閱書南軒霽絙瑟清夜䦨萬境身外寂一桮腹中寛伊昔𤣥宗朝冬卿冠鴛鸞肅穆升内殿從容領儒冠游夏無措詞陽秋垂不刋至今羣玉府學者空縱觀世人希徳門揭若攀峯巒之子向明訓鏘如振琅玕一旦西上書斑裳拂征鞍荆臺宿莫雨漢水浮春瀾君門起天中多士如星攅烟霞覆雙闕抃舞羅千官清漏滴銅壺仙厨下雕盤熒煌仰金榜錯落飛濡翰古來長䇿人所}
