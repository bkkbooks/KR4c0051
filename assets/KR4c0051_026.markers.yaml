  - {type: indent, offset: 1424, content: 　　, id: KR4c0051_krp_026-bkkind15}
  - {type: variant, offset: 1424, length: 403, content: 國學新修五經壁初大曆中名儒張參爲國子司業始詳定五經書于論堂東西廂之壁辨齊魯之音取其宜考古今之文取其正繇是諸生之師心曲學偏聽臆說咸束之而歸于大同揭揭髙懸積六十歳崩剥汚衊一作穢淟然不鮮今天子尚文章尊典籍於苑囿不加尺椽而成均以治學上言遽賜千萬時祭酒皥實尸之愽士公肅實佐之國庠重嚴過者必式遂以羨贏再新壁書懲前土塗不克以壽乃折堅木負墉而庇之其制如版牘而髙廣其平如粉澤而㓗滑背施隂關使衆如一附離之際無迹而㝷堂皇靚深兩廡相照申命國子能通法書者分章揆日遜其業而繕寫焉筆削旣成讎校旣精白黒彬斑瞭然飛動以蒙來求煥若星辰以敬來趨肅如神明以疑來質決若蓍蔡由京師而風天下覃及九譯咸知宗師非止服逢掖者鑚仰而巳於是學官陳師正等曁生徒凡四百二十有八人請金石刻且歌之曰我有學宇旣傾而成之我有壁經旣昧而明之孰規摹之孰發揮之祭酒維齊博士維韋俾我學徒絃歌以時切切祁祁不敖不嬉庶乎遒人來采我詩時余爲禮部郎凡瞽宗之事得以關決故書之以移史官宜附于藝文志, WYG: ''}
