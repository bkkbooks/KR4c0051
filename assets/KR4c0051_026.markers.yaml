  - {type: line-break, offset: 0, content: '', id: KR4c0051_SBCK_026-1a01}
  - {type: variant, offset: 0, length: 1016, content: 劉夢得文集卷第二十六記天平軍節度廳壁汴州刺史廳壁鄭門新亭國學五經壁鄭州刺史廳壁管城新驛和州刺史廳壁山南節度廳壁山南西道新修驛路天平軍節度使廳壁元和十四年春二月王師平河南負固之地十有二州憲宗視地圖户版俾參其地三月有詔其以曹濮隷鄆爲一隅按部三郡統兵三萬乃新其軍錫號天平蓋承天威以平暴勃志勲楊休在稱爲雄新邦始倈汚俗猶用朝廷革之以漸故命功臣或辯吏以帥焉大和三年冬天平監軍使以故侯病聞上方注意治夲乃以牙璋玉節鼎右僕射官稱賜東都留守令狐公曰予擇文武惟汝兼前年鎭汴州有顯庸往年弼憲宗有素貴徒得君重剛吾四支公西拜稽首登車有耀不踰旬抵治所夾清河而域之惟鄆州在春秋爲須句之國渉漢爲濟東蓋禹貢兖州之域宣精在上奎爲文宿畫野在下魯爲儒郷故其人知書風俗信厚天寶末大憝起於幽都虜將因兵鋒取其地右勇左德積六十年公之來思如古醫之治劇病宣洩頥養氣還神復大凡抗詔條國式於身以先之示菲約以𥙿人信賞罰以格物物力日完人風自移渉月報政踰年鼎治牙門之容曁曁而恭壘門之容仡仡而和里中之容闐闐而遂勞者以安去者以歸分星不揺田祖降福凡革前非罷供第無名錢歳鉅萬菽粟如之錦繒且千兩去苛法急徴毀家償租之令故流庸自占四萬室衆無吁咨和氣乃來三田仍稔草木咸瑞豈偶爾哉初斯堂西墉有刺史記而元戎雄尊之位虚其左方豈有待邪公命愚志之俾來者仰公知變風之自大和五年夏四月二十六日記汴州刺史㕔壁夲朝以浚儀爲汴州刺史治所自隋釃新渠吸黃河而東行州含其樞爲天下劇内屏王室東雄諸侯居無事時常帶廉察使兵興巳還益以節旄用人得否繫國輕重長慶四年詔書命河南尹敦煌令狐公來莅來刺錫之介圭使印兵符汴人交賀肴驛騰貴惟是邦始都于魏惠王始郡于宇文周星躔回環天駟垂光地爲四戰故其俗右武人具五都故其氣習豪公自爲宰相時巳熟四方之利病凡所戾止參然前知旣視事三日挹羣吏與之言曰吾食止圭田吾用止公入凡他給過制傷廉浼㓗者悉罷之壹歸乎公藏凡曲防苛禁不情乖體者悉剗之一出乎令典凡關征舩筭奪時專利者悉更之一遵乎詔條然後刑麗事而詳賞以時而均興學以勸藝示寛以化勇居數月而汴州人恂恂然無復故態明年大成議者若曰惟浚都國之咽頥咀清嚥和旁暢四支東夏黕焉由我以肥是浚之治非所澤于所履而巳初公七代祖在隋爲納言大業中持節居此亦號刺史距今餘二百年公實能似旣拜闕發魚書合左右契由阼階躋遐踵前武歆然如聞其馨香肅然如覩其形容信乎君子之澤逺而有光輝也他日命遊梁客志之書于㕔事謹按前賢之在此堂者張平原首之陸氏撰節度使記揭于東壁詳矣今公命爲刺史記書于右端謹月而日之以公爲冠大和元年夏五月某日記, WYG: ''}
