  - {type: variant, offset: 0, length: 2977, content: 劉夢得文集卷第二十一啓上杜司徒上淮南李相公上門下武相公上中書李相公謝門下武相公謝中書張相公賀門下裴相公上門下裴相公賀門下李相公上僕射李相公謝裴相公謝竇相公上杜司徒某啓一自謫居七悲秋氣越聲長苦聽者誰哀湯網雖踈乆而猶挂失意多病衰不待年心如寒灰頭有白髮愓厲之日利於退藏是以彌年不敢奏記近夲州徐使君至奉手筆一函稱謂不移問訊加劇重復點竄一無客言忽疑此身猶在門下收紙長想歆然感生㝷省遭罹萬重不幸方寸之地自不能言求人見諒豈復容易伏蒙逺示且曰浮謗漸消況承慶宥期以振刷方今聖賢合德朝野多歡澤柔異類仁及行葦萬族咸恱獨爲窮人四時平分未變寒谷自同類牽復又巳三年側聞衆情或似哀歎某材略無取廢錮是宜若非舊恩孰肯留念六翮方鎩思重託於扶揺孤桐半焦冀見收於煨燼伏紙流涕不知所言謹啓上淮南李相公某啓閒以昧於周身措足危地駭機一發浮謗如川巧言竒中別白無路祝網之日漏恩者三咋舌兢魂分終裔壤豈意天未剿絶仁人豋庸施一陽於剥極之際援衆溺於坎深之下南箕播物不勝願言危心鎩翮繇是自保隂施之德巳然乃聞受恩同人明以死荅私感竊抃積于窮年化權禮絶孤志莫展今幸伍中牽復司存宇下伏慮因是記其姓名謹獻詩二篇敢聞左右古之所以導下情而通比興者必文其言以表之雖甿謡俚音可儷風什伏惟降意詳擇斯大幸也謹因楊子程留後行謹奉啓不宣謹啓上門下武相公某啓去年夲州吏人自蜀還伏奉示問兼賜衣服繒綵等雲水路遥緘縢貺厚恭承惠下之旨重以念舊之懷熈如陽和列在緗簡苦心多感危涕自零騖神驛思若侍函杖伏以聖上注意理夲銳求國楨念外臺報政之功追宣室前席之事重下丹詔再昇黃樞羣情合符和氣來應八柄所在三人同心恊台坐之精膺保一作傑材之數談笑於規隨之際從容於陶冶之閒物皆由儀人識所措某乆罹憲網兀若枯株當萬類咸恱之辰抱窮途終慟之苦清朝無絳灌之列至理絶椒蘭之嫌此時不遇可以言命嗟乎一身主祀萬里望枌榆之郷髙堂有親九年居蠻貊之地從坐之典固有等差同類之中又㝷牽復頃在臺日獲奉準繩指吏途於桉讞道文律於章奏藻鑒之下難逃陋容炎涼載一作幾移足見眞態自違閒左右沈淪遐荒歳月滋深艱貞彌厲緬思受譴之始他人不知屬山園事繁孱懦力竭夲使有内嬖之吏供司有恃寵之臣言渉猜嫌動礙關束城社之勢函矢紛然彌縫其閒﨑嶇備盡始慮罪同事闕寧虞謗逐跡生智乏周身又誰咎也伏以趙國公頃承顧遇之重髙邑公夙荷見知之深雖提挈不忘而顯白無自蓋以永貞之際皆在外方雖得傳聞莫詳夲末特哀黨錮亟形話言自前歳振淹命行中止或聞輿論亦愍重傷伏遇相公秉鈞輒巳自賀儻重言一發清議攸同使聖朝無錮人大冶無廢物自新之路旣廣好生之德逺彰羣蟄應南山之雷窮鱗得西江之水指顧之内生成可期伏惟發膚寸之隂成彌天之澤回一瞬之念致再造之恩誠無𥙷於多事之時庶有助於隂施之德無任懇悃之至謹啓上中書李相公緯某啓去年國子主簿楊歸厚致書相慶伏承相公言及廢錮愍色甚深哀仲朔之乆謫恕元直之方寸思振淹之道廣錫類之人逺聆一言如授華衮自不窺牆仞九年于兹髙卑邈殊禮數懸絶雖身居廢地而心恃至公伏以相公乆以訏謨參于宥密材旣爲時而出道以得君而專令發於流水之源化行猶偃草之易習強伉者自納於軌物困杼柚者咸躋於仁壽六轡在手平衡居心運思於陶冶之閒宣猷於魚水之際然能軫念廢物逺哀窮途嗟哉小生有足悲者内無手足之助外乏強近之親何爲學苦心夲求榮養得罪由巳翻乃貽憂捫躬自劾愧入肌骨禍起飛語刑極淪胥心因病怯氣以愁耗近者否運將泰仁人持衡伏惟推曾閔之懷憐烏鳥之志處夔龍之位傷屈賈之心沛然垂光昭振幽蟄言岀口吻澤濡寰區昔者行葦勿傷枯骼猶掩哀老以岀幣愍窮而開懷無情異類尚或嬰慮顧惟江干逐客曾是相府故人言念材能誠無所取譬諸飛走庸或知恩嗚呼以不駐之光隂抱無涯之憂悔當可封之至理爲永廢之窮人聞弦尚驚危心不定垂耳斯乆長鳴孔悲腸回淚盡言不宣意謹啓謝門下武相公某啓某一坐飛語廢錮十年昨蒙徴還重罹不幸詔命始下周章失圖吞聲咋舌顯白無路豈謂烏鳥微志惻于深仁恤然動拯溺之懷煦然存道舊之旨言念斛觫慰安蒼黃推以恕心期於造膝重言一發睿聽克從回陽曜於肅殺之辰沃天波於蹭蹬之際俾移善地獲奉安輿率土知孝治之源羣生識人倫之厚感召和氣發揚皇風豈唯匹夫獨受其賜某即以今月十一日到州上訖守在要荒拘於印綬巾韝詣謝有志莫從誠知微生不足酬德捐軀之外無地寄言効節蕭屏䖍然心禱無任懇悃屏營之至謹勒軍事衙官守左威衞慈州吉昌府別將貟外置同正貟常懇云云奉啓謝中書張相公某啓某智乏周身動必招悔一坐飛語如衝一作觸駭機昨者詔書始下驚懼失次叫􅕡無路擠壑是虞草木賤軀誠不足惜烏鳥微志實有可哀伏蒙聖慈遽寢前命移莅善部載形綸言凡在人臣皆感至德凡爲人子同荷至仁豈唯鯫生獨受其賜伏以相公心符上德道冠至仁一夫不獲戚見于色密旨未下歎形于言竟回三舎之光能拔九泉之厄袁公之平楚獄不忍錮人晏子之哀越石仍伸知己所以慶垂胤祚言成春秋神理孔昭報應斯必身侔蟬翼何以受恩死輕鴻毛固得其所卑守有限拜謝未由無任感激兢惶之至謹勒軍事衙官守左威衛慈州吉昌府別將貟外置同正貟常懇云云奉啓賀門下裴相公某啓伏以相公含道傑岀降神挺生坐籌以弼睿謨秉鉞以行天討風雲助氣川嶽效靈制勝於樽俎之閒指蹤於韝緤之末蕭斧旣定衮衣以歸君心如魚水人望如風草一德交暢萬邦一作方和平運神思於洪鑪納生靈於壽域文武丕績冠于古今某恪守遐荒不獲隨例拜賀上門下裴相公某啓曩者淮右逋誅即戎歳乆天子齋戒以命元臣登壇之日上略前定從九天而下縱以神兵分六符之光掃其長彗授鉞於西顥之半䇿勲於北陸之初功成偃節復執大柄君臣相遇播于樂章山河啓封載在盟府上方注意人益具瞻因魚水之恊符極䕫龍之事業時屬四始恩覃萬方致君及物其得一作德兩大古先俊賢所未備者我從容而保之殆非人事抑有幽賛夫異同之論我以獨見剖之文武之道我以全材統之崇髙之位我以大功居之造物之權我以虚心運之然持盈之術古所難也寔在隂施拯物􅌋其德基以左右功庸而百禄是荷人所欽戴乆而愈宜昔袁太尉不忍錮人而楚獄衰息一言之慶子孫丕承以今日將明之材行前脩博施之義筆端膚寸澤及九垠猶夫疾耕必有滯穗某頃墮危厄甞受􅌋恩詛盟於心要之自效甞懼廢死荒服永辜願言敢因賀牋一寄丹懇顧非竒理不足以縈于沖襟然則利於行者固在乎常談而卓詭孤特之言未必利於行也伏惟以愚言與賢者參之賀門下李相公自西川入爲大夫拜相某啓伏以聖君當功成愷樂之日而求賢愈切思治益深是上玄垂休欲速致大平之明效以相公事業而逢此時天下之人視仁壽之域其猶㝷尺故命書所至德風隨之微材片善咸自磨拂況同主國柄如吹塤箎含生之倫唯所措置日月亭午物無邪隂賢聖合德人識正道雖居畎畝足以詠歌某遐守要荒不獲隨例拜賀上僕射李相公某啓州吏還伏蒙擺落常態手筆具書言及貞元中登朝人逮今無十輩及發中書相公一函具道閤下亟言曩游顔閒頗有哀色夫溝中之木與犧象同體追琢不至坐成枯薪朱而藍之猶足爲器苟液樠曲戾不足枉斧斤願爲庭燎以照嘉客謹啓謝裴相公某啓某遭不幸歳將二紀雖累更符竹而未出網羅親知見憐或有論薦如陷還濘動而愈沈甘心終否無路自奮豈意天未剿絶仁人持衡紆神慮於多方起湮沈於乆廢居剥極之際一陽復生出坎深之中平路資始通籍郎位分曹樂都喬木展舊國之思行雲有故山之戀姻族相賀壷觴盈門官無責詞始自今日禽魚之志誓以死生草木之年惜其婉娩章程有守拜謝無由瞻望巖廊䖍然心禱謹啓謝竇相公某啓某一辤朝列二十三年雖轉郡符未離謫籍卑濕生疾衰遲鮮歡望故國而未歸一作回如痿人之念起昨蒙罷免甘守丘園相公不弃舊游特哀乆廢每奉華翰賜之衷言果蒙新恩重忝清貫薦延有漸拯拔多方六律變窮谷之寒一丸消彌年之疹鎩翮將舉危心獲安布武夷途自此而始分曹有繫拜謝無由瞻望德藩坐馳精爽無任劉夢得文集卷第二十一, WYG: 為}
