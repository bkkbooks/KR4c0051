  - {type: variant, offset: 10095, length: 0, content: '', WYG: 陪膺是洛城白嘗為三川守故云起撥醅爭緑醑卧酪待朱櫻㡬處能留客何人喚解酲禹錫舊儀尊右揆新命寵春卿有喜鵲頻語無機鷗不驚居易青林思小隠白雪仰芳名訪舊殊千里登髙賴九城起鄼侯司管鑰疎傅傲簮纓綸綍曽同掌烟霄即上征禹錫册庭嘗接武書殿忝連衡蘭室春彌馥松心晚更貞居易琴招翠羽下釣掣紫鱗呈只願回烏景誰能避兕觥起方知醉兀兀應勝走營營鳯閣鸞臺路従他年少爭居易更呈二公樂天是月長齋鄙夫此時愁卧里閭非逺雲霧難披因以寄懐遂為聨句所期解悶焉敢驚禪五月長齋月文心苦行心蘭蔥不入户薝蔔自成林夢得䕶戒先辭酒嫌喧亦徹琴塵埃賔位靜香火道場深樂天我靜馴狂象餐餘施衆禽定知於佛佞豈復向書淫夢得欄藥凋紅豔庭槐換緑隂風光徒滿目雲霧未披襟樂天樹為清凉倚池因盥漱臨蘋芳遭燕拂蓮坼待蜂尋夢得舍下環流水窻中列逺岑苔斑錢剝落石怪玉嶔崟樂天鵲頂迎秋秃鶯喉入夏瘖柳絲垂色綖棘刺露長}
