  - {type: variant, offset: 0, length: 4198, content: 劉夢得文集卷第四律詩西塞山懷古陽山廟觀賽神漢壽城春望後梁二帝碑荆門道懷古和竇貟外早春對雪早秋贈荅荅徐貟外贈端州紫石硯觀董評事詩松滋渡望峽中題叚侍御枕上贈王學士闕下口号監祠夕月壇書事戲贈崔千牛詔徴逐客和嚴司空見馮叔逹故洛城古牆戲贈看花諸公再遊玄都觀望夫山金陵五題謝寺雙檜韓信廟安國觀聞笙洛中寺北樓見賀監草書韓賔擢第歸覲寄楊八壽州重寄楊八和宣上人贈東岳張錬師和崔少監寄楊􅉑州題竇貟外新居舉韓湖州自代華州陪錢大夫覩玄宗詩懷上京故人和尉遲郎中詶福建陳判官始聞秋風和蘇十郎中詶淮南廖參謀題王郎中新居詶朗州崔貟外賀温尚書水亭避暑述舊詶吴端才西塞山懷古西晉樓舩下益州金陵王氣漠然收千㝷鐵鏁沈江底一片降幡出石頭人世幾囬傷往事山形依舊枕寒流今逢四海爲家日故壘蕭蕭蘆荻秋陽山廟觀賽神梁松南征至此遂爲其神在朗州漢家都尉舊征蠻血食如今配此山曲蓋幽深蒼檜下洞蕭愁絶翠屏閒荆巫脉脉傳神語野老娑娑啓醉顔日落風生廟門外幾人連踏竹歌還漢壽城春望古荆州刺史治亭其下有子胥廟兼楚王故墳漢壽城邊野草春荒祠古墓對荆榛田中牧豎燒芻狗陌上行人看石麟華表半空經霹靂碑文纔見滿埃塵不知何日東瀛變此地還成要路津後梁宣明二帝碑堂下作玉馬朝周從此辤園林寂莫對豐碑千行宰樹荆州道暮雨蕭蕭聞子規荆門道懷古南國山川舊帝畿宋臺梁館尚依俙馬嘶古樹行人歇麥秀空城澤雉飛風吹落葉塡宫井火入荒陵化寶衣徒使詞臣庾開府咸陽終日苦思歸朗州竇貟外見示與澧州元郎中郡齋贈荅長句二篇因而繼和鴛鷺差池出建章綵旗朱戸鬰相望新恩共理犬牙地昨日同含鷄舌香白芷江邊分驛路山挑蹊外接甘棠應憐一罷金閨籍枉渚逢春十度傷早春對雪奉寄澧州元郎中新賜魚書墨未乾賢人暫屈逺人安朝驅旌斾行時令夜見星辰憶舊官梅蘂覆階鈴閣暖雪峯當户㦸枝寒寜知楚客思公子北望長吟澧有蘭竇朗州見示與澧州元郎中早秋贈荅命同作鄰境諸侯同舎郎芷江蘭浦恨無梁秋風門外旌旗動曉露庭中橘柚香玉簟微涼宜白晝金笳入暮應清商騷人昨夜聞鶗鴂不歎流年惜衆芳衢州徐貟外使君遺以縞紵兼竹書箱因成一篇用荅佳貺按此郡夲自婺州拆置徐自台州遷爛柯山下舊仙郎列宿來添婺女光逺放歌聲分白紵知傳家學與青箱水潮滄海何時去蘭在幽林亦自芳聞道天台有遺愛人將琪樹比甘棠唐秀才贈端州紫石硯以詩荅之端州石硯人閒重贈我應知正草玄闕里廟中空舊物門方竈下豈天然玉蠩吐水霞光靜綵翰摇風絳錦鮮此日慵工記名姓因君數到墨池前覽董評事思歸之什因以詩贈幾年油幕佐征東却泛滄浪狎釣童欹枕醉眠成戲蝶抱琴間望送歸鴻文儒自襲膠西相倚伏能齊塞上翁更說扁舟動郷思青菰巳熟柰秋風松滋渡望峽中渡頭輕雨灑寒梅雲際溶溶雪水來夢渚草長迷楚望夷陵土黒有秦灰巴人淚應猿聲落蜀客舩從鳥道囬十二碧峯何處所永安宫外是荒臺楊州春夜李端公益張侍御登叚侍御平仲密縣李少府暢秘書張正字復元同㑹於水館對酒聮句追刻燭擊鉢故事遲輒舉觥以飲之逮夜艾羣公霑醉紛然就枕余偶獨醒因題詩於叚君枕上以志其事寂寂獨看金燼落紛紛只見玉山頽自羞不是髙陽侣一夜醒醒騎馬迴逢王二十學士入翰林因以詩贈時貞元二十年王以藍田尉充學士廐馬翩翩禁外逢星槎上漢杳難從定知欲報淮南詔促召王襃入九重闕下口号呈柳儀曹綵仗神旗獵暁風鷄人一唱鼓蓬蓬銅壷漏水何時歇如此相催即老翁監柌夕月壇書事其禮用晝西皥司分晝夜平羲和亭午太隂生鏗鏘揖讓秋風裏觀者如雲出鳳城戲贈崔千牛學道深山虚老人留名萬代不關身勸君多買長安酒南陌東城占取春元和甲午歳詔書盡徴江湘逐客余自武陵赴京宿於都亭有懷續來諸君子雲雨江湘起卧龍武陵樵客躡仙蹤十年楚水楓林下今夜初聞長樂鐘江陵嚴司空見示與成都武相公唱和因命同作南荆西蜀大行臺幕府旌門相對開名重三司平水土威雄八陣役風雷綵雲朝望青城起錦浪秋經白帝來不是郢中清唱發誰當丞相掞天才徵還京師見舊曹官馮叔逹前者忩忩僕被行十年憔悴到京城南曹舊吏來相問何處淹留白髮生故洛城古牆粉落椒飛知幾春風吹雨灑旋成塵莫言一片危基在猶過無窮來往人元和十年自朗州承召至京戲贈看花諸君子紫陌紅塵拂面來無人不道看花迴玄都觀裏桃千樹盡是劉郎去後栽再遊玄都觀絶句并引余貞元二十一年爲屯田貟外郎時此觀中未有花木是歳出牧連州尋貶朗州司馬居十年召至京師人人皆言有道士手植仙桃滿觀如爍晨霞遂有前篇以志一時之事旋左出牧于今十有四年得爲主客郎中重遊兹觀蕩然無復一樹唯兔葵鷰麥動揺於春風耳因再題二十八字以俟後遊時大和二年三月某日百畒中庭半是苔桃花淨盡菜花開種桃道士歸何處前度劉郎今獨來望夫山正對和州郡樓終日望夫夫不歸化爲孤石苦相思望來巳是幾千載只似當時初望時金陵五題并序余少爲江南客而未遊秣陵甞有遺恨後爲歷陽守跋而望之適有客以金陵五題相示逌爾生思欻然有得他日友人白樂天掉頭苦吟歎賞良乆且曰石頭詩云潮打空城寂寞迴吾知後之詩人不復措詞矣餘四詠雖不及此亦不孤樂天之言爾石頭城山圍故國周遭在潮打空城寂寞囬淮水東邊舊時月夜深還過女牆來烏衣巷朱雀橋邊野草花烏衣巷口夕陽斜舊來王謝堂前燕飛入㝷常百姓家臺城臺城六代競豪華結綺臨春事最奢萬户千門成野草只縁一曲後庭花生公講堂生公說法鬼神聽身後空堂夜不扃高坐寂寥塵漠漠一方明月可中庭江令宅南朝詞臣北朝客歸來唯見秦淮碧池臺竹樹三畝餘至今人道江家宅謝寺雙檜楊州法雲寺謝鎭西宅古檜存焉雙檜蒼然古貌竒含煙吐霧鬰參差晚依禪客當金殿初對將軍映畫旗龍象界中成寶蓋鴛鴦瓦上出髙枝長明燈是前朝焰曾照青青年少時韓信廟將略兵機命世雄蒼黃鍾室歎良弓遂令後代登壇者每一㝷思怕立功秋夜安國觀聞笙織女分明銀漢秋桂枝梧葉共颼飀月落滿庭人寂寂霓裳一曲在髙樓洛中寺北樓見賀監草書題詩髙樓賀監昔曾登壁上神蹤龍虎騰中國書流讓皇象北朝文士重徐陵偶因獨見空驚目恨不同時便伏膺唯恐塵埃轉磨滅再三珍重囑山僧聞韓賔擢第歸覲以詩美之兼賀韓十五曹長時韓牧永州零陵香草滿郊坰丹穴鶵飛入翠屏孝若歸來呈畫讃孟陽別後有山銘蘭陔舊地花纔結桂樹新枝色尚青爲報儒林丈人道如今從放鬢星星寄楊八壽州風獵紅旗入壽春滿城歌舞向朱輪八公山下清淮水千騎塵中白面人桂嶺雨餘多鶴迹茗園晴望似龍鱗聖朝方用敢言者次第應須舊諫臣李賈二大諫拜命後寄楊八壽州諫省新登二直臣萬方驚喜捧絲綸則知天子明如日肯放淮陽髙卧人宣上人逺寄賀禮部王侍郎放牓後詩因而繼和禮闈新牓動長安九陌人人走馬看一日聲名徧天下滿城桃李屬春官自吟白雪銓詞賦指示青雲借羽翰借問至公誰即可支郎天眼定中觀贈東岳張鍊師東岳眞人張鍊師髙情雅贍世閒稀堪爲烈女書青簡乆事元君住翠微金縷機中拋錦字玉清臺上著霓衣雲衢不要吹簫伴只擬乗鸞獨自飛秘書崔少監示墜馬長句因而和之麟臺少監舊仙郎洛水橋邊墮馬傷塵汙腰閒青綬帶風飄掌上紫遊韁上車著作應來問折臂三公定送方猶賴德全如醉者不妨吟詠入篇章寄楊􅉑州與之舊姻避地江湖知幾春今來夲郡擁朱輪阮郎無復里中舊楊僕却爲關外人各繋一官難命駕每懷前好易霑巾玉城山裏多靈藥擺落功名且飬神秋日題竇貟外崇德里新居竇時判度支案長愛街西風景間到君居處暫開顔清光門外一渠水秋色牆頭數點山踈種碧松通月朗多裁紅藥待春還莫言堆案無餘地認得詩人在此閒蒙恩轉儀曹郎依前充集賢學士舉韓湖州自代因寄七言翔鸞闕下謝恩初通籍由來在石渠暫入南宫判祥瑞還歸内殿閱圖書故人猶在三江水同病凡經二紀餘今日薦君嗟乆滯不唯文體似相如途次華州陪錢大夫登城北樓春望因覩李崔令狐三相國唱和之什翰林舊侣繼踵華城山水清髙鸞鳳翔集皆忝夙眷遂題是詩城樓四望出風塵見盡關西渭北春百二山河雄上國一雙旌斾委名臣壁中今日題詩處天上同時草詔人莫怪毛郎呈濫吹宦途離別舊情親三郷驛樓伏覩玄宗望女几山詩小臣斐然有感開元天子萬事足唯惜當時光景促三郷陌上望仙山歸作霓裳羽衣曲僊心從此在瑶池三清八景相追隨天上忽乗白雲去世間空有秋風辭洛下初冬拜表有懷上京故人鳯樓南面控三條拜表郎官早渡橋淸洛曉光鋪碧簟上陽霜葉剪紅綃省門簪組初成列雲路鴛鸞想退朝寄謝慇勤九天侶槍榆水擊各逍遥尉遲郎中見示自南遷牽復却至洛城東舊居之作因以和之曾遭飛語十年謫新受恩光萬里還朝服不妨遊洛浦郊園依舊看嵩山竹含天籟清商樂水遶庭臺碧玉環留作功成退身地如今只是暫時間洛中酬福建陳判官見贈潦倒聲名擁腫材一生多故苦邅迴南宫舊籍遥相管東洛間門晝未開靜對道流論藥石偶逢詞客與瓊瑰怪君近日文鋒利新向延平看劒來始聞秋風昔看黃菊與君別今聽玄蟬我却迴五夜颼飀枕前覺一年顔狀鏡中來馬思邊草拳毛動鵰盼青雲睡眼開天地肅清堪四望爲君扶病上髙臺和蘇十郎中謝病閒居時嚴常侍蕭給事同訪歎初有二毛之作清羸隱几望雲空左掖鴛鸞到室中一卷素書鋪永日數莖斑鬢對秋風菱花照後容雖改蓍草占來命巳通莫怪人人驚早白縁君合是黑頭公詶淮南廖參謀秋夕見過之作公昔爲揚州從事參謀從释子反𥘉楊州從事夜相㝷無限新詩月下吟初服巳驚玄髮長髙情猶向碧雲深語餘時舉一杯酒坐乆方聞數處砧不逐繁華訪間散知君擺落俗人心題王郎中宣義里新居愛君新買街西宅客到如遊鄠杜閒雨後退朝貪種樹申時出省趂看山門前巷陌三條近牆内池亭萬境間見擬移居作鄰里不論時節請開關詶朗州崔貟外與任十四兄侍御同過鄙人舊居見懷之什時守吳郡昔日居鄰招屈亭楓林橘樹鷓鴣聲一辤御苑青門去十見蠻江白芷生自此曾霑宣室召如今又守闔閭城何人萬里能相憶同舎仙郎與外兄任侍御予外兄崔貟外南宫同官美温尚書鎭定興元以詩寄賀旌旗入境犬無聲戮盡鯨鯢漢水清從此世人開耳目始知名將出書生劉駙馬水亭避暑千竿竹翠數蓮紅水閣虚涼玉簟空琥珀盞烘疑漏酒水精簾瑩更通風賜冰滿碗沈朱實法饌盈盤覆碧籠盡日逍遥避煩暑再三珍重主人翁述舊賀遷寄陜􅉑孫常侍南宫左輔兩處交代南宫幸襲芝蘭後左輔曾交印綬來多病未離清洛苑新恩巳歷望仙臺關頭古塞桃林靜城下長河竹箭迴聞道隨車有零雨此時偏動子荆才詶端才吴大夫夜泊湘川見寄一絶夜泊湘川逐客心月明猿苦血霑襟湘妃舊竹痕猶淺從此因君染更深劉夢得文集卷第四劉夢得外集卷第四詩郡内書情詶樂天見憶小亭寒夜和裴晉公凉風亭閑園獨賞詶樂天衫酒見寄兩如何留辤裴令公與樂天替代裴令公緑野堂自左馮歸洛下秋齋獨坐和樂天懷詠獨酌小醉戲贈樂天詶樂天題酒瓮雪中訝諸公請裴令公加宴過敦詩舊宅聽江西故吏歌以詩問酒熟和樂天洛城春陪裴公泛洛賀楊尚書秋中聮句雪中宴集喜遇聮句洛中聮句共憶夢得聮句洛中早春賞櫻桃花醉後寓言戲贈賞牡丹戲樂天長齋樂天蓮池邀僧晚夏間居感秋沽酒致歡懷樂天和思黯憶南荘各賦春中一物春詞聞新蟬新秋對月小臺晚坐早秋雨後秋涼間卧秋晚病中和樂天燒藥詶樂天詠老歳夜詠懷元日樂天見過戲樂天買馬詶思黯見戲詶思黯小飲詶樂天狂吟詶牛相公獨飲春日間坐牛相公示新什秋霖即事聮句喜晴聮句㑹昌春聮句春晚聮句樂天長齋聮句, WYG: ''}
