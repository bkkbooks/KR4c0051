  - {type: variant, offset: 3805, length: 0, content: '', WYG: 以求之謂善價也卒與裴氏裴所善李生雅挾相術於馬也尤工覩之周體眙然視欣然笑既而抃隨之且曰久矣吾之不覯於是也是何柔心勁骨竒精妍態宛如鏘如煜如翔如之備邪今夫馬之徳也全矣顧其維駒蔵鋭于内且秣之乖方是用不説乎常目須其齒備而氣振平聲則衆美灼見上可以獻帝閑次可以鬻千金裴也聞言竦焉遂儆其僕蠲其皂筐其惡蜃其溲􅀈以美薦秣以薌粒起之居之澡之挋音震之無分隂之怠斯以馬養養馬之至分也居無何果以驥徳聞客有唁予以喪其寳且譏其所貿也㣲予灑然曰始予有是馬也予常馬畜之今予易是馬也彼寳馬畜之寳與常在所遇耳且夫昔之翹陸也謂將蹄將齧抵以檛䇿不知其籋雲耳昔之噓呼也謂為疵為癘投以藥石不知其噴玉耳夫如是則雖曠日歴月將頓踣是以曽何寳之有焉繇是而言方之於士則八十其緍也不猶踰於五羖皮乎客謖而竦予遂言曰馬之徳也存乎形者也可以目取然猶為之若此矧徳藴于心者乎斯從古之數予不敢歎述病劉子嘗涉暑而征熱攻于腠以致病其僕也告痛亦莫能興逮浹日予有瘳醫診之曰疾幸間矣顧熱沴而未平有遺類焉宜謹於攝衞衞之乖方則病復矣所苦既㣲而怠其説倦眠于衾而興焉倦隠于几而步焉面不能罷頮髪不能捐櫛口不能忘味心不能無思如是未移日而疾也瘮疎錦反如復癏于躬進藥求汗凡三渙然後目能視視既分則嚮時之僕已睨然執桮圏侍予于前矣予訝而曰曩吾與若也病偕呻也謼也若酷而吾㣲藥也餌也吾殷而若薄何患之同而痊之異哉僕諄諄而荅云已之被病也兀然而無知有問也亦兀然而無知髪蓬如而忘乎亂面黔如而忘乎垢洎疾之殺也雖飲食是念無滑甘之思日致復初亦不知也予喟然歎曰始予有斯僕也命之理畦則蔬荒主庖則味乖顓廐則馬瘠常謂其無適能適乃今以兀然而賢我逺甚利與鈍果相長哉僕更矣劉子遂言曰樂於用則豫章貴厚其生則社櫟賢唯理所之曽何膠於域哉劉賔客文集巻六欽定四庫全書劉賔客文集巻七唐劉禹錫撰論下}
