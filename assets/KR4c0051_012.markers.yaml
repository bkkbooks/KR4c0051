  - {type: variant, offset: 3798, length: 1, content: 得, WYG: 客}
  - {type: variant, offset: 3801, length: 2, content: 卷第, WYG: 巻五欽定四庫全書劉賔客文集巻六唐劉禹錫撰論中因論七篇劉子閒居作因論或問其㫖曷歸歟對曰因之為言有所自也夫造端乎無形垂訓於至當其立言之徒放詞乎無方措㫖於至適其寓言之徒䝉之智不逮于是造形而有感因感而有詞匪立匪寓以因為目因論之㫖也云爾鑒藥訊甿嘆牛儆舟原力説驥述病鑒藥劉子閒居有負薪之憂食精良弗知其㫖血氣交沴煬然焚如客有謂予子病病積日矣乃今我里有方士淪跡於醫厲者造焉而美肥輒者造焉而善馳矧常病也將子詣諸予然之之醫所切脈觀色聆聲參合而後言曰子之病其興居之節舛衣食之齊去聲乖所由致也今夫蔵鮮能安榖府鮮能母氣徒為美疹之囊槖耳我能攻之乃出藥一丸可兼方寸以授予曰服是足以瀹昏煩而鉏藴結銷蠱慝而歸耗氣然中有毒須其疾瘳而止過當則傷和是以㣲其齊也予受藥以餌過信而膇能輕痺能和涉旬而苛癢絶焉抑搔罷焉踰月而視分纎聴察㣲蹈危如平嗜糲如精或聞而慶予且鬨言曰子之獲是藥㡬神乎誠難遭已顧醫之態多嗇術以自貴遺患以要財盍重求之所至益深矣予昧者也泥通方而狃既效猜至誠而惑勦説卒行其言逮再餌半旬厥毒果肆岑岑周體如痁作焉悟而走諸醫醫大吒曰吾固知夫子未達也促和蠲毒者投之濵於殆而有喜異日進和藥乃復初劉子慨然曰善哉醫乎用毒以攻疹用和以安神易則兩躓明矣茍循往以御變昧於節宣奚獨吾儕小人理身之弊而已訊甿劉子如京師過徐之右鄙其道旁午有甿増増扶班白挈羈角齎生器荷農用摩肩而西僕夫告予曰斯宋人梁人亳人潁人之逋者今復矣予愕而訊云予聞隴西公畼轂之止方踰月矣今爾曹之来也欣欣然似恐後者其聞有勞倈之簿歟蠲復之條歟振贍之格歟碩䑕亡歟瘈狗逐歟曰皆未聞也且夫浚都吾政之上游也自巨盜間釁而武臣顓焉牧守由將校以授皆虎而冠子男由胥徒以出皆鶴而軒故其上也子視卒而芥視民其下也鷙其理而蛑其賦民弗堪命是軼于它土然咸重􅁶也非阽危擠壑不能違之曩者雖歸歟成謡而故態相沿莫我敢復今聞吾帥故為丞相也能清静畫一必能以仁蘇我矣其佐嘗宰京邑也能誅鉏豪右必能以法衞我矣奉斯二必而來歸惡待事實之及也予因浩歎曰行積於彼而化行於此實未至而聲先馳聲之感人若是之􅄩歟然而民知至至矣政在終終也嘗試論聲實之先後曰民黠政頗須理而後勸斯實先聲後也民離政亂須感而後化斯聲先實後也立實以致聲則難在經始由聲以循實則難在克終操其柄者能審是理俾先後終始之不失斯誘民孔易也歎牛劉子行其野有叟牽跛牛于蹊偶問焉何形之瑰歟何足之病歟今觳觫然將安之歟叟攬縻而對云瑰其形飯之至也病其足役之過也請為君畢詞焉我僦車以自給嘗驅是牛引千鈞北登太行南並商嶺掣以回之叱以聳之雖涉淖躋髙轂如蓬而輈不僨及今廢矣顧其足雖傷而膚尚腯以畜豢之則無用以庖視之則有贏伊禁焉莫敢尸也甫聞邦君饗士卜剛日矣是往也當要平聲售於宰夫余尸之曰以叟言之則利以牛言之則悲若之何予方窶且無長物願解裘以贖將置諸豐草之鄉可乎叟囅然而咍曰我之沽是屈指計其直可以持醪而齧肥飴子而衣妻若是之逸也奚事裘為且昔之厚其生非愛之也利其力今之致其死非惡之也利其財子惡乎落吾事劉子度是叟不可用詞屈乃以杖叩牛角而嘆曰所求盡矣所利移矣是以員能霸呉屬鏤賜斯既帝秦五刑具長平威振杜郵死陔下敵擒鍾室誅皆用盡身賤功成禍歸可不悲哉可不悲哉嗚呼執不匱之用而應夫無方使時宜之莫吾害也茍拘於形器用極則憂明已儆舟劉子浮于汴涉淮而東亦既釋紼纚榜人告予曰方今湍悍而舟盬宜謹其具以虞焉予聞言若厲繇是袽以窒之灰以墐之􅆽以乾之僕怠而躬行夕惕而晝勤景霾晶而莫進風異響而遄止兢兢然累辰是用獲濟偃檣弭櫂次于淮隂於是舟之工咸沛然自暇自逸或遊肆而觴矣或拊橋而歌矣隸也休役以尚寢矣吾曹無虞以宴息矣逮夜分而􅑆隟潛㴻渙然隂隤至乎淹簀濡薦方卒愕傳呼跣跳登墟僅以身脱目未及瞬而樓傾軸墊抵于泥沙力莫能支也劉子缺然自視而言曰曏予兢惕也汩洪漣而無害今予晏安也蹈常流而致危畏之途果無常所哉不生於所畏而生於所易也是以越子䣛行呉君忽晉宣尸居魏臣怠白公厲劍子西哂李園養士春申易至于覆國夷族可不儆哉嗚呼禍福之胚胎也其動甚㣲倚伏之矛楯也其理甚明困而後儆斯弗及已原力劉子于邁舟次泗濵維䋏邇之于傳傳吏適傳呼曰乗驛者方來誰何之則曰力人也雅以力聞於呉楚間中貴人器之謂宜為爪士獻言于上有㫖趣如京師頃其至則仡焉五輩咸碩其體毅其容動睛煜如曳趾岌如顧瞻遲回飲啜有聲泗濵守伾由將授也説而勞之饗以太牢飲以百壺酒酣氣振求試自矜傍如無人中若有馮有盪舟如沿者抉鼎如飛者綯鍵如麻者開兩弧而脈不僨者屣巨石而􅒥如流者異哉果以力駭世而聞于上也異日話於儒家者流有客悱然自奮曰斯誠力矣上之不過誇胡人而戲角抵次之不過倅期門而振袀服我之力異然以道用之可以格三苖而賔左衽以威用之可以係六驘而㫁右臂由是而言彼力也長雄於匹夫然猶驛其騑餼其食我力也無敵於天下亦當蒲其輪鶴其書矣予詰之曰彼之力用於形者也子之力用於心者也形近而易見心逺而難明理乎而言則子之力大矣時乎而言則彼之力大矣且夫小大迭用曷常哉彼固有小矣子固有大矣予所不能齊也客於邑垂涕洟劉子解之曰屠羊於肆適味於衆口也攻玉于山俟知於獨見也貪日得則鼓刀利要嵗計而韞櫝多客聞之破涕曰吾方俟多於嵗計也嵗歟嵗歟其我與歟説驥伯氏佐戎于朔陲獲良馬以遺予予不知其良也秣之稊秕飲之汚池廐櫪也上痺而下蒸羈絡也綴索而續韋其易之如此予方病且窶求沽于肆肆之駔亦不知其良也評其價六}
