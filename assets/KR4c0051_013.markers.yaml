  - {type: variant, offset: 2261, length: 1, content: 卷, WYG: 巻七欽定四庫全書劉賔客文集巻八唐劉禹錫撰記上天平軍節度使㕔壁記元和十四年春二月王師平河南負固之地十有二州憲宗視地圖户版俾參其地三月有詔其以曹濮棣鄆為一隅按部三郡統兵三萬乃新其軍錫號天平葢承天威以平暴悖志動掦休在稱為雄新邦始徠汚俗猶用朝廷革之以漸故命功臣或辦吏以帥焉太和三年冬天平監軍使以故候病聞上方注意治本乃以牙璋玉節鼎右僕射官稱賜東都留守令狐公曰予擇文武惟汝兼前年鎮汴州有顯庸往年弼憲宗有素貴徒得君重剛吾四支公西拜稽首登車有耀不踰旬祗治所夾清河而域之惟鄆州在春秋為須句之國渉漢為濟東葢禹貢兖州之域宣精在上奎為文宿畫野在下魯為儒鄉故其人知書風俗信厚天寳末大憝起於幽都虜將因兵鋒取其地右勇左徳積六十年公之來思如古醫之治劇病宣洩頥養氣還神復大凡抗詔條國式於身以先之示菲約以裕人信賞罰以格物物力日完人風自移涉月報政踰年鼎治牙門之容暨暨而恭壘門之容仡仡而和里中之容闐闐而遂勞者以安去者以歸分星不搖田祖降福凡革前非罷供}
