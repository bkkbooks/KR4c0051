  - {type: variant, offset: 2265, length: 0, content: '', WYG: 日劉某記復荆門縣記直故郢北走之道其聚邑曰荆門掲起重闗殿于樂都名視縣内之制居殷形束之要故吏師重焉通外民之底貢㑹南藩之述職故賔禮蕃焉其肇允經營實王孫昌夔居荆以表之命行名建而締構之弗暇無㡬何有由勇爵而授赤社于兹者徼馳名於省嗇謂相沿為非智因請罷去其號發踐更以董之有司不能端究事本循空言而可其奏繇是分地征以歸它邑野之人有回逺之歎廢文吏而顓戍督行之旅有誰何之囏是利不及下也黎民病之自鄢而南斯為畫疆抵郡之路貫其七舍持瑞節而銜急宣之使盖隂相交遂使服縵胡者備問俗之對執刀七者申餼牽之禮是敬之不及賔也君子病之如是㡬二十嵗距永貞元年江陵尹裴公政成上游徳及矜人大建長利俾無遺害乃外濟羣欲内張全摹周圖經制條白于狀昌言既從公議攸同忘勞之徒樂用之工載大其門載髙其墉徑術脈分闤閭架空然後析便地以肥之建具官以司之糜羨財以償其力役汰冗食以資其秩稍田里不聞於徴令縣官無減於嵗入越某月既成而落之官脩其方人樂其居將迎犒飫之儀展廄置符繻之事舉戍夫有伍公吏有職由彚而分率無踰閑入其封者可以知敎元和元年四海㑹同天子命公師長南宫三年公以介圭入覲途出斯邑邑人之華皓幼童咸須于道周距躍而謡曰起我堙廢而完之徠我蕩析而安之昔室于墟風揺雨濡自公優柔郛閈盈兮昔飲于洿夏溷冬枯自公感通觱沸生兮淑旂之華兮四牡之騑徯公之還兮觴以祝之卻略蹁蹮百形一音公為駐錯衡而勞之有以文從公者紀事于牘且曰民可懐也盍命夫學舊史之事以志焉公不得讓而從之走是以有授簡之辱初公以縣之之便聞于上也禹錫方以郎位貼職于計曹章下之日得以省事逮今以遷人獲宥于善部工休之日得以踐履故於拜命無牢讓於傳信無愧詞以為古之創物建庸宜于人民而得其時者則必謌其事功為後代法雅有營謝美召伯也傳稱城沂賢蒍敖也賦水泉原隰之狀志慮事命日之規當書而詠之細亦弗可畧也是用謹其本始而存乎篇俾後之視今者知楚郊之令典云武陵北亭記郡北有短亭繇舊也亭孤其名地蔵其勝前此二千石全然見之建言而莫踐去之日率遺恨焉七年冬詔書以竹使符授尚書水曹外郎竇公常曰命爾為武陵守莅止三月以碩畫佐元侯平裔夷降渠魁又三月以順令率蒸民増水坊表火道是嵗大穰明年政成農縁畆以勇勸工執技以思賈因民之餘力乗日之多暇乃顧其屬曰郊道有候亭示賔以不慁也雖聞兹地韜美未發豈有待邪自吾之治于斯也購徒庀材大起堙廢未嘗植私庭礱燕寑役必先公人不余瑕調賦幸均矣城池幸完矣而重浹辰之役掠茍蕳之間卒使勝躅冒没猶璞而不攻懼換符之日逺復齎恨無乃遺誚於來者乎言得其宜智愚同賛於是撤故材以移用相便地而居要去凡木以顯珍茂汰汚池以通淪漣自天而勝者列於騁望由我而美者生於頥指箕張筵楹股引房櫳斧斤息響風物異態大道出乎左藩澄湖浸乎前垠仙舟祖軷繇是區處九月壬午工告休亭長受成赤車威遲于以落之肅賔而入圜視有適沈水北澳陽山南麓􅀈焉蘧蘧雄殿郊隅前軒舒陽朱檻環之舞衣回旋樂簴參差北廡延隂外阿旁注芊眠清泚羅入洞户初筵脩平彫俎静嘉林風天籟與金奏合亦既醉止州從事舉白而言曰室成于私古有發焉矧成于公庸敢無詞觀乎棼楣有嚴丹艧相宣象公之文律曄然而光也望之𢎞深即之坦夷象公之酒徳温然而達也庭芳萬本跗萼交映如公之家肥熾而昌也門闢户闔連機弛張似公之政經便而通也因髙而基因下而池躋其髙可以廣吾視泳其清可以濯吾纓俯于逵惟行旅謳吟是采瞰于野惟稼穡艱難是知雲山多狀昏旦異候百壺先韋之餞迎退食私辰之宴嬉觀民風於嘯詠之際展宸戀於天雲之末動合于誼匪唯寫憂公曰夫言之必可書者公言也從事不以私視余余從而讓之是自還也其可乎迺授簡于放臣俾書以示後後之思公者雖灌叢葽草尚勿翦拜矧翬飛之革然石刻之隠然歟劉賔客文集巻九欽定四庫全書劉賔客文集巻十唐劉禹錫撰書}
