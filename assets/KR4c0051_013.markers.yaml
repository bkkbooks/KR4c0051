  - {type: variant, offset: 2263, length: 0, content: '', WYG: 無名錢嵗鉅萬菽粟如之錦繒且千兩去苛法急徵毁家償租之令故流庸自占四萬室衆無吁咨和氣乃來三田仍稔草木咸瑞豈偶爾哉初斯堂西墉有刺史記而元戎雄尊之位虛其左方豈有待邪公命愚志之俾來者仰公知變風之自太和五年夏四月二十六日記汴州刺史㕔壁記本朝以浚儀為汴州刺史治所自隋釃新渠吸黄河而東行州含其樞為天下劇内屏王室東雄諸侯居無事時常帶亷察使兵興巳還益以節旄用人得否繫國輕重長慶四年詔書命河南尹敦煌令狐公來莅來刺錫之介圭使印兵符汴人交賀肴醳騰貴惟是邦始都于魏恵王始郡于宇文周星躔回環天駟垂光地為四戰故其俗右武人具五都故其氣習豪公自為宰相時巳熟四方之利病凡所戾止參然前知既視事三日挹羣吏與之言曰吾食止圭田吾用止公入凡它給過制傷亷浼潔者悉罷之壹歸乎公蔵凡曲防苛禁不情乖體者悉剗之壹出乎令典凡闗征船算奪時專利者悉更之壹遵乎詔條然後刑麗事而詳賞以時而均興學以勸蓺示寛以化勇居數月而汴州人恂恂然無復故態明年大成議者若曰奕奕浚都國之咽頥咀清嚥和旁暢四支東夏黠馬由我以肥是浚之治非所澤于所履而巳初公七代祖在隋為納言大業中持節居此亦號刺史距今餘二百年公實能似既拜闕發魚書合左右契由阼階躋遐踵前武歆然如聞其馨香肅然如覩其形容信乎君子之澤逺而有光輝也它日命遊梁客志之書于㕔事謹按前賢之在此堂者張平原首之陸氏撰節度使記揭于東壁詳矣今公命為刺史記書于右端謹月而日之以公為冠太和元年夏五月某日記國學新修五經壁記初大厯中名儒張參為國子司業始定五經書于論堂東西廂之壁辯齊魯之音取其宜考古今之文取其正繇是諸生之師心曲學偏聴臆説咸束之而歸于大同揭揭髙懸積六十嵗崩剥汚衊淟然不鮮今天子尚文章尊典籍於苑囿不加尺椽而成均以治學上言遽賜千萬時祭酒皥實尸之博士公肅實佐之國庠重嚴過者必式遂以羨贏再新壁書懲前土塗不克以夀乃析堅木負墉而比之其制如版牘而髙廣其平如粉澤而潔滑背施隂闗使衆如一附離之際無迹而尋堂皇靚深兩廡相照申命國子能通法書者分章揆日遜其業而繕寫焉筆削既成讐校既精白黑彬斑暸然飛動以䝉來求煥若星辰以敬來趨肅如神明以疑來質決若蓍蔡由京師而風天下覃及九譯咸知宗師非止服逢掖者鑚仰而已於是學官某等暨生徒凡四百二十有八人請金石刻且歌之曰我有學宇既傾而成之我有壁經既昧而明之孰規摹之孰發揮之祭酒維齊博士維韋俾我學徒弦歌以時切切祁祁不敖不嬉庶乎道人來采我詩余為禮部郎凡瞽宗之事得以與聞而闗決之故書此以移史官俾誌之用得附于蓺文之後云爾汴州鄭門新亭記亭于西門尊闕路也實相公以心規羣僚以辭叶而百工以樂成斧斤無聲丹素有嚴主人肅容落以金石走鄭之門嶔為右垣黄河一支滉漾北軒前曕東顧甍動軌直含景生姿遡空欲翔汴城具八方之人殊形詭言而耳目一説初公來臨擁節及門馭吏曰此鄭州門公心非之若曰野哉居無何即舊號而更之曰鄭門故事王人大僚之去來元侯前驅翊門而旋率立馬塵坌中挹策為禮公心不然之乃下亭令于執事按亭東西函丈者三之有竒而南北五之有贏樂縣宴豆前後以位棊闔對明弭掀順時修梁衡建中虛上荷圓脊方亷髙卑中經簾鑪茵帟文椸睆榻儲以應猝周用而宜乃命尹閽視亭長抱闗視掌固啟閉拚除是謹是孜錫命賜胙勞迎贈餞我當躬行汝先汝蠲挾膳提醪生芻縞衣我寮展事靡問文武汝唯汝従凡入而修容凡出而修軷裼襲威儀勿籍勿訶繇是貴人稱諸朝羣吏詠於家行者誇于道與人同其安者人人驛其聲而吟之始乎諓諓而成乎龎鴻欲無文字不可也公遂條白其所以然逺命學古者書之公姓令狐氏以文章典内外書命以譽明登左右相以飛語策免以思材復徵自有浚師無如今治文武兩熾其古之大臣歟鄭州刺史東㕔壁記古諸侯之居公私皆曰寢其它室曰便坐今凡視事之所皆曰㕔其它室以辨方為稱今年鄭州刺史楊君作東㕔既成而落之且以書抵余為記按國章以甲乙第方域大凡環天子之居為雄州鄭實邇王畿故望雄視其版多貴人且當大逵故務劇君侯始来三日司稅掾舉七縣董租之吏累百君曰此百螣也悉罷之用户符而輸入益辦司貢掾舉梨林之征請户曉君曰盡弛之勿籍用平賈而果益精里無吏迹民去痼疾授牘占租如臨詛盟土毛人力日夕相長故周嵗而完焉比年而愈肥雖軍興餽輓旁午大將牙旗往復相踵而里中清夷雞犬音和人既寧而物有餘政既成而日多暇圜視舊宇宜有以更之且書得時亦以謹始因列名氏授受月而日之庶乎繼踐于兹者知貫珠之首其山望澤浸土風甿俗與前賢之耿光備于正位有天寳中詞人杜頠之文在太和四年某月日管城新驛記太和二年閏三月滎陽守歸厚上言臣治所直天下大逵肘武牢而咽東夏誰何宜謹啟閉宜度先是驛于城中驛遽不時四門牡鍵通夕弗禁請更于外隧永永便安制曰可守臣奉詔無徴命無奪時糜羨財募游手逮八月既望新驛成鄭人胥説琢石而紀曰在兊之方面𤣥負陽門銜周道牆䕃行栗境勝于外也逺購名材旁延世工塈塗宣晳瓴甓剛滑術精于内也蘧廬有甲乙牀帳有冬夏庭容牙節廡卧囊橐示禮而不慁也内庖外廏髙倉邃庫積薪就陽峙芻就燥有素而不愆也主吏有第役夫有區師行者有饗亭孥行者有别邸周以髙墉乃樓其門勞迎展蠲潔之敬餞别起登臨之思溱洧波瀾嵩丘雲煙四時萬象來貺于我走轂奔蹄遄征急宣入而忘勞出必屢顧其傳舍之尤乎太守姓楊氏字貞一華隂𢎞農人鄭為雄州非聞人大吏不得在其選夫驛之宜選于外也前此二千石嘗言之而重改作若貞一可謂果於從政而決行其言惜乎未施於大也和州刺史㕔壁記歴陽古揚州之邑於天文直南斗魁下在春秋實句呉之封後為楚所取秦并天下以𨽻九江而六為九江治所晉平呉復𨽻淮南至永興初自析為郡益之以烏江宋臺建目為南豫州又益之以龍亢梁之亡北齊圖霸功擁貞陽侯以歸王僧辯來迎㑹于兹地二國和協故更名和州陳隋間無所革國朝因隋武徳中更龍亢為含山初開元詔書以口算第郡縣為三品是為下州元和中復命有司參校之遂進品第一按見户萬八千有竒輸緡錢十六萬嵗貢纎紵二篚呉牛蘇二鈞糝鱏九甕茅蒐七千兩鎮曰梁山浸曰歴湖田蓺四穀豢全六擾廬有㫖酒庖有腴魚神仙故事在郊在藪𤣥元有臺彭鏗有洞名山曰雞籠名塢曰濡須異有血閫祥有沸井城髙而堅亞父所營州師五百環峙于東南瀕江劃中流為水疆掲旗樹蕝十有六戍自孫權距陳出入六代常為宿兵之地多以材能人處之本朝混一號為善部然用人差輕非復曩時之比也始余以尚書郎得譴刺連山今也由巴東來牧考前二邦之籍與版圗纔什五六而地征三之究其所從來生植有本女工尚完堅一經一緯無文章交錯之竒男夫尚墾闢功苦戀本無即山近盬之逸市無􅅓眩工無彫彤無游人異物以遷其志副徴令者率非外求凡百為一出於農桑故也繇是而言瘠天下者其在多巧乎寳厯元年六月二十一日刺史中山劉某記山南西道節度使㕔壁記文皇帝初元始畫天下為十道古荆梁之地舉曰山南厥後析為東西天漢之邦實居右部按梁州為都督治所領十有五州縣道帶蠻夷山川扼隴蜀故二千石有採訪防禦之名兵興多故其任益重澄清節鉞二柄兼委建中末徳宗南巡狩偃翠華而徘徊簫勺之音洽于巴漢戡難清宫六龍言旋迺下詔復除征繇升州為府等威班制與歧益同地既尊大用人隨異故自興元至太和五十年間以勲庸佩相印者三以謩明歴真相者九由台席授鉞未㡬復入相者再焉磊落震耀冠于天下去年夏四月今丞相趙郡公徴還泰階遂命左僕射燉煌公往踐其武曏之真相及公而十焉初公自河陽節度使入操國柄其後鎮宣武以禮悛獷悍治天平以清去掊克居大鹵以仁蘇荐飢今來是都躡二三大君子之躅道同氣協無所改更如鼓和琴布指成韻𦍑夷砥平旱麓發生人無左言樂有夏聲俗既富庶居多閒暇圜視府局素闕者補之先是公堂嘗為行殿人不敢斥别營侯居應門有閌棨㦸未具公乃條白上言詔下有司可其奏軍門肅清方有眉目趨而入者聳然生敬焉惟梁山國也其節用虎出揚其威入貯宜潔舊處仄陋黷其雄稜公遂分宅之别齋且據便地暑曰節室卜剛日乃遷焉敬君命而壹民心軍中増氣而知禮戟衣既垂師節既嚴流眄屋壁見前修之名氏列于坐右第以梁州刺史鼎興元尹記與今稱謂不合因發函進牘于不佞且曰我已飾東壁以新志累子於是按南梁故事起自始登齋壇之後為記云時開成二年嵗在丁已春二月某日記山南西道新修驛路記開成四年梁州牧缺上玩其印凝旒深思曰伊爾卿族歸氏以文儒再世居喉舌今天官貳卿融能嗣其耿光嘗自内庭歴南臺尹轂下政事以試可為元侯乃付印綬進秩大宗伯兼御史大夫玉節獸符鎮于媯墟公拜手稽首曰臣融敢揚王休于天漢之域既莅止咨于羣執事求急病者先之咸曰華陽黒水昔稱醜地近者嘗為王所百態丕變人風邑屋與山水俱一都之㑹目為善部矣唯驛遽之途敧危隘束其醜尚存使如周道在公頥指耳於是因年有秋因府無事軍逸農隙人思賈餘乃懸墾山刋木之傭募其力揆鑚鑿撞柲之用庀其工具舁輦畚鍤之器膺其要鼛鼓以程之糗醪以犒之説使之令既下奮行之徒坌集我之提封踞右扶風觸劒閣千一百里自散闗抵襃城次舍十有五牙門將賈黯董之自襃而南逾利州至于劒門次舍十有七同節度副使石文穎董之兩將受命分曹星馳並山當蹊頑石萬狀坳者垤者兀者銛者磊落傾敧波翻獸蹲熾炭以烘之嚴䤈以沃之潰為埃煤一篲可埽棧閣盤虛下臨㰹呀層崖峭絶枘木亘鐵因而廣之限以鉤欄狹逕深陘銜尾相接從而拓之方駕從容急宣之騎宵夜不惑郄曲稜層一朝坦夷興役得時國人不知繇是駛行者忘其勞吉行者徐其驅孥行者家以安貨行者肩不病徒行者足不蠒乗行者蹄不刓公談私詠溢于人聴伊彼金其牛而誘之以利曷若我子其民而來之以義乎既訖役南梁人書事于牘請紀之以附于史官地里志劉賔客文集巻八欽定四庫全書劉賔客文集巻九唐劉禹錫撰記下夔州刺史㕔壁記夔在春秋為子國楚并為楚九縣之一秦為魚復漢為固陵蜀為巴東梁為信州初城于瀼西後周大總管龍門公拓王述登白帝歎曰此竒勢可居遂移府于今治所是嵗建徳五年隋初楊素以越公領總管又張大之唐興武徳二年詔書其以信州為夔州七年増名都督府督黔巫一十九郡開元中猶領七州天寳初罷州置郡號雲安至徳二年命嗣道王鍊為太守賜之旌節統硤中五郡軍事乾元初復為州偃節于有司第以防禦使為稱尋罷以支郡𨽻江陵按版圖方輸不足當通邑而今秩與上郡齒特以帶蠻夷故也故相國安陽公乾曜嘗參軍事修圖經言風俗甚備今以郡國更名之所以詳著于壁云凡名殊必以國事建必以年謹始也長慶二年五月一日刺史中山劉某記連州刺史㕔壁記此郡於天文與荆州同星分田壤制與畨禺相犬牙觀民風與長沙同祖習故嘗隸三府中而别合乃今最久而安得人統也按宋髙祖世始析郴之桂陽為小桂郡後以州統縣更名如今其制誼也郡従嶺州従山而縣従其郡邑東之望曰順山由順以降無名而相歆者以萬數回環鬱遶迭髙爭秀西北朝拱于九疑城下之浸曰湟水由湟之外支流而合輸以百數淪漣汩潏擘山為渠東南入于海山秀而髙靈液滲漉故石鍾乳為天下甲嵗貢三百銖原鮮而膴卉物柔澤故紵蕉為三服貴嵗貢十笥林富桂檜土宜陶旊故侯居以壯聞石侔琅玕水孕金碧故境物以麗聞環峯宻林激清儲隂海風敺温交戰不勝觸石轉柯化為涼颸城壓赭岡踞髙負陽土伯噓濕抵堅而散襲山逗谷化為鮮雲故罕罹嘔泄之患亟有華皓之齒信荒服之善部而炎裔之涼墟也永貞元年余始以尚書外郎坐黨累出補兹郡居無何吏議以是遷也不足庚其責故道貶為朗州司馬後十年詔書徵還抵京師俄復前命佩故印綬而南曩之騎竹馬北向相傒者咸仕郡縣巾韝來迎下車之日私唁且笑既視事得前二千石名姓于壁端宰臣王晙倖卿劉晃儒官嚴士元聞人韓泰僉拜焉或久於其治功利存乎人民或不之厥官翹顒載于歌謠余不佞従羣公之後肇武徳距于今凡五十有七人所舉者四君子猶振裘之於領䄂焉元和十一年七月二十四日刺史中山劉某記機汲記瀕江之俗不飲於鑿而皆飲之流予謫居之明年主人授館于百雉之内江水茫茫周墉間之一旦有工爰來思以技自賈且曰觀今之室廬及江之涯間不容畝顧積塊峙焉而前耳請用機以汲俾矗然之狀莫我遏巳予方異其説且命之飭力焉工也儲思環視相面勢而經營之由是比竹以為畚寘于流中中植數尺之臬輦石以壯其趾如建標焉索綯以為縆縻于標垂上屬數仞之端亘空以峻其勢如張弦焉鍛鐵為器外亷如鼎耳内鍵如樂鼓牝牡相函轉於兩端走于索上且受汲具及泉而脩綆下縋盈器而圓軸上引其往有建瓴之駛其來有推轂之易瓶繘不羸如搏而升枝長瀾出髙岸拂林杪踰峻防刳蟠木以承澍貫脩筠以達脈走下潺潺聲寒空中通洞環折唯用所在周除而沃盥以蠲入爨而錡釡以盈餁餗之餘移用于湯沐涑澣之末泄注于圃畦雖瀵湧于庭莫尚其霈洽也昔予嘗登陴􅏌然念懸流之莫可遽挹方勉保庸督臧獲􅆽而挈之至于裂肩龜手然猶家人視水如酒醪之貴今也一任人之智又従而信之機發于㝠㝠而形於用物浩溔東流赴海為期斡而遷焉逐我頥指曏之所謂阻且艱者莫能髙其髙而深其深也觀夫流水之應物植木之善建繩以柔而有立金以剛而無固軸巻而能舒竹圓而能通合而同功斯所以然也今之工咸盜其古先工之遺法故能成之不能知所以為我也智盡于一端功止于一名而巳噫彼經始者其取諸小過歟洗心亭記天下聞寺數十輩而吉祥尤章章蹲名山俯大江荆呉雲水交錯如繡始予以不到為恨今方弭所恨而充所望焉既周覽讃嘆於竹石間最竒處得新亭彤焉如巧人畫鼇背上物即之四顧逺邇細大􅀈然陳乎前引人目去求瞬不得徵其經始曰僧義然嘯侣為工即山求材槃髙孕虛萬景坌來詞人處之思出常格禪子處之遇境而寂憂人處之百慮冰息鳥思猿清繞梁歴榱月來松間彫鏤軒墀石列筍簴藤蟠蛟螭脩竹萬竿夏含涼颸斯亭之實録云爾然上人舉如意挹我曰既志之盍名之以行乎逺夫余始以是亭圜視無不適始適乎目而方寸為清故名洗心長慶四年九月二}
