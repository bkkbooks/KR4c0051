  - {type: variant, offset: 0, length: 3276, content: 劉夢得文集卷第九樂府泰娘歌秋扇詞搗衣曲七夕龍陽縣歌度桂嶺歌揷田歌畬田行蒲萄歌鶗鴂吟牆隂歌觀雲篇踏潮歌百花行春有情篇路傍曲白鷺兒壯士行邊風行竹枝詞楊柳枝詞浪濤沙詞瀟湘神詞抛毬樂詞又楊柳枝詞又竹枝詞紇那曲泰娘歌并引泰娘夲韋尚書家主謳者初尚書爲吴郡得之命樂工誨之琵琶使之歌且舞無幾何盡得其術居一二歳㩦之以歸京師京師多新聲善工於是又損去故技以新聲度曲而泰娘名字往往見稱於貴遊之閒元和初尚書薨于東京泰娘出居民閒乆之爲蘄州刺史張愻所得其後愻坐事謫居武陵郡愻卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭其音燋殺以悲雒客聞之爲歌其事以足于樂府云爾泰娘家夲昌門西門前緑水環金堤有時妝成好天氣走上臯橋折花戲風流太守韋尚書路傍忽見停隼旟斗量明珠鳥傳意紺幰迎入專城居長鬟如雲衣似霧錦茵羅薦承輕歩舞學驚鴻水榭春歌撩上客蘭堂暮從郎西入帝城中貴遊簪組香簾櫳低鬟緩視抱明月纎指破撥生胡風繁華一旦有銷歇題劒無光履聲絶洛陽舊宅生草萊杜陵蕭蕭松栢哀妝奩蟲網厚如繭愽山鑪側傾寒灰蘄州刺史張公子白馬新到銅駞里自言買笑擲黃金月墮雲中從自始安知鵩鳥坐隅飛寂寞旅魂招不歸秦家鏡有前時結韓壽香銷故篋衣山城少人江水碧斷鴈哀猿風雨夕朱絃巳絶爲知音雲鬢未秋私自惜舉目風煙非舊時夢㝷歸路多參差如何將此千行淚更灑湘江斑竹枝秋扇詞莫道恩情無重來人閒榮謝遞相催當時初入君懷袖豈念寒爐有死灰搗衣曲爽砧應秋律繁杵含淒風一一逺相續家家音不同户庭凝露清伴侣明月中長裾委襞積輕珮垂璁瓏汗餘衫更馥鈿移麝半空報寒驚邊鴈促思聞候蟲天狼正芒角虎落定相攻盈篋寄何處征人如轉蓬七夕二首河鼓靈旗動常娥破鏡斜滿空天是幕徐轉斗爲車機罷猶安石橋成不礙查寧知觀津女竟夕望雲涯天衢啓雲帳神馭上星橋初喜渡河漢頻驚轉斗杓餘霞張錦幛輕電閃紅綃非是人閒丗還悲後㑹遥龍陽縣歌縣門白日無塵土百姓縣前挽魚罟主人引客登大堤小人縱觀黃犬怒鷓鴣驚鳴遶籬落橘柚垂芳照牎户沙門草緑見吏稀寂歷斜陽照懸鼓度桂嶺歌桂陽嶺下下復髙髙人稀鳥獸駭地逺草木豪寄言千金子知余歌者勞插田歌并引連州城下俯接村墟偶登郡樓適有所感遂書其事爲俚歌以俟采詩者岡頭花草齊鷰子東西飛田塍望如線白水光參差農婦白紵裙農夫緑蓑衣齊倡田中歌嚶儜如竹枝但聞怨響音不辨俚語詞時時一大笑此必相嘲嗤水平苗漠漠煙火生墟落黃犬往復還赤雞鳴且啄路傍誰家郎烏帽衫袖長自言上計吏年初離帝郷田夫語計吏君家儂足諳一來長安罷眼大不相參計吏笑致詞長安眞大處省門髙軻峨儂人無度數昨來補衛士唯用筒竹布君看二三年我作官人去畬田行何處好畬田團團縵山腹鑚龜得雨卦上山燒卧木驚麏走且顧羣雉聲咿喔紅熖逺成霞輕煤飛入郭風引上髙岑獵獵度青林青林望靡靡赤光低復起照潭出老蛟爆竹驚山鬼夜色不見山孤明星漢閒如星復如月俱逐曉風滅夲從𫾣石光遂致烘天熱下種暖灰中乗陽拆牙孽蒼蒼一雨後苕穎如雲發巴人拱手吟耕耨不關心由來得地勢徑寸有餘隂蒲萄歌野田生蒲萄纒繞一枝蒿移來碧墀下張王日日髙分歧浩繁縟脩蔓蟠詰曲揚翹嚮庭柯意思如有屬爲之立長架布護當軒緑米液漑其根理踈看滲漉繁葩組綬結懸實珠璣蹙馬乳帶輕霜龍鱗躍初旭有客汾隂至臨堂瞪雙目自言我晉人種此如種玉釀之成美酒令人飲不足爲君持一斗往取涼州牧鶗鴂吟朝陽有鳴鳯不聞千萬祀鶗鴂摧衆芳畏聞先入耳秋風白露晞從是爾啼時如何上春日唧唧滿庭飛牆隂歌白日左右浮天潢朝脯影入東西牆昔爲童兒在隂戲當時意小覺日長東鄰侯家吹笙簧隨隂促促移象牀西隣田舎乏糟糠就影汲汲舂黃粱因思九州四海外家家只占牆隂内莫言牆隂數尺閒老却主人如等間君看眼前光景促中心莫學太行山觀雲篇興雲感隂氣疾走如見機晴來意態行有若功成歸葱蘢含晚景㓗白凝秋暉深夜渡銀漢漠漠仙人衣踏潮歌并引元和十年夏五月終風駕濤南海羨溢南人云踏潮也率三更歲一有之余爲連州客或爲予言其狀因歌之附于南越志屯門積日無迴飈滄波不歸成踏潮轟如鞭石矻且揺亘空欲駕黿鼉橋驚湍蹙縮悍而驕大陵髙岸失岧嶤四邊無阻音響調背負元氣掀重霄介鯨得性方逍遥仰鼻嘘吸揚朱翹海人狂顧迭相招罽衣髽首聲嘵嘵征南將軍登麗譙赤旗指麾不敢囂翌日風迴沴氣消歸濤納納景昭昭烏泥白沙復滿海海色不動如青瑶百花行長安百花時風景宜輕薄無人不沽酒何處不聞樂春風連夜動微雨凌曉濯紅豔出牆頭雪光映樓角繁紫韻松竹逺黃遶籬落臨路不勝愁輕飛去何託滿庭蕩魂魄照廡成丹渥爛漫嗾顚狂飄零勸行樂時節易婉娩清隂覆池閣唯有安石榴當軒慰寂寞春有情篇爲問遊春侶春情何處㝷花含欲語意草有鬪生心雨頻唯發色雲輕不作隂縱令無月夜芳興暗中深路傍曲南山宿雨晴春入鳯皇城處處聞絃管無非送酒聲白鷺兒白鷺兒最髙格毛衣新成雪不敵衆禽喧呼獨凝寂孤眠芊芊草乆立潺潺石前山正無雲飛去入遥碧壯士行隂風振寒郊猛虎正咆哮徐行岀燒地連吼入黃茅壯士走馬去鐙前彎玉弰叱之使人立一發如鈹交悍情忽星墮飛血濺林梢彪炳爲我席羶腥充我庖里中欣害除賀酒紛號呶明日長橋上傾城看斬蛟邊風行邊馬蕭蕭鳴邊風滿磧生暗添弓箭力斗上鼓鼙聲襲月寒暈起吹雲隂陣成將軍占氣候出號夜翻營竹枝詞并引九首四方之歌異音而同樂歳正月余來建平里中見聮歌竹枝吹短笛擊鼓以赴節歌者揚袂雎舞以曲多爲賢聆其音中黃鍾之羽其卒章激訐如吴聲雖傖儜不可分而含思宛轉有湛濮之豔昔屈原居沅湘閒其民迎神詞多鄙陋乃爲作九歌到于今荆楚鼓舞之故余亦作竹枝詞九篇俾善歌者颺之附于末後之聆巴歈知變風之自焉白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動郷情山桃紅花滿上頭蜀江春水拍江流花紅易衰似郎意水流無限似儂愁江上春來新雨晴瀼西春水縠文生橋東橋西好楊柳人來人去唱歌行日出三竿春霧消江頭蜀客駐蘭橈溤寄狂夫書一𥿄住在成都萬里橋兩岸山花似雪開家家春酒滿銀杯昭君坊中多女伴永安宫外踏青來城西門前灩澦堆年年波浪不能摧懊惱人心不如石少時東去復西來瞿唐嘈嘈十二灘此中道路古來難長恨人心不如水等間平地起波瀾巫峽蒼蒼煙雨時清猿啼在最髙枝箇裏愁人腸自斷由來不是此聲悲山上層層桃季花雲閒煙火是人家銀釧金釵來負水長刀短笠去燒畬楊柳枝詞九首塞北梅花羗笛吹淮南桂樹小山詞請君莫奏前朝曲聽唱新翻楊柳枝南陌東城春早時相逢何處不依依桃紅李白皆誇好須得垂楊相發揮鳯闕輕遮翡翠幃龍墀遥望麴塵絲御溝春水相暉映狂殺長安年少兒金谷園中鶯亂飛銅駝陌上好風吹城東桃李須臾盡爭似垂楊無限時花萼樓前初種時美人樓上鬪腰支如今抛擲長街裏露葉如啼欲恨誰煬帝行宫汴水濵數株殘柳不勝春晚來風起花如雪飛入宫牆不見人御陌青門拂地垂千條金縷萬條絲如今綰作同心結將贈行人知不知城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管別離輕盈嫋娜占年華舞榭妝樓處處遮春盡絮飛留不得隨風好去落誰家浪濤沙詞九首九曲黃河萬里沙浪濤風簸自天涯如今直上銀河去同到牽牛織女家洛水橋邊春日斜碧流輕淺見瓊砂無端陌上狂風急驚起鴛鴦出浪沙汴水東流虎眼文清淮晚色鴨頭春君看渡口濤沙處渡却人閒多少人鸚鵡舟頭浪颭沙青樓春望日將斜銜泥鷰子爭歸舎獨自狂夫不憶家濯錦江邊兩岸花春風吹浪正濤沙女郎翦下鴛鴦錦將嚮中流定晚霞日照澄州江霧開淘金女伴滿江隈美人手飾侯王印盡是沙中浪底來八月濤聲吼地來頭髙數丈觸山迴須臾却入海門去卷起沙堆似雪堆莫道讒言如浪深莫言遷客似沙沈千濤萬灑去雖辛苦吹盡狂沙始到金流水濤沙不暫停前波未滅後波生令人忽憶瀟湘渚迴唱迎神三兩聲瀟湘神詞二首湘水流湘水流九疑雲物至今愁君問二妃何處所零陵香草露中秋斑竹枝斑竹枝涙痕點點寄相思楚客欲聽瑶瑟怨瀟湘深夜月明時抛毬樂詞二首五綵繡團圎登君瑇瑁筵最宜紅燭下偏稱落花前上客如先起應須贈一舩春早見花枝朝朝恨發遲及看花落後却憶未開時幸有抛毬樂一杯君莫辭楊柳枝詞二首迎得春光先到來淺黃輕緑映樓臺秖縁嫋娜多情思便被春風長暗催巫峽巫山楊柳多朝雲暮雨逺相和因想陽臺無限事爲君迴唱竹枝歌竹枝詞二首楊柳青青江水平聞郎江上唱歌聲東邊日出西邊雨道是無晴還有晴楚水巴山江雨多巴人能唱夲郷歌今朝北客思歸去迴入紇那披緑羅紇那曲詞二首楊柳鬱青青竹枝無限情同郎一迴顧聽唱紇那聲踏曲興無窮調同詞不同願郎千萬壽長作主人翁右巳上詞先不入集今附卷末劉夢得文集卷第九劉夢得外集卷第九表述引傳碑論西戎表謝上連州刺史表含輝洞述吏隱亭述傳信方述彭陽唱和集引唱和集後引吳蜀集引汝洛集引子劉子自傳王公神道碑爲, WYG: ''}
