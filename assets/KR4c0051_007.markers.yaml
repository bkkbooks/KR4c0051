  - {type: variant, offset: 4512, length: 0, content: '', WYG: 亦分司至止歡愜可知因為聨句成周文酒㑹吾友勝鄒枚唯憶劉夫子而今又到來度欲迎先倒屣亦坐便傾盃飲許伯倫右詩推公幹才並以本事居易久曽聆郢唱重喜上燕臺晝話牆隂轉宵歡斗柄迴禹錫新聲還共聴故態復相咍遇物皆先賞従花半未開度起時烏帽側散處玉山頽墨客諠東閣文星犯上台居易詠吟君稱首疎放我為魁憶戴何勞訪隨夢得夢得分司而來留髠不用猜宴席上老夫暫起樂天宻坐不動足奉觴承麴蘖落筆捧瓊瑰醉弁無妨側詞鋒不可摧此兩韻美令公也居易水軒看翡翠石徑踐莓苔童子能騎竹佳人解詠梅陪遊南宅之境禹錫洛中三可矣鄴下七悠哉自向風光急不須絃管催度樂觀魚踴躍閒愛鸖裵􅏆烟柳青凝黛波萍緑撥醅居易春榆初改火律管又飛灰紅藥多遲發碧松宜亂栽禹錫馬嘶駞陌上鷁泛鳯城隈色色時堪惜㱔㱔病莫推度涸流尋軋軋餘刃轉恢恢従此知心伏無因敢自媒禹錫室隨親客入席許舊寮陪逸興嵇將阮交情陳與雷此二句屬夢得也居易洪爐思哲匠大厦要羣材佗日登龍路應知免曝鰓禹錫洛中早春贈樂天漠漠復靄靄半晴將半隂春來自何處無迹日以深韶嫩水後木輕盈烟際林藤生欲有託柳弱不自任花意已含蓄鳥言尚沈吟期君當此時與我恣追尋飜愁闌漫後春暮却傷心和樂天讌李周美中丞宅池上賞櫻桃花櫻桃千萬枝照耀如雪天王孫讌其下隔水疑神仙宿露發清香初陽動暄妍妖姬滿鬢插酒客折枝傳同此賞芳月㡬人有華筵杯行勿遽辭好醉逸三年和牛相公遊南莊醉後寓言戲贈樂天兼見示城}
