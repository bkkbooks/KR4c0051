  - {type: variant, offset: 4547, length: 0, content: '', WYG: 客寄新篇清似湘靈促柱絃京邑舊遊勞夢想歴陽秋色正澄鮮雲銜日脚成山雨風駕潮頭入渚田對此獨吟還獨酌知音不見思蒼然酬湖州崔郎中見寄風筝吟秋空不肖指爪聲髙人靈府間律吕伴咸英昔年與兄遊文似馬長卿今來寄新詩乃類陶淵明磨礱老益智吟詠閒彌精豈非山水鄉蕩漾神機清渚烟蕙蘭動溪雨虹蜺生馮君虛上舍待我乘興行酬楊八庶子喜韓吳興與余同遷見贈依本韻次用早遇聖明朝鴈行登九霄吳興與余中外兄弟文輕傅武仲酒逼葢寛饒捨矢同瞻鵠當筵共賽梟吳興與余同年判入等第琢磨三益重唱}
