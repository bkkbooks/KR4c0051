  - {type: variant, offset: 4555, length: 1, content: 重, WYG: 裴令公夜宴天下蒼生望不休東山雖有但時遊從來海上仙桃樹肯逐人間風露秋洛濵病卧李侍郎見惠藥物謔以文星之句隠几支頥對落暉故人書信到柴扉周南留滯商山老星象如今屬少微詶留守牛相公宫城早秋寓言見寄曉月映宫樹秋光起天津涼風稍動葉宿露未生塵景氣尚芳麗曠望感心神揮毫成逸韻開閤遲來賔擺去將相印漸為逍遥身如招後房宴却要白頭人牛相公留守見示城外新墅有溪竹秋月親情多徃宿遊恨不得去因成四韻兼簡洛中親故之什兼命同作别墅洛城外月明村㙒通光輝滿地上絲管發舟中堤豔菊花露島涼松葉風髙情限清禁寒漏滴深宫和僕射牛相公追感韋裴六相登庸皆四十餘未五十薨殁豈早榮早枯之義今年將六十猶粗强健因親故勸酒率然成篇并見寄之作坐鎮清朝獨殷然閒徵故事數前賢用才同踐鈞衡地稟氣終分大小年威鳯本池思泛泳仙查舊路望囘旋猶憐綺季深山裏唯有松風與石田和僕射牛相公以離闕庭七年班行親故亡殁十無一人再覩龍顔喜慶雖極感歎風燭能不愴然因成四韻并示集賢中書二相公所和久辭龍闕擁紅旗喜見天顔拜赤墀三省英寮非舊侣萬年芳樹長新枝交朋接武居仙院幕客追風入鳯池雲母屏風即施設可憐榮耀冠當時和僕射牛相公見示長句静得天和興自濃不縁宦達性靈傭大鵬六月有閒意仙鶴千年無躁容流輩盡來多歎息官班髙後少過從唯應加築露臺上䞉見終南雲外峯和牛相公雨後寓懐見示金火交争正抑揚蕭蕭飛雨助清商曉看紈扇恩情薄夜覺紗燈刻數長樹上早蟬纔發響庭中百草已無光當年富貴亦惆悵何況悲翁髮似霜牛相公林亭雨後偶成飛雨過池閣浮光生草樹新竹開粉奩初蓮􅅡香注野花無時節水鳥自來去若問知境人人間第一處和牛相公}
