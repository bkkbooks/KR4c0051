  - {type: variant, offset: 4543, length: 0, content: '', WYG: 二首凄凉沃洲僧憔悴柴桑宰别來二十年唯餘兩心在越江千里鏡越嶺四時雪中有逍遙人夜深觀水月詶元九院長自江陵見寄無事尋花至仙境等閒栽樹比封君金門通籍真多士黄紙除書每日聞韓十八侍御見示岳陽樓别竇司直詩因令屬和重以自述故足成六十二韻楚江何蒼然曽瀾七百里孤城寄逺目一寫無窮巳蕩漾浮天葢四環宣地里積漲在三秋混成非一水冬遊見清淺春望多洲渚雲錦逺沙明風烟青草靡火星忽南見月硤方東迤雪波西山來隠若長城起獨専朝宗路駛悍不可止支川讓其威蓄縮至南委熊武走蠻落熊武二溪名瀟湘來奥鄙炎蒸動泉源積潦捜山趾歸往無旦夕包含通逺邇行當白露時眇視秋光裏曙色未昭晰露華遙斐亹浩耳神骨清如觀混元始我風忽震盪驚浪迷津涘怒激鼔鏗訇蹙成山巋硊鵾鵬疑變化罔象何恢詭噓吸寫樓臺騰驤露鬐尾景移羣動息波靜繁音弭明月出中央青天絶纎滓素光淡無際緑靜平如砥空影渡鵷鴻秋聲思蘆葦鮫人弄機杼貝闕駢紅紫珠蛤}
