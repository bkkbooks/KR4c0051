  - {type: variant, offset: 4554, length: 0, content: '', WYG: 草初生邉鴈去山花半謝杜鵑啼青油畫捲臨髙閣紅斾晴翻繞古堤明日漢庭徴舊徳老人爭出若耶溪後漢劉寵為㑹稽太守及徵為將作大匠山隂縣有五六老叟自若耶山谷間出人齎百錢以送寵寵勞之答曰自明府下車狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言耶勤苦父老為人選一大錢受之酬淮南牛相公述舊見貽少年曽忝漢庭臣晚嵗空餘老病身初見相如成賦日尋為丞相掃門人追思徃事咨嗟久喜奉清光笑語頻猶有登朝舊冠冕待公三入拂埃塵酬鄭州權舍人見寄十二韻朱户凌晨啟碧梧含早凉人從桔柣至書到漆沮傍抃㑹因佳句情深取斷章愜心同笑語入耳勝笙簧憶昔三條路居鄰數仞牆舍人舊宅光福里時忝為東鄰學堂青玉案綵服紫羅囊麟角看成就龍駒見抑揚彀中飛一箭雲際落雙鶬舍人一舉登科又判入等第甸邑叨前列天臺媿後行鄙人離渭南主簿十年舍人方尉其邑及罹譴謫重入南宫禮部郎中舍人方任考功員外鯉庭傳事業雞樹遂翺翔書殿連鳴鵲神池接鳯凰追遊䝉尚齒惠好結中膓鄙人在集賢與西掖接近日夕追遊鎩翮方擡舉危根易損傷一麾憐弃置五字借恩光鄙人出牧姑蘇舍人草制汝海崆峒秀溱流芍藥芳風行能偃草境静不争桑鄙人轉臨汝舍人牧滎陽轉斾趨闗右頒條匝渭陽病吟猶有思老醉巳無狂塵滿鴻溝道沙驚白狄鄉佇聞黄紙詔促召紫微郎奉}
