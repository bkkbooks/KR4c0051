  - {type: variant, offset: 4544, length: 0, content: '', WYG: 玲瓏文鰩翔旖旎水鄉呉蜀限地勢東南庳翼軫粲垂精衡巫屹環峙名雄七澤藪國辨三苗氏唐羿斷脩虵荆王憚下逆反青兕秦狩跡猶在虞巡路従此軒后奏宫商騷人詠蘭芷茅嶺潜相應橘洲傍可指郭璞驗幽經羅含著前紀觀律戚里族按道侯家子聨袂登髙樓臨軒笑相視假守亦髙卧竇時權領郡事墨曹正垂耳韓亦量移江陵法曹契闊話温凉壺觴慰遷徙地偏山水秀客重杯盤侈紅袖花欲然銀燈晝相似興含更抵掌樂極同啟齒筆鋒不能休藻思一何綺伊余負微尚夙昔慙知已出入金馬門交結青雲士襲芳踐蘭室學古遊槐市策慕宋前軍文師漢中壘陋容昧俯仰孤志無依倚衞足不如葵漏川空歎蟻幸逢萬物泰獨處窮途否鎩翮重疊傷兢䰟再三禠蘧瑗亦屢化左丘猶有恥桃源訪仙宫薛服祠山鬼故人南臺舊一别如弦矢今朝㑹荆巒斗酒相宴喜為余出新什笑抃隨伸紙奕若觀五色歡然臻四美委曲風濤事分明窮達㫖洪韻發華鐘凄音激清徵羊濬要平聲共和江淹多雜擬徒欲仰髙山焉能追逸軌湘洲路四達巴陵城百雉何必顔光禄留詩張内史詶竇員外使君寒食日途次松滋渡先寄示四韻楚鄉寒食橘花時野渡臨風駐綵旗草色連雲人去住水紋如縠燕差池朱輪尚憶羣飛雉青}
