  - {type: variant, offset: 4541, length: 0, content: '', WYG: 寄懷簡諸僚故退朝還公府騎吹息繁音吏散秋庭寂鳥啼烟樹深威生奉白簡道勝外華簪風物清逺目功名懷寸隂雲衢念前侣綵翰寫沖襟凉菊照幽院敗荷攅碧潯感時江海思報國松筠心空愧夀陵步芳塵何處尋赴連州途經洛陽諸公置酒相送張員外賈以詩見贈率爾詶之謫在三湘最逺州邊鴻不到水南流如今暫寄尊前笑明日辭君步步愁贈元九侍御文石枕以詩奬之文章似錦氣如虹宜薦華簪緑殿中縱使真飇生旦夕猶堪拂拭愈頭風詶元九侍御贈璧竹鞭長句碧玉孤根生在林美人相贈比雙金初開郢客緘封後想見巴山氷雪深多節本懐端直性露青猶有嵗寒心何時策馬同歸去闗樹扶疎敲鐙吟和李六侍御文宣王廟釋奠作歎息魯先師生逢周室卑有心律天道無位救陵夷歴聘不能用領徒空爾為儒風正禮樂旅象入蓍龜西狩非其應中都安足施世衰由我賤泣下為人悲遺教光文徳興王叶夢期土田封後𦙍冕服飾虛儀鐘鼓膠庠薦牲牢郡邑祠聞君喟然歎偏在上丁時敬詶徹公}
