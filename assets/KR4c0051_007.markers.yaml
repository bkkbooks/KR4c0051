  - {type: variant, offset: 4539, length: 0, content: '', WYG: 還諳事閱人如閱川細思皆幸矣下此便翛然莫道桑榆晚為霞尚滿天嵗夜詠懐彌年不得意新嵗又如何念昔同遊者而今有㡬多以閒為自在將夀補蹉跎春色無新故幽居亦見過元日樂天見過因舉酒為賀漸入有年數喜逢新嵗來震方天籟動寅位帝車回門巻掃殘雪林園驚早梅與君同甲子夀酒讓先杯裴令公見示詶樂天寄奴買馬絶句斐然仰和且戲樂天常奴安得似方回爭望追風絶足來若把翠娥酬緑耳始知天下有竒才詶思黯代書見戲官冷如漿病滿身凌寒不易過天津少年留守多情興請待花時作主人詶思黯見示小飲四韻抛却人間第一官俗情驚怪我方安兵符相印無心戀洛水嵩雲恣意看三足鼎中知味久百尋竿上擲身難追呼故舊連宵飲直到天明興未闌詶樂天醉後狂吟十韻來章有移家惟醉和之句散誕人間樂逍遙地上仙詩家登逸品釋氏悟真筌制誥留臺閤歌詞入管絃處身於木鴈任世變桑田吏隠情兼遂儒𤣥道兩全八闗齊適罷三雅興尤偏文墨中年舊松筠晚嵗堅魚書曽替代香火有因縁陸法和云與梁元帝於空王寺佛前訂香火因緣欲向醉鄉去猶為色界牽好吹楊柳曲為我舞金鈿詶牛相公獨飲偶醉寓言見示宫漏夜丁丁千門閉霜月華堂列紅燭絲管靜中發歌眉低有思舞體輕無骨主人啓酡顔酣暢浹映髮猶思城外客阡陌不可越春意日夕深此歡無斷絶和僕射牛相公春日閒坐見懐官曹崇重難頻入第宅清閒且獨行階蟻相逢如偶語園蜂速去恐違程人於紅藥惟看色鶯到垂楊不惜聲東洛池臺怨抛擲移文非久㑹應成牛相公見示新什謹依本韻次用以抒下情劇韻新篇至因難始有能雨天龍變化晴日鳳騫騰遊海驚何極聞韶素不曽愜心時拊髀擊節自麾肱符彩添俞墨波瀾起剡藤揀金光熠熠累璧勢層層珠媚多蔵賈花撩欲定僧封來真寳物寄與媿文朋巳老無時疾時洛中時癘多傷少年長貧望嵗登雀羅秋寂寂蟲翅曉薨薨羸驥方辭絆虛舟已絶絙榮華甘死别健羨亦生憎玉柱琤瑽韻金觥雹凸稜何時良宴㑹促膝對華燈秋霖即事聨句三十韻蕭索窮秋月蒼茫苦雨天泄雲生棟上行潦入庭前居易送上僕射苔色侵三徑波聲想五絃井蛙爭入户轍鮒亂歸泉起送上中丞大監髙霤愁晨坐空階警夜眠鶴鳴猶未已蟻穴亦頻遷禹錫送上少傅侍郎散漫疎還宻空濛斷又連竹霑青玉潤荷滴白珠圓居易地濕灰蛾滅池添水馬憐有苗霑霢霂無月弄潺湲起籬菊潛開秀園蔬已罷鮮斷行隨鴈翅孤嘯聳鳶肩禹錫橋柱黏黄菌牆衣㸃緑錢草荒行藥路沙淀釣魚船居易長者車猶阻髙人榻且懸此思劉台之來也金烏何日見玉爵㡬時傳起近井桐先落當簷石欲穿趨風誠有戀披霧邈無縁禹錫以答懸榻之召廩米陳生醭庖薪濕起烟鳴鷄潜起曉急景暗彫年居易葢洒髙松上絲繁細柳邊拂叢時起蝶墜葉乍驚蟬起巾角皆爭墊裙裾别似湔人多䝉翠被馬盡著連乾禹錫好客無來者貧家但悄然寒泥印鶴跡漏壁絡蝸涎居易蚊聚雷侵室鷗翻浪滿川上樓愁羃羃遶舍厭濺濺起律候今秋矣歡娯久曠焉但令髙興在晴後奉周旋禹錫喜晴聨句苦雨晴何喜喜於未雨時氣收雲物變聲樂鳥烏知居易送上僕射蕙泛光風圃蘭開皎月池千峯分逺近九陌好追隨起送上尚書白日開天路𤣥隂巻地維餘清在林薄新照入漣漪禹錫碧樹凉先落青蕪濕更滋㬠毛經浴鶴曳尾出泥龜居易舞去商羊速飛來野馬遲柱邊無潤礎臺上有遊絲起橋淨行塵息堤長禁柳垂宫城開睥睨觀闕麗罘罳禹錫洛水澄清鎮嵩烟展翠帷梁成虹乍見市散蟣初移居易藉草風猶暖攀條露已晞屋穿添碧瓦牆缺召金縋起迥澈來雙目昏煩去四支霞文晚煥爛星彩夕參差禹錫爽助門庭肅寒摧草木衰黄乾向陽菊紅洗得霜梨居易假葢閑誰惜彈絃燥更悲散蹄良馬穏炙背野人宜起洞户晨輝入空庭宿霧披推牀出書目傾笥上衣椸禹錫道路行非阻軒居望可期無辭訪圭竇且願見瓊枝居易山閣蓬萊客古以祕書喻蓬萊儲宫羽翼師此言少傅每優陪麗句何暇覿英姿起以酬圭竇之言翫景方搔首懷人尚斂眉因吟仲文什髙興盡於斯禹錫㑹昌春連宴即事元年寒食日上已暮春天雞黍三家㑹鶯花二節連居易光風初淡蕩美景漸暄妍簮組蘭亭上車輿曲水邊禹錫松聲添奏樂草色助鋪筵雀舫宜閒泛螺杯任漫傳起園蔬香帶露㕑柳暗蔵烟麗句輕珠玉清談勝管絃居易陌喧金距鬭樹動綵繩懸姹女粧梳豔遊童衣服鮮禹錫圃香知種蕙池暖憶開蓮怪石雲疑觸夭桃火欲燃起正歡唯恐散雖醉未思眠嘯傲人間世追隨地上仙居易燕來雙涎涎鴈去累翩翩行樂真吾事尋芳獨我先禹錫滯周慙太史太史公留滯周南今榮示慙古人矣入洛繼先賢此言劉白聲價與二陸爭長矣昔恨多分手今歡謬比肩起病猶陪讌飲老更奉周旋望重青雲客情深白首年居易遍嘗珍饌後許入畫堂前舞袖翻紅炬歌鬟插寳蟬禹錫斷金多感激倚玉貴遷延説史吞顔注論詩笑鄭箋起松筠寒不變膠漆冷彌堅興伴王尋戴謂隨僕射過尚書也榮同隗在燕居易自謂擲盧誇使氣刻燭鬬成篇實藝皆三捷虛名愧六聨禹錫興闌猶舉白話靜毎思𤣥更説歸時好亭亭月正圓起僕射來示有三春向晚四者難并之説誠哉是言輒引起題重為聨句疲兵再戰勍敵難降下筆之時囅然自哂走呈僕射兼簡尚書三春今向晚四者昔難并借問低眉坐何如攜手行居易舊遊多過隙新宴且尋盟鸚鵡林須樂麒麟閣未成起分隂當愛惜遲景好逢迎林野薫風起樓臺穀雨晴禹錫牆低山半出池廣水初平橋轉長虹曲舟回小鷁輕居易殘花猶布繡宻竹自聞笙欲過芳菲節難忘宴慰情起月輪行似箭時物勢如傾見鴈隨兄去聴鶯來友聲禹錫蕙長書帶展菰嫩剪刀生坐宻衣裳暖堂虛絲管清居易峯巒侵碧落草木近朱明與㸃非沂水陪膺是洛城白嘗為三川守故云起撥醅爭緑醑卧酪待朱櫻㡬處能留客何人喚解酲禹錫舊儀尊右揆新命寵春卿有喜鵲頻語無機鷗不驚居易青林思小隠白雪仰芳名訪舊殊千里登髙賴九城起鄼侯司管鑰疎傅傲簮纓綸綍曽同掌烟霄即上征禹錫册庭嘗接武書殿忝連衡蘭室春彌馥松心晚更貞居易琴招翠羽下釣掣紫鱗呈只願回烏景誰能避兕觥起方知醉兀兀應勝走營營鳯閣鸞臺路従他年少爭居易更呈二公樂天是月長齋鄙夫此時愁卧里閭非逺雲霧難披因以寄懐遂為聨句所期解悶焉敢驚禪五月長齋月文心苦行心蘭蔥不入户薝蔔自成林夢得䕶戒先辭酒嫌喧亦徹琴塵埃賔位靜香火道場深樂天我靜馴狂象餐餘施衆禽定知於佛佞豈復向書淫夢得欄藥凋紅豔庭槐換緑隂風光徒滿目雲霧未披襟樂天樹為清凉倚池因盥漱臨蘋芳遭燕拂蓮坼待蜂尋夢得舍下環流水窻中列逺岑苔斑錢剝落石怪玉嶔崟樂天鵲頂迎秋秃鶯喉入夏瘖柳絲垂色綖棘刺露長針夢得散秩身猶幸趨朝力不任官將方共拙年與病交侵樂天徇樂非時選忘機似陸沈鑒容稱四皓捫腹有三壬夢得攜手慙連璧同心許斷金紫芝雖繼唱前後各在賔客白雪少知音樂天憶罷呉門守相逢楚水潯舟中頻曲宴夜後各加斟夢得濁酒銷殘漏絃聲間逺砧酡顔舞長袖宻坐接華簪樂天持論峯巒峻戰文矛㦸森笑言誠莫逆造次必相箴夢得往事應如昨餘歡迄至今迎君常倒屣訪我輒攜衾樂天隂魄初離畢將有後雨陽光正在參五月之節待公休一食縦飲共狂吟夢得劉賔客外集巻四欽定四庫全書劉賔客外集巻五唐劉禹錫撰雜詩答張侍御賈喜再登科後自洛赴上都贈别又被時人寫姓名春風引路入京城知君憶得前身事分付鶯花與後生和武中丞}
