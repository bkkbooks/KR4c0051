  - {type: variant, offset: 4565, length: 0, content: '', WYG: 酬白少傅侍郎長句因通簡汝洛舊遊之什寥廓髙翔不可追風雲失路暫相隨方同洛下書生詠又見軍前大將旗雪裏命賔開玉帳飲中請號駐金巵竹林一日王戎去嵇阮雖貧興未衰和僕射牛相公寓言二首兩度竿頭立定誇囘眸舉袖拂青霞盡抛今日貴人様復振前朝名相家御史定來休直宿尚書依舊趂參衙具瞻尊重誠無敵猶憶洛陽千樹花心如止水鑒常明見盡人間萬物情鵰鶚騰空猶逞俊驊騮齒足自無驚時來未覺權為祟貴了方知退是榮只恐重重世縁在事須三度副蒼生和牛相公南溪醉歌見寄脱屣將相守沖謙唯於山水獨不亷枕伊背洛得勝地鳴臯少室來軒簷相去聲形面勢黙指畫言下變化隨顧瞻清池曲榭人所致野趣幽芳天與添有時轉入潭島間珍木如幄藤為簾忽然便有江湖思沙礫平淺草纎纎怪石釣出太湖底珠樹移自天台尖崇蘭迎風緑泛艶坼蓮含露紅􅀈襜修廊架空逺岫入弱栁覆檻流波霑渚蒲抽莢劒脊動岸荻迸笋錐頭銛攜觴命侣極永日此會雖數心無厭人皆置莊身不到富貴難與逍遙兼唯公出處得自在決就放曠辭炎炎座賔盡歡恣談謔愧我掉頭還奮髯能令商於多病客亦覺自適非沉潜詶僕射牛相公晉國池上别後至甘棠館忽夢同遊因成口號見寄已嗟池上别魂驚忽報夢中攜手行此夜獨歸還乞夢老人無睡到天明裴侍郎大尹雪中遺酒一壺兼}
