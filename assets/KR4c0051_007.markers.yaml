  - {type: variant, offset: 4501, length: 0, content: '', WYG: 似爛柯人沈舟側畔千帆過病樹前頭萬木春今日聴君歌一曲暫憑杯酒長精神同樂天登棲靈寺塔步步相攜不覺難九層雲外倚闌干忽然語笑半天上無限遊人舉眼看罷郡歸洛途次山陽留辭郭中丞使君自到山陽不許辭髙齋日夜有佳期管絃正合看書院語笑方酬各詠詩銀漢雪晴褰翠幕清淮月影落金巵洛陽歸客明朝去容趂城東花發時楚州開元寺北院枸杞臨井繁茂可觀羣賢賦詩因以繼和僧房藥樹依寒井井有香泉樹有靈翠黛葉生籠石甃殷紅子熟照銅瓶枝繁本是仙人杖根老新成瑞犬形上品功能甘露味還知一勺可延齡和樂天鸚鵡養來鸚鵡觜初紅宜在朱樓繡户中頻學喚人縁性慧偏能識主為情通斂毛睡足難銷日嚲翅愁時願見風誰遣聰明好顔色事須安置入深籠嵗杪將發楚州呈樂天楚澤雪初霽楚城春欲歸清淮變寒色逺樹含清暉原野巳多思風霜潛減威與君同旅鴈北向刷毛衣洛中逢白監同話遊梁之樂因寄宣武令狐相公曽經謝病各遊梁今日相逢憶孝王少有一身兼將相更能四面占文章開顔坐内催飛盞迴首庭中看舞槍借問風前兼月下不知何客對胡床河南王少尹宅燕張常侍白舍人兼呈盧郎中李員外二副使將星夜落使星來三省清臣到外臺事重各銜天子詔禮成同把故人盃捲簾松竹雪初霽滿院池塘春欲迴第一林亭迎好客殷勤莫惜玉山頽鶴歎二首并序友人白樂天去年罷呉郡挈雙鶴雛以歸余相遇于揚子津閒翫終日翔舞調態一符相書信華亭之尤物也今年春樂天為祕書監不以鶴隨置之洛陽第一旦予入門問訊其家人鶴軒然來睨如記相識裵􅏆俛仰似含情顧慕填膺而不能言者因作鶴歎以贈樂天寂寞一雙鶴主人在西京故巢呉苑樹深院洛陽城徐引竹間步逺含雲外情誰憐好風月鄰舍夜吹笙東鄰即王家丹頂宜承日霜翎不染泥愛池能久立看月未成棲一院春草長三山歸路迷主人朝謁早貪養汝南雞有所嗟二首庾令樓中初見時武昌春柳似腰肢相逢相笑盡如夢為雨為雲今不知鄂渚濛濛烟雨㣲女郎䰟逐暮雲歸只應長在漢陽渡化作鴛鴦一隻飛答樂天臨都驛見贈北固山邊波浪東都城裏風塵世事不同心事新人何似故人再贈樂天一政政官軋軋一年年老駸駸身外名何足算别來詩且同吟和裴相公傍水閒行為愛逍遙第一篇時時閒步賞風烟看花臨水心無事功業成來二十年和宣武令狐相公郡齋對新竹新竹脩翛韻曉風隔牕依砌尚䝉籠數間素壁初閒後一段清光入座中敧枕閒看知自適含毫朗咏與誰同此君若欲長相見政事堂東有舊叢答白刑部聞新蟬蟬聲未發前巳自感流年一入凄凉耳如聞斷續絃晴清依露葉晚急畏霞天何事秋卿咏逢時亦悄然和裴相公寄白侍郎求雙鶴皎皎華亭鶴來隨太守船白君罷具郡太守攜雙鶴來青雲意長在滄海到經年留滯清洛苑裵􅏆明月天何如鳯池上雙舞入祥烟和樂天送鶴上裴相公别鶴之作昨日看成送鶴詩髙籠提出白雲司朱門乍入應迷路玉樹容棲莫揀枝雙舞庭中花落處數聲池上月明時三山碧海不歸去且向人間呈羽儀終南秋雪南嶺見秋雪千門生早寒閒時乗馬望髙處巻簾看霧散瓊枝出日斜鉛粉殘偏宜曲江上倒影入清瀾闕下待傳㸃呈諸同舍禁漏晨鐘聲欲絶旌旗組綬影相交殿含佳氣當龍首閣倚晴天見鳯巢山色蔥蘢丹檻外霞光泛灧翠松梢多慙再入金門籍不敢為文學解嘲和樂天早寒雨引苔侵壁風驅葉擁堦久留閒客話宿請老僧齋酒甕新陳接書籖次第排翛然自有處搖落不傷懐和樂天以鏡換酒把取菱花百鍊鏡換他竹葉十旬杯嚬眉厭老終難去蘸甲須歡便到來妍醜太分迷忌諱松喬俱傲絶嫌猜校量功力相千萬好去從空白玉臺同樂天送河南馮尹學士可憐玉馬風流地暫輟金貂侍從才閣上掩書}
