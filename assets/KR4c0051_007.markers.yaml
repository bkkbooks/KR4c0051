  - {type: variant, offset: 4513, length: 0, content: '', WYG: 園林初夏天就中野趣在西偏薔薇亂發多臨水鸂鶒雙遊不避船水底逺山雲似雪橋邊平岸草如烟白家唯有盃觴興欲把頭盤打少年思黯南墅賞牡丹花偶然相遇人間世合在増城何姥家有此傾城好顔色天教晚發賽諸花樂天少傅五月長齋廣延緇徒謝絶文友坐成暌間因以戲之五月長齋戒深居絶送迎不離通徳里便是法王城舉目皆僧事全家少俗情精脩無上道結念未來生賔閤緇衣占書堂信鼓鳴戲童為塔象啼鳥學經聲黍用青菰角葵承玉露烹馬家供薏苡劉氏餉蕪菁暗網籠歌扇流塵晦酒鐺不知何次道作佛㡬時成樂天池館夏景方妍白蓮初開綵舟空泊唯邀緇侣因以戲之池館今正好主人何寂然白蓮方出水碧樹未鳴蟬靜室宵聞磬齋㕑晚絶烟蕃僧如共載應不是神仙詶樂天晚夏閑居欲相訪先以詩見貽池榭堪臨泛翛然散鬱陶步因驅鸖緩吟為聴蟬髙林宻添新竹枝低縋晚桃酒醅晴易熟藥圃夏頻薅老是班行舊閒為鄉里豪經過更何處風景屬吾曹詶樂天感秋凉見寄庭晚初辨色林秋微有聲槿衰猶强笑蓮迥却多情簷燕歸心動韝鷹俊氣生閑人占閒景酒熟且同傾樂天以愚相訪沽酒致歡因成七言聊以奉答少年曽醉酒旗下同輩黄衣頷亦黄蹴踏青雲尋入仕蕭條白髮且飛觴令徵古事歡生雅客喚閒人興任狂猶勝獨居荒草院蟬聲聴盡到寒螿秋晚新晴夜月如練有懷樂天雨歇晚霞明風調夜景清月髙微暈散雲薄細鱗生露草百蟲思秋林千葉聲相望一步地脈脈萬重情和思黯南莊見示丞相新家伊水頭智囊心匠日増脩化成池沼無痕跡奔走清波不自由臺上看山徐舉酒潭中見月慢回舟従來天下推尤物合屬人間第一流同留守王僕射各賦春中一物從一韻至七鶯能語多情春將半天欲明始逢南陌復}
