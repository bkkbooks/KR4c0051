  - {type: variant, offset: 4537, length: 1, content: 禊, WYG: 曲拍為句春去也多謝洛城人弱柳従風疑舉袂叢蘭裛露似霑巾獨坐亦含嚬謝樂天聞新蟬見贈碧樹有蟬後烟雲改容光瑟然引秋氣芳草日夜黄夾道喧古槐臨池思垂楊離人下憶淚忠士激剛腸昔聞阻山川今聴同匡牀人情便所遇音韻豈殊常因之比笙竽送我遊醉鄉新秋對月寄樂天月露發光彩此時方見秋夜凉金氣應天靜火星流蛩響偏依井螢飛直過樓相知盡白首清景復追遊詶樂天小臺晚坐見憶小臺堪逺望獨上清秋時有酒無人勸看山祗自知幽禽轉新竹孤蓮落靜池髙門勿遽掩好客無前期早秋雨後寄樂天夜雲起河漢朝雨洒髙林梧葉先風落草蟲迎濕吟簟凉扇恩薄室靜琴思深且喜炎前别安能懐寸隂和樂天秋凉閒卧暑退人體輕雨餘天色改荷珠貫索斷竹粉殘粧在髙僧掃室請逸客登樓待槐柳漸蕭疎閒門少光彩秋晚病中樂天以詩見問力疾奉酬耳虛多聴逺展轉晨雞鳴一室背燈卧中夜掃葉聲蘭芳經雨敗鸖病得秋輕肯踏衡門草唯應是友生和樂天燒藥不成命酒獨醉九轉欲成就百神應主持鶯啼鼎上去老貌鏡中悲却顧空丹竈回心向酒巵醺然耳熱後暫似少年時詶樂天詠老見示人誰不願老老去有誰憐身瘦帶頻減髮稀冠自偏廢書縁惜眼多炙為隨年經}
