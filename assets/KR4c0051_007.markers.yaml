  - {type: page-break, offset: 4544, content: '', id: KR4c0051_WYG_035-5a}
  - {type: variant, offset: 4545, length: 0, content: '', WYG: 初縣左顧龜非是湓城魚司馬水曹何事與新詩和竇中丞晚入容江作漢郡三十六鬱林東南遙人倫選清臣天外頒詔條桂水步秋浪火山凌霧朝分圻辨風物入境聞謳謠莎岸見長亭烟林隔麗譙日落舟益駛川平旗自飄珠浦逺明滅金沙晴動搖一吟道中作離思懸層霄吕八見寄郡内書懐因而戲和文苑振金聲循良冠百城不知今史氏何處列君名寄楊八拾遺時出為國子主簿分司東都韓十八員外亦轉國子博士同在洛陽聞君前日獨庭爭漢帝偏知白馬生忽領簿書遊太學寧勞侍従厭承明洛陽本自宜才子海内而今有直聲為謝同寮老博士范雲來嵗即公卿詶竇員外郡齋宴客偶命柘枝因見寄兼呈張十一院長元九侍郎員外時兼節度判官佐平蠻之畧張初罷都官元方従事分憂餘刃又従公白羽胡床嘯詠中綵筆諭戎矜倚馬華堂留客看驚鴻渚宫油幕方髙步澧浦甘棠有㡬叢若問騷人何處所門臨寒水落江楓謝竇員外旬休早凉見示詩奉書報詰朝有宴新秋十日澣朱衣鈴閣無聲公吏歸風韻漸髙梧葉動露光初重槿花稀四時苒苒催容鬢三爵油油忘是非更報明朝池上酌人知太守字𤣥暉詶楊侍郎憑見寄二首翔鸞闕底謝皇恩纓上滄浪舊水痕疎傅揮金忽相憶逺擎長句與招䰟十年毛羽催頽一旦天書召回看看花時欲到故侯也好歸來南海馬大夫見恵著述三通勒成四帙上自遂古達于國朝采其菁華至簡如富欽受嘉貺詩以謝之紅旗閱五兵絳帳領諸生味道輕鼎食退公猶筆耕青箱傳學逺金匱納書成一瞬見前事九流當抗行編蒲曽苦思垂竹媿無名今日承芳訊誰言贈衮榮南海馬大夫逺示著述兼詶拙詩輒著微誠再有長句時蔡戎未弭故見於末篇漢家旌斾付雄才百越南溟統外臺身在絳紗傳六藝腰懸青綬亞三台連天浪靜長鯨息映日帆多寳舶來聞道楚氛猶未滅終須旌斾掃雲雷和楊侍郎初至郴州紀事書情題郡齋八韻旌節下朝臺分圭従北回城頭鸖立處驛樹鳳栖來蘇躭傳云後化為仙鶴止城東北偶人上又州北栖鳯麟圖經云常有威鳳降於寒梧也舊路芳塵在新恩馹騎催里閭風偃草鼓舞抃成雷吏散山禽囀庭香夏蕊開郡齋堪四望壁記有三台人訝徵黄晚文非弔屈哀一吟梁甫曲知是卧龍才和郴州楊侍郎翫郡齋紫薇花十四韻㡬年丹霄上出入金華省暫别萬年枝看花桂陽嶺南方多竒樹公府成佳境緑隂交廣除明豔透蕭屏雨餘人吏散燕語簾櫳靜懿此含曉芳翛然忘簿領紫茸垂組縷金樓攅鋒穎露溽暗傳香風輕徐就影苒弱多意思従容占光景得地在侯家移根近仙井開罇好凝睇倚瑟仍回頸遊蜂駐綵冠舞鶴迷烟頂興生紅藥後愛與甘棠並不學夭桃姿浮榮有俄頃和南海馬大夫聞楊侍郎出守郴州因有寄上之作忽驚金印駕朱轓遂别鳴珂聴曉猿碧落仙來雖暫謫赤泉侯在是深恩玉環慶逺瞻台座銅柱勲髙壓海門一詠瓊瑤百憂散何勞更樹北堂萱奉和鄭相公以考功十弟山薑花俯賜篇什採擷黄薑蘂封題青鎖闈共聞調膳日正是退朝歸響為纎筵發情隨緑翰飛故將天下寶萬里與光輝馬大夫見示浙西王侍御贈答詩因命同作大夫榮踐舊府又歴交趾桂林南人歌之列在風什王侍御公易一别嵗除寄末篇以代札憶逐羊車凡㡬時今來舊府統戎師象筵照室㑹詞客銅鼓臨軒舞海夷百越酋豪稱故吏十洲風景助新詩秣陵従事何年别一見瓊章如素期詶馬大夫登涯口戍見寄新辭金印拂朝纓臨水登山四體輕猶念天涯未歸客瘴雲深處守孤城詶馬大夫以愚獻通茇葜酒感通拔二字因而寄别之作泥沙難振拔誰復問窮通莫訝提壺贈家傳枕麴風成謠獨酌後深意片言中不進終無巳應須荀令公答楊八敬之絶句楊生時亦謫居飽霜孤竹聲偏切帶火燋桐韻本悲今日知音一留聴是君心手不平時鄂渚留别李二十一表臣大夫髙檣起行色促柱動離聲欲問江深淺應如逺别情答表臣贈别二首昔為瑤池侣飛舞集蓬萊今作江漢别風雪一徘徊嘶馬立未還行舟路將轉江頭暝色深揮袖依稀見始發鄂渚寄表臣二首祖帳管絃絶客帆凄風生回車巳不見猶聴馬嘶聲曉發柳林戍遙城聞五鼓憶與故人眠此時猶晤語出鄂州界懐表臣二首離席一揮杯别愁今尚醉遲遲有情處却恨江帆駛夢覺疑連榻舟行忽千里不見黄鶴樓寒沙雪相似重寄表臣二首對酒臨流奈别何君今巳醉我蹉跎分明記取星星鬢他日相逢應更多世間人事有何窮過後思量盡是空早晚同歸洛陽陌卜鄰須近祝雞翁寄唐州楊八歸厚淮安古地雍州師畫角金鐃旦夕吹淺草遙迎鷫鸘馬春風亂颭辟邪旗謫仙年月今應滿戇諫聲名衆所知何況遷喬舊同伴一雙先入鳳凰池時徐晦楊嗣復二舍人與唐州同年及第重寄絶句淮西既是平安地鵶路今無羽檄飛聞道唐州最清靜戰場耕盡野花稀春日寄楊八唐州二首淮西春草長淮水逶迤光燕入新村路人耕舊戰場可憐行春守立馬看斜桑漠漠淮上春莠苗生故壘梨花方城路荻笋蕭陂水髙齋有謫仙坐嘯清風起寄朗州温右史曹長暫别瑤墀鴛鷺行綵旗雙引到沅湘城邊流水桃花過簾外春風杜若香史筆枉將書紙尾朝纓不稱濯滄浪雲臺公業家聲在徵詔何時出建章和東川王相公新漲驛池八韻今日池塘上初移造物權苞蔵成别島沿濁致清漣變化生言下蓬瀛落眼前泛觴驚翠羽開幕對紅蓮逺寫風光入明含氣象全渚烟籠驛樹波日漾賔筵曲岸留緹騎中流轉綵船無因接元禮共載比神仙詶楊八副使將赴湖南途中見寄一絶知逐征南冠楚材逺勞書信到陽臺明朝若上君山上一道巴江自此來詶楊司業巨源見寄壁雍流水近靈臺中有詩篇絶世才渤海歸人將集去棃園弟子請詞來瓊枝未識䰟空斷寳匣初臨手自開莫道専城管雲雨其如心似不燃灰詶國子崔博士立之見寄健筆髙科早絶倫後來無不揖芳塵遍看今日乗軒客多是昔年呈巻人胄子執經瞻講座郎官共食接華裀煩君逺寄相思曲慰問天南一逐臣詶馮十七舍人宿衞贈别五韻少年為别日隋宫楊柳隂白首相逢處巴江烟浪深使星三蜀酒春雨霑衣襟王程促速意夜語殷勤心却歸天上去遺我雲間音劉賔客外集巻五欽定四庫全書劉賔客外集巻六唐劉禹錫撰詩唐侍御寄遊道林嶽麓二寺詩并沈中丞姚員外所和見徵繼作湘西古刹雙蹲蹲羣峯朝拱如駿奔青松步障深五里龍宫黯黯神為閽髙殿呀然壓蒼巘俯瞰長江疑欲吞橘州泛浮金實動水郭繚繞朱樓騫語餘百響入天籟衆竒引步輕翻翻泉清石布博棊子蘿密}
