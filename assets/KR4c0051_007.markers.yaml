  - {type: variant, offset: 4546, length: 0, content: '', WYG: 韻如簧言囘廊架險髙且曲新徑穿林明復昏淺流忽濁山獸過古木半空天火痕星使雙飛出禁垣元侯餞之遊石門紫髯翼從紅袖舞竹風松雪香温黁逺持青瑣照巫峽一戛驚斷三聲猿靈山會中身不預吟想峭絶愁精魂恨無黄金千萬餅布地買取為丘園遙和韓睦州元相公二君子玉人紫綬相輝映却要霜髯一兩莖其奈無成空老去每臨明鏡若為情張郎中籍逺寄長句開緘之日巳及新秋因舉目前仰酬髙韻南宫}
