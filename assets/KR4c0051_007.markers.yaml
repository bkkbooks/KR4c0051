  - {type: variant, offset: 4502, length: 0, content: '', WYG: 向去門前脩刺孔融來崤陵路靜寒無雨洛水橋長晝起雷共羨府中棠棣好先於城外百花開同白二十二贈王山人愛名之世忘名客多事之時無事身古老相傳見來久嵗年雖變貌常新飛章上達三清路受籙平交五嶽神笑聴鼕鼕朝暮鼓只能催得市朝人題集賢閣鳯池西畔圖書府玉樹玲瓏景氣閒長聴餘風送天樂時登髙閣望人寰青山雲繞欄干外紫殿香來步武間曽是先賢翔集地每看壁記一慙顔杏園花下詶樂天見贈二十餘年作逐臣歸來還見曲江春遊人莫笑白頭醉老醉花間有㡬人和令狐相公初歸京國賦詩言懐凌雲羽翮掞天才揚歴中樞與外臺相印昔辭東閣去將星還拱北辰來殿庭捧日彯纓入閣道看山曳履迴口不言功心自適吟詩釀酒待花開曲江春望鳯城烟雨歇萬象含佳氣酒後人倒狂花時天似醉三春車馬客一代繁華地何事獨傷懐少年曽得意和令狐相公春日尋花有懐白侍郎閣老芳菲滿雍州鸞鳳許同遊花逕須深入時光不少留色鮮由樹嫩枝亞為房稠靜對仍持酒髙看特上樓晴宜連夜賞雨便一年休共憶秋官處餘霞曲水頭和樂天南園試小樂閒步南園烟雨晴遙聞絲竹出牆聲欲抛丹筆三川去先教清商一部成花木手栽偏有興歌詞自作别生情多才遇景皆能咏當日人傳滿鳳城和樂天春詞新粧粉面下朱樓深鎖春光一院愁行到中庭數花朶蜻蜓飛上玉搔頭和嚴給事聞唐昌觀玉蕋花下有游仙二絶玉女來看玉蕋花異香先引七香車攀枝弄雪時迴顧驚怪人間日易斜雪蕋瓊絲滿院春衣輕步步不生塵君平簾下徒相問長伴吹簫别有人歎水别白二十二水至清盡美従一勺至千里利人利物時行時止道性浄皆然交情淡如此君遊金谷堤上我在石渠署裏兩心相憶似流波潺湲日夜無窮巳答樂天戲贈才子聲名白侍郎風流雖老尚難當詩情逸似陶彭澤齋日多如周太常矻矻將心求浄法時時偷眼看春光知君技癢思歡讌欲倩天魔破道場同樂天送令狐相公赴東都留守自户部尚書拜尚書劍履出明光居守旌旗赴洛陽世上功名兼將相人間聲價是文章衙門曉闢分天仗賔幕初開辟省郎從發坡頭向東望春風處處有甘棠自華陵至河南皆故林也劉賔客外集巻一欽定四庫全書劉賔客外集巻二唐劉禹錫撰詩同樂天和微之深春二十首同用家花車斜四韻何處深春好春深萬乗家宫門皆映栁輦路盡穿花池色連天漢城形象帝車旌旗暖風裏獵獵向西斜何處深春好春深阿母家瑤池長不夜珠樹正開花橋峻通星渚樓暄近日車層城十二闕相對日西斜何處深春好春深執政家恩光貪捧日貴重不看花玉饌堂交印沙隄柱礙車多門一巳閉直道更無斜何處深春好春深大鎮家前旌光照日後騎蹙成花節院收衙隊毬場簇看車廣筵歌舞散書號夕陽斜何處深春好春深貴戚家櫪嘶無價馬庭發有名花欲進宫人食先薫命婦車晚歸長帶酒冠葢甚傾斜何處深春好春深恩澤家爐添龍腦炷綬結虎頭花賔客珠成履嬰孩錦縛車畫堂簾幕外來去燕飛斜何處深春好春深京兆家人眉新柳葉馬色醉桃花盜息無鳴鼓朝迴自走車能令帝城外不敢逕由斜何處深春好春深刺史家夜闌猶命樂雨甚亦尋花傲客多憑酒新姬苦上車公門吏散後風擺㦸衣斜何處深春好春深羽客家芝田繞舍色杏樹滿山花雲是淮王宅風為列子車古壇操簡處一逕入林斜何處深春好春深小隠家芟庭留野菜撼樹去狂花醉酒一千日貯書三十車推衾従露體不敢有餘斜何處深春好春深富室家唯多貯金帛不擬負鶯花國樂呼聨轡行㕑載滿車歸來看理曲燈下寳釵斜何處深春好春深豪士家多沽味濃酒貴買色深花巳臂鷹隨馬連催妓上車城南踏青處村落逐原斜何處深春好春深貴胄家迎呼偏熟客㨂選最多花飲饌開華幄笙歌出鈿車興酣罇易罄連瀉酒瓶斜何處深春好春深唱第家名傳一紙牓興管九衢花薦聴諸侯樂來隨計吏車杏園抛曲處揮袖向風斜何處深春好春深少婦家能偷新禁曲自剪入時花追逐同遊伴平章貴價車従來不墮馬故遣髻鬟斜何處深春好春深幼女家雙鬟梳頂髻兩面綉裙花粧壊頻臨鏡身輕不占車鞦韆爭次第牽拽綵繩斜何處深春好春深蘭若家當香收百葉養蜜近梨花野逕宜行藥遊人盡駐車菜園籬落短遙見桔橰斜何處深春好春深老宿家小欄圍蕙草髙架引藤花四字香書印三乗壁畫車遲迴聴句偈雙樹晚隂斜何處深春好春深種蒔家分畦十字水接樹兩般花櫛比裁籬槿咿啞轉井車可憐髙處望棊布不曽斜何處深春好春深稚子家爭騎一竿竹偷折四鄰花笑撃羊皮鼓行牽犢頷車中庭貪夜戲不覺玉繩斜刑部白侍郎謝病長告改賔客分司以詩贈别鼎食華軒到眼前拂衣髙坐豈徒然九霄路上辭朝客四皓叢中作少年他日卧龍終得雨今朝放鶴且沖天洛陽舊有衡茆在亦擬抽身伴地仙遙賀白賔客分司初到洛中戲呈馮尹西辭望花去東占洛陽才度嶺無歸思看山不懊來冥鴻何所慕遼鶴乍飛迴洗竹通新逕攜琴上舊臺塵埃長者轍風月故人杯聞道龍門峻還因上客開和留守令狐相公答白賔客蛟龍和風吹樹枝商山逸客出闗時身無拘束起長晚路足交親行自遲官拂象筵終日待私將雞黍㡬人期君來不用飛書報萬户先従紙貴知始聞蟬有懐白賔客去嵗白有聞蟬見寄詩云秪應催我老兼遣報君知之句蟬韻極清切始聞何處悲人含不平意景值欲秋時此嵗方晼晚誰家無别離君言催我老已是去年詩憶樂天尋常相見意殷勤别後思量夢更頻每遇登臨好風景羨他天性少人情樂天寄洛下新詩兼喜微之欲到因以抒懐也松間風未起萬葉不自吟池上月未來清輝同夕隂宫徵不獨運塤箎自相尋一従别樂天詩思日已沈吟君洛中作精絶百錬金乃知孤鶴情月露為知音微之従東來威鳯鳴歸林羨君先相見一豁平生心月夜憶樂天兼寄微之今宵帝城月一望雪相似遙想洛陽城清光正如此知君當此夕亦望鏡湖水展轉相憶心月明千萬里酬鄆州令狐相公官舍言懐見寄兼呈樂天詞人各在一涯居聲味雖同跡自疎佳句傳音多好事尺題稀鴈不便書已通戎畧逢黄石仍占星文耀碧虛聞説朝天在來嵗霸陵春色待來車吟白樂天哭崔兒二篇愴然寄贈吟君苦調我霑纓能使無情盡有情四望車中心未釋千秋亭下賦初成庭梧已有雛棲處池鶴今無子和聲従此期君比瓊樹一枝吹折一枝生答樂天所寄咏懐且適其枯樹之歎衙前有樂饌常精宅内連池酒甚傾自是官髙無狎客不論年長少歡情驪龍含被探珠去老蚌胚還應月生莫羨三春桃與李桂花成實向秋榮白侍郎大尹自河南寄示池北新葺水齋即事招賔十四韻兼命同作公府有髙政新齋池上開再吟佳句後一似畫圖來結搆疎林下寅縁曲岸隈緑波穿户牖碧甃疊瓊瓌幽異當軒滿清光繞砌迴潭心澄晚鏡渠口起晴雷瑤草縁堤種松烟上島栽遊魚驚撥刺浴鷺喜毰毸為客烹林笋因僧採石苔酒缾常不罄書案任成堆簷外青雀舫坐中鸚鵡杯蒲根抽九節蓮萼捧重臺芳訊此時到勝遊何日陪共譏呉太守自占洛陽才赴蘇州酬别樂天呉郡魚書下紫宸長安廏吏送朱輪二南風化承遺愛八咏聲名躡後塵梁氏夫妻為寄客陸家兄弟是州民江城春日追隨處共憶東歸舊主人贈樂天一别舊遊盡相逢俱涕零在人雖晚達於樹似冬青痛飲連宵醉狂吟滿坐聴終期抛印綬共占少㣲星福先寺雪中酬别樂天龍門賔客㑹龍宫東去旌旗駐上東二八笙歌雲幕下三千世界雪花中離堂未暗排紅燭别曲含凄颺曉風才子従今一分散便將詩咏向呉儂醉答樂天洛城洛城何日歸故人故人今轉稀莫嗟雪裏暫時别終擬雲間相逐飛和樂天耳順吟兼寄敦詩吟君新什慰蹉􅋸屈指同登耳順科鄧禹功成三紀事孔融書就八年多巳經將相誰能爾抛却丞郎爭奈何獨恨長洲數千里且隨魚鳥泛烟波到郡未浹日登西樓見樂天題詩因即事以寄樂天自此郡謝病西歸湖上收宿雨城中無盡塵樓依新柳貴池帶亂苔春雲水正一望簿書來繞身烟波洞庭路愧彼扁舟人早夏郡中書事水禽渡殘月飛雨灑髙城華堂封嘉樹簾廡含曉清拂鏡整危冠振衣步前楹將吏儼成列簿書紛來縈言下辨曲直筆端破交爭虛懷詢病苦懐律操剽輕閽吏告無事歸來解簪纓高簾覆朱閣忽坐聞調笙虎丘寺見元相公二年前題名愴然有詠前年滻橋送之武昌滻水送君君不還見君題字虎丘山因知早貴兼才子不得多時在世間寄贈小樊花面了頭十三四春來綽約向人時終須買取名春草處處將來步步隨憶春草憶春草處處多情洛陽道金谷園中見日遲銅駝陌上迎風早河南大尹頻出難只得池塘十步看府門閉後滿街月㡬處遊人草頭歇館娃宫外姑蘇臺鬱鬱芊芊撥不開無風自偃君知否西子裙裾曽拂來樂天寄憶舊遊因作報白君以答報白君别來已渡江南春江南春色何處好燕子雙飛故官道春城三百七十橋夾岸朱樓隔柳條了頭小兒蕩畫槳長袂女郎簪翠翹郡齋北軒巻羅幕碧池逶迤遶畫閣池邊緑竹桃李花花下舞筵鋪彩霞呉娃足情言語黠越客有酒巾冠斜坐中皆言白太守不負風光向杯酒酒酣襞牋飛逸韻至今傳在人人口報白君相思空望嵩丘雲其奈錢塘蘇小小憶君淚㸃石榴裙白君在城近自洛歸錢塘和白侍郎送令狐相公鎮太原十萬天兵貂錦衣晉城風日斗生輝行臺僕射深恩重從事中郎舊路歸疊鼓蹙成汾水浪閃旗驚斷塞鴻飛邊庭自此無烽火擁節還來坐翠微秋夕不寐寄樂天洞户夜簾巻華堂秋簟清螢飛過池影蛩思遶階聲老枕知將雨髙窻報欲明何人諳此景逺問白先生冬日晨興寄樂天庭樹曉禽動郡樓殘㸃聲燈挑紅燼落酒暖白光生髮少嫌梳利顔衰恨鏡明獨吟誰應和須寄洛陽城酬樂天見寄元君後輩先零落崔相同年不少留華屋坐來能㡬日夜臺歸去便千秋背時猶自居三品三川呉郎品同得老終須卜一丘投老之日願樂天為鄰若使吾徒還早達亦應簫鼓入松楸答樂天見憶興老無期約到來如等閒偏傷朋友盡移興子孫間筆底心無毒盃前膽不呼闗反唯遺憶君夢飛過武牢闗和樂天誚失婢牓者把鏡朝猶在添香夜不歸鴛鴦拂瓦去鸚鵡透籠飛不逐張公子即隨劉武威新知正相樂従此脱青衣樂天寄重和晚達冬青一篇因成再答風雲變化饒年少光景蹉跎屬老夫秋隼自能凌汗漫寒龜飲氣受泥塗東隅有失誰能免北叟之言豈便無振臂猶堪一呼擲爭知掌下不成盧河南白尹有喜崔賔客歸洛兼見懷長句因而繼和㡬年侍従作名臣却向青雲索得身朝士忽為方外士主人仍是眼中人雙鸞遊處天京好五馬行時海嶠春遙羨光隂不虛擲肯令絲竹暫生塵和楊師臯給事傷小姬英英見學胡琴見藝成今朝追想㡬傷情撚絃花下呈新曲放撥燈前謝改名但是好花皆易落従來尤物不長生鸞臺夜直衣衾冷雲雨無因入禁城和樂天洛下醉吟寄太原令狐相公兼見懷長句舊相臨戎非稱意詞人作尹本多情従容自使邊塵靜談笑不聞桴鼓聲章句新添塞下曲風流舊占洛陽城昨來亦有呉趨詠惟寄東都與北京郡齋書懷寄江南白尹兼簡分司崔賔客謾讀圖書三十車年年為郡老天涯一生不得文章力百口空為飽煖家綺季衣冠稱鬢面呉公政事副詞華還思謝病今歸去同醉城東桃李花詶樂天七月一日夜即事見寄夜樹風韻清天河雲彩輕故花多露草隔城聞鶴鳴搖落従此始别離含逺情聞君當是夕倚瑟吟商聲外物豈不足中懷向誰傾秋來念歸去同聴嵩陽笙題于家公主舊宅樹滿荒臺葉滿池簫聲一絶草蟲悲鄰家猶學宫人髻園客爭偷御菓枝馬埒蓬蒿蔵狡兔鳯棲烟雨笑愁鴟何郎獨在無恩澤不似當初傅粉時吟樂天自問愴然有作親友闗心皆不見風光滿眼倍傷神洛陽城裏多池館㡬處花開有主人八月十五日夜半雲開然後翫月因詩一時之景兼呈樂天半夜碧雲收中天素月流開城邀好客置酒賞新秋影透衣香潤光凝歌黛愁斜輝猶可翫移宴上西樓秋日書懷寄白賔客州逺雄無益年髙健亦衰興情逢酒在筋力上樓知蟬噪芳意盡鴈來愁望時商山紫芝客應不向愁悲詶樂天見貽賀金紫之什久學文章含白鳯却因政事賜金魚郡人未識聞謠詠天子知名與詔書珍重和詩呈錦繡願言歸計並園廬舊來詞客多無位金紫同遊誰得如詶樂天初冬早寒見寄乍起衣猶冷微吟帽半敧霜凝南至瓦雞唱後園枝洛水碧雲曉呉宫黄葉時兩傳千里意書札不如詩樂天見示傷微之敦詩晦叔三君子皆有深分因成是詩以寄吟君歎逝雙絶句使我傷懐奏短歌世上空驚故人少集中惟覺祭文多芳林新葉催陳葉流水前波讓後波萬古到今同此恨聞琴淚盡欲如何春池泛舟聨句鳯池新雨後池上好風光上相公禹錫取酒愁春盡留賔喜日長度送户部柳絲迎畫舸水鏡寫雕梁羣送賈院長潭洞迷仙府烟霞認醉鄉餗送張司業鶯聲隨雨語行色入壺觴籍送主客晚景含澄澈時芳得艷陽禹錫飛鳬拂輕浪緑柳暗回塘度逸韻追安石髙居勝辟疆羣杯停新令舉詩動綵牋忙餗顧謂同來客歡遊不可忘籍杏園聨句杏園千樹欲隨風一醉同人此暫同羣上司空老態忽忘絲管裏衰顔宜解酒杯中絳上白二十二曲江日暮殘紅在翰苑年深舊事空居易上主客二十四年流落者故人相引到花叢禹錫花下醉中聨句共醉風光地花飛落酒杯絳送劉二十八殘春猶可賞晚景莫相催禹錫送白侍郎酒幸年年有花應嵗嵗開居易送兵部相公且當金韻擲莫遣玉山頽絳送庾閣長髙㑹彌堪惜良時不易陪承宣送主客誰能拉花住爭換得春回禹錫送吏部我輩尋常有佳人早晚來嗣復送兵部寄言三相府欲散且裵回居易時户部相公同㑹宴興慶池亭送白二十二東歸聨句東洛言歸去西園告别來白頭青眼客池上手中杯度離瑟殷勤奏仙舟委曲回征輪今欲動賔閣為誰開禹錫坐弄瑠璃水行登緑縟堆花低粧炤影萍散酒吹醅居易岸䕃新抽竹亭香欲變梅隨遊多笑傲遇勝且裵􅏆籍澄澈連天鏡潺湲出地雷林塘難共賞鞍馬莫相催度信及魚還樂機忘鳥不猜晚晴槐起露新暑石添苔禹錫擬作雲泥别尤思頃刻陪歌停珠貫斷飲罷玉峯頽居易雖有逍遙志其如磊落才㑹當重入用此去肯悠哉籍西池送白二十二東歸兼寄令狐相公聨句促坐宴回塘送君歸洛陽彼都留上宰為我説中腸度威鳯池邊别冥鴻天際翔披雲見居守望日拜封章禹錫春盡年華少舟通景氣長送行歡共惜寄逺意難忘籍東道瞻軒蓋西園醉羽觴謝公深眷眄商皓信輝光行武舊徳推三友新篇代八行缺首夏猶清和聨句記得謝家詩清和即此時居易餘花數種在宻葉㡬重垂度芳謝人人惜隂成處處宜禹錫水萍爭㸃綴梁燕共追隨行武亂蝶憐疎蕋殘鶯戀好枝籍草香殊未歇雲勢漸多竒居易單服初寧體新篁已出籬度與春為别近覺日轉行遲禹錫遶樹風光少侵階苔蘚滋行武惟思奉歡樂長得在西池籍薔薇花聨句似錦如霞色連春接夏開禹錫波紅分影入風好帶香來度得地依東閣當階奉上台行武淺深皆有態次第暗相催禹錫滿地愁英落縁堤惜棹迴度芳濃濡雨露明麗隔塵埃行武似著燕脂染如經巧婦裁居易奈花無别計只有酒殘杯籍西池洛泉聨句東閣聴泉落能令野興多行武散時猶帶沫淙處即跳波度徧洗磷磷石還驚泛泛鵞籍色清塵不染光白月相和居易噴雪縈絲竹攅珠濺芰荷禹錫對吟時合響觸樹更搖柯籍照圃紅分藥侵堦緑浸莎居易日斜車馬散餘韻逐鳴珂禹錫和樂天柘枝柘枝本出楚王家玉面添嬌舞態奢鬆鬢改梳鸞鳯髻新衫别織鬭雞紗鼓催殘拍腰身軟汗透羅衣雨㸃花畫席曲終辭别去便隨王母上烟霞和樂天題真娘墓薝蔔林中黄土堆羅襦繡黛巳成灰芳䰟雖死人不怕蔓草逢春花自開幡蓋向風疑舞袖鏡燈臨曉似粧臺呉王嬌女墳相近一片行雲應往來劉賔客外集巻二欽定四庫全書劉賔客外集巻三唐劉禹錫撰詩客有話汴州新政書事寄令狐相公天下咽喉今大寧軍城喜氣徹青冥庭前劒㦸朝迎日筆底文章夜應星三省壁中題姓字萬人頭上見儀形汴州忽復承平事正月看燈户不扃和令狐相公郡齋對紫薇花明麗碧天霞丰茸紫綬花香聞荀令宅艷入孝王家㡬嵗自榮樂髙情方歎嗟有人移上苑猶是占年華令狐相公見示河中楊少尹贈答兼命繼之兩首新詩百字餘朱絃玉磬韻難如漢家丞相重徵後梁苑仁風一變初四面諸侯瞻節制八方通貨溢河渠自従郄縠為元帥大將歸來盡把書和令狐相公謝太原李侍中寄蒲桃珍果出西域移根到北方昔年隨漢使今日寄梁王上相芳緘至行臺綺席張魚鱗含宿潤馬乳帶殘霜染指鉛粉膩滿喉甘露香醖成十日酒味敵五雲漿咀嚼停金盞稱嗟響畫堂慙非末至客不得一枝嘗和令狐相公送趙常盈鍊師與中貴人同拜嶽及天台投龍畢却赴京師銀璫謁者引蜺旌霞帔仙官到赤城白鶴迎來天樂動金龍擲下海神驚元君伏奏歸中禁武帝親齋禮上清何事夷門請詩送梁王文字上聲名令狐相公俯贈篇章斐然仰謝鄂渚臨流别梁園衝雪來旅愁隨凍釋歡意待花開城曉烏頻起池春鴈欲回飲和心自醉何必管絃催詶令狐相公贈别越聲長苦有誰聞老向湘山與楚雲海嶠新辭永嘉守夷門重見信陵君田園松菊今迷路霄漢鴛鴻久絶羣幸遇甘泉尚詞賦不知何客薦雄文酬令狐相公寄賀遷拜之什邅迴二紀重為郎洛下遙分列宿光不見當闗呼早起曽無侍史與焚香三花秀色通春幌十字清波遶宅牆白首青衫誰比數相憐只是有梁王相公昔曽以大僚分司故有同病相憐之句酬令狐相公早秋見寄公來第四秋樂國號無愁軍士遊書肆商人占酒樓熊羆交黒矟賔客滿青油今日文章主梁王不姓劉和令狐相公翫白菊家家菊盡黄梁國獨如霜瑩靜真琪樹分明對玉堂仙人披雪􅌁素女不紅粧粉蝶來難見麻衣拂更香向風搖羽扇含露滴瓊漿髙豔遮銀井繁枝覆象床桂叢慙並發梅蕋妒先芳一入瑤華詠従兹播樂章夏日寄宣武令狐相公長憶梁王逸興多西園花盡興如何近來溽暑侵亭館應覺清談勝綺羅境入篇章髙韻發風穿號令衆心和承明欲謁先相報願拂朝衣逐曉珂令狐相公見示贈竹二十韻仍命繼和髙人必愛竹寄興良有以峻節可臨戎虛心宜得士衆芳信妍媚威鳯難棲止遂於鼙鼓間移植東南美封以梁國土澆之浚泉水得地色不移凌空勢方起新青排故葉餘粉籠疎理猶復隔牆藩何因出塵滓兹辰去前蔽永日勞瞪視槭槭林已成熒熒玉相似親摹起心匠洗滌在頥指曲直既瞭然孤髙何卓爾垂梢覆内屏迸笋侵前戺妓席拂雲鬢賔階廕珠履抱琴恣閒翫執巻堪斜倚露下懸明璫風來韻清徵堅貞貫四候標格殊百卉嵗晚當自知繁華豈云比古詩無贈竹髙唱従此始一聴清瑤音崢然長在耳和令狐相公入潼闗寒光照旌節闗路曉無塵吏謁前丞相山迎舊主人東瞻軍府靜西望􅃯書頻心共黄河水同昇天漢津和令狐相公尋白閣老見留小飲因贈傲士更逢酒樂天仍對花文章管星歴情興占年華宦達飜思退名髙却不誇惟存浩然氣相共賞烟霞酬令狐相公雪中遊𤣥都見憶好雪動髙情心期在玉京人披鶴􅌁出馬踏象筵行照耀樓臺變淋漓松桂清𤣥都留五字使入步虛聲和令狐相公以司空裴相見招南亭看雪四韻重門不下闗樞務有餘閒上客同看雪髙亭盡見山瑞呈霄漢外興入笑言間知是平陽㑹人人帶酒還和令狐相公别牡丹平章宅裏一欄花臨到開時不在家莫道兩京非逺别春明門外即天涯酬令狐留守巡内至集賢院見寄仙院文房隔舊宫當時盛事盡成空墨池半在頽垣下書帶猶生蔓草中巡内因經九重苑裁詩又繼二南風為兄手寫殷勤句遍歴三台各一通和鄆州令狐相公春晚對花朱門退公後髙興對花枝望闕無窮思看書欲盡時含芳朝競發凝艷晚相宜人意殷勤惜狂風豈得知酬令狐相公春日言懐見寄前陪看花處鄰里近王昌今想臨戎地旌旗出汶陽營飛柳絮雪門耀㦸枝霜東望清河水心隨艑上郎和令狐相公言懐寄河中楊少尹章句慙非第一流世間才子暗陪遊呉宫已歎芙蓉死張司業詩云呉宫四面秋江水天清露白芙蓉死邊月空悲蘆管秋李尚書任向洛陽稱傲吏分司白賔客苦教河上領諸侯天平相公石渠甘對圖書老闗外楊公安穏不遙和令狐相公坐中聞思帝鄉有感當初造曲者為誰説得思鄉戀闕時滄海西頭舊丞相停杯處分不須吹酬令狐相公見寄羣玉山頭住四年每聞笙鶴看諸仙何時得把浮丘袖白日將昇第九天途次大梁雪中奉天平令狐相公書問兼示新什因思曩嵗従此拜辭形於短篇以申仰謝逺守宦情薄故人書信來共曽花下别今獨雪中回紙尾得新什眉頭還暫開此時同鴈鶩池上一徘徊令狐相公自天平移鎮太原以詩申賀相公昔為并州從事北都留守將天兵出入香街宿禁扃鼙鼓夜聞驚朔鴈旌旗曉動拂參星孔璋舊檄家家有叔度新歌處處聴夷落遙知真漢相爭來屈膝看儀形重酬前寄邊烽寂寂盡收兵宫樹蒼蒼靜掩扃戎羯歸心如内地天狼無角比凡星新成麗句開緘後便入清歌滿坐聴呉苑晉祠遙望處可憐南北太相形酬令狐相公秋懐見寄寂寞蟬聲靜差池燕羽回秋鄰多越絶朔氣想臺駘相去數千里無因同一杯殷勤望飛鴈新自塞垣來酬令狐相公六言見寄巳嗟離别太逺更被光隂苦催呉苑燕辭人去汾川鴈帶書來愁吟月落猶望憶夢天明未回今日便令歌者唱兄詩送一杯令狐相公自太原累示新詩因以酬寄飛蓬巻盡塞雲寒戰馬閒嘶漢地寛萬里氷天無警急一籠烽火報平安燈前妓樂留賔燕雪後山河出獵看珍重新詩逺相寄風情不似四登壇酬太原令狐相公見寄書信來天外瓊瑤滿匣中衣冠南渡逺旌節北門雄鶴唳華亭月馬嘶榆塞風山川㡬千里惟有兩心同酬令狐相公嵗暮逺懐見寄别侣孤鶴怨沖天威鳯歸容光一以間夢想是耶非芳訊逺彌重知音老更稀不如湖上鴈北向整毛衣酬令狐相公親仁郭家花下即事見寄荀令園林好山公遊賞頻豈無花下侣逺望眼中人斜日漸移影落英紛委塵一吟相思曲惆悵江南春酬令狐相公首夏閒居書懐見寄蕙草芳未歇緑槐隂巳成金罍唯獨酌瑤瑟有離聲翔泳各殊勢篇章空寄情應憐三十載未變使君名貞元中自郎官出守至今三十一年酬令狐相公庭前白菊花謝偶書所懐見寄數叢如雪色一旦冒霜開寒蕋差池落清香斷續來思深含别怨芳謝惜年催千里難同賞看看又早梅酬令狐相公季冬南郊宿齋見寄壇下雪初霽南城凍欲生齋心祠上帝髙步領名卿沐浴含芳澤周旋聴佩聲猶憐廣平守寂寞竟何成貞元中侍郎舅氏牧華州時余再忝科第前後由華覲謁陪登伏毒寺屢焉亦曽賦詩題於梁棟今典馮翊暇日登樓南望三峰浩然生思追想昔年之事因成篇題舊寺曽作闗中客頻經伏毒巖晴烟沙苑樹晚日渭川帆昔是青春貌今悲白雪髯郡樓空一望含意巻髙簾酬令狐相公杏花園下飲有懐見寄年年曲江望花發即經過未飲心先醉臨風思倍多三春看又盡兩地欲如何日望長安道空成勞者歌和令狐相公春早朝回鹽鐵使院中作柳動御溝清威遲堤上行城隅日未過山色雨初晴鶯避傳呼起花臨府署明簿書盈几案要自有髙情令狐相公見示題洋州崔侍郎宅雙木𤓰花頃接侍郎同舍陪宴樹下吟翫來什輒成和章金牛蜀路逺玉樹帝城春榮耀生華館逢迎欠主人簾前疑小雪牆外麗行塵來去皆回首情深是徳鄰和令狐僕射相公題龍回寺兹地回鑾日皇家禪聖時路無胡馬跡人識漢官儀天子旌旗度法王龍象隨知懷去家歎經此益遲遲相公家本咸陽有喬木之思和令狐相公晚泛漢江書懐寄洋州崔侍郎閬州髙舍人二曹長雨過逺山出江澄暮霞生因浮濟川舟遂作適野行郊樹映緹騎水禽避紅旌田夫捐畚鍤織婦窺柴荆古岸夏花發遙林晚蟬清沿洄方翫境鼓角巳登城部内有良牧望中寄深情臨觴念佳期泛瑟動離聲寂寞一病士夙昔接羣英多謝謫仙侣㡬時還玉京酬令狐相公使宅别齋初栽桂樹見懐之作清淮南岸家山樹黒水東邊第一栽影近畫梁迎曉日香隨緑酒入金杯根留本土依江潤葉起寒稜映月開早晚隂成比梧竹九霄還放綵鵬來令狐相公頻示新什早春南望遐想漢中因抒短章以寄情愫軍城臨漢水旌斾起春風逺思見江草歸心看塞鴻野花沿古道新葉映行宫惟有詩兼酒朝朝兩不同酬令狐相公見寄才兼文武播雄名遺愛芳塵滿洛城身在行臺為僕射書來甪里訪先生閒遊占得嵩山色醉臥髙聴洛水聲千里相思難命駕七言詩裏寄深情令狐相公春思見寄一紙書封四句詩芳晨對酒逺相思長吟盡日西南望猶及殘春花落時令狐相公見示新栽蕙蘭二草之什兼命同作上國庭前草移來漢水潯朱門雖易地玉樹有餘隂豔彩凝還泛清香絶復尋光華童子佩柔軟美人心惜晚含逺思賞幽空獨吟寄言知音者一奏風中琴和令狐相公南齋小讌聴阮咸陋巷久蕪沈四絃有遺音雅聲發蘭室逺思含竹林座絶衆賔語庭移芳樹隂飛觴助真氣寂聴無流心影似白團扇調諧朱絃琴一毫不平意幽怨古猶今和令狐相公詠梔子花蜀國花已盡越桃今已開色凝瓊樹倚香似玉京來且賞同心處那憂别葉催佳人如擬詠何必待寒梅酬令狐相公新蟬見寄相去三千里聞蟬同此時清吟曉露葉愁噪夕陽枝忽爾絃斷絶俄聞管參差洛橋碧雲晚西望佳人期和令狐相公九日對黄白二菊花見懷素萼迎寒秀金英帶露香繁華照旄鉞榮盛對銀黄琮璧交輝暎衣裳雜彩章晴雲遙葢覆秋蝶近悠揚空想逢九日何由陪一觴滿叢佳色在未肯委嚴霜城内花園頗曽遊翫令君居守亦有素期適春霜一夕委謝書實以答令狐相公見謔樓下芳園最占春年年結侣採花頻繁霜一夜相撩冶不似佳人似老人令狐僕射與余投分素深縦山川阻峭然音問相繼今年十一月僕射疾不起聞予巳承訃書寝門長慟後日有使者兩輩持書并詩計其日時已是卧疾手筆盈幅翰墨尚新詞一篇音韻彌切收淚握管以成報章雖廣陵之絃於今絶矣而葢泉之感猶庶聞焉焚之繐帳之前附于舊編之末前日寢門慟至今悲有餘巳嗟萬花盡方見八行書滿紙傳相憶裁詩怨索居危絃音有絶哀玉韻由虛忽歎幽明異俄驚嵗月除文章雖不朽精魄竟焉如零淚霑青簡傷心見素車凄凉從此後無復望雙魚劉賔客外集巻三欽定四庫全書劉賔客外集巻四唐劉禹錫撰詩郡内書情獻裴侍中留守功成頻獻乞身章擺落襄陽鎮洛陽萬乗旌旗分一半八方風雨㑹中央兵符今奉黄公畧書殿曽隨翠鳯翔心寄華亭一雙鶴日陪髙步繞池塘詶樂天閒卧見寄散誕向陽眠將閑敵地仙詩情茶助爽藥力酒能宣風碎竹間日露明池底天同年未同隠縁乞買山錢詶樂天小亭寒夜有懷寒夜隂雲起疎林宿鳥驚斜風閃燈影迸雪打窻聲竟夕不能寐同年知此情漢皇無奈老何況本書生奉和裴晉公凉風亭睡覺驪龍睡後珠元在仙鶴行時步又輕方寸瑩然無一事水聲來似玉琴聲和樂天閒園獨賞八韻前以蜂鶴拙句寄呈今辱蝸蟻妍詞見答因成小巧以取大咍永日無人事芳園注興行陶廬樹可愛潘宅雨新晴傅粉琅玕節薫香菡萏莖榴花裙色好桐子藥圓成柳蠧枝偏亞桑閒葉再生睢盱欲鬬雀索漠不言鶯動植隨四氣飛沈含五情槍榆與水擊小大强為名詶樂天衫酒見寄酒法衆傳呉米好舞衣偏向越羅輕動搖浮蟻香濃甚装束輕鴻意態生閱曲定知能自適舉杯應歎不同傾終朝相憶終年别對景臨風無限情兩何如詩謝裴令公贈别二首一言一顧重重何如今日陪遊清洛苑昔年别入承明廬一東一西别别何如終期大冶再鎔鍊願託扶搖翔碧虛將之官留辭裴令公留守祖帳臨伊水前旌指渭河風烟里數少雲雨别情多重疊受恩久邅迴如命何東山與東閣終異再經過詶喜相遇同州與樂天替代舊託松心契新交竹使符行年同甲子筋力羨丁夫别後詩成帙攜來酒滿壺今朝停五馬不獨為羅敷前章所言春草白君之舞妓也故有此答奉和裴令公新成緑野堂即書藹藹鼎門外澄澄洛水灣堂皇臨緑野坐卧看青山位極却忘貴功成欲愛閒官名思管籥心術去機闗禁苑凌晨出園花及露攀池塘魚拔刺竹逕鳥綿蠻志在安瀟灑嘗經歴險艱髙情方造適衆意望徵還好客交珠履華筵舞玉顔無因隨賀燕翔集畫梁間自左馮歸洛下詶樂天兼呈裴令公新恩通籍在龍樓分務神都近舊丘自有園公紫芝侣時賔行四人盡在洛中仍追少傅赤松遊華林霜葉紅霞晚伊水晴光碧玉秋更接東山文酒㑹始知江左未風流王儉云江左風流宰相唯有謝安秋齋獨坐寄樂天兼呈呉方之大夫空齋寂寂不生塵藥物方書繞病身纎草數莖勝静地幽禽忽至似佳賔世間憂喜雖無定釋氏銷磨盡有因同向洛陽閒度日莫教風景屬他人和樂天齋戒月滿夜對道場偶懷詠常脩清靜去繁華人識王城長者家案上香烟鋪貝葉佛前燈焰透蓮花持齋已滿招閒客理曲先聞命小娃明日若過方丈室還應問為法來耶呉方之見示獨酌小醉首篇樂天續有詶答皆含戲謔極至風流兩篇之中並䝉見屬輒呈濫吹益美來章閒門共寂任張羅靜室同虛養太和塵世歡娯開意少醉鄉風景獨遊多散金疎傅尋常樂枕麴劉生取次歌計㑹雪中爭挈榼鹿裘鶴􅌁逓相過詶樂天齋滿日裴令公置宴席上戲贈一月道場齋戒滿今朝華幄管絃迎銜杯本自多狂態事佛無妨有佞名酒力半酣愁已散文鋒未鈍老猶爭平陽不獨容賔醉聴取喧呼吏舍聲詶樂天偶題酒瓮見寄従君勇斷抛名後世路榮枯見㡬回門外紅塵人自走甕頭清酒我初開三冬學任胷中有萬户侯須骨上來何幸相招同醉處洛陽城裏好池臺答裴令公雪中訝白二十二與諸公不相訪之什玉樹瓊樓滿眼新的知開閤待諸賔遲遲未去非無意擬作梁園坐右人詶樂天請裴令公開春加宴髙名大位能兼有恣意遨遊是特恩二室烟霞成步障三州風物是家園晨窺苑樹韶光動晚度河橋春思繁絃管常調客常滿但逢花處即開樽樂天示過敦詩舊宅有感一篇吟之泫然追想昔事因成繼和以寄苦懐凄凉同到故人居門枕寒流古木疎向秀心中嗟棟宇蕭何身後散圖書本營歸計非無意唯算生涯尚有餘忽憶前因更惆悵丁寧相約速懸車敦詩與予及樂天三人同甲子平生相約同休洛中呉方之見示聴江西故吏朱幼恭歌三篇頗有懐故林之思吟諷不足因而和之侯家故吏歌聲發逸處能髙怨處低今嵗洛中無雨雪眼前風景是江西閒坐憶樂天以詩問酒熟未案頭開縹帙肘後檢青囊唯有達生理應無治老方減書存眼力省事養心王君酒何時熟相攜入醉鄉和樂天洛城春齊梁體八韻帝城宜春入遊人喜意長草生季倫谷花出莫愁坊斷雲發山色輕風漾水光樓前戲馬地樹下鬬雞場白頭自為侣緑酒亦滿觴潘園觀種植謝墅閱池塘至門似隠逸過老不悲傷相問焉功徳銀黄遊故鄉三月三日與樂天及河南李尹奉陪裴令公泛洛禊飲各賦十二韻洛下今脩禊羣賢勝㑹稽盛筵陪玉鉉通籍盡金閨波上神仙妓岸傍桃李蹊水嬉如鷺振歌響雜鶯啼歴覽風光好沿洄意思迷棹歌能儷曲墨客競分題翠幄連雲起香車向道齊人誇綾步障馬惜錦障泥塵暗宫牆外霞明苑樹西舟形隨鷁轉橋影與虹低川色晴猶逺烏聲暮欲棲唯餘踏青伴待月魏王堤寄和東川楊尚書慕巢兼寄西川繼之二公近従弟兄情分偏睦早忝遊舊因成是詩太華蓮峯降嶽靈兩川棠樹接郊坰政同兄弟人人樂曲奏塤箎處處聴楊葉百穿榮㑹府芝泥五色耀天庭各抛筆硯誇旄鉞莫遣文星讓將星秋中暑退贈樂天暑服宜秋著清琴入夜彈人情皆向菊風意欲摧蘭嵗稔貧心泰天凉病體安相逢取次第却甚少年歡和樂天洛中雪中宴集寄汴州李尚書洛城無事足杯盤風雪相和嵗欲闌樹上因依見寒鳥坐中收拾盡閒官笙歌要請頻何爽笑語忘機拙更歡遙想兔園今日㑹瓊林滿眼映旂竿喜遇劉二十八偶書兩韻聨句病來佳興少老去舊遊稀笑語縦横作盃觴絡繹飛度清談如水玉逸韻貫珠璣髙位當金鉉虛懐似布衣禹錫巳榮狂取樂仍任醉忘機捨眷將何適留歡便是歸居易鳳儀常欲附蛟力自知微願假樽罍末膺門自此依紳劉二十八自汝赴左馮塗經洛中相見聨句不歸丹掖去銅竹漫云云唯喜因過我須知未賀君度詩聞安石詠香見令公熏欲首函闗路來披緱嶺雲居易貂蟬公獨步鴛鷺我同羣插羽先飛酒交鋒便戰文紳鎮嵩知表徳定鼎為銘勲顧鄙容商洛徵歡候汝墳禹錫頻年多謔浪此夕任喧紛故態猶應在行期未要聞度游藩榮已久捧袂惜將分詎厭杯行疾唯愁日向曛居易窮隂初莽蒼離思漸氤氲殘雪午橋岸斜陽伊水濆紳上謨尊右掖全畧靜東軍萬頃徒稱量滄溟詎有垠禹錫予自到洛中與樂天為文酒之㑹時時搆詠樂不可支則慨然共憶}
