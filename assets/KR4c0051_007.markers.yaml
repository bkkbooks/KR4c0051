  - {type: variant, offset: 4566, length: 0, content: '', WYG: 喜眼疾平一絶有閒行把酒之句斐然仰酬巻盡輕雲月更明金箆不用且閒行若傾家釀招來客何必池塘春草生詶太原狄尚書見寄家聲烜赫冠前賢時望穹崇鎮北邉身上官銜如座主幕中談笑取同年幽并俠少趨鞭弭燕趙佳人奉管絃仍把天兵書號筆逺題長句寄山川詶宣州崔大夫見寄白衣曽拜漢尚書今日恩光到敝廬再入龍樓稱綺季應縁狗監説相如中郎南鎮權方重内史髙齋興有餘遙想敬亭春欲暮百花飛盡栁花初詶皇甫十少尹暮秋久雨喜晴有懐見示雨餘獨坐巻簾帷便得}
