  - {type: variant, offset: 4500, length: 0, content: '', WYG: 飜劉賔客文集巻二十九欽定四庫全書劉賔客文集巻三十唐劉禹錫撰哀挽悲傷三十八首徳宗神武孝文皇帝挽歌二首出震清多難乗時播大鈞操弦調六氣揮翰動三辰運偶升天日哀深率土人瑶池無轍跡誰見屬車塵鳯翣擁銘旌威遲異吉行漢儀陳祕器楚挽咽繁聲駐綍辭清廟凝笳背直城唯應留内傳知是向蓬瀛敬宗睿武昭愍孝皇帝挽歌三首寳歴方無限仙期忽有涯事親崇漢禮傳聖法殷家晚出芙蓉闕春歸棠棣華玉輪今日動不是畫雲車任賢勞夢寐登位富春秋欲逐東人幸寜虞杞國憂長楊收羽騎太液泊龍舟唯有衣冠在年年愴月遊講學金華殿親耕鈎盾田侍臣容諫獵方士信求仙虹影俄侵日龍􅐖不上天空餘水銀海長照夜鐙前文宗元聖昭獻孝皇帝挽歌三首繼體三才理承顔九族親禹功留海内殷歴付天倫調露曲長在秋風詞尚新本支方百代先讓棣華春月落宫車動風凄儀仗閒路唯瞻鳯翣人尚想龍顔御宇方無事乗雲遂不還聖情悲望處兄日下西山享國十五載升天千萬年龍鑣仙路逺騎吹禮容全日下初陵外人悲舊劒前周南有遺老掩淚望秦川故相國燕國公于司空挽歌二首彤弓封舊國黒矟繼前功十年鎮南雍九命作司空池臺樂事盡簫鼓葬儀雄一代英豪氣曉㪚白楊風隂山貴公子來塟五陵西前馬悲無主猶帶朔風嘶漢水青山郭襄陽白銅蹄至今有遺愛日暮人悽悽重至衡陽傷柳儀曹并引元和乙未嵗與故人栁子厚臨湘水為别栁浮舟適栁州余登陸赴連州後五年余從故道出桂嶺至前别處而君没於南中因賦詩以投弔憶昨與故人湘江岸頭别我馬映林嘶君颿轉山滅馬嘶循故道颿滅如流電千里江蘺春故人今不見謫居悼往二首邑邑何邑邑長沙地卑濕樓上見春多花前恨風急猿愁腸㫁叫鶴病翹趾立牛衣獨自眠誰哀仲卿泣鬱鬱何鬱鬱長安逺於日終日念鄉闗燕來鴻復還潘岳嵗寒思屈平顦顇顔殷勤望歸路無雨即登山哭吕衡州時余方謫居一夜霜風彫玉芝蒼生望絶士林悲空懐濟世安人略不見男婚女嫁時遺草一函歸太史旅墳三尺近要離朔方徙嵗行當滿欲為君刋第二碑遙傷段右丞江湖舊遊南宫交代江海多豪氣朝廷有直聲何言馬蹄下一旦是佳城傷桃源薛道士壇邊松在鶴巢空白鹿閑行舊逕中手植紅桃千樹發滿山無主任春風王思道碑堂下作蒼蒼宰樹起寒烟尚有威名海内傳四府舊聞多故吏幾人垂淚拜碑前遙傷丘中丞并引河南丘絳有詞藻與余同升進士科從事鄴下不幸遇害故為傷詞鄴下殺才子蒼忙寃氣凝枯楊映漳水野火上西陵馬鬛今無所龍門昔共登何人為弔客唯是有青蠅傷獨孤舍人并引貞元中余以御史監祠事河南獨孤生始仕為奉禮郎有事宗廟郊畤必與之俱繇是甚熟及余謫武陵九年間獨孤生仕至中書舍人視草禁中上方許以宰相元和十年春余祗召抵京師次都亭日舍人疾不起余聞因作傷詞以為弔昔别一年少今悲䘮國華逺來同社燕不見早梅花途次敷水驛伏覩華州舅氏昔日行縣題詩處潸然有感昔日股肱守朱輪兹地遊繁華曰已謝章句此空留蔓草佳城閉故林棠樹秋今來重垂淚不忍過西州湖南觀察使故相國袁公挽歌三首五驅龍虎節一入鳯凰池令尹自無喜羊公人不疑天歸京兆日葉下洞庭時湘水秋風至凄涼吹素旗丹旐發江臯人悲雁亦號湘南罷亥市漢上改詞曹表墓雙碑立尊名一字褒常聞平楚獄為報里門高返葬三千里荆衡達帝畿逢人即故吏拜奠盡沾衣地得青烏相賔驚白鶴飛五公碑尚在今日亦同歸代靖安佳人怨二首并引靖安丞相武公居里名也元和十一年六月公將朝夜漏未盡三刻騎出里門遇盜薨于牆下初公為郎余為御史繇是有舊故今守于逺服賤不可以誄又不得為歌詩聲于楚挽故代作佳人怨以埤于樂府寳馬鳴珂蹋曉塵魚文匕首犯車茵適來行哭里門外昨夜華堂歌舞人秉燭朝天遂不回路人彈指望髙臺牆東便是傷心地夜夜秋螢飛去來傷愚溪三首并引故人柳子厚之謫永州得勝地結茅樹蔬為沼沚為臺榭目曰愚溪柳子没三年有僧遊零陵告余曰愚溪無復曩時矣一聞僧言悲不能自勝遂以所聞為七言以寄恨溪水悠悠春自來草堂無主燕飛回隔簾惟見中庭草一樹山榴依舊開草聖數行留壁壊木奴千樹屬鄰家唯見里門通徳榜殘陽寂寞出樵車柳門竹巷依依在野草青苔日月多縱有鄰人解吹笛山陽舊侣更誰過碧澗寺見元九侍御和展上人詩有三生之句因以和廊下題詩滿壁塵塔前松樹已鱗皴古來唯有王文度重見平生竺道人傷秦姝行并引河南房開士前為虞部郎中為余話曰我得善筝人于長安懐逺里其後開士為赤縣牧容州求國工而誨之藝工而夭今年開士遺予新詩有悼佳人之目顧予知所自也惜其有良妓獲所從而不克久乃為傷詞以貽開士長安二月花滿城插花女兒㺯銀筝南宫仙郎下朝晚曲頭駐馬聞新聲馬蹄逶遲心蕩􅃞髙樓已逺猶頻望此時意重千金輕鳥傳消息紺輪迎芳筵銀燭一相見淺笑低鬟初目成蜀弦錚摐指如玉皇帝弟子常家曲青牛文梓赤金簧玫瑰寳柱秋雁行斂蛾收袂凝清光抽弦緩調怨且長八鸞鏘鏘渡銀漢九雛威鳯鳴朝陽曲終韻盡意不足餘思悄絶愁空堂從郎鎮南别城闕樓船理曲瀟湘月馮夷躚躚舞渌波鮫人出聴停綃梭北池含煙瑶草短萬松亭下清風滿北池萬松皆容州勝槩秦聲一曲此時聞嶺泉嗚咽南雲㫁來自長陵小市東舜華零落瘴江風侍兒掩泣收銀甲鸚鵡不言愁玉籠博山鑪中香自滅鏡奩塵暗同心結從此東山非昔遊長嗟人與弦俱絶夔州竇員外使君見示悼妓詩顧余嘗識之因命同作前年曽見兩鬟時今日驚吟悼妓詩鳯管學成知有籍龍媒欲换歎無期空廊月照常行地後院花開舊折枝寂寞魚山青草裏何人更立智瓊祠竇夔州見寄寒食日憶故姬小紅吹笙因和之鸞聲窈眇管參差清韻初調衆樂隨幽院妝成花下㺯髙樓月好夜深吹忽驚莫槿飄零盡唯有朝雲夢想期聞道今年寒食日東山舊路獨行遲傷循州渾尚書貴人淪落路人哀碧海連天丹旐回遙想長安此時節朱門深巷百花開哭龎京兆少年有俊氣嘗擢制科之首俊骨英才氣襃然䇿名飛步冠羣賢逢時已自致髙位得疾還因倚少年天上别歸京兆府人間空歎茂陵阡今朝繐帳哭君處前日見鋪歌舞筵再傷龎尹京兆歸何處章臺空暮塵可憐鸞鏡下哭殺畫眉人哭王僕射相公名播時兼鹽鐵暴薨于侯一日病滕公千載歸門庭颯已變風物慘無輝羣吏謁新府舊賔沾素衣歌堂忽暮哭賀雀盡驚飛傷韋賔客縝自工部尚書除賔客韋公八十餘位至六尚書五福唯無富一生誰得如桂枝攀最久蘭省出仍初海内時流盡何人動素車再經故元九相公宅池上作故池春又至一到一傷情雁鶩羣猶下蛙蠙衣已生竹叢身後長臺勢雨來傾六尺孤安在人間未有名劉賔客文集巻三十欽定四庫全書劉賔客外集巻一唐劉禹錫撰詩翰林白二十二學士見寄詩一百篇因以荅貺吟君遺我百篇詩使我獨坐形神馳玉琴清夜人不語琪樹春朝風正吹郢人斤斵無痕跡仙人衣裳棄刀尺世人方内欲相尋行盡四維無處覔始至雲安寄兵部韓侍郎中書白舍人二公近曽逺守故有屬焉天外巴子國山頭白帝城波清蜀村盡雲散荒臺傾迅瀨下哮吼兩岸勢争衡隂風鬼神過暴雨蛟龍生硤斷見孤邑江流照飛甍蠻軍撃嚴鼓筰馬引雙旌望闕遙拜舞分庭備將迎銅符一以合文墨紛來縈暮色四山起愁猿數處聲重闗羣吏散靜室寒燈明故人青霞意飛舞集蓬瀛昔曽在池籞應知魚鳥情白舍人自杭州寄新詩有栁色春蔵蘇小家之句因而戲酬兼寄浙東元相公錢塘山水有竒聲暫謫仙官領百城女妓還聞名小小使君誰許喚卿卿鼇驚震海風雷起蜃鬬噓天樓閣成莫道騷人在三楚文星今向斗牛明春日書懐寄東洛白二十二楊八二庶子曽向空門學坐禪如今萬事盡忘筌眼前名利同春夢醉裏風情敵少年野草芳菲紅錦地遊絲撩亂碧羅天心知洛下閒才子不作詩魔即酒顛白舍人見酬拙詩因以寄謝雖陪三品散班中資歴従來事不同名姓也曽鐫石柱詩篇未得上屏風甘陵舊黨凋零盡魏闕新知禮數崇烟水五湖如有伴猶應堪作釣魚翁白舍人曹長寄新詩有遊宴之盛因以戲酬蘇州刺史例能詩西掖今來替左司二八城門開道路五千兵馬引旌旗水通山寺笙歌去騎過虹橋劍㦸隨若共呉王鬭百草不如應是欠西施蘇州白舍人寄新詩有歎早白無兒之句因以贈之莫嗟華髮與無兒却是人間久逺期雪裏髙山頭白早海中仙果子生遲于公必有髙門慶謝守何煩曉鏡悲幸免如新分非淺祝君長咏夢熊詩髙山本髙于門使之髙二義故殊古之詩流曉此和汴州令狐相公到鎮改月偶書所懐二十二韻受脤新梁苑和羮舊傅巖援毫動星宿垂釣取韜鈐赤奕三川至歡呼百姓瞻緑油貔虎擁青紙鳯皇銜外壘曽無警中㕑亦罷監推誠人自服去殺令逾嚴赳赳容皆飾幡幡口盡鉗為兄憐庾翼選婿得蕭咸鬱屈咽喉地駢臻水陸兼渡橋鳴紺幰入肆颺雲帆端月當中氣東風應逺占管弦喧夜景燈燭掩寒蟾酒每傾三雅書能發百函詞人羞布鼓逺客獻貂襜歌榭白團扇舞筵金縷衫旌旗遙一簇舄履近相攙花樹當朱閣晴河逼翠簾暎鏁窺艷艷隔袖見纎纎謝傅何由接桓伊定不凡應憐郡齋老旦夕鑷霜髯白太守行聞有白太守棄官歸舊谿蘇州十萬户盡作嬰兒啼太守駐行舟閶門草萋萋揮袂謝啼者依然兩眉低朱户非不崇我心如重狴華池非不清意在寥廓栖夸者竊在怪賢者黙思齊我為太守行題在隠起珪詶樂天揚州初逢席上見贈巴山楚水悽凉地二十三年棄置身懐舊空吟聞篴賦到鄉}
