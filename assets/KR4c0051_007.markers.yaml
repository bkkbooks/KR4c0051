  - {type: variant, offset: 4548, length: 4, content: 逰房太尉, WYG: 五音調臺栢烟長起池荷香暗飄吳興與余同為御臺門外有蓮池也星文辭北極旗影度東遼呉興自度支郎中出為行軍司馬所從即范僕射昔范明友為度遼將軍直道由來黜浮名豈敢要三湘與百越雨散又雲遙逺守慙侯籍徴還荷詔條顇容唯舌在别恨幾魂銷滿眼悲陳事逢人少舊僚烟霞為老伴蒲栁任先凋虎綬懸新印龍􅀈理去橈斷膓天北郡攜手洛陽橋幢葢今雖貴弓旌會見招其如草𤣥客空手久寥寥秋日書懐寄河南王尹公府想無事西池秋水清去年為狎客永日奉髙情況有臺上月如聞雲外笙不知桑落酒今嵗與誰傾浙東元相公書歎梅雨鬱䒱之候因寄七言嵇山自與岐山别何事連年鸑鷟飛百辟商量舊相入九天祗候老臣歸平湖晚泛窺清鏡髙閤晨開掃翠微今日看書最惆悵為聞梅雨損朝衣酬嚴給事賀加五品兼簡同制水部李郎中九天雨露傳青詔八舍郎官換緑衣初佩銀魚隨仗入宜乘白馬退朝歸彫盤賀喜開瑤席綵筆題詩出瑣闈聞道水曹偏得意霞朝霧夕有光輝裴相公大學士見示答張秘書謝馬詩并羣公屬和因命追作草𤣥門户少塵埃丞相并州送馬來初自塞垣銜苜蓿忽行幽徑破莓苔尋花緩轡威遲去帶酒垂鞭躞蹀囘不與王侯與詞客知輕富貴重清才奉和司空裴相公中書即事通簡舊僚之作談笑在巖廊人人盡所長儀形見山立文字動星光日運丹青筆時看赤白囊佇聞戎馬息入賀領鴛行微之鎮武昌中路見寄藍橋懐舊之作悽然繼和兼寄安平今日油幢引他年黄紙追同為三楚客獨有九霄期宿草恨長在傷禽飛尚遲武昌應已到新栁映紅旗奉和裴侍中將赴漢南留别座上諸公金貂曉出鳯池頭玉節前臨南雍州暫輟洪鑪觀劒㦸還將大筆注春秋管絃席上留髙韻山水途中入勝遊峴首風烟看未足便應重拜富民侯和兵部鄭侍郎省中四松詩十韻松是中書相公任侍郎手栽右相歴中臺移松武庫栽紫茸抽組綬青實長玫瑰便有干霄勢看成構厦材數分天柱半影逐日輪囘舊賞台階去新知谷口來息隂常仰望翫境幾徘徊翠粒晴懸露蒼鱗雨起苔凝音助瑤瑟飄蘃泛金罍月桂花遙燭星榆半對開終須似雞樹榮茂近昭囘和蘇郎中尋豐安里舊居寄主客張郎中漳濵卧起恣閒遊宣室徴還未白頭舊隠來尋通徳里新篇寫出畔牢愁池看科斗成文字鳥聴提壺憶獻酬同學同年又同舍許君雲路並華輈將赴蘇州途出洛陽留守李相公累申宴餞寵行話舊形於篇章謹抒下情以申仰謝嵗杪風物動雪餘宫苑晴兔園賔客至金谷管絃聲洛水故人别吳宫新燕迎越郎憂不淺懐袖有瓊英吳興敬郎中見惠斑竹杖兼示一絶聊以謝之一莖炯炯琅玕色數節重重玳瑁文拄到髙山未登處青雲路上願逢君和浙西王尚書聞常州楊給事製新樓因寄之作文昌星象盡東來油幕朱門次第開且上新樓看風景㑹乘雲雨一時囘尚書在南宫為左丞給事與禹錫皆是郎吏酬浙東李侍郎越州春晚即事長句越中藹藹繁華地秦望峯前禹穴}
