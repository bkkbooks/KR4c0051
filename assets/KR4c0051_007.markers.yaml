  - {type: variant, offset: 4557, length: 4, content: 聞琴絶句, WYG: 姑蘇所寄太湖石兼寄李蘇州震澤生竒石沉潜得地靈初辭水府出猶帶龍宫腥發自江湖國來榮卿相庭從風夏雲勢上漢古查形拂拭魚鱗見鏗鏘玉韻聆烟波含宿潤苔蘚助新青嵌穴波斯貌纎鋩蟲篆銘孱顔傲林薄飛動向雷霆煩熱近還散餘酲見便醒凡禽不敢息浮􅙟莫能停静稱垂松葢鮮宜映鶴翎㤀憂常目擊素尚與心冥眇小欺湘燕團圓笑落星徒然想融結安可測年齡採取詢鄉耋搜求按舊經垂鈎入空隙隔浪動晶熒有獲人争賀歡謠衆共聴一州驚閲寳千里逺揚舲覩物洛陽陌懐人吳御亭寄言垂天翼早晚起滄溟}
