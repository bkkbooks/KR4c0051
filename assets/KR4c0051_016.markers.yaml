  - {type: variant, offset: 1914, length: 1, content: 代, WYG: 欣戴屏營之至謝男師損等官表伏見今月一日制授臣長男師損祕書省著作郎次男式方太常寺主簿又得進奏官裴遘狀報伏承聖恩特降中使送官告到臣宅分付師損者寵渥非常授任不次驚躍無措靦懼失容云云臣謬分重寄獲守外藩受恩既深無績可紀男師損等器惟凡品教闕義方蚤沐叡慈已階官次每懐塵忝常誡滿盈豈謂鴻霈曲覃大明私照寛臣尸素之責念臣葵藿之誠下延𦙍息叨踐班級天書出禁中貴臨門榮冠等夷慶流宗族況著作乃論撰之地唯才吏是居太常寔禮樂之司非儒者勿履顧兹庸昧忽此超昇内省慙惶若墜氷谷伏以聖朝立制建官惟賢名實無􅆾輪轅盡適㣲臣父子獨為幸人非據踰涯自中徂外虛受丘山之賜實増負乗之憂進退彷徨不知所據無任戰汗屏營之至}
