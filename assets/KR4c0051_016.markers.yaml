  - {type: variant, offset: 1521, length: 272, content: 無任代謝男師損等官伏覩今月一日制授臣長男師損秘書省著作郎次男式方太常寺主簿又得進奏官裴遘狀報伏承聖恩特降中使送官告到臣宅付師損等者寵渥非常授任不次驚躍無措靦懼失容中謝臣謬分重寄獲守外藩受恩旣深無績可紀男師損等器惟凡品教闕義方早沐睿慈巳階官次每懷塵忝常誡滿盈豈謂鴻霈曲覃大明私照寛臣尸素之責念臣葵藿之誠下延胤息叨踐班級天書出禁中貴臨門榮冠等夷慶流宗族況著作乃論撰之地唯才史是居太常寔禮樂之司非儒者勿履顧兹庸昧忽此超昇内省慙惶若墜冰谷伏以聖朝立制建官惟賢名實無乖輪轅盡適微臣父子獨爲幸人非據踰涯自中徂外虚受丘山之賜實增負乗之憂進退彷徨不知所據無任代, WYG: ''}
