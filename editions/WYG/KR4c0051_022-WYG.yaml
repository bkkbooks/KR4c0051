body:
  text: 為京兆韋尹降誕日進衣狀衣一副四事黄折造衫一領白吳綾汗衫一領白花羅半臂一領白花羅袴一腰右伏以正陽令月誕聖嘉辰運協千年慶流萬國凡在臣子合有獻陳敢傾就日之心願奉如山之夀輕瀆宸扆無任兢惶為京兆李尹降誕日進衣狀衣一副四事右伏以水徳方清真龍下降天長地久瞻北極以常尊獻夀稱觴配南山而永固臣地居宗屬職忝尹京慶賀之誠倍萬常品前件衣服謹詣銀臺門奉進輕瀆旒扆伏用兢惶貞元十九年四月十九日為京兆韋尹進野猪狀右伏以收穫之餘田獵有獲異於芻豢著在方書既堪充庖輒敢上獻前件野猪謹隨狀進謹奏為杜相公自淮南追入長安至長樂驛謝賜酒食狀具官臣某右臣今日至長樂驛髙品某奉宣聖㫖賜臣酒食者伏以恩降王人榮分御膳未展儀於雙闕先受賜於八珍品越脤膰味兼醪醴頓驚凡口倍益歡心無任欣躍為杜相公謝就宅賜食狀具官臣某右髙品某奉宣聖㫖賜臣食者出自大官飫于私第光榮曲被猥承推食之恩駑蹇未施益重素餐之責舉其匕筯若負丘山無任戰荷踴躍之至為東都韋留守謝賜食狀具官臣某右臣今日發至長樂驛中使某奉宣聖㫖賜臣食者伏以味兼海陸品溢圓方降自御厨光臨傳舍臣初辭魏闕倍懐犬馬之誠猥受珍羞更切稻粱之感無任欣躍為裴相公進東封圖狀集賢殿御書院開元東封圖一面右臣謹按開元十三年𤣥宗皇帝以天下太平登封東岳聲明文物振耀古今伏惟陛下丕承耿光再闡鴻業祖宗盛事紹復有期臣所以寫成此圖輒敢上獻至於繢畫躬自指揮徵史氏之文纂禮容之要山川氣象悉擬真形羽衛威儀咸稽故實所冀叡情一覽遐想𤣥蹤臣叨榮過深抱疾巳久望陛下告成之日心必前知嗟老臣將謝之年身恐不見疾羸之際感激倍深前件圖謹差某官某謹詣光順門上進謹奏舉崔監察羣自代狀御史臺宣歙池等州都團練判官監察御史裏行崔羣右臣䝉恩授監察御史伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官在諸生中號為國器縶維外府人咸惜之臣既深知敢舉自代貞元十九年閏十月日舉開州栁使君公綽自代狀尚書屯田某官等守開州刺史栁公綽右臣䝉恩授尚書屯田員外郎伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官以賢良方正再敭王庭在流輩間號為端士昨除逺郡人皆惜之臣初䝉授官得以論薦多士之内非無其人竊惟用材宜自逺始謹具如前謹録奏聞伏聴敕㫖貞元二十一年四月八日舉姜補闕倫自代狀東都尚書省前左補闕姜倫右臣䝉恩授尚書主客郎中分司東都伏準建中元年正月五日敕常參官上後三日舉一人自代者臣伏詳詔㫖欲達聰旁求發揚幽逺故人人得言所知不當循其階次也臣伏以前件官有儒學士行䝉以諫官徵會其年老被疾不堪上道有司按視如狀不復逼迫至今家居而篤志無倦臣謹舉為郎吏分司别都冀優賢振滯兩得其道太和元年六月十四日蘇州舉韋中丞自代狀蘇州狀上中書門下諸道鹽鐵轉運江淮留後朝議郎守太僕少卿兼御史中丞上柱國賜紫金魚袋韋應物右臣䝉恩授蘇州刺史伏準建中元年正月五日制刺史上後舉一人自代者前件官歴掌劇務皆有美名執心不囘臨事能斷今領職雖重本官尚輕伏以當州口賦首出諸郡況經災沴切在撫綏尚省無能輒敢公舉司𣙜筦之利誠藉時才流豈弟之風實惟邦本非敢臆説以塞詔書今具聞奏太和六年十二月九日蘇州上後謝宰相狀朝議大夫使持節蘇州諸軍事守蘇州刺史上柱國劉某右某今月六日到州上訖某山東一書生潦倒疎濶在少壯日猶不逮人況今衰遲智力愈短相公哀憐不遇擢授名拜實荷𢎞奬慙非器使伏以當州繇大􅎊之後物力蕭然飢寒殞仆相枕于野誓當悉心條理續具奏論才術素空憂勞方始懼無聞問忝負恩知不任瞻望懇迫之至蘇州加章服謝宰相狀右某素乏吏才謬居劇郡以無庸之器當難治之時恭守詔條勤求人瘼伏以聖徳柔逺皇明燭幽凡有上陳皆可其奏遂令管見得及疲黎自承雨露之恩非有循良之政猥䝉朝奨特降命書顧逢掖之腐儒被華章之貴服有黷陟明之典誠招彼已之譏限以守官不獲拜謝瞻望榮感心魂載馳太和七年十二月日汝州上後謝宰相狀朝議大夫使持節汝州諸軍事守汝州刺史兼御史中丞充本州防禦使上柱國賜紫金魚袋劉某右某自領吳郡仍嵗天災上稟詔條下求人瘼地包藪澤俗尚剽輕悉心撫綏用法擒擿事繁才短常積憂虞忽䝉天恩稍移近郡家本滎上籍占洛陽病辭江干老見鄉樹榮感之至實倍常情印綬所拘不獲拜謝瞻望徳宇精誠坐馳無任感戀之至汝州舉裴大夫自代狀正議大夫使持節杭州諸軍事守杭州刺史上柱國賜紫金魚袋裴𢎞泰右臣䝉恩授汝州刺史兼御史中丞充本州防禦使伏準建中元年正月五日敕諸州刺史上後舉一人自代者伏以前件官前為九卿出領兩鎮頃因微累遂有左遷今授逺州物情未塞臣前任鄰接具知公才舊屈未伸輒舉自代云云汝州進鷹狀汝州防禦使當使進奉籠母鷹六聨右伏以前件鷹等學習應期馴養斯至列於常貢有異衆禽受紲之時志已存於雲外下韝之際思用展於軍前既懐百中之能願獻三驅之禮謹差防禦押衙景再休隨狀奉進以聞太和九年九月十一日同州舉蕭諫議自代狀同州防禦使前諌議大夫蕭俶右臣䝉恩授同州刺史兼御史中丞充本州防禦長春宫等使伏準貞元二年正月二十四日敕上後三日舉一人自代者伏以前件官生於貴族服膺儒門縉紳之間號為端士昨䝉朝奬冠于諌垣時方被病不果上道長告已滿塊然家居今聞疾瘳可以録用臣與俶久同班列知其才能為官擇人敢舉自代太和九年十二月四日上宰相賀徳音狀同州狀上中書門下今月十六日徳音右被刑部牒宣示徳音伏以聖澤滋深新恩廣被言念正刑之外或有詿誤之徒爰降殊私特𢎞在宥瑕累咸滌危疑獲安此皆廟算弼諧致君及物事光前史功格上𤣥某限以守官不獲隨例拜賀無任抃躍之至太和九年十二月二十三日上宰相賀改元赦書狀同州狀上中書門下改元赦書右伏奉今月一日制書改太和十年為開成元年大赦天下者伏以律首三元禮崇四始順陽和發生之徳敷大號渙汗之恩宥過恤刑㢮征已責盡去人瘼通知物情徳音朝發於九天和氣夕周於四海此皆相公弼諧之道燮贊之功進熟於密勿之間發揚成滂沛之澤某恪守官業印綬所拘不獲隨例拜賀謹狀薦處士嚴毖狀處士嚴毖右左庶子損之之孫國子司業士元之子舊名保嗣亦有官班頃者李賔客渤常與之游辟為桂州支使其後寄家汝海專静自居某嘗典汝州與語甚熟歴代史及國朝故事悉能該通操心甚危觀跡相副未逢知已巳過壯年汩没風塵有足悲者伏見赦文節目委州郡長吏搜訪隠淪夫舉無它唯善所在每覽珠英巻後列學士姓名有常州人符鳯白衣在選取其藝業不棄逺人某忝被儒官得以薦士亦非出位冀不廢言儻𢎞文集賢史氏之館採其實學有勸諸生伏以桂州辟之於前某薦之於後豈必有土長吏然後事行伏惟試味斯言降意詳擇謹狀薦處士王龜狀處士王龜古者選公族大夫必以惇惠者教之文敏者道之果敢者諗之鎮静者循之孜孜於此者葢膏粱之性難正而懼公侯之𦙍不能嗣其耿光可以深惜然則成宣之後而老為大夫非恥乎此智武子誡文子既冠而見之詞也是知古之取士不專寒族必參用世胄以廣得人之路今見處士王龜即居守之第三子也天性貞静操心甚危不由門資誓志自立樂處士之號不汩綺襦之間自到洛都便居山寺耽玩墳籍放情烟霞曽邀與語如鋸木屑信有稟受居然出羣以比在京師甚足知者諫院有狀名流亟言某流滯周南静閲時輩身雖不用心甚愛才況遇相公持衡敢有所啟誠懸之下輕重難欺伏惟深賜詳擇知卿族之内有遺逸焉謹狀正議大夫檢校禮部尚書兼太子賔客分司東都劉某狀劉賔客文集巻十七欽定四庫全書劉賔客文集巻十八唐劉禹錫撰啟上杜司徒啟時謫朗州某啟一自謫居七悲秋氣越聲長苦聴者誰哀湯網雖疎久而猶詿失意多病衰不待年心如寒灰頭有白髮惕厲之日利於退蔵是以彌年不敢奏記近本州徐使君至奉手筆一函稱謂不移問訊加劇重復㸃竄一無客言忽疑此身猶在門下收紙長想欣然感生尋省遭罹萬重不幸方寸之地自不能言求人見諒豈復容易伏䝉逺示且曰浮謗漸消況承慶宥期以振刷方今聖賢合徳朝野多歡澤柔異類仁及行葦萬族咸説獨為窮人四時平分未變寒谷自同類牽復又已三年側聞衆情或似哀歎某材畧無取廢錮是宜若非舊恩孰肯留念六翮方鎩思重託於扶摇孤桐半焦冀見收於煨燼伏紙流涕不知所言謹啟上淮南李相公啟某啟某間以昧於周身措足危地駭機一發浮謗如川巧言奇中别白無路祝網之日漏恩者三咋舌兢魂分終裔壤豈意天未𠞰絶仁人登庸施一陽於剥極之際援衆溺於坎深之下南箕播物曷可勝言危心鎩翮繇是自保隂施之徳已然乃聞受恩同人盟以死荅私感竊抃積于窮年化權禮絶孤去莫展今幸伍中牽復司存宇下伏慮因是記其姓名謹獻詩二篇敢聞左右古之所以導下情而通比興者必文其言以表之雖甿謡俚音可儷風什伏惟降意詳擇斯大幸也謹因楊子程留後行謹奏啟不宣謹啟上門下武相公啟某啟去年本州吏人自蜀還伏奉示問兼衣服繒綵等雲水路遙緘縢貺厚恭承惠下之㫖重以念舊之懐熙如陽和列在緗簡苦心多感危涕自零騖神驛思若侍潁杖伏以聖上注意理本鋭求國楨念外臺報政之功追宣室前席之事重下丹詔再升黄樞羣情合符和氣來應八柄所在三人同心協台坐之精膺傑材之數談笑於規隨之際從容於陶冶之間物皆由儀人識所措某久罹憲網兀若枯株當萬類咸説之辰抱窮途終慟之苦清朝無絳灌之列至理絶椒蘭之嫌此時不遇可以言命嗟乎一身主祀萬里望枌榆之鄉髙堂有親九年居蠻貊之地從坐之典固有等差同類之中又尋牽復頃在臺日獲奉準繩指吏途於按讞道文律於章奏藻鑒之下難逃陋容炎涼載移足見真態自違間左右沈淪選荒嵗月滋深艱貞彌厲緬思受譴之始它人不知屬山園事繁孱懦力竭本使有内嬖之吏供司有恃寵之臣言涉猜嫌動礙闗束城社之勢函矢紛然彌縫其間崎嶇備盡始慮罪因事闕寜虞謗逐跡生智乏周身又誰咎也伏以趙國公頃承一顧之重髙邑公夙荷見知之深雖提挈不忘而顯白無自葢以永貞之際皆在外方雖得傳聞莫詳本末特哀黨錮亟形話言自前嵗振淹命行中止或聞輿論亦愍重傷伏遇相公秉鈞輒已自賀儻重言一發清議攸同使聖朝無錮人大冶無廢物自新之路既廣好生之徳逺彰羣蟄應南山之雷窮鱗得西江之水指顧之内生成可期伏惟發膚寸之隂成彌天之澤囘一瞬之念致再造之恩誠無補於多事之時庶有助於隂施之徳無任懇悃之至謹啟上中書李相公啟某啟去年國子主簿楊歸厚致書相慶伏承相公言及廢錮愍色甚深哀仲翔之久謫恕元直之方寸思振淹之道廣錫類之仁逺聆一言如受華衮伏自不窺牆仞九年于兹髙卑邈殊禮數懸絶雖身居廢地而心恃至公伏以相公久以訏謨參于宥密材既為時而出道以得君而専令發於流水之源化行猶偃草之易習强伉者自納於軌物困杼軸者咸躋於仁夀六轡在手平衡居心運思於陶冶之間宣猷於魚水之際然能軫念廢物逺哀窮途嗟哉小人有足悲者内無手足之助外乏强近之親為學苦心本求榮養得罪由已翻乃貽憂捫躬自劾愧入肌骨禍起飛語刑極淪胥心因病怯氣以愁耗近者否運將泰仁人持衡伏惟推曽閔之懐憐烏鳥之志處䕫龍之位傷屈賈之心沛然垂光昭振幽蟄言出口吻澤濡寰區昔行葦勿傷枯骼猶掩哀老以出弊愍窮而開懐無情異類尚或嬰慮顧惟江干逐客曽是相府故人言念材能誠無所取譬諸飛走庸或知恩嗚呼以不駐之光隂抱無涯之憂悔當可封之至理為永廢之窮人聞弦尚驚危心不定垂耳斯久長鳴孔悲腸囘淚盡言不宣意謹啟謝門下武相公啟某啟某一坐飛語廢錮十年昨䝉徵還重罹不幸詔命始下周章失圖吞聲咋舌顯白無路豈謂烏鳥微志惻于深仁恤然動拯溺之懐煦然存道舊之㫖言念觳􅑌慰安蒼黄推以恕心期於造膝重言一發叡聴克從囘陽曜於肅殺之辰沃天波於蹭蹬之際俾移善地獲奉安輿率土知孝治之源羣生識人倫之厚感召和氣發揚皇風豈惟匹夫獨受其賜某即以今月十一日到州上訖守在要荒拘於印綬巾韝詣謝有志莫從誠知微生不足酬徳捐軀之外無地寄言效節蕭屏䖍然心禱無任懇悃屏營之至謹勒軍事衙官左威衛慈州吉昌府别將員外置同正員常懇奉啟起居不宣謹啟謝中書張相公啟某啟某智乏周身動必招悔一坐飛語如衝駭機昨者詔書始下驚懼失次叫閽無路擠壑是虞草木賤軀誠不足惜烏鳥微志實有可哀伏䝉聖慈遽寢前命移莅善部載形綸言凡在人臣皆感至徳凡為人子同荷至仁豈唯鯫生獨受其賜伏以相公心符上徳道冠如仁一夫不獲戚見于色宻㫖未下歎形于言竟囘三舍之光能拔九泉之厄袁公之平楚獄不忍錮人晏子之哀越石乃伸知巳所以慶垂𦙍祚言成春秋神理孔昭報應斯必身侔蟬翼何以受恩死輕鴻毛固得其所卑守有限拜謝末由無任感激兢惶之至謹勒軍事衙官守左威衛慈州吉昌府别將員外置同正員常懇奉啟起居不宣謹啟賀門下裴相公啟某啟伏以相公含道傑出降神挺生坐籌以弼叡謨秉鉞以行天討風雲助氣川岳效靈制勝於尊俎之間指蹤於韝緤之末繡斧既定衮衣以歸君心如魚水人望如風草一徳交暢萬邦和平運神思於洪鑪納生靈於夀域文武丕績冠于古今某恪守遐荒不獲隨例拜賀闕上門下裴相公啟某啟曩者淮右逋誅即戎嵗久天子齋戒以命元臣登壇之日上畧前定從九天而下縱以神兵分六符之光埽其長彗授鉞於西顥之半䇿勲於北陸之初功成偃節復執大柄君臣相遇播于樂章山河啟封載在盟府上方注意人益具瞻因魚水之協符極䕫龍之事業時屬四始恩覃萬方致君及物其徳兩大古先畯賢所未備者我從容而保之殆非人事抑有幽賛夫異同之論我以獨見剖之文武之道我以命材統之崇髙之位我以大功居之造物之權我以虛心運之然持盈之術古所難也實在隂施及物厚其徳基以左右功庸而百禄是荷人所欽戴久而愈宜昔袁太尉不忍錮人而楚獄衰息一言之慶子孫丕承以今日將明之材行前修博施之義筆端膚寸澤及九垠猶夫疾耕必有滯穗某頃墮危厄嘗受厚恩詛盟於心要之自效常懼廢死荒服永辜願言敢因賀牋一寄丹懇顧非竒理不足以縈于沖襟然則利於行者固在乎常談而卓詭孤特之言未必利於行也伏惟以愚言與賢者參之謹啟賀門下李相公啟自西川入為大夫拜相某啟伏以聖君當功成愷樂之日而求賢愈切思治益深是上𤣥垂休欲速致太平之明效以相公事業而逢此時天下之人視仁夀之域其猶尋尺故命書所至徳風隨之微材片善咸自磨拂況同主國柄如吹塤篪含生之倫唯所措置日月亭午物無邪隂聖賢合徳人識正道雖居畎畝足以詠歌某遐守要荒不獲隨例拜賀私感竊抃實倍恒情上僕射李相公啟某啟州吏還伏䝉擺落常態手筆具書言及貞元中登朝人逮今無十輩及發中書相公一函具道閤下亟言曩遊顔間頗有哀色夫溝中之木與犧象同體追琢不至坐成枯薪朱而藍之猶足為器茍液樠曲戾不足枉斧斤願為庭燎以照嘉客謹啟謝裴相公啟某啟某遭不幸嵗將二紀雖累更符竹而未出網羅親知見憐或有論薦如陷還濘動而愈沈甘心終否無路自奮豈意天未𠞰絶仁人持衡紆神慮於多方起堙沈於久廢居剥極之際一陽復生出坎深之中平路資始通籍郎位分曹樂都喬木展舊國之思行雲有故山之戀姻族相賀壺觴盈門官無責詞始自今日禽魚之志誓以死生草木之年惜其晼晚章程有守拜謝無由瞻望巖廊䖍黙心禱謹啟謝竇相公啟某啟某一辭朝列二十三年雖轉郡符未離謫籍卑濕生疾衰遲鮮歡望故國而未歸如痿人之念起昨䝉罷免甘守丘園相公不棄舊遊特哀久廢每逢華翰賜之衷言果䝉新恩重忝清貫薦延有漸拯拔多方六律變幽谷之寒一丸銷彌年之疹鎩翮將舉危心獲安布武夷途自此而始分曹有繫拜謝無由瞻望徳藩坐馳精爽無任感激之至謹啟劉賔客文集巻十八欽定四庫全書劉賔客文集巻十九唐劉禹錫撰
