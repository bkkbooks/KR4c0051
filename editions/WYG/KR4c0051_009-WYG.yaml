body:
  text: 謝上連州刺史表臣某言伏奉去三月七日制授臣使持節連州刺史恭承睿㫖跪奉詔書皇恩重於丘山聖恩深於雨露抃舞失次神魂再揚臣某中謝臣性愚拙謬學文詞幸遇休明累登科第出身入仕並不因人徳宗臨御之時臣忝御史陛下龍飛之日臣忝郎官恭守章程勤修職業權臣奏用葢聞虚名實非曲求可以覆視跡卑易枉無路自明亦縁臣有微才所以嫉臣者衆競生口語廣肆加誣伏賴陛下至仁時從寛典舉以縁坐貶佐遐藩屢變星霜頻經恩赦犬馬懐戀寢興匪寜唯讀佛經願延聖夀昨䝉昭命追赴上都隨列授官俾居逺郡在臣之分榮幸巳多伏荷陛下孝理純深皇明照燭哀臣老母羸疾憫臣一身零丁特降所恩得移善部光榮廣被母子再生凡在人臣皆感聖徳凡為人子皆荷聖慈豈唯賤臣獨受恩造不覺喜極至于涕零昔殷王俯念於前禽且聞解網漢帝有感於少女爰命罷刑方之聖朝不足多尚感召和氣慰安羣生非臣隕越所能上報伏以南方厲疾多在夏中臣自發栁州便染瘴瘧扶䇿在道不敢停留即以今月十一日到州上訖謹宣聖㫖以示逺人恭述詔條所期富庶無任含輝洞述河東薛公景晦以文無害為尚書刑部郎中以訕為道州刺史居郡大理至於無事清機羨益盡付山水一旦以書來誇曰吾得異境于近郊自城西門並南山俯江水有石穹然如夏屋其左右前後又如囘廊曲房藻繡彫彤之象雲生日入怪狀迭發水石卉木香非人寰意其當為食霞御氣者之所遊息委蛻而去不知其幾千百年逮今得諸黄冠野夫及請而往因名其地曰含輝洞葢詩家流所謂山水含清輝者是已吾子常以詞雄於世盍為我誌焉愚得書退而深惟若薛公者少居江湖間遊名山東探禹穴止四明句曲金華陽羨南過九江薄匡廬以涉彭蠡天下山水之籍存乎胸中第其髙下銖兩不失及是而口呿不能名顧謂竒信矣若江華者九疑三湘之佳麗地也前此二千石御史中執法河南元次山諫大夫北平陽亢宗司刑大夫東平吕和叔皆碩人也考槃招隠之致恒汲汲然卒使諸境貴于異日豈地愛其寳有時而發耶顧謂異信矣夫物之有作俟言而逺故述焉以書于洞隂曰營陽鬱鬱山水第一洞有含輝遊人忘歸公也孔樂請言其㣲先是斯境翳于榛薄天姿孤絶凡目所忽閟其清光有待而發公之來思探竒翫竒茇野憇林而民悦之既悦其至益知所嗜捫陘歴峴來適公志偶得竒絶聿來告公駕言從之谷岸溟濛有石如門又如垣墉樛蔓交木似綸似組乃芟乃治乃可布武伸脰掉臂空洞無阻左右囘環儼若廊廡飛泉出竇練縋花吐觸石吹沙珮搖絃撫側逕夤縁豁然見天有石如堂度之五筵東西二門與日明昏奥者如室宣者如軒因其髙下爰搆亭榭匠生於心隨指如化開山剪木後以私屬結構暨茨子來嬉嬉無事而就邦人不知淑清之辰休澣之時雅步幅巾琴壺以隨前無俗人與白雲期年日盡適形神不羈元氣顥然觀吾朶頥遵渚之鴻有時而飛石門之下可以棲遲此谷而盈彼丘而夷維公之跡永在于斯吏隠亭述元和十五年再牧于連州作吏隠亭海陽胡壖入自外閒不知藏山歴級東望怳非人寰前有四榭隔水相鮮凝靄蒼蒼深流布懸架險通蹊有梁如蜺輕泳徐轉有舟如翰登霞􅃞月若在天漢視被廣輪千畆之半翠麗于是與世珠貫澂明峭絶藿靡葱蒨炎景有宜昏旦迭變疑昔神鼇負山而抃摧其别島置此髙岸海陽之名自元先生先生元結有銘其碣元維假符予維左遷其間相距十五餘年封境服人其猶比肩天下山水非無美人地偏人逺空樂魚鳥謝公開山涉月忘還豈曰無娛伊險且艱溪山為友城池為伍却倚佛寺左聯仙府勢拱臺殿光含廂廡窈如壺中别見天宇石堅不老水流不腐不知何人為今為古終堅焉老終流焉竭不知何時再融再結傳信方述余為連州四年江華守河東薛景晦以所著古今集驗方十通為贈其志在於拯物予故申之以書異日景晦復寄聲相謝且咨所以補前方之闕醫拯道貴廣庸可以學淺為辭遂於篋中得巳試者五十餘方用塞長者之問皆有所自故以傳信為目云元和十三年六月八日中山劉禹錫述彭陽唱和集引丞相彭陽公始由貢士以文章為羽翼怒飛于㝠㝠及貴為元老以篇詠佐琴壺取適乎閒讌鏘然如朱絃玉磬故名聞于世間鄙人少時亦嘗以詞藝梯而航之中途見險流落不試而胷中之氣伊鬱蜿蜒泄為章句以遣愁沮悽然如燋桐孤竹亦名聞于世間雖窮達異趣而音英同域故相遇甚歡其㑹面必抒懐其離居必寄興重酬累贈體備今古好事者多傳布之今年公在并州余守吳門相去迴逺而音徽如近且有書來抵曰三川守白君編録與吾子贈答緘縹囊以遺余白君為詞以冠其前號曰劉白集悠悠思與所賦亦盈于巾箱盍次第之以塞三川之請於是緹綴凡百有餘篇以彭陽唱和集為目勒成兩軸爾後繼賦附于左方太和七年二月五日中山劉禹錫述彭陽唱和集後引貞元中予為御史彭陽公從事于太原以文章相徃来有日矣無何予受譴南遷十餘年間公登用至宰相出為衡州方獲㑹面輸寫藴積相視泫然爾後或雜賦詩贈答編成兩軸太和五年余領吳郡公鎮太原常發函寓書必有章句絡繹於數千里内無曠旬時八年公為吏部尚書予牧臨汝有詩歎七年之别著其後云集巻自此為第三未幾予轉左馮公登左揆每恨近而不見形於詠言開成元年公鎮南梁予以太子賔客分司東都新韻繼至率云三軸成矣二年冬忽寄一章詞調悽切似有永訣之㫖伸紙悸歎居數日果承訃書嗚呼聆風相悦者四十年㑹面交歡者十九年以詩見投凡七十九首勒成三巻以副平生之言吳蜀集引長慶四年余為歴陽守今丞相趙郡李公時鎮南徐州毎賦詩飛函相示且命同作爾後出處乖逺亦如隣封凡酬唱始於江南而終於劒外故以吳蜀為目云汝洛集引太和八年予自姑蘇轉臨汝樂天罷三川守復以賔客分司東都未幾有詔領馮翊辭不拜職授太子少傅分務以遂其髙時予代居左馮明年予罷郡以賔客入洛日以章句交歡因而編之命為汝洛集子劉子自傳子劉子名禹錫字夢得其先漢景帝賈夫人子勝封中山王諡曰靖子孫因封為中山人也七代祖亮事北朝為冀州刺史散騎常侍遇遷都洛陽為北部都昌里人世為儒而仕墳墓在洛陽北山其後也陿不可依乃塟滎陽之檀山原田大王父已還一昭一穆如平生曽祖凱官至博州刺史祖鍠由洛陽主簿察視行馬外事嵗滿轉殿中丞侍御史贈尚書祠部郎中父諱緒亦以儒學天寳末應進士遂及大亂舉族東遷以違患難因為東諸侯所用後為浙西從仕本府就加鹽鐡副使遂轉殿中主務于埇橋其後罷歸浙右至揚州遇疾不諱小子承夙訓稟遺教眇然一身奉尊夫人不敢殞滅後忝登朝或領郡䝉恩澤先府君累贈至吏部尚書先太君盧氏由彭城縣太君贈至范陽郡太夫人初禹錫既冠舉進士一幸而中試間嵗又以文登吏部取士科授太子校書官司閒曠得以請告奉温凊是時年少名浮於實士林榮之及丁先尚書憂迫禮不死因成痼疾既免喪相國揚州節度使杜公領徐泗素知遂請為掌書記捧檄入告太夫人曰吾不樂江淮間汝宜謀之於始因白丞相以請曰諾居數月而罷徐泗而河洛猶艱難遂改為揚州掌書記涉二年而道無虞前約乃行調補京兆渭南主簿明年冬擢為監察御史貞元二十一年春徳宗新棄天下東宫即位時有寒雋王叔文以善奕棊得通籍博望因間隙得言及時事上大竒之如是者積久衆未知之至是起蘇州掾超拜起居舍人充翰林學士遂隂薦丞相杜公為度支鹽鐡等使翊日叔文以本官及内職兼充副使未幾特遷户部侍郎賜金紫貴振一時愚前巳為杜丞相奏署崇陵使判官居月餘日至是改屯田員外郎判度支鹽鐡等按初叔文北海人自言猛之後有逺祖風唯東平吕温隴西李景儉河東栁宗元以為言然三子者皆與予厚善日夕過言其能叔文實工言治道能以口辨移人既得用自春至秋其所施為人不以為非當時上素被疾至是尤劇詔下内禪自為太上皇後諡曰順宗東宫即皇帝位是時太上久寢疾宰臣及用事者都不得召對宫掖事祕而建桓立順功歸貴臣於是叔文首貶渝州後命終死宰相貶崖州予出為連州途至荆南又貶朗州司馬居九年詔徵復授連州自連歴䕫和二郡又除主客郎中分司東都明年追入充集賢殿學士轉蘇州刺史賜金紫移汝州兼御史中丞又遷同州充本州防禦長春宫使後被足疾改太子賔客分司東都又改秘書監分司一年加檢校禮部尚書兼太子賔客行年七十有一身病之日自為銘曰不夭不賤天之祺兮重屯累厄數之竒兮天興所長不使施兮人或加訕心無疵兮寢於北牖盡所期兮塟近大墓如生時兮魂無不之庸詎知兮唐故監察御史贈尚書右僕射王公神道碑公諱倰字真長其先葉黄帝夫聖人之後與庶姓不同如河出崑崙潜於厚地欻焉振起奮為汪洋奔騰自天非衆川也故自黄帝八代而生舜武王克殷求有媯之𦙍滿封於陳是為胡公十三葉生完自以公子國難不得立乃抱樂器奔齊桓公以卿禮接之下又十一葉和以久為政隂浹于人遂有齊國三代稱王至建為秦所滅項羽入秦封建孫安為濟北王漢興失國齊人謂之王家因以為氏安子涓仕漢為鎮東将軍青州牧封劇縣伯自涓至彤凡一十九代兩漢公卿牧守如家牒然十代祖猛字景畧苻秦尚書令伉秦成霸業與孔明佐蜀同功故時人謂之王葛史云北海劇人遂著為族望九代祖休儀曹尚書八代祖鎮惡佐命宋長安擒姚𢎞至北齊五代祖􅀈七兵部尚書兄弟九人時號王氏九龍於齊史有傳云髙祖顗字君粹北齊著作郎燕郡太守曽祖敬忠成州刺史大父上客髙宗封嶽進士及第歴侍御史主客兵部員外郎累遷兵右金吾衛將軍冀州刺史靈州都督朔方道總管見職官儀及衣闕烈考瞰宣州宣城縣令贈工部郎中娶河東裴氏乃生僕射少而敦敏工為文始以崇文生應深謀祕䇿考入上第拜監察御史天之賦予莫能兩大既揚令名而不以景福享齡五十五塟于河南府偃師縣亳邑鄉後以子貴累贈禮部尚書至右僕射夫人江夏李氏祔焉李門多竒才父暄起居舍人暄子鄘門下侍郎平章事髙叔祖善蘭臺郎崇文館學士注文選行於時善子邕北海郡太守有重名四方之士求為碑銘者傾天下故夫人於盛宗禮範可法累贈至江夏郡夫人僕射有三子長子早終次子處𤣥少嬰沉恙慕道士養生之術髙尚其趣强仕而没積善不試後來果大焉季子彦威字子美始以五經登甲科歴太常博士祠部員外郎遷屯田郎中轉户部司封並充禮儀使判官宏文館學士京兆少尹諫議大夫史館修撰以直諫出為河南少尹入為少府監司農卿改淄青節度使徵拜户部侍郎判度支勢逼生患出為衛尉卿分司東都尋起為陳許節度使檢校禮部尚書充汴宋亳等州節度觀察處置等使北海縣開國子食邑五百户娶潁川韓氏主客員外郎衢之女國子祭酒楊頊之外孫夫人有三弟皆材無子早謝已如禮祔塟于亳邑原僕射厚徳覆露之尚書丕承之以蚤孤鋭意嚮學嘗閲詩至蓼莪篇感激流涕故其志如刃始淬及學成立成為鴻儒入用為能臣參定儀制財成經費起書生擁旌節今又領全師鎮上游握神符垂三組皆嚮時感發之所激也志就而學成名聞而身達欲報無所外榮中悲人子之孝在乎揚其先徳以耀于逺乃俾學古者書本系所自且銘于龜趺螭首云銘曰山積而髙澤積而長聖人之後必大而昌由聖與賢或為霸强建不克嗣濟北疏疆齊人徳之其族稱王佐于苻秦北海重光僕射之主負材而起䇿于萬乘擢為御史同時條對千目仰視桂林一枝拾芥相似名動海内夫豈不偉種徳而牙乃生令子出入鼎貴理財統師流根之澤密印纍纍峻其追崇幽顯有輝孝嗣之志歉然弗怡春露秋霜感傷履之時久能慕禄豐益悲明發不寢永懷孝思攄之無窮曷若豐碑景亳之原佳城在斯乃金石刻揭于道陲松耶栢耶有洛之湄過者必下來觀信辭劉賔客外集巻九欽定四庫全書劉賔客外集巻十唐劉禹錫撰
