front:
  text: 淮南杜相公論西戎表臣某言臣一辭闕庭已僅二載官當重任身受重恩既懐子牟戀闕之心又負臧文竊位之責思所以歌頌聖徳裨補箴規塵露至微不任懇迫臣逺祖詩顯名漢代出牧南陽讜言善䇿隨事獻納忠醇之至聞于中外遺風可襲有激愚衷臣是以輒竭聞見粗陳梗槩雖不盡陛下聖明萬分之一然臣子之心有直必獻伏惟皇帝陛下徳合天地道躋文武弛張普博事法隂陽氣均生成人霑亭育凡是氛沴覆以春和銷除容納皆如聖意寛宥肆赦實賴皇明河中誅鋤不勞兵革淮右底定不戮一人慶浹萬邦事出千古近又西戎背約寇犯王師陛下寛貸豺狼矜其兇悍布以恩澤果爾知慙功因徳成不以兵制故詩云獫狁孔熾書稱蠻夷猾夏臣觀自古帝王不忍小忿貽大患故竭耗中國盡力邉陲至如滅昆明之城平大宛之種豈是發輝皇猷増榮簡冊故聖哲之論薄衛霍之功陛下鏡歴代無益之端修大君文徳之教遂得北狄深蔵五城晏閑百蠻嚮化四海無虞惟此小番尚述聲教陛下示之大信加以舊恩雖闗防暫驚而烽燧旋罷臣負恩方鎮初懼寇戎正於憂迫之時果聞仁聖之諭攘却兇孽不勞干戈臣静思逺圖久計莫若存信施惠以愧其心嵗通玉帛待以客禮昭宣聖徳擇奉誼之臣恢拓皇威選謹邉之將積粟塞下坐甲闗中以逸待勞以髙御下重其金玉之贈結以舅甥之歡小來則慰安大至則嚴備明其斥候不撓不侵則戎狄為可封之人沙塲無戰死之骨若天下無事人安嵗稔然後訓兵命将破虜摧衡原州營田靈武盡復舊地通使安西國家長筭悉在於此計熟事定舉必有功茍未可圖豈宜容易此皆陛下朝夕倦談之事前後立騐之謀臣質性頑疎籌畫庸近受恩非據敢㤀獻忠犬馬之心實所罄盡謹遣某官某奉表
