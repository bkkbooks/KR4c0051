body:
  text: 送工部張侍郎入蕃弔祭時張兼修史月窟賔諸夏雲官降九天飾終隣好重錫命禮容全水咽猶登隴沙鳴稍極邊路因乗驛近志為飲冰堅毳帳差池見鳥旗揺曳前歸來賜金石榮耀自編年蚤秋送臺院楊侍御歸朝兄弟四人遍歴諸科二人同在仙署棣華春當時已絶倫今朝丹闕下更入白眉人重振髙陽族分居要路津一門科第足五府辟書頻鷙鳥得秋氣法星懸火旻聖朝寰海静所至不埋輪送工部蕭郎中刑部李郎中並以本官兼中丞分命充京西京北覆糧使霜簡映金章相輝同舍郎天威巡虎落星使出鴛行尊俎成全䇿京坻閱見糧歸來虜塵滅畫地奏明光送李尚書鎮滑州自浙西觀察徴拜兵部侍郎月餘有此拜南徐報政入文昌東郡須才别建章視草名髙同蜀客擁旄年少勝荀郎黄河一曲當城下緹騎千重照路傍自古相門還出相如今人望在巖廊其後果繼韋平之族送渾大夫赴豐州自大鴻臚拜家承舊勲鳯銜新詔降恩華又見旌旗出渾家故吏來辭辛屬國精兵願逐李輕車氊裘君長迎風懼錦領酋豪蹋雪衙其奈明年好春日無人喚看牡丹花送源中丞充新羅冊立使侍中之孫相門才子稱華簮持節東行捧徳音身帶霜威辭鳯闕口傳天語到雞林煙開鼇背千尋碧日浴鯨波萬頃金想見扶桑受恩後一時西拜盡傾心送陸侍御歸淮南使府五韻用年字江左重詩篇陸生名久傳鳯城來已熟羊酪不嫌羶歸路芙蓉府離堂瑇瑁筵秦山呈臘雪隋柳布新年曽忝揚州薦因君達短牋時段丞相鎮揚州嘗辱表薦送太常蕭博士棄官歸養赴東都時元兄罷相為少師仲兄為郎官並􅀆司洛邑兄弟盡鴛鸞歸心切問安貪榮五采服遂挂兩梁冠侍膳曽調鼎循陔更握蘭從今别君後長向徳星看送王司馬之陜州自太常丞授工為詩暫輟清齋出太常空攜詩巻赴甘棠府公既有朝中舊司馬應容酒後狂案牘來時唯署字風煙入興便成章兩京大道多遊客每遇詞人戰一場洛中送楊處厚入闗便遊蜀謁韋令公洛陽秋日正淒淒君去西秦更向西舊學三冬今轉富曽傷六翮養初齊王城曉入窺丹鳯蜀路晴來見碧雞蚤識卧龍應有分不妨從此躡丹梯洛中逢韓七中丞之吴興口號五首昔年意氣結羣英幾度朝回一字行海北天南零落盡兩人相見洛陽城自從雲散各東西每日歡娱却慘悽離别苦多相見少一生心事在書題今朝無意訴離桮何況清弦急管催本欲醉中輕逺别不知飜引酒悲來駱駝橋上蘋風起鸚鵡桮中箬下春水碧山青知好處開顔一笑向何人溪中士女出芭籬溪上鴛鴦避畫旗何處人間似仙境春山攜妓採茶時送周使君罷渝州歸郢州别墅君思郢上吟歸去故自渝南擲郡章野戍岸邊留畫舸緑蘿隂下到山莊池荷雨後衣香起庭草春深綬帶長只恐鳴騶催上道不容待得晚菘嘗發華州留别張侍御一作賈束簡下延閣買符驅短轅同人惜分袂結念醉芳樽切切别弦思蕭蕭征騎煩臨岐無限意相視却忘言張詩云夫子生知者相期妙理中遂有忘言之句奉送家兄歸王屋山隠居二首據道書王屋山一名陽洛山陽洛天壇上依俙似玉京夜分先見日月浄逺聞笙雲路将雞犬丹臺有姓名古來成道者兄弟亦同行春來山事好歸去憶逍遙水净苔莎色露香芝术苗登臺吸瑞景飛步翼神飊願薦塤箎曲相將學玉簫送王師魯協律赴湖南使幕即永穆公之孫翩翩馬上郎驅傳渡三湘橘樹沙洲暗松醪酒肆香素風傳竹帛高價騁琳琅楚水多蘭若何人事搴芳别友人後得書因以詩贈前時送君去揮手青門橋路轉不相見猶聞馬蕭蕭今得出闗書行塵日已遙春還遲君至共結芳蘭苕奉送浙西李僕射相公赴鎮奉送至臨泉驛書禮見徴拙詩時在汝州建節東行是舊逰歡聲喜􅂔滿吴州郡人重得黄丞相童子争迎郭細侯詔下初辭温室樹夢中先到景陽樓自憐不識平津閤遙望旌旗汝水頭重送浙西李相公頃廉問江南已經七載後歴滑臺劒南兩鎮遂入相今復領舊地新加旌旄江北萬人看玉節江南千騎引金鐃鳳從池上遊滄海鶴到遼東識舊巢城下清波含百谷窻中逺岫列三茅碧雞白馬回翔久却憶朱方是樂郊送華隂尉張苕赴邕府使幕張即燕公之孫坐事除名昔黍南宫郎往來東觀頻嘗披燕文傳聳若窺三辰翊聖崇國本保賢正朝倫髙視緬今古清風夐無鄰蘭錡照通衢一家十朱輪鄼國嗣侯絶蒍鄉貴業貧夫子承大名少年振芳塵青袍仙掌下矯首陵煙旻公冶本非罪潘郎一為民風霜苦揺落堅白無緇磷一旦逢良時天光燭幽淪重為長裾客佐彼觀風臣分野窮禹畫人煙過虞巡不言此行逺所樂相知新雨起巫山陽鳥鳴湘水濵離筵出蒼莽别曲多愁辛今朝一桮酒明日千里人彼此孤舟去悠悠天海春送湘陽熊判官孺登府罷歸鍾陵因寄呈江西裴中丞二十三兄射䇿志未就從事府云除篋留馬卿賦袖有劉𢎞書忽見夏木深悵然憶吾廬復持州民刺歸謁専城居君家誠易知勝絶傾里閭人言北郭生門有卿相輿鍾陵藹千里帶郭西江水朱檻照河宫旗亭緑雲裏前年初缺守慎簡由宸扆臨軒㺯郡章得人方付此是時左馮翊天下第一理貴臣持牙璋優詔發青紙迎風汚吏免先令疲人喜何武劾腐儒陳蕃禮髙士昔升君子堂腰下綬猶黄中丞時為萬年尉汾隂有寳氣赤堇多竒鋩束簡下曲臺佩鞬來歴陽綺筵陪一笑蘭室襲餘芳風水忽異勢江湖遂相忘因君儻借問為話老滄浪中丞為博士製相國柳宜城諡議識者韙之頃授予以其本厥後牧和州節度使杜司徒以中丞材譽俱髙欲令軍装以重戎府故授以本州團練使滿坐觀腰鞬禮成驩甚相視而笑後房燕樂卜夜縦談予忝司徒之賔時獲末坐初中丞自尚書屯田員外郎出守踵其武者今給事中穆公代給事者右丞段公予不佞繼右丞之後故曰襲餘芳焉送韋秀才道沖赴制舉驚禽一辭巢棲息無少安秋扇一離手流塵蔽霜紈故侣不可追涼風日已寒逺逢杜陵士别盡平生歡逐客無印綬楚江多芷蘭因君時暇遊長鋏不復彈閱書南軒霽絙瑟清夜䦨萬境身外寂一桮腹中寛伊昔𤣥宗朝冬卿冠鴛鸞肅穆升内殿從容領儒冠游夏無措詞陽秋垂不刋至今羣玉府學者空縱觀世人希徳門揭若攀峯巒之子向明訓鏘如振琅玕一旦西上書斑裳拂征鞍荆臺宿莫雨漢水浮春瀾君門起天中多士如星攅烟霞覆雙闕抃舞羅千官清漏滴銅壺仙厨下雕盤熒煌仰金榜錯落飛濡翰古來長䇿人所歎遭時難一鳴從此始相望青雲端送李䇿秀才還湖南因寄幕中親故兼簡衡州吕八郎中深春風日浄争長幽鳥鳴僕夫前致辭門有白面生攝衣相問訊解帶坐南榮端志見眉睫苦言發精誠因出懐中文調孤詞亦清悄如促柱弦掩抑多不平乃言本蜀士世降岷山靈前人秉懿文髙視來上京曳綬司徒府所從信國楨析薪委空林善響難繼聲何處翳附郭幾人思郈城雲天望喬木風水悲流萍前與計吏西始列貢士名森然就筆札從試春官卿帝城岐路多萬足伺晨星茫茫風塵中工拙同有營寒女勞夜織山苗榮寸莖侯門方撃鍾衣褐誰將迎弱羽果摧頽壯心鬱怦怦諒無蟠木容聊復蓬累行昨日訊靈龜繇言利艱貞當求捨拔中必在審已明誓將息薄遊焦思窮筆精蒔蘭在幽渚安得揚棻馨曰余摧落者散質負華纓一聆苦辛詞再動伊鬱情身棄言不重愛才心尚驚恨無羊角風使爾化北溟論罷情益親涉旬忘歸程日攜邑中客閒眺江上城晝渴命金壘宵談轉璿衡蕙風香麈尾月露濡桃笙忽被戒羸驂薄言事南征火雲蔚千里旅思浩已盈湘江含碧虚衡嶺浮翠晶豈伊山水異適與人事并油幕似崑丘粲然疊瑶瓊庾樓見清月孔坐多緑􅌬復有衡山守本自雲龍庭至和在靈府發越侔咸英一麾出營陽惠彼嗤嗤氓隼旟辭瀟水居者皆涕零惟昔與伊人交歡在夙齡一從雲雨散滋我鄙恡萌北渚不堪愁南音誰復聴離憂若去水浩漾無時停嘗聞祝融峯上有神禹銘古石琅玕姿祕文螭虎形聖功奠逺服神物擁休禎賢人在其下仿像疑蓬瀛君行歴郡齋大袂拂雙旌飾容遇朗鑒肝鬲可以呈昔日焉相如臨卭坐盡傾勉君刷羽翰蚤取凌青冥送張盥赴舉并引古人以偕受學為同門友今人以借升名為同年友其語熟見搢紳者皆道焉余於張盥為丈人由是道也曩吾見爾之始生以老成為祝今吾見爾之成人以未立為憂吾不幸嚮所謂同年友當其盛時聫袂齊鑣亘絶九衢若屏風然今來落落如曙星之相望借曰㑹合不煩異席可長太息哉然而尚書右丞衞大受兵部侍郎武庭碩二君者當時偉人咸萬夫之望足以訂十朋之多也第如京師無騷騷爾無􅀈􅀈爾時秋也吾為若叩商之謳幸有感夫二君子爾生始懸弧我作坐上賔引箸舉湯餅祝詞天麒麟今成一丈夫坎軻愁風塵長裾來謁我自號廬山人道舊與撫孤悄然傷我神依依見眉睫嘿嘿含悲辛永懐同年友追想出谷晨三十二君子齊飛陵烟旻曲江一㑹時後㑹已彫淪況今三十載閲世難重陳盛時一已過來者日日新不如揺落樹重有明年春火後見琮璜霜餘識松筠肅機乃獨秀武部亦絶倫爾今持我詩西見二重臣成賢必念舊保貴在安貧清時為丞郎氣力侔陶鈞乞取斗升水因之雲漢津送裴處士應制舉并引晉人裴昌禹讀書數千巻於周官小戴禮尤邃性是古敢言雖侯王不能卑下故與世相參差凡抵有位以索合行天下幾户依反遍常歎諸侯莫可遊欲一見天子而未有路㑹今年詔書徵賢良昌禹大喜以為盡可以豁平生搏髀爵躍曰一觀雲龍庭足矣繇是裹三月糧而西徂咨余以七言為西遊之資藉耳裴生久在風塵裏氣勁言髙少知已注書曽學鄭司農歴國多於孔夫子往年訪我到連州無窮絶境終日遊登山雨中試蠟屐入洞夏裏披貂裘白帝城邊又相遇斂翼三年不飛去忽然結束如秋蓬自稱對䇿明光宫人言䇿中説何事掉頭不荅看飛鴻彤庭翠松迎曉日鳯銜金牓雲間出中貴腰鞭立傾酒宰臣委佩觀揺筆古稱射䇿如彎弧一發偶中何時無由來草澤無忌諱努力滿挽當雲衢憶得童年識君處嘉禾驛後聫牆住垂鈎鬭得王餘魚蹋芳共登蘇小墓此事今同夢想間相看一笑且開顔老大希逢舊鄰里為君扶病到方山和州送錢侍御自宣州幕拜官便於華州覲省五綵繡衣裳當年正相稱春風舊闗路歸去真多興蘭陔行可採蓮府猶回瞪楊家紺幰迎侍御即王相公貴壻謝守瑶華贈宣州崔相公有詩贈行御街草泛灎臺栢烟含凝曽是平昔遊無因理歸乗將赴汝州途出浚下留辭李相公長安舊遊四十載鄂渚一别十四年後來富貴已零落嵗寒松栢猶依然初逢貞元尚文主雲闕天池共翔舞相看却數六朝臣屈指如今無四五夷門天下之咽喉昔時往往生瘡疣聫翩舊相來鎮壓四海吐納皆通流久别凡經幾多事何由説得平生意千思萬慮盡如空一笑一言真可貴世間何事最殷勤白頭將相逢故人功成名遂㑹歸老請向東山為近隣送令狐相公自僕射出鎮南梁夏木正隂成戎装出帝京沾襟辭闕淚回首别鄉情雲樹襃中路風烟漢上城前旌轉谷去後騎蹋橋聲久領鴛行重無嫌虎綬輕終當提一筆再入副蒼生送趙中丞自司金外郎轉官參山南令狐僕射幕府趙氏兄弟皆僕射門客緑樹滿襃斜西南蜀路賒驛門臨白社縣道過黄花相府開油幕門生逐絳紗行看布政後還從入京華奉送裴司徒令公自東都留守再命太原本封晉國公兩任相去十六年星使出闗東兵符賜上公山河歸舊國管籥換離宫行色旌旗動軍聲鼓角雄愛棠餘故吏騎竹見新童漢壘三秋静邊塵萬里空其如天下望旦夕詠清風奉送李户部侍郎自河南尹再除本官歸闕昔年内署振雄詞今日東都結去思宫女猶傳洞簫賦國人先詠衮衣詩華星却復文昌位别鶴重歸太一池想到金門待通籍一時驚喜見風儀送蘄州李郎中赴任楚闗蘄水路非賒東望雲山日夕佳薤葉照人呈夏簟松花滿盌試新茶樓中飲興因明月江上詩情為晚霞北地交親長引領蚤將𤣥鬢到京華洛中春末送杜録事赴蘄州尊前花下長相見明日忽為千里人君過午橋回首望洛城猶自有殘春夜宴福建盧侍御宅因送之鎮暫駐旌旗洛水隄綺筵紅燭醉蘭閨美人美酒長相逐莫怕猿聲發建溪洛中送崔司業使君扶侍赴唐州緑野方城路殘春柳絮飛風鳴驌驦馬日照老萊衣洛苑魚書至江村雁户歸相思望淮水雙鯉不應稀送河南皇甫少尹赴絳州祖帳臨周道前旌指晉城午橋羣吏散亥字老人迎詩酒同行樂别離方見情從兹洛陽社吟詠欠書生送前進士蔡京赴學究科時舊相楊尚書掌選耳聞戰鼓帶經鋤振發名聲自里閭已是世間能賦客更攻窻下絶編書朱門達者誰能識絳帳諸生盡不如幸遇天官舊丞相知君無翼上空虚送唐舍人出鎮閩中暫辭鴛鷺出蓬瀛忽擁貔貅鎮粤城閩嶺夏雲迎皂葢建溪秋樹映紅旌山川逺地由來好富貴當年别有情了却人間婚嫁事復歸朝右作公卿送盧處士歸嵩山别業世業嵩山隠雲深無四鄰藥鑪燒姹女酒􅀢貯賢人曉日華隂霧秋風函谷塵送君從此去鈴閤少談賔送李友路秀才赴舉誰憐相門子不語望秋山生長紈綺内辛勤筆硯間榮親在名字好學棄宫班佇俟明年桂髙堂開笑顔送國子令狐博士赴興元覲省相門才子髙陽族學省清資五品官諌院過時榮棣萼謝庭歸去蹋芝蘭山頭花帶烟嵐晚棧底江涵雪水寒伯仲到家人盡賀栁營蓮府遞相歡送李二十九兄員外赴邠寜使幕家襲韋平身業文素風清白至今貧南宫通籍新郎吏西候從戎舊主人城外草黄秋有雪烽頭煙静虜無塵鼎門為别霜天晚賸把離觴三五巡送分司陳郎祗召直史館重修三聖實録蟬鳴官樹引行車言自成周赴玉除逺取南朝貴公子重修東觀帝王書常時載筆窺金匱暇日登樓到石渠若問舊人劉子政如今頭白在商於送李中丞赴楚州緹騎朱旗入楚城士林皆賀振家聲兒童但喜迎賢守故吏猶應記小名萬頃水田連郭秀四時煙月映淮清憶君初得崑山玉同向揚州攜手行送李庚先輩赴選一家何啻十朱輪諸父雙飛秉大鈞曽脱素衣參幕客却為精舍讀書人離筵洛水侵桮色征路函闗向晚塵今日山公舊賔主知君不負帝城春送廖參謀東遊二首九陌逢君又别離行雲别鶴本無期望嵩樓上忽相見看過花開花落時繁花落盡君辭去緑草垂楊引征路東道諸侯皆故人留連必是多情處送從弟郎中赴浙西并引從弟三復十餘年間凡三為浙右從事往年主公入相薦敭登朝中復從公鎮南未幾而罷昨以尚書外郎奉使至洛旋承新命改轅而東三從公皆在舊地徵諸故事夐無其倫故賦詩贈之以志異也銜命出尚書新恩換使車漢庭無右者梁苑重歸歟又食建業水曽依京口居劉前軍傳云本莒人世家京口共經何限事賔主兩如初劉賔客文集巻二十八欽定四庫全書劉賔客文集巻二十九唐劉禹錫撰
