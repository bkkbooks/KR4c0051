body:
  text: 客有話汴州新政書事寄令狐相公天下咽喉今大寧軍城喜氣徹青冥庭前劒㦸朝迎日筆底文章夜應星三省壁中題姓字萬人頭上見儀形汴州忽復承平事正月看燈户不扃和令狐相公郡齋對紫薇花明麗碧天霞丰茸紫綬花香聞荀令宅艷入孝王家㡬嵗自榮樂髙情方歎嗟有人移上苑猶是占年華令狐相公見示河中楊少尹贈答兼命繼之兩首新詩百字餘朱絃玉磬韻難如漢家丞相重徵後梁苑仁風一變初四面諸侯瞻節制八方通貨溢河渠自従郄縠為元帥大將歸來盡把書和令狐相公謝太原李侍中寄蒲桃珍果出西域移根到北方昔年隨漢使今日寄梁王上相芳緘至行臺綺席張魚鱗含宿潤馬乳帶殘霜染指鉛粉膩滿喉甘露香醖成十日酒味敵五雲漿咀嚼停金盞稱嗟響畫堂慙非末至客不得一枝嘗和令狐相公送趙常盈鍊師與中貴人同拜嶽及天台投龍畢却赴京師銀璫謁者引蜺旌霞帔仙官到赤城白鶴迎來天樂動金龍擲下海神驚元君伏奏歸中禁武帝親齋禮上清何事夷門請詩送梁王文字上聲名令狐相公俯贈篇章斐然仰謝鄂渚臨流别梁園衝雪來旅愁隨凍釋歡意待花開城曉烏頻起池春鴈欲回飲和心自醉何必管絃催詶令狐相公贈别越聲長苦有誰聞老向湘山與楚雲海嶠新辭永嘉守夷門重見信陵君田園松菊今迷路霄漢鴛鴻久絶羣幸遇甘泉尚詞賦不知何客薦雄文酬令狐相公寄賀遷拜之什邅迴二紀重為郎洛下遙分列宿光不見當闗呼早起曽無侍史與焚香三花秀色通春幌十字清波遶宅牆白首青衫誰比數相憐只是有梁王相公昔曽以大僚分司故有同病相憐之句酬令狐相公早秋見寄公來第四秋樂國號無愁軍士遊書肆商人占酒樓熊羆交黒矟賔客滿青油今日文章主梁王不姓劉和令狐相公翫白菊家家菊盡黄梁國獨如霜瑩靜真琪樹分明對玉堂仙人披雪􅌁素女不紅粧粉蝶來難見麻衣拂更香向風搖羽扇含露滴瓊漿髙豔遮銀井繁枝覆象床桂叢慙並發梅蕋妒先芳一入瑤華詠従兹播樂章夏日寄宣武令狐相公長憶梁王逸興多西園花盡興如何近來溽暑侵亭館應覺清談勝綺羅境入篇章髙韻發風穿號令衆心和承明欲謁先相報願拂朝衣逐曉珂令狐相公見示贈竹二十韻仍命繼和髙人必愛竹寄興良有以峻節可臨戎虛心宜得士衆芳信妍媚威鳯難棲止遂於鼙鼓間移植東南美封以梁國土澆之浚泉水得地色不移凌空勢方起新青排故葉餘粉籠疎理猶復隔牆藩何因出塵滓兹辰去前蔽永日勞瞪視槭槭林已成熒熒玉相似親摹起心匠洗滌在頥指曲直既瞭然孤髙何卓爾垂梢覆内屏迸笋侵前戺妓席拂雲鬢賔階廕珠履抱琴恣閒翫執巻堪斜倚露下懸明璫風來韻清徵堅貞貫四候標格殊百卉嵗晚當自知繁華豈云比古詩無贈竹髙唱従此始一聴清瑤音崢然長在耳和令狐相公入潼闗寒光照旌節闗路曉無塵吏謁前丞相山迎舊主人東瞻軍府靜西望􅃯書頻心共黄河水同昇天漢津和令狐相公尋白閣老見留小飲因贈傲士更逢酒樂天仍對花文章管星歴情興占年華宦達飜思退名髙却不誇惟存浩然氣相共賞烟霞酬令狐相公雪中遊𤣥都見憶好雪動髙情心期在玉京人披鶴􅌁出馬踏象筵行照耀樓臺變淋漓松桂清𤣥都留五字使入步虛聲和令狐相公以司空裴相見招南亭看雪四韻重門不下闗樞務有餘閒上客同看雪髙亭盡見山瑞呈霄漢外興入笑言間知是平陽㑹人人帶酒還和令狐相公别牡丹平章宅裏一欄花臨到開時不在家莫道兩京非逺别春明門外即天涯酬令狐留守巡内至集賢院見寄仙院文房隔舊宫當時盛事盡成空墨池半在頽垣下書帶猶生蔓草中巡内因經九重苑裁詩又繼二南風為兄手寫殷勤句遍歴三台各一通和鄆州令狐相公春晚對花朱門退公後髙興對花枝望闕無窮思看書欲盡時含芳朝競發凝艷晚相宜人意殷勤惜狂風豈得知酬令狐相公春日言懐見寄前陪看花處鄰里近王昌今想臨戎地旌旗出汶陽營飛柳絮雪門耀㦸枝霜東望清河水心隨艑上郎和令狐相公言懐寄河中楊少尹章句慙非第一流世間才子暗陪遊呉宫已歎芙蓉死張司業詩云呉宫四面秋江水天清露白芙蓉死邊月空悲蘆管秋李尚書任向洛陽稱傲吏分司白賔客苦教河上領諸侯天平相公石渠甘對圖書老闗外楊公安穏不遙和令狐相公坐中聞思帝鄉有感當初造曲者為誰説得思鄉戀闕時滄海西頭舊丞相停杯處分不須吹酬令狐相公見寄羣玉山頭住四年每聞笙鶴看諸仙何時得把浮丘袖白日將昇第九天途次大梁雪中奉天平令狐相公書問兼示新什因思曩嵗従此拜辭形於短篇以申仰謝逺守宦情薄故人書信來共曽花下别今獨雪中回紙尾得新什眉頭還暫開此時同鴈鶩池上一徘徊令狐相公自天平移鎮太原以詩申賀相公昔為并州從事北都留守將天兵出入香街宿禁扃鼙鼓夜聞驚朔鴈旌旗曉動拂參星孔璋舊檄家家有叔度新歌處處聴夷落遙知真漢相爭來屈膝看儀形重酬前寄邊烽寂寂盡收兵宫樹蒼蒼靜掩扃戎羯歸心如内地天狼無角比凡星新成麗句開緘後便入清歌滿坐聴呉苑晉祠遙望處可憐南北太相形酬令狐相公秋懐見寄寂寞蟬聲靜差池燕羽回秋鄰多越絶朔氣想臺駘相去數千里無因同一杯殷勤望飛鴈新自塞垣來酬令狐相公六言見寄巳嗟離别太逺更被光隂苦催呉苑燕辭人去汾川鴈帶書來愁吟月落猶望憶夢天明未回今日便令歌者唱兄詩送一杯令狐相公自太原累示新詩因以酬寄飛蓬巻盡塞雲寒戰馬閒嘶漢地寛萬里氷天無警急一籠烽火報平安燈前妓樂留賔燕雪後山河出獵看珍重新詩逺相寄風情不似四登壇酬太原令狐相公見寄書信來天外瓊瑤滿匣中衣冠南渡逺旌節北門雄鶴唳華亭月馬嘶榆塞風山川㡬千里惟有兩心同酬令狐相公嵗暮逺懐見寄别侣孤鶴怨沖天威鳯歸容光一以間夢想是耶非芳訊逺彌重知音老更稀不如湖上鴈北向整毛衣酬令狐相公親仁郭家花下即事見寄荀令園林好山公遊賞頻豈無花下侣逺望眼中人斜日漸移影落英紛委塵一吟相思曲惆悵江南春酬令狐相公首夏閒居書懐見寄蕙草芳未歇緑槐隂巳成金罍唯獨酌瑤瑟有離聲翔泳各殊勢篇章空寄情應憐三十載未變使君名貞元中自郎官出守至今三十一年酬令狐相公庭前白菊花謝偶書所懐見寄數叢如雪色一旦冒霜開寒蕋差池落清香斷續來思深含别怨芳謝惜年催千里難同賞看看又早梅酬令狐相公季冬南郊宿齋見寄壇下雪初霽南城凍欲生齋心祠上帝髙步領名卿沐浴含芳澤周旋聴佩聲猶憐廣平守寂寞竟何成貞元中侍郎舅氏牧華州時余再忝科第前後由華覲謁陪登伏毒寺屢焉亦曽賦詩題於梁棟今典馮翊暇日登樓南望三峰浩然生思追想昔年之事因成篇題舊寺曽作闗中客頻經伏毒巖晴烟沙苑樹晚日渭川帆昔是青春貌今悲白雪髯郡樓空一望含意巻髙簾酬令狐相公杏花園下飲有懐見寄年年曲江望花發即經過未飲心先醉臨風思倍多三春看又盡兩地欲如何日望長安道空成勞者歌和令狐相公春早朝回鹽鐵使院中作柳動御溝清威遲堤上行城隅日未過山色雨初晴鶯避傳呼起花臨府署明簿書盈几案要自有髙情令狐相公見示題洋州崔侍郎宅雙木𤓰花頃接侍郎同舍陪宴樹下吟翫來什輒成和章金牛蜀路逺玉樹帝城春榮耀生華館逢迎欠主人簾前疑小雪牆外麗行塵來去皆回首情深是徳鄰和令狐僕射相公題龍回寺兹地回鑾日皇家禪聖時路無胡馬跡人識漢官儀天子旌旗度法王龍象隨知懷去家歎經此益遲遲相公家本咸陽有喬木之思和令狐相公晚泛漢江書懐寄洋州崔侍郎閬州髙舍人二曹長雨過逺山出江澄暮霞生因浮濟川舟遂作適野行郊樹映緹騎水禽避紅旌田夫捐畚鍤織婦窺柴荆古岸夏花發遙林晚蟬清沿洄方翫境鼓角巳登城部内有良牧望中寄深情臨觴念佳期泛瑟動離聲寂寞一病士夙昔接羣英多謝謫仙侣㡬時還玉京酬令狐相公使宅别齋初栽桂樹見懐之作清淮南岸家山樹黒水東邊第一栽影近畫梁迎曉日香隨緑酒入金杯根留本土依江潤葉起寒稜映月開早晚隂成比梧竹九霄還放綵鵬來令狐相公頻示新什早春南望遐想漢中因抒短章以寄情愫軍城臨漢水旌斾起春風逺思見江草歸心看塞鴻野花沿古道新葉映行宫惟有詩兼酒朝朝兩不同酬令狐相公見寄才兼文武播雄名遺愛芳塵滿洛城身在行臺為僕射書來甪里訪先生閒遊占得嵩山色醉臥髙聴洛水聲千里相思難命駕七言詩裏寄深情令狐相公春思見寄一紙書封四句詩芳晨對酒逺相思長吟盡日西南望猶及殘春花落時令狐相公見示新栽蕙蘭二草之什兼命同作上國庭前草移來漢水潯朱門雖易地玉樹有餘隂豔彩凝還泛清香絶復尋光華童子佩柔軟美人心惜晚含逺思賞幽空獨吟寄言知音者一奏風中琴和令狐相公南齋小讌聴阮咸陋巷久蕪沈四絃有遺音雅聲發蘭室逺思含竹林座絶衆賔語庭移芳樹隂飛觴助真氣寂聴無流心影似白團扇調諧朱絃琴一毫不平意幽怨古猶今和令狐相公詠梔子花蜀國花已盡越桃今已開色凝瓊樹倚香似玉京來且賞同心處那憂别葉催佳人如擬詠何必待寒梅酬令狐相公新蟬見寄相去三千里聞蟬同此時清吟曉露葉愁噪夕陽枝忽爾絃斷絶俄聞管參差洛橋碧雲晚西望佳人期和令狐相公九日對黄白二菊花見懷素萼迎寒秀金英帶露香繁華照旄鉞榮盛對銀黄琮璧交輝暎衣裳雜彩章晴雲遙葢覆秋蝶近悠揚空想逢九日何由陪一觴滿叢佳色在未肯委嚴霜城内花園頗曽遊翫令君居守亦有素期適春霜一夕委謝書實以答令狐相公見謔樓下芳園最占春年年結侣採花頻繁霜一夜相撩冶不似佳人似老人令狐僕射與余投分素深縦山川阻峭然音問相繼今年十一月僕射疾不起聞予巳承訃書寝門長慟後日有使者兩輩持書并詩計其日時已是卧疾手筆盈幅翰墨尚新詞一篇音韻彌切收淚握管以成報章雖廣陵之絃於今絶矣而葢泉之感猶庶聞焉焚之繐帳之前附于舊編之末前日寢門慟至今悲有餘巳嗟萬花盡方見八行書滿紙傳相憶裁詩怨索居危絃音有絶哀玉韻由虛忽歎幽明異俄驚嵗月除文章雖不朽精魄竟焉如零淚霑青簡傷心見素車凄凉從此後無復望雙魚劉賔客外集巻三欽定四庫全書劉賔客外集巻四唐劉禹錫撰詩
