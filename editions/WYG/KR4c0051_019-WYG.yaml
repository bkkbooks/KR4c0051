front:
  text: 裴相公賀冊魯王表臣某言伏見制書以今月日冊魯王禮畢皇家有慶寳祚無疆既榮本枝克固盤石伏惟皇帝陛下徳符列聖道冠前王孝敬承兩宫之歡䖍恭奉九廟之祀先崇大禮慶浹天人次念建封事兼家國伏以魯王夙承叡訓特禀天姿爰擇吉辰光膺寵冊既示之以君親之道又錫之以禮義之邦寰海聞風室家相慶臣自嬰疾疹巳歴旬時不獲展禮明庭拜舞稱賀
  hash: sha256:a5ead8bd372e05ef8c9977a798c094a9053a508332bdedc6afb4f1ca4f177805
  markers:
  - {type: page-break, offset: 92, content: '', id: KR4c0051_WYG_015-1b, image: WYG1077/WYG1077-0415b.png}
body:
  text: 裴相公讓官第一表并批荅臣某言臣去冬得疾近日加劇西夕之景豈能久留及其未亂披露誠懇臣犬馬之齒六十有七夀雖不長亦不為短位忝公台近十五年皆由際㑹非以才進常懼官謗以招國刑今被病得死保其始終為幸甚厚豈復咨嗟所恨者遇聖明之君不得佐成太平之化自量氣力忽恐奄然則有微素無階上達伏惟聖慈昭鑒憐而察之伏以三公非曠職之地宰相非卧理之官伏枕之初已有陳乞請罷真食兼辭貴階伏䝉優詔纔遂一事頻降中使慰勉再三專令御醫旦夕診視茍安名器不覺經時主恩則深公議不可伏思陛下臨御之始宰臣四人逮今零落忽已一半臣且危惙餘年㡬何唯易直外鎮獨得無恙竊惟此理權位難居伏乞賜臣停官許在家養疾就閒辭禄或冀有瘳害盈福謙固是神理儻天眷綢厚念以伏事多年臣之所陳未䝉便遂則國朝勲舊以疾辭位者皆得致仕官使其家居足以頤養既有成例著於舊章伏望天恩特賜哀允省表具知夫爵位崇髙以酬勲徳君臣協契諒在始終斯乃前王之令圖有國之彛典也況卿輔相憲祖逮于朕躬履歴四朝夷險一致服事君之大節推濟物之深誠道光朝倫行滿天下倚注之意豈同它人屬朕纂歴御乾興師伐叛騷動累嵗端憂靡遑及河朔載寧郊丘畢事方欲咨詢元老康靖生靈不虞寒暑所侵勤勞遇疾雖國醫診視中使省臨憂屬之誠頃刻在念忽覽章奏退讓官榮雖知止之心則思避寵而謀猷之體斯乃為時寢食之間勉加頥養其所陳乞非朕意焉第二表并批荅臣某言臣所獻章表發於至誠伏奉批荅未䝉允許外負公責内迫私情祈於必遂敢守難奪臣束髮已來號為强力及其晚節亦未甚衰一朝被病遂至緜惙臣自思省得其端倪非因飲食不節無有霧露之犯葢由才微而任重功薄而賞厚竊位既久妨賢則多以積年之過幸致今日之沈疾不能酌損所以生災悟雖巳晚情實非矯伏惟陛下念其委使之久察其危苦之詞特降深恩救臣不逮無冒榮之咎得遂性之宜物議不形病心自泰忍死俟命披肝再陳伏乞聖慈俯賜容納無任迫切懇倒之至省表具知卿勲績崇髙誠節忠藎秉心一徳宣力四朝訏謨緝熈弼予于理勤勞事國啟沃匪躬功格道光常所嘉尚所疾未瘳勉於善養勿藥之喜佇即痊平台衮之司倚卿為重乃累陳退讓殊謂不然宜體朕懷即斷來表第三表并批荅臣某言得疾踰年在假三月再有陳請未䝉允従慮其奄忽銜愧入地伏惟聖慈哀而信之臣聞君之使臣在知其心而聴其言不以容尸禄為恵也臣之事君在無隠情而盡忠節不以受非據為榮也然後上下交感終始可詠臣伏事陛下五年于兹葵藿㣲誠已䝉識察桑榆莫景所冀哀憐豈令危惙之時更懼滿盈之禍雖有藥石安能調和聖日難逢生涯漸短體羸無拜舞之望心在有涕戀之悲臣伏覽國史備見前事太宗朝李靖髙宗朝劉仁軌皆自宰臣乞骸致政其後知猶可用復起于家進退之間曲盡情禮君臣之際良史美談伏望陛下悉臣至誠念臣羸病許遂頥養以保餘年俟其有瘳或冀萬一無任懇款遑迫之至省表具悉謝病之制雖起於昔賢盡瘁之詞亦標於古典況卿有功於國作相累朝自匡輔眇躬又勤勞數載豈可以微疾去位以重望辭榮章疏徒來延遲彌切至如太宗朝許李靖致政髙宗遂仁軌乞骸朕非不知事則有異何者時當明聖在上理道巳成宰臣優游固得自便今則生物尚困庶工未修言念勲賢方深倚注惟此故事恐難遽行卿宜體是誠懐力更頤養必有多福以扶大忠無至確然復陳章表蘇州謝上表臣某言伏奉制書授臣使持節蘇州諸軍事守蘇州刺史始従郎署出領郡章承命若驚省躬増感伏惟皇帝陛下受上𤣥之眷佑揚列聖之耿光大康黎元慎擇牧守徳音每發品物咸蘇臣本書生素無黨援謬以薄伎三登文科徳宗皇帝擢為御史在臺三載例轉省官永貞之初權臣領務遂奏録用葢聞虛名唯守職業實無朋附竟坐飛語貶在遐藩憲宗皇帝後知事情卻授刺史凡歴外任二十餘年伏遇陛下應運重光物無廢滯收拾耆舊塵忝班行既幸逢時常思展效在集賢院四換星霜供進新書二千餘巻儒臣之分甘老於典墳優詔忽臨又委之符竹分憂誠重戀闕滋深石室之書空留筆劄金閨之籍巳去姓名本末可明申雪無路豈意聖慈𢎞納不隔卑微面辭之日特許升殿天顔咫尺臣禮兢惶不敢盡言空懷誠懇謝恩而出生光於九陌之間受訓而行布政於五湖之外臣即以今月六日到任上訖伏以水災之後物力索空臣謹宣皇風慰彼黎庶臣聞有味之物蠧蟲必生有才之人讒言必至事理如此古今同途了然辨之唯在明聖伏惟陛下察臣此言則天下之人無不幸甚江海逺地孤危小臣雖雨露之恩幽遐必被而犬馬之戀親近為榮太和六年二月六日蘇州謝賑賜表臣某言伏奉去年二月十五日敕蘇州宜賜米一十二萬石委刺史據户均給者恩降九天澤流萬姓伏以臣當州去年災沴尤甚水潦雖退流庸尚多臣前月到任奉宣聖㫖闔境老幼無不涕零詢訪里閭備知凋瘵方具事實便欲奏論聖慈憂人照燭幽逺特有賑䘏救其災荒蒼生荷再造之恩儉嵗同有年之慶臣忝為長吏倍萬常情無任感激抃躍之至太和六年三月二十四日蘇州賀冊皇太子表臣某言伏奉制書以今月十日冊皇太子徳音遐布盛禮畢陳國本永安人心同慶伏惟皇帝陛下以繼天之聖有知子之明義兼君親禮重宗祏龍樓肇建展嘉禮於三朝鳳厯延長固本枝於萬葉臣守在遐郡不獲稱慶闕庭無任踴躍屏營之至太和七年八月十七日蘇州賀冊皇太子牋朝議大夫使持節蘇州諸軍事守蘇州刺史上柱國劉某叩頭叩頭伏惟皇太子殿下允膺上嗣光啟東朝蒼震發前星之輝黄離表重輪之瑞位居守器禮重承祧萬國以貞九圍咸説某限以守郡不獲稱慶宫庭無任踴躍屏營之至劉賔客文集巻十五欽定四庫全書劉賔客文集巻十六唐劉禹錫撰表章六
