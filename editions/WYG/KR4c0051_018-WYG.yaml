body:
  text: 謝中使送上表臣某言中使吐突仕曉至奉宣聖㫖慰諭并送臣至本任者深山逺郡忽降王人跪受恩榮仰瞻宸極伏以發自巴峽至于南荒涉水陸湍險之途當炎夏鬱蒸之候山川縈轉晨夜奔馳幸無它疾得至本管九重結戀遙傾捧日之心萬里獲安皆荷自天之祐無任感戴屏營之至賀收蔡州表臣某言伏見詔書以唐州節度使李愬生擒逆賊呉元濟獻俘文武百寮於興安門列班稱賀者天威逺被元惡就誅一方既平萬國咸慶伏惟叡聖文武皇帝陛下徳超䆳古道合上𤣥臨御已來天人協賛削平呉蜀掃蕩塞垣車書大同夷狄來貢蕞爾元濟敢懷野心輒聚犬羊茍偷時月陛下聖謨獨運叡感潛通天助神兵人生勇氣既擒兇逆遂正刑書伏三紀之逋誅成九衢之壯觀宗社昭告華夷式瞻行弔伐而在禮無違烜威聲而何城不克楚氛改色淮水安流漢上疲人盡霑雨露汝南遺老重覩昇平凡在具臣孰不欣抃臣久辭朝列恭守遐藩不獲稱慶闕庭陳露丹慊仰瞻宸極倍萬羣情無任踴躍慶快之至元和十二年十二月二十三日賀赦表臣某言伏奉今月一日制書大赦天下者聖徳廣運浹于華夷天光下臨照彼幽蟄伏惟叡聖文武皇帝陛下神扶寳祚天賛鴻猷意有所之事無不克當淮右凱旋之後是域中慶幸之時順陽和以發生施霈澤於寰海網開三面危疑者許以自新耳達四聰瑕累者期於録用求碩畫於庶位慮遺材於放臣旌忠烈之家賞勲庸之𦙍仁及枯骨無隔於寇戎榮加顯親普霑於存没恤刑已責實廩蠲徭頒錫彰有客之詩崇儒協宗子之望岳瀆咸秩耆艾飲和大僚承任子之恩武旅荷賜金之寵斯皆禹湯文武之遺美髙祖太宗之耿光集于聖朝然後大備徳音所至和氣隨之歡謠上徹於九天福祚永延於億載能使逺夷屈䣛豈惟小醜革心率土人臣不勝大慶臣久辭闕下恪守海隅犬馬之誠倍百常品無任抃躍屏營之至賀赦牋使持節連州諸軍事守連州刺史劉某惶恐叩頭伏見今月一日制書大赦天下者伏以獻嵗布和皇恩逺降乾坤交泰寰海廓清伏惟皇太子殿下道冠元良徳兼忠孝承顔拜慶榮耀古今某職守有限不獲隨例稱賀宫庭無任欣説之至元和十三年正月二十九日賀雪鎮州表臣某言伏見四月二十七日徳音以王承宗效順著明復其官爵所獻二郡别置藩垣聖徳動天鴻恩及物瑕累咸滌蒸黎永安伏惟叡聖文武皇帝陛下自承寶位克振皇綱既以四海為家每念一夫不獲昨因大慶爰降殊私廣宥過之科開自新之路綸言一發神聖潛通遂令迷誤之徒頓釋憂危之慮命𦙍子以入侍獻名都以效誠臣心既明天網為解因析四郡别為一方惟懐永圖盡去前弊大河以北化為禮樂之鄉率土之濵重見昇平之日臣恪居官次遐守嶺隅不獲稱慶闕庭無任踴躍屏營之至賀平淄青表臣某言伏見制㫖魏博節度使所奏逆賊李師道并男二人並梟斬訖以二月十六日御宣政殿受賀者聖徳𤣥運兵威神速旬月之内鯨鯢就誅泰嶽既寧登封有日伏惟叡聖文武皇帝陛下有征必克舉意無違天地協神算之期靁霆助成師之氣蠢爾孽豎敢生野心蕭斧一臨妖氛自滅皆由聖慈廣被叡畧潛通獻俘者盡許生還得地者復令安堵感我仁化激其深衷凡是脅従盡思效節五紀巢穴一朝蕩夷遂使齊魯之鄉復歸仁夀之域捷書既至傳首繼來備文物於明庭告殊勲於清廟百辟陳賀萬方㑹同従此止戈所以為武西周士庶方觀飲至之容東嶽烟雲巳望告成之禮臣恪居逺服嘗忝班行慶快之誠倍萬羣品無任踴躍屏營之至元和十四年三月二十四日夔州謝上表臣某言伏奉某月日制書授臣使持節都督夔州諸軍事守夔州刺史跪受天詔神䰟震驚伏惟文武孝徳皇帝陛下垂衣穆清叡鑑旁達三統交泰百神降祥浹宇華夷盡致仁夀臣家本儒素業在蓺文貞元年中三忝科第徳宗皇帝記其姓名知無黨援擢為御史在臺三載例遷省官權臣奏用分判錢穀竟坐連累貶在遐藩先朝追還方念淹滯又遭讒嫉出牧逺州家禍所鍾沈伏草土禮經有制羸疾僅存甘於畎畝以樂皇化伏遇陛下大明御宇照燭無私念以殘生舉其彛典獲居善部伏感天慈臣即以今月二日到任上訖硤水千里巴山萬重空懐向日之心未有朝天之路無任感恩戀闕之至長慶二年正月五日賀冊皇太子表臣某言伏見制書以十二月二十日冊皇太子盛禮斯畢徳音遐宣萬國以貞庶類咸説伏惟文武孝徳皇帝陛下體元立極垂訓御時既闡王猷思安國本前星位定拱宸極以昭彰蒼震氣宣與天地而長久禮光匕鬯澤被華夷宗祏有無疆之休生靈懐莫大之慶臣恪居官次遐守巴南不獲稱賀闕庭無任踴躍屏營之至長慶三年正月日慰國哀表臣某言上天降禍大行皇帝奄棄萬國奉諱號擗糜潰五情伏惟皇帝陛下孝思至性攀號罔極臣恭守所部不獲陪位西宫伏増感慕之至謹奉表陳慰以聞長慶四年二月日賀龍飛表臣某言伏見詔書正月二十六日皇帝陛下嗣登寳位萬國同歡日月繼明乾坤交泰伏惟皇帝陛下欽承顧命惟懐永圖以大孝奉宗祧以至仁蘇品物洞照寰海統和神人聖祚延長従今無極羣生鼓舞自此大寧臣守遐藩恪居官次不獲奔馳拜舞稱賀闕庭無任抃躍屏營之至長慶四年二月日賀皇太子牋使持節都督夔州刺史劉某叩頭伏惟皇太子殿下祗膺詔冊光啟儲闈展至性於三朝承本枝於百代宗祏永固神人以和四嶽仰維嵩之髙百川承少海之潤某限以職守不獲隨例稱慶宫庭無任抃躍之至賀赦表臣某言伏見今月三日制書大赦天下者大明初昇萬物咸覩渙汗一發神人以和伏惟皇帝陛下天資叡聖神啟昌期端拱受萬國之朝承顔奉兩宫之慶初嗣大位克揚孝心三光協明和氣來應臣伏讀赦令首於奉園陵盡誠敬親九族蘇兆人次及定章程止進獻已逋責滌夙瑕内照于九重則歸嬪嬙放鷹犬外明于四目則求隠士開直聲柔逺以仁則還其係虜賞延以禮則澤及後昆菲食遵夏禹之規弋綈法漢文之儉墜典咸舉舊章再明昇平之期正在今日發號之始疾於春風殊私所及霈若時雨臣幸逢昌運歴事五朝出守遐藩僅垂二紀欣承靁雨作解之澤不勝犬馬戀主之誠瞻望帝鄉無任屏營懇悃之至長慶四年三月二十七日賀冊太皇太后表臣某言伏見制書以二月十八日冊立太皇太后徽章克備慶賜逺行榮冠古今澤周寰海伏惟皇帝陛下纉承列聖歡奉兩宫太皇太后含飴保和重光疊慶漢儀盛於長信周祚興於太任方之聖朝彼有慙徳臣逺守巴峽不獲稱賀闕庭無任抃躍屏營之至長慶四年三月日賀冊皇太后表臣某言伏見制書以二月二十五日冊立皇太后盛禮畢陳徳音逺被一人有慶萬國同歡伏惟皇太后稟靈作合誕聖表祥徽號極域中之尊慈仁為天下之母陛下君臨有國子道無違長樂宮中永獻南山之夀濯龍門上再揚東漢之風率土臣子不勝歡抃臣逺守荒服不獲稱慶闕庭無任踴躍屏營之至和州謝上表臣某言伏奉制書授臣使持節和州諸軍事守和州刺史臣自理巴賨不聞善最恩私忽降慶抃失容伏惟皇帝陛下丕承寶祚光闡鴻猷有漢武天人之姿稟周成叡哲之徳發言合古舉意通神委用得人動植咸説理平之速従古無倫微臣何幸獲覩昌運臣業在詞學蚤嵗策名徳宗尚文擢為御史出入中外歴事五朝累承恩光三換符竹在分憂之寄禄秩非輕而素蓄所長效用無日臣聞一物失所前王軫懷今逢聖朝豈患無位臣即以今月二十六日到所任上訖伏以地在江淮俗參呉楚災旱之後綏撫誠難謹當奉宣皇恩慰彼黎庶久於其道冀使知方伏乞聖慈俯賜昭鑒臣逺守藩服不獲拜舞闕庭無任懇悃屏營之至謹差當州軍事衙官章興奉表陳謝以聞長慶四年十月二十六日賀改元赦表臣某言伏見今月七日制書大赦天下者帝遊出震聖澤如春神人以和天地交泰伏惟皇帝陛下丕承鴻業光闡叡圖吉日展嚴配之儀告天陳太平之盛九廟成禮百神降祥鑾輅旋衡風雲改色殊私廣被再𢎞莫大之恩寳厯惟新更啟無疆之祚兩宫承慶四海永寧率土臣子上千萬夀臣恪居官次不獲稱賀闕庭無任屏營之至謹差當州軍事衙官試慈州吉昌府别將徐倫奉表陳賀以聞寳厯元年二月十六日夔州論利害表臣某言伏準元和十二年四月十八日敕諸州刺史如有利害可言者不限時節任自上表聞奏者臣伏見貞觀中詔許羣臣各上書言利便馬周時一布衣遂因中郎將常何獻策二十餘事太宗深竒之盡行其言擢周為御史至龍朔中壁州刺史鄧𢎞慶進平索看精四字堪為酒令髙宗嘉之亦行其言遷𢎞慶為朗州刺史則知茍有所見雖布衣之賤逺守之微亦可施用況臣蚤受國恩徳宗朝忝為御史逮今歴事四朝頻領藩條當陛下至明之時是微臣竭節之日伏以守在遐郡不敢廣有所陳謹準敇上利害及當州公務各具别狀以聞伏乞聖慈俯賜昭鑒無任感激屏營之至謹差當州軍事衙官守易州安義府别將員外置同正員雲騎尉馮隨謹奉表以聞長慶三年十一月七日論利害表臣某言伏準今年正月五日徳音宜令諸道觀察使刺史各具當處利害附驛以聞者伏惟皇帝陛下叡哲自天纉成列聖善述先志發揚徳音率土人臣不勝慶幸臣䖍奉詔㫖宣示蒸黎伏以華夏不同土宜各異詳求利病謹具奏聞伏乞聖慈俯賜昭鑒臣伏覽國史竊見開元十八年朝集使至京𤣥宗臨軒親問利害時宣州刺史裴耀卿上便宜事論轉輸甚詳竟不行下至二十一年耀卿為京兆尹再以前事奏論方見允納比及三年漕運七百萬石省脚三十餘萬貫當耀卿前見不納必有人非之及後數年方展其效臣僻守逺郡敢望言行祗奉詔書或冀萬一伏惟明主擇之無任懇悃屏營之至長慶四年五月十四日劉賔客文集巻十四欽定四庫全書劉賔客文集巻十五唐劉禹錫撰表章五牋附為
