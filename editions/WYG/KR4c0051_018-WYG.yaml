front:
  text: 竇中丞謝上表羣時在郎州相逢因以見託臣某言伏奉某月日制書授臣容州刺史兼御史中丞充本管經畧招討等使臣發開州日已差某官某乙奉表陳謝伏以道途遐阻水陸縈紆臣以今月某日到本任上訖謹宣聖㫖慰諭逺人臣本書生素無吏術頃因多幸賁自丘園累沐聖慈驟居清貫識昧通變動乖事宜愧無善狀以塞公責伏惟叡聖文武皇帝陛下凝旒穆清洞照寰海推共理之義分寄股肱念蒸人之勤溥霑遐邇察臣前任事實恕臣本性朴愚賜以恩輝拔於廢棄逺辭偏郡重委方隅捧印綬以為榮望闕庭而増戀雖到官之始恵未及人而率下之誠務先克已凡施政教皆稟詔條參以土宜遂其物性可行必守有弊必除使蠻夷生梗之風慕臣子盡忠之道力誠不足心實在兹伏乞聖明俯賜昭鑒無任感戴屏營之至元和八年云云
  hash: sha256:2442a02b7f9caefe3e4d03d6665e6c87f9cfa754755aeedec2a36f28f3d250c3
