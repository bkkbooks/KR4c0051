body:
  text: 同樂天和微之深春二十首同用家花車斜四韻何處深春好春深萬乗家宫門皆映栁輦路盡穿花池色連天漢城形象帝車旌旗暖風裏獵獵向西斜何處深春好春深阿母家瑤池長不夜珠樹正開花橋峻通星渚樓暄近日車層城十二闕相對日西斜何處深春好春深執政家恩光貪捧日貴重不看花玉饌堂交印沙隄柱礙車多門一巳閉直道更無斜何處深春好春深大鎮家前旌光照日後騎蹙成花節院收衙隊毬場簇看車廣筵歌舞散書號夕陽斜何處深春好春深貴戚家櫪嘶無價馬庭發有名花欲進宫人食先薫命婦車晚歸長帶酒冠葢甚傾斜何處深春好春深恩澤家爐添龍腦炷綬結虎頭花賔客珠成履嬰孩錦縛車畫堂簾幕外來去燕飛斜何處深春好春深京兆家人眉新柳葉馬色醉桃花盜息無鳴鼓朝迴自走車能令帝城外不敢逕由斜何處深春好春深刺史家夜闌猶命樂雨甚亦尋花傲客多憑酒新姬苦上車公門吏散後風擺㦸衣斜何處深春好春深羽客家芝田繞舍色杏樹滿山花雲是淮王宅風為列子車古壇操簡處一逕入林斜何處深春好春深小隠家芟庭留野菜撼樹去狂花醉酒一千日貯書三十車推衾従露體不敢有餘斜何處深春好春深富室家唯多貯金帛不擬負鶯花國樂呼聨轡行㕑載滿車歸來看理曲燈下寳釵斜何處深春好春深豪士家多沽味濃酒貴買色深花巳臂鷹隨馬連催妓上車城南踏青處村落逐原斜何處深春好春深貴胄家迎呼偏熟客㨂選最多花飲饌開華幄笙歌出鈿車興酣罇易罄連瀉酒瓶斜何處深春好春深唱第家名傳一紙牓興管九衢花薦聴諸侯樂來隨計吏車杏園抛曲處揮袖向風斜何處深春好春深少婦家能偷新禁曲自剪入時花追逐同遊伴平章貴價車従來不墮馬故遣髻鬟斜何處深春好春深幼女家雙鬟梳頂髻兩面綉裙花粧壊頻臨鏡身輕不占車鞦韆爭次第牽拽綵繩斜何處深春好春深蘭若家當香收百葉養蜜近梨花野逕宜行藥遊人盡駐車菜園籬落短遙見桔橰斜何處深春好春深老宿家小欄圍蕙草髙架引藤花四字香書印三乗壁畫車遲迴聴句偈雙樹晚隂斜何處深春好春深種蒔家分畦十字水接樹兩般花櫛比裁籬槿咿啞轉井車可憐髙處望棊布不曽斜何處深春好春深稚子家爭騎一竿竹偷折四鄰花笑撃羊皮鼓行牽犢頷車中庭貪夜戲不覺玉繩斜刑部白侍郎謝病長告改賔客分司以詩贈别鼎食華軒到眼前拂衣髙坐豈徒然九霄路上辭朝客四皓叢中作少年他日卧龍終得雨今朝放鶴且沖天洛陽舊有衡茆在亦擬抽身伴地仙遙賀白賔客分司初到洛中戲呈馮尹西辭望花去東占洛陽才度嶺無歸思看山不懊來冥鴻何所慕遼鶴乍飛迴洗竹通新逕攜琴上舊臺塵埃長者轍風月故人杯聞道龍門峻還因上客開和留守令狐相公答白賔客蛟龍和風吹樹枝商山逸客出闗時身無拘束起長晚路足交親行自遲官拂象筵終日待私將雞黍㡬人期君來不用飛書報萬户先従紙貴知始聞蟬有懐白賔客去嵗白有聞蟬見寄詩云秪應催我老兼遣報君知之句蟬韻極清切始聞何處悲人含不平意景值欲秋時此嵗方晼晚誰家無别離君言催我老已是去年詩憶樂天尋常相見意殷勤别後思量夢更頻每遇登臨好風景羨他天性少人情樂天寄洛下新詩兼喜微之欲到因以抒懐也松間風未起萬葉不自吟池上月未來清輝同夕隂宫徵不獨運塤箎自相尋一従别樂天詩思日已沈吟君洛中作精絶百錬金乃知孤鶴情月露為知音微之従東來威鳯鳴歸林羨君先相見一豁平生心月夜憶樂天兼寄微之今宵帝城月一望雪相似遙想洛陽城清光正如此知君當此夕亦望鏡湖水展轉相憶心月明千萬里酬鄆州令狐相公官舍言懐見寄兼呈樂天詞人各在一涯居聲味雖同跡自疎佳句傳音多好事尺題稀鴈不便書已通戎畧逢黄石仍占星文耀碧虛聞説朝天在來嵗霸陵春色待來車吟白樂天哭崔兒二篇愴然寄贈吟君苦調我霑纓能使無情盡有情四望車中心未釋千秋亭下賦初成庭梧已有雛棲處池鶴今無子和聲従此期君比瓊樹一枝吹折一枝生答樂天所寄咏懐且適其枯樹之歎衙前有樂饌常精宅内連池酒甚傾自是官髙無狎客不論年長少歡情驪龍含被探珠去老蚌胚還應月生莫羨三春桃與李桂花成實向秋榮白侍郎大尹自河南寄示池北新葺水齋即事招賔十四韻兼命同作公府有髙政新齋池上開再吟佳句後一似畫圖來結搆疎林下寅縁曲岸隈緑波穿户牖碧甃疊瓊瓌幽異當軒滿清光繞砌迴潭心澄晚鏡渠口起晴雷瑤草縁堤種松烟上島栽遊魚驚撥刺浴鷺喜毰毸為客烹林笋因僧採石苔酒缾常不罄書案任成堆簷外青雀舫坐中鸚鵡杯蒲根抽九節蓮萼捧重臺芳訊此時到勝遊何日陪共譏呉太守自占洛陽才赴蘇州酬别樂天呉郡魚書下紫宸長安廏吏送朱輪二南風化承遺愛八咏聲名躡後塵梁氏夫妻為寄客陸家兄弟是州民江城春日追隨處共憶東歸舊主人贈樂天一别舊遊盡相逢俱涕零在人雖晚達於樹似冬青痛飲連宵醉狂吟滿坐聴終期抛印綬共占少㣲星福先寺雪中酬别樂天龍門賔客㑹龍宫東去旌旗駐上東二八笙歌雲幕下三千世界雪花中離堂未暗排紅燭别曲含凄颺曉風才子従今一分散便將詩咏向呉儂醉答樂天洛城洛城何日歸故人故人今轉稀莫嗟雪裏暫時别終擬雲間相逐飛和樂天耳順吟兼寄敦詩吟君新什慰蹉􅋸屈指同登耳順科鄧禹功成三紀事孔融書就八年多巳經將相誰能爾抛却丞郎爭奈何獨恨長洲數千里且隨魚鳥泛烟波到郡未浹日登西樓見樂天題詩因即事以寄樂天自此郡謝病西歸湖上收宿雨城中無盡塵樓依新柳貴池帶亂苔春雲水正一望簿書來繞身烟波洞庭路愧彼扁舟人早夏郡中書事水禽渡殘月飛雨灑髙城華堂封嘉樹簾廡含曉清拂鏡整危冠振衣步前楹將吏儼成列簿書紛來縈言下辨曲直筆端破交爭虛懷詢病苦懐律操剽輕閽吏告無事歸來解簪纓高簾覆朱閣忽坐聞調笙虎丘寺見元相公二年前題名愴然有詠前年滻橋送之武昌滻水送君君不還見君題字虎丘山因知早貴兼才子不得多時在世間寄贈小樊花面了頭十三四春來綽約向人時終須買取名春草處處將來步步隨憶春草憶春草處處多情洛陽道金谷園中見日遲銅駝陌上迎風早河南大尹頻出難只得池塘十步看府門閉後滿街月㡬處遊人草頭歇館娃宫外姑蘇臺鬱鬱芊芊撥不開無風自偃君知否西子裙裾曽拂來樂天寄憶舊遊因作報白君以答報白君别來已渡江南春江南春色何處好燕子雙飛故官道春城三百七十橋夾岸朱樓隔柳條了頭小兒蕩畫槳長袂女郎簪翠翹郡齋北軒巻羅幕碧池逶迤遶畫閣池邊緑竹桃李花花下舞筵鋪彩霞呉娃足情言語黠越客有酒巾冠斜坐中皆言白太守不負風光向杯酒酒酣襞牋飛逸韻至今傳在人人口報白君相思空望嵩丘雲其奈錢塘蘇小小憶君淚㸃石榴裙白君在城近自洛歸錢塘和白侍郎送令狐相公鎮太原十萬天兵貂錦衣晉城風日斗生輝行臺僕射深恩重從事中郎舊路歸疊鼓蹙成汾水浪閃旗驚斷塞鴻飛邊庭自此無烽火擁節還來坐翠微秋夕不寐寄樂天洞户夜簾巻華堂秋簟清螢飛過池影蛩思遶階聲老枕知將雨髙窻報欲明何人諳此景逺問白先生冬日晨興寄樂天庭樹曉禽動郡樓殘㸃聲燈挑紅燼落酒暖白光生髮少嫌梳利顔衰恨鏡明獨吟誰應和須寄洛陽城酬樂天見寄元君後輩先零落崔相同年不少留華屋坐來能㡬日夜臺歸去便千秋背時猶自居三品三川呉郎品同得老終須卜一丘投老之日願樂天為鄰若使吾徒還早達亦應簫鼓入松楸答樂天見憶興老無期約到來如等閒偏傷朋友盡移興子孫間筆底心無毒盃前膽不呼闗反唯遺憶君夢飛過武牢闗和樂天誚失婢牓者把鏡朝猶在添香夜不歸鴛鴦拂瓦去鸚鵡透籠飛不逐張公子即隨劉武威新知正相樂従此脱青衣樂天寄重和晚達冬青一篇因成再答風雲變化饒年少光景蹉跎屬老夫秋隼自能凌汗漫寒龜飲氣受泥塗東隅有失誰能免北叟之言豈便無振臂猶堪一呼擲爭知掌下不成盧河南白尹有喜崔賔客歸洛兼見懷長句因而繼和㡬年侍従作名臣却向青雲索得身朝士忽為方外士主人仍是眼中人雙鸞遊處天京好五馬行時海嶠春遙羨光隂不虛擲肯令絲竹暫生塵和楊師臯給事傷小姬英英見學胡琴見藝成今朝追想㡬傷情撚絃花下呈新曲放撥燈前謝改名但是好花皆易落従來尤物不長生鸞臺夜直衣衾冷雲雨無因入禁城和樂天洛下醉吟寄太原令狐相公兼見懷長句舊相臨戎非稱意詞人作尹本多情従容自使邊塵靜談笑不聞桴鼓聲章句新添塞下曲風流舊占洛陽城昨來亦有呉趨詠惟寄東都與北京郡齋書懷寄江南白尹兼簡分司崔賔客謾讀圖書三十車年年為郡老天涯一生不得文章力百口空為飽煖家綺季衣冠稱鬢面呉公政事副詞華還思謝病今歸去同醉城東桃李花詶樂天七月一日夜即事見寄夜樹風韻清天河雲彩輕故花多露草隔城聞鶴鳴搖落従此始别離含逺情聞君當是夕倚瑟吟商聲外物豈不足中懷向誰傾秋來念歸去同聴嵩陽笙題于家公主舊宅樹滿荒臺葉滿池簫聲一絶草蟲悲鄰家猶學宫人髻園客爭偷御菓枝馬埒蓬蒿蔵狡兔鳯棲烟雨笑愁鴟何郎獨在無恩澤不似當初傅粉時吟樂天自問愴然有作親友闗心皆不見風光滿眼倍傷神洛陽城裏多池館㡬處花開有主人八月十五日夜半雲開然後翫月因詩一時之景兼呈樂天半夜碧雲收中天素月流開城邀好客置酒賞新秋影透衣香潤光凝歌黛愁斜輝猶可翫移宴上西樓秋日書懷寄白賔客州逺雄無益年髙健亦衰興情逢酒在筋力上樓知蟬噪芳意盡鴈來愁望時商山紫芝客應不向愁悲詶樂天見貽賀金紫之什久學文章含白鳯却因政事賜金魚郡人未識聞謠詠天子知名與詔書珍重和詩呈錦繡願言歸計並園廬舊來詞客多無位金紫同遊誰得如詶樂天初冬早寒見寄乍起衣猶冷微吟帽半敧霜凝南至瓦雞唱後園枝洛水碧雲曉呉宫黄葉時兩傳千里意書札不如詩樂天見示傷微之敦詩晦叔三君子皆有深分因成是詩以寄吟君歎逝雙絶句使我傷懐奏短歌世上空驚故人少集中惟覺祭文多芳林新葉催陳葉流水前波讓後波萬古到今同此恨聞琴淚盡欲如何春池泛舟聨句鳯池新雨後池上好風光上相公禹錫取酒愁春盡留賔喜日長度送户部柳絲迎畫舸水鏡寫雕梁羣送賈院長潭洞迷仙府烟霞認醉鄉餗送張司業鶯聲隨雨語行色入壺觴籍送主客晚景含澄澈時芳得艷陽禹錫飛鳬拂輕浪緑柳暗回塘度逸韻追安石髙居勝辟疆羣杯停新令舉詩動綵牋忙餗顧謂同來客歡遊不可忘籍杏園聨句杏園千樹欲隨風一醉同人此暫同羣上司空老態忽忘絲管裏衰顔宜解酒杯中絳上白二十二曲江日暮殘紅在翰苑年深舊事空居易上主客二十四年流落者故人相引到花叢禹錫花下醉中聨句共醉風光地花飛落酒杯絳送劉二十八殘春猶可賞晚景莫相催禹錫送白侍郎酒幸年年有花應嵗嵗開居易送兵部相公且當金韻擲莫遣玉山頽絳送庾閣長髙㑹彌堪惜良時不易陪承宣送主客誰能拉花住爭換得春回禹錫送吏部我輩尋常有佳人早晚來嗣復送兵部寄言三相府欲散且裵回居易時户部相公同㑹宴興慶池亭送白二十二東歸聨句東洛言歸去西園告别來白頭青眼客池上手中杯度離瑟殷勤奏仙舟委曲回征輪今欲動賔閣為誰開禹錫坐弄瑠璃水行登緑縟堆花低粧炤影萍散酒吹醅居易岸䕃新抽竹亭香欲變梅隨遊多笑傲遇勝且裵􅏆籍澄澈連天鏡潺湲出地雷林塘難共賞鞍馬莫相催度信及魚還樂機忘鳥不猜晚晴槐起露新暑石添苔禹錫擬作雲泥别尤思頃刻陪歌停珠貫斷飲罷玉峯頽居易雖有逍遙志其如磊落才㑹當重入用此去肯悠哉籍西池送白二十二東歸兼寄令狐相公聨句促坐宴回塘送君歸洛陽彼都留上宰為我説中腸度威鳯池邊别冥鴻天際翔披雲見居守望日拜封章禹錫春盡年華少舟通景氣長送行歡共惜寄逺意難忘籍東道瞻軒蓋西園醉羽觴謝公深眷眄商皓信輝光行武舊徳推三友新篇代八行缺首夏猶清和聨句記得謝家詩清和即此時居易餘花數種在宻葉㡬重垂度芳謝人人惜隂成處處宜禹錫水萍爭㸃綴梁燕共追隨行武亂蝶憐疎蕋殘鶯戀好枝籍草香殊未歇雲勢漸多竒居易單服初寧體新篁已出籬度與春為别近覺日轉行遲禹錫遶樹風光少侵階苔蘚滋行武惟思奉歡樂長得在西池籍薔薇花聨句似錦如霞色連春接夏開禹錫波紅分影入風好帶香來度得地依東閣當階奉上台行武淺深皆有態次第暗相催禹錫滿地愁英落縁堤惜棹迴度芳濃濡雨露明麗隔塵埃行武似著燕脂染如經巧婦裁居易奈花無别計只有酒殘杯籍西池洛泉聨句東閣聴泉落能令野興多行武散時猶帶沫淙處即跳波度徧洗磷磷石還驚泛泛鵞籍色清塵不染光白月相和居易噴雪縈絲竹攅珠濺芰荷禹錫對吟時合響觸樹更搖柯籍照圃紅分藥侵堦緑浸莎居易日斜車馬散餘韻逐鳴珂禹錫和樂天柘枝柘枝本出楚王家玉面添嬌舞態奢鬆鬢改梳鸞鳯髻新衫别織鬭雞紗鼓催殘拍腰身軟汗透羅衣雨㸃花畫席曲終辭别去便隨王母上烟霞和樂天題真娘墓薝蔔林中黄土堆羅襦繡黛巳成灰芳䰟雖死人不怕蔓草逢春花自開幡蓋向風疑舞袖鏡燈臨曉似粧臺呉王嬌女墳相近一片行雲應往來劉賔客外集巻二欽定四庫全書劉賔客外集巻三唐劉禹錫撰詩
