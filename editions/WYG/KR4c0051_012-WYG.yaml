body:
  text: 辯迹論客有能通本朝之雅故者曰時之汚崇視輔臣之用否房與杜迹何觀焉建官取士之制地征口賦之令禮樂刑法之章因隋而已矣二公奚施為余愀然曰三王之道猶夫循環非必變焉審所當救而已隋之過豈制置名數之間邪顧名與事乖耳因之何害焉夫上材之道非務所舉必的然可使户曉為迹也吾觀梁公之迹章章如懸㝢矣曷然哉請借一以明之史不云乎初太宗怒渾戎之横于塞也度諸將不足以必取當宁而歎曰得李靖為帥快哉靖時告老且病矣梁公虛其心以起之靖忘老與病一舉虜其君郡縣其地而還夫非伐國之難能起靖之難能也靖非不克之為慮居功之為慮也古之為將度柄輕不足以遂事重則嫌生焉是以有辭第以見志有多産以取信有子質以滅貳有嬖監以虞謗其多患也如是若靖者名既成位既崇重失畏偪其患又甚焉㣲梁公之能盡材能捍患能去忌能照私彼姑藉舊勞居素貴足矣惡乎起哉夫豈感空言而起邪心相見久矣夫豈飾小信而要邪道相籠久矣其後敬𤣥擅能失材臣而敗隨之林甫自便進蕃將而亂隨之由是而言固相萬矣子方規規然窺上材以户曉之迹此吾之所不取也若杜萊公者在相位日淺將史失其傳然以梁公之鑒裁自天策府遂以王佐材許之則是又能以道籠房公者矣房之許與迹孰甚焉客無以應而作子劉子曰觀書者當觀其意慕賢者當慕其心循迹而求雖博寡要信矣明贄論古之人動必有以將意故贄之道自天子達焉夫芬芳在上臭達于下而温粹無擇有似乎聖人者鬯也故用於天子清越而瑕不自揜潔白而物莫能汚内堅剛而外温潤有似乎君子者玉也故用乎諸侯執之不鳴刑之不嘷似死義乳必能跪似知禮者羔也故卿執焉在人之上而有先後行列者鴈也故大夫執焉耿介而一志者雉也故士執焉視其所執而知其任是故食愈重而志愈卑位彌尊而道彌廣耿介之志唯士得以行之何也務細而所試者寡齒卑而所蔽者衆言未足以動聴故必激發以取異行未足以應逺故必砥礪以沽聞借令由士為大夫捨雉而執鴈其志也隨之故耿介之名不施於大夫矣況其上乎然則為士也不思雉之介為卿也能思羔之禮歟今夫或者不明分推理而觀之則曰此居下而嗜直者是必得志而稔其訐矣彼當介而務𢎞者是必處髙而肥其徳矣曽不知訐當其分則地易而自遷𢎞非其所則志逺而無制矣於戲責士以卿大夫之善猶諭君以士之行耳子以執贄之道得其分茍推分明矣求刑賞之潛濫得乎華佗論史稱華佗以恃能厭事為曹公所怒荀文若請曰佗術實工人命繫焉宜議能以宥曹公曰憂天下無此鼠輩邪遂考竟佗至蒼舒病且死見賢徧反醫不能生始有悔之之歎嗟乎以操之明畧見㡬然猶輕殺材能如是文若之智力地望以的然之理攻之然猶不能返其恚執柄者之恚真可畏諸亦可慎諸原夫史氏之書于冊也是使後之人寛能者之刑納賢者之諭而懲暴者之輕殺故自恃能至有悔悉書焉後之惑者復用是為口實悲哉夫賢能不能無過茍寘于理矣或必有寛之之請彼壬人皆曰憂天下無材邪曽不知悔之日方痛材之不可多也或必有惜之之歎彼壬人皆曰譬彼死矣將若何曽不知悔之日方痛生之不可再也可不謂大哀乎夫以佗之不宜殺昭昭然不足言也獨病夫史書之義是將推此而廣耳吾觀自曹魏以來執死生之柄者用一恚而殺材能衆矣又烏用書佗之事為嗚呼前事之不忘期有勸且懲也而暴者復藉口以快意孫權則曰曹孟徳殺孔文舉矣孤於虞翻何如而孔融亦以應泰山殺孝亷自譬仲謀近霸者文舉有髙名猶以可懲為故事矧它人哉附柳宗元天説韓愈謂柳子曰若知天之説乎吾為子言天之説今夫人有疾痛倦辱飢寒甚者因仰而呼天曰殘民者昌佑民者殃又仰而呼天曰何為使至此極戾也若是者舉不能知天夫果蓏飲食既壊蟲生之人之血氣敗逆壅底為廱瘍疣贅瘻痔蟲生之木朽而蝎中草腐而螢飛是豈不以壊而後出邪物壊蟲由之生元氣隂陽之壊人由之生蟲之生而物益壊食齧之攻穴之蟲之禍物也滋甚其能去之者有功於物者也蕃而息之者物之讎也人之壊元氣隂陽也亦滋甚墾原田伐山林鑿泉以井飲窾墓以送死而又穴為堰溲築為牆垣城郭臺榭觀游疏為川瀆溝洫陂池燧木以燔革金以鎔陶甄琢磨悴然使天地萬物不得其情倖倖衝衝攻殘敗撓而未嘗息其為禍元氣隂陽也不甚於蟲之所為乎吾意有能殘斯人使日薄嵗削禍元氣隂陽者滋少是則有功於天地者也蕃而息之者天地之讎也今夫人舉不能知天故為是呼且怨也吾意天聞其呼且怨則有功者受賞必大矣其禍焉者受罰亦大矣子以吾言為何如柳子曰子誠有激而為是邪則信辯且美矣吾能終其説彼上而𤣥者世謂之天下而黄者世謂之地渾然而中處者世謂之元氣寒而暑者世謂之隂陽是雖大無異果蓏廱痔草木也假而有能去其攻穴者是物也其能有報乎蕃而息之者其能有怒乎天地大果蓏也元氣大癰痔也隂陽大草木也其烏能賞功而罰禍乎功者自功禍者自禍欲望其賞罰者大謬呼而怨欲望其哀且仁者愈大謬子而信子之仁義以遊其内生而死爾烏置存亡得喪於果蓏廱痔草木邪天論上世之言天者二道焉拘於昭昭者則曰天與人實影響禍必以罪降福必以善來窮阨而呼必可聞隠痛而祈必可荅如有物的然以宰者故隂隲之說勝焉泥於冥㝠者則曰天與人實剌音辢異霆震于畜木未嘗在罪春滋乎堇荼未嘗擇善跖蹻焉而遂孔顔焉而厄是茫乎無有宰者故自然之説勝焉余之友河東解人栁子厚作天説以折韓退之之言文信美矣蓋有激而云非所以盡天人之際故余作天論以極其辯云大凡入形器者皆有能有不能天有形之大者也人動物之尤者也天之能人固不能也人之能天亦有所不能也故余曰天與人交相勝耳其說曰天之道在生植其用在强弱人之道在法制其用在是非陽而阜生隂而肅殺水火傷物木堅金利壯而武健老而耗眊氣雄相君力雄相長天之能也陽而蓺樹隂而揫斂防害用濡禁焚用光斬材窾堅液礦硎鋩義制强訐禮分長幼右賢尚功建極閑邪人之能也人能勝乎天者法也法大行則是為公是非為公非天下之人蹈道必賞違之必罰當其賞雖三旌之貴萬鍾之録處之咸曰宜何也為善而然也當其罰雖族屬之夷刀鋸之慘處之咸曰宜何也為惡而然也故其人曰天何預乃事邪唯告䖍報本肆類授時之禮曰天而已矣福兮可以善取禍兮可以惡召奚預乎天邪法小弛則是非駮賞不必盡善罰不必盡惡或賢而尊顯時以不肖參焉或過而僇辱時以不辜參焉故其人曰彼宜然而信然理也彼不當然而固然豈理邪天也福或可以詐取而禍亦可以茍免人道駮故天命之説亦駮焉法大弛則是非易位賞恒在佞而罰恒在直義不足以制其强刑不足以勝其非人之能勝天之具盡喪矣夫實已喪而名徒存彼昧者方挈挈然提無實之名欲抗乎言天者斯數窮矣故曰天之所能者生萬物也人之所能者治萬物也法大行則其人曰天何預人邪我蹈道而已法大弛則其人曰道竟何為邪任人而已法小弛則天人之論駮焉今以一已之窮通而欲質天之有無惑矣余曰天恒執其所能以臨乎下非有預乎治亂云爾人恒執其所能以仰乎天非有預於寒暑云爾生乎治者人道明咸知其所自故徳與怨不歸乎天生乎亂者人道昧不可知故由人者舉歸乎天非天預乎人爾天論中或曰子之言天與人交相勝其理㣲庸使户曉盍取諸譬焉劉子曰若知旅乎夫旅者羣適乎莽蒼求休乎茂木飲乎水泉必强有力者先焉否則雖聖且賢莫能競也斯非天勝乎羣次乎邑郛求䕃于華榱飽于餼牢必聖且賢者先焉否則强有力莫能競也斯非人勝乎茍道乎虞芮雖莽蒼猶郛邑然茍由乎匡宋雖郛邑猶莽蒼然是一日之途天與人交相勝矣吾固曰是非存焉雖在野人理勝也是非亡焉雖在邦天理勝也然則天非預勝乎人者也何哉人不宰則歸乎天也人誠務勝乎天者也何哉天無私故人可務乎勝也吾於一日之途而明乎天人取諸近也已或者曰若是則天之不相乎人已信矣古之人曷引天為荅曰若知操舟乎夫舟行乎濰淄伊洛者疾徐存乎天次舍存乎人風之怒號不能鼓為濤也流之泝洄不能峭為魁也適有迅而安亦人也適有覆而膠亦人也舟中之人未嘗有言天者何哉理明故也彼行乎江河淮海者疾徐不可得而知也次舍不可得而必也鳴條之風可以沃日車盖之雲可以見怪恬然濟亦天也黯然沈亦天也阽危而僅存亦天也舟中之人未嘗有言人者何哉理昧故也問者曰吾見其駢焉而濟者風水等耳而有沈有不沈非天曷司歟荅曰水與舟二物也夫物之合并必有數存乎其間焉數存然後勢形乎其間焉一以沈一以濟適當其數乗其勢耳彼勢之附乎物而生猶影響也本乎徐者其勢緩故人得以曉也本乎疾者其勢遽故難得以曉也彼江海之覆猶伊淄之覆也勢有疾徐故有不曉耳問者曰子之言數存而勢生非天也天果狹於勢邪荅曰天形恒圓而色恒青周回可以度得晝夜可以表候非數之存乎恒髙而不卑恒動而不已非勢之乗乎今夫蒼蒼然者一受其形于髙大而不能自還於卑小一乗其氣于動用而不能自休於俄頃又惡能逃乎數而越乎勢邪吾固曰萬物之所以為無窮者交相勝而已矣還相用而已矣天與人萬物之尤者耳問者曰天果以有形而不能逃乎數彼無形者子安所寓其數邪荅曰若所謂無形者非空乎空者形之希㣲者也為體也不妨乎物而為用也恒資乎有必依於物而後形焉今為室廬而髙厚之形蔵乎内也為器用而規矩之形起乎内也音之作也有大小而響不能踰表之立也有曲直而影不能踰非空之數歟夫目之視非能有光也必因乎日月火炎而後光存焉所謂晦而幽者目有所不能燭耳彼狸狌犬鼠之目庸謂晦為幽邪吾固曰以目而視得形之粗者也以智而視得形之㣲者也烏有天地之内有無形者邪古所謂無形葢無常形耳必因物而後見耳烏能逃乎數邪天論下或曰古之言天之歴象有宣夜渾天周髀之書言天之髙逺卓詭有鄒子今子之言有自乎荅曰吾非斯人之徒也大凡入乎數者由小而推大必合由人而推天亦合以理揆之萬物一貫也今夫人之有顔目耳鼻齒毛頥口百骸之粹美者也然而其本在乎腎腸心腹天之有三光懸㝢萬象之神明者也然而其本在乎山川五行濁為清母重為輕始兩位既儀還相為庸噓為雨露噫為雷風乗氣而生羣分彚從植類曰生按尚書傳云海隅蒼生謂草木也動類曰蟲倮蟲之長為智最大能執人理與天交勝用天之利立人之紀紀綱或壊復歸其始堯舜之書首曰稽古不曰稽天幽厲之詩首曰上帝不言人事在舜之庭元凱舉焉曰舜用之不曰天授在殷中宗襲亂而興心知説賢乃曰帝賚堯民之餘難以神誣商俗已訛引天而敺由是而言天預人乎劉賔客文集巻五欽定四庫全書劉賔客文集巻六唐劉禹錫撰論中因論七篇劉子閒居作因論或問其㫖曷歸歟對曰因之為言有所自也夫造端乎無形垂訓於至當其立言之徒放詞乎無方措㫖於至適其寓言之徒䝉之智不逮于是造形而有感因感而有詞匪立匪寓以因為目因論之㫖也云爾鑒藥訊甿嘆牛儆舟原力説驥述病鑒藥劉子閒居有負薪之憂食精良弗知其㫖血氣交沴煬然焚如客有謂予子病病積日矣乃今我里有方士淪跡於醫厲者造焉而美肥輒者造焉而善馳矧常病也將子詣諸予然之之醫所切脈觀色聆聲參合而後言曰子之病其興居之節舛衣食之齊去聲乖所由致也今夫蔵鮮能安榖府鮮能母氣徒為美疹之囊槖耳我能攻之乃出藥一丸可兼方寸以授予曰服是足以瀹昏煩而鉏藴結銷蠱慝而歸耗氣然中有毒須其疾瘳而止過當則傷和是以㣲其齊也予受藥以餌過信而膇能輕痺能和涉旬而苛癢絶焉抑搔罷焉踰月而視分纎聴察㣲蹈危如平嗜糲如精或聞而慶予且鬨言曰子之獲是藥㡬神乎誠難遭已顧醫之態多嗇術以自貴遺患以要財盍重求之所至益深矣予昧者也泥通方而狃既效猜至誠而惑勦説卒行其言逮再餌半旬厥毒果肆岑岑周體如痁作焉悟而走諸醫醫大吒曰吾固知夫子未達也促和蠲毒者投之濵於殆而有喜異日進和藥乃復初劉子慨然曰善哉醫乎用毒以攻疹用和以安神易則兩躓明矣茍循往以御變昧於節宣奚獨吾儕小人理身之弊而已訊甿劉子如京師過徐之右鄙其道旁午有甿増増扶班白挈羈角齎生器荷農用摩肩而西僕夫告予曰斯宋人梁人亳人潁人之逋者今復矣予愕而訊云予聞隴西公畼轂之止方踰月矣今爾曹之来也欣欣然似恐後者其聞有勞倈之簿歟蠲復之條歟振贍之格歟碩䑕亡歟瘈狗逐歟曰皆未聞也且夫浚都吾政之上游也自巨盜間釁而武臣顓焉牧守由將校以授皆虎而冠子男由胥徒以出皆鶴而軒故其上也子視卒而芥視民其下也鷙其理而蛑其賦民弗堪命是軼于它土然咸重􅁶也非阽危擠壑不能違之曩者雖歸歟成謡而故態相沿莫我敢復今聞吾帥故為丞相也能清静畫一必能以仁蘇我矣其佐嘗宰京邑也能誅鉏豪右必能以法衞我矣奉斯二必而來歸惡待事實之及也予因浩歎曰行積於彼而化行於此實未至而聲先馳聲之感人若是之􅄩歟然而民知至至矣政在終終也嘗試論聲實之先後曰民黠政頗須理而後勸斯實先聲後也民離政亂須感而後化斯聲先實後也立實以致聲則難在經始由聲以循實則難在克終操其柄者能審是理俾先後終始之不失斯誘民孔易也歎牛劉子行其野有叟牽跛牛于蹊偶問焉何形之瑰歟何足之病歟今觳觫然將安之歟叟攬縻而對云瑰其形飯之至也病其足役之過也請為君畢詞焉我僦車以自給嘗驅是牛引千鈞北登太行南並商嶺掣以回之叱以聳之雖涉淖躋髙轂如蓬而輈不僨及今廢矣顧其足雖傷而膚尚腯以畜豢之則無用以庖視之則有贏伊禁焉莫敢尸也甫聞邦君饗士卜剛日矣是往也當要平聲售於宰夫余尸之曰以叟言之則利以牛言之則悲若之何予方窶且無長物願解裘以贖將置諸豐草之鄉可乎叟囅然而咍曰我之沽是屈指計其直可以持醪而齧肥飴子而衣妻若是之逸也奚事裘為且昔之厚其生非愛之也利其力今之致其死非惡之也利其財子惡乎落吾事劉子度是叟不可用詞屈乃以杖叩牛角而嘆曰所求盡矣所利移矣是以員能霸呉屬鏤賜斯既帝秦五刑具長平威振杜郵死陔下敵擒鍾室誅皆用盡身賤功成禍歸可不悲哉可不悲哉嗚呼執不匱之用而應夫無方使時宜之莫吾害也茍拘於形器用極則憂明已儆舟劉子浮于汴涉淮而東亦既釋紼纚榜人告予曰方今湍悍而舟盬宜謹其具以虞焉予聞言若厲繇是袽以窒之灰以墐之􅆽以乾之僕怠而躬行夕惕而晝勤景霾晶而莫進風異響而遄止兢兢然累辰是用獲濟偃檣弭櫂次于淮隂於是舟之工咸沛然自暇自逸或遊肆而觴矣或拊橋而歌矣隸也休役以尚寢矣吾曹無虞以宴息矣逮夜分而􅑆隟潛㴻渙然隂隤至乎淹簀濡薦方卒愕傳呼跣跳登墟僅以身脱目未及瞬而樓傾軸墊抵于泥沙力莫能支也劉子缺然自視而言曰曏予兢惕也汩洪漣而無害今予晏安也蹈常流而致危畏之途果無常所哉不生於所畏而生於所易也是以越子䣛行呉君忽晉宣尸居魏臣怠白公厲劍子西哂李園養士春申易至于覆國夷族可不儆哉嗚呼禍福之胚胎也其動甚㣲倚伏之矛楯也其理甚明困而後儆斯弗及已原力劉子于邁舟次泗濵維䋏邇之于傳傳吏適傳呼曰乗驛者方來誰何之則曰力人也雅以力聞於呉楚間中貴人器之謂宜為爪士獻言于上有㫖趣如京師頃其至則仡焉五輩咸碩其體毅其容動睛煜如曳趾岌如顧瞻遲回飲啜有聲泗濵守伾由將授也説而勞之饗以太牢飲以百壺酒酣氣振求試自矜傍如無人中若有馮有盪舟如沿者抉鼎如飛者綯鍵如麻者開兩弧而脈不僨者屣巨石而􅒥如流者異哉果以力駭世而聞于上也異日話於儒家者流有客悱然自奮曰斯誠力矣上之不過誇胡人而戲角抵次之不過倅期門而振袀服我之力異然以道用之可以格三苖而賔左衽以威用之可以係六驘而㫁右臂由是而言彼力也長雄於匹夫然猶驛其騑餼其食我力也無敵於天下亦當蒲其輪鶴其書矣予詰之曰彼之力用於形者也子之力用於心者也形近而易見心逺而難明理乎而言則子之力大矣時乎而言則彼之力大矣且夫小大迭用曷常哉彼固有小矣子固有大矣予所不能齊也客於邑垂涕洟劉子解之曰屠羊於肆適味於衆口也攻玉于山俟知於獨見也貪日得則鼓刀利要嵗計而韞櫝多客聞之破涕曰吾方俟多於嵗計也嵗歟嵗歟其我與歟説驥伯氏佐戎于朔陲獲良馬以遺予予不知其良也秣之稊秕飲之汚池廐櫪也上痺而下蒸羈絡也綴索而續韋其易之如此予方病且窶求沽于肆肆之駔亦不知其良也評其價六十緡將劑矣有裴氏子贏其二以求之謂善價也卒與裴氏裴所善李生雅挾相術於馬也尤工覩之周體眙然視欣然笑既而抃隨之且曰久矣吾之不覯於是也是何柔心勁骨竒精妍態宛如鏘如煜如翔如之備邪今夫馬之徳也全矣顧其維駒蔵鋭于内且秣之乖方是用不説乎常目須其齒備而氣振平聲則衆美灼見上可以獻帝閑次可以鬻千金裴也聞言竦焉遂儆其僕蠲其皂筐其惡蜃其溲􅀈以美薦秣以薌粒起之居之澡之挋音震之無分隂之怠斯以馬養養馬之至分也居無何果以驥徳聞客有唁予以喪其寳且譏其所貿也㣲予灑然曰始予有是馬也予常馬畜之今予易是馬也彼寳馬畜之寳與常在所遇耳且夫昔之翹陸也謂將蹄將齧抵以檛䇿不知其籋雲耳昔之噓呼也謂為疵為癘投以藥石不知其噴玉耳夫如是則雖曠日歴月將頓踣是以曽何寳之有焉繇是而言方之於士則八十其緍也不猶踰於五羖皮乎客謖而竦予遂言曰馬之徳也存乎形者也可以目取然猶為之若此矧徳藴于心者乎斯從古之數予不敢歎述病劉子嘗涉暑而征熱攻于腠以致病其僕也告痛亦莫能興逮浹日予有瘳醫診之曰疾幸間矣顧熱沴而未平有遺類焉宜謹於攝衞衞之乖方則病復矣所苦既㣲而怠其説倦眠于衾而興焉倦隠于几而步焉面不能罷頮髪不能捐櫛口不能忘味心不能無思如是未移日而疾也瘮疎錦反如復癏于躬進藥求汗凡三渙然後目能視視既分則嚮時之僕已睨然執桮圏侍予于前矣予訝而曰曩吾與若也病偕呻也謼也若酷而吾㣲藥也餌也吾殷而若薄何患之同而痊之異哉僕諄諄而荅云已之被病也兀然而無知有問也亦兀然而無知髪蓬如而忘乎亂面黔如而忘乎垢洎疾之殺也雖飲食是念無滑甘之思日致復初亦不知也予喟然歎曰始予有斯僕也命之理畦則蔬荒主庖則味乖顓廐則馬瘠常謂其無適能適乃今以兀然而賢我逺甚利與鈍果相長哉僕更矣劉子遂言曰樂於用則豫章貴厚其生則社櫟賢唯理所之曽何膠於域哉劉賔客文集巻六欽定四庫全書劉賔客文集巻七唐劉禹錫撰論下
