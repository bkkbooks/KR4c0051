body:
  text: 巫山神女廟巫山十二鬱蒼蒼片石亭亭號女郎曉霧乍開疑巻幔山花欲謝似殘粧星河好夜聞清珮雲雨歸時帶異香何事神仙九天上人間來就楚襄王栁絮飄颺南陌起東鄰漠漠濛濛暗度春花巷暖隨輕舞蝶玉樓晴拂豔粧人縈迴謝女題詩筆㸃綴陶公漉酒巾何處好風偏似雪隋河隄上古江津陪崔大尚書及諸閣老宴杏園更將何面上春臺百事無成老又催唯有落花無俗態不嫌憔悴滿頭來曹剛大絃嘈􅓐小絃清噴雪含風意思生一聴曹剛彈薄媚人生不合出京城發蘇州後登虎丘寺望梅樓獨宿望梅樓夜深珍木冷僧房已閉户山月方出嶺碧池涵劒彩寳刹搖星影却憶郡齋中虚眠此時景别蘇州二首三載為吳郡臨期祖帳開雖非謝桀黠且為一裵􅏆流水閶門外秋風吹栁條從來送客處今日自魂銷松江送處州奚使君吳越古今路滄波朝夕流從來别離地能使管絃愁江草帶烟暮海雲含雨秋知君五陵客不樂石門遊題報恩寺雲外支硎寺名聲敵虎丘石文留馬跡峯勢聳牛頭泉眼潜通海松門預帶秋遲囘好風景王謝昔曽遊罷郡姑蘇北歸渡揚子津幾嵗悲南國今朝賦北征歸心渡江勇病體得秋輕海濶石門小城髙粉堞明金山舊遊寺過岸聴鐘聲館娃宫在舊郡西南硯石山上前瞰姑蘇臺傍有采香徑梁天監中置佛寺曰靈嵒即故宫也信為絶境因賦二章宫館貯嬌娃當時意大誇艶傾呉國盡笑入楚王家月殿移椒壁天花代舜華唯餘采香徑一帶入山斜姑蘇臺故國荒臺在前臨震澤波綺羅隨世盡麋鹿古時多築用金鎚力摧因石䑕窠昔年雕輦路唯有采樵歌贈同年陳長史員外明州長史外臺郎憶昔同年翰墨場一自分襟多嵗月相逢滿眼是凄涼推賢有愧韓安國論舊唯存盛孝章所歎謬遊東閣下看君無計出恓惶寄湖州韓中丞老郎日日憂蒼鬢逺守年年厭白蘋終日相思不相見長頭相見是何人有感死且不自覺其餘安可論昨宵鳯池客今日雀羅門騎吏塵未息銘旌風已翻平生紅粉愛惟解哭黄昬楊栁枝揚子江頭烟景迷隋家宫樹拂金堤嵯峨猶是當時色半蘸波中水鳥棲海陽十咏并引元次山始作海陽湖後之人或立亭榭率無指名及余而大備每疏鑿搆置必揣稱以標之人咸曰有㫖異日遷官裴侍郎為十咏以示余頗明麗而不虚美因捃拾裴詩所未道者從而和之一云余為吏隠亭述言海陽之所從來詳美異日下與此同吏隠亭結搆得竒勢朱門交碧潯外來始一望寫盡平生心日軒漾波影月砌鏤松隂幾度欲歸去囘眸情更深切雲亭逈破林烟出俯窺石潭空波搖杏梁日松韻碧窓風隔水生别島帶橋如斷虹九疑南面事盡入寸眸中雲英潭芳幄覆雲屏石奩開碧鏡支流日飛洒深處身疑瑩潜去不見迹清音常滿聴有時病朝酲來此心神醒𤣥覽亭瀟灑青林際夤縁碧潭隈淙流冒石下輕波逐砌囘香風逼人度幽花覆水開故令無四壁晴夜月光來裴溪時御史已遇新恩楚客憶闗中疏溪想汾水縈紆非一曲意態如千里倒影羅文動微波笑顔起君今賜環歸何人承玉趾飛練瀑晶晶擲巖端潔光如可把瓊枝曲不折雪片晴猶下石堅激清響葉動承餘洒前時明月中見是銀河瀉䝉池瀠渟幽壁下深浄如無力風起不成文月來同一色地靈草木瘦人逺烟霞逼徃徃疑列仙圍碁在巖側棼絲瀑飛流透嵌隟噴洒如絲棼含暈迎初旭翻光破夕曛餘波遶石去碎響隔溪聞却望瓊沙際逶迤見脈分雙溪流水遶雙島碧溪相並深浮花擁曲處逺影落中心閒鷺久獨立曝龜驚復沉蘋風有時起滿谷簫韶音月窟濺濺潄幽石注入團圓處有如常滿杯承彼清夜露巖曲月斜照林寒春晚煦遊人不敢觸恐有蛟龍䕶送周魯儒赴舉詩并引晝居外次晨門曰有九疑生持一刺來謁立西階以須生危冠方袂淺拱舒拜且前致辭稱贄其文頗涉獵前言居五六日復褏來益引古事以相劘切與之言能言其得姓因家之所自暨縣道鄉亭之風俗望水名山之槩狀羅含所未記朱贑之未條咸得之於生由是始列於賔籍臨觴而司斟觀博而竄言有日矣初邑中人聞有生來而二千石客之駢然來觀遷客裴御史遇生於坐抵掌曰人固有貌類而族殊者周生疑羅玠也衆咸囅然而熟視生疑也愈甚夫形似古所有也優孟似叔敖而楚君欲以為相人殊而貌肖猶或欲用之玠生於衡山而生生於九疑其似誠匹也無乃躡其武昇俊造仕甸服佐君藩為御史乎古文人無避事即有而書之尚實也行李之貺則徴夫詩曰宋日營陽内史孫因家占得九疑村童心便有愛書癖手指今餘把筆痕自握虵珠辭白屋欲憑雞卜謁金門若逢廣坐問羊酪從此知名在一言送曹璩歸越中舊隠詩并引余為連州諸生以進士書刺者浩不可紀獨曹生崖然自稱為山夫及與語以徵其實則曰所嗜者名嘗逺遊以索之抗喉舌胘胝脢以干東諸侯見之日率莞然曰秀才者天下是不禮庸何傷今方依名山以揚其聲將掛幘於南嶽生之言未及休余遽曰在巳不在山若子之言依山而為髙是鍊神叩寂捐日月而不顧名聞而老至持是焉用生聞言愀然如晦色見於眉睫因留止道士院從余求書以觀居三時而功陪一時讀史書自皇帝至吳魏間班班能言之然而絶口不敢言衡山知山夫不販而贏也十一月告余歸隠於㑹稽且曰知求名之自矣乞詞以發之遂賦七言詩以鑒其志詩曰行盡瀟湘萬里餘少逢知已憶吾廬數間茅屋閒臨水一盞秋燈夜讀書地逺何當隨計吏䇿成終自詣公車剡中若問連州事唯有千山畫不如尋汪道士不遇仙子東南秀泠然善馭風笙歌五雲裏天地一壺中受籙金華洞焚香玉帶宫我來君閉户應是向崆峒八月十五日夜桃源翫月塵中見月心亦閒况是清秋仙府間凝光悠悠寒露墜此時云在最髙山碧虚無雲風不起山上長松山下水羣動翛然一顧中天髙地平千萬里少君引我昇玉壇禮空遙請真仙官雲駢欲下星斗動天樂一聲肌骨寒金霞昕昕漸東上輪敧影促猶頻望絶景良時難再并他年此日應惆悵叔父元和中故昔時為桃源行後貶官武陵復為翫月作並題於觀壁爾來暑紀再周蔇牽故此郡迎見文字闇缺伏慮他年轉將塵没故鐫在貞石以期不朽太和四年蔇謹記罷和州遊建康秋水清無力寒山暮多思官閒不計程徧上南朝寺田順郎歌清歌不是世間音玉殿嘗聞稱主心唯有順郎全學得一聲飛出九重深米嘉榮一别嘉榮三十載忽聞舊曲尚依然如今世俗輕前輩好染髭鬚事少年自江陵㳂流道中三千三百西江水自古如今要路津月夜歌謠有漁父風天氣色屬商人沙村好處多逢寺山葉紅時覺勝春行到南朝征戰地古來名將盡為神别䕫州官舍三年楚國巴城守一去揚州揚子津青帳聯延喧驛步白頭俯傴到江濵巫山暮色常含雨峽水秋來不恐人惟有九歌詞數首里中留與賽蠻神夜聞商人船中筝大艑髙船一百尺新聲促柱十三絃揚州市裏商人女來占江西明月天聞道士彈思歸引仙公一奏思歸引逐客初聞自泫然莫怪殷勤悲此曲越聲長苦巳三年喜康將軍見訪謫居愁寂似幽棲百草當門茅舍低夜獵將軍忽相訪鷓鴣驚起繞籬啼贈劉景擢第湘中才子是劉郎望在長沙住桂陽昨日鴻都新上第五陵年少讓清光赴連山途次徳宗山陵寄張員外常時並冕奉天顔委珮低簪彩仗間今日獨來張樂地萬重雲水望橋山嘗茶生拍芳叢鷹觜牙老郎封寄謫仙家今宵更有湘江月照出霏霏滿盌花梁國詞梁國三郎威徳尊女巫簫鼓走鄉村萬家長見空山上雨氣蒼茫生廟門九日登髙世路山河險君門烟霧深年年上髙處未省不傷心謝栁子厚寄疊石硯常時同硯席寄此感離羣清越敲寒玉參差疊碧雲烟嵐餘斐亹水墨兩氛氲好與陶貞白松窓寫紫文元日感懐振蟄春潜至湘南人未歸身加一日長心覺去年非燎火委虛燼兒童􅃷彩衣異鄉無舊識車馬到門稀謝宣州崔相公賜馬浮雲金絡膝昨日别朱輪銜草如懐戀嘶風尚意頻曽將比君子不是換佳人從此西歸路應容躡後塵南中書來君書問風俗此地接炎州淫祀多青鬼居人少白頭旅情偏在夜鄉思豈唯秋每羨朝宗水門前盡日流題招隠寺隠士遺塵在髙僧精舍開地形臨渚斷江勢觸山迴楚野花多思南禽聲例哀殷勤最髙頂閒却望鄉來思歸寄山中友人蕭條對秋色相憶在雲泉木落病身死潮平歸思懸涼鐘山頂寺暝火渡頭船此地非吾土閒留又一年望洞庭湖光秋月兩相和潭面無風鏡未磨遙望洞庭山水翠白雲盤裏一青螺魚復江中扁舟盡室貧相逐白髮蔵冠鑷更加逺水自澄終日緑晴林長落過春花客情浩蕩逢鄉語詩意留連重物華風檣好住貪程去斜日青帘背酒家歴陽書事七十韻并引長慶四年八月余自䕫州轉歴陽浮岷山觀洞庭歴夏口涉潯陽而東友人崔敦詩罷丞相鎮宛陵緘書來招曰必我覿而之藩不十日飲不置子故余自池州道宛陵如其素敦詩出祖於敬亭祠下由姑孰西渡江乃吾圉也至則考圗經參見事為之詩俟采之夜諷者一夕為湖地千年列郡名霸王迷路處亞父所封城漢置東南尉梁分肘腋兵本呉風俗剽兼楚語音傖沸井今無湧烏江舊有名土臺遊柱史石室隠彭鏗老君適楚有臺在焉彭鏗石室在含山縣曹操祠猶在濡須塢未平海潮隨月大江水應春生一昨深山裏終朝看火耕魚書來北闕鷁首下南荆雲雨巫山暗蕙蘭湘水清章華樹已失鄂渚草來迎廬阜香爐出湓城粉堞明鴈飛彭蠡莫鵶噪大雷晴平野分風使恬和趂夜程貴池登陸峻春穀渡橋鳴駱驛主人問悲歡故舊情幾年方一面卜晝便三更助喜杯盤盛㤀機笑語訇管清疑警鶴絃巧似嬌鶯熾炭烘蹲獸華茵織鬭鯨囘裾飄霧雨急節墮瓊英斂黛疑愁色施鈿耀翠晶容華本南國粧梳學西京日落方收鼔天寒更炙笙促筵交履舄痛飲倒簪纓謔浪容優孟嬌憐許智瓊蔽明添翠帟命燭拄金莖坐久羅衣皺盃傾粉面騂興來從請曲意墮即飛觥令急重須改歡馮醉盡呈詰朝還選勝來日又尋盟道别殷勤惜邀筵次第争唯聞嗟短景不復有餘酲衆散扄朱户相攜話素誠晤言猶亹亹殘漏自丁丁出祖千夫擁行厨五熟烹離亭臨野水别思入哀筝接境人情洽方冬饌具精中流為界道隔岸數飛甍沙浦王渾鎮滄州謝眺城望夫人化石夢帝日環營半渡趨津吏縁堤簇郡甿場黄堆晚稻籬碧見冬菁里社争來獻壺漿各自擎鴟夷傾底舄粔籹鬭成闕采石風傳柝新林暮撃鉦繭綸牽撥刺犀焰照澄泓露冕觀原野前驅抗斾旌分庭展賔主望闕拜恩榮比屋惸嫠輩連年水旱并遐思常後巳下令必先庚逺岫低屏列支流曲帶縈湖魚香勝肉官酒重於餳憶惜泉源變斯須地軸傾雞籠為石顆龜眼入泥坑事繫人風重官從物論輕江春俄澹蕩樓月幾虧盈栁長千絲宛田塍一線絣遊魚將婢從野雉見媒驚波浄攅鳬鵲洲香發杜蘅一鐘菰葑米千里水葵羮受譴時方久分憂政未成比瓊雖碌碌於鐡尚錚錚早忝豋三署曽聞奏六英無能甘負弩不慎在提衡口語成中遘毛衣阻上征時聞闗利鈍智亦有聾盲昔媿山東妙今慙海内兄後来登甲乙早巳在蓬瀛心托秦明鏡才非楚白珩齒衰親藥物宦薄傲公卿捧日皆元老宣風盡大彭好令朝集使結束赴新正劉賔客外集巻八欽定四庫全書劉賔客外集巻九唐劉禹錫撰雜著為
