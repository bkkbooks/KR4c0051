front:
  text: 毗陵楊給事三首揮毫起制來東省躡足修名謁外臺好看櫜鞬莫惆悵出文入武是全才曽主魚書輕刺史今朝自請左魚來青雲直上無多地却要斜飛取勢囘東城南陌昔同遊坐上無人第二流屈指如今已零落且須歡喜作鄰州
  hash: sha256:d8d7242b2cbb9d79fc363a9f43594c7ad707627ffbb29c2b5364bd9084e3f8cb
