body:
  text: 蘇州謝恩賜加章服表臣某言伏奉去年十一月二十七日詔書加臣賜紫金魚袋餘如故者恩降重霄榮霑陋質虛黷陟明之典恐興彼己之詩寵過若驚喜深生懼中謝臣起自書生業文入仕徳宗朝為御史以孤直在臺順宗朝為郎官以縁累出省憲宗皇帝後知其寃特降敕書追赴京國縁有虚稱恐居清班務進者争先上封者潛毁巧言易信孤憤難申俄復一麾外轉三郡伏遇陛下膺期御宇大振滯淹哀臣宿舊猥見收拾職兼書殿官忝儀曹微勞未宣薄命多故又離省署重領郡符延英面辭親承教誨銜命即路星言載馳到任之初更逢災疫奉宣聖澤恭守詔條上稟叡謀下求人瘼才術雖短憂勞則深幸免流離漸臻完復皆承聖化所及遂使人心獲安豈由微臣薄劣能致臣素乏親黨家本孤貧年衰無酒食之娛性拙無博奕之藝自領大郡又逢時災晝夜苦心寢食忘味曽經誣毁每事防虞唯託神明更無媒援豈期片善上達宸聰囘日月之重光燭江湖之下國絲綸褒異苦節既彰印綬煒煌老容如少望雲天而拜舞豈盡丹誠視環玦以裵􅏆空嗟白首無任感激屏營之至太和七年十二月十六日蘇州賀皇帝疾愈表臣某言臣得本道觀察使報伏承聖躬痊愈已於紫宸殿視朝者一人有慶萬國同歡伏惟皇帝陛下外親萬務内奉三宫常懐宵旰之勤遂失寢興之適上𤣥降祐列聖表靈百神奔走以來扶四海精誠而致感勿藥有喜如山永安宗廟保無疆之休寰瀛申莫大之慶臣恪居官次遐守江干不獲稱賀闕庭無任踴躍屏營之至汝州謝上表臣某言伏奉去年七月十四日詔書授臣使持節汝州諸軍事守汝州刺史兼御史中丞充本道防禦使餘如故者臣久居逺服戀闕常深忽降新恩近卿為貴承㫖慶抃省躬慙惶臣某誠歡誠喜頓首頓首伏惟皇帝陛下垂衣穆清之中旁照寰瀛之内車書所及動植咸安臣昨離班行逺守江徼延英辭日親奉徳音知臣所部災荒許臣到任條奏共承叡㫖宣示羣黎減其征徭頒以賑賜伏䝉聖澤救此天災疲羸再蘇幼艾同感二年連遭水潦百姓幸免流離交割之時户口増長雖才術不足於事未周而憂勞則深為衆所悉臣本業儒素頻登文科時命邅囘再領軍郡即以今月二十七日到任上訖謹當奉宣皇化慰彼蒼生臨汝水之波朝宗尚阻望秦城之日囘照何時無任感激屏營之至謹差防禦押衙韋禮簡奉表陳謝同州謝上表臣某言伏奉去年十月二十三日制書授臣使持節同州諸軍事守同州刺史兼御史中丞充本州防禦長春宫等使恩降九重榮忝三輔承㫖慶抃省躬慙惶臣某伏惟皇帝陛下丕承列聖光闡鴻猷氛祲掃除乾坤交泰臣幸逢昌運累沭殊私空荷生成之恩寜酬雨露之澤即以今月二日到本州上訖謹宣叡㫖安慰蒸黎伏以本州四年已來連遭旱損閭閻凋瘵逺近共知臣頃任蘇州之年亦遭大水之後面辭之日新奉徳音至於撫綏皆承聖教二年之後百姓獲安今本部災荒物力困涸忝為長吏敢不竭誠即須條疏續具聞奏臣恪居官次幸接王畿不獲拜舞彤庭陳露丹慊犬馬懐戀寢興匪寜瞻魏闕之容朝天尚阻望長安之路近日為榮無任感激屏營之至謹差防禦知衙官試殿中監楊克乂奉表陳謝太和九年十二月二十一日批荅省表具知卿任居三輔職奉六條累聞問俗之勞載覽勤人之志言惟顧行深慰朕懐勉𢎞故經以副攸寄所謝知賀梟斬鄭注表臣某言伏奉前月二十五日詔書示逆賊鄭注已梟首訖妖氛殄滅華夏乂安伏以逆賊鄭注本出細微潛懐梟獍之心兼結兇狂之黨人倫共棄神理不容陛下叡畧感通天人合應重臣協力禁旅齊心指顧之間猖狂自潰乾坤交泰日月増明凡在人臣不勝慶快臣恪居官次不獲稱賀闕庭無任欣歡抃躍之至太和六年十二月二日賀徳音表臣某言伏見今月十六日徳音布告遐邇天道下濟人情大安伏惟皇帝陛下凝旒思理垂意擇材以日月無私之光照寰區共戴之内貴使下情盡達寜虞厚貌潛謀一昨李訓鄭注等敢有逆心兼連兇黨陛下叡謀神斷左右協同頃刻之間掃除已定重臣畢力禁旅竭忠氛祲廓清華夷咸説言念正刑之外或有詿誤之徒再發徳音廣宣聖澤當星紀囘天之日迎陽和煦物之光懐危疑者如山之安欲告訐者望風知懼非同謀者一切不問未結正者三宥從寛含生之倫普天同感臣恪居官次不獲稱慶闕庭云云謹差防禦知衙官朝議郎權知容州都督府司馬孫惕奉表賀赦表臣某言伏奉今月一日制書改太和十年為開成元年大赦天下者雷雨作解人神説隨澤及八荒網開三面臣某誠歡誠喜頓首頓首伏惟皇帝陛下上承乾綱下立人極用含𢎞光大之澤副夷夏會同之心獻嵗改元惟新景祚先明首罪次及羣妖述叡情以曉萬方施鴻霈以蘇庶物恤辜宥過已責弛征郡縣之舊弊悉除賦税之新規咸備停藩方節獻之禮以惠疲人囘榷管餘羨之財以資京邑命使展澄清之志察言求讜直之材弓旌賁于丘園粟帛頒於耆艾爰以初吉御宇明庭徳音一發於九天和氣驟周於四海開物成務實表於建元應天順人永延於億載臣幸居近輔先受殊恩不獲稱慶闕庭陪榮班次衆星列位常拱北辰之光新嵗拜章遙獻南山之夀無任抃躍屏營之至謝恩賜粟麥表臣某言伏奉今月一日制書以臣當州連年歉旱特放開成元年夏青苗錢并賜斛㪷六萬石仰長吏逐急濟用不得非時量有抽斂於百姓者恩降九天澤周萬姓優詔纔下羣情頓安臣某誠歡誠喜頓首頓首伏以災沴流行隂陽常數物力既竭人心匪遑輒敢奏聞本求貸借皇恩廣被𤣥造曲成既免在田之征仍頒發廩之賜臣謹宣赦文節目彰示兆人鼓舞歡謠自中徂外臣初到所部便遇儉時今䝉聖慈特有賑恤主恩及物巳為夀域之人衆意感天必有豐年之應臣恪居官業不獲拜舞闕庭無任感激屏營之至慰淄王薨表臣某言臣得進奏官楊惕狀報淄王薨輟朝三日伏惟皇帝陛下徳邁前王情深近屬憫枝葉之謝諒切宸衷割肌膚之愛何堪聖念萬方知化九族歸仁凡受國恩伏深悽惻臣限以藩守不獲奉慰闕庭無任屏營之至謝恩放先貸斛斗表臣某言臣奉五月二十九日敕牒據度支所奏諸道節度觀察使及州府借便省司錢物斛斗等數内當州欠三萬六千二十三貫石並放免者殊私忽降逋責滌除藩方永安遐邇咸説臣某誠歡誠喜頓首頓首伏以闗輔之間頻年歉旱田租既須矜放公用又不支持承前長吏例有借便以救一時之急皆成積欠之名既未支填常懐憂懼聖恩周洽洞見物情爰命有司使之條奏去其舊弊衆巳獲安嚴立新規人知所措臣恪居官次不獲拜舞闕庭無任抃躍屏營之至謝分司表臣某言伏奉今月十九日制書授臣太子賔客分司東都者寵命自天戰越無地臣發迹書生以文為業出身入仕四十餘年頃自集賢學士出守吳郡面辭之日親承徳音念百姓水潦之餘示微臣政理之法臣祗膺聖㫖夙夜竭誠閭里獲安流庸盡復猥䝉朝奬錫以金章及遷同州又遇歉旱悉心綏撫幸免流離今荷天慈憫臣耆舊列名賔䕶之職分局河洛之都老馬霑束帛之恩枯株䝉雨露之澤獲居榮秩以畢餘年顧此微軀實為厚幸伏以臣始為御史逮事徳宗今忝官寮幸逢聖日舉四海之内賢能則多求六朝之臣零落將盡雖迫桑榆之景猶傾葵藿之心臣無任感恩惕抃之至劉賔客文集巻十六欽定四庫全書劉賔客文集巻十七唐劉禹錫撰狀為淮南杜相公論新羅請廣利方狀淮南節度觀察處置等使敕賜貞元廣利方五巻右臣得新羅賀正使朴如言狀稱請前件方一部將歸本國者伏以纂集神效出自聖衷藥必易求疾無隠狀搜方伎之祕要拯生靈之夭瘥坐比華胥咸躋仁夀遂令絶域逖聴風聲美兹豐功爰有誠請臣以其久稱藩附素混車書航海獻琛既已通於華禮釋痾蠲癘豈獨隔於外區正當四海為家冀覩十全之效臣即欲冩付未敢自専謹録奏聞為京兆韋尹降誕日進衣狀衣一副四事黄折造衫一領白吳綾汗衫一領白花羅半臂一領白花羅袴一腰右伏以正陽令月誕聖嘉辰運協千年慶流萬國凡在臣子合有獻陳敢傾就日之心願奉如山之夀輕瀆宸扆無任兢惶為京兆李尹降誕日進衣狀衣一副四事右伏以水徳方清真龍下降天長地久瞻北極以常尊獻夀稱觴配南山而永固臣地居宗屬職忝尹京慶賀之誠倍萬常品前件衣服謹詣銀臺門奉進輕瀆旒扆伏用兢惶貞元十九年四月十九日為京兆韋尹進野猪狀右伏以收穫之餘田獵有獲異於芻豢著在方書既堪充庖輒敢上獻前件野猪謹隨狀進謹奏為杜相公自淮南追入長安至長樂驛謝賜酒食狀具官臣某右臣今日至長樂驛髙品某奉宣聖㫖賜臣酒食者伏以恩降王人榮分御膳未展儀於雙闕先受賜於八珍品越脤膰味兼醪醴頓驚凡口倍益歡心無任欣躍為杜相公謝就宅賜食狀具官臣某右髙品某奉宣聖㫖賜臣食者出自大官飫于私第光榮曲被猥承推食之恩駑蹇未施益重素餐之責舉其匕筯若負丘山無任戰荷踴躍之至為東都韋留守謝賜食狀具官臣某右臣今日發至長樂驛中使某奉宣聖㫖賜臣食者伏以味兼海陸品溢圓方降自御厨光臨傳舍臣初辭魏闕倍懐犬馬之誠猥受珍羞更切稻粱之感無任欣躍為裴相公進東封圖狀集賢殿御書院開元東封圖一面右臣謹按開元十三年𤣥宗皇帝以天下太平登封東岳聲明文物振耀古今伏惟陛下丕承耿光再闡鴻業祖宗盛事紹復有期臣所以寫成此圖輒敢上獻至於繢畫躬自指揮徵史氏之文纂禮容之要山川氣象悉擬真形羽衛威儀咸稽故實所冀叡情一覽遐想𤣥蹤臣叨榮過深抱疾巳久望陛下告成之日心必前知嗟老臣將謝之年身恐不見疾羸之際感激倍深前件圖謹差某官某謹詣光順門上進謹奏舉崔監察羣自代狀御史臺宣歙池等州都團練判官監察御史裏行崔羣右臣䝉恩授監察御史伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官在諸生中號為國器縶維外府人咸惜之臣既深知敢舉自代貞元十九年閏十月日舉開州栁使君公綽自代狀尚書屯田某官等守開州刺史栁公綽右臣䝉恩授尚書屯田員外郎伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官以賢良方正再敭王庭在流輩間號為端士昨除逺郡人皆惜之臣初䝉授官得以論薦多士之内非無其人竊惟用材宜自逺始謹具如前謹録奏聞伏聴敕㫖貞元二十一年四月八日舉姜補闕倫自代狀東都尚書省前左補闕姜倫右臣䝉恩授尚書主客郎中分司東都伏準建中元年正月五日敕常參官上後三日舉一人自代者臣伏詳詔㫖欲達聰旁求發揚幽逺故人人得言所知不當循其階次也臣伏以前件官有儒學士行䝉以諫官徵會其年老被疾不堪上道有司按視如狀不復逼迫至今家居而篤志無倦臣謹舉為郎吏分司别都冀優賢振滯兩得其道太和元年六月十四日蘇州舉韋中丞自代狀蘇州狀上中書門下諸道鹽鐵轉運江淮留後朝議郎守太僕少卿兼御史中丞上柱國賜紫金魚袋韋應物右臣䝉恩授蘇州刺史伏準建中元年正月五日制刺史上後舉一人自代者前件官歴掌劇務皆有美名執心不囘臨事能斷今領職雖重本官尚輕伏以當州口賦首出諸郡況經災沴切在撫綏尚省無能輒敢公舉司𣙜筦之利誠藉時才流豈弟之風實惟邦本非敢臆説以塞詔書今具聞奏太和六年十二月九日蘇州上後謝宰相狀朝議大夫使持節蘇州諸軍事守蘇州刺史上柱國劉某右某今月六日到州上訖某山東一書生潦倒疎濶在少壯日猶不逮人況今衰遲智力愈短相公哀憐不遇擢授名拜實荷𢎞奬慙非器使伏以當州繇大􅎊之後物力蕭然飢寒殞仆相枕于野誓當悉心條理續具奏論才術素空憂勞方始懼無聞問忝負恩知不任瞻望懇迫之至蘇州加章服謝宰相狀右某素乏吏才謬居劇郡以無庸之器當難治之時恭守詔條勤求人瘼伏以聖徳柔逺皇明燭幽凡有上陳皆可其奏遂令管見得及疲黎自承雨露之恩非有循良之政猥䝉朝奨特降命書顧逢掖之腐儒被華章之貴服有黷陟明之典誠招彼已之譏限以守官不獲拜謝瞻望榮感心魂載馳太和七年十二月日汝州上後謝宰相狀朝議大夫使持節汝州諸軍事守汝州刺史兼御史中丞充本州防禦使上柱國賜紫金魚袋劉某右某自領吳郡仍嵗天災上稟詔條下求人瘼地包藪澤俗尚剽輕悉心撫綏用法擒擿事繁才短常積憂虞忽䝉天恩稍移近郡家本滎上籍占洛陽病辭江干老見鄉樹榮感之至實倍常情印綬所拘不獲拜謝瞻望徳宇精誠坐馳無任感戀之至汝州舉裴大夫自代狀正議大夫使持節杭州諸軍事守杭州刺史上柱國賜紫金魚袋裴𢎞泰右臣䝉恩授汝州刺史兼御史中丞充本州防禦使伏準建中元年正月五日敕諸州刺史上後舉一人自代者伏以前件官前為九卿出領兩鎮頃因微累遂有左遷今授逺州物情未塞臣前任鄰接具知公才舊屈未伸輒舉自代云云汝州進鷹狀汝州防禦使當使進奉籠母鷹六聨右伏以前件鷹等學習應期馴養斯至列於常貢有異衆禽受紲之時志已存於雲外下韝之際思用展於軍前既懐百中之能願獻三驅之禮謹差防禦押衙景再休隨狀奉進以聞太和九年九月十一日同州舉蕭諫議自代狀同州防禦使前諌議大夫蕭俶右臣䝉恩授同州刺史兼御史中丞充本州防禦長春宫等使伏準貞元二年正月二十四日敕上後三日舉一人自代者伏以前件官生於貴族服膺儒門縉紳之間號為端士昨䝉朝奬冠于諌垣時方被病不果上道長告已滿塊然家居今聞疾瘳可以録用臣與俶久同班列知其才能為官擇人敢舉自代太和九年十二月四日上宰相賀徳音狀同州狀上中書門下今月十六日徳音右被刑部牒宣示徳音伏以聖澤滋深新恩廣被言念正刑之外或有詿誤之徒爰降殊私特𢎞在宥瑕累咸滌危疑獲安此皆廟算弼諧致君及物事光前史功格上𤣥某限以守官不獲隨例拜賀無任抃躍之至太和九年十二月二十三日上宰相賀改元赦書狀同州狀上中書門下改元赦書右伏奉今月一日制書改太和十年為開成元年大赦天下者伏以律首三元禮崇四始順陽和發生之徳敷大號渙汗之恩宥過恤刑㢮征已責盡去人瘼通知物情徳音朝發於九天和氣夕周於四海此皆相公弼諧之道燮贊之功進熟於密勿之間發揚成滂沛之澤某恪守官業印綬所拘不獲隨例拜賀謹狀薦處士嚴毖狀處士嚴毖右左庶子損之之孫國子司業士元之子舊名保嗣亦有官班頃者李賔客渤常與之游辟為桂州支使其後寄家汝海專静自居某嘗典汝州與語甚熟歴代史及國朝故事悉能該通操心甚危觀跡相副未逢知已巳過壯年汩没風塵有足悲者伏見赦文節目委州郡長吏搜訪隠淪夫舉無它唯善所在每覽珠英巻後列學士姓名有常州人符鳯白衣在選取其藝業不棄逺人某忝被儒官得以薦士亦非出位冀不廢言儻𢎞文集賢史氏之館採其實學有勸諸生伏以桂州辟之於前某薦之於後豈必有土長吏然後事行伏惟試味斯言降意詳擇謹狀薦處士王龜狀處士王龜古者選公族大夫必以惇惠者教之文敏者道之果敢者諗之鎮静者循之孜孜於此者葢膏粱之性難正而懼公侯之𦙍不能嗣其耿光可以深惜然則成宣之後而老為大夫非恥乎此智武子誡文子既冠而見之詞也是知古之取士不專寒族必參用世胄以廣得人之路今見處士王龜即居守之第三子也天性貞静操心甚危不由門資誓志自立樂處士之號不汩綺襦之間自到洛都便居山寺耽玩墳籍放情烟霞曽邀與語如鋸木屑信有稟受居然出羣以比在京師甚足知者諫院有狀名流亟言某流滯周南静閲時輩身雖不用心甚愛才況遇
