seq: 16
front:
  text: 為淮南杜相公佑修凡十首
  hash: sha256:d2d9e999d0dd9f577e8866bec91abe7734225745acc97b723d5e394541602c2b
body:
  text: 讓同平章事表臣某言髙品呉千金至奉制加臣銀青光禄大夫同中書門下平章事兼徐泗濠等州節度觀察處置等使餘如故者初受恩榮若登霄漢退思塵忝如履春氷臣誠惶誠恐頓首頓首臣聞以徳詔官以勞定賞茍或虛授人無勸心臣自守方隅累更時嵗荷唐虞宣力之寄乏齊魯報政之能愧無可稱以荅髙位豈意聖慈𢎞奬天澤薦加以燮賛之崇名被庸虛之陋質懼速官謗有玷大猷伏以宰相之職安危是注其在當否繫于慘舒惟以材陞例無平進舉不失徳則副蒼生之心茍非其人或致外夷之哂臣雖愚昧嘗覽前言豈敢冒榮遂安竊位輒思事理冀盡芻蕘若以汴河要津漕運所切徐方俶擾師旅未寧謹當上稟叡謀下貞戎律克期而進屈指可平勵衆之先是臣之志既行其事必在正名所加節制安敢飾讓至於銀青貴服金鉉重名勲績無聞豈宜濫及伏乞賜寑前命俯亮愚衷㣲臣遂知止之宜聖朝無不稱之服名器斯慎退讓有聞遐邇聆風孰不知勸其新授官告謹重封進無任懇禱屏營之至謝平章事表臣某言伏䝉奬拔超踐鈞衡慮玷大猷昧死陳讓再奉嚴㫖不令固辭恩厚命輕位髙責重中謝臣聞天下安危注意將相處論道具瞻之地當總戎作鎮之權雖協夢而求無聞秉鉞之寄登壇以拜不兼調鼎之榮授受惟艱伊昔猶爾況臣庸瑣何以克堪陛下𤣥造曲成大明私照俾掌戎律復參廟謨寵光之崇在臣已極毫髮之效於國何施謹當罄竭㣲誠奉遵至教仗天威以懾不類敷聖澤以遂羣生上分旰食之憂下塞素餐之責力誠不足心實念兹伏乞皇明俯賜昭鑒臣恪居官次遐守藩維不獲伏謝彤庭陳露丹慊心存闕下同犬馬之戀恩身在淮濆仰雲天而結思無任懇悃屏營之至謝手詔表詔後批云朕自書臣某言中使閻忠信至奉宣聖㫖存問兼賜臣手詔拜捧紫泥跪伸金簡承㫖見聖神之畧感恩知身命之輕中謝臣素乏異能幸逢昌運猥當旄鉞之寄未靖祅氛榮分台鼎之名何階啟沃竊位斯久速尤是虞豈謂𤣥化曲成鴻私荐及特紆睿思親灑仙毫降自九重粲然五色初喜麗天之象逺燭輝光旋驚垂露之蹤曲覃霈澤鸞鳳騫翔而變態烟雲舒巻以呈姿賦彩飛文聳神蕩目恭惟國寳何幸家蔵感極涕零莫知上荅應縁軍旅庶務謹具别狀奏聞無任欣戴屏營之至謝貸錢物表臣某言中使南宫懷珍至奉宣聖㫖存問兼賜臣墨詔天光下濟叡澤曲流銜恩未酬居寵彌懼中謝臣受任斯極㣲功莫施昨以封畧未寧干戈猶動夀春固壘以備盜淮甸興師以扞姦經費所資數盈鉅萬餽餉時久供億力殫慮始圖終不敢緘黙輒陳管見上黷宸聰伏䝉聖慈特遂誠請逺承如綍之㫖特假聚人之財軍須不愆士氣彌振糗糧既備永無半菽之虞襦袴足頒逺超挾纊之感是為説使咸願先登臣忝總戎倍百欣荷伏以上分國用俯濟軍興候清烟塵謹備償約請赴行營表臣某言臣自守淮濆巳周星紀䖍奉朝典粗安遐方素效未聞新恩荐及身曳兩綬寄深一隅蚊蚋負山力誠不足鷹鸇逐鳥志則有餘臣再授兵符夙參軍幕被堅執鋭雖未經於戎行制勝伐謀亦嘗習於事業自忝藩翰屬時清平無施汗馬之勞但詠櫜弓之什今則幸遇殊奬委之専征以身率先是臣素志況聞徐州士衆本無叛心倉卒之間危疑至此臣請自臨疆場親領紀綱裂帛繫書諭其禍福椎牛饗士養以威聲冀宣皇風煦兹蠢類以忠義感脇従之伍以含𢎞安反側之徒革面悛心期乎不日其揚州留務請令行軍司馬路應權知伏乞聖慈俯賜昭鑒謝兵馬使朱鄭等官表初除侍御史續除中丞異姓王臣某言奏事官韋温特䝉聖恩重賜朱鄭等官告宸象昭回煥然下燭榮分右職光賁遐藩中謝臣伏以朱鄭朴忠為心沈毅見色當建封禦侮之寄見張愔提孩之年昨者𨽻職徐州分鎮蘄縣繹騷之際梗亮彌彰歴險而來寔繁其旅詳探本末有足襃稱輒具奏聞恐須奬勸伏䝉叡鑒俯亮㣲誠優詔先行已階直指之列殊私荐至超陞獨坐之崇户領三千爵踰五等恩生非次感異常倫轅門有光武旅増氣遂使感激之士希勇爵以捐軀猖狂之徒聆聖澤而悛性風行草偃其勢必然臣忝總戎麾倍百欣荷賀復呉少誠官爵表臣某言中使宋惟澄至奉宣聖㫖存問兼賜臣墨詔及昭示洗雪呉少誠等事天地𢎞覆燾之恩雷雨施渙汗之澤瑕累咸滌危疑獲安中謝臣伏以少誠擅興兵戈事生挂誤自王師致討天威下臨曽無悖辭亟聞引咎初懷疑懼雖擁衆以偷生旋感聖神屢拜章而請命陛下仁深解網慮軫納隍念餽餉飛輓之勤閔戰爭暴露之苦舉兹宥過之典副彼效順之誠一方承再造之恩九有覩惟新之化敷鴻霈而覃及蠢類鼓仁風而臻于太和罷柝銷鋒自兹而始臣謬膺重寄䖍守遐藩不獲稱慶瑤墀陳露丹懇仰瞻宸極倍百常情無任慶抃屏營之至賀徐䖍王等表臣某言中使李國真至奉宣聖㫖存問兼賜臣墨詔鴻澤浹下大明燭幽曉諭便蕃慰安稠疊中謝臣伏覩天書恭承睿㫖𢎞愛人屈已之道酌因時適變之宜擇賢王作鎮徐方俾張愔便主留務上則成邦家磐石之固下則副士衆拜章之請戚藩之寄斯重舊勲之祀獲全丕變猖狂之徒咸躋仁夀之域既𢎞在宥坐見止戈率土人臣孰不欣説臣素乏方畧謬荷寵光猥承將相之名無施分寸之績遭逢若此報效蔑聞官謗巳興渥刑宜及陛下恩深覆載道務含𢎞恤公私餽餉之勤念吏士鋒鏑之苦特紆神算昭發徳音危疑獲安制置惟固好生宥過誠陛下開網之仁尸位無功重㣲臣素餐之責周章跼蹐胡顔自安但以遐守藩條恪居官次不獲仰謝雲陛陳露血誠未遂周任知止之言敢逃臧文竊位之咎無任戰越之至慰義陽公主薨表臣某言伏承義陽公主薨伏惟聖懷傷悼増切伏以公主妍姿令則冠絶天人稟教皇宫巳挺柔嘉之徳降嬪卿族益彰貞粹之儀方期作範壼闈長榮邸第豈意遘兹短歴奄謝昌辰伏慮陛下軫念未捐深慈莫遣有虧常膳罷設官懸臣子之情不任惕戀況聖凡禮異邦家制殊伏願道齊彭殤理達修短割肌膚之愛慰寰海之心率土人臣孰不相慰無任懇悃屏營之至慰王太尉薨表臣某言伏承成徳軍節度使太尉兼中書令王武俊今月某日薨没伏以武俊生逢昌時天授忠節奮揚義勇茂建勲庸秩冠朝端參燮和於台鉉姻連戚里承嘉慶於雲霄榮掩華夷事髙今昔方膺作翰之寄遽迫歸泉之期鼎臣云亡梁木斯壞伏惟陛下君臣義重存沒感深臨冊襚以興懷聴鼓鼙而軫念臣恪居官守奉慰無階悲慟之誠有加常品謹遣某官某乙奉表陳慰以聞劉賔客文集巻十一欽定四庫全書劉賔客文集巻十二唐劉禹錫撰表章二為淮南杜相公佑修凡十一首謝冬衣表臣某言中使王國清至伏奉聖㫖慰勞臣及將佐官吏僧道耆夀百姓等并賜臣墨詔及冬衣兩副大將衣四副者大明昭回逺燭下土殊錫稠疊延及偏裨慶抃失圖捧戴相賀云云臣謬承委寄獲守藩條灰琯屢移塵露無補陛下至仁天覆元化風薫頒以兼衣賁兹瑣質降自天府光于轅門緘縢既開覩綵章之盛飾蹈舞而服發温燠於祁寒愧塵補衮之名更荷解衣之賜恩波下浹將校同霑共戴殊榮咸思竭節生成是荷雨露難酬無任懇悃慙荷之至謝濠泗兩州割屬淮南表臣某言伏奉十一月二十九日詔書其濠泗兩州令臣依前收管臣謬承寵光作鎮淮海位均九伯權總十連内省無堪常恐不逮豈謂恩私曲被封畧有加慙無報政之勤重受分憂之寄伏以兵戈方息閭里未安謹當奉宣皇風慰彼黔首且責成於牧宰期不失於澄清伏惟聖明俯賜昭鑒無任感戴屏營之至謝厯日面脂口脂表臣某言中使霍子璘至奉宣聖㫖存問臣及將佐官吏僧道耆夀百姓等兼賜臣墨詔及貞元十七年新厯一軸臘日面脂口脂紅雪紫雪并金花銀合二含稜合二皇明逺燭殊錫荐臻抃舞失容捧戴無措伏惟皇帝陛下立極御人順時布政禮崇大蜡澤浹遐藩臣叨榮日深竊位時久謬回宸眷猥降王人天書下臨覩三光之照耀玉厯爰授知四氣之環周雕奩既開珍藥斯見膏凝雪瑩含液騰芳頓光蒲柳之容永去癘疵之患命輕恩重上荅何階無任感抃屏營之至謝墨詔表臣某言中使陳日華至奉宣聖㫖存問兼賜臣墨詔又以臣所奏羅珦及裴靖政理有方今各賜手詔激賞者恩降重霄澤流下土義存奬勸榮冠等夷臣昨以羅珦裴靖勵精吏理効用著明人咸説安俗致殷阜恐須甄録以勸在官輒獻封章具陳成績伏䝉叡鑒俯亮愚衷載嘉理行之尤光示絲綸之㫖守道者益以固志懐慝者由是悛心激俗化人於兹為大臣謬司亷問職在澄清幸遇旌善之時獲免蔽賢之責無任欣感之至論廢楚州營田表臣某言中使曹進玉至奉宣聖㫖存問兼賜臣墨詔以楚州營田廢置事令臣商量奏來者跪奉天書恭承叡㫖道存致用義在隨時云云伏以本置營田是求足食今則徒有縻費鮮逢順成刈穫所收無裨於國用種糧每闕常假於供司較其利害宜廢巳久比來循守舊制不敢輕有上陳皇明鑒微特革斯弊取其田蓄授彼黎蒸仍俾薄租誠為至當但以田數雖廣地力各殊須量沃瘠用立程度臣已追里正臣與商量利便謹具别狀奏聞伏惟聖慮俯賜詳擇無任震越屏營之至請朝覲表臣某言臣聞臣之事君有犯無隠懇誠所至敢不罄陳伏惟聖明俯賜矜察云云臣代受國恩忝承門䕃脱巾筮仕敢期榮名陳力効官靡樹聲績始因孤直驟歴清班復加朝奬作藩外府逺違輦下十有四年恪守淮濆逮今一紀犬馬懐戀寢興匪遑蒲柳易衰遲莫俄及竊位時久妨賢愧深況歴官巳來四十八考祇奉朝謁時纔二周服勤郡符荏苒垂老屏營魏闕之思夢想承明之游如迫餒寒不忘衣食伏惟叡鑒俯亮愚衷蚤賜擇人與臣交代授受之際冀無可虞然後脂車奔赴京輦㣲願斯畢雖死猶生臣頃以戎務方殷猥加宰輔今既事罷實慙此名為有藩鎮同時未敢輕上印綬伏以聖朝赫赫左右惟賢漢愧得人周慙多士臣才畧既短齒髮又衰柄用之地甘心自絶所冀退歸舊里沐浴皇風絶鍾鳴漏盡之譏展維桑與梓之敬匪惟名器不假實貴骸骨可全知止之心神祗所鑒無任懇悃怔營之至謝春衣表臣某言中使陳日華至伏奉聖㫖慰勞臣及將佐官吏僧道耆夀百姓等并賜臣墨詔及春衣兩副大將衣四副王人捧詔御府降衣寵光不隔於遐藩慶賜猥霑於裨將臣素乏器能謬膺驅使每慙效薄常懼食浮陛下覃以至仁均其厚施宰元和而布澤順時律以頒衣出自禁中賁于臣下執領襘而抃舞失次被纎柔而顧眄増輝舉體動容既安且吉在身不稱恐招鵜翼之譏居位無功叨受鶴紋之賜下延將校同荷生成謝賜門㦸表臣某言臣得進奏官裴遘狀報今月九日軍器使梁延夀奉宣進止付所司准省牒賜臣門㦸十二竿者恩降雲天榮加門户承㫖慶抃省躬慙惶伏以禮著等威朝有命數是昭懋賞必在疇庸臣謬荷寵光素無績效旌旄之寄巳忝外藩棨㦸爰列更光私第賁于棖闑慶及子孫覩兹盛儀實愧虛受無任欣戴屏營之至謝男師損等官表伏見今月一日制授臣長男師損祕書省著作郎次男式方太常寺主簿又得進奏官裴遘狀報伏承聖恩特降中使送官告到臣宅分付師損者寵渥非常授任不次驚躍無措靦懼失容云云臣謬分重寄獲守外藩受恩既深無績可紀男師損等器惟凡品教闕義方蚤沐叡慈已階官次每懐塵忝常誡滿盈豈謂鴻霈曲覃大明私照寛臣尸素之責念臣葵藿之誠下延𦙍息叨踐班級天書出禁中貴臨門榮冠等夷慶流宗族況著作乃論撰之地唯才吏是居太常寔禮樂之司非儒者勿履顧兹庸昧忽此超昇内省慙惶若墜氷谷伏以聖朝立制建官惟賢名實無􅆾輪轅盡適㣲臣父子獨為幸人非據踰涯自中徂外虛受丘山之賜實増負乗之憂進退彷徨不知所據無任戰汗屏營之至謝端午日賜物表臣某言中使劉光弼至奉宣聖㫖慰勞臣及將佐官吏僧道耆夀百姓等兼賜臣墨詔并衣一副金花銀器三事綵絲一軸大將衣四副綵絲五軸寵光薦至慶賜曲霑抃舞失容捧戴無力伏以朱明仲月端午佳辰萬國被薫風之和九天垂湛露之澤臣幸逢休運獲守外藩叨承叡慈猥受榮賚發詔而煥窺宸象振衣而頓失炎威色絲表祥載光於佩服珍器充玩盡飾於圓方恩輝既盈喜懼交集下延裨將共荷鴻私無任感戴之至謝墨詔表臣某言中使陳日華至奉宣聖㫖慰勞臣及將佐官吏僧道耆夀百姓等兼賜臣墨詔恩降紫泥澤流下土跪奉自天之命遙馳捧日之心云云伏以皇帝陛下凝旒穆清軫念黎獻巳洽雍熙之化尚存宵旰之勤逺降王人特迂宸翰慰安稠疊曉諭便蕃任重力㣲不知上荅應縁戎旅庶務謹具别狀奏聞伏乞皇明俯賜昭鑒無任感戴屏營之至劉賔客文集巻十二欽定四庫全書劉賔客文集巻十三唐劉禹錫撰表章三
