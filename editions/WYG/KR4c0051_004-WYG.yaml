body:
  text: 郡内書情獻裴侍中留守功成頻獻乞身章擺落襄陽鎮洛陽萬乗旌旗分一半八方風雨㑹中央兵符今奉黄公畧書殿曽隨翠鳯翔心寄華亭一雙鶴日陪髙步繞池塘詶樂天閒卧見寄散誕向陽眠將閑敵地仙詩情茶助爽藥力酒能宣風碎竹間日露明池底天同年未同隠縁乞買山錢詶樂天小亭寒夜有懷寒夜隂雲起疎林宿鳥驚斜風閃燈影迸雪打窻聲竟夕不能寐同年知此情漢皇無奈老何況本書生奉和裴晉公凉風亭睡覺驪龍睡後珠元在仙鶴行時步又輕方寸瑩然無一事水聲來似玉琴聲和樂天閒園獨賞八韻前以蜂鶴拙句寄呈今辱蝸蟻妍詞見答因成小巧以取大咍永日無人事芳園注興行陶廬樹可愛潘宅雨新晴傅粉琅玕節薫香菡萏莖榴花裙色好桐子藥圓成柳蠧枝偏亞桑閒葉再生睢盱欲鬬雀索漠不言鶯動植隨四氣飛沈含五情槍榆與水擊小大强為名詶樂天衫酒見寄酒法衆傳呉米好舞衣偏向越羅輕動搖浮蟻香濃甚装束輕鴻意態生閱曲定知能自適舉杯應歎不同傾終朝相憶終年别對景臨風無限情兩何如詩謝裴令公贈别二首一言一顧重重何如今日陪遊清洛苑昔年别入承明廬一東一西别别何如終期大冶再鎔鍊願託扶搖翔碧虛將之官留辭裴令公留守祖帳臨伊水前旌指渭河風烟里數少雲雨别情多重疊受恩久邅迴如命何東山與東閣終異再經過詶喜相遇同州與樂天替代舊託松心契新交竹使符行年同甲子筋力羨丁夫别後詩成帙攜來酒滿壺今朝停五馬不獨為羅敷前章所言春草白君之舞妓也故有此答奉和裴令公新成緑野堂即書藹藹鼎門外澄澄洛水灣堂皇臨緑野坐卧看青山位極却忘貴功成欲愛閒官名思管籥心術去機闗禁苑凌晨出園花及露攀池塘魚拔刺竹逕鳥綿蠻志在安瀟灑嘗經歴險艱髙情方造適衆意望徵還好客交珠履華筵舞玉顔無因隨賀燕翔集畫梁間自左馮歸洛下詶樂天兼呈裴令公新恩通籍在龍樓分務神都近舊丘自有園公紫芝侣時賔行四人盡在洛中仍追少傅赤松遊華林霜葉紅霞晚伊水晴光碧玉秋更接東山文酒㑹始知江左未風流王儉云江左風流宰相唯有謝安秋齋獨坐寄樂天兼呈呉方之大夫空齋寂寂不生塵藥物方書繞病身纎草數莖勝静地幽禽忽至似佳賔世間憂喜雖無定釋氏銷磨盡有因同向洛陽閒度日莫教風景屬他人和樂天齋戒月滿夜對道場偶懷詠常脩清靜去繁華人識王城長者家案上香烟鋪貝葉佛前燈焰透蓮花持齋已滿招閒客理曲先聞命小娃明日若過方丈室還應問為法來耶呉方之見示獨酌小醉首篇樂天續有詶答皆含戲謔極至風流兩篇之中並䝉見屬輒呈濫吹益美來章閒門共寂任張羅靜室同虛養太和塵世歡娯開意少醉鄉風景獨遊多散金疎傅尋常樂枕麴劉生取次歌計㑹雪中爭挈榼鹿裘鶴􅌁逓相過詶樂天齋滿日裴令公置宴席上戲贈一月道場齋戒滿今朝華幄管絃迎銜杯本自多狂態事佛無妨有佞名酒力半酣愁已散文鋒未鈍老猶爭平陽不獨容賔醉聴取喧呼吏舍聲詶樂天偶題酒瓮見寄従君勇斷抛名後世路榮枯見㡬回門外紅塵人自走甕頭清酒我初開三冬學任胷中有萬户侯須骨上來何幸相招同醉處洛陽城裏好池臺答裴令公雪中訝白二十二與諸公不相訪之什玉樹瓊樓滿眼新的知開閤待諸賔遲遲未去非無意擬作梁園坐右人詶樂天請裴令公開春加宴髙名大位能兼有恣意遨遊是特恩二室烟霞成步障三州風物是家園晨窺苑樹韶光動晚度河橋春思繁絃管常調客常滿但逢花處即開樽樂天示過敦詩舊宅有感一篇吟之泫然追想昔事因成繼和以寄苦懐凄凉同到故人居門枕寒流古木疎向秀心中嗟棟宇蕭何身後散圖書本營歸計非無意唯算生涯尚有餘忽憶前因更惆悵丁寧相約速懸車敦詩與予及樂天三人同甲子平生相約同休洛中呉方之見示聴江西故吏朱幼恭歌三篇頗有懐故林之思吟諷不足因而和之侯家故吏歌聲發逸處能髙怨處低今嵗洛中無雨雪眼前風景是江西閒坐憶樂天以詩問酒熟未案頭開縹帙肘後檢青囊唯有達生理應無治老方減書存眼力省事養心王君酒何時熟相攜入醉鄉和樂天洛城春齊梁體八韻帝城宜春入遊人喜意長草生季倫谷花出莫愁坊斷雲發山色輕風漾水光樓前戲馬地樹下鬬雞場白頭自為侣緑酒亦滿觴潘園觀種植謝墅閱池塘至門似隠逸過老不悲傷相問焉功徳銀黄遊故鄉三月三日與樂天及河南李尹奉陪裴令公泛洛禊飲各賦十二韻洛下今脩禊羣賢勝㑹稽盛筵陪玉鉉通籍盡金閨波上神仙妓岸傍桃李蹊水嬉如鷺振歌響雜鶯啼歴覽風光好沿洄意思迷棹歌能儷曲墨客競分題翠幄連雲起香車向道齊人誇綾步障馬惜錦障泥塵暗宫牆外霞明苑樹西舟形隨鷁轉橋影與虹低川色晴猶逺烏聲暮欲棲唯餘踏青伴待月魏王堤寄和東川楊尚書慕巢兼寄西川繼之二公近従弟兄情分偏睦早忝遊舊因成是詩太華蓮峯降嶽靈兩川棠樹接郊坰政同兄弟人人樂曲奏塤箎處處聴楊葉百穿榮㑹府芝泥五色耀天庭各抛筆硯誇旄鉞莫遣文星讓將星秋中暑退贈樂天暑服宜秋著清琴入夜彈人情皆向菊風意欲摧蘭嵗稔貧心泰天凉病體安相逢取次第却甚少年歡和樂天洛中雪中宴集寄汴州李尚書洛城無事足杯盤風雪相和嵗欲闌樹上因依見寒鳥坐中收拾盡閒官笙歌要請頻何爽笑語忘機拙更歡遙想兔園今日㑹瓊林滿眼映旂竿喜遇劉二十八偶書兩韻聨句病來佳興少老去舊遊稀笑語縦横作盃觴絡繹飛度清談如水玉逸韻貫珠璣髙位當金鉉虛懐似布衣禹錫巳榮狂取樂仍任醉忘機捨眷將何適留歡便是歸居易鳳儀常欲附蛟力自知微願假樽罍末膺門自此依紳劉二十八自汝赴左馮塗經洛中相見聨句不歸丹掖去銅竹漫云云唯喜因過我須知未賀君度詩聞安石詠香見令公熏欲首函闗路來披緱嶺雲居易貂蟬公獨步鴛鷺我同羣插羽先飛酒交鋒便戰文紳鎮嵩知表徳定鼎為銘勲顧鄙容商洛徵歡候汝墳禹錫頻年多謔浪此夕任喧紛故態猶應在行期未要聞度游藩榮已久捧袂惜將分詎厭杯行疾唯愁日向曛居易窮隂初莽蒼離思漸氤氲殘雪午橋岸斜陽伊水濆紳上謨尊右掖全畧靜東軍萬頃徒稱量滄溟詎有垠禹錫予自到洛中與樂天為文酒之㑹時時搆詠樂不可支則慨然共憶夢得而夢得亦分司至止歡愜可知因為聨句成周文酒㑹吾友勝鄒枚唯憶劉夫子而今又到來度欲迎先倒屣亦坐便傾盃飲許伯倫右詩推公幹才並以本事居易久曽聆郢唱重喜上燕臺晝話牆隂轉宵歡斗柄迴禹錫新聲還共聴故態復相咍遇物皆先賞従花半未開度起時烏帽側散處玉山頽墨客諠東閣文星犯上台居易詠吟君稱首疎放我為魁憶戴何勞訪隨夢得夢得分司而來留髠不用猜宴席上老夫暫起樂天宻坐不動足奉觴承麴蘖落筆捧瓊瑰醉弁無妨側詞鋒不可摧此兩韻美令公也居易水軒看翡翠石徑踐莓苔童子能騎竹佳人解詠梅陪遊南宅之境禹錫洛中三可矣鄴下七悠哉自向風光急不須絃管催度樂觀魚踴躍閒愛鸖裵􅏆烟柳青凝黛波萍緑撥醅居易春榆初改火律管又飛灰紅藥多遲發碧松宜亂栽禹錫馬嘶駞陌上鷁泛鳯城隈色色時堪惜㱔㱔病莫推度涸流尋軋軋餘刃轉恢恢従此知心伏無因敢自媒禹錫室隨親客入席許舊寮陪逸興嵇將阮交情陳與雷此二句屬夢得也居易洪爐思哲匠大厦要羣材佗日登龍路應知免曝鰓禹錫洛中早春贈樂天漠漠復靄靄半晴將半隂春來自何處無迹日以深韶嫩水後木輕盈烟際林藤生欲有託柳弱不自任花意已含蓄鳥言尚沈吟期君當此時與我恣追尋飜愁闌漫後春暮却傷心和樂天讌李周美中丞宅池上賞櫻桃花櫻桃千萬枝照耀如雪天王孫讌其下隔水疑神仙宿露發清香初陽動暄妍妖姬滿鬢插酒客折枝傳同此賞芳月㡬人有華筵杯行勿遽辭好醉逸三年和牛相公遊南莊醉後寓言戲贈樂天兼見示城外園林初夏天就中野趣在西偏薔薇亂發多臨水鸂鶒雙遊不避船水底逺山雲似雪橋邊平岸草如烟白家唯有盃觴興欲把頭盤打少年思黯南墅賞牡丹花偶然相遇人間世合在増城何姥家有此傾城好顔色天教晚發賽諸花樂天少傅五月長齋廣延緇徒謝絶文友坐成暌間因以戲之五月長齋戒深居絶送迎不離通徳里便是法王城舉目皆僧事全家少俗情精脩無上道結念未來生賔閤緇衣占書堂信鼓鳴戲童為塔象啼鳥學經聲黍用青菰角葵承玉露烹馬家供薏苡劉氏餉蕪菁暗網籠歌扇流塵晦酒鐺不知何次道作佛㡬時成樂天池館夏景方妍白蓮初開綵舟空泊唯邀緇侣因以戲之池館今正好主人何寂然白蓮方出水碧樹未鳴蟬靜室宵聞磬齋㕑晚絶烟蕃僧如共載應不是神仙詶樂天晚夏閑居欲相訪先以詩見貽池榭堪臨泛翛然散鬱陶步因驅鸖緩吟為聴蟬髙林宻添新竹枝低縋晚桃酒醅晴易熟藥圃夏頻薅老是班行舊閒為鄉里豪經過更何處風景屬吾曹詶樂天感秋凉見寄庭晚初辨色林秋微有聲槿衰猶强笑蓮迥却多情簷燕歸心動韝鷹俊氣生閑人占閒景酒熟且同傾樂天以愚相訪沽酒致歡因成七言聊以奉答少年曽醉酒旗下同輩黄衣頷亦黄蹴踏青雲尋入仕蕭條白髮且飛觴令徵古事歡生雅客喚閒人興任狂猶勝獨居荒草院蟬聲聴盡到寒螿秋晚新晴夜月如練有懷樂天雨歇晚霞明風調夜景清月髙微暈散雲薄細鱗生露草百蟲思秋林千葉聲相望一步地脈脈萬重情和思黯南莊見示丞相新家伊水頭智囊心匠日増脩化成池沼無痕跡奔走清波不自由臺上看山徐舉酒潭中見月慢回舟従來天下推尤物合屬人間第一流同留守王僕射各賦春中一物從一韻至七鶯能語多情春將半天欲明始逢南陌復集東城林疎時見影花宻但聞聲營中縁催短笛樓上來定哀箏千門萬户垂楊裏百囀如簧烟景晴和樂天春詞依憶江南曲拍為句春去也多謝洛城人弱柳従風疑舉袂叢蘭裛露似霑巾獨坐亦含嚬謝樂天聞新蟬見贈碧樹有蟬後烟雲改容光瑟然引秋氣芳草日夜黄夾道喧古槐臨池思垂楊離人下憶淚忠士激剛腸昔聞阻山川今聴同匡牀人情便所遇音韻豈殊常因之比笙竽送我遊醉鄉新秋對月寄樂天月露發光彩此時方見秋夜凉金氣應天靜火星流蛩響偏依井螢飛直過樓相知盡白首清景復追遊詶樂天小臺晚坐見憶小臺堪逺望獨上清秋時有酒無人勸看山祗自知幽禽轉新竹孤蓮落靜池髙門勿遽掩好客無前期早秋雨後寄樂天夜雲起河漢朝雨洒髙林梧葉先風落草蟲迎濕吟簟凉扇恩薄室靜琴思深且喜炎前别安能懐寸隂和樂天秋凉閒卧暑退人體輕雨餘天色改荷珠貫索斷竹粉殘粧在髙僧掃室請逸客登樓待槐柳漸蕭疎閒門少光彩秋晚病中樂天以詩見問力疾奉酬耳虛多聴逺展轉晨雞鳴一室背燈卧中夜掃葉聲蘭芳經雨敗鸖病得秋輕肯踏衡門草唯應是友生和樂天燒藥不成命酒獨醉九轉欲成就百神應主持鶯啼鼎上去老貌鏡中悲却顧空丹竈回心向酒巵醺然耳熱後暫似少年時詶樂天詠老見示人誰不願老老去有誰憐身瘦帶頻減髮稀冠自偏廢書縁惜眼多炙為隨年經事還諳事閱人如閱川細思皆幸矣下此便翛然莫道桑榆晚為霞尚滿天嵗夜詠懐彌年不得意新嵗又如何念昔同遊者而今有㡬多以閒為自在將夀補蹉跎春色無新故幽居亦見過元日樂天見過因舉酒為賀漸入有年數喜逢新嵗來震方天籟動寅位帝車回門巻掃殘雪林園驚早梅與君同甲子夀酒讓先杯裴令公見示詶樂天寄奴買馬絶句斐然仰和且戲樂天常奴安得似方回爭望追風絶足來若把翠娥酬緑耳始知天下有竒才詶思黯代書見戲官冷如漿病滿身凌寒不易過天津少年留守多情興請待花時作主人詶思黯見示小飲四韻抛却人間第一官俗情驚怪我方安兵符相印無心戀洛水嵩雲恣意看三足鼎中知味久百尋竿上擲身難追呼故舊連宵飲直到天明興未闌詶樂天醉後狂吟十韻來章有移家惟醉和之句散誕人間樂逍遙地上仙詩家登逸品釋氏悟真筌制誥留臺閤歌詞入管絃處身於木鴈任世變桑田吏隠情兼遂儒𤣥道兩全八闗齊適罷三雅興尤偏文墨中年舊松筠晚嵗堅魚書曽替代香火有因縁陸法和云與梁元帝於空王寺佛前訂香火因緣欲向醉鄉去猶為色界牽好吹楊柳曲為我舞金鈿詶牛相公獨飲偶醉寓言見示宫漏夜丁丁千門閉霜月華堂列紅燭絲管靜中發歌眉低有思舞體輕無骨主人啓酡顔酣暢浹映髮猶思城外客阡陌不可越春意日夕深此歡無斷絶和僕射牛相公春日閒坐見懐官曹崇重難頻入第宅清閒且獨行階蟻相逢如偶語園蜂速去恐違程人於紅藥惟看色鶯到垂楊不惜聲東洛池臺怨抛擲移文非久㑹應成牛相公見示新什謹依本韻次用以抒下情劇韻新篇至因難始有能雨天龍變化晴日鳳騫騰遊海驚何極聞韶素不曽愜心時拊髀擊節自麾肱符彩添俞墨波瀾起剡藤揀金光熠熠累璧勢層層珠媚多蔵賈花撩欲定僧封來真寳物寄與媿文朋巳老無時疾時洛中時癘多傷少年長貧望嵗登雀羅秋寂寂蟲翅曉薨薨羸驥方辭絆虛舟已絶絙榮華甘死别健羨亦生憎玉柱琤瑽韻金觥雹凸稜何時良宴㑹促膝對華燈秋霖即事聨句三十韻蕭索窮秋月蒼茫苦雨天泄雲生棟上行潦入庭前居易送上僕射苔色侵三徑波聲想五絃井蛙爭入户轍鮒亂歸泉起送上中丞大監髙霤愁晨坐空階警夜眠鶴鳴猶未已蟻穴亦頻遷禹錫送上少傅侍郎散漫疎還宻空濛斷又連竹霑青玉潤荷滴白珠圓居易地濕灰蛾滅池添水馬憐有苗霑霢霂無月弄潺湲起籬菊潛開秀園蔬已罷鮮斷行隨鴈翅孤嘯聳鳶肩禹錫橋柱黏黄菌牆衣㸃緑錢草荒行藥路沙淀釣魚船居易長者車猶阻髙人榻且懸此思劉台之來也金烏何日見玉爵㡬時傳起近井桐先落當簷石欲穿趨風誠有戀披霧邈無縁禹錫以答懸榻之召廩米陳生醭庖薪濕起烟鳴鷄潜起曉急景暗彫年居易葢洒髙松上絲繁細柳邊拂叢時起蝶墜葉乍驚蟬起巾角皆爭墊裙裾别似湔人多䝉翠被馬盡著連乾禹錫好客無來者貧家但悄然寒泥印鶴跡漏壁絡蝸涎居易蚊聚雷侵室鷗翻浪滿川上樓愁羃羃遶舍厭濺濺起律候今秋矣歡娯久曠焉但令髙興在晴後奉周旋禹錫喜晴聨句苦雨晴何喜喜於未雨時氣收雲物變聲樂鳥烏知居易送上僕射蕙泛光風圃蘭開皎月池千峯分逺近九陌好追隨起送上尚書白日開天路𤣥隂巻地維餘清在林薄新照入漣漪禹錫碧樹凉先落青蕪濕更滋㬠毛經浴鶴曳尾出泥龜居易舞去商羊速飛來野馬遲柱邊無潤礎臺上有遊絲起橋淨行塵息堤長禁柳垂宫城開睥睨觀闕麗罘罳禹錫洛水澄清鎮嵩烟展翠帷梁成虹乍見市散蟣初移居易藉草風猶暖攀條露已晞屋穿添碧瓦牆缺召金縋起迥澈來雙目昏煩去四支霞文晚煥爛星彩夕參差禹錫爽助門庭肅寒摧草木衰黄乾向陽菊紅洗得霜梨居易假葢閑誰惜彈絃燥更悲散蹄良馬穏炙背野人宜起洞户晨輝入空庭宿霧披推牀出書目傾笥上衣椸禹錫道路行非阻軒居望可期無辭訪圭竇且願見瓊枝居易山閣蓬萊客古以祕書喻蓬萊儲宫羽翼師此言少傅每優陪麗句何暇覿英姿起以酬圭竇之言翫景方搔首懷人尚斂眉因吟仲文什髙興盡於斯禹錫㑹昌春連宴即事元年寒食日上已暮春天雞黍三家㑹鶯花二節連居易光風初淡蕩美景漸暄妍簮組蘭亭上車輿曲水邊禹錫松聲添奏樂草色助鋪筵雀舫宜閒泛螺杯任漫傳起園蔬香帶露㕑柳暗蔵烟麗句輕珠玉清談勝管絃居易陌喧金距鬭樹動綵繩懸姹女粧梳豔遊童衣服鮮禹錫圃香知種蕙池暖憶開蓮怪石雲疑觸夭桃火欲燃起正歡唯恐散雖醉未思眠嘯傲人間世追隨地上仙居易燕來雙涎涎鴈去累翩翩行樂真吾事尋芳獨我先禹錫滯周慙太史太史公留滯周南今榮示慙古人矣入洛繼先賢此言劉白聲價與二陸爭長矣昔恨多分手今歡謬比肩起病猶陪讌飲老更奉周旋望重青雲客情深白首年居易遍嘗珍饌後許入畫堂前舞袖翻紅炬歌鬟插寳蟬禹錫斷金多感激倚玉貴遷延説史吞顔注論詩笑鄭箋起松筠寒不變膠漆冷彌堅興伴王尋戴謂隨僕射過尚書也榮同隗在燕居易自謂擲盧誇使氣刻燭鬬成篇實藝皆三捷虛名愧六聨禹錫興闌猶舉白話靜毎思𤣥更説歸時好亭亭月正圓起僕射來示有三春向晚四者難并之説誠哉是言輒引起題重為聨句疲兵再戰勍敵難降下筆之時囅然自哂走呈僕射兼簡尚書三春今向晚四者昔難并借問低眉坐何如攜手行居易舊遊多過隙新宴且尋盟鸚鵡林須樂麒麟閣未成起分隂當愛惜遲景好逢迎林野薫風起樓臺穀雨晴禹錫牆低山半出池廣水初平橋轉長虹曲舟回小鷁輕居易殘花猶布繡宻竹自聞笙欲過芳菲節難忘宴慰情起月輪行似箭時物勢如傾見鴈隨兄去聴鶯來友聲禹錫蕙長書帶展菰嫩剪刀生坐宻衣裳暖堂虛絲管清居易峯巒侵碧落草木近朱明與㸃非沂水陪膺是洛城白嘗為三川守故云起撥醅爭緑醑卧酪待朱櫻㡬處能留客何人喚解酲禹錫舊儀尊右揆新命寵春卿有喜鵲頻語無機鷗不驚居易青林思小隠白雪仰芳名訪舊殊千里登髙賴九城起鄼侯司管鑰疎傅傲簮纓綸綍曽同掌烟霄即上征禹錫册庭嘗接武書殿忝連衡蘭室春彌馥松心晚更貞居易琴招翠羽下釣掣紫鱗呈只願回烏景誰能避兕觥起方知醉兀兀應勝走營營鳯閣鸞臺路従他年少爭居易更呈二公樂天是月長齋鄙夫此時愁卧里閭非逺雲霧難披因以寄懐遂為聨句所期解悶焉敢驚禪五月長齋月文心苦行心蘭蔥不入户薝蔔自成林夢得䕶戒先辭酒嫌喧亦徹琴塵埃賔位靜香火道場深樂天我靜馴狂象餐餘施衆禽定知於佛佞豈復向書淫夢得欄藥凋紅豔庭槐換緑隂風光徒滿目雲霧未披襟樂天樹為清凉倚池因盥漱臨蘋芳遭燕拂蓮坼待蜂尋夢得舍下環流水窻中列逺岑苔斑錢剝落石怪玉嶔崟樂天鵲頂迎秋秃鶯喉入夏瘖柳絲垂色綖棘刺露長針夢得散秩身猶幸趨朝力不任官將方共拙年與病交侵樂天徇樂非時選忘機似陸沈鑒容稱四皓捫腹有三壬夢得攜手慙連璧同心許斷金紫芝雖繼唱前後各在賔客白雪少知音樂天憶罷呉門守相逢楚水潯舟中頻曲宴夜後各加斟夢得濁酒銷殘漏絃聲間逺砧酡顔舞長袖宻坐接華簪樂天持論峯巒峻戰文矛㦸森笑言誠莫逆造次必相箴夢得往事應如昨餘歡迄至今迎君常倒屣訪我輒攜衾樂天隂魄初離畢將有後雨陽光正在參五月之節待公休一食縦飲共狂吟夢得劉賔客外集巻四欽定四庫全書劉賔客外集巻五唐劉禹錫撰雜
