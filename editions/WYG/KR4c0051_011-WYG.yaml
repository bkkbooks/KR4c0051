front:
  text: 文集巻一唐劉禹錫撰
  hash: sha256:7f9d1c444994c37e622c2711a1f62f0e174f7c61567cf4ea15b1f18b01c5afc9
body:
  text: 賦問大鈞賦始余失臺郎為刺史又貶州司馬俟罪朗州三見閏月人咸謂數之極理當遷焉因作謫九年賦以自廣是嵗臘月詔追明年自闕下重領連山郡印綬人咸曰美惡周必復第行無恤嵗杪其復乎居五年不得調嵗二月有事于社前一日致齋孤居慮靜滯念欻起伊人理之不可以曉也將質諸神乎謹貢誠馳精敢問大鈞其夕有遇寤而次第其詞以為賦圓方相函兮浩其無垠窅㝠翕闢兮走三辰以騰振孰主張是兮有工其神迎隨不見兮强名之曰大鈞敧以臨下兮巍乎雄尊天為獨陽髙不可問工居其中與人差近身執其權心乎其運循名想象斯可以訊曰嘻䝉之未生其猶泥耳落乎埏埴唯鈞所措忽然為人為幸大矣工賦其形七情與俱嗇智不授畀之以愚坦坦之衢萬人所趨䝉一布武化為畏途人或譽平聲之百説徒虛人或排之半言有餘物壯則老乃唯其常否終則傾亦不可長老先期而驟至兮否踰數而叵量雖一夫之不獲兮亦大化之攸病謹薦誠上問兮俛伏以聴是夕寢熟夢遊乎無何有之鄉抗陛級乎重霄兮異人間之景光中有威神兮金甲而煒煌頷之使前兮其音琅琅曰吾大化之一工也居上臨下亷其不平汝今有辭吾一以聴播形肖貌生類積億橐籥圏匡鎔鍊消息我之司智初不爾嗇不守以愚覆為汝賊既賦汝形輔之聰明盍求世師資適攸宜胡然抗志遐想前烈倚梯青㝠舉足斯跌韜爾智斧無為自伐鑿竅太繁天和乃洩利逕前誘多逢覆轍名腸内煎外火非熱今哀汝窮將厚汝愚剔去剛健納之柔濡塞前竅之傷痍兮招太和而與居貫以待人兮急以自拘道存壼奥無示四隅軋物之勢不作兮見傷之機自無汝不善用吾焉嗇乎且夫貞而騰氣者膴膴健而垂精者昊昊我居其中猶輪是蹈以不息為體以日新為道倮鱗蜚走灌莽苞皁乃牙乃甲乃殈乃剖陽榮隂悴生濡死薧各乗氣化不以意造賦大運兮無有淑惡彼多方兮自生醜好爾奚不徳余以驟壯姑尤我以速老邪觀汝百為又或不然赤子哇哇急其能言亦既名物㡬時蹁躚春耕其丘投種之日釋耒而歎何時粟實望所未至謂余舒舒欲其久留謂我瞥如我一子二誰之曲歟彼蒹葭之蒼蒼兮霜霰苦而中堅松竹之皸皴索籜兮不若榯荀之可憐納材葦而構明堂兮固容消而力完揚且之晳兮不可以常然當錫爾以老成蒼眉皓髯山立時行去敵氣與矜色兮噤危言以端誠俾人望之侮黷不生爾之所得孰與壯多不善處老問余而何受教而回蘧蘧形開嚮之威神孰為來哉乃遽衣促盥端慮滌想委佩低簪持簿叩顙而言曰楚臣天問不詶今臣過幸一獻三售始厚以愚終期以夀忘上問之罪濯已然之咎心憎故術腹飽新授馳神清𤣥拜手稽首砥石賦時在朗州南方氣泄而雨淫地慝而傷物嫗神噫濕渝色壞味雖金之堅亦失恒性始余有佩刀甚良至是澀不可拔剖其室乃出遡陽眇眡傳刃䝉脊鱗然如痏痂如黒子如青蠅之惡銳氣中錮猶人被病然客有聞焉褁宻石以遺余沃之草腴雜以鳥膏切劘下上真質焯見躊躇四顧逌余周切爾謝客微子之貽㡬喪吾寳客曰吾聞諸梅福曰爵禄者天下之砥石也髙皇帝所以礪世摩鈍有是邪余退感其言作砥石賦我有利金兮以利為佩遭土卑而慝作兮雄鋩為之潛晦如景昏而蝕既兮與肌漆而為癘顧秋蓬之不可刜兮尚可遊乎髖髀之外利物䝉蔽材人惆悵俾百汰之至精蟠一檢而多恙豈害氣之獨然兮將久不試而然彼屠者之刃兮獵者之鋋不灌不淬兮揉錯銜鈆日鼓月揮兮刲腴擊鮮晥㸌􅜱以耀芒蓊淫夷而騰羶豈不涉暑而䝉沴兮鼎用之而成妍有客自東遺余越砥圭形石質蒼色膩理剗其鱗皴滑以滫瀡如衣澣垢如鼎出否霧盡披天萍開見水拭寒焰以破眥擊清音而振耳故態復還寳心再起既賦形而終用一䝉垢焉何恥感利鈍之有時兮寄雄心於瞪視嗟乎石以砥焉化鈍為利法以砥焉化愚為智武王得之商俗以厚髙帝得之傑材以奏得既有自失豈無因漢氏以還三光景分隨道闊狹用之得人五百餘年唐風始振懸此大砥以礱兆民播生在天成器在君天為物天君為人天安有執礪世之具而患乎無賢歟楚望賦予既謫于武陵其地故郢之裔邑與夜郎諸夷錯雜繫乎天者隂伏陽驕是已繫乎人者風巫氣窳是已囂雰浮浮利于樓居城之麗譙實鄰所舍四垂無蔽萬景坌入因道其逺邇所得為楚望賦云翼軫之野祝融司方隂迫而專專實生沴天濡而雺土洩而泥氣罕淑清兮淫氛曀曀中人體支兮為瘥為瘵以曠滌煩兮利居髙于物外我卜我居于城之隅宛在藩落麗譙渠渠四阿垂空洞户發樞眸子不運坐陵虛無嵗更周流時極慘舒萬象起滅森來貺予櫺軒之外羣山巃嵸岡陵靡阤勢若相拱出雲見怪窈蔚森聳露夕霞朝望如飛動簷廡之下大江澒洞支流合輸泄入雲夢羲和望舒出沒兩涯涵泳之族聱牙㰹呀秋水灌盈漩石飄沙流枿軒昻舞于盤渦逮及收潦澹如緑醽白石磷磷倒影羅生蘋末風起有文無聲悠逺烟緜與空蒼然湘沅之春先令而行臘月寒盡温風發榮土膏如濡言鳥嚶嚶三星嘒其曉中植物颯以飄英雲歸髙唐草蔽洞庭目與天盡神將化并圎方相涵遊氣杳冥熙熙藹藹藻飾羣形枿樹童丘積空凝青環洲曲塘含景曜明恢台之氣發于春季涉夏如鑠逮秋愈熾土山焦熬止水瀵沸翔禽跕墮呀咮垂翅曦赫歊蒸陽極反隂二儀交精下上相歆雲興天際歘若車葢凝矑未瞬彌漫霮䨴驚雷出火喬木糜碎殷地􅅡空萬夫皆廢懸霤綆縋日中見昧移晷而收野無完塊少隂之中景物澄鮮丹葉星房燭耀川原夕月既望曜于丹泉上鏡下冰湔塵濯烟宿麗潛芒獨行髙躔皓一氣之悠然潔有形而溢清𤣥杳㣲明而斐斖想遊目於化先夜無眹以徂征金霞暈乎海壖明星方揚斜漢西懸璿柄如墮半沈層瀾雞啁唽而晨鳴兮日荏苒以騰晶動植瞭兮已分山川鬱乎不平復人寰之諠卑洶浩浩以營營追向時之景光不可驟得以再更意華胥之夢還猶仿像而馳精日次于房天未降霜百卉猶澤水泉收脈故道朘音宣削衍為廣斥水禽嬉戲引吭伸翮紛驚鳴而決起拾綵翠于沙礫時時壮風振槁揚埃蕭條邊聲與鴈俱來寒氛委積萬竅交激楚雲改容飛雨凝滴灑林遞響淅瀝捎槭飛電照雪以騰光柔蔬傲霜而秀坼躔次殊氣川谷異宜民生其間俗鬼言夷招三閭以成謡徳伏波而構祠投粔籹尼吕反以鼓檝豢鱣魴而如犧蟠木靚深孼祅憑之祈年去癘蠲敬祗威擊鼓肆筵河旁水湄薦誠致祝郤略躨跜躨跜虯龍動皃靈光賦渚居鱻食大掩水物罟張餌㗖不可遁伏顯舉潛縋晝撞夜觸設機沈深如拾于陸彼遊儵之瑣類咸跳脫於窘束雖三趾與六眸時或加乎一目亦有輕舟軒輊泛浮拕綸往復馴鷗相逐莫夜澄寂嘯歌羣族傖音俚態幽怨委曲逗踈柝扵江城引哀猨於山木巢山之徒抨木開田灼龜伺澤兆食而燔鬱攸起于巖阿騰絳氣而蔽天熏歇雨濡穎垂林巔盜天和而藉地勢諒無勞而有年罷士閒人逸為末作求金渚涘淘汰瀺灂流注濻沱繁光熠爚貪賈來貿發於懐握無翼而飛潤于豐屋哂耕耘之悒悒徒胼胝以自鞫我處層軒日星回還閱天數而視民風百態變見乎其間非耳剽以臆說兮固幽求而縦觀觀物之餘遂觀我生何廣覆與厚載豈有形而無情髙莫髙兮九閽逺莫逺兮故園舟有檝兮車有轄江山坐兮不可越吾又安知其所如怳臨髙以觀物傷往賦人之所以取貴於蜚走者情也而誕者以遣情為智豈至言邪予授室九年而鰥痛若人之夭閼弗遂也作賦以傷之冀夫覽者有以増伉儷之重云歎獨處之邑邑兮憤伊人之我遺情可殺而猶毒境當歡而復悲人或朝歎而莫息夫何越月而踰時太極運乎三辰轉寒暑而下馳有歸於無兮盛復于衰猶昧爽之必莫又安得而怨咨我今怨夫若人兮曽旭旦而潛暉飄零日及之萼日及槿也朝生暮落一名王蒸爾雅倐忽蜉蝣之衣川走下而不還露迎暘而易晞恩已甚兮歎絶見無期兮永思我行其野農民桑者舉按來饁亦在林下我觀于途禆販之夫同荷均挈荆釵布襦羽毛之蕃鱗介之㣲和鳴灌叢雙泳漣漪薨薨伊蟲蠢蠢伊豸逰空穴深兩兩相比何動類之萬殊必雄雌而與俱物莫失儷以孤處我方踽踽而焉如我復虛室目凄凉兮心伊欝心伊欝兮將語誰坐匡牀兮撫嬰兒何所丐沐兮何従仰飴􅃭袴在身兮昔圍蹉跌鞶囊附臂兮餘馥葳蕤誠天性之潛感顧童心兮如疑嘵然有難繼之慕漠然減好弄之姿指遺挂兮能認遡空帷兮欲歸我入寝宫痛人亡兮物改其容寳瑟偃兮弦柱絶瑶臺傾兮鏡奩空寒罏委灰虛幌多風隙駒晨轉牕蟾夜通步揺昏兮網黏翡翠芳褥掩兮塵化蛩蛩閱刀尺之餘澤見巾箱之故封玩服儼兮猶具繁華謝兮焉従想翩躚於是非求僁窣與㝠䝉信竒術之可致嗟此生兮不逢徒注視以寂聴怳神疲而目窮還抱影以獨出紛百哀而攻中系曰龍門風霜苦别鶴哀鳴夜銜羽呉江波浪深雌劍一去無遺音悲之來兮憒予心洶如行波洊浸淫悵縁情而莫極思執禮以自箴已焉哉苒苒生死悠悠古今乗彼一氣兮聚散相尋或鼓而興或罷而沈以無涯之情愛悼不駐之光隂諒自迷其有分徒終怨於匪忱彼䝉莊兮何人予獨累歎而長吟何卜賦余既幼惑力命之說兮身久放而愈疑心回穴其莫曉兮將取質夫秉龜楚人俗巫而好術兮叟有鬻卜而来思乃招而祝之曰嘻人莫不塞有時而通伊我兮久而愈窮人莫不病有時而間伊我兮久而滋蔓吾聞人肖五行動止有則四時轉續變於所極一嵗之旱人斯具舟三月之熱人斯具裘極必反焉其猶合符予首圓而足方予腹隂而背陽胡形象之有肖而變化之殊常經曰剥極則賁居賁而未嘗剥者其誰否極受泰居否而未嘗泰者又其誰鶴胡不截鳬胡不禆䕫何罰而踸踔蚿何功而扶持紛紜恣睢交作舛馳似予似奪似信似欺孰主張之問于子龜卜者曰招我以粗問我以㣲有天下之是非有人人之是非在此為美兮在彼為嗤或昔而成或今而虧君問曷由主張其時時乎時乎去不可邀來不可逃淹兮闕孰捨孰操豕喙之毒堇鷄首之賤毛各於其時而伯音霸其曹屠龍之伎非曰不偉時無所用莫若履豨作俑之工非曰可珍時有所用貴於斵輪絡首縻足兮驥不能踰跬前無所阻兮跛鼈千里同涉于川其時在風沿者之吉泝者之凶同蓺于時其時在澤伊穜之利乃穋之厄故曰是邪非邪主者時邪諒淑惡之同出兮顧所丁之若何夫如是得非我美失非我恥其去曷思其來曷期姑蹈常而俟之夫何卜為言訖執龜而起予退而作何卜賦於是蹈道之心一而俟時之志堅内視羣疑猶冰釋然謫九年賦古稱思婦已歴九秋未必有是舉為深愁莫髙者天莫濬者泉推以極數無踰九焉伊我之謫至於數極長沙之悲三倍其時廷尉不調行當跋而天有寒暑閏餘三變朝有考績明幽三見顧堯之民兮亦昏墊而有歎歎息兮倘佯登髙髙兮望蒼蒼突弁之夫我來始黄合抱之木我來猶芒山増昔容水改故坊童者鬱鬱而涸者洋洋天覆地生蓊兮無傷彼族而居曏之投荒彼軒而逰昨日桁楊信及澤濡俄然復常稽天道與人紀咸一僨而一起去無久而不還棼無久而不理何吾道之一窮兮貫九年而猶爾噫不可得而知庸詎得而悲茍變化之莫及兮又安用夫肖天地之形為望賦邈不語兮臨風境自外兮感從中晦明轉續兮八極鴻濛上下交氣兮羣生異容發孤照於寸眸騖遐情乎大空物乗化兮多象人遇時兮不同嗟乎有目者必騁望以盡意當望者必縁情而感時有待者瞿瞿忘懐者熈熈慮深者瞠然若喪樂極者冲然無違外徙倚其如一中糺紛兮若斯望如何其望最樂睎慶霄兮遡阿閣如雲兮天顔咫尺如草兮臣心踊躍扇交翟兮葳蕤旗升龍兮蠖略日轉黄道天開碧落凝瑞景於庭樹掬非烟於殿幕望如何其望且懽登灞岸兮見長安紛擾擾兮紅塵合鬱蔥蔥兮佳氣盤池象漢兮昭回城依斗兮闌干避御史之驄馬逐倖臣之金丸望如何其望攸好宗萬靈兮越四隩漢帝仙臺兮秦皇海嶠霓衣踴于河上馬跡窮乎越徼紫氣度闗而斐斖神光屬天而照耀睆眷眷以馳精聳專專而觀妙望如何其望有形視蠢蠢兮窮㝠㝠楚塞氛惡兮蕭闗燧明暈籠孤月角奮長庚沙多似雪磧有疑城烟雲非女子之氣草木盡王者之兵審曳柴之虛警破来馳之先聲信有得於風鳥示無言於斾旌望如何其望且慕恩意隔兮年光度雕輦已辭兮金屋何處長信草生兮長門日莫徯翠華之儻来仰𤣥天以自訴況復湘水無還漳河空注淚染枝葉香餘紈素風蕭蕭兮北渚波烟漠漠兮西陵樹夫不歸兮江上石子可見兮秦原墓拍琴翻朔塞之音挾瑟指邯鄲之路望如何其望最傷俟環玦兮思帝鄉龍門不見兮雲霧蒼蒼喬木何許兮山髙水長春之氣兮説萬族獨含嚬兮千里目秋之景兮懸清光偏結情兮九回腸羡環拱於白榆惜馳暉於落棠諒衝斗兮誰見伊戴盆兮何望平聲豈止蘇武在胡管寧浮海送飛鴻之滅没附隂火之光彩鶴頸長引烏頭未改恨已極兮平原空起何時兮東山在永望如何傷懐孔多降將有依風之感宫人成憶月之歌歌曰張衡側身愁思久王粲登樓日回首不作渭濵垂釣臣羞為洛陽拜塵友山陽城賦山陽故城遺趾數雉四百之運終扵此墟裔孫作賦葢閔漢也詞曰我止行車霣涕于山陽之墟是何蒼莽與慘悴舂陵之氣兮焉如踣昌運於四百辭至尊而伍匹夫有利器而倒持兮曽何芒刃之足舒懿王迹之肇基暨坤維之再敷邈汜陽與鄗上怳蛇變而龍攄痛人亡而事替終此地焉忽諸嗟乎積是為治積非成虐文景之欲處身以約播其徳芽迄武乃穫桓靈之欲縦心於昏爇其妖熖逮獻而焚彼伊周不世兮奸雄乗釁而騰振物象漼以易位被虚號而陽尊終世殫而事去胡竊揖讓以為文嗚呼維神器之至重兮葢如山之不騫使人得譬乎逐鹿固健步者所先諒人事之云爾孰云當塗之兆也自天亂曰久矣莫可追陞彼墟兮噫嘻獨遺武兮貽後王之元龜秋聲賦相國中山公賦秋聲以屬天官太常伯唱和俱絶然皆得時道行之餘興猶有光隂之歎况伊鬱老病者乎吟之斐然以寄孤憤碧天如水兮窅窅悠悠百蟲迎莫兮萬葉吟秋欲辭林而蕭颯潛命侣以啁啾送將歸兮臨水非吾土兮登樓晚枝多露蟬之思夕蔓趣寒螿之愁至若松竹含韻梧楸蚤脫驚綺䟽之曉吹墮碧砌之凉月念塞外之征行顧閨中之騷屑夜蛩鳴兮機杼促朔鴈呌兮音書絶逺杵續兮何泠泠虛窓静兮空切切如吟如嘯非竹非絲當自然之宫徵動終嵗之别離廢井苔合荒園露滋草蒼蒼兮人寂寂樹槭槭兮蟲咿咿則有安石風流巨源多可平六符而佐主施九流而自我猶復感隂蟲之鳴軒歎涼葉之初墮異宋玉之悲傷覺潘郎之么麽嗟乎驥伏櫪而已老鷹在韝而有情聆朔風而心動眄天籟而神驚力將痑兮足受紲猶奮迅于秋聲劉賔客文集巻一欽定四庫全書劉賔客文集巻二唐劉禹錫撰碑上代郡開國公王氏先廟碑唐制五等有爵服而無山川登于三事得立四廟備物崇祀以交神明敬先報本以輔孝治有國之令典也維長慶三年前相國王公始卜廟于西京崇業里公時鎮劍南東川上章曰臣涯官秩印綬品俱第三請如式以奉宗廟制曰可是嵗仲冬申命長男孟堅祔其主于三室明年公入為御史大夫復以十二月躬行烝祭間嵗公出梁州就拜司空禮崇異數廟加祀室太和二年増新室既成祔顯考于尊位告饗由禮觀之者以為世程第一室曰上儀同􅃎州别駕府君諱元政以妣博陵崔氏配第二室曰湖州安吉縣令贈尚書刑部員外郎府君諱實以妣贈扶風縣太君馬氏配第三室曰朝散大夫青州司馬贈户部侍郎府君諱祚以妣贈武威郡太夫人賈氏配第四室曰温州刺史贈太尉府君諱冕以妣贈魯國太夫人博陵崔氏配初周靈王太子晉遇浮丘公化為神􅋖時人號曰王家其後遂以命氏顯於秦者曰翦三世將秦師子孫分居晉代間東漢有徵君霸霸孫甲亦號徵君徙居祁縣為著姓故至于今為太原人自漢涉魏益以熾昌凡十葉至後魏度支尚書廣陽侯冏廣陽有二子神念神感神念南奔梁神感北仕齊惟儀同府君廣陽侯五代孫也唐興于太原實従義旗佐成王業故有開府儀同之寵惟刑部府君以功臣子理二邑不躋貴仕故有錫羨後大之祥惟户部府君幼孤以孝聞於鄉曲未冠以文售於有司由前進士補延州臨安縣主簿㑹詔徵賢良策在甲科授瀛州饒陽尉嵗滿遷渭南天后在神都而東畿差重遂由渭南轉河陽適逢建萬象神宫甸内吏分董其役因上書切諫繇是名益聞開元初以大理司直馳軺車聨讞大獄閩禺朔漠所至決平蚤以欒棘傷生晚成劇恙樂就夷曠故不至大官惟太尉府君生於治平時以文學自奮年十有五賁然従秋賦明年春升名于司徒又一年𤣥宗御層樓發徳音懸文詞政術科以罝髦士府君策最髙授太常寺太祝未㡬復以能通道徳南華沖虛三真經進盩厔尉天寳中歴右拾遺左補闕禮部司駕二外郎屬幽陵亂華遣兵南服因佐閩粤改檢校比部郎中行軍司馬時中原甫寧江南為吉地二千石多用名徳乃以府君牧温州朝廷虛公卿以俟髙第及聞訃永嘉人輟舂罷社搢紳間以不淑相弔焉雖位負于道而邁徳垂矩後之人得以纉承丕揚之其儲休啟祐有自云爾生三子皆聰明絶人長曰沼以神童仕至檢校禮部郎中次曰潔以竒文仕至國子司業今代郡公實季子也蚤在文士籍射策連中咸世其家貞元中徳宗聞其名自藍田尉召入禁中視草厥後三典書命再參内廷憲宗器之付以國柄翊賛有道雖冊免常居大僚今年自梁州請覲上思用舊臣為羽儀遂領太常其公府如故以一心事六君顯官重務靡不揚歴且夫起諸生至三公而心愈卑道益廣出授黄鉞以伯諸侯入服華章以謁家廟追崇極大位血食備多室享全榮而奉昭薦嗚呼公侯之孝歟宜書廟器以視喬公之三鼎其辭曰閟宇神庭邃清而嚴上公之儀四室耽耽犧以潔牲粢以大糦交神尚敬合魄尚氣子姪宗工駿奔奏事副笄侈袂儼恪居次孝孫兢兢執爵而升以祼以擩以伏以興水陸具來羶薌畢登列于圜方其器増増乃禴乃嘗敬而追逺二昭二穆孝以尊本瞻瞻几幄蹜蹜堂梱禮成起慕涕落𤣥衮濡露踐霜誰無永懐不如達者哀與榮偕逢時奮庸誰不得位不如仁人以道為貴惟公之達兮名以顯親惟公之仁兮徳以澡身六朝之清臣一代之全人宜其世家翼翼振振罔不肅祗于廟之門彭陽侯令狐氏先廟碑今上元年七月十三日汴州刺史宣武軍節度副大使知節度事汴宋亳等州觀察處置使銀青光禄大夫檢校禮部尚書兼御史大夫上柱國彭陽縣開國伯令狐公西嚮拜章上言守臣楚䝉被恩澤列為先侯得立家廟以奉常祀制書下其奏于有司於是善相考祥得地於京師通濟里居無何新廟成公以守藩故申命季弟監察御史定卜牲練日越八月丁亥祔饗三室塪墉以尚幽設幄以迎精禮無尤違神用寧謐第一室曰秦州上邽縣尉諱濬以妣太原王氏配第二室曰綿州昌明縣令贈吏部尚書諱崇亮以妣贈太原郡夫人河東柳氏配第三室曰太原府功曹參軍贈太子太保諱承簡以妣贈魏國太夫人富春孫氏配明年十月公由浚郊以介圭入覲真拜户部尚書進爵為魯侯既辭戎㫋得以列侯謁三廟是嵗南至上不視朝又得以時展祭先期致齋栗然以敬既齊盡志歆然永思奉其百順陳以具物始躋而處恭終獻而汍瀾既卒事顧麗牲之石宜有刋紀乃俾家老授其牒于所知云令狐晉邑也晉大夫魏顆以輔氏之功始封焉其易名曰文國語所謂令狐文子是已其先周文王之昭畢公髙之裔畢萬為晉卿始封于魏自萬至顆葢四世其後三十七世藍田侯蚪仕拓跋魏為燉煌郡太守子孫因家遂占數為郡人藍田之孫熈在隋為納言惟上邽府君納言之𤣥孫道克肖而位不至惟尚書府君西州之右族光未輝而徳已基惟太保府君志為君子儒以經明居上第調補陽安縣主簿歴正平尉汾州司法參軍陜州大都督府兵曹終于太原府首掾始以顓經進既仕旁通百家愛穀梁子清而婉左丘明國語辨而工司馬遷史記文而不華咸手筆朱墨究其㣲㫖愷悌以肥家信誼以急人徳充齒耋獨享天爵故休祐集于身後徽章流乎佳城凡以子貴承澤降命書告第者始贈尚書祠部郎中再贈禮部尚書三加右僕射四為今稱一作四進太保五為上公先夫人亦四徙封宻印纍纍邦族聳慕生三子皆才彭陽公為嗣次子從端實肅給今為檢校膳部郎中參河東軍事季子前所謂監察御史今主柱下方書温敏而有文綽綽然真令兄弟唯彭陽以詞筆取科名累參侍從由博士主尚書牋奏典内外書命遂登樞衡言文章者以為冠擁節總戎率身和衆留恵于盟津變風于浚都言方略者以為能夫浚師嚄唶難治乗釁竊發寖成習俗莅止五載飲和革心束馬來朝熊羆隕涕問公還期觴必祝之留為常伯旋命居守汴人聞公之東近而愈懐翹翹瞿瞿盡西其首言遺愛者可紀焉貴而率禮老而能慕怵惕乎霜露齋莊乎廟祧睦其仲季施及鄉黨言孝悌者歸厚焉勒銘于碑以代夷鼎文曰已孤之孝莫如備物顯顯新廟四阿三室時惟仲月卜用柔日醴醆苾芬牲牷博腯籩甒在堂蕭膋在庭孝孫烝烝躬若奉盈低簪委紳薦俎登鉶肹蠁交感涕流縁纓禮以備儀誠以致美祖考來格錫之丕祉工祝告訖退循軒戺乃授風人作詩以紀猗歟彭陽之寵光佐憲皇穆穆皇皇西省東臺迭為侍郎國之大政咨爾平章敬宗凝旒俾鎮雝丘入為地官令守東州彭陽之忠厚宜介福以夀東郊既釐可復朝右緜緜其胄系于周舊由我顯起必昌其後太和紀元作廟之首刻碑廟門龍集巳酉髙陵令劉君遺愛碑縣内之大夫鮮有遺愛在其去者葢邑居多豪政出權道非有卓然異績結于人心浹于骨髓安能久而愈思太和四年髙陵人李士清等六十三人思前令劉君之徳詣縣請金石刻縣令以狀申府府以狀考于明法吏吏上言謹按寳應詔書凡以政績將立碑者其具所紀之文上尚書考功有司考其詞宜有紀者乃奏明年八月庚午詔曰可今書其章明有以結人心者掲于道周云涇水東行注白渠釃而為三以沃闗中故秦人常得善嵗按水部式決洩有時畎澮有度居上游者不得擁泉而顓其腴毎嵗少尹一人行視之以誅不式兵興已還寖失根本涇陽人果擁而顓之公取全流浸原為畦私開四竇澤不及下涇田獨肥它邑為枯地力既移地征如初人或赴訴泣迎尹馬而占涇之腴皆權倖家榮勢足以破理訴者覆得罪繇是咋舌不敢言吞寃銜忍家視孫子長慶三年髙陵令劉君勵精吏治視人之瘼如熛疽在身不忍決去乃循故事考式文暨前後詔條又以新意請更水道入于我里請杜私竇使無棄流請遵田令使無越制别白纎悉列上便宜掾吏依囘不決居二嵗距寶歴元年端士鄭覃為京兆秋九月始具以聞事下丞相御史御史屬元谷實司察視持詔書詣渠上盡得利病還奏青規中上以谷奉使有狀乃俾太常撰日京兆下其符司録姚康士曹掾李紹實成之縣主簿談孺直實董之冬十月百衆雲奔憤與喜并口謡手運不屑鼛鼓揆功什七八而涇陽人以竒計賂術士上言田白渠下髙祖故墅在焉子孫當恭敬不宜以畚鍤近阡陌上聞命京兆立止絶君馳詣府控告具發其以賂致前事又謁丞相請以顙血汚車茵丞相彭原公歛容謝曰明府真愛人陛下視元元無所恡苐未周知情偽耳即入言上前翌日果有詔許訖役仲冬新渠成涉季冬二日新堰成駛流渾渾如脈宣氣蒿荒漚冒迎耜澤澤音釋開塞分寸皆如詔條有秋之期投鍤前定孺直告已事君率其寮躬勞俫之烝徒讙呼奮襏襫而舞咸曰吞恨六十年明府雪之擿姦犯豪䘚就施為嗚呼成功之難也如是請名渠曰劉公而名堰曰彭城按股引而東千七百步其廣四尋而深半之兩涯夾植杞柳萬本下垂根以作固上生材以備用仍嵗旱沴而渠下田獨有秋渠成之明年涇陽三原二邑中又􅗙其衝為七堰以折水勢使下流不厚君詣京兆索言之府命従事蘇特至水濵盡撤不當􅗙者繇是邑人享其長利生子以劉名之君諱仁師字行輿彭城人武徳名臣刑部尚書徳威之五代孫大歴中詩人商之猶子少好文學亦以籌畫干東諸侯遂參幕府歴尹劇縣皆以能事見陟率不時而遷既有績于髙陵轉昭應令俄兼檢校水曹外郎充渠堰副使且錫朱衣銀章計相愛其能表為檢校屯田郎中兼侍御史斡池鹽于蒲錫紫衣金章嵗餘以課就加司勲正郎中執法理人為循吏理財為能臣一出於清白故也先是髙陵人䝉被恵風而惜其捨去發於胸懐播為聲詩今采其㫖而變其詞志于石文曰噫涇水之逶迤溉我公兮及我私水無心兮人多僻錮上游兮亁我澤時逢理兮官得材墨綬繠兮劉君来能愛人兮恤其隠心既公兮言既盡縣申府兮府聞天積憤刷兮沈疴痊劃新渠兮百畎流行龍虵兮止膏油遵水式兮復田制無荒區兮有良嵗嗟劉君兮去翺翔遺我福兮牽我腸紀成功兮鐫美石求信詞兮昭懿績唐故朝議郎守尚書吏部侍郎上柱國賜紫金魚袋贈司空奚公神道碑嗚呼有唐清臣尚書吏部侍郎奚公貞元十五年十月甲子薨于位詔贈禮部尚書太常考行諡曰某是嵗臘月丁酉葬于萬年縣之某原後三十有四年子為諸侯為大夫門户有煒於是門下生琢石紀徳掲于我阡云公諱陟字殷衡其先在夏為車正以功封于薛下故以降為譙郡人或因仕適楚復之秦今為京兆人隋唐之際再世以明經為博士家有賜書曽祖簡亦以文學為太子司議郎大父乾繹仕至光州刺史烈考諱某有道而尚晦終徐州司功參軍贈和州刺史由子貴也天以大運生萬物而以正氣鍾賢人至和來宅其徳乃具公實有焉幼而擢陵苕之秀長而成清廟之器羣倫月旦咸以第一流處之及從鄉賦暨升名太常果居上第明年詔郡國徴賢良設四科以盡材公居文詞清麗之目授𢎞文館校書郎時徳宗新即位聲怛虜庭西戎畏威底貢内附詔諫議大夫崔河圖持節即虜帳以報之使臣欲盛其賔寮以自大遂嘿表公為介換大理評事除書到門公方為人子不敢許以逺稱病弗果行歸寧夀春養志盡敬丞相楊炎勇於用才擢公為左拾遺奉安輿而西未㡬再集荼蓼居後喪將闋是嵗建中四年京師急變黄屋順動狩于巴梁公徒行間道以歸王所既中月而詔授起居郎充翰林學士創鉅愈遲病不拜職改太子司議郎従大駕回入尚書為司金元士且參𣙜筦之務有頃持愍冊宣恩于薊門將行錫銀朱於青蒲上復命稱㫖轉吏部外郎是曹在南宫為眉目在選士為司命公執直筆閱簿書紛挐盤錯一瞬而剖時文昌缺左右丞都曹差重遂轉左司郎中尋遷中書舍人執事者繄公識精以斟酌大政非獨用文飾也㑹江淮間民被水禍上愍焉特命公宣撫之許以便宜及物赤車所至如東風變枯條其利病復奏咸可轉刑部侍郎時主計臣延齡以險刻貴倖而與京兆尹相惡以危事中之尹坐譴已又逮繫其吏峻繩之事下司宼主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽君子聞之善其知道不私刑曹既清以餘刃兼領選事居一年授權知吏部侍郎又一年即真是秩言能審官者本朝有裴馬盧李四君子物論以公嫓焉時得疾發癰有國醫方直禁中上促遣如第且敕之曰某賢臣也悉術以治之及有司以不起聞上震悼加等公娶琅邪王氏石泉公之曽孫友壻皆一時彦士長子某蚤不禄第二子敬則歴太僕少卿今為濮州刺史兼御史中丞賜金紫以連最就加貴秩俾視九卿第三子敬𤣥以詞蓺似續登文科歴左補闕今為尚書刑部郎中第四子炅舉進士最小子某咸砥礪纂修宜為名公家子其邁徳垂裕之光乎公少以名器自任及顯達急於推賢視其所舉則在西省薦權丞相由右史掌訓詞在中銓表楊僕射由地曹郎綜吏部二公後為天下偉人凡執文章權衡以揣量多士一入中禁考䇿詞三在天官第章句披沙剖璞由我而顯者落落然居多推是風鑒移于大冶則鎔範之内無非祥金嗟乎天不遐其福而孤民望使由庚之什不作於貞元中惜也初公既齊終詔贈大宗伯後以第三子在郎位被霈澤再追襃至司空故昔之葬儀用常伯而今之碑制用三公云銘曰仁麟智龍為瑞一辰未若君子瑞于人倫惟唐徳宗道類漢宣責實繩下風稜言言公丁斯時籍在雋賢從難表節執羈而還帝曰汝器黄流瑟然可為大僚左右化源乃飾王度乃馳輶軒既執刑柄亦操吏權陽和熈熈貯在顔間守法持正嶷如秋山火不侵玉倖臣畏服鳯鳴祥烟梟噪低跧帝方倚用天不假年公寐無寤其名愈逺門人達者赤舄𤣥衮公居甚卑其徳愈尊兩子朝服駢驅朱輪佳城何在胄貴之里螭首龜趺徳煇是紀嗚呼後人下拜于此劉賔客文集巻二欽定四庫全書劉賔客文集巻三唐劉禹錫撰碑中唐故福建等州都團練觀察處置使福州刺史兼御史中丞贈左散騎常侍薛公神道碑薛在三代為侯國介于鄒魯間傳世三十有一為齊所并其公子犇楚錫土田于沛漢末避仇之成都曹魏平蜀徙家汾隂遂為河東臨晉人自奚仲為夏車服大夫距今數千年乗軒服冕舄奕冠世言氏族者署為闗内甲姓天意若曰始有功於車服錫爾子孫世世有之公諱謇字某曽祖寶𦙍以名家子且有學行歴尚書郎雝州司馬邠州刺史王父繪有儁材刺三郡金宻緜皆以治聞累績至銀青光禄大夫封龍門侯烈考承矩以文亡害仕至大理丞公幼承前人之覆露補崇文生嵗滿得調主簿書于亳之譙苦二邑又尉于東畿之河清貞元中上方與丞相調兵食思得通吏治而習邊事者計相以公為對乃授監察御史裏行充京兆水運使局居鴈門主穀糴具舟檝募勇壯且便弓矢者為榜夫千有餘人隸尺籍伍符制如舟師詔以中貴人䕶之聲震塞上每發粟泝河北行涉戎落以饋縁邊諸軍及乗障者雖河塞回逺必克期如合符一嵗中省費萬計累加侍御史内供奉賜飛魚袋有司條白其勞入拜殿内史未㡬淮海節將以戎倅缺聞事下丞相御史擇可者僉曰公政事巳試遂授檢校户部外郎兼御史淮南軍司馬尋轉駕部郎中錫以金紫遇府遷申命真相趙國公帶中書侍郎代之公主行臺留務趙公文茵及境視置郵供帳及郊視將迎部伍下車視簾幃器備乃曰信竒才也此不足以展驥朝廷知之擢為泗濵守既報政就加御史中丞俄遷福建都團練觀察使閩有負海之饒其民悍而俗鬼居洞砦音寨家桴筏者與華言不通公兼戎索以治之五州民咸説元和十年某月某日薨于位年六十七贈左散騎常侍夫人趙郡李氏無兒蚤世繼夫人隴西李氏檢校禮部尚書河東節度使説之女生子凝為嗣季子茂𢎞以諸侯禮儀返塟故里蛾眉原従周也後二十有三年元曰開成凝為平盧従事謹按令甲礱碑石來乞詞以垂于悠久初公治粟于朔陲愚方冠恵文冠察行馬外事聆風相厚謂可妻也以元女歸之明年愚入尚書為郎職隸計司因白計相召公來㑹府行有日矣遇内禪惟新愚以縁坐左貶間闗外役竟不克面然而公之徳善灌注心耳孝悌為根柢誠明枝葉之直方為天質禮讓縁飾之所至藹然繇此道也公初下世故人丞相李太師誌其墓其畧曰𢎞深莊重幹敏絶人此與遊者傳信之詞也豈誣也哉故作銘曰河汾奫淪鼎氣歊雲散為昌光凝為賢人常侍之生其宗孔碩従祖昆弟詵詵三百文館入仕幽龍未光尺木為階欻然欲翔司會知材績宣朔方邊師萬喉俟我贏糧泝于黄河路出戎疆募乃勇士皁衣挽航膺索臂弧穹廬在旁虜聞公名憚不敢攘安北以南列城相望率有儲㣥皆成金湯入居殿中分巡輦下淮海軍大往為司馬軍中之治可移諸民乃牧于泗乃亷于閩閩悍而囂夷風脆急恩信綏之妥然如蟄閩方不淑天奪其福公薨于寢𤣥頳以復天王廢朝贈之金貂莓莓晉原鬱矣中條大墓舊阡松楸蕭蕭笳鼓以歸徳音孔昭許州文宣王新廟碑嵗在丙辰元曰開成許州牧尚書杜公作文宣王廟暨學舍于兊隅革故而鼎新也前年公受社與鉞且董淮揚汝南之師八月上丁釋菜于宣父之室陋宇荒階不足回旋巳事而歎乃詢黄髮有鄉先生前致辭曰自盜起幽陵許為兵衝連戰交捽率無寧嵗耳説鉦鼓不聞弦歌目不知書不害為智爾來生聚教養起居祖習壹出於軍容今幸天子憐許民為擇賢侯此人人思治之時也公曰諾吾當先後之於是元年修戎律以通衆志次年成郡政以蠲民瘼季年崇教本以厚民風我言既従乃卜新宫潩水之瀕城池在東登登其杵坎坎其斧繩之墨之鑿枘枝梧載塈載塗􅀈焉陵虛寝廟𢎞敞齋宫嚴閟軒墀廂廡儼雅清潔門庭牆仞望之生敬外飾觚稜中設黼幄嚮明當宁用王禮也堯頭禹身華冠象佩之容取之自鄒魯及門覩奥偶形畫像之儀取之自太學尊彞籩豆青黄規矩之器秉周禮也犧牲制幣薦獻陞降之節遵國章也蔵經于重檐斂器于庋櫝講筵有位鼓篋有室授經有博士督課有助教指蹤有役夫灑埽有廟幹公又割隙地為廣圃蒔其柔蔬而常菹㫖蓄之禦備捨己俸為子錢𣙜其孳贏而鹽酪釭膏之用給濟濟莘莘化行風驅家慕恭儉户知敬讓父誨其子兄規其弟不遊學堂與撻市同繇是縻勇爵戴鶡冠者往往弭雄姿而觀習禮矜甲胄者知根於忠信服縵胡者不敢侮逢掖教化之移人也如置郵焉冬十一月許人以新儒宫成来告且乞詞欲行乎逺也公名悰字永裕故丞相岐國公之孫岐公弼諧三帝碩學冠天下嘗著書二百餘篇言禮樂刑政古今損益統名曰通典蔵在石室副行人間今孝孫聿脩之形乎事業播于聲詩懿哉能世其家也禹錫昔年忝岐公門下生四參公府近年牧汝州道許昌躬閱其政故不得讓遂銘于麗牲之碑銘曰許分韓魏四征之地兵興已還其鬬㘖㘖亦有儒宫軋于兵間賢侯戾止思樂泮水俾人向學王化之始便地爰相新規鬱起廟貌斯嚴堂皇有煒秩秩禮物祁祁胄子入于門牆如造闕里春誦夏弦載颺淑聲風于閭閻浹于郊坰途讓班白家尊父兄與化而遷其猶性成昔之委巷相詬交侮今逢親戚不道媟語昔之連營誇力使酒今遇賔客斂容拱手魯有泮林鳥革其音許崇學斆民説其教鐫于圭石以志新廟唐故朝散大夫檢校尚書吏部郎中兼御史中丞賜紫金魚袋清河縣開國男贈太師崔公神道碑太師名倕字某清河東武城人太公望既封于營丘子伋嗣侯伋之孫曰穆伯食邑于崔遂以為氏後十四世至秦末東萊侯意如東萊之子伯基始居清河又十五葉生琰為魏名臣又九葉生休仕後魏為七兵尚書七兵之弟曰寅為樂安太守公即樂安八代孫始以門子補鄭州參軍力行好學於子道以孝聞處伯仲間以友聞讀易至編絶以精義聞至徳中戎羯猾夏王師出征公少有竒志思因時以自奮乃作伐鯨鯢賦上獻既聞爾矣果器之㑹第五丞相以善言利得幸盡付利權始有鹽鐵使之目慎選寮屬表公為介轉臨晉縣丞處繁應卒鋩刃不頓府罷再遷至太子司議郎韓晉公時為户部侍郎掌邦賦急於用材薦公為監察御史主河東租庸之務尋轉侍御史充京東平糴使建中初徳宗始親萬機儲精治本有漢宣與我共理之歎謂大臣求可當良二千石者遂以公帶本官權知袁州刺史期月有成詔書顯揚就加真秩益以金紫居無何韓晉公為丞相制國用思公前績乃傳召之抵京師授檢校户部郎中兼侍御史斡池鹽于蒲修牢盆謹衡石煎和既精飴散乃盈商通而荐至吏懼而循法民不絓網而國用益饒嵗杪㑹其所入贏羡什百詔下襃其能轉吏部正郎兼御史中丞且加五等之爵方倚以重任天富其材而不遐其福享齡六十有五貞元七年某月某日遘疾終于治所上聞悼之因降愍冊贈鄭州刺史賚錢三百萬以備飾終之禮明年某月某日返𦵏于成周之偃師從世墓也累贈至太師夫人隴西李氏汾州司倉參軍咸一之女生才子六人長曰邠及公時已為左拾遺後至太常次曰酆至太府卿次曰郾至外臺尚書次曰郇今為廷尉次曰鄯至執金吾季曰鄲今為太常卿同中書門下平章事惟夫人姑臧冠族以蘋蘩組紃輔佐君子為令妻積三十餘年以慈儉忠厚訓誡諸子為賢母二十有三年當永貞初順宗踐祚澤流累葉長子邠時為詞臣草冊書以文當進階遂上疏乞移榮於親優詔允之特封清河郡太君士林聳慕皆自痛其不及邠為太常酆為大農咸白髮貴綬以奉膳羞諸季各以簪裾給事左右愉愉然先意無違言世榮者舉無與比以子貴累封贈至涼國太夫人元和八年三月十六日捐館舍夀七十有九是嵗十月某日合祔惟太常及尚書暨今相國皆自中書舍人為禮部侍郎凡五貢賢能書得士百四十有八人言兄弟者許為人瑞崔氏之門六人皆入文昌宫其間三人歴八侍郎統而論之三大卿兩連率二翰林學士一執金吾言冠冕者許為世雄與姑臧李范陽盧世為婚媾入于姻黨無第二流言門閥者許為時表太常二子亦以才能同入尚書璜為吏部郎瓘為司勲郎其它支孫未登金閨籍者詵詵然魚貫而進文業甚似而孝謹不衰猗歟君子之澤其所從來逺而有光乎開成已未嵗七月甲辰相君受詔于明庭始操國柄仲月奉嘗事于家禮成起慕悄然永懐曰古者卿大夫廟有鼎墓有碑皆銘之以紀先徳也今備位宰相敢不敭前人之耿光乃俾家老條白事功咨扵學古者徴其詞尚信也又命宗祝卜柔日告于廟盡誠也儀甚備而敬有餘斯所謂達禮之君子遂刋勒如式掲于道周銘曰奕奕四姓崔為之冠瞻其門牆倬若雲漢善積家肥子孫多材如彼榱棟必生徂徠太公之後彌二千祀炯如貫珠焯見圖史顯允太師丕承徳基構于其堂亦既塈茨生逢艱虞戎夏交師獻賦伐叛忠存乎詞兵興事叢飛輓四馳歴踐劇職視屯如夷乃主平糴乃分竹使治粟為邦其道一致蒲實近地鹽為利泓使車來思剗弊立程吏亷商通嵗倍其贏奏課連最徳音襃明就加執法好爵兼榮天賦之才不與夀并生樹徳本没揚淑聲上聞軫懐侑樂為停贈禭之禮侔于公卿萬石貽訓根於孝友太丘種徳乃稔身後家有令子妻為夀母三十餘年人倫之首六子來侍如龍如虎衆婦來饋維筐及筥佩玉鳴環交響庭户申申秩秩歡不踰矩昔為甲族今為興門天爵人爵蔚然兩尊先徳䕃之黕如重雲孕和含粹濯潤本根景亳之原圖書之川陽陵帝壇磅礴回環世安其神世嗣其賢聆徳風者拜于碑前唐故宣歙池等州都團練觀察處置使宣州刺史兼御史中丞贈左散騎常侍王公神道碑常侍諱質字華卿始得姓自周靈王太子晉賔天而僊時人曰王子因去姬為王氐自秦漢以還世多顯名由今而上十有一代名傑仕元魏為并州刺史子孫因家遂為太原祁人并州六代孫名通字仲淹在隋朝諸儒唯通能明王道隠居白牛谿㳺其門皆天下儁傑著書行於世既没諡曰文中子文中生福祚為蔡州上蔡主簿上蔡生勉舉進士徴賢良皆上第仕至河中府寶鼎令寶鼎即公之曽祖也祖諱怡渝州司户參軍考諱潛揚州天長縣丞贈尚書吏部郎中公其季子也始文中先生有重名於隋末其弟績亦以有道顯於國初自號東臯子文章髙逸傳乎人間議者謂兄以大中立言弟游方外遂性二百年間君子稱之雖四夷亦聞其名字公雅有逺志常自忖度我大名之後不宜無見焉遂力學厚自淬琢扵春秋得其公是於禮得之約僑居淝水上躬督穡事善積於已而淮楚間羣彦多與之游公歉然自少無進取意與游者激之曰卿文儒家子篤志如是盍求發聞去聲俾家聲不頽今夫以文學茫洋當世者誰如華卿庸自棄耶入謀于閨門咸以外言為是因決䇿而西在貢士籍天和内充不以時尚屑意角逐攻取初無此心如楩楠生于深林未始自貴而度材者一眄歆然在懐故以不争而速售既登第東諸侯交辟之從主者書記于嶺南授正字㕘謀于淮右進協律郎其後佐許下暨梓潼南梁率為上介官至兼監察御史司憲聞其賢徴入南臺轉殿内歴侍御史改尚書户部外郎復為知已所薦遷檢校司封郎中攝御史中丞紫衣金章充山南西道節度副使入為尚書户部郎中以方雅特立除諌議大夫㑹宋丞相坐狷直為飛語所陷抱不測之罪大僚進言無益公率諫官數輩日晏伏閤上為不時開便殿公於旅進中獨感激雪涕居多由是上怒稍解得從輕比公終以言責為憂求為虢州刺史宰相惜去又重違誠請増之以兼御史中丞用示異於人也大凡以智謀而進者有時而衰以朴厚而知者無迹而固公雅為今揚州牧賛皇公所知人不見其迹方其虢略賛皇入相擢為左曹給事中凡有大官缺必寵薦居數月遷河南尹又未㡬鎮宛陵是三者中外所注意不旬嵗而周歴之時論不以為黨河南帝之别京其治尚體度風采而别白區處之宣城國之奥壤其治在束吏恵下蘇罷羸讋剽輕而勞徕澄汰之公兩得其道不由一檢率身以儉而素風存任人以誠而羣務舉遇中貴人以禮而故態革内潔其志下盡其忠外無以撓扵理三者具求政之有秕曷由哉在鎮三載開成元年十二月八日薨于位享年六十三監軍使上言有詔軫悼不視朝贈左散騎常侍明年八月十一日𦵏于河南府永寧縣洛川鄉史原從舊阡也初公娶于滎陽鄭氏生三女而没今葢祔焉一子曰慶存方齓矣猶子前太原府㕘軍扶執宗長書来請曰扶也蚤孤荷世父常侍之覆露今其嗣幼未任克家姑封琴書司管鑰以俟其長竊懼世父之徳音不敭思有以垂于後者以誠告于従叔大司農復命曰俞謹礱貞石以乞詞無忽余昔為郎與常侍同列已熟其行實及讀墓誌即今丞相益州牧趙郡李公之文自稱為忘形友其在宣州李公再入相議以第一官處之牢讓不取羔鴈所禮則河東裴夷直天水趙晢隴西李行方呉郡陸紹梁國劉蕡博陵崔珦人咸曰得士夫揚州少與也而見器益州寡合也而見親六從事才不一也而畢樂用是足以觀徳庸可勿紀焉銘曰隋有文中紹敭㣲言當時偉人咸出其門粹氣紆餘鍾于後昆常侍恂恂文中來孫發源髙麓中沫後大蘭牙茁然秀出叢薈善不近名其聲日彰行勇於退其道愈光哲者知之寘于周行以正持憲以文為郎以和佐戎以恵臨邦以直司諫以公駮政守于三川頑民底定乃鎮于宣先馳淑聲邑中婆娑瞻我斾旌問誰詢謀濟濟君子問誰出内潔潔亷士道本乎心暢于四支治本乎正形于百為黠吏斂手齊民揚眉江淮藪空夜柝弗施公卧于齋邦民悽悽公衣升屋邦民行哭牙璋斯来栁翣言旋棠樹未老周人慕焉熊耳之陽泱泱洛川佳城在兹既固且安松楸飋然石馬矯然過者必敬宛陵之阡唐故邠寧慶等州節度觀察處置使朝散大夫檢校户部尚書兼御史大夫賜紫金魚袋贈右僕射史公神道碑僕射名孝章字得仁本北方之强世雄朔野其後因仕中國遂為靈武建康人曽祖道徳贈右散騎常侍封懐澤郡王祖周洛銀青光禄大夫檢校太常卿兼御史中丞北海郡王贈太子太保考憲成蚤以武勇絶人積功至魏博節度使終于河中晉絳慈隰等州節度觀察使檢校司徒兼侍中河中尹贈太保其薨也大臣中書令晉國公裴氏為之碑其名益顯公即侍中之元子母曰冀國夫人李氏幼而聰寤父母賢而加愛焉及長好學遷善秀出儕輩鄴下諸兒號為書生元和中太尉愬為魏帥下令掄材於轅門取大將家翹秀者為子弟軍列于諸校之上公獨昌言願效文職太尉深竒之遂假魏州大都督府㕘軍長慶二年常山衆叛害其帥沂國公田司徒於帳下沂公發跡于魏人猶懐之詔命其子布以尚書授鉞統魏兵問罪于北疆且報家禍布既啟行士氣不振渙然内潰獨與冗從之旅偃旗而歸百憤攻中卒自引決先侍中時為中軍都知兵馬使兼御史中丞全師在野鬨然推戴之請為假侯以鎮定中貴人飛驛上聞穆宗夜召翰林學士草詔書以真侯命之實有魏土從衆而合權也是嵗公自攝官轉本府士曹㕘軍兼監察御史賜朱衣銀印推恩以及子也一旦跪於父母前進苦言曰臣竊惟大河之北地雄兵精而天下賢士心侮之目曰河朔間視猶夷狄何也蓋有土者多乗兵機際㑹非以義取今臣家父侯母封化為貴門君恩至矣非痛折節礪行彰信於朝廷無以弭識者之譏寤明君之意節著於外福延于家乗時蹈機禍不旋踵言訖泣下數行父俞母賛天性交感三心既叶萬衆潛化天子聞而嘉之曰彼真有子乃授檢校太子左諭徳兼侍御史充節度副使累遷至散騎常侍兼御史大夫賜金印紫綬既貳軍政事如命卿弛張損益得以㕘決潛革故態人知嚮方太和二年滄景節度使李全略卒其子同捷竊據故地詔下以文告弗革遂用大刑先侍中表請率先諸侯使元子以督戰制曰可公承君父之命乃捐其軀一舉而下平原壓滄壘由是加工部尚書及王師凱旋上表願一識承明廬詔允之遂赴北闕下得覿於便殿上曰嚮吾始征滄州議者皆曰彼魏之姻也慮隂為寇謀吾發使數輩以偵之其還也僉曰爾父瀝款於賔筵爾毋抗詞於簾下願絶姻以立效其經始啓發出於爾心今滄海底平䇿勲之日宜貴爾三族命爾父為侍中遷鎮于近地加爾禮部尚書析相衞澶三州為鎮以居之俾爾一門大榮以誇天下公拜稽首謝父遷讓已爵禮無違者翌日詔下于明庭人咸曰史氏之寵光古無有也牙旗碧幢方指東道侍中以帳下生變聞泰極而否當歌而哭迎柩于路仰天長號因𦵏于洛陽之邙山冀國夫人祔焉寢苫枕塊以所仇同天為大酷未㡬詔舉金革之義起為右金吾將軍累表陳乞有司以違命督之輿疾即路間嵗擢授鄜坊丹延等州節度觀察處置等使居四年遷鎮于滑一嵗入為右領軍衞大將軍旋改右金吾大將軍又授鉞于邠土孟秋至治所首冬遘疾拜章入覲不克展和鸞鞗革之儀薨于靖恭里之私第享齡三十九當開成三年十月二十日上聞而悼之不視朝一日贈尚書右僕射明年二月歸𦵏于洛都夫人琅邪王氏祔焉繼室深澤縣君博陵崔氏有一子曰煥生七年而孤僕射之喪自復魄至𦵏當門户備祭祀建碑表皆縣君之能且命其家老具事功來請曰􅄔不恤家而憂幼嗣不知其先人之官業乞詞以傳于後也君子以為知禮謹書之銘曰斗極之下崆峒播氣鍾于侍中孔武且貴奉上致命宜昌後嗣僕射承之良弓不墜耳煩鉦鼓心説文字虎穴之中生此騏驥太和紀元滄景不䖍子弄父兵跳浪海壖有隣隂交蝟起雞連詔下薄伐艮隅騷然時惟侍中實統魏師蓄銳未發衆心危疑僕射為子陳謀盡詞興言涕零有感尊慈絶姻效節精貫神祗滄波底寧王師襃之乃遷元侯来鎮近畿乃胙元子别建旌麾一門四節焜燿當時倐忽變生魏郊紛披喬木雖大盲風不知干雲之臺列缺焚之哀哀孝嗣丁此大酷迎䕶幃輤𦵏于東洛訴天觸地血染縗服禮有金革詔書敦促不遂枕戈驟膺推轂雕隂白馬暨于邠谷雖榮三鎮不荷百禄綺紈之間珪組纍纍如彼晨葩日中而萎有妻名家有子稺齒行號執禮歸窆蒿里洛水之陽循邙之趾昭尊穆敬幽顯同理舊松新栢亦象橋梓刻石紀功垂千萬祀劉賔客文集巻三欽定四庫全書劉賔客文集巻四唐劉禹錫撰碑下釋門銘記附大唐曹溪第六祖大鑒禪師第二碑元和十一年某月日詔書追襃曹溪第六祖能公諡曰大鑒實廣州牧馬惣以疏聞繇是可其奏尚道以尊名同歸善善不隔異教一字之襃華夷孔懷得其所故也馬公敬其事且謹始以垂後遂咨於文雄今栁州刺史河東栁君為前碑後三年有僧道琳率以其徒由曹溪來且曰願立第二碑學者志也雖如來滅後中五百嵗而摩騰竺法蘭以經來華人始聞其言猶夫重昏之見曶爽後五百嵗而達摩以法來華人始傳其心猶夫昧旦之覩白日自達摩六傳至大鑒如貫意珠有先後而無同異世之言真宗者所謂頓門初達摩與佛衣俱來得道傳付以為真印至大鑒置而不傳豈以是為筌蹄邪芻狗邪將人人之莫已若而不若置之邪吾不得而知也按大鑒生新州三十出家四十七年而没百有六年而謚始自蘄之東山從第五師得授記以歸髙宗使中貴人再徵不奉詔第以言為貢上敬行之銘曰至人之生無有種類同人者形出人者智蠢蠢南裔降生傑異父乾母坤獨肖元氣一言頓悟不踐初地五師相承授以寳器宴坐曹溪世號南宗學徒爰來如水之東飲以妙藥差其瘖聾詔不能致許為法雄去佛日逺羣言積億著空執有各走其域我立真筌掲起南國無修而修無得而得能使學者還其天識如黒而迷仰見斗極得之自然竟不可傳口傳手付則礙於有留衣空堂得者天授佛衣銘并引吾既為僧琳撰曹溪第二碑且思所以辯六祖置衣不傳之㫖作佛衣銘曰佛言不行佛衣乃爭忽近貴逺古今常情尼父之生土無一里夢奠之後履存千祝惟昔有梁如象之狂達摩救世來為醫王以言不痊因物乃遷如執符節行乎復闗民不知官望車而畏俗不知佛得衣為貴壞色之衣道不在兹由之信道所以為寳六祖未彰其出也微既還狼荒憬俗蚩蚩不有信器衆生曷歸是開便門非止傳衣初必有終傳豈無已物必歸盡衣胡久恃先終知終用乃不窮我道無朽衣於何有其用巳陳孰非芻狗唐故衡嶽大師湘潭唐興寺儼公碑佛法在九州間隨其方而化中夏之人汩於榮破榮莫若妙覺故言禪寂者宗嵩山北方之人鋭以武攝武莫若示現故言神通者宗清涼山南方之人剽而輕制輕莫若威儀故言律藏者宗衡山是三名山為莊嚴國必有達者與山比崇南嶽律門以津公為上首津之後雲峯證公承之證之後湘潭儼公承之星月麗天珠璣同貫由其門者為正法焉公號智儼曹氏子世為郴之右姓兆形在孕母不嗜葷成童在侣獨不嗜戲其夙植因厚者歟生九年樂為僧父不能奪其志抱經笥入岣嶁山從名師執業凡進品受具聞經傳印皆當時大長老我入明門不住諸乘我行覺路徑入智地居室方丈名聞大千䕶法大臣多所賔禮嗣曹王臯之鎮湖南請為人師自是登壇莅事三十有八載由我得度者萬有餘人人持寳衣解瓔珞為禮公色受之謂門弟子曰彼以有相求我我以有為應之凡建寳幢修廢寺飾大像皆極其工應物故也元和十三年九月二十七日中夜具湯沐剃頤頂與門人告别即寂而視身與色無有壊相嗚呼豈生能全吾真故死不速朽將有願力邪余不得而知也問年八十二問臘六十一葬于寺東北隅傳律弟子中巽道準傳經弟子圓皎貞璨與其徒圓靜文外恵榮明素存政等欲其師之道光且逺故咨余乞詞乃作長句偈以銘之曰祝融靈山禹所治非夫有道不可止中有毗尼出塵士以津視儼猶孫子登壇人師四十祀南方學徒宗奥㫖幼無童心至兒齒識滅形全異凡死長沙潭西幾五里陶侃故居石頭寺門前一帶湘江水吁嗟律席之名兮與湘流而不巳牛頭山第一祖融太師新塔記初摩訶迦葉授佛心印得其人而傳之至師子比丘凡二十五葉而達摩得焉東來中華華人奉之為第一祖又三傳至雙峯信公雙峯廣其道而岐之一為東山宗能秀寂其後也一為牛頭宗巖持威鶴林徑山其後也分慈氏之一支為如來之别子咸有祖稱粲然貫珠大師號法融姓韋氏延陵人少為儒博極羣書既而歎曰此仁誼言耳吾志求出世間法遂入句曲依僧炅改逢掖而緇之徙居是山晏坐石室以慧力感通故旱麓泉涌以神功示現故皓雪蓮生巨蛇摧伏羣鹿聴法貞觀中雙峯過江望牛頭頓錫曰此山有道氣宜有得之者乃來果與大師相遇性合神授至于無言同躋智地密付真印掲立江左名聞九圍學徒百千如水歸海由其門而為天人師者皆脈分焉顯慶二年報身示滅道在後覺神依故山戒香不絶龕坐未飾夫豈不思乎葢神期冥數必有所待太和三年潤州牧浙江西道觀察使檢校禮部尚書趙郡李公在鎮三閏百為大備尚理信古儒𤣥交修始下令禁桑門販佛以眩人者而於真實相深達焉常謂大師像設宜從本教言自我啟因自我成乃召主吏籍我月入得緡錢二十萬俾秣陵令如符經營之三月甲子新塔成事嚴而工人盡蓻誠達而山神來䕶願力既從衆心知歸撞鍾告白龍象大㑹諸天聲香之藴如見如聞即相生敬明幽同感尚書欲傳信于後逺命愚志之夫上士解空而離相中士著空而嫉有不因相何以示覺不由有何以悟無彼達真諦而得中道者當知為而不有賢乎以不修為無為也袁州萍鄉縣楊岐山故廣禪師碑天生人而不能使情欲有節君牧人而不能去威勢以理至有乘天工之隙以補其化釋王者之位以遷其人則素王立中區之教懋建大中慈氏起西方之教習登正覺至哉乾坤定位而聖人之道參行乎其中亦猶水火異氣成味也同徳輪轅異象致逺也同功然則儒以中道御羣生罕言性命故世衰而寖息佛以大悲救諸苦廣啟因業故刦濁而益尊自白馬東來而人知像教佛衣始傳而人知心法𢎞以權實示其攝修味真實者即清淨以觀空存相好者怖威神而遷善厚於求者植因以覬福罹於苦者證業以銷寃革盜心於冥昧之間泯愛縁於死生之際隂助教化總持人天所謂生成之外别有陶冶刑政不及曲為調柔其方可言其㫖不可得而言也惟四海之大羣倫之富必有以得其門而㑹其宗者為世導師焉禪師諱乘廣其生容州姓張氏七嵗尚儒以俎豆為戲十三慕道遵壊削之儀至衡陽依天柱想公以啟初地至洛陽依荷澤㑹公以契真乘洪鐘藴聲扣之斯應陽燧合焰晞之乃明始由見性終得自在常謂機有淺深法無髙下分二宗者衆生存頓漸之見説三乘者如來開方便之門名自外得故生分别道由内證則無異同遂以攝化為心經行不倦愍彼南裔不聞佛經由是結廬此山心與境寂應念以起教隨方而立因居涉旬而善根者知歸逮周月而帶縛者漸悟以月倍日以年倍時瘖矇洞開荒憬潛革邑中長者十方善衆咸發信願大其藩垣法堂四阿股引僧舍身心恒寂象馬交馳墮其去來皆得利益踰嶺之北涉湘而南仰兹髙山知道有所在此地縁盡翛然化俱神歸佛境悲結人世自趺坐而滅至于茶毗三百有六旬矣爪髮加長容澤差衰真子號呼圍繞薪火得舍利如珠璣者數十百焉於戲肖圓方之形故寂滅以示盡入菩提之位故殊相以現靈亦猶鳯毛成字麟角生肉必有以異不知其然於是服勤聞法之上首曰甄升乃率其徒圓寂道𢎞如亮如海等相與抆淚具役建塔于禪室之右端從衆也初廣公始生之辰嵗在丁巳當𤣥宗之中元生三十而受且更臘五十二而終終之夕嵗直戊寅當徳宗之後元三月既望之又十日也後九年其門人還源以為崇塔以存神與建銘以垂休皆憑像寄懷不可以闕一謬謂余為習於文者故蠒足千里以誠相攻大懼其先師徳音與時寖逺且曰白月中黒東川無還颺于金石傳信百刧彼墮淚之感豈儒家者流專之敬酬斯言銘示真俗文曰如來説法徧滿大千得勝義者强名為禪至道不二至言無辯心法東行羣迷丕變七葉無嗣四魔潛扇佛衣生塵佛法如綿吾師覺者冥極道樞承受密印端如貫珠一室寥然髙山之隅為法來者千百人俱裔民嗤嗤户有犀渠攝以方便家藏佛書願力既普度門斯盛合為一乘散為萬行即動求靜故能常定絶縁離覺乃得究竟生非我樂死非我病現滅者身常圓者性本無言説付囑其誰等空無得後覺得之像閟虚塔迹留仁祠十方四輩瞻禮於斯䕫州始興寺移鐵像記佛薪盡于乾竺而象教東行是法平等故所至為淨土是身應供故隨念如降生先是魚復人有以利金為彌勒像者重千鈞晬容瑞相人天兩足鳬氏卒事而它工未備故寓于西偏不知其㡬年矣寺僧法照瞻禮發信赤肩白足入諸大城乃至聚落無空過者積十餘年得信財無量繇是購工以嘗巧募徒而畢力四輩増増工麾以肱中樞外脈隂轉陽動欻如地踴岌如山行大匠無言尊容嚮明青蓮承趺金獸捧持藻井花鬘葱蘢四垂邑人膜拜如佛出世法照以願力能就泣于佛前因持片石乞詞以示後按此寺始於宇文周初瀕江碑庳皇唐神龍中為水所壞有波那賴耶國僧廣照浮海而至頓錫不去遂移於今道場所山曰磨刀嶺曰虎岡其經始與克修皆蕃僧是力後之有志者豈無人哉法照䕫人姓穆氏年十有五出家依江陵名僧受具肇自貞元二十年甲申歸此寺願崇建有為凡修大殿立菩薩大弟子侍佛左右逮長慶癸卯有成其善植徳本者歟毗盧遮那佛華蔵世界圖讃佛説華嚴經直入妙覺不由諸乘非大圓智不能信解徳宗朝有龍象觀公能於是經了第一義居上都雲華寺名聞十方沙門嗣肇是其上足以經中九㑹纂成華藏俾人瞻禮即色生敬因請余讃之即説讃曰清淨不染花中蓮捧持世界百億千踴出香海浩無邊風輪負之晝夜旋大雄九㑹化諸天釋梵八部來森然從昏至覺不依縁初初極極性自圓寫之綃素色相全是色非色言非言成都府新修福成寺記益城右門銜大逵坦然西馳曰石笋街街之北有仁祠形焉直啟曰福成寺寺之殿臺與城之樓交錯相輝繡于碧霄望之如崑閬間物太和四年蜀帥非將材不修邊備南詔君長諜得内空乘隙坌入鬬于城下或縦火以駭衆此寺乃焚髙門修廊委為寒燼如是者再嵗帝念坤維丞相復來山川如迎父老相識環視故地寺為燋墟載興起廢之歎爰有植因之願乃命主俸吏以吾緍錢三十萬為經營之基自公來思蜀號無事時康嵗稔人樂檀施公言既先應如決川乃傾囊褚乃出懷袖勝因化愚慧力攝慳男奔女驟急於徴令匠者度材以指衆徒藝者運思以役衆技斤鋸磨礱丁丁登登陶者儲精圬者效龍欻自火宅復為金繩沿故鼎新因毁成妍華夷縱觀萬目同聳既告訖役公來慶成雲鮮日潤輝映前後於是都人舞抃而謠曰昔公去此福成以燬今公重還福成復完民安軍治亦如此寺庸可勿紀乎公實聞斯言遂折簡見命謹月而日之時太和某年某某月日大檀越具官封爵段氏其它發大願者程功董事者自中貴人及賔寮將吏若僧徒偕籍之而刻于石劉賔客文集巻四欽定四庫全書劉賔客文集巻五唐劉禹錫撰論上
