body:
  text: 鄭州刺史東㕔壁記古諸侯之居公私皆曰寢其它室曰便坐今凡視事之所皆曰㕔其它室以辨方為稱今年鄭州刺史楊君作東㕔既成而落之且以書抵余為記按國章以甲乙第方域大凡環天子之居為雄州鄭實邇王畿故望雄視其版多貴人且當大逵故務劇君侯始来三日司稅掾舉七縣董租之吏累百君曰此百螣也悉罷之用户符而輸入益辦司貢掾舉梨林之征請户曉君曰盡弛之勿籍用平賈而果益精里無吏迹民去痼疾授牘占租如臨詛盟土毛人力日夕相長故周嵗而完焉比年而愈肥雖軍興餽輓旁午大將牙旗往復相踵而里中清夷雞犬音和人既寧而物有餘政既成而日多暇圜視舊宇宜有以更之且書得時亦以謹始因列名氏授受月而日之庶乎繼踐于兹者知貫珠之首其山望澤浸土風甿俗與前賢之耿光備于正位有天寳中詞人杜頠之文在太和四年某月日管城新驛記太和二年閏三月滎陽守歸厚上言臣治所直天下大逵肘武牢而咽東夏誰何宜謹啟閉宜度先是驛于城中驛遽不時四門牡鍵通夕弗禁請更于外隧永永便安制曰可守臣奉詔無徴命無奪時糜羨財募游手逮八月既望新驛成鄭人胥説琢石而紀曰在兊之方面𤣥負陽門銜周道牆䕃行栗境勝于外也逺購名材旁延世工塈塗宣晳瓴甓剛滑術精于内也蘧廬有甲乙牀帳有冬夏庭容牙節廡卧囊橐示禮而不慁也内庖外廏髙倉邃庫積薪就陽峙芻就燥有素而不愆也主吏有第役夫有區師行者有饗亭孥行者有别邸周以髙墉乃樓其門勞迎展蠲潔之敬餞别起登臨之思溱洧波瀾嵩丘雲煙四時萬象來貺于我走轂奔蹄遄征急宣入而忘勞出必屢顧其傳舍之尤乎太守姓楊氏字貞一華隂𢎞農人鄭為雄州非聞人大吏不得在其選夫驛之宜選于外也前此二千石嘗言之而重改作若貞一可謂果於從政而決行其言惜乎未施於大也和州刺史㕔壁記歴陽古揚州之邑於天文直南斗魁下在春秋實句呉之封後為楚所取秦并天下以𨽻九江而六為九江治所晉平呉復𨽻淮南至永興初自析為郡益之以烏江宋臺建目為南豫州又益之以龍亢梁之亡北齊圖霸功擁貞陽侯以歸王僧辯來迎㑹于兹地二國和協故更名和州陳隋間無所革國朝因隋武徳中更龍亢為含山初開元詔書以口算第郡縣為三品是為下州元和中復命有司參校之遂進品第一按見户萬八千有竒輸緡錢十六萬嵗貢纎紵二篚呉牛蘇二鈞糝鱏九甕茅蒐七千兩鎮曰梁山浸曰歴湖田蓺四穀豢全六擾廬有㫖酒庖有腴魚神仙故事在郊在藪𤣥元有臺彭鏗有洞名山曰雞籠名塢曰濡須異有血閫祥有沸井城髙而堅亞父所營州師五百環峙于東南瀕江劃中流為水疆掲旗樹蕝十有六戍自孫權距陳出入六代常為宿兵之地多以材能人處之本朝混一號為善部然用人差輕非復曩時之比也始余以尚書郎得譴刺連山今也由巴東來牧考前二邦之籍與版圗纔什五六而地征三之究其所從來生植有本女工尚完堅一經一緯無文章交錯之竒男夫尚墾闢功苦戀本無即山近盬之逸市無􅅓眩工無彫彤無游人異物以遷其志副徴令者率非外求凡百為一出於農桑故也繇是而言瘠天下者其在多巧乎寳厯元年六月二十一日刺史中山劉某記山南西道節度使㕔壁記文皇帝初元始畫天下為十道古荆梁之地舉曰山南厥後析為東西天漢之邦實居右部按梁州為都督治所領十有五州縣道帶蠻夷山川扼隴蜀故二千石有採訪防禦之名兵興多故其任益重澄清節鉞二柄兼委建中末徳宗南巡狩偃翠華而徘徊簫勺之音洽于巴漢戡難清宫六龍言旋迺下詔復除征繇升州為府等威班制與歧益同地既尊大用人隨異故自興元至太和五十年間以勲庸佩相印者三以謩明歴真相者九由台席授鉞未㡬復入相者再焉磊落震耀冠于天下去年夏四月今丞相趙郡公徴還泰階遂命左僕射燉煌公往踐其武曏之真相及公而十焉初公自河陽節度使入操國柄其後鎮宣武以禮悛獷悍治天平以清去掊克居大鹵以仁蘇荐飢今來是都躡二三大君子之躅道同氣協無所改更如鼓和琴布指成韻𦍑夷砥平旱麓發生人無左言樂有夏聲俗既富庶居多閒暇圜視府局素闕者補之先是公堂嘗為行殿人不敢斥别營侯居應門有閌棨㦸未具公乃條白上言詔下有司可其奏軍門肅清方有眉目趨而入者聳然生敬焉惟梁山國也其節用虎出揚其威入貯宜潔舊處仄陋黷其雄稜公遂分宅之别齋且據便地暑曰節室卜剛日乃遷焉敬君命而壹民心軍中増氣而知禮戟衣既垂師節既嚴流眄屋壁見前修之名氏列于坐右第以梁州刺史鼎興元尹記與今稱謂不合因發函進牘于不佞且曰我已飾東壁以新志累子於是按南梁故事起自始登齋壇之後為記云時開成二年嵗在丁已春二月某日記山南西道新修驛路記開成四年梁州牧缺上玩其印凝旒深思曰伊爾卿族歸氏以文儒再世居喉舌今天官貳卿融能嗣其耿光嘗自内庭歴南臺尹轂下政事以試可為元侯乃付印綬進秩大宗伯兼御史大夫玉節獸符鎮于媯墟公拜手稽首曰臣融敢揚王休于天漢之域既莅止咨于羣執事求急病者先之咸曰華陽黒水昔稱醜地近者嘗為王所百態丕變人風邑屋與山水俱一都之㑹目為善部矣唯驛遽之途敧危隘束其醜尚存使如周道在公頥指耳於是因年有秋因府無事軍逸農隙人思賈餘乃懸墾山刋木之傭募其力揆鑚鑿撞柲之用庀其工具舁輦畚鍤之器膺其要鼛鼓以程之糗醪以犒之説使之令既下奮行之徒坌集我之提封踞右扶風觸劒閣千一百里自散闗抵襃城次舍十有五牙門將賈黯董之自襃而南逾利州至于劒門次舍十有七同節度副使石文穎董之兩將受命分曹星馳並山當蹊頑石萬狀坳者垤者兀者銛者磊落傾敧波翻獸蹲熾炭以烘之嚴䤈以沃之潰為埃煤一篲可埽棧閣盤虛下臨㰹呀層崖峭絶枘木亘鐵因而廣之限以鉤欄狹逕深陘銜尾相接從而拓之方駕從容急宣之騎宵夜不惑郄曲稜層一朝坦夷興役得時國人不知繇是駛行者忘其勞吉行者徐其驅孥行者家以安貨行者肩不病徒行者足不蠒乗行者蹄不刓公談私詠溢于人聴伊彼金其牛而誘之以利曷若我子其民而來之以義乎既訖役南梁人書事于牘請紀之以附于史官地里志劉賔客文集巻八欽定四庫全書劉賔客文集巻九唐劉禹錫撰記下夔
