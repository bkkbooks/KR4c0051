seq: 26
front:
  text: 汴州鄭門新亭記亭于西門尊闕路也實相公以心規羣僚以辭叶而百工以樂成斧斤無聲丹素有嚴主人肅容落以金石走鄭之門嶔為右垣黄河一支滉漾北軒前曕東顧甍動軌直含景生姿遡空欲翔汴城具八方之人殊形詭言而耳目一説初公來臨擁節及門馭吏曰此鄭州門公心非之若曰野哉居無何即舊號而更之曰鄭門故事王人大僚之去來元侯前驅翊門而旋率立馬塵坌中挹策為禮公心不然之乃下亭令于執事按亭東西函丈者三之有竒而南北五之有贏樂縣宴豆前後以位棊闔對明弭掀順時修梁衡建中虛上荷圓脊方亷髙卑中經簾鑪茵帟文椸睆榻儲以應猝周用而宜乃命尹閽視亭長抱闗視掌固啟閉拚除是謹是孜錫命賜胙勞迎贈餞我當躬行汝先汝蠲挾膳提醪生芻縞衣我寮展事靡問文武汝唯汝従凡入而修容凡出而修軷裼襲威儀勿籍勿訶繇是貴人稱諸朝羣吏詠於家行者誇于道與人同其安者人人驛其聲而吟之始乎諓諓而成乎龎鴻欲無文字不可也公遂條白其所以然逺命學古者書之公姓令狐氏以文章典内外書命以譽明登左右相以飛語策免以思材復徵自有浚師無如今治文武兩熾其古之大臣歟
