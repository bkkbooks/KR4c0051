body:
  text: 唐故福建等州都團練觀察處置使福州刺史兼御史中丞贈左散騎常侍薛公神道碑薛在三代為侯國介于鄒魯間傳世三十有一為齊所并其公子犇楚錫土田于沛漢末避仇之成都曹魏平蜀徙家汾隂遂為河東臨晉人自奚仲為夏車服大夫距今數千年乗軒服冕舄奕冠世言氏族者署為闗内甲姓天意若曰始有功於車服錫爾子孫世世有之公諱謇字某曽祖寶𦙍以名家子且有學行歴尚書郎雝州司馬邠州刺史王父繪有儁材刺三郡金宻緜皆以治聞累績至銀青光禄大夫封龍門侯烈考承矩以文亡害仕至大理丞公幼承前人之覆露補崇文生嵗滿得調主簿書于亳之譙苦二邑又尉于東畿之河清貞元中上方與丞相調兵食思得通吏治而習邊事者計相以公為對乃授監察御史裏行充京兆水運使局居鴈門主穀糴具舟檝募勇壯且便弓矢者為榜夫千有餘人隸尺籍伍符制如舟師詔以中貴人䕶之聲震塞上每發粟泝河北行涉戎落以饋縁邊諸軍及乗障者雖河塞回逺必克期如合符一嵗中省費萬計累加侍御史内供奉賜飛魚袋有司條白其勞入拜殿内史未㡬淮海節將以戎倅缺聞事下丞相御史擇可者僉曰公政事巳試遂授檢校户部外郎兼御史淮南軍司馬尋轉駕部郎中錫以金紫遇府遷申命真相趙國公帶中書侍郎代之公主行臺留務趙公文茵及境視置郵供帳及郊視將迎部伍下車視簾幃器備乃曰信竒才也此不足以展驥朝廷知之擢為泗濵守既報政就加御史中丞俄遷福建都團練觀察使閩有負海之饒其民悍而俗鬼居洞砦音寨家桴筏者與華言不通公兼戎索以治之五州民咸説元和十年某月某日薨于位年六十七贈左散騎常侍夫人趙郡李氏無兒蚤世繼夫人隴西李氏檢校禮部尚書河東節度使説之女生子凝為嗣季子茂𢎞以諸侯禮儀返塟故里蛾眉原従周也後二十有三年元曰開成凝為平盧従事謹按令甲礱碑石來乞詞以垂于悠久初公治粟于朔陲愚方冠恵文冠察行馬外事聆風相厚謂可妻也以元女歸之明年愚入尚書為郎職隸計司因白計相召公來㑹府行有日矣遇内禪惟新愚以縁坐左貶間闗外役竟不克面然而公之徳善灌注心耳孝悌為根柢誠明枝葉之直方為天質禮讓縁飾之所至藹然繇此道也公初下世故人丞相李太師誌其墓其畧曰𢎞深莊重幹敏絶人此與遊者傳信之詞也豈誣也哉故作銘曰河汾奫淪鼎氣歊雲散為昌光凝為賢人常侍之生其宗孔碩従祖昆弟詵詵三百文館入仕幽龍未光尺木為階欻然欲翔司會知材績宣朔方邊師萬喉俟我贏糧泝于黄河路出戎疆募乃勇士皁衣挽航膺索臂弧穹廬在旁虜聞公名憚不敢攘安北以南列城相望率有儲㣥皆成金湯入居殿中分巡輦下淮海軍大往為司馬軍中之治可移諸民乃牧于泗乃亷于閩閩悍而囂夷風脆急恩信綏之妥然如蟄閩方不淑天奪其福公薨于寢𤣥頳以復天王廢朝贈之金貂莓莓晉原鬱矣中條大墓舊阡松楸蕭蕭笳鼓以歸徳音孔昭許州文宣王新廟碑嵗在丙辰元曰開成許州牧尚書杜公作文宣王廟暨學舍于兊隅革故而鼎新也前年公受社與鉞且董淮揚汝南之師八月上丁釋菜于宣父之室陋宇荒階不足回旋巳事而歎乃詢黄髮有鄉先生前致辭曰自盜起幽陵許為兵衝連戰交捽率無寧嵗耳説鉦鼓不聞弦歌目不知書不害為智爾來生聚教養起居祖習壹出於軍容今幸天子憐許民為擇賢侯此人人思治之時也公曰諾吾當先後之於是元年修戎律以通衆志次年成郡政以蠲民瘼季年崇教本以厚民風我言既従乃卜新宫潩水之瀕城池在東登登其杵坎坎其斧繩之墨之鑿枘枝梧載塈載塗􅀈焉陵虛寝廟𢎞敞齋宫嚴閟軒墀廂廡儼雅清潔門庭牆仞望之生敬外飾觚稜中設黼幄嚮明當宁用王禮也堯頭禹身華冠象佩之容取之自鄒魯及門覩奥偶形畫像之儀取之自太學尊彞籩豆青黄規矩之器秉周禮也犧牲制幣薦獻陞降之節遵國章也蔵經于重檐斂器于庋櫝講筵有位鼓篋有室授經有博士督課有助教指蹤有役夫灑埽有廟幹公又割隙地為廣圃蒔其柔蔬而常菹㫖蓄之禦備捨己俸為子錢𣙜其孳贏而鹽酪釭膏之用給濟濟莘莘化行風驅家慕恭儉户知敬讓父誨其子兄規其弟不遊學堂與撻市同繇是縻勇爵戴鶡冠者往往弭雄姿而觀習禮矜甲胄者知根於忠信服縵胡者不敢侮逢掖教化之移人也如置郵焉冬十一月許人以新儒宫成来告且乞詞欲行乎逺也公名悰字永裕故丞相岐國公之孫岐公弼諧三帝碩學冠天下嘗著書二百餘篇言禮樂刑政古今損益統名曰通典蔵在石室副行人間今孝孫聿脩之形乎事業播于聲詩懿哉能世其家也禹錫昔年忝岐公門下生四參公府近年牧汝州道許昌躬閱其政故不得讓遂銘于麗牲之碑銘曰許分韓魏四征之地兵興已還其鬬㘖㘖亦有儒宫軋于兵間賢侯戾止思樂泮水俾人向學王化之始便地爰相新規鬱起廟貌斯嚴堂皇有煒秩秩禮物祁祁胄子入于門牆如造闕里春誦夏弦載颺淑聲風于閭閻浹于郊坰途讓班白家尊父兄與化而遷其猶性成昔之委巷相詬交侮今逢親戚不道媟語昔之連營誇力使酒今遇賔客斂容拱手魯有泮林鳥革其音許崇學斆民説其教鐫于圭石以志新廟唐故朝散大夫檢校尚書吏部郎中兼御史中丞賜紫金魚袋清河縣開國男贈太師崔公神道碑太師名倕字某清河東武城人太公望既封于營丘子伋嗣侯伋之孫曰穆伯食邑于崔遂以為氏後十四世至秦末東萊侯意如東萊之子伯基始居清河又十五葉生琰為魏名臣又九葉生休仕後魏為七兵尚書七兵之弟曰寅為樂安太守公即樂安八代孫始以門子補鄭州參軍力行好學於子道以孝聞處伯仲間以友聞讀易至編絶以精義聞至徳中戎羯猾夏王師出征公少有竒志思因時以自奮乃作伐鯨鯢賦上獻既聞爾矣果器之㑹第五丞相以善言利得幸盡付利權始有鹽鐵使之目慎選寮屬表公為介轉臨晉縣丞處繁應卒鋩刃不頓府罷再遷至太子司議郎韓晉公時為户部侍郎掌邦賦急於用材薦公為監察御史主河東租庸之務尋轉侍御史充京東平糴使建中初徳宗始親萬機儲精治本有漢宣與我共理之歎謂大臣求可當良二千石者遂以公帶本官權知袁州刺史期月有成詔書顯揚就加真秩益以金紫居無何韓晉公為丞相制國用思公前績乃傳召之抵京師授檢校户部郎中兼侍御史斡池鹽于蒲修牢盆謹衡石煎和既精飴散乃盈商通而荐至吏懼而循法民不絓網而國用益饒嵗杪㑹其所入贏羡什百詔下襃其能轉吏部正郎兼御史中丞且加五等之爵方倚以重任天富其材而不遐其福享齡六十有五貞元七年某月某日遘疾終于治所上聞悼之因降愍冊贈鄭州刺史賚錢三百萬以備飾終之禮明年某月某日返𦵏于成周之偃師從世墓也累贈至太師夫人隴西李氏汾州司倉參軍咸一之女生才子六人長曰邠及公時已為左拾遺後至太常次曰酆至太府卿次曰郾至外臺尚書次曰郇今為廷尉次曰鄯至執金吾季曰鄲今為太常卿同中書門下平章事惟夫人姑臧冠族以蘋蘩組紃輔佐君子為令妻積三十餘年以慈儉忠厚訓誡諸子為賢母二十有三年當永貞初順宗踐祚澤流累葉長子邠時為詞臣草冊書以文當進階遂上疏乞移榮於親優詔允之特封清河郡太君士林聳慕皆自痛其不及邠為太常酆為大農咸白髮貴綬以奉膳羞諸季各以簪裾給事左右愉愉然先意無違言世榮者舉無與比以子貴累封贈至涼國太夫人元和八年三月十六日捐館舍夀七十有九是嵗十月某日合祔惟太常及尚書暨今相國皆自中書舍人為禮部侍郎凡五貢賢能書得士百四十有八人言兄弟者許為人瑞崔氏之門六人皆入文昌宫其間三人歴八侍郎統而論之三大卿兩連率二翰林學士一執金吾言冠冕者許為世雄與姑臧李范陽盧世為婚媾入于姻黨無第二流言門閥者許為時表太常二子亦以才能同入尚書璜為吏部郎瓘為司勲郎其它支孫未登金閨籍者詵詵然魚貫而進文業甚似而孝謹不衰猗歟君子之澤其所從來逺而有光乎開成已未嵗七月甲辰相君受詔于明庭始操國柄仲月奉嘗事于家禮成起慕悄然永懐曰古者卿大夫廟有鼎墓有碑皆銘之以紀先徳也今備位宰相敢不敭前人之耿光乃俾家老條白事功咨扵學古者徴其詞尚信也又命宗祝卜柔日告于廟盡誠也儀甚備而敬有餘斯所謂達禮之君子遂刋勒如式掲于道周銘曰奕奕四姓崔為之冠瞻其門牆倬若雲漢善積家肥子孫多材如彼榱棟必生徂徠太公之後彌二千祀炯如貫珠焯見圖史顯允太師丕承徳基構于其堂亦既塈茨生逢艱虞戎夏交師獻賦伐叛忠存乎詞兵興事叢飛輓四馳歴踐劇職視屯如夷乃主平糴乃分竹使治粟為邦其道一致蒲實近地鹽為利泓使車來思剗弊立程吏亷商通嵗倍其贏奏課連最徳音襃明就加執法好爵兼榮天賦之才不與夀并生樹徳本没揚淑聲上聞軫懐侑樂為停贈禭之禮侔于公卿萬石貽訓根於孝友太丘種徳乃稔身後家有令子妻為夀母三十餘年人倫之首六子來侍如龍如虎衆婦來饋維筐及筥佩玉鳴環交響庭户申申秩秩歡不踰矩昔為甲族今為興門天爵人爵蔚然兩尊先徳䕃之黕如重雲孕和含粹濯潤本根景亳之原圖書之川陽陵帝壇磅礴回環世安其神世嗣其賢聆徳風者拜于碑前唐故宣歙池等州都團練觀察處置使宣州刺史兼御史中丞贈左散騎常侍王公神道碑常侍諱質字華卿始得姓自周靈王太子晉賔天而僊時人曰王子因去姬為王氐自秦漢以還世多顯名由今而上十有一代名傑仕元魏為并州刺史子孫因家遂為太原祁人并州六代孫名通字仲淹在隋朝諸儒唯通能明王道隠居白牛谿㳺其門皆天下儁傑著書行於世既没諡曰文中子文中生福祚為蔡州上蔡主簿上蔡生勉舉進士徴賢良皆上第仕至河中府寶鼎令寶鼎即公之曽祖也祖諱怡渝州司户參軍考諱潛揚州天長縣丞贈尚書吏部郎中公其季子也始文中先生有重名於隋末其弟績亦以有道顯於國初自號東臯子文章髙逸傳乎人間議者謂兄以大中立言弟游方外遂性二百年間君子稱之雖四夷亦聞其名字公雅有逺志常自忖度我大名之後不宜無見焉遂力學厚自淬琢扵春秋得其公是於禮得之約僑居淝水上躬督穡事善積於已而淮楚間羣彦多與之游公歉然自少無進取意與游者激之曰卿文儒家子篤志如是盍求發聞去聲俾家聲不頽今夫以文學茫洋當世者誰如華卿庸自棄耶入謀于閨門咸以外言為是因決䇿而西在貢士籍天和内充不以時尚屑意角逐攻取初無此心如楩楠生于深林未始自貴而度材者一眄歆然在懐故以不争而速售既登第東諸侯交辟之從主者書記于嶺南授正字㕘謀于淮右進協律郎其後佐許下暨梓潼南梁率為上介官至兼監察御史司憲聞其賢徴入南臺轉殿内歴侍御史改尚書户部外郎復為知已所薦遷檢校司封郎中攝御史中丞紫衣金章充山南西道節度副使入為尚書户部郎中以方雅特立除諌議大夫㑹宋丞相坐狷直為飛語所陷抱不測之罪大僚進言無益公率諫官數輩日晏伏閤上為不時開便殿公於旅進中獨感激雪涕居多由是上怒稍解得從輕比公終以言責為憂求為虢州刺史宰相惜去又重違誠請増之以兼御史中丞用示異於人也大凡以智謀而進者有時而衰以朴厚而知者無迹而固公雅為今揚州牧賛皇公所知人不見其迹方其虢略賛皇入相擢為左曹給事中凡有大官缺必寵薦居數月遷河南尹又未㡬鎮宛陵是三者中外所注意不旬嵗而周歴之時論不以為黨河南帝之别京其治尚體度風采而别白區處之宣城國之奥壤其治在束吏恵下蘇罷羸讋剽輕而勞徕澄汰之公兩得其道不由一檢率身以儉而素風存任人以誠而羣務舉遇中貴人以禮而故態革内潔其志下盡其忠外無以撓扵理三者具求政之有秕曷由哉在鎮三載開成元年十二月八日薨于位享年六十三監軍使上言有詔軫悼不視朝贈左散騎常侍明年八月十一日𦵏于河南府永寧縣洛川鄉史原從舊阡也初公娶于滎陽鄭氏生三女而没今葢祔焉一子曰慶存方齓矣猶子前太原府㕘軍扶執宗長書来請曰扶也蚤孤荷世父常侍之覆露今其嗣幼未任克家姑封琴書司管鑰以俟其長竊懼世父之徳音不敭思有以垂于後者以誠告于従叔大司農復命曰俞謹礱貞石以乞詞無忽余昔為郎與常侍同列已熟其行實及讀墓誌即今丞相益州牧趙郡李公之文自稱為忘形友其在宣州李公再入相議以第一官處之牢讓不取羔鴈所禮則河東裴夷直天水趙晢隴西李行方呉郡陸紹梁國劉蕡博陵崔珦人咸曰得士夫揚州少與也而見器益州寡合也而見親六從事才不一也而畢樂用是足以觀徳庸可勿紀焉銘曰隋有文中紹敭㣲言當時偉人咸出其門粹氣紆餘鍾于後昆常侍恂恂文中來孫發源髙麓中沫後大蘭牙茁然秀出叢薈善不近名其聲日彰行勇於退其道愈光哲者知之寘于周行以正持憲以文為郎以和佐戎以恵臨邦以直司諫以公駮政守于三川頑民底定乃鎮于宣先馳淑聲邑中婆娑瞻我斾旌問誰詢謀濟濟君子問誰出内潔潔亷士道本乎心暢于四支治本乎正形于百為黠吏斂手齊民揚眉江淮藪空夜柝弗施公卧于齋邦民悽悽公衣升屋邦民行哭牙璋斯来栁翣言旋棠樹未老周人慕焉熊耳之陽泱泱洛川佳城在兹既固且安松楸飋然石馬矯然過者必敬宛陵之阡唐故邠寧慶等州節度觀察處置使朝散大夫檢校户部尚書兼御史大夫賜紫金魚袋贈右僕射史公神道碑僕射名孝章字得仁本北方之强世雄朔野其後因仕中國遂為靈武建康人曽祖道徳贈右散騎常侍封懐澤郡王祖周洛銀青光禄大夫檢校太常卿兼御史中丞北海郡王贈太子太保考憲成蚤以武勇絶人積功至魏博節度使終于河中晉絳慈隰等州節度觀察使檢校司徒兼侍中河中尹贈太保其薨也大臣中書令晉國公裴氏為之碑其名益顯公即侍中之元子母曰冀國夫人李氏幼而聰寤父母賢而加愛焉及長好學遷善秀出儕輩鄴下諸兒號為書生元和中太尉愬為魏帥下令掄材於轅門取大將家翹秀者為子弟軍列于諸校之上公獨昌言願效文職太尉深竒之遂假魏州大都督府㕘軍長慶二年常山衆叛害其帥沂國公田司徒於帳下沂公發跡于魏人猶懐之詔命其子布以尚書授鉞統魏兵問罪于北疆且報家禍布既啟行士氣不振渙然内潰獨與冗從之旅偃旗而歸百憤攻中卒自引決先侍中時為中軍都知兵馬使兼御史中丞全師在野鬨然推戴之請為假侯以鎮定中貴人飛驛上聞穆宗夜召翰林學士草詔書以真侯命之實有魏土從衆而合權也是嵗公自攝官轉本府士曹㕘軍兼監察御史賜朱衣銀印推恩以及子也一旦跪於父母前進苦言曰臣竊惟大河之北地雄兵精而天下賢士心侮之目曰河朔間視猶夷狄何也蓋有土者多乗兵機際㑹非以義取今臣家父侯母封化為貴門君恩至矣非痛折節礪行彰信於朝廷無以弭識者之譏寤明君之意節著於外福延于家乗時蹈機禍不旋踵言訖泣下數行父俞母賛天性交感三心既叶萬衆潛化天子聞而嘉之曰彼真有子乃授檢校太子左諭徳兼侍御史充節度副使累遷至散騎常侍兼御史大夫賜金印紫綬既貳軍政事如命卿弛張損益得以㕘決潛革故態人知嚮方太和二年滄景節度使李全略卒其子同捷竊據故地詔下以文告弗革遂用大刑先侍中表請率先諸侯使元子以督戰制曰可公承君父之命乃捐其軀一舉而下平原壓滄壘由是加工部尚書及王師凱旋上表願一識承明廬詔允之遂赴北闕下得覿於便殿上曰嚮吾始征滄州議者皆曰彼魏之姻也慮隂為寇謀吾發使數輩以偵之其還也僉曰爾父瀝款於賔筵爾毋抗詞於簾下願絶姻以立效其經始啓發出於爾心今滄海底平䇿勲之日宜貴爾三族命爾父為侍中遷鎮于近地加爾禮部尚書析相衞澶三州為鎮以居之俾爾一門大榮以誇天下公拜稽首謝父遷讓已爵禮無違者翌日詔下于明庭人咸曰史氏之寵光古無有也牙旗碧幢方指東道侍中以帳下生變聞泰極而否當歌而哭迎柩于路仰天長號因𦵏于洛陽之邙山冀國夫人祔焉寢苫枕塊以所仇同天為大酷未㡬詔舉金革之義起為右金吾將軍累表陳乞有司以違命督之輿疾即路間嵗擢授鄜坊丹延等州節度觀察處置等使居四年遷鎮于滑一嵗入為右領軍衞大將軍旋改右金吾大將軍又授鉞于邠土孟秋至治所首冬遘疾拜章入覲不克展和鸞鞗革之儀薨于靖恭里之私第享齡三十九當開成三年十月二十日上聞而悼之不視朝一日贈尚書右僕射明年二月歸𦵏于洛都夫人琅邪王氏祔焉繼室深澤縣君博陵崔氏有一子曰煥生七年而孤僕射之喪自復魄至𦵏當門户備祭祀建碑表皆縣君之能且命其家老具事功來請曰􅄔不恤家而憂幼嗣不知其先人之官業乞詞以傳于後也君子以為知禮謹書之銘曰斗極之下崆峒播氣鍾于侍中孔武且貴奉上致命宜昌後嗣僕射承之良弓不墜耳煩鉦鼓心説文字虎穴之中生此騏驥太和紀元滄景不䖍子弄父兵跳浪海壖有隣隂交蝟起雞連詔下薄伐艮隅騷然時惟侍中實統魏師蓄銳未發衆心危疑僕射為子陳謀盡詞興言涕零有感尊慈絶姻效節精貫神祗滄波底寧王師襃之乃遷元侯来鎮近畿乃胙元子别建旌麾一門四節焜燿當時倐忽變生魏郊紛披喬木雖大盲風不知干雲之臺列缺焚之哀哀孝嗣丁此大酷迎䕶幃輤𦵏于東洛訴天觸地血染縗服禮有金革詔書敦促不遂枕戈驟膺推轂雕隂白馬暨于邠谷雖榮三鎮不荷百禄綺紈之間珪組纍纍如彼晨葩日中而萎有妻名家有子稺齒行號執禮歸窆蒿里洛水之陽循邙之趾昭尊穆敬幽顯同理舊松新栢亦象橋梓刻石紀功垂千萬祀劉賔客文集巻三欽定四庫全書劉賔客文集巻四唐劉禹錫撰碑下
