front:
  text: 杜司徒讓度支鹽鐵等使表臣某言伏奉制書授臣檢校司徒同中書門下平章事充度支及諸道鹽鐵轉運等使者臣久塵髙位尸素巳多更受新恩滿盈為懼云云伏惟皇帝陛下紹登寳位光纂鴻猷擢用之間華夷聳聴況利權所在宜適變通國計是資須明輕重當至化鼎新之日是微臣遲莫之年將何以上副宸衷下成庶務進退惟谷氷炭在懐輒罄愚誠冀回天監陳力無補庶遵周任之言循涯若驚敢飾范宣之讓慙惶跼蹐倍萬常情謹奉表陳讓以聞
  hash: sha256:067a3226f3cc6f77deffb615c2f241d6e1ef9c4c6c607795c60db0fa2a694770
