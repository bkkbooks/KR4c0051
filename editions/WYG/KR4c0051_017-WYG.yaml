  - {type: page-break, offset: 95, content: '', id: KR4c0051_WYG_013-1b, image: WYG1077/WYG1077-0403d.png}
body:
  text: 杜司徒謝追贈表臣某言伏奉制書襃贈臣亡父先臣某官尚書左僕射者時逢霈澤禮極徽章云云臣家受國恩至臣累葉常懼不克負荷以忝前人豈意多幸遭逢猥居髙位陛下應乾御極作解庇人恩浹寰區禮成宗廟垂仁布徳自葉流根紫書忽降於重霄宻印榮加於厚夜星霜増感蒸嘗有輝非臣殞越所能上報無任感咽屏營之至杜司徒讓淮南立去思碑表臣某言伏見淮南節度使王鍔所奏當道將吏僧道耆夀等請為臣立去思碑伏奉聖㫖允其所奏臣内惟菲薄聲績無聞祗荷恩私慙懼交至云云臣伏䝉先朝過奬累典方隅頃鎮江都十有四載數周星紀水旱備經境接淮濆兵戈時起至於邑里粗免流離非臣所能悉稟聖化在唐堯可封之日奚假吏師當漢宣責實之時皆承詔㫖王鍔與臣交代輒有上聞況以去思為名慙無可紀之績伏以建碑有制甲令垂文茍非至公翻益貽誚臣伏覽故事宋璟自廣州都督入為尚書南海之人請為刋石璟自遜讓至于再三雖勒其文竟従降制著在國史垂為美談璟非茍榮人益見徳臣才誠不逮心實慕之伏乞聖慈賜寢前命臣情非飾讓義在徇公云云京兆李尹賀遷獻懿二祖表實臣某言伏見詔書以今月某日奉遷獻祖懿祖神主祔于徳明興聖皇帝廟盛禮云畢宗祧永安云云伏以太祖景皇帝膺期撫運啟封于唐為百代不遷之宗開三靈眷命之兆頃以本朝初建清廟備儀二祖冠西室之先景皇闕東向之位諸儒獻議歴載未行陛下濬發叡謨旁延正論爰詔多士㑹於中臺酌三禮之前文參百王之故事講貫斯定詢謀僉同撰日展儀考祥視履配貴神於逺祖正尊位於始封廟貌有嚴禘嘗允穆示人以孝得禮之中既觀秩秩之容必降穰穰之福臣職居内史屬忝本枝躬導盛儀獲申誠敬無任感説屏營之至京兆韋尹賀雨止表夏卿臣某言今月某日中使呉文政奉宣聖㫖縁今年雨多恐傷苗稼諸有靈跡處並宜祈禱者臣謹檢尋祀典方議徧祠惟徳動天倐已澄霽伏以至教恵農兆人務本今嵗宿麥茂於常年爰自季春遂逢多雨蓋隂陽常數有以推遷而隴畝之間未聞傷敗陛下勞謙思切覆育恩深或慮成災先期軫念昭薦未陳於方社叡誠巳格於上𤣥文明煥開隂曀潛掃有年之慶實兆於兹辰先天不違夐超於前代臣謬司京邑䖍撫蒸黎欣抃之誠倍百羣品無任踴躍屏營之至京兆韋尹賀祈晴獲應表臣某言今月十七日中使某奉宣聖㫖以霖雨未晴諸有靈跡處並令祈禱者臣當時於興聖寺竹林神親自祈祝兼差官城外分路徧祠伏以神祗效靈景物澄霽兆庶覩動天之徳大田俟多稼之期臣謬荷恩輝忝司京邑抃説之至實倍常情京兆韋尹謝許折糴表臣某言伏奉詔㫖以臣所請畿内折糴宜令度支計㑹定數奏來者天慈廣被人瘼是求臣自理京邑不先威刑唯務便安所期富庶每因賜對常奉徳音府縣之間巨細令奏伏以聖明在上風雨應時順成之年穀糴常賤若無輕重之法必利兼并之家輒敢上聞請行折糴天光下燭人隠無遺宣付所司允臣所奏事闗理本恵及生靈臣忝尹京倍百欣荷無任歡躍屏營之至京兆韋尹賀元日祥雪表臣某言伏以去冬以來久無雨雪臣每於内殿親奉徳音以宿麥未滋為虞以兆人生疾為念聖情所屬神理潛通獻嵗發春佳雪肇降當夷夏㑹同之日覩天人合應之徵迎喜氣於三元浹歡心於萬國癘疵永息豐阜可期臣以疾疹未平步趨有阻伏䝉恩貸巳具奏聞謹於光宅寺中管當本務不獲隨例稱慶明庭既覩嘉祥益彰聖徳無任欣躍屏營之至京兆韋尹賀春雪表臣某言伏奉詔㫖充某郡主禮命使謝恩之日親承徳音以春初巳來雨雪猶少慮妨農事有軫睿慈今當下嫁之辰克致上𤣥之感雲生河漢及佳期而降祥雪滿寰區應豐年而呈瑞臣官當撫字職在肅雍慶抃之誠實倍常品京兆李尹賀雨表臣某言伏奉進㫖以時雨愆候有妨耕農應諸有靈跡處並令祈請者徳音才發膏雨驟飛滂霈已周動植咸説云云伏以久愆時澤上軫聖慈爰命禱祈俾申誠敬神應如響天且不違未興雲漢之詩已致桑林之雨臣謬司京邑䖍撫黎蒸覩豐年之可期同比屋而稱慶無任欣抃之至李中丞謝賜紫雪面脂等表汶臣某言中使某乙至奉宣聖㫖賜臣紫雪紅雪面脂口脂各一合澡豆一袋特降王人俯臨私第銜恩慶抃省巳慙惶云云臣謬荷寵私素無績效空變星霜之候猥霑慶賜之恩跪捧雕奩榮觀珍藥功能去疾永絶於癘疵澤可飾容頓光於蒲柳生成是荷雨露難酬無任感戴之至李中丞謝鍾馗厯日表臣某言中使某乙至奉宣聖㫖賜臣畫鍾馗一新厯日一軸恩降雲霄光生里巷雖當嵗莫如煦陽和云云伏以將慶新年聿循故事繪其神象表去癘之方頒以厯書敬授時之始微臣何幸天意不遺無任感戴屏營之至杜相公謝鍾馗厯日表臣某言髙品某乙至奉宣聖㫖賜臣鍾馗一新厯日一軸星紀方回雖逢嵗盡恩輝忽降巳覺春來云云伏以圖寫威神驅徐羣癘頒行肆厯敬授四時弛張有嚴既増門户之貴動用協吉常為掌握之珍曕仰披尋皆知聖澤無任欣戴之至貞元二十一年十二月日武中丞謝新茶表元衡臣某言中使竇國安奉宣聖㫖賜臣新茶一斤猥降王人光臨私室恭承慶賜跪啟緘封云云伏以方隅入貢採擷至珍自逺爰來以新為貴捧而觀妙飲以滌煩顧蘭露而慙芳豈柘漿而齊味既榮凡口倍切丹心無任歡躍感恩之至貞元二十年三月日武中丞謝春衣表臣某言中使某乙奉宣聖㫖賜臣春衣一副王人臨第御府降衣抃舞失容捧戴無措云云伏以律當春莫慶洽時邕萬物被薫風之和九天垂湛露之澤臣受任非次速尤是虞方懷匪服之憂更荷解衣之賜恩加盡飾拖朱紫而為榮受非以庸顧形影而増愧丹誠徒罄𤣥造難酬無任踴躍屏營之至武中丞再謝新茶表臣某言中使某乙奉宣聖㫖賜臣新茶一斤猥沐深恩再霑殊錫承㫖慶抃省躬慙惶伏以貢自外方珍殊衆品效參藥石芳越椒蘭出自僊㕑俯頒私室義同推食空荷於曲成責在素餐實慙於虛受武中丞謝新橘表臣某言中使某乙至奉宣聖㫖賜臣新橘若干顆特降恩光猥頒慶賜珍踰百果榮比兼金伏以丹實初成苞貢爰至芬馨味重方列於御筵雨露恩深忽霑於賤品感同推食事等絶甘豈唯適口為珍實冀捐軀上荅武中丞謝柑子表臣某言中使某乙至奉宣聖㫖賜臣柑子若干顆特降殊私再頒名果自逺稱貴以新為榮伏以方貢外來人間未覩黄苞輝穎雕俎増華芬芳初佐於大庖慶賜遂沾于凡口甘踰苹實剖食既同于楚謠寒比柘漿析酲何慙于漢史感恩思效倍百常情武中丞謝冬衣表臣某言中使某乙至奉宣聖㫖賜臣冬衣一副恩降重霄榮加陋質承㫖慶抃省躬慙惶臣受任巳來微效莫著每更時律慙曠官常豈謂𤣥造曲成鴻私荐及念兹戒寒之候錫以禦冬之衣抃舞失容顧眄増飾鶴紋是錫逺慙晉代之賢鵜翼不濡實懼曹風之刺無任感戴屏營之至劉賔客文集巻十三欽定四庫全書劉賔客文集巻十四唐劉禹錫撰表章四牋附為容州
