front:
  text: 劉夢得文集卷第六
  hash: sha256:4b4271ce4d89b0a909b09511554df9a6e16a79fb75ee1ba3c030b5843a3b9089
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_006-1a}
body:
  text: 送別詩送張侍郎送楊侍御送蕭郎中送李尚書送渾大夫送源中丞送陸侍御送太常蕭􅀶士送王司馬送楊處厚逢韓七中丞送周使君留別張侍御送家兄隱居送王師魯別友人後得書送李僕射重送李相公送張苕送能判官送韋秀才道沖赴制舉送李策秀才送張盥赴舉送裴處士應舉送錢侍御辤李相公送令狐相公送趙中丞送裴司徒令公送李戸部侍郎送李郎中送杜録事夜宴盧常侍宅送崔司業使君送皇甫少尹送蔡京送唐舎人送盧處士送李秀才赴舉送令狐􅀶士送李貟外送陳郎中送李中丞送李庚先輩送廖參謀送從弟郎中送工部張侍郎入蕃弔祭時張兼御史月窟賔諸夏雲官降九天飾終鄰好重錫命禮容全水咽猶登隴沙鳴稍極邊路因乗馹近志爲飲冰堅毳帳差池見鳥旗揺曵前歸來賜金石榮耀自編年早秋送臺院楊侍御歸朝兄弟四人遍歷諸科二人同在省仙署棣華春當時巳絶倫今朝丹闕下更入白眉人重振髙陽族分居要路津一門科第足五府辟書頻􅋧鳥得秋氣法星懸火旻聖朝寰海靜所至不埋輪送工部蕭郎中刑部李郎中並以夲官兼中丞分命充京西京北覆糧使霜簡映金章相輝同舎郎天威巡虎落星使出鴛行鐏俎成全䇿京坻閱見糧歸來虜塵滅畫地奏明光送李尚書鎭滑州自淅西觀察徴拜兵部侍郎月餘有此拜也南徐報政入文昌東郡須才別建章視草名髙同蜀客擁旄年少勝荀郎黃河一曲當城下緹􅀐千重照路傍自古相門還岀相如今人望在巖廊其後果繼韋平之族送渾大夫赴豐州自大鴻臚拜家丞舊勲鳳銜新詔降恩華又見旌旗出渾家故吏來辤辛屬國精兵願逐李輕車氊裘君長迎風懼錦領酋豪踏雪衙其柰明年好春日無人喚看牡丹花送源中丞充新羅􅁽立使侍中之孫相門才子稱華簪持節東行捧德音官帶霜威辤鳯闕口傳天語到鷄林煙開鼇背千㝷碧日落鯨波萬頃金想見扶桑受恩後一時西拜盡傾心送陸侍御歸淮南使府五韻用年字江左重詩篇陸生名乆傳鳳城來巳熟羊酪不嫌羶歸路芙蓉府離堂瑇瑁筵秦山呈臘雪隋柳布新年曾忝楊州薦因君逹短牋時從丞相鎭揚州甞辱麦薦送太常蕭􅀶士弃官歸養赴東都時元兄罷相爲少師仲兄爲郎官並分司洛邑兄弟盡鴛鸞歸心切問安貪榮五彩服遂挂兩梁冠侍膳曾調鼎循陔更握蘭從今別君後長嚮德星看送王司馬之陜州自太常丞授工爲詩暫輟清齋岀太常空攜詩卷赴甘棠府公旣有朝中舊司馬應容酒後狂案牘來時唯署字風煙入興便成章兩京大道多遊客每遇詞人戰一場洛中送楊處厚入􅀜因遊蜀洛陽秋日正淒淒君去西秦更向西舊學三冬今轉富曾傷六翮養初齊王城曉入窺丹鳳蜀路晴來見碧鷄早識卧龍應有分不妨從此躡丹梯洛中逢韓七中丞之吳興口號五首昔年意氣結羣英幾度朝迴一字行海北天南零落盡兩人相見洛陽城自從雲散各東西每日歡娱却慘悽離別苦多相見少一生心事在書題今朝無意訴離杯何況清􅃶急管催夲欲醉中輕逺別不知翻引酒悲來槖它橋上蘋風起鸚鵡杯中蒻􅀨春水碧山青知好處開顔一􅀏嚮何人谿中士女出笆籬谿上鴛鴦避畫旗何處人間似仙境春山攜妓採茶時送周使君罷渝州歸郢中別墅君思郢上吟歸去故自渝南擲郡章野戍岸􅁁留畫舸緑蘿隂下到仙莊池荷􅀨後衣香起庭草春深綬帶長秪恐鳴騶催上道不容待得晚菰甞發華州留別張侍御賈束簡下延閣假符驅短轅同人惜分袂結念醉芳罇切切別􅃶急蕭蕭征􅀐煩臨岐無限意相視却忘言張詩云夫子生知者相期性理中遂有忘言之句奉送家兄歸王屋山隱居二首據道書王屋山一名陽洛山陽洛天壇上依俙似玉京夜分先見日月淨逺聞笙雲路將雞犬丹臺有姓名古來成道者兄弟亦同行春來山事好歸去憶逍遥水淨苔莎色露香芝术苗登臺吸瑞景飛歩翼神颷願薦塤箎曲相將學玉簫送王師魯恊律赴湖南使幕即永穆公之孫翩翩馬上郎驅傳渡三湘橘樹沙洲暗松醪酒肆香素風傳竹帛髙價騁琳琅楚水多蘭􅀂何人事搴芳別友人後得書因以詩贈前時送君去揮手青門橋路轉不相見猶聞馬蕭蕭今得出􅀜書行塵日巳遥春還遲君至共結芳蘭苕奉送浙西李僕射相公赴鎭奉送至臨泉驛書札見徵拙詩時在汝州建節東行是舊遊歡聲喜氣滿吴州郡人重得黃丞相童子爭迎郭細侯詔下初辤温室樹夢中先到景陽樓自憐不識平津閤遥望旌旗汝水頭重送浙西李相公頃嘗鎮江南巳經七載後歷滑臺劒南兩鎭遂入相今復領舊地新加旌旄江北萬人看玉節江南千􅀐引金鐃鳯從池上遊滄海鶴到遼東識舊巢城下清波含百谷牎中逺岫列三茅碧雞白馬徊翔乆却憶朱方是樂郊送華隂尉張苕赴邕府使幕張即燕公之孫頃坐事除名昔忝南宫郎往來東觀頻甞披燕公傳聳􅀂窺三辰翊聖崇國夲保賢正朝倫髙視緬今古清風夐無鄰蘭錡照通衢一家十朱輪鄼國嗣侯絶蔿郷貴業貧夫子承大名少年振芳塵青袍仙掌下矯首凌煙旻公冶夲非罪潘郎一爲民風霜苦揺落堅白無緇磷一旦逢良時天光燭幽淪重爲長裾客佐彼觀風臣分野窮禹畫人煙過虞巡不言此行逺所樂相知新􅀨起巫山陽鳥鳴湘水濵離筵出蒼莽別曲多愁辛今朝一杯酒明日千里人彼此􅀌舟去悠悠天海春送湘陽能判官孺登府罷歸鍾陵因􅀉呈江西裴中丞二十三兄三首射策志未就從事府云除篋留馬卿賦袖有劉􅀪書忽見夏木深悵然憶吾廬復持州民刺歸謁專城居君家誠易知勝絶傾里閭人言北郭生門有卿相輿鍾陵藹千里帶郭西江水朱檻照河宫旗亭緑雲裏前年初缺守愼􅂤由宸扆臨軒弄郡章得人方付此是時左馮翊天下第一理貴臣持牙璋優詔發青紙迎風汙吏免先令疲人喜何武劾腐儒陳蕃禮髙士昔􅂛君子堂腰下綬猶黃中丞時爲萬年尉汾隂有寶氣赤堇多竒鋩束􅂤下曲臺佩鞬來歷陽綺筵陪一􅀏蘭室襲餘芳風水忽異勢江湖遂相忘因君儻借問爲話老滄浪中丞爲􅀶士制相國柳宜城議識者韙之頃授余以其夲厥後牧和州節度使杜司徒以中丞才器俱偉欲軍裝以重戎府故授以夲州團練使滿坐觀腰鞬禮成歡甚相視而􅀏後房讌樂􅁲夜縱談子忝司徒之賔時獲末坐初中丞自尚書屯田貟外郎岀守踵其武者今給事中穆公代給事者右丞叚公予不佞繼右丞之後故曰襲餘芳焉送韋秀才道沖赴制舉驚禽一辤巢栖息無少安秋扇一離手流塵蔽霜紈故侣不可追涼風日巳寒逺逢杜陵士別盡平生歡逐客無印綬楚江多芷蘭因君時暇遊長鋏不復彈閱書南軒霽絙瑟清夜闌萬境身外寂一杯腹中寛伊昔􅀇宗朝冬卿冠鴛鸞肅穆昇内殿從容領儒冠游夏無措詞陽秋垂不刋至今羣玉府學者空縱觀世人希德門揭􅀂攀峯巒之子嚮明訓鏘如振琅玕一旦西上書斑裳拂征鞍荆臺宿暮􅀨漢水浮春瀾君門起天中多士如星欑煙霞覆􅀟闕抃舞羅千官清漏滴銅臺仙廚下雕盤熒煌仰金牓錯落飛濡翰古來長䇿人所歎遭時難一鳴從此始相望青雲端送李䇿秀才還湖南因􅀉幕中親故兼􅂤衡州吕八郎中深春風日淨爭長幽鳥鳴僕夫前致詞門有白面生攝衣相問訊解帶坐南榮端志見眉睫苦言發精誠因出懷中文調􅀌詞亦清悄如促柱􅃶掩抑多不平乃言夲蜀士世降岷山靈前人秉懿文髙視來上京曵綬司徒府所從信國楨析薪委空林善響難繼聲何處依附郭幾人思郈城雲天望喬木風水悲流萍前與計吏西始引貢士名森然就筆札從試春官卿帝城岐路多萬足伺晨星茫茫風塵中工拙同有營寒女勞夜織山苗榮寸莖侯門武繼踵衣褐誰將迎弱羽果摧頽壯心鬱怦怦諒無蟠木容􅂓覆蓬累行昨日訊靈􅀛繇言利艱貞當求捨拔中必在審己明誓將息薄遊焦思窮筆精蒔蘭在幽渚安得揚芬馨曰余摧落者散質􅀒華纓一聆辛苦辭再動依鬱情身棄言不動愛才心尚驚恨無羊角風使爾化北溟論罷情益親渉旬忘歸程日攜邑中客間眺江上城晝憇命金罍宵談轉琁衡蕙風香麈尾月露濡桃笙忽被戒羸驂薄言事南征火雲蔚千里旅思浩巳盈湘江含碧虚衡嶺浮翠晶豈伊水山異適與人事并油幕似崑丘粲然疊瑶瓊􅁃樓見清月孔坐多緑醽復有衡山守夲自雲龍庭至和在靈府發越侔咸英一麾岀營陽惠彼蚩蚩民隼旟辤灞水居者皆涕零惟昔與伊人交歡在夙齡一從雲􅀨散滋我鄙悋萌北渚不堪愁南音誰復聽離憂􅀂去水浩漾無時停甞聞祝融峯上有神禹銘古石琅玕姿秘文螭虎形聖功奠逺服神物擁休禎賢人在其下仿像疑蓬瀛君行歷郡齋大袂拂􅀟旌飾容遇朗鑒肝鬲可以呈昔日馬相如臨卭坐盡傾勉君刷羽翰早取凌青冥送張盥赴舉并引古人以偕受學爲同門友今人以偕􅂛名爲同年友其語孰見搢紳者皆道焉余於張盥爲丈人由是道也曩吾見爾之始生以老成爲祝今吾見爾之成人以未立爲憂吾不幸嚮所謂同年友當其盛時聮袂齊鑣亘絶九衢􅀂屏風然今來落落如曙星之相望昔日㑹合不煩異席可長太息哉然而尚書右丞衞大受兵部待郎武庭碩二君者當時偉人咸萬夫之望足以訂十朋之多也第如京師無騷騷爾無忻忻爾時秋也吾爲􅀂叩商之謳幸有感夫二君子爾生始懸􅀌我作坐上賔引箸舉湯餅祝詞天麒麟今成一丈夫坎軻愁風塵長裾來謁我自號廬山人道舊與撫􅀌悄然傷我神依依見眉睫嘿嘿含悲辛永懷同年友追想出谷晨三十二君子齊飛陵煙旻曲江一㑹時後㑹巳凋淪況今三十載閱世難重陳盛時一巳過來者日日新不如揺落樹重有明年春火後見琮璜霜餘識松筠肅機乃獨秀武抱亦絶倫爾今持我詩西見二重臣成賢必念舊保貴在安貧淸時爲丞郎氣力侔陶鈞乞取斗􅂛水因之雲漢津送裴處士應制舉并引晉人裴昌禹讀書數千卷於周官小戴禮尤􅃉性是古敢言雖侯王不能卑下故與世相參差凡抵有位以索合行天下幾巨依反遍常歎諸侯莫可遊欲一見天子而未有路㑹今年詔書徴賢良昌禹大喜以爲盡可以豁平生搏髀爵躍曰一觀雲龍庭足矣繇是裹三月糧而西徂咨余以七言爲西遊之資籍耳裴生乆在風塵裏氣勁言髙少知已注書曾學鄭司農歷國多於孔夫子往來訪我到連州無窮絶境終日遊登山雨中試蠟屐入洞夏裏披貂裘白帝城邊又相遇歛翼三年不飛去忽然結束如秋蓬自稱對䇿明光宫人言䇿中說何事掉頭不荅看飛鴻彤庭翠松迎曉日鳯銜金牓雲間出中貴腰鞭立傾酒宰臣委佩觀揺筆古稱射䇿如彎弧一發偶中何時無由來草澤無忌諱努力滿挽當雲衢憶得童年識君處嘉禾驛後聮牆住垂釣鬭得王餘魚踏芳共登蘇小墓此事今同夢想閒相看一􅀏且開顔老大希逢舊鄰里爲君扶病到方山送錢侍御自宣州幕拜官便於華州覲省五綵繡衣裳當年正相稱春風舊􅀜路歸去眞多興蘭陔行可採蓮府猶逥瞪楊家紺幰迎侍御即王相公貴壻謝守瑶華贈宣州崔相公有詩贈行御街草泛豔臺相煙含凝曾是平昔遊無因理歸乗將赴汝州途岀浚下留辤李相公表臣長安舊遊四十載鄂渚一別十四年後來富貴巳零落歳寒松栢猶依然初逢貞元尚文主雲闕天池共翔舞相看却數六朝臣屈指如今無四五夷門天下之咽喉昔時往往生瘡疣聮翩舊相來鎭壓四海吐納皆通流乆別凡經幾多事何由說得平生意千思萬慮盡如空一笑一言眞可貴世間何事最慇勤白頭將相逢故人功成名遂㑹歸老請嚮東山爲近鄰送令狐相公自僕射出鎭南梁夏木正隂成戎裝出帝京霑襟辤闕淚回首別郷情雲樹襃中路風煙漢上城前旌轉谷去後􅀐踏橋聲乆領鴛行重無嫌虎綬輕終當提一筆再入副蒼生送趙中丞自司金郎轉官參山南令狐僕射幕府趙氏兄弟皆僕射門客緑樹滿襃斜西南蜀路賖驛門臨白草縣道過黃花相府開油幕門生逐絳紗行看布政後還從入京華送裴司徒令公自東都留守再命太原自封晉國公兩任相去十六年星使岀關東兵符賜上公山河歸舊國管籥換離宫行色旌旗動軍聲鼓角雄愛棠餘故吏􅀐竹見新童漢壘三秋靜胡沙萬里空其如天下望旦夕詠清風送李戸部侍郎自河南尹再除夲官歸闕昔年内署振雄詞今日東都結去思宫女猶傳洞簫賦國人先詠衮衣詩華星却復文昌位別鶴重歸太一池想到金門待稱籍一時驚喜見風儀送蘄州李郎中赴任楚􅀜蘄水路非賖東望雲山日夕佳薤葉照人呈夏簟松花滿椀試新茶樓中飲興因明月江上詩情爲晚霞北地交親長引領早將􅀇􅁂到京華洛中春末送杜録事赴蘄州罇前花下長相見明日忽爲千里人君過午橋回首望洛城猶自有殘春夜宴福建盧常侍宅因送之鎭暫駐旌旗洛水堤綺筵紅燭醉蘭閨美人美酒長相逐莫怕猿聲發建溪洛中送崔司業使君扶侍赴唐州緑野方城路殘春柳絮飛風鳴驌驦馬日照老萊衣洛苑魚書至江村鴈戸歸相思望淮水􅀟鯉不應稀送河南皇甫少尹赴絳州祖帳臨周道前旌指晉城午橋羣吏散亥字老人迎詩酒毎同樂別離方見情從兹洛陽社吟詠欠書生送前進士蔡京赴學究科時崔相公楊尚書掌選耳聞戰鼓帶經鋤振發名聲自里閭巳是世間能賦客更攻牎下絶編書朱門逹者誰能識絳帳諸生盡不如幸遇天官舊丞相知君無翼上空虚送唐舎人出鎭閩中暫辤鴛鷺出蓬瀛忽擁􅆛貅鎭粤城閩嶺夏雲迎皁蓋建谿秋樹映紅旌山川遠地由來好富貴當年別有情了却人閒㛰嫁事復歸朝右作公卿送盧處士歸嵩山別業世業嵩山隱雲􅀷無四鄰藥鑪燒姹女酒甕貯賢人曉日華隂霧秋風函谷塵送君從此去鈴閣少談賔送李友路秀才赴舉誰憐相門子不語望秋山生長紈綺内辛勤筆硯閒榮親在名字好學弃官班竚俟明年桂髙堂開􅀏顔送國子令狐􅀶士赴興元覲省相門才子高陽族學省清資五品官諫院過時榮棣萼謝庭歸去踏芝蘭山中花帶煙嵐晚棧底江含雪水寒伯仲到家人盡賀栁營蓮府遞相歡送李二十九兄貟外赴邠寜使幕家襲韋平身業文素風清白至今貧南宫通籍新郎吏西􅃸從戎舊主人城外草黃秋有雪烽頭煙靜虜無塵鼎門爲別霜天晚剩把離觴三五巡送分司陳郎中祗召直史館重修實録蟬鳴官樹引行車言自成周赴玉除逺取南朝貴公子重修東觀帝王書常時載筆窺金匱暇日登樓到石渠􅀂問舊人劉子政如今頭白在商於送李中丞赴楚州緹􅀐朱旗入楚城士林皆賀振家聲兒童但喜迎賢守故吏猶應記小名萬頃水田連郭秀四時煙月映淮清憶君初得崑山玉同嚮揚州攜手行送李庚先輩赴選一家何啻十朱輪諸父􅀟飛秉大鈞曾脫素衣參幕客却爲精舎讀書人離筵洛水侵杯色征路函􅀜嚮晚塵今日山公舊賔主知君不負帝城春送廖參謀東遊二首九陌逢君又別離行雲別鶴夲無期望髙樓上忽相見看過花開花落時繁花落盡君辤去緑草垂楊引征路東道諸侯皆故人留連必是多情處送從弟郎中赴浙西并引從弟三復十餘年閒凡三爲浙右從事往年主公入相薦􅏡登朝中復從公鎭南未幾而罷昨以尚書外郎奉使至洛旋承新命改轅而東三從公皆在舊地徴諸故事夐無其倫故賦詩贈之亦志異也銜命出尚書新恩換使車漢庭無右者梁苑重歸歟又食建業水曾依京口居劉將軍傳云莒人世家京共經無限事賔主兩如初劉夢得文集卷第六劉夢得外集卷第六律詩遊道林嶽麓寺和韓元二君子張籍逺􅀉長句詶湖州崔郎中喜韓吳興同遷秋日書懷歎梅􅀨酬嚴給事荅張祕書謝馬和中書即事見􅀉藍橋懷舊和裴侍中留別省中四松豐安里舊居李相公宴餞惠班竹杖楊給事製新樓春晚即事牛相公述舊詶鄭州權舎人和裴令公夜宴李侍郎惠藥物宫城早秋新墅溪竹追感韋裴六相和牛相公感傷和牛相公寓懷􅀨後寓懷林亭􅀨後偶成所􅀉太湖石和王尚書牛相公寓言南溪醉歌牛相公同遊詶大尹裴侍郎詶太原狄尚書詶崔大夫暮秋乆􅀨喜晴唐侍御􅀉遊道林嶽麓二寺詩并沈中丞姚貟外所和見徴繼作湘西古刹􅀟蹲蹲羣峯朝拱如駿奔青松歩障深五里龍官黯黯神爲􅕡髙殿呀然壓蒼巘俯瞰長江疑欲吞橘洲泛浮金實動水郭繚繞朱樓騫語餘百響入天籟衆竒引歩輕翻翻泉清石布􅀶碁子蘿密鳥韻如簧言回廊架險髙且曲新徑穿林明復昬淺流忽濁山獸過古木半空天火痕星使􅀟飛出禁垣元侯餞之遊石門紫髯翼從紅袖舞竹風松雪香温馨逺持青􅃈照巫峽一戞驚斷三聲猿靈山會中身不與吟想峭絶愁精魂恨無黃金千萬餅布地買取爲丘園遥和韓睦州元相公二君子玉人紫綬相輝映却要霜髯一兩莖其奈無成空老去每臨明鏡若爲情張郎中籍逺􅀉長句開緘之日巳及新秋因舉目前仰酬髙韻南宫詞客􅀉新篇清似湘靈促柱􅃶京邑舊遊勞夢想歷陽秋色正澄鮮雲銜日脚成山􅀨風駕潮頭入渚田對此獨吟還獨酌知音不見思蒼然詶湖州崔郎中見􅀉風箏吟秋空不有指爪聲髙人靈府閒律吕侔咸英昔年與兄遊文似馬長卿今來􅀉新詩乃􅀋陶淵明磨礱老益智吟詠間彌精豈非山水郷蕩漾神機清渚煙蕙蘭動溪􅀨虹蜺生憑君虚上舎待余乗興行詶楊八庶子喜韓吳興與余同遷見贈依本韻次用早遇聖明朝鴈行登九霄吳興與余中外兄弟文輕傅武仲酒逼盖寛饒捨矢同瞻鵠當筵共賽梟吳興與余同年判入等第􅅣磨三益重唱和五音調臺栢煙常起池荷香暗飄吳興與余同爲御史臺外有蓮池也星文辭北極旗影度東遼吳興自度支郎中出爲行軍司馬所從即范僕射昔范眀友爲度遼將軍直道由來黜浮名豈敢要三湘與百越􅀨散又雲揺逺守慙侯籍徴還荷詔條顇容唯舌在別恨幾魂銷滿眼悲陳事逢人少舊僚煙霞爲老伴蒲柳任先凋虎綬懸新印龍理去橈斷腸天北郡攜手洛陽橋幢盖今雖貴弓旌㑹見招其如草􅀇客空宇乆寥寥秋日書懷􅀉河南王尹公府想無事西池秋水清去年爲狎客永日奉髙情況有臺上月如聞雲外笙不知桑落酒今歳與誰傾浙東元相公歎梅􅀨􅉱蒸之􅃸因􅀉七言稽山自與岐山別何事連年鸑鷟飛百辟商量舊相入九天祗􅃸謫仙歸平湖晚泛窺清鏡髙閤晨開掃翠微今日看書最惆悵爲聞梅􅀨損朝衣嚴給事賀加五品兼􅂤同制水部李郎中九天􅀨露傳青詔八舎郎官換緑衣初佩銀魚隨仗入宜乗白馬退朝歸雕盤賀喜開瑶席彩筆題詩出鎻闈聞道水曹偏得意霞朝霧夕有光輝裴相公大學士見示荅張祕書謝馬詩并羣公屬和因命追作草􅀇門户少塵埃丞相并州􅀉馬來初自塞垣銜苜蓿忽行幽逕破莓苔㝷花緩轡威遲去帶酒垂鞭躞蹀迴不與王侯與詞客知輕富貴重清才和司空裴相公中書即事通簡舊僚之作談􅀏在巖廊人人盡所長儀形見山立文字動星光日運丹青筆時看赤白囊佇聞戎馬息入賀領鴛行微之鎭武昌中路見􅀉藍橋懷舊之作悽然繼和兼􅀉安平今日油幢引他年黃紙追同爲三楚客獨有九霄期宿草恨長在傷禽飛尚遲武昌應巳到新柳映紅旗奉和裴侍中將赴漢南留別坐上諸公金貂曉出鳳池頭玉節前臨南雍州暫輟洪鑪觀劒㦸還將大筆注春秋管􅃶席上留髙韻山水途中入勝遊峴首風煙看未足便應重拜富人侯和兵部鄭侍郎省中四松詩十韻松是中書相公任侍郎時栽右相歷中臺移松武庫栽紫茸抽組綬青實長玫瑰便有干霄勢看成構厦材數分天柱半影逐日輪迴舊賞台階去新知谷口來息隂常仰望翫境幾徘徊翠粒晴懸露蒼鱗􅀨起苔凝音助瑶瑟飄蘂泛金罍月桂花遥燭星榆半對開終須似雞樹榮茂近昭回和蘇郎中㝷豐安里舊居􅀉主客張郎中漳濵卧起恣間遊宣室徴還未白頭舊隱來㝷通德里新篇冩出畔牢愁池看科斗成文字鳥聽提壷憶獻酬同學同年又同舎許君雲路竝華輈將赴蘇州途出洛陽留守李相公申宴餞寵行話舊形於篇章謹杼下情以申仰謝歳杪風物動雪餘宫苑晴兔園賔客至金谷管􅃶聲洛水故人別吴宫新燕迎越郎憂不淺懷袖有瓊英吳興敬郎中見惠班竹杖兼示一絶聊以謝之一莖烱烱琅玕色數節重重瑇瑁文柱到髙山未登處青雲路上願逢君和浙西王尚書聞常州楊給事製新樓因􅀉之作文昌星象盡東來油幕朱門次第開且上新樓看風月㑹乗雲􅀨一時回尚書在南宫爲左丞給事與禹􅃬皆是郎吏詶淅東李侍郎越州春晚即事長句越中藹藹繁華地秦望峯前禹穴西湖草初生邊鴈去山花半謝杜䳌啼青油晝卷臨髙閣紅斾晴翻繞古堤明日漢庭徴舊德老人爭出若邪溪後漢劉寵爲㑹稽大治及徴還山隂縣有五六老􅅱自若邪山谷閒出人賫百錢以送寵勞之荅曰自明府下車民不見吏年老遇值聖明故奉送寵爲人選一大錢受之也詶淮南牛相公述舊見貽少年曽忝漢庭臣晚歳空餘老病身初見相如成賦日㝷爲丞相掃門人追思往事咨嗟乆喜奉清光􅀏語頻猶有登朝舊冠冕待公三入拂埃塵詶鄭州權舎人見􅀉十二韻朱户凌晨啓碧梧含早涼人從滎澤至書到漆沮傍抃㑹因佳句情深取斷章愜心同􅀏語入耳勝笙篁憶昔三條路居鄰數仞墻舎人舊宅光福時忝東鄰學堂青玉案彩服紫羅囊麟角看成就龍駒見柳楊彀中飛一箭雲際落􅀟鶬舎人一舉登科又判入等第甸邑叨前列天臺媿後行鄙人離渭南主簿十年舎人方尉此邑及罹譴謫重入南宫爲禮部郎中舎人方在考功貟外鯉庭傳事業雞樹遂翺翔書殿連鳴鵲神池接鳳凰追遊蒙尚齒惠好結中腸鄙人在集賢與西掖接近日夕追遊鎩翮方􅎑舉危根易損傷一麾憐弃置五字借恩光鄙人出牧姑蘇舎人草制汝海崆峒秀溱流芍藥芳風能行偃草境靜不爭桑鄙人轉臨汝舎人收滎陽轉斾趨􅀜右頒條匝渭陽病吟猶有思老醉巳無狂塵滿鴻溝道沙驚白狄郷竚聞黃紙詔促召紫微郎奉和裴令公夜宴天下蒼生望不休東山雖有但時遊從來海上仙桃樹肯逐人閒風露秋病卧李侍郎見惠藥物謔以文星之句隱几支頥對落暉故人書信到柴扉周南留滯商山老星象如今屬少微詶留守牛相公宫城早秋寓言見􅀉曉月映宫樹秋光起天津涼風稍動葉宿露未生塵景氣尚芳麗曠望感心神揮毫成逸韻開閤遲來賔擺去將相印漸爲逍遥身如招後房宴却要白頭人牛相公留守旯示城外新墅有溪竹秋月親情多往宿遊恨不得去因成四韻兼􅂤洛中親故之什兼命同作別墅洛城外月明村墅通光輝滿地上絲管發舟中堤豔菊花露島涼松葉風髙情限清禁寒漏滴深宫和僕射牛相公追感韋裴元相登庸皆四十餘未五十薨殁豈早榮早枯之義今年將六十猶粗強徤因親故勸酒率然成篇并見􅀉之作坐鎭清朝獨殷然間徴故事數前賢用才同踐鈞衡地稟氣終分大小年威鳳夲池思泛泳仙查舊路望回旋猶憐綺季深山裏唯有松風與石田和僕射牛相公以離闕庭七年班行親故亡殁十無一人再覩龍顔喜慶雖極感歎風燭能不愴然因成四韻并示集賢中書二相公所和乆辭龍闕擁紅旗喜見天顔拜赤墀三省英寮非舊侣萬年芳樹長新枝交朋接武居仙院幕客追風入鳳池雲母屏風即施設可憐榮耀冠當時和僕射牛相公見示長句靜得天和興自濃不縁宦逹性靈慵大鵬六月有間意仙鶴千年無躁容流輩盡來多歎息官班髙後少過從唯應加築露臺上䞉見終南雲外峯和牛相公夏末􅀨後寓懷見示金火交爭正抑揚蕭蕭飛􅀨助清商曉看紈扇恩情薄夜覺紗燈刻數長樹上早蟬纔發響庭中百草巳無光當年富貴亦惆悵何況悲翁髮似霜牛相公林亭􅀨後偶成飛􅀨過池閣浮光生草樹新竹開粉奩初蓮􅋹香炷野花無時節水鳥自來去若問知境人人閒第一處牛相公題姑蘇所􅀉太湖石兼􅀉李蘇州震澤生竒石沈濳得地靈初辭水府出猶帶龍宫腥發自江湖國來榮卿相庭從風夏雲勢上漢古查形拂拭魚鱗見鏗鏘玉韻聆煙波含宿潤苔蘚助新青嵌穴胡鶵貌纎鋩蟲􅂐銘孱顔傲林薄飛動向雷霆煩熱近還散餘酲見便醒凡禽不敢息浮壒莫能停靜稱垂松蓋鮮冝映鶴翎忘憂常目繫素尚與心􅁳眇小欺湘鷰團圎􅀏落星徒然想融結安可測年齡採取詢郷耊搜求按舊經垂鈎入空􅂩隔浪動晶熒有獲人爭賀歡謡衆共聽一州驚閱寶千里逺楊舲覩物洛陽陌懷人吴御亭􅀉言垂天翼早晚起滄溟和陳許王尚書酬白少傅侍郎長句因通􅂤汝洛舊遊之什寥廓髙翔不可追風雲失路暫相隨方同洛下書生詠又建軍前大將旗雪裏命賔開玉帳飲中請號駐金巵竹林一自王戎去􅄞阮雖貧興未衰和僕射牛相公寓言二首兩度竿頭立定誇回眸舉袖拂青霞盡抛今日貴人㨾復振前朝名相家御史近來休直宿尚書依舊趂參衙具瞻尊重誠無敵猶憶洛陽千樹花心如止水鑒常明見盡人閒萬物情鵰鶚騰空猶逞俊驊騮齒足自無驚時來未覺權爲祟貴了方知退是榮只恐重重丗縁在事須三度副蒼生和牛相公南溪醉歌見􅀉脫屣將相守冲謙惟於山水獨不廉枕伊背洛得勝地鳴臯少室來軒簷相去聲形面勢然指畫言下變化隨顧瞻清池曲榭人所致野趣幽芳天與添有時轉入潭島閒珍木如幄藤爲簾忽然便有江湖思沙礫平淺草纎纎怪石釣出太湖底珠樹移自天台尖崇蘭迎風緑泛豔坼蓮含露紅襜脩廊架空逺岫入弱柳覆檻流波霑渚蒲抽英劒脊動岸荻迸筍錐頭銛攜觴命侣極永日此會雖數心無猒人皆置莊身不到富貴難與逍遥兼唯公出處得自在決就放曠辭炎炎坐賔盡歡恣談謔媿我掉頭還􅁬髯能令商於多病客亦覺自適非沈濳詶僕射牛相公晉國池上別後至甘棠館忽夢同游因成口号見􅀉巳嗟池上別魂驚忽報夢中攜手行此夜獨歸還乞夢老人無睡到天明裴侍郎大尹雪中遺酒一壷兼示喜眼疾初平一絶有間行把酒之句斐然仰詶卷盡輕雲月更明金篦不用且間行若傾家釀招來客何必池塘春草生詶太原狄尚書見􅀉家聲烜赫冠前賢時望穹崇鎭北邊身上官銜如坐主幕中談􅀏取同年幽并俠少趨鞭弭燕趙佳人奉管􅃶仍把天兵書號筆逺題長句􅀉山川詶宣州崔大夫見􅀉白衣曽拜漢尚書今日恩光到弊廬再入龍樓稱綺季應縁狗監􅀃相如中郎南鎭權方重内史髙齋興有餘遥想敬亭春欲暮百花飛盡柳花初詶皇甫十少尹暮秋乆􅀨喜晴有懷見示􅀨餘獨坐卷簾帷便得詩人喜霽詩揺落從來長年感慘舒偏是病身知掃開雲霧呈光景流盡潢汙見路􅄮何況菊香新酒熟神州司馬好狂時劉夢得外集卷第六
