body:
  text: 碑薛公神道碑許州文宣王新廟碑崔公神道碑王公神道碑史公神道碑唐故福建等州都團練觀察處置使福州刺史兼御史中丞贈左散􅀐常侍薛公神道碑薛在三代爲侯國分于鄒魯閒傳丗三十有一爲齊所并其公子犇楚錫土田于沛漢末避仇之成都曹魏平蜀徙家汾隂遂爲河東臨晉人自奚仲爲夏車服大夫距今數千年乗軒服冕舄弈冠世言氏族者署爲􅀜内甲姓天意􅀂曰始有功於車服錫爾子孫丗丗有之公諱謇字某曾祖寶胤以名家子且有學行歷尚書郎雍州司馬邠州刺史王父繪有俊材刺三郡金密綿皆以治聞累績至銀青光禄大夫封龍門侯烈考丞矩以文母害仕至大理丞公幼承前人之覆露􅀘崇文生歳滿得調主簿書于毫之譙苦二邑又尉于東畿之河清貞元中上方與丞相調兵食思得通吏治而習邊事者計相以公爲對乃授監察御史裏行充京兆水運使局居鴈門主榖糴具舟楫慕勇壯且便弓矢者爲榜夫千有餘人隷尺籍伍符制如舟師詔以中貴人護之聲震塞上毎發粟泝河北行渉戎落以饋縁邊諸軍及乗障者雖河塞回逺必剋期如合符一歳中省費萬計累加侍御史内供奉賜緋魚袋有司條白其勞入拜殿内史未幾淮海節將以戎倅缺聞事下丞相御史擇可者僉曰公政事巳試遂授檢校户部外郎兼侍御史淮南軍司馬㝷轉駕部郎中錫以金紫遇府遷申命眞相趙國公帯中書侍郎代之公主行臺留務趙公文茵及境視置郵供帳及郊視將迎部伍下車視簾幃器備乃曰信竒才也此不足以展驥朝廷知之擢爲泗濵守旣報政就加御史中丞俄遷福建都團練觀察使閩有􅀒海之饒其民悍而俗􅀑居洞砦家桴筏者與華言不通公兼戎索以治之五州民咸恱元和十年某月某日薨于位享年六十七贈右散􅀐常侍夫人趙郡李氏無兒早丗繼夫人隴西李氏檢校禮部尚書河東節度使說之女子凝爲嗣季子茂􅀪以諸侯禮議返葬故里蛾眉原從周也後二十有三年元曰開成凝爲平盧從事謹按甲令礱碑石來乞詞以垂于悠乆初公治粟于朔陲愚方冠惠文冠察行馬外事聆風相厚謂可妻也以元女歸之明年愚入尚書爲郎職隷計司因計相召公來會府行有日矣遇内禪惟新愚以縁坐左貶閒􅀜外役竟不克面然而公之德善灌注心耳孝悌爲根柢誠明枝葉之直方爲天質禮讓縁飾之所至藹然繇此道也公初下丗故人丞相李太師誌其墓其略曰􅀪深莊重幹敏絶人此與遊者傳信之詞也豈誣也哉故作銘曰河汾奫淪鼎氣敲雲散爲昌光凝爲賢人常侍之生其宗孔碩從祖昆弟詵詵三百文館入仕幽龍未光尺木爲階啾然欲翔司會知材績宣朔方邊師萬喉俟我贏糧泝于黃河路出戎疆慕乃勇士皁衣挽航膺索臂弧穹廬在旁虜聞公名憚不敢攘安北巳南列城相望率有儲峙皆成金湯入居殿中分巡輦下淮海軍大往爲司馬軍中之治可移諸民乃牧于泗乃㢘于閩閩悍而囂夷風脆急恩信綏之委然如蟄閩方不淑天奪其福公薨于寢􅀇頳以復天王廢朝贈之金貂莓莓晉原鬱矣中條大墓舊阡松楸蕭蕭笳鼓以歸德音孔昭許州文宣王新廟碑歳在丙辰元日開成許州牧尚書杜公作文宣王廟曁學舎于兊隅革故而鼎新也前年公受社與􅃏且董淮陽汝南之師八月上丁釋菜于宣父之室陋宇荒堦不足回旋巳事而歎乃詢黃髮有郷先生前致辭曰自盜起幽陵許爲兵衝連戰交抨率無寧歳耳恱鉦鼓不聞􅁌歌目不知書不害爲智爾來生聚敎養起居祖習壹岀於軍容今幸天子憐許民爲擇賢侯此人人思治之時也公曰諾吾當先後之於是元年修戎律以通衆志次年成郡政以蠲民瘼季年崇敎夲以厚民風我言旣從乃􅁲新宫翼水之瀕城池在東登登其杵坎坎其斧繩之墨之鑿柄枝梧載墍載塗黟烏陵虚寢廟􅀪敞齋宫嚴閟軒墀廂廡儼雅清潔門庭牆仞望之生敬外飾觚稜中設黼幄嚮明當宁用王禮也堯頭禹身華冠象佩之容取之自鄒魯及門覩奥偶形畫像之儀取之自太學尊彞籩豆青黃規矩之器秉周禮也犧牲贄幣薦獻陞降之節遵國章也藏經于童檐歛器于䖍櫝講筵有位鼓篋有室授經有愽士督課有助敎指蹤有役夫灑掃有廟幹公又割􅂩地爲廣圃蒔其柔􅂼而常菹旨蓄之禦備捨己俸爲子錢㩁其孳贏鹽酪釭膏之用給濟濟莘莘化行風驅家慕恭儉户知敬讓父誨其子兄規其弟不遊學堂與撻市同繇是縻勇爵戴鶡冠者往往弭雄姿而觀習禮矜甲胄者知根於忠信服縵胡者不敢侮逢掖敎化之移人也如置郵焉冬十一月許人以新儒宫成來告且乞詞欲行乎逺也公名悰字永􅁉故丞相岐國公之孫岐公弼諧三帝碩學冠天下甞著書二百餘篇言禮樂刑政古今損益統名曰通典藏在石室副行人閒今孝孫聿脩之刑乎事業播于聲詩懿哉能丗其家也禹錫昔年忝岐公門下生四參公府近年牧汝州道許昌躬閱其政故不得讓遂銘于麗牲之碑銘曰許分韓魏四征之地兵興巳還其􅃲㘖㘖亦有儒宫軋于兵閒賢侯戾止思樂泮水俾人嚮學王化之始便地爰相新規鬱起廟貌斯嚴堂皇有煒秩秩禮物祁祁胄子入于門牆如造闕里春誦夏絃載􅀭淑聲風于閭閻浹于郊坰途讓斑白家尊父兄與化而遷其猶性成昔之委巷相詬交侮今逢親戚不道媟語昔之連營誇力使酒今遇賔客歛容拱手魯有泮林鳥革其音許崇學斆民恱其教鐫于圭石以志新廟唐故朝散大夫檢校尚書吏部郎中兼御史中丞賜紫金魚袋清河縣開國男贈太師崔公神道碑太師名倕字某清河東武城人太公望旣封于營丘子伋嗣侯伋之孫曰穆伯食邑于崔遂以爲氏後十四世至秦末東萊侯意如東萊之子伯基始居清河又十五葉生琰爲魏名臣又九葉生休仕後魏爲七兵尚書七兵之弟曰寅爲樂安太守公即樂安八代孫始以門子􅀘鄭州參軍力行好學於子道以孝聞處伯仲閒以友聞讀易至編絶以精義聞至德中戎羯猾夏王師岀征公少有竒志思因時以自􅁬乃作伐鯨鯢賦上獻旣聞耳矣果器之會第五丞相以善言利得幸盡付利權始有鹽鐵使之目愼選僚屬表公爲介轉臨晉縣丞處繁應卒鋩刃不頓府罷再遷至太子司議郎韓晉公時爲户部侍郞掌􅀖賦急於用材薦公監察御史主河東租庸之務㝷轉侍御史充京東平糴使建中初德宗始親萬機儲精治夲有漢宣與我共治之歎謂大臣求可當良二千石者遂以公帯夲官權知􅀽州刺史朞月有成詔書顯揚就加眞秩益以金紫居無何韓晉公爲丞相制國用思公前績乃傳召之抵京師授檢校户部郎中兼侍御史斡池鹽于蒲修牢盆謹衡石煎和旣精飴散乃盈商通而荐至吏懼而循法民不絓網而國用益饒歳杪會其所入贏羡什百詔下襃其能轉吏部正郎兼御史中丞且加五等之爵方􅀝以重任天富其材而不遐其福享齡六十有五貞元七年某月某日遘疾終于治所上聞悼之因降􅉖􅁽贈鄭州刺史賚錢三百萬以備飾終之禮明年某月某日返葬于成周之偃師從世墓也累贈至太師夫人隴西李氏汾州司倉參軍咸一之女生才子六人長曰邠及公卒時巳爲左拾遺後至太常次曰酆至太府卿次曰郾至外臺尚書次曰郇今爲廷尉次曰鄯至執金吾季曰鄲今爲太常卿同中書門下平章事惟夫人姑臧冠族以蘋蘩組紃輔佐君子爲令妻積三十餘年以慈儉忠厚訓誡諸子爲賢母二十有三年當永貞初順宗踐祚澤流自葉長子邠時爲詞臣草􅁽書以文當進階遂上䟽乞移榮於親優詔允之特封清河郡太君士林聳慕皆自痛其不及邠爲太常酆爲大農咸白髮貴綬以奉膳羞諸季各以簪裾給事左右愉愉然先意無違言世榮者舉無與比以子貴累封贈至涼國太夫人元和八年三月十六日􅂢館舎壽七十有九是歳十月某日合袝惟太常及尚書曁今相國皆自中書舎人爲禮部侍郎凡五貢賢能書得士百四十有八人言兄弟者許爲人瑞崔氏之門六人皆入文昌宫其閒三人歷八侍郎統而論之三大卿兩連率二翰林學士一執金吾言冠冕者許爲世雄與姑臧李范陽盧丗爲㛰媾入于姻黨無第二流言門閥者許爲時表太常二子亦以才能同入尚書璜爲吏部郎瓘爲司勲郎其他支孫未登金閨籍者詵詵然魚貫而進文業甚似而孝謹不衰猗歟君子之澤其所從來逺而有光乎開成已未歳七月甲辰相君受詔于明庭始操國柄仲月奉常有于家禮成起慕悄然永懷曰古者卿大夫廟有鼎墓有碑皆銘之以紀先德也今備位宰相敢不楊前人之耿光乃俾家老條白事功咨于學古者徴其詞尚信也又命宗祝􅁲柔日告于廟盡誠也儀其備而敬有餘斯所謂逹禮之君子遂刋勒如式揭于道周銘曰弈弈四姓崔爲之冠瞻其門牆倬􅀂雲漢善積家肥子孫多材如彼榱棟必生徂徠太公之後彌二千祀炯如貫珠焯見圖史顯允太師丕承德基構于其堂亦旣墍茨生逢艱虞戎夏交師獻賦伐叛忠存乎詞兵興事叢飛輓四馳歷踐劇職視屯如夷乃主平糴乃分竹使治粟爲􅀖其道一致蒲寔近地鹽爲利􅇦使車來思剗弊立程吏廉商通歳倍其贏奏課連最德音襃明就加執法好爵兼榮天賦之才不與壽并生􅀣德夲殁揚淑聲上聞軫懷侑樂爲停贈禭之禮侔于公卿萬石貽訓根於季友太丘種德乃稔身後家有令子妻爲壽母二十餘年人倫之首六子來侍如龍如虎衆婦來饋維筐及筥佩玉鳴環交響庭户申申秩秩歡不踰矩昔爲甲族今爲興門天爵人爵蔚然兩存先德䕃之黕如重雲孕和合粹濯潤夲拫景毫之原圖書之川陽陵帝壇旁礴回環丗安其神丗嗣其賢聆德風者拜于碑前唐故宣歙池等州都團練觀察處置使宣州刺史兼御史中丞贈左散􅀐常侍王公神道碑常侍諱質字華卿始得姓自周靈王太子晉賔天而僊時人曰王子因去􅁎爲王氏自秦漢以還世多顯名由今而上十有一代名傑仕元魏爲并州刺史子孫因家遂爲太原祁人并州六代孫名通字仲淹在隋朝諸儒唯通能明王道隱居白牛谿游其門皆天下俊傑著書行於丗旣殁謚曰文中子文中生福祚爲蔡州上蔡主簿上蔡生勉舉進士徴賢良皆上第仕至河中府寶鼎令即公之曽祖也祖諱怡渝州司戸參軍考諱潛楊州天長縣丞贈尚書吏部郎中公其季子也始文中先生有重名於隋末其弟勣亦以有道顯于國初自號東臯子文章髙逸傳乎人間議者謂兄以大中立言弟游方外遂性二百年閒君子稱之雖四夷亦聞其名字公性有逺志常自忖度我大名之後不宜無見焉遂力學厚自淬琢於春秋得其公是於禮得之約僑居淝水上躬督穡事善積於已而淮楚閒羣彦多與之游公歉然自少無進取意與游者激之曰卿文儒家子篤志如是盍求發聞俾家聲不頽今以文字芒洋當丗者誰如華卿庸自弃邪入謀于閨門咸以外言爲是因决䇿而西在貢士籍天和内充不以時尚屑意角逐攻取初無此心如楩柟生于深林未始自貴而度材者一盼歆然在懷故以不爭而速售旣登第東諸侯交辟之從至者記室于嶺南授正字參謀于淮右進恊律郎其後佐許下暨梓潼南梁率爲上介官至兼監察御史司憲聞其賢徴入南臺轉殿内歷侍御史改尚書户部外郎復爲知巳所薦遷檢校司封郎中攝御史中丞紫衣金章充山南西道節度副使入爲尚書户部郎中以方雅特立除諫議大夫會宋丞相坐狷直爲非語所陷抱不測之罪大僚進言無益公率諫官數輩日晏伏閤上爲不時開便殿公於旅進中獨感激雪涕居多由是上怒稍解得從輕比公終以言責爲憂求爲􅉑州刺史宰相惜去又重違誠請増之以兼御史中丞用示異於人也大凡以智謀而進者有時而衰以朴􅌋而知者無迹而固公雅爲今􅀭州牧賛皇公所知人不見其迹方在􅉑略賛皇入相擢爲左曹給事中凡有大官缺必寵薦居數月遷河南尹又未幾鎭宛陵是三者中外所注意不旬歳而周歷之時論不以爲黨河南帝之別京其治尚體度風采而别白區處之宣城國之奥壤其治在束吏惠下蘇罷羸讋剽輕而勞倈澄汰之公兩得其道不由一檢率身以儉而素風存任人以誠而羣務舉遇中貴人以禮而故態革内㓗其志下盡其忠外無以撓於理三者具求政之有粃曷由哉在鎭三載開成元年十二月八日薨于位享年六十三監軍使上言有詔軫悼不視朝贈左散􅀐常侍明年八月十一日葬于河南府永寧縣洛川郷史原從舊阡也初公娶于滎陽鄭氏生三女而殁今蓋祔焉一子曰慶存方齓矣猶子前太原府參軍扶執宗長書來請曰扶也蚤􅀌荷世父常侍之覆露今其嗣幼未任克家姑封琴書司管籥以俟其長竊懼世父之德音不楊思有以垂于後者以誠告于從叔大司農復命曰俞謹礱貞石以乞詞無忽余昔爲郞與常侍同列巳熟其行實及讀墓誌即今丞相益州牧趙郡李公之文自稱爲忘形友其在宣州李公再入相議以第一官處之牢讓不取羔鴈所禮則河東裴夷直天水趙晢隴西李行方吳郡陸紹梁國劉蕡􅀶陵崔珦人咸曰得士夫楊州少與也而見器益州寡合也而見親六從事材不一也而樂用是足以觀德庸可勿紀焉銘曰隋有文中紹􅆒微言當時偉人咸岀其門粹氣䊸餘鍾于後昆常侍恂恂文中來孫發源髙麓中泳後大蘭牙茁然秀岀叢薈善不近名其聲日彰行勇於退其道愈光哲者知之寘于周行以正持憲以文爲郎以和佐戎以惠臨􅀖以直司諫以公駮正守于三川頑民底定乃鎭于宣先馳淑聲邑中婆娑瞻我斾旌問誰詢謀濟濟君子問誰出内㓗㓗廉士道夲乎心暢于四支治夲乎正形于百爲􅃛吏歛手齊民揚眉江淮藪空夜柝弗施公卧于齋􅀖民悽悽公衣陞屋􅀖民行哭牙璋斯來柳翣言旋棠樹未老周人慕焉熊耳之陽泱泱洛川佳城在兹旣固且安松楸飋然石馬矯然過者必敬宛陵之阡唐故邠寧慶等州節度觀察處置使朝散大夫檢校户部尚書兼御史大夫賜紫金魚袋贈右僕射史公神道碑僕射名孝章字得仁夲北方之強世雄朔野其後因仕中國遂爲靈武建康人曾祖道德贈右散􅀐常侍封懷澤郡王祖周洛銀青光禄大夫檢校太常郷兼御史中丞北海郡王贈太子太保考憲成早以武勇絶人積功至魏愽節度使終于河中晉絳慈隰等州節度觀察使檢校司徒兼侍中河中尹贈太保其薨也大臣中書令晉國公裴氏爲之碑其名益顯公即侍中之元子母曰冀國夫人李氏幼而聦寤父母賢而加愛焉及長好學遷善秀岀儕輩鄴下諸兒號爲書生元和中太尉愬爲魏帥下令掄材於轅門取大將家翹秀者爲子弟軍列于諸校之上公獨昌言願効文職太尉深竒之遂假魏州大都督府參軍長慶三年常山衆叛害其帥沂國公田司徒於帳下沂公發迹于魏人猶懷之詔命其子布以尚書授鉞統魏兵問罪于北疆且報家禍布旣啓行士氣不振渙然内潰獨與冗從之旅偃旗而歸百憤攻中卒自引決先侍中時爲中軍都知兵馬使兼御史中丞全師在野閧然推戴之請爲假侯以鎭定中貴人飛馹上聞穆宗夜召翰林學士草詔書以眞侯命之實有魏土從衆而合權也是歳公自攝官轉夲府士曹參軍兼監察御史賜朱衣銀印推恩以及子也一旦跪於父母前進苦言曰臣竊惟大河之北地雄兵精而天下賢士心侮之目曰河朔閒視猶夷狄何也蓋有土者多乗兵機際會非以義取今臣家父侯母封化爲貴門君恩至矣非痛折節礪行彰信於朝廷無以弭識者之譏窹明君之意節著於外福延于家乗時􅌃機必不旋踵言訖泣下數行父俞母賛天性交感三心旣叶萬衆潛化天子聞而嘉之曰彼眞有子乃授檢校太子左諭德兼侍御史充節度副使累遷至散􅀐常侍兼御史大夫賜金印紫綬旣貳軍政事如命卿㢮張損益得以參決潛革故態人知嚮方大和二年滄景節度使李全略卒其子同捷竊據故地詔下以文告弗革遂用大刑先侍中表請率諸侯使元子以督戰制曰可公承君父之命乃􅂢其軀一舉而下平原􅎹滄壘由是加工部尚書及王師凱旋上表願一識丞明廬詔允之遂赴北闕下得覿於便殿上曰嚮吾始征滄州議者皆曰彼魏之姻也虜隂爲宼謀吾發使數輩以偵之其還也僉曰爾父瀝款於賔筵爾母抗詞于簾下願絶姻以立効其經始啓發岀於爾心今滄海砥平䇿勲之日宜貴爾三族命爾父爲侍中遷鎭于近地加爾禮部尚書析相衛澶州爲鎭以居之俾爾一門大榮以誇天下公拜稽首謝父遷讓已爵禮無違者翌日詔下于明庭人咸曰史氏之寵光古無有也牙旗碧幢方􅃌東道侍中以帳下生變聞泰極而否當歌而哭迎柩于路仰天長號因葬于洛陽之邙山冀國夫人祔焉寢苫枕塊以所仇同天爲大酷未幾詔舉金革之義起爲右金吾將軍累表陳乞有司以違命督之輿疾即路閒歳擢授鄜坊丹延等州節度觀察處置等使居四年遷鎭于滑一歳入爲右領軍衛大將軍旋改右金吾大將軍又授􅃏于邠土孟秋至治所首冬遘疾拜章入覲不克展和鸞鞗革之儀薨于靖恭里之私第享齡三十九當開成三年十月二十日上聞而悼之不視朝一日贈尚書右僕射明年二月歸葬于洛都夫人琅邪王氏祔焉繼室深澤縣君􅀶陵崔氏有一子曰煥生七年而􅀌僕射之喪自復魄至葬當門戸備祭祀建碑表皆縣君之能且命其家老具事功來請曰􅊔不恤家而憂幼嗣不知其先人之官業乞詞以傳于後也君子以爲知禮謹書之銘曰斗極之下崆峒撞氣鍾于侍中孔武且貴奉上致命宜昌後嗣僕射承之良弓不墜耳煩鉦鼓心恱文字虎穴之中生此騏驥大和紀元滄景不䖍子弄父兵跳踉海壖有隣隂交蝟起鷄連詔下薄伐艮隅騷然時惟侍中實統魏師蓄銳未發衆心危疑僕射爲子陳謀盡詞興言涕零有感尊慈絶姻効節精貫神祇滄波底寧王命褒之乃遷元侯來鎭近畿乃祚元子別建旌麾一門四節焜燿當時倐忽變生魏郊紛披喬木雖大盲風不知干雲之臺列缺焚之哀哀孝嗣丁此大酷迎護幃輤葬于東洛訴天觸地血染縗服禮有金革詔書敦促不遂枕戈驟膺推轂雕隂白馬曁干邠谷雖榮三鎭不荷百禄綺紈之閒珪組纍纍如彼晨葩日中而萎有妻名家有子稚齒行號執禮歸窆蒿里洛水之陽循邙之址尊卑穆敬幽顯同理舊松新栢亦象橋梓刻石紀功垂千萬祀劉夢得文集卷第二十九
