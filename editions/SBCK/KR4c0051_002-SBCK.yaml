body:
  text: 古詩效阮公體偶作古調寓興昬鏡詞飬􅋧詞武夫詞賈客詞調瑟詞弔張曲江庭梅詠詠古詠史苦雨行萋􅀆吟經檀道濟故壘題欹器圖聚蚊謡百舌吟飛鳶操秋螢引華山謌磨鏡篇有獺吟效阮公體三首少年負志氣信道不從時只言繩自直安知室可欺百勝難慮敵三折乃良醫人生不失意焉能慕己知朔風悲老驥秋霜動􅋧禽出門有逺道平野多層隂滅没馳絶塞振迅拂華林不因感衰節安能激壯心昔賢多使氣憂國不謀身目覽千載事心交上古人侯門有仁義靈臺多苦辛不學腰如磬徒使甑生塵偶作二首終朝對罇酒嗜興非嗜甘終日偶衆人縱言不縱談丗情間盡見藥性病多諳􅀉謝嵇中散予無甚不堪萬卷堆牀書學者識其眞萬里長江水征夫度要津養生非但藥悟佛不因人燕石何須辨逢時即至珍古調二首軒后初冠冕前旒爲蔽明安知從􅃨道然後見人情簿領乃俗士清談信古風吾觀蘇令綽朱墨一何同寓興二首常談即至理安事非常情􅀉語何平叔無爲輕老生丗途多禮數鵬鷃各逍遥何事陶彭澤拋官爲折腰昬鏡詞并引鏡之工列十鏡于賈奩發而視其一皎如其九霧如或曰良苦之不侔甚矣工解頥謝曰非不能盡良也蓋賈之意唯售是念今來市者必歷鑒周睞求與已宜彼皎者不能隱芒杪之瑕非美容不合是用什一其數也予感之作昬鏡詞昬鏡非美金漠然喪其晶陋容多自欺謂􅀂他鏡明瑕疵旣不見妍態隨意生一日四五照自言美傾城飾帶以文繡裝匣以瓊瑛秦宫豈不重非適乃爲輕飬􅋧詞并引途逢少年志在逐禽獸方呼鷹隼以襲飛走因縱觀之卒無所獲行人有常從事於斯者曰夫􅋧禽飢則爲用今哺之過篤故然也予感之作養􅋧詞飬􅋧非玩形所資撃鮮力少年昩其理日日哺不息探雛網黃口旦暮有餘食寜知下韝時翅重飛不得毰毸止林表狡兔自南北飲啄旣巳盈安能勞羽翼武夫詞并引有武夫過詫余以從軍之樂翌日質于通武之善經者則曰果有樂也夫威恣而賞勞則樂用威雌而賞虣則樂橫去聲顧其樂安出耳予惕然作是詞武夫何洸洸衣紫襲絳裳借問胡爲爾列校在鷹揚依􅀝將軍勢交結少年場探丸害公吏袖刄妬名倡家産旣不事顧盼自生光酣歌髙樓上袒裼大道傍昔爲編戸人秉耒甘哺糠今來從軍樂躍馬飫峙􅆝猶思風塵起無種取侯王賈客詞并引五方之賈以財相雄而鹽賈尤熾或曰賈雄則農傷予感之作是詞賈客無定遊所遊唯利并􅅭俗雜良苦乗時取重輕心計析秋毫捶鈎侔懸衡錐刀旣無弃轉化日巳盈邀福禱波神施財遊化城妻約雕金釧女垂貫珠纓髙貲比封君竒貨通倖卿趨時􅋧鳥思藏鏹盤龍形大艑浮通川髙樓次旗亭行止皆有樂􅀜梁自無征農夫何爲者辛苦事寒耕調瑟詞并引里有富豪翁厚自奉養而嚴督臧獲力屈形削然猶役之無何一旦不堪命亡者過半追亡者亦不來復翁悴沮而追昨非之莫及也予感之作調瑟詞調瑟在張絃􅃶平音自足朱絲二十五闕一不成曲美人愛髙張瑶軫再三促上􅃶雖獨響下應不相屬日暮聲未和寂寥一枯木却顧膝上􅃶流淚難相續弔張曲江并引丗稱張曲江爲相建言放臣不宜與善地多徙五谿不毛之郷及今讀其文張自内職牧始安有瘴癘之歎自退相守荆州一作南有拘囚之思託諷禽鳥􅀉詞草樹鬱然與騷人同風嗟夫身丗出於遐陬一失意而不能堪矧華人士族而必致醜地然後快意哉議者以曲江爲良臣識胡鶵有反相羞與凡器同列密啓廷爭雖古哲人不及而燕翼無似終爲餒魂豈忮心失恕隂謫最大雖二美莫贖邪不然何􅀽公一言明楚獄而鍾祉四葉以是相較神可誣乎予讀其文因爲詩以弔聖言貴忠恕至道重觀身法在何所恨色傷斯爲仁良時難乆恃隂謫豈無因寂寞韶陽廟魂歸不見人庭梅詠􅀉友人早花常犯寒繁實常苦酸何事上春日坐令芳意闌夭桃定相􅀏遊妓肯逥看君問調金鼎方知正味難詠古有所􅀉二首車音想轔轔不見纂下塵可憐平陽第歌舞嬌靑春金屋容色在文園詞賦新一朝復得幸應知失意人寂寂照鏡臺遺基古南陽眞人昔來遊翠鳯相隨翔目誠在桑野志遂貯椒房豈無三千女初心不可忘詠史二首驃􅀐非無勢少卿終不去世道劇頽波我心如砥柱賈生明王道衛綰工車戲同遇漢文時何人居貴位苦雨行悠悠飛走情同樂在陽和歳中三百日常苦風雨多天人信遐遠時節易蹉􅋸洞房有明燭無乃酣且歌萋􅀆吟天涯浮雲生爭蔽日月光窮巷秋風起先摧蘭蕙芳萬貨列旗亭恣心注明璫名髙毀所集言巧智難防勿謂行大道斯須成太行莫吟萋􅀆什徒使君子傷經檀道濟故壘萬里長城壞荒營野草秋秣陵多士女猶唱白符鳩史云當時人歌曰可憐白符鳩枉殺檀江州題欹器圖嬴相功成思稅駕晉臣名遂歎危機無因上蔡牽黃犬願作丹徒一布衣聚蚊謡沈沈夏夜間堂開飛蚊伺暗聲如雷嘈然欻起初駭聽殷殷􅀂自南山來喧騰鼓舞喜昬黒昩者不分聦者惑露華滴瀝月上天利觜迎人看不得我軀七尺爾如芒我􅀌爾衆能我傷天生有時不可遏爲爾設幄潛藜牀清商一來秋日曉羞爾微形飼丹鳥百舌吟曉星寥落春雲低初聞百舌閒􅀜啼花枝滿空迷處所摇動繁英墜紅雨笙簧百囀音韻多黃鸝吞聲鷰無語東方朝日遲遲昇迎風弄景如自矜數聲不盡又飛去何許相逢緑楊路綿蠻宛轉似娱人一心百舌何紛紜􅋳顔俠少停歌聽墮珥妖􅁎和睡聞可憐光景何時盡誰能低逥避鷹隼廷尉張羅自不􅀜潘郎挾彈無情損天生羽族爾何微舌端萬變乗春輝南方朱鳥一朝見索漠無言蒿下飛飛鳶操鳶飛杳杳青雲裏鳶鳴蕭蕭風四起旗尾飄揚勢漸髙箭頭砉騞聲相似長空悠悠霽日懸六翮不動飛凝煙遊鶤翔鴈出其下慶雲清景相回旋忽聞飢烏一噪聚瞥下雲中爭腐鼠騰音礪吻相喧呼仰天大嚇疑鵷鶵畏人避犬投髙處俛啄無聲猶屢顧青鳥自愛玉山禾仙禽徒貴華亭露樸樕危巢向暮時毰毸飽腹蹲枯枝遊童挾彈麾肘臆碎羽分飛人不悲天生衆禽各有類威鳯文章在仁義鷹隼儀形螻蟻心雖能唳天何足貴秋螢引漢陵秦苑遥蒼蒼陳根腐葉秋螢光夜空寂寥金氣淨千門九陌飛悠揚紛綸暉映平明滅金鑪星噴燈花發露華洗濯清風吹攢茅不定招揺垂髙麗罘罳過珠網斜歷琁題舞羅幌曝衣樓上拂香裙承露臺前轉仙掌槐市諸生夜對書北牎分明辨魯魚行子東山起征思中郎􅀐省悲秋氣銅雀人歸自入簾長門悵望來照淚誰言向晦常自明童兒走步嬌女爭天生有光非自衒逺近低昂暗中見撮蚊祅鳥亦夜飛翅如車輪人不見華山謌洪鑪作髙山元氣鼓其橐俄然神功就峻拔在寥廓靈蹤露指􅀲殺氣見稜角凡木不敢生神仙聿來託天資帝王宅以我爲􅀜鑰能令萬國人一見換神骨髙山固無限如此方爲嶽丈夫無特逹雖貴猶碌碌磨鏡篇流塵翳明鏡歳乆看如漆門前負局生爲我一磨拂萍開緑池滿暈盡金波溢白日照空心圎光走幽室山神祅氣沮野魅眞形出却思未磨時瓦礫來唐突有獺吟有獺得嘉魚自謂天見憐先祭不敢食捧鮮望清􅀇人立寒沙上心專脰肩肩漁翁以爲祅舉塊投其咽呼兒貫魚歸與獺同烹煎關關黃金鶚大翅揺江煙下見盈㝷魚投身擘洪漣攫拏隱嶙去哺鶵林岳巔鴟烏欲伺􅂩遥噪莫敢前長居青雲路彈射無由縁何地無江湖何水無鮪鱣天意不宰割菲祭徒䖍䖍空餘知禮重載在淹中篇劉夢得文集卷第二劉夢得外集卷第二詩和微之深春好贈別白侍郎洛中戲呈馮尹荅白賔客始聞蟬有懷憶樂天樂天􅀉新詩月夜憶樂天詶令狐相公吟白君哭崔兒荅樂天所􅀉池北新葺水齋詶別樂天贈樂天詶別樂天醉荅樂天和樂天耳順吟見樂天題詩早夏郡中書事見元相公題名􅀉贈小樊憶春草報白君送令狐相公秋夕不寐冬日晨興詶樂天見􅀉荅樂天見憶誚失婢牓者晚逹喜崔賔客歸洛傷小􅁎英英洛下醉吟郡齋書懷詶樂天即事公主舊宅吟樂天自問中秋翫月秋日書懷詶貽賀金紫初冬早寒傷微之敦詩晦叔泛舟聮句杏園聮句醉中聮句興花池亭聮句西池聮句首夏猶清和聮句薔薇花聮句西池落泉聮句和樂天柘枝和題眞娘墓同樂天和微之深春好二十首同用家花車斜四韻何處深春好春深萬乗家宫門皆映柳輦路盡穿花池色連天漢城形象帝車旌旗暖風裏獵獵向西斜何處深春好春深阿母家瑶池長不夜珠樹正開花橋峻通星渚樓暄近日車層城十二闕相對玉梯斜何處深春好春深執政家恩光貪捧日貴重不看花玉饌堂交印沙堤柱礙車多門一巳閉直道更無斜何處深春好春深大鎭家前旌光照日後􅀐蹙成花節院收衙隊毬場蔟看車廣筵歌舞散書號夕陽斜何處深春好春深貴戚家櫪嘶無價馬庭發有名花欲進宫人食先薫命婦車晚歸長帶酒冠蓋任傾斜何處深春好春深恩澤家爐添龍腦炷綬結虎頭花賔客珠成履嬰孩錦縛車畫堂簾幕外來去鷰飛斜何處春深好春深京兆家人眉新柳葉馬色醉桃花盜息無鳴鼓朝迴自走車能令帝城外不敢逕由斜何處深春好春深刺吏家夜䦨猶命樂􅀨甚亦㝷花傲客多憑酒新􅁎苦上車公門吏散後風擺㦸衣斜何處深春好春深羽客家芝田繞舎色杏樹滿山花雲是淮王宅風爲列子車古壇操簡處一逕入林斜何處深春好春深小隱家芟庭留野菜撼樹去狂花醉酒一千日貯書三十車短衾從露體不敢有餘斜何處深春好春深富室家唯多貯金帛不擬􅀒鶯花國樂呼聮轡行㕑載滿車歸來看理曲燈下寶􅁫斜何處深春好春深豪士家多沽味濃酒貴買色深花已臂鷹隨馬連催妓上車城南踏青處村落逐原斜何處深春好春深貴胄家迎呼偏熟客揀選最多花飲饌開華幄笙歌岀鈿車興酣罇易罄連㵼酒缾斜何處深春好春深唱第家名傳一紙牓興管九衢花薦聽諸侯樂來隨計吏車杏園抛曲處揮袖向風斜何處深春好春深少婦家能偷新禁曲自剪入時花追逐同遊伴平章貴價車從來不墮馬故遣髻鬟斜何處深春好春深㓜女家􅀟鬟梳頂髻兩面綉裙花粧壞頻臨鏡身輕不占車鞦韆爭次第牽拽綵繩斜何處深春好春深蘭􅀂家當香收柏葉養􅁡近棃花野逕宜行樂遊人盡駐車菜薗蘺落短遥見桔橰斜何處深春好春深老宿家小欄圍蕙草髙架引藤花四字香書印三乗壁畫車遲迴聽句偈􅀟樹晚隂斜何處深春好春深種蒔家分畦十字水接樹兩般花櫛比栽籬槿咿啞轉井車可憐髙處望棊布不曾斜何處深春好春深稚子家爭􅀐一竿竹偷折四隣花􅀏擊羊皮鼓行牽犢頷車中庭貪夜戲不覺玉繩斜刑部白侍郎謝病長告改賔客分司以詩贈別鼎食華軒到眼前拂衣髙謝豈徒然九霄路上辭朝客四皓叢中作少年他日卧龍終得雨今朝放鶴且冲天洛陽舊有衡茅在亦擬抽身伴地仙遥和白賔客分司􅀄到洛中戲呈馮尹西辤望苑去東占洛陽才度嶺無歸思看山不懊來冥鴻何所慕遼鶴乍飛迴洗竹通新逕攜琴上舊臺塵埃長者轍風月故人杯聞道龍門峻還因上客開和留守令狐相公荅白賔客蛟龍和風吹樹枝商山逸客岀􅀜時身無拘束起長晚路足交親行自遲官拂象筵終日待私將雞黍幾人期君來不用飛書報萬户先從紙貴知始聞蟬有懷白賔客去歳白有聞蟬見􅀉詩云秖應催我老兼遣報君知之句蟬韻極清切始聞何處悲人含不平意景值欲秋時此歳方晼晩誰家無别離君言催我老巳是去年詩憶樂天㝷常相見意慇勤別後相思夢更頻每遇登臨好風景羨他天性少情人樂天􅀉洛下新詩兼喜微之欲到因以杼懷也松間風未起萬葉不自吟池上月未來清輝同夕隂宫徴不獨運塤篪自相㝷一從別樂天詩思日巳沈吟君洛中作精絶百鍊金乃知􅀌鶴情月露爲知音微之從東來威鳯鳴歸林羡君先相見一豁平生心月夜憶樂天兼􅀉微之今宵帝城月一望雪相似遥想洛陽城清光正如此知君當此夕亦望鏡湖水展轉相憶心月明千萬里詶鄆州令狐相公官舎言懷見􅀉呈樂天詞人各在一涯居聲味雖同跡自踈佳句傳因多好事尺題稀爲不便書巳通戎略逢黃石仍占文星耀碧虚聞􅀃朝天在來歳霸陵春色待行車吟白君哭崔兒二篇愴然􅀉贈吟君苦調我霑纓能使無情盡有情四望車中心未釋千秋亭下賦初成庭梧已有鶵栖處池鶴今無子和聲從此期君比瓊樹一枝吹折一枝生荅樂天所􅀉詠懷且釋其枯樹之歎衙前有樂饌常精宅内連池酒任傾自是官髙無狎客不論年長少歡情驪龍頷被探珠去老蚌胎還應月生莫羡三春桃與李桂花成實嚮秋榮白侍郎大尹自河南􅀉示池北新葺水齋即事招賔十四韻兼命同作公府有髙政新齋池上開再吟佳句後一似畫圖來結構踈林下寅縁曲岸隈緑波穿戸牖碧甃疊瓊瓌幽興當軒滿清光繞砌迴潭心澄曉鏡渠口起晴雷瑶草縁堤種松煙上島栽魚游驚撥刺鷺浴喜毰毸爲客烹林笋因僧採石苔酒缾常不罄書案任成堆簷外青雀舫坐中鸚鵡杯蒲根抽九節蓮蕚捧重臺芳訊此時到勝遊何日陪共譏吴太守自占洛陽才赴蘇州詶別樂天吴郡魚書下紫宸長安厩吏送朱輪二南風化承遺愛八詠聲名躡後塵梁氏夫妻爲􅀉客陸家兄弟是州民江城春日追遊處共憶東都舊主人贈樂天一别舊遊盡相逢俱涕零在人雖晚逹於樹似冬青痛飲連宵醉狂吟滿坐聽終期抛印綬共占少微星福先寺雪中詶別樂天龍門賔客㑹龍宫東去旌旗駐上東二八笙歌雲幕下三千世界雪花中離堂未暗排紅燭別曲含凄颺晚風才子從今一分散便將詩詠嚮吳儂醉荅樂天洛城洛城何日歸故人故人今轉稀莫嗟雪裏暫時别終擬雲間相逐飛和樂天耳順吟兼􅀉敦詩吟君新什慰蹉􅋸屈指同登耳順科鄧禹功成三紀事孔融書就八年多巳經將相誰能爾抛􅁍丞郎爭奈何獨恨長州數千里且隨魚鳥泛煙波到郡未浹日登西樓見樂天題詩因即事以􅀉樂天自此郡謝病西歸湖上收宿􅀨城中無晝塵樓依新柳貴池帶亂苔春雲水正一望簿書來遶身煙波洞庭路愧彼扁舟人早夏郡中書事水禽渡殘月飛􅀨灑髙城華堂對嘉樹簾廡含曉清拂鏡整危冠振衣歩前楹將吏儼成列簿書紛來縈言下辨曲直筆端破交爭虚懷詢病苦懷律操剽輕􅕡吏告無事歸來解􅆪纓髙簾覆朱閣忽爾聞調笙虎丘寺見元相公二年前題名愴然有詠前年滻橋送之武昌滻水送君君不還見君題寺虎丘山因知早貴兼才子不得多時在丗間􅀉贈小樊花靣丫頭十三四春來綽約向人時終須買取名春草處處將行歩歩隨憶春草憶春草處處多情洛陽道金谷園中見日遲銅駞陌上迎風早河南大尹頻出難只得池塘十歩看府門閉後滿街月幾處遊人草頭歇館娃宫外姑蘇臺􅉱􅉱芉芉撥不開無風自偃君知否西子裙􅅂曾拂來樂天􅀉憶舊送因作報白君以荅報白君别來巳度江南春江南春色何處好鷰子􅀟飛故官道春城三百七十橋夾岸朱樓隔柳條丫頭小兒盪畫槳長􅃑女郎簪翠翹郡齋北軒卷羅幕碧池逶迤遶華閣池邊緑竹桃李花花下舞筵鋪彩霞呉娃足情言語􅃛越客有酒巾冠斜坐中皆言白太守不􅀒風光向杯酒酒酣襞牋飛逸韻至今傳在人人口報白君相思空望嵩丘雲其奈錢塘蘇小小憶君淚黦石榴裙白君有妓近自洛歸錢塘和白侍郎送令狐相公鎭太原十萬天兵貂錦衣晉城風日斗生輝行臺僕射新恩重從事中郎舊路歸疊鼓蹙成汾水浪閃旗驚斷塞鴻飛邊庭自此無烽火擁節還來坐紫微秋夕不寐􅀉樂天洞戸夜簾卷華堂秋簟清螢飛過池影蛩思遶堦聲老枕知將雨髙牎報欲明何人諳此景逺問白先生冬日晨興􅀉樂天庭樹曉禽動郡樓殘􅀧聲燈挑紅燼落酒煖白光生髮少嫌梳利顔衰恨鏡明獨吟誰應和須􅀉洛陽城詶樂天見􅀉元君後輩先零落崔相同年不少留華屋坐來能幾日夜臺歸去便千秋背時猶自居三品三川吴郡品同得老終須􅁲一丘投老之日願樂天爲鄰􅀂使吾徒還早逹亦應簫鼓入松楸荅樂天見憶與老無期約到來如等閑偏傷朋友盡移興子孫閒筆底心猶毒杯前膽不豩呼􅀜反唯餘憶君夢飛過武牢􅀜和樂天誚失婢牓者把鏡朝猶在添香夜不歸鴛鴦拂瓦去鸚鵡透籠飛不逐張公子即隨劉武威新知正相樂從此脫青衣樂天􅀉重和晚逹冬青一篇因成再荅風雲變化饒年少光景蹉􅋸屬老夫秋隼得時凌汗漫寒􅀛飲氣受泥塗東隅有失誰能免北叟之言豈便無振臂猶堪呼一擲爭知掌下不成盧河南白尹有喜崔賔客歸洛兼見懷長句因而繼和幾年侍從作名臣却向青雲索得身朝士忽爲方外士主人仍是眼中人􅀟鸞遊處天京好五馬行時海嶠春遥羡光隂不虚擲肯令絲竹暫生塵和楊師臯給事傷小􅁎英英見學胡琴見藝成今朝追想幾傷情撚􅃶花下呈新曲放撥燈前謝改名但是好花皆易落從來尤物不長生鸞臺夜直衣衾冷雲􅀨無因入禁城和樂天洛下醉吟􅀉太原令狐相公兼見懷長句舊相臨戎非稱意詞人作尹本多情從容自使邊塵靜談􅀏不聞桴鼓聲章句新添塞下曲風流舊占洛陽城昨來亦有吴趨詠唯􅀉東都與北京郡齋書懷􅀉江南白尹兼􅂤分司崔賔客謾讀圖書三十車年年爲郡老天涯一生不得文章力百口空爲飽暖家綺季衣冠稱􅁂面吴公政事副詞華還思謝病今歸去同醉城東桃李花詶樂天七月一日夜即事見􅀉夜樹風韻清天河雲彩輕故苑多露草隔城聞鶴鳴揺落從此始別離含逺情聞君當是夕􅀝瑟吟商聲外物豈不足中懷向誰傾秋來念歸去同聽嵩陽笙題于家公主舊宅樹繞荒臺葉滿池簫聲一絶草蟲悲鄰家猶學宫人髻園客爭偷御果枝馬埒蓬蒿藏狡兔鳯棲煙􅀨嘯愁鴟何郎獨在無恩澤不似當初傅粉時吟樂天自問愴然有作親友􅀜心皆不見風光滿眼倍傷神洛陽城裏多池館幾處花開有主人八月十五日夜半雲開然後翫月因書一時之景􅀉呈樂天半夜碧雲收中天素月流開城邀好客置酒賞新秋影透衣香潤光凝歌黛愁斜輝猶可翫移宴上西樓秋日書懷寄白賔客州逺雄無益年髙健亦衰興情逢酒在䈥力上樓知蟬噪芳意盡鴈來愁望時商山紫芝客應不向愁悲詶樂天見貽賀金紫之什乆學文章含白鳳却因政事賜金魚郡人未識聞謡詠天子知名與詔書珍重和詩呈錦繡願言歸計並園廬舊來詞客多無位金紫同遊誰得如詶樂天初冬早寒見􅀉乍起衣猶冷微吟帽半欹霜凝南屋瓦雞唱後園枝洛水碧雲曉吴宫黃葉時兩傳千里意書札不如詩樂天見示傷微之敦詩晦叔三君子皆有深分因成是詩以􅀉吟君歎逝􅀟絶句使我傷懷奏短歌丗上空驚故人少集中唯覺祭文多芳林新葉催陳葉流水前波讓後波萬古到今同此恨聞琴泪盡欲如何春池泛舟聯句鳯池新􅀨後池上好風光上相公禹錫取酒愁春盡留賔喜日長度送兵部柳絲迎畫舸水鏡寫雕梁羣送賈閣長潭洞迷仙府煙霞認醉郷餗送張司業鶯聲隨􅀨語竹色入壷觴籍送主客晚景含澄澈時芳得豔陽禹錫飛鳬拂輕浪緑柳暗回塘度逸韻追安石髙居勝辟彊羣杯停新令舉詩動綵牋忙餗顧謂同來客歡遊不可忘籍杏園聮句杏園千樹欲隨風一醉同人此暫同羣上司空老態忽忘絲管裏衰顔頓解酒杯中絳上白二十二曲江日暮殘紅在翰苑年深舊事空居易上主客二十四年流落者故人相引到花叢禹錫花下醉中聮句共醉風光地花飛落酒杯絳送劉二十八殘春猶可賞晚景莫相催禹錫送白侍郎酒幸年年有花應歳歳開居易送兵部相公且當金韻擲莫遣玉山頽羣送庾閣長髙㑹彌堪惜良時不易陪承宣送主客誰能拉花住爭換得春回禹錫送吏部我輩㝷常有佳人早晚來嗣復送兵部􅀉言三相府欲散且徘徊居易時户部相公同㑹宴興化池亭送白二十二東歸聮句東洛言歸去西園告別來白頭青眼客池上手中杯度離瑟慇勤奏仙舟委曲回征輪今欲動賔閤爲誰開禹錫坐弄琉璃水行登緑縟苔花低妝照影萍散酒吹醅居易岸䕃新抽竹亭香欲變梅隨遊多􅀏傲遇勝且徘徊籍澄澈連天鏡潺湲岀地雷林塘難共賞鞍馬莫相催度信及魚還樂機忘鳥不猜晚晴槐起露新暑石添苔禹錫擬作雲泥別尤思頃刻陪歌停珠貫斷飲罷玉峯頽居易雖有逍遥志其如磊落才㑹當重日用此去肯悠哉籍西池送白二十二東歸􅀉令狐相公聮句促坐宴回塘送君歸洛陽彼都留上宰爲我􅀃中腸度威鳳池邊別冥鴻天際翔披雲見居守望日拜封章禹錫春盡年華少舟通景氣長送行池籍薔薇花聮句似錦如霞色連春接夏開禹錫波紅分影入風好帶香來度得地依東閣當階奉上台行式淺深皆有態次第暗相催禹錫滿地愁英落縁堤惜掉回度芳濃濡雨露明麗隔塵埃行式似著燕脂染如經巧婦裁居易奈花無別計只有酒殘杯籍西池落泉聮句東閣聽泉落能令野興多行式散時猶帶沫淙處即跳波度徧洗磷磷石還驚泛泛鵝色清塵不染光白月相和居易噴雲縈松竹攅殊濺芠荷禹錫對吟時合響觸樹更揺柯籍照圃紅分藥侵堦緑浸莎居易日斜車馬散餘韻逐鳴珂禹􅃬和樂天柘枝柘枝夲出楚王家玉靣添驕舞態奢雲􅁂改梳翔鳯髻新衫別織鬬雞紗鼓催殘拍腰身軟汗透羅衣􅀨􅀧花華筵曲罷辭歸去便隨王母上煙霞和樂天題眞娘墓薝匐林中黃土堆羅襦繡黛巳成灰芳魄雖死人不怕蔓草逢春花自開幡蓋向風疑舞袖鏡燈臨曉似妝臺吴王嬌女墳相近一片行雲應往來劉夢得外集卷第二
