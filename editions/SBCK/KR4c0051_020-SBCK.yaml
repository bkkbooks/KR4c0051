front:
  text: 劉夢得文集卷第二十
  hash: sha256:ff3e2c5173b1df4a8e982a1d9d0b8a8e80efb48d5c75200e5630248c52bf78ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_020-1a}
body:
  text: 表謝加章服賀皇帝疾愈汝州謝上同州謝上賀梟斬鄭注賀德音賀赦謝恩賜粟麥慰湽王薨謝放先貸斛㪷謝分司東都蘇州謝恩賜加章服犬和七年臣某言伏奉去年十一月二十七日詔書加臣賜紫金魚袋餘如故者恩降重霄榮霑陋質虚黷陟明之典恐興彼己之詩寵過􅀂驚喜深生懼中謝臣起自書生業文入仕德宗朝爲御史以􅀌直在臺順宗朝爲郎官以縁累出省憲宗皇帝後知其􅁈特降敕書追赴京國縁有虚稱恐居清班務進者爭先上封者潛毀巧言易信􅀌憤難伸俄復一麾外轉三郡伏遇陛下膺期御宇大振滯淹哀臣宿舊猥見收拾職兼書殿官忝儀曹微勞未宣薄命多故又離省署重領郡符延英面辭親承教誨銜命即路星言載馳到任之初便逢災疫奉宣聖澤恭守詔條上稟睿謀下求人瘼才術雖短憂勞則深幸免流離漸臻完復皆承聖化所及遂使人心獲安豈由微臣薄劣能致臣素乏親黨家夲􅀌貧年衰無酒色之娱性拙無愽弈之藝自領大郡又逢時災晝夜苦心寢食忘味曾經誣毀毎事防虞唯託神明更無媒援豈期片善上逹宸聦回日月之重光燭江湖之下國絲綸襃異苦節旣彰印綬煒煌老容如少望雲天而拜舞豈盡丹誠視環玦以徘徊空嗟白首無任蘇州賀皇帝疾愈大和八年正月二十八日臣某言臣得夲道觀察使報伏承聖躬痊愈巳於紫宸殿視朝者一人有慶萬國同歡中賀伏惟皇帝陛下外親萬務内奉三宫常懷宵旰之勤遂失寢興之適上􅀇降祐列聖表靈百神奔走以來扶四海精誠而致感勿藥有喜如山永安宗廟保無疆之休寰瀛申莫大之慶臣恪居官次遐守江干不獲稱賀闕庭無任汝州謝上臣某言伏奉去年七月十四日詔書授臣使持節汝州諸軍事守汝州刺史兼御史中丞充夲道防禦使餘如故者臣乆居逺服戀闕常深忽降新恩近郷爲貴承旨慶抃省躬慙惶中謝伏惟皇帝陛下垂衣穆清之中旁照寰瀛之内車書所及動植咸安臣昨離班行逺守江徼延英辭日親奉德音知臣所部災荒許臣到任條奏共承睿旨宣示羣􅀺減其征傜頒以賑賜伏蒙聖澤救此天災疲羸再蘇幼艾同感二年連遭水潦百姓幸免流離比之交割之時户口增長雖才術不至於事未周而憂勞則深爲衆所悉臣夲業儒素頻登文科時命邅迴再領軍郡即以今月二十七日到任上訖謹當奉宣皇化慰彼蒼生臨汝海之波朝宗尚阻望秦城之日回照何時無任同州謝上并批荅臣某言伏奉去年十月二十三日制書授臣使持節同州諸軍事守同州刺史兼御史中丞充夲州防禦長春宫等使恩降九重榮忝三輔承旨慶抃省躬慙惶中謝伏惟皇帝陛下丕承烈聖光闡鴻猷氛祲掃除乾坤交㤗臣幸逢昌運累沐殊私空荷生成之恩寧酬􅀨露之澤即以今月二日到夲州上訖謹宣睿旨安慰蒸􅀺伏以夲州四年巳來連遭旱損閭閻凋瘵逺近共知臣頃任蘇州之年亦遭大水之後面辭之日親奉德音至於撫綏皆承聖教二年之後百姓獲安今夲部災荒物力困涸忝爲長吏敢不竭誠即須條䟽續具聞奏臣恪居官次幸接王畿不獲拜舞彤庭陳露丹慊犬馬懷戀寢興匪寧瞻魏闕之容朝天尚阻望長安之路近日爲榮無任批荅省表具之卿任居三輔職奉六條累聞問俗之勞載覽勤人之志言惟顧行深慰朕懷勉􅀪政經以副憂􅀉所謝知賀梟斬鄭注大和九年臣某言伏奉前月二十五日詔書示逆賊鄭注巳梟首訖氛祅殄滅華夏乂安中賀伏以逆賊鄭注夲出細微潛懷梟鏡之心兼結凶狂之黨人倫共弃神理不容陛下睿哲感通天人合應重臣恊力禁旅齊心指顧之閒猖狂自潰乾坤交㤗日月增明凡在人臣不勝慶快臣恪居官次不獲稱賀闕庭無任賀德音臣某言伏見今月十六日德音布告遐邇天道下濟人情大安中賀伏惟皇帝陛下凝旒思理垂衣擇材以日月無私之光照寰區有截之内貴使下情盡逹寧虞厚貌潛謀一昨李訓鄭注等敢有逆心兼連凶黨陛下睿謀神斷左右恊同頃刻之閒掃除巳定重臣畢力禁旅竭忠氛祲廓清華夷咸恱言念政刑之外或有詿誤之徒再發德音廣宣聖澤當星紀回天之日迎陽和煦物之光懷危疑者如山之安欲告訐者望風知懼非同謀者一切不問未結正者三宥從寛含生之倫普天同感臣恪居官次不獲稱賀闕庭無任賀赦臣某言伏奉今月一日制書改大和十年爲開成元年大赦天下者雷􅀨作解人神恱隨澤及八荒網開三面中賀伏惟皇帝陛下上承乾綱下立人極用含􅀪光大之澤副夷夏會同之心獻歳改元惟新景祚先明首罪次及羣祅述睿情以曉萬方施鴻霈以蘇庶物恤辜宥過巳責㢮征郡縣之舊弊悉除賦稅之新規咸備停藩方節獻之禮以惠疲人回榷管餘羨之財以資京邑命使展澄清之志察言求讜直之材弓旌賁于丘園粟帛頒於耆艾爰以初吉御宇明庭德音一發於九天和氣驟周於四海開物成務實表於建元應天順人永延於億載臣幸居近輔先受殊恩不獲稱慶闕庭陪榮班次衆星列位常拱北辰之光新歳拜章遥獻南山之壽無任抃躍屏營之至謝恩賜粟麥臣某言伏奉今月一日制書以臣當州連年歉旱特放開成年夏青苗錢并賜斛㪷六萬碩仰長吏逐急濟用不得非時量有抽歛於百姓者恩降九天澤周萬姓優詔纔下羣情頓安中謝伏以災沴流行隂陽常數物力旣竭人心匪遑輒敢奏聞夲求貸借皇恩廣被􅀇造曲成旣貸在田之征仍頒發廩之賜臣謹宣赦文節目彰示兆人鼓舞歡謡自中徂外臣初到所部便遇儉時今蒙聖慈特有賑恤主恩及物巳爲壽域之人衆意感天必有豐年之應臣恪居官業不獲拜舞闕庭無任慰湽王薨臣某言臣得進奏官楊愓狀報湽王薨輟朝三日中慰伏惟皇帝陛下德邁前王情深近屬憫枝葉之謝諒切宸衷割肌膚之愛何堪聖念萬方知化九族歸仁凡受國恩伏深悽惻臣限以藩守不獲奉慰闕庭無任謝受恩放先貸斛㪷臣某言臣奉五月二十九日敕牒據度支所奏諸道節度觀察使及州府借便省司錢物斛㪷等數内當州欠三萬六千二十三貫石並放免者殊私忽降逋責滌除藩方永安遐邇咸恱中謝伏以􅀜輔之閒頻年歉旱田租旣須矜放公用遂不支持承前長吏例有借便以救一時之急皆成積欠之名旣未支塡常懷憂懼聖恩周洽洞見物情爰命有司使之條奏去其舊弊衆巳獲安嚴立新規人知所措臣恪居官次不獲拜舞闕庭無任謝分司東都臣某言伏奉今月十九日制書授臣太子賔客分司東都者寵命自天戰越無地中謝臣發迹書生以文爲業出身入仕四十餘年頃自集賢學士出守吳郡面辭之日親承德音念百姓水潦之餘示微臣政理之法臣祗膺聖旨夙夜竭誠閭里獲安流庸盡復猥蒙朝􅅄錫以金章及遷同州又遇歉旱悉心綏撫幸免流離今荷天慈憫臣耆舊列名賔護之職分局河洛之都老馬霑束帛之恩枯株蒙􅀨露之澤獲居榮秩以畢餘年顧此微軀實爲厚幸伏以臣始爲御史逮事德宗今忝宫僚幸逢聖日舉四海之内賢能則多求六朝之臣零落將盡雖迫桑榆之景猶傾葵藿之心無任劉夢得文集卷第二十
