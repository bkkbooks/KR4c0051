body:
  text: 山口藤田綠子錄平安福井氏崇蘭館以多蔵宋元古書聞扵海内安政中罹災故物蕩然迄其後嗣克紹先志兩世蒐購收儲之富不减曩曰中有宋槧劉夢得集卅卷外集十卷盖爲東山建仁寺舊蔵相􅀓千光􅀦師入宋時􅀁齎歸近年寺主僧天章以方外之身勤勞王事兼能詞翰名著士林眀治初退居西崦妙光寺囙帶此書而去既爲兇奴􅀁殪蔵書散佚此書遂歸崇蘭館每半葉界長八寸六分廣六寸四分十行行十八字字大欄豁疎朗恱目按陳振孫書錄解題􅁛劉賔客集原夲卌卷宋􅀄佚其十卷宋次道裒其遺詩四百七萹雜文廿二首為外集卷數萹目与此夲脗合今通行夲雜文廿卷詩十卷出扵明􅈓卷弟既已不同􅀁錄詩文並有佚奪又表牋各篇有通行夲存年月而此夲失録此夲有年月而通行夲刊落者其餘異文多不勝舉且此夲先文後茟仍是六朝以来集部體製若通行夲先文後詩􅀴眀刻恣改耳外集十卷天禄琳琅前編錄汲古阁影抄宋夲後編又録元刻夲並􅁛希見此夲則正外兩集完好無缺宋氏􅀁裒直齋􅀁錄忽獲目睹扵數百載後可􅁛藝林奇寳已清􅀦董授􅀴亰卿雅善鑒蔵又喜刻書頃避地東渡僑寓平安既盡閱崇蘭之蔵深愛此書借覽不􅁕竟謀㬌刻乃用玻璃版法精印百部以貽扵丗雖紙幅稍蹙原夲而精采煥然不爽豪髪自兹東瀛秘笈復廣流􅀓中山精華頓還舊觀是則授經之有功此集不在次道下矣大正二年八月内藤虎劉夢得文集目録第一卷古詩澤宫登司馬錯故城寄李六侍御謁枉山㑹禪師善卷壇下作武陵觀火荅崔元受途中早發贈尹果毅望衡山遊桃源賦登天壇寫羅浮事秋江早發歸城南别墅和裴尹祈雨命箏歌送酒第二卷古詩效阮公體偶作古調寓興昬鏡詞飬鷙詞武夫詞賈客詞調瑟詞弔張曲江庭梅詠詠古詠史苦雨行萋􅀆吟經檀道濟故壘題欹器圖聚蚊謡百舌吟飛鳶操秋螢引華山謌磨鏡篇有獺吟第三卷律詩春日退朝經九公主舊院作蜀先主廟觀八陣圖夜翫月許給事見示詩和崔舎人翫月和李相公早秋凱旋成詠武陵書懷經伏波神祠聞董評事疾贈髙大夫宿誠禪師山房晚泊牛渚罷郡歸洛陽間居城東間遊歸洛陽􅀉友人雪後眺望途中早發初至長安詔賜觀秋稼早秋集賢院金陵懷古池上亭獨吟蒙李相公書問和二相公述懐賀門下相公加􅁽命謝一二禪客病中見問第四卷律詩西塞山懷古陽山廟觀賽神漢壽城春望後梁二帝碑荆門道懷古和竇貟外早春對雪早秋贈荅荅徐貟外贈端州紫石硯觀董評事詩松滋渡望峽中題叚侍御枕上贈王學士闕下口号監祠夕月壇書事戲贈崔千牛詔徵逐客和嚴司空見馮叔逹故洛城古牆戲贈看花諸公再遊􅀇都觀望夫山金陵五題謝寺􅀟檜韓信廟安國觀聞笙洛中寺北樓見賀監草書韓賔擢第歸覲􅀉楊八壽州重􅀉楊八和宣上人贈東岳張鍊師和崔少監􅀉楊􅉑州題竇貟外新居舉韓湖州目代華州陪錢大夫覩􅀇宗詩懐上京故人和尉遲郎中詶福建陳判官始聞秋風和蘇十郎中詶淮南廖參謀題王郎中新居詶朗州崔貟外賀温尚書水亭避暑述舊詶吴端才第五卷雜體詩翠微寺有感觀莫傜獵西山觀舞柘枝君山懷古秋江晚泊臨江寓望秋日送客豋武陵城謝􅀉三癖詩􅀉上都同舎􅀉京師親友請告東歸題湖城驛池亭平蔡州平齊行城西行說笛歌試茶歌偃松荅東陽于令贈致仕滕庶子詠紅柿子庭竹臺城懷古題壽安甘棠館與歌者米嘉榮聽穆氏唱歌渾侍中牡丹看牡丹與歌者何戡與歌童田順郎題破屏風賞牡丹寄陜州姚中丞詶崔郎中第六卷送別詩送張侍郎送楊侍御送蕭郎中送李尚書送渾大夫送源中丞送陸侍御送太常蕭愽士送王司馬送楊處厚逢韓七中丞送周使君留別張侍御送家兄隱居送王師魯別友人後得書送李僕射重送李相公送張苕送能判官送韋秀才道沖赴制舉送李䇿秀才送張盥赴舉送裴處士應舉送錢侍御辤李相公送令狐相公送趙中丞送裴司徒令公送李户部侍郎送李郎中送杜録事夜宴盧常侍宅送崔司業使君送皇甫少尹送蔡京送唐舎人送盧處士送李秀才赴舉送令狐博士送李貟外送陳郎中送李中丞送李庚先輩送廖參謀送從弟郎中第七卷送僧詩別君素上人送􅀷法師荅宣廣上人送僧仲剬送僧元暠送如智法師贈讃頭陁送慧則法師過鴻舉法師重送鴻舉送僧方及贈日本僧贈眼醫僧別浩初師觀碁歌送儇師贈別約師送鴻舉師送宵韻上人送義舟師送景􅀇師送元曉上人送惟良上人送元􅂤上人送宗密上人第八卷樂府團扇歌荆州歌紀南歌宜城歌順陽歌馬嵬行視刀環歌三閣詞更衣曲淮隂行競渡曲堤上行採菱行秋風引莫徭歌蠻子歌洞庭秋月行踏歌詞華淸詞歩虚詞桃源行魏宫詞阿嬌怨九華山歌送春曲初夏曲柳花詞送春詞秋詞第九卷樂府泰娘歌秋扇詞搗衣曲七夕龍陽縣歌度桂嶺歌揷田歌畬田行蒲萄歌鶗鴂吟牆隂歌觀雲篇踏潮歌百花行春有情篇路傍曲白鷺兒壯士行邊風行竹枝詞楊柳枝詞浪濤沙詞瀟湘神詞抛毬樂詞又楊栁枝詞又竹枝詞紇那曲第十卷哀挽德宗挽歌敬宗挽歌文宗挽歌于司空挽歌傷栁儀曹謫居悼往哭吕衡州遥傷叚右丞傷桃源薛道士王思道碑堂遥傷丘中丞傷獨􅀌舎人覩華州舅氏詩􅀽公挽歌代靜安佳人怨傷愚溪見元九侍御詩傷秦姝行悼妓詩和憶故􅁎傷循州渾尚書哭龐京兆再傷龐尹哭王僕射傷韋賔客縝再經故元九相公宅第十一卷賦問大鈞砥石楚望傷往何卜謫九年望山陽城秋聲第十二卷論辯迹明䞇華佗天論上天論中天論下第十三卷易論辯易第十四卷書上杜司徒獻權舎人代荅于襄州荅元使君荅竇中丞荅柳子厚與柳子厚荅薛郎中論方書與刑部韓侍郎論書儀第十五