front:
  text: 宋築唐集惟書夲偶一見之若卷第稍繁即風行為李杜韓柳已為星風遑論他光緒丙午奉牒㳺日夲道出西京因閲访古志慕崇蘭館蔵書之富访之扵北野别業主人福井翁漢醫也清芬世紹抱獨楽天出示宋元及古刻且言凡經森氏簿錄者惨罹秦厄此皆刼餘􅀁續得者也縹帙井然如登宛委内宋大字夲劉夢得集每半葉十行行十八字中縫有刻工姓名書體遒麗純仿􅄏成石經紙墨並妙窃謂此書與東京啚書寮之太平寰宇紀宋景文王文公楊誠齋等集及吾􅀦京师啚書館之殘文苑英華昭文瞿氏之白氏文集府之徐公文集此書後归余今入大倉可稱海内奇夲帰􅀦恒與朋輩誦述之昨年避囂東航僑居星地復過崇蘭舘翁猶强健罄閲􅀁蔵始知是集首尾完善並附外集尤􅀁心醉適小林忠治業珂羅製版藝精为全􅀦冠曩為羅君􅅩言影印宋拓碑誌濃澹豊纎猶形鑑影乃介内藤炳卿博士假帰属小林氏用佳紙精製百部昔士禮居僅蔵是書殘宋刻四卷半葉十二行廿一字今归昭文瞿氏鐵琴銅劍題䟦每以鈔夲不足㩀為憾深兾得一宋刻之全者以正誤设蕘翁生扵今世其快愉更當為何噫際此流離轉徙牽扵結癖投擲貲以印此書殊不自量然􅀗此百部行世不啻貽傳百部真夲舉凡舊鈔明刻訛謬相萟林嚮奉为珍秘者可㮣供覆瓿扵中山是編功匪鮮淺後之覧者當亦悯余今日之苦衷也癸丑夏日毘􅁜董識扵東山寄廬
