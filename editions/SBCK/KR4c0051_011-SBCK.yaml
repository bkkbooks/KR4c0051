body:
  text: 賦問大鈞砥石楚望傷往何􅁲謪九年望山陽城秋聲問大鈞并序始余失臺郎爲刺史又貶州司馬俟罪朗州三見閏月人咸謂數之極理當遷焉因作謫九年賦以自廣是歳臘月詔追明年自闕下重領連山郡印綬人咸曰美惡周必復第行無恤歳杪其復乎居五年不得調歳二月有事于杜前一日致齋􅀌居慮靜滯念欻起伊人理之不可以曉也將質諸神乎謹貢誠馳精敢問大鈞其夕有遇寤而次第其辭以爲賦圎方相函􅀆浩其無垠窅􅄀翕闢􅀆走三辰以騰振孰主張是􅀆有工其神迎隨不見􅀆強名之曰大鈞欹以臨下􅀆巍乎雄尊天爲獨陽髙不可問工居其中與人差近身執其權心平其運循名想象斯可得以訊曰嘻蒙之未生猶􅅺爾落乎埏埴唯鈞所指忽然爲人爲大幸矣工賦其形七情與俱嗇智不授卑去聲之以愚坦坦之衢萬人所趨蒙一布武化爲畏途人或譽平聲之百􅀃徒虚人或排之半言有餘物壯則老乃唯其常否終則傾亦不可長老先期而驟至􅀆否踰數而叵量雖一夫不獲􅀆亦大化之攸病謹薦誠上問􅀆俛伏以聽是夕寢熟夢遊乎無何有之郷抗陛級乎重霄􅀆異人閒之景光中有威神􅀆金甲而煒煌頷之使前􅀆其音琅琅曰吾大化之一工也居上臨下廉其不平汝今有辭吾一以聽播形肖貌生􅀋積意橐籥圈匡鎔鍊消息我之司智初不爾嗇不守以愚覆爲汝賦旣賦汝形輔之聦明去求世師資適攸宜胡然抗志遐想前烈􅀝梯青冥舉足斯跌韜爾智斧無爲自伐鑿竅太繁天和乃􅂥利逕前誘多逢覆轍名腸内煎外火非熱今哀汝窮將􅌋汝愚剔去剛健納之柔濡塞前竅之傷痍􅀆招太和而與居貰以待人􅀆急以自拘道存宧奥無示四隅軋物之勢不作􅀆見傷之幾自無汝不善用吾焉嗇乎且夫貞而騰氣者膴膴健而垂精者昊昊我居其中猶輪是􅌃以不息爲體以日新爲道倮鱗蜚走灌莽苞皁乃牙乃甲乃殈乃剖陽榮隂悴生濡死薧各乗氣化不以意造賦大運􅀆無有淑惡彼多方􅀆自生醜好爾奚不德余以驟壯姑尤我以速老邪觀汝百爲又或不然赤子哇哇急其能言亦旣名物幾時蹁躚春耕其丘投種之日釋耒而歎何時粟實望所未至謂余舒舒欲其乆留謂我瞥如我一子二誰之曲歟彼蒹葭之蒼􅀆霜霰苦而中堅松竹之皸皴索籜􅀆不􅀂榯筍之可憐納材葦而構明堂固容消而力完揚且之晳􅀆不可以常然當錫爾以老成蒼眉皓髯山立時行去敵氣與矝色􅀆噤危言以端誠俾人望之侮黷不生爾之所得孰與壯多不善處老問余而何受敎而迴蘧蘧形開嚮之威神孰爲來哉乃遽衣促盥端慮滌想委珮低簪持簿叩顙而言曰楚臣天問不詶今臣過幸一獻三售始厚以愚終期以壽志上問之罪濯已然之咎心增故術腹飽新授馳神清􅀇拜手稽首砥石并序時在朗州南方氣泄而􅀨淫地慝傷物嫗伏噫濕渝色壞味雖金之堅亦失􅁪性始余有佩刀甚良至是澀不可拔剖其室乃能出遡陽眇眡傅刃蒙脊鱗然如痏痂如黒子如青蠅之惡銳氣中錮猶人被病然客有聞焉袖密石以遺余沃之草􅃾雜以烏膏切劘下上眞質焯見躊躇四顧逌爾謝客微子之貽幾喪吾寶客曰吾聞諸梅福曰爵禄者天下之砥石也髙皇帝所以礪世磨鈍有是邪余退感其言作砥石賦我有利金􅀆以利爲佩遭土卑而慝作􅀆雄鋩爲之濳晦如景昬而蝕旣􅀆與肌漆而爲癘顧秋蓬之不可刜􅀆尚可遊乎髖髀之外利物蒙蔽才人惆悵俾百汰之至精蟠一檢而多恙豈害氣之獨然􅀆將乆不試而然彼屠者之刀􅀆獵者之鋋不灌不淬􅀆揉鍇銜鈆曰鼓曰揮􅀆刲􅃾擊鮮皖㸌􅜱以耀鋩蓊淫夷而騰羶豈不以渉暑而蒙沴􅀆鼎用之而成妍有客自東遺余越砥圭形石質蒼色膩理剗其鱗皴滑以滫瀡如衣澣垢􅀂鼎出否霧盡披天萍開見水拭寒焰以破眥擊清音而振耳故態復還寶心再起旣賦形而終用一蒙垢焉何恥感利鈍之有時􅀆􅀉雄心於瞪視嗟乎石以砥焉化鈍爲利法以砥焉化愚爲智武王得之商俗以厚髙帝得之傑材以湊一作奔走得旣有自失豈無因漢氏以還三光景分隨道闊狹用之得人五百餘年唐風始振懸此大砥以礱兆民播生在天成器在君天爲物天君爲人天安有執礪世之具而患乎無賢歟楚望并序予旣謫于武陵其地故郢之裔邑與夜郎諸夷錯雜繫乎天者隂伏陽驕是巳繫乎人者風巫氣窳是巳囂雰浮浮利于樓居城之麗譙實鄰所舎四垂無蔽萬景坌入因道其逺邇所得爲楚望賦云翼軫之野祝融司方隂迫而專專實生沴天濡而雺土􅂥而􅅺氣罕淑清􅀆淫氛曀曀中人體胑􅀆爲瘥爲瘵以曠滌煩􅀆利居髙于物外我􅁲我居于城之隅宛在藩落麗譙渠渠四阿垂空洞口發樞眸子不運坐陵虚無歳更周流時極慘舒萬象起滅森來貺予櫺軒之外羣山巃嵸岡陵靡阤勢􅀂相拱出雲見怪窈蔚森聳露夕霞朝望如飛動簷廡之下大江澒洞支流合輸泄入雲夢羲和望舒出没兩涯涵泳之族聱取㰹呀秋水灌盈漩石飄沙流枿軒昂舞于盤渦逮及收潦澹如緑醽白石磷磷倒影羅生蘋末風起有文無聲悠逺煙緜與空蒼然湘沅之春先令而行臘月寒盡温風發榮土膏如濡言鳥嚶嚶三星明其曉中植物颯以飄英雲歸髙唐草蔽洞庭目與天盡神將化并圎方相涵遊氣杳冥煕煕藹藹藻飾羣形枿樹童丘積空凝青環洲曲塘含景曜明恢台之氣發于春季渉夏如鑠逮秋愈熾土山焦熬止水瀵沸翔禽跕墮呀咮垂翅曦赫敲蒸陽極反隂二儀交精下上相歆雲興天際欻􅀂車蓋凝矑未瞬彌漫霮䨴驚雷出火喬木糜碎殷地􅋹空萬夫皆廢懸霤綆縋日中見昧移晷而收野無完塊少隂之中景物澄鮮丹葉星房燭耀川原夕月旣望曜于丹泉上鏡下冰湔塵濯煙宿麗濳芒獨行髙􅄤皓一氣之悠悠㓗有形而溢清􅀇杳微明而斐斖想遊目於化先夜無眹以徂征金霞暈乎海壖明星方揚斜漢西懸璿柄如墮半沈層瀾鷄啁哳而晨鳴􅀆日荏苒以騰晶動植暸􅀆巳分山川鬱乎不平復人寰之諠卑洶浩浩以營營追向時之景光不可驟得以再更意華胥之夢還猶仿像而馳精日次于房天未降霜木􅥊猶澤水泉收脉故道睃音宣削衍爲廣斥水禽嬉戲引吭伸翮紛驚鳴而決起拾彩翠于沙礫時時北風振槁揚埃蕭條邊聲與鴈俱來寒氛委積萬竅交激楚雲改容飛􅀨凝滴灑林遞響淅􅄋梢摵飛電照雪以騰光柔􅂼傲霜而秀坼躔次殊氣川谷異宜民生其閒俗􅀑言夷招三閭以成謡徳伏波而構祠投粔籹以鼓楫豢鱣魴而如犧蟠木靚深孽祅憑之祈年去癘蠲敬祗威擊鼓肆筵河旁水湄薦誠致祝却略躨跜渚居鮮食大掩水物􅅈張餌啗不可遁伏顯舉濳縋晝撞夜觸設機沈深如拾于陸彼遊儵之􅃈􅀋咸跳脫於窘束雖三趾與六眸時或加乎一目亦有輕舟軒輊泛浮拖綸往復馴鷗相逐暮夜澄寂嘯歌羣族傖音俚態幽怨委曲逗䟽柝於江城引哀猨於山木巢山之徒抨木開田灼􅀛伺澤兆食而燔鬱攸起于巖阿騰絳氣而蔽天熏歇􅀨濡穎垂林巓盜天和而藉地勢諒無勞而有年罷士間人逸爲末作求金渚涘淘汰瀺灂流注濻沱繁光熠爚貪賈來貿發於懷握無翼而飛潤于豐屋哂耕耘之悒悒徒胼胝以自鞫我處層軒日星囬還閱天數而視民風百態變見乎其閒非耳剽以臆􅀃􅀆固幽求而縱觀觀物之餘遂觀我生何廣覆與厚載豈有形而無情髙莫髙􅀆九􅕡逺莫逺􅀆故園舟有楫􅀆車有轄江山坐􅀆不可越吾又安知其所如怳臨髙以觀物傷往并序人之所以取貴於蜚走者情也而誕者以遣情爲智豈至言邪予授室九年而鰥痛􅀂人之夭閼弗遂也作賦以傷之冀夫覽者有以增伉儷之重云歎獨處之邑邑􅀆憤伊人之我遺情可殺而猶毒境當歡而復悲人或朝歎而暮息夫何越月而踰時太極運乎三辰轉寒暑而下馳有歸於無􅀆盛復于衰猶昩爽之必暮又安得而怨咨我今怨夫􅀂人􅀆曾旭旦而濳暉飄零日反之萼倐忽蜉蝣之衣川走下而不還露迎暘而易晞恩巳甚􅀆難絶見無期􅀆永思我行其野農民桑者舉案來饁亦在林下我觀于途禆販之夫同荷均挈荆􅁫布􅃭羽毛之蕃鱗介之微和鳴灌叢􅀟泳漣漪薨薨伊蟲蠢蠢伊豸遊空穴深兩兩相比何動􅀋之萬殊必雄雌而與俱物莫失儷以􅀌處我方踽踽而焉如我復虚室自凄涼􅀆心伊鬱心伊鬱􅀆將語誰坐匡牀􅀆撫嬰兒何所丏沐􅀆何從仰飴襦袴在身􅀆昔圍差跌鞶囊附臂􅀆餘馥葳蕤誠天性之濳感顧童心􅀆如疑嘵然有難繼之慕漠然減好弄之姿指遺袿􅀆能認遡空帷􅀆欲歸我入寢宫痛人亡􅀆物改其容寶瑟偃􅀆􅃶柱絶瑶臺傾􅀆鏡奩空寒爐委灰虚幌多風􅂩駟晨轉牎蟾夜通歩揺昬􅀆網黏翡翠芳褥掩􅀆塵化蛩蛩閱刀尺之餘澤見巾箱之故封翫服儼􅀆猶具繁華謝􅀆焉從想翩僊於是非求僁窣與冥蒙信竒術之可致嗟此生􅀆不逢徒注視以寂聽怳神疲而目窮還抱影以獨出紛百哀而攻中系曰龍門風霜苦別一作唳鶴哀鳴夜銜羽吳江波浪深雌劒一去無遺音悲之來􅀆憒一作憤予心洶如行波洊浸淫悵一作旣縁情而莫極思執禮以自箴巳焉哉苒苒生死悠悠古今乗彼一氣􅀆聚散相㝷或鼓而興或罷而沈以無涯之情愛悼不駐之光隂諒自迷其有分徒終怨於匪忱彼蒙莊􅀆何人予獨累歎而長吟何􅁲余旣幻惑力命之􅀃􅀆身乆放而愈疑心回泬其莫曉􅀆將取質夫東􅀛楚人俗巫而好術􅀆叟有鬻卜而來思乃招而訊之曰嘻人莫不塞有時而通伊我􅀆乆而愈窮人莫不病有時而閒伊我􅀆乆而滋蔓吾聞人稟五行動止有則四時轉續變於所極一歳之旱人斯具舟三月之熱人斯具裘極必反焉其猶合符予首圎而足方予腹隂而背陽胡形象之有宵而變化之殊常經曰剥極則賁而未甞剥者其誰否極受泰居否而未甞泰者又其誰鶴胡不截鳬胡不禆夔何罰而踸踔蚿何功而扶持紛紜恣睢交作舛馳似予似奪似信似欺孰主張之問于子􅀛􅁲者曰招我以粗問我以微有天下之是非有仁人之是非在此爲美􅀆在彼爲嗤或昔而成或今而虧君問曷由主張其時時乎時乎去不可邀來不可逃淹淹􅀆孰捨孰操堇啄之毒芩鷄首之賤毛各於其時而伯音覇其曹屠龍之技非曰不偉時無所用莫􅀂履狶作踊之工非曰可珍時有所用貴於斵輪絡首縻足􅀆驥不能踰跬前無所阻􅀆跛鼈千里同渉于川其時在風㳂者之吉泝者之凶同藝于野其時在澤伊穜之利乃穋之厄故曰是邪非邪主者時邪主者命邪諒淑惡之同岀􅀆顧所丁之􅀂何夫如是得非我美失非我恥其惡曷思其來曷期姑􅌃常而俟之夫何􅁲爲言訖執􅀛而起予退而作何􅁲賦於是􅌃道之心一而俟時之志堅内視羣疑猶冰釋然謫九年古稱思婦巳歷九秋未必有是舉爲深愁莫髙者天莫濬者泉推巳極數無踰九焉伊我之謫至於數極長沙之悲三倍其時廷尉不調行當􅉥而天有寒暑閏餘三變朝有考績明幽三見顧堯之民􅀆亦昬墊而有歎歎息􅀆倘佯登髙髙􅀆望蒼蒼突弁之夫我來始黃合抱之木我來猶芒山增昔容水改故坊童者鬱鬱􅀆涸者洋洋天覆地生蓊􅀆無傷彼族而居曏之投荒彼軒而遊昨日桁楊信及澤濡俄然復常稽天道與人紀咸一僨而一起去無乆而不還棼無乆而不理何吾道之一窮􅀆貫九年而猶爾意不可得而知庸詎得而悲苟變化之莫及􅀆又安用夫肖天地之形爲望邈不語􅀆臨風境自外􅀆感從中晦明轉續􅀆八極鴻蒙上下交氣􅀆羣生異容發􅀌照於寸眸鶩遐情於太空物乗化􅀆多象人遇時􅀆不同嗟乎有目者必騁望以盡意當望者必縁情而感時有待者瞿瞿忘懷者熈煕慮深者瞠然􅀂喪樂極者沖然無違外徙􅀝其如一中糾紛􅀆􅀂斯望如何其望最樂晞慶霄􅀆遡阿閣如雲􅀆天顔咫尺如草􅀆臣心踊躍扇交鳯􅀆葳蕤旗􅂛龍􅀆蠖略日轉黃道天開碧落凝瑞景於庭樹掬非煙於殿幕望如何其望且歡登㶚岸􅀆見長安紛擾擾􅀆紅塵合鬱葱葱􅀆佳氣盤池象漢􅀆昭回城依斗􅀆闌干避御史之騘馬逐倖臣之金丸望如何其望攸好宗萬靈􅀆越四隩漢帝仙臺􅀆秦皇海嶠霓衣踴于河上馬跡窮乎越徼紫氣度􅀜而斐亹神光屬天而照耀晥眷眷以馳精聳專專而觀妙望如何其望有形視蠢蠢􅀆窮􅁳􅁳楚塞氛惡􅀆蕭􅀜燧明暈籠孤月角􅁬長庚沙多似雪磧有疑城煙雲非女子之氣草木盡王者之兵審曵柴之虚警破來鏑之先聲信有得於風鳥示無言於斾旌望如何其望且慕恩意隔􅀆年光度雕輦巳辤􅀆金屋何處長信草生􅀆長門日暮徯翠華之儻來仰􅀇天以自訴況復湘水無還漳河空注淚染枝葉香餘紈素風蕭蕭􅀆北渚波煙漠漠􅀆西陵樹夫不歸􅀆江上石子何見􅀆秦原墓柏琴翻朔塞之音挾瑟指邯鄲之路望如何其望最傷俟環玦􅀆思帝郷龍門不見􅀆雲霧蒼蒼喬木何許􅀆山髙水長春之氣􅀆恱萬族獨含嚬􅀆千里目秋之景􅀆懸清光偏結憤􅀆九回膓羨環拱於白榆惜馳暉於落棠諒衝斗􅀆誰見伊戴盆􅀆何望平聲豈止蘇武在胡管寧浮海送飛鴻之滅没附隂火之光彩鶴頸長引烏頭未改恨巳極􅀆平原空起何時􅀆東山在永望如何傷懷孔多降將有依風之感宫人成憶月之歌歌曰張衡側身愁思乆王粲登樓日迴首不作渭濵垂釣臣羞爲洛陽拜塵友山陽城并序山陽故城遺阯數雉四百之運終於此墟裔孫作賦蓋閔漢也詞曰我止行車隕涕于山陽之墟是何蒼莽與慘悴舂陵之氣􅀆焉如踣昌運於四百辤至尊而伍匹夫有利器而倒持􅀆曾何鋩刃之足舒懿王迹之肈基曁坤維之再敷邈汜陽與鄗上怳蛇變而龍攄痛人亡而事替終此地焉忽諸嗟乎積是爲治積非成虐文景之欲處身以約播其徳牙迄武乃穫􅁊靈之欲縱心於昬􅋹其祅焰逮獻而焚彼伊周不世􅀆姦雄乗舋而騰振物象漼以易位被虚號而陽尊終世殫而事去胡竊揖讓以爲文嗚呼維神器之至重􅀆蓋如山之不騫使人得譬乎逐鹿固健歩者所先諒人事之云爾孰云當塗之兆也自天亂曰乆矣莫可追􅂛彼墟􅀆噫嘻獨遺武􅀆貽後王之元􅀛秋聲并序相國中山公賦秋聲以屬天官太常伯唱和俱絶然皆得時道行之餘興猶有光隂之歎況伊鬱老病者乎吟之斐然以􅀉􅀌憤碧天如水􅀆窅窅悠悠百蟲迎暮􅀆萬葉吟秋欲辤林而蕭颯濳命侣以啁啾送將歸􅀆臨水非吾土􅀆登樓晩枝多露蟬之思夕蔓趣一作起寒螿之愁至􅀂松竹含韻梧楸早脫驚綺䟽之曉吹墮碧砌之涼月念塞外之征行顧閨中之騷屑夜蛩鳴􅀆機杼促朔鴈叫􅀆音書絶逺杵續􅀆何泠泠虚牎靜􅀆空切切如吟如嘯非竹非絲合自然之宫徴動終歳之別離廢并苔冷荒園露滋草蒼蒼􅀆人寂寂樹槭槭􅀆蟲咿咿則有安石風流巨源多可平六符而佐主施九流而自我猶復感隂蟲之鳴軒歎涼葉之初墮異宋玉之悲傷覺潘郎之幺麽嗟乎驥伏櫪而巳老鷹在韝而有情聆朔風而心動盼天􅄜而神驚力將痑􅀆足受紲猶􅁬迅于秋聲劉夢得文集卷第十一
