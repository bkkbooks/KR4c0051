body:
  text: 碑王氏先廟碑令狐氏先廟碑劉君遺愛碑奚公神道碑代郡開國公王氏先廟碑唐制五等有爵服而無山川登于三事得立四廟備物崇祀以交神明敬先報夲以輔孝治有國之令典也維長慶三年前相國王公始卜廟于西京崇業里公時鎭劔南東川上章曰臣涯官秩印授品俱第三請如式以奉宗廟制曰可是歳仲冬申命長男孟堅祔其主于三室明年公入爲御史大夫復以十一月躬行蒸祭閒歳公出梁州就拜司空禮崇異數廟加祀室大和二年増新室旣成祔顯考于尊位告饗由禮觀之者以爲世程第一室曰上儀同􅃎州別駕府君諱元政以妣愽陵崔氏配第二室曰湖州安吉縣令贈尚書刑部貟外郎府君諱實以妣贈扶風縣太君馬氏配第三室曰朝散大夫青州司馬贈户部侍郎府君諱祚以妣贈武威郡太夫人賈氏配第四室曰温州刺史贈太尉府君諱冕以妣贈魯國太夫人愽陵崔氏配初周靈王太子晉遇浮丘公化爲神僊時人號曰王家其後遂以命氏顯於秦者王翦三世將秦師子孫分居晉代閒東漢有徴君覇覇孫甲亦號徴君徙居祁縣爲著姓故至于今爲太原人自漢渉魏益以熾昌凡十葉至後魏度支尚書廣陽侯冏廣陽有二子神念神感神念南奔梁神感北仕齊惟儀同府君廣陽侯五代孫也唐興于太原實從義旗佐成王業故有開府儀同之寵惟刑部府君以功臣子理二邑不躋貴仕故有錫羨後大之祥惟户部府君㓜􅀌以孝聞於郷曲未冠以文售於有司由前進士補延州臨安縣主簿㑹詔徴賢良䇿在甲科授瀛州饒陽尉歳滿遷渭南尉天后在神都東畿差重遂由渭南轉河南􅃴逢建萬象神宫甸内吏分董其役因上書切諫繇是名益聞開元初以大理司直馳軺車聮讞大獄閩禺朔漢所至決平早以欒􅁄傷生晚成劇恙樂就夷曠故不至大官惟太尉府君生於治平時以文學自􅁬年十有五賁然從秋賦明年春􅂛名于司徒又一年􅀇宗御層樓發德音懸文詞政術科以罝髦士府君䇿最髙授太常寺太祝未幾復以能通道德南華沖虚三眞經進盩厔尉天寶中歷左拾遺左補闕禮部司駕二外郎屬幽陵亂華遣兵南服因佐閩粤改檢校比部郎中行軍司馬時中原甫寧江南爲吉地二千石多用名德乃以府君牧温州朝廷虚公卿以俟髙第及聞永嘉人輟舂罷社搢紳閒以不淑相弔焉雖位􅀒于道而邁德垂短後之人得以纉承丕􅀭之其儲休啓祐有自云爾生三子皆聦明絶人長曰沼以神童仕至檢校禮部郎中次曰潔以竒文仕至國子司業今代郡公實季子也早在文仕籍射䇿連中咸世其家貞元中德宗聞其名自藍田尉召入禁中視草厥後三典書命再參內廷憲宗器之付以國柄翊賛有道雖􅉺免常居大僚今年自梁州請覲上思用舊臣爲羽儀遂領太常其公府如故以一心事六君顯官重務靡不揚歷且夫起諸生至三公而心愈卑道益廣岀授黃􅃏以臨諸侯入服華章以謁家廟追崇極大位血食備多室享全榮而奉昭薦嗚呼公侯之孝歟宜書廟器以視喬公之三鼎其詞曰閟宇神庭􅃉清而嚴上公之儀四室耽耽犧以㓗牲粢以大糦交神尚敬合魄尚氣子姪宗工駿奔奉事副䈂侈袂儼恪居次孝孫兢兢執爵而􅂛以祼以擩以伏以興水陸具來羶薌畢登列于圜方其器增增乃礿乃甞敬而追逺二昭二穆孝以尊夲瞻瞻几幄蹜蹜堂閫禮成起慕涕落􅀇衮濡露踐霜誰無永懷不如逹者哀與榮偕逢時􅁬庸誰不得位不如仁人以道爲貴惟公之逹􅀆名以顯親惟公之仁􅀆德以澡身六朝之清臣一代之全人宜其世家翼翼振振罔不肅祗于廟之門彭陽侯令狐氏先廟碑今上元年七月十三日汴州刺史宣武軍節度副大使知節度事汴宋毫等州觀察處置使銀青光禄大夫檢校禮部尚書兼御史大夫上柱國彭陽縣開國伯令狐公西嚮拜章上言守臣楚蒙被恩澤列爲元侯得立家廟以奉常祀制書下其奏于有司於是善相考祥得地於京師通濟里居無何新廟成公以守藩故申命季弟監察御史定卜牲練日越八月丁亥祔饗三室塪墉以尚幽設幄以迎精禮無尤違神用寧謐第一室曰秦州上邽縣尉諱濬以妣太原王氏配第二室綿州昌明縣令贈吏部尚書諱崇亮以妣贈太原郡夫人河東柳氏配第三室太原府功曹參軍贈太子太保諱承簡以妣贈魏國太夫人富春孫氏配明年十月公由浚郊以介圭入覲眞拜户部尚書進爵爲侯旣辭戎旗得以列侯謁三廟是歳南至上不視朝又得以展時祭先期致齋栗然以敬旣齋盡志歆然永思奉其百順陳以具物始躋而䖍恭終獻而汍瀾旣卒事顧麗牲之石宜有刋紀乃俾家老授其諜于所知云令狐晉邑也晉大夫魏顆以輔氏之功始封焉其易名曰文國語所謂令狐文子是巳其先文王之昭畢公髙之裔畢萬爲晉卿始封于魏自萬至顆蓋四世其後三十七世藍田侯蚪仕拓跋魏爲燉煌郡太守子孫因家遂占數爲郡人藍田之孫熈在隋爲納言惟上邽府君納言之􅀇孫道克肖而位不至惟尚書府君西州之右族光未耀而德巳基惟太保府君志爲君子儒以明經居上第調補陽安縣主簿歷正平尉汾州司法參軍陜州大都督府兵曹終于太原府首􅁺始以顓經進旣仕旁通百家愛榖梁子清而婉左丘明國語辯而工司馬遷史記文而不華咸手筆朱墨究其微旨愷悌以肥家信誼以急人德充齒耋獨享天爵故休祐集于身一作支後徽章流乎佳城凡以子貴承澤降命書告第者始贈尚書祠部郎中再贈禮部尚書三加右僕射四爲今稱先夫人亦四徙封密印纍纍􅀖族聳慕生三子皆才彭陽公爲嗣次子從端實肅給今爲檢校膳部郎中參河東軍事季子前所謂監察御史今主柱下方書温敏而有文綽綽然眞令兄弟唯彭陽以詞筆取科名累參侍從由􅀶士主尚書牋奏典内外書命遂登樞衡言文章者以爲冠擁節緫戎率身和衆留惠于盟津變風干浚都言方略者以爲能夫浚師嚄唶難治乗舋竊發寖成習俗莅止五載飲和革心束馬來朝熊羆隕涕問公還期觴必祝之留爲常泊旋命居守汴人聞公之東近而愈懷翹翹瞿瞿盡西其首言遺愛者可紀焉貴而率禮老而能慕􅇶􅅥乎霜露齊莊乎廟桃睦其仲季施及郷黨言孝悌者歸厚焉勒銘于碑以代彞鼎文曰巳􅀌之孝莫如備物顯顯新廟四阿三室時惟仲月卜用柔日醴醆苾芬牲牷愽腯籩甒在堂簫膋在庭孝孫蒸蒸躬􅀂奉盈低簮委紳薦俎登鉶􅆄蠁交感涕流縁纓禮以備儀誠以致美祖考來格錫之丕祉工祝告訖退循軒戺乃授風人作詩以紀猗歟彭陽之寵光佐憲皇穆皇西省東臺迭爲侍郎國之大政咨爾乎章敬宗凝旒俾鎭雍丘入爲地官令守東周彭陽之忠厚宜介福以壽東郊旣􅁵可復朝右綿綿其胄系于周舊由我顯起必昌其後大和紀元作廟之首刻碑廟門龍集巳酉髙陵令劉君遺愛碑縣内之大夫鮮有遺愛在其去者蓋邑居多豪政出權道非有卓然異績結于人心浹于骨髓安能乆而愈思大和四年髙陵人李仕清等六十三人具前令劉君之德詣縣請金石刻縣令以狀申府府以􅃺考于明法吏吏上言謹按寶應詔書凡以績將立碑者其具所紀之文上尚書考功有司考其詞宜有紀者乃奏明年八月庚午詔曰可今書其章明有以結人心者揭于道周云涇水東行注白渠釃而爲三以沃􅀜中故秦人常得善歳按水部式決􅂥有時畎澮有度居上游者不得擁泉而顓其􅃾每歳少尹一人行視之以誅不式兵興巳還􅎊失根夲涇陽人果擁而顓之公取全流浸原爲畦私開四竇澤不及下涇田獨肥他邑爲枯地力旣移地征如初人或赴訴泣迎尹馬而占涇之􅃾皆權倖家榮􅀔足以破理訴者覆得罪繇是咋舌不敢言吞􅁈銜忍家視孫子長慶三年髙陵令劉君勵精吏治視人之瘼如熛疽在身不忘決去乃循故事考式文曁前後詔條又以新意請更水道入于我里請杜私竇使無弃流請遵田令使無越制別白纎悉列上便宜掾吏依違不決居二歳距寶曆元年端士鄭覃爲京兆秋九月始具以聞事下丞相御史御史屬元谷實司察視持詔書詣渠上盡得利病還奏青規中上以谷奉使有􅃺乃俾太常撰日京兆下其符司録姚康士曹椽李紹實成之縣主簿談孺直實董之冬十月百衆雲奔憤與喜并口謡手運不屑鼕鼓揆功什七八而涇陽人以竒計賂術士上言曰白渠下髙祖故墅在焉子孫當恭敬不宜以畚鍤近阡陌上聞命京兆立止絶君馳詣府控告具發其以賂致前事又謁丞相請以顙血汚車茵丞相彭原公歛容謝曰明府眞愛人陛下視元元無所恡第未周知情僞爾即入言上前翌日果有詔許訖役仲冬新渠成渉季冬二日新堰成駃流渾渾如脉宣氣蒿荒漚冒迎耜釋怨開塞分寸皆如詔條有秋之期投鍤前定孺直告巳事君率其僚躬勞倈之烝徒讙呼􅁬襏襫而舞咸曰吞恨六十年明府雪之擿姦犯豪卒就施爲嗚呼成功之難也如是請名渠曰劉公而名堰曰彭城按股引而東千七百歩其廣四㝷而深半之兩涯夾植􅂎柳萬夲下垂根以作固上生材以備用仍歳旱沴而渠下田獨有秋渠成之明年涇陽三原二邑中又擁其衝爲七堰以折水􅀔使下流不厚君詣京兆索言之府命從事蘇特至水濵盡撤不當擁者繇是邑人享其長利生子以劉名之君諱仁師字行輿彭城人武德名臣刑部尚書德威之五代孫大曆中詩人商之猶子少好文學亦以畫籌于東諸侯遂參幕府歷尹劇縣皆以能事見陟率不時而遷旣有績于髙陵轉昭應令俄兼檢校水曹外郎充渠堰副使且錫朱衣銀章計相愛其能表爲檢校屯田郎中兼侍御史斡池鹽于蒲錫紫衣金章歳餘以課就加司勲正郎執法理人爲循吏理財爲能臣一出於清白故也先是髙陵人蒙被惠風而惜其捨去發于胷懷播爲聲詩今采其旨而變其詞志于石文曰噫涇水之逶迤漑我公􅀆及我私水無心􅀆人多僻錮上游􅀆乾我澤時逢理􅀆官得材墨綬榮􅀆劉君來能愛人􅀆恤其隱心旣公􅀆言旣盡縣申府􅀆府聞天積憤刷􅀆沈痾痊劃新渠􅀆百畒流行龍蛇􅀆止膏油遵水式􅀆復田制無荒區􅀆有良歳嗟劉君􅀆去翺翔遺我福􅀆牽我腸紀成功􅀆鐫美石求信詞􅀆昭懿績唐故朝議郎守尚書吏部侍郎上柱國賜紫金魚袋贈司空奚公神道碑嗚呼有唐清臣尚書吏部侍郎奚公貞元十五年十月甲子薨于位詔贈禮部尚書太常考行證曰某是歳臘月丁酉葬于萬年縣之某原後三十有四年子爲諸侯大夫門户有煒於是門下生琢石紀德揭于我阡云公諱陟字殷衡其先在夏爲車正以功封于薛下古以降爲譙郡人或因仕適楚復之秦今爲京兆人隋唐之際再世以明經爲􅀶士家有賜書曾祖簡亦以文學爲太子司議郎大父乾繹仕至光州刺史烈考諱某有道而尚晦終徐州司功參軍贈和州刺史由子貴也天以大運生萬物而以正氣鍾賢人至和來宅其德乃具公實具焉㓜而擢陵苕之秀長而成清廟之器羣倫月旦咸以第一流處之及從郷賦臮􅂛名太常果居上第明年詔郡國徴賢良設四科以盡材公居文詞清麗之目授引文館校書郎時德宗新即位聲洎虜庭西戎畏威底貢内附詔諫議大夫崔河圖持節即虜帳以報之使臣欲盛其賔僚以自大遂嘿表公爲介換大理評事除書到門公方爲人子不敢訴以逺稱病弗果行歸寧壽春養志盡敬丞相楊炎勇於用才擢爲左拾遺奉安輿而西未幾再集荼蓼居後喪將闋是歳建中四年京師急變黃屋順動狩于巴梁公徒行閒道以歸王所旣中月而詔授起居郎充翰林學士創鉅愈遲病不拜職改太子司議郎從大駕回入尚書爲司金元士且參榷筦之務有頃持愍􅁽宣恩于薊門將行錫銀朱於青蒲上復命稱旨轉吏部貟外郎是曹在南宫爲眉目在選士爲司命公執直筆閱簿書紛拏盤錯一瞬而剖時文昌缺左右丞都曹差重遂轉左司郎中㝷遷中書舎人執事者繄公識精以斟酌大政非獨用文飾也會江淮閒民被水禍上愍焉特命公宣撫之許以便宜及物赤車所至如東風變枯條其利病復奏咸可轉刑部侍郎時主計臣延齡以險刻貴倖而與京兆充相惡以危事中之充坐譴巳又逮繫其吏峻繩之事下司宼主奏議者欲文致而甘心焉公􅋲然持平挫彼嶽嶽君子聞之善其知道不私刑曹旣清以餘刃兼領選事居一年授權知吏部侍郎又一年即眞秩言能審官者夲朝有裴馬盧李四君子物論以公嫓焉時得疾發癕有國醫方直禁中上促遣如第且敕之曰某賢臣也悉術以治之及有司以不起聞上震悼加等公娶琅琊王氏石泉公之曾孫友壻皆一時彦士長子某蚤不禄第二子敬則歷太僕少卿今爲濮州刺史兼御史中丞賜金紫以課一作連最就加貴秩俾視九卿第三子敬玄以詞藝似續登文科歷左補闕今爲尚書刑部郎中第四子炅舉進士最小子某咸砥礪纂脩宜爲名公家子其邁德垂􅁉之光乎公少以名器自任及顯逹急於推賢視其所舉則在西省薦權丞相由右史掌訓詞在中銓表楊僕射由地曹郎綜吏部二公後爲天下偉人凡執文章權衡以揣量多士一人中禁考䇿詞三在天官第章句披沙剖璞由我而顯者落落然居多推是風鑒移于大冶則鎔範之内無非祥金嗟乎天不遐其福而􅀌民望使由庚之什不作於貞元中惜也初公旣齊終詔贈大宗伯後以第三子在郎位被霈澤再追襃至司空故昔之葬儀用常伯而今之碑制用三公云銘曰仁鱗智龍爲瑞一辰未􅀂君子瑞于人倫惟唐德宗道􅀋漢宣責實繩下風稜言言公丁斯時籍在俊賢從難表節執羈而還帝曰汝器黃流瑟然可爲大僚左右化源乃飾王度乃馳輶軒旣執刑柄亦操吏權陽和熈熈貯在顔閒守法持正嶷如秋山火不侵玉倖臣畏伏鳯鳴祥煙梟噪低跧帝方􅀝用天不假年公寐無窹其名愈逺門人逹者赤舄玄衮公居甚卑其德愈尊兩子朝服駢驅朱輪佳城何在胄貴之里螭首􅀛趺德煇是紀嗚呼後人下拜于此劉夢得文集卷第二十八
