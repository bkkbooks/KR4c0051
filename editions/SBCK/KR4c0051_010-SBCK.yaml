  text: 劉夢得文集卷第十
  hash: sha256:b8a8a2bd2be24effd3717fdeaf38541fe3fd6b828f3e607b477c66ac1d803756
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_010-1a}
body:
  text: 哀挽德宗挽歌敬宗挽歌文宗挽歌于司空挽歌傷柳儀曹謫居悼往哭吕衡州遥傷叚右丞傷桃源薛道士王思道碑堂遥傷丘中丞傷獨􅀌舎人覩華州舅氏詩􅀽公挽歌代靜安佳人怨傷愚溪見元九侍御詩傷秦姝行悼妓詩和憶故􅁎傷循州渾尚書哭龐京兆再傷龐尹哭王僕射傷韋賔客縝再經故元九相公宅德宗神武孝文皇帝挽歌二首出震清多難乗時播大鈞操􅃶調六氣揮翰動三辰運偶昇天日哀深率土人瑶池無轍跡誰見屬車塵鳯翣擁銘旌威遲異吉行漢儀陳秘器楚挽咽容全日下初陵外人悲舊劒前周南有遺老掩淚望秦川故相國燕國公于司空挽歌二首彤弓封舊國黒矟繼前功十年鎭南雍九命作司空池臺樂事盡簫鼓葬儀雄隂山貴公子來葬五陵西前馬悲無主猶帶朔風嘶漢水青山郭襄陽白銅堤至今有遺愛日暮人悽悽重至衡陽傷柳儀曹并序元和乙未歳與故人柳子厚臨湘水爲別柳浮舟適柳州余豋陸赴連州後五年余從故道出桂嶺至前別處而君殁於南中因賦詩以投弔憶昨與故人湘江岸頭別我馬映林嘶君帆轉山滅馬嘶循故道帆滅如雷電千里江蘺春故人今不見謫居悼往二首邑邑何邑邑長沙地卑濕樓上見春多花前恨風急猿愁腸斷叫鶴病翹趾立牛衣獨自眠誰哀仲卿泣鬱鬱何鬱鬱長安逺於日終日念郷􅀜鷰來鴻復還潘岳歳寒思屈平憔悴顔慇勤望歸路無􅀨即登山哭吕衡州時余方謫居一夜霜風彫玉芝蒼生望絶士林悲空懷濟世安人略不見男㛰女嫁時遺草一函歸太史旅墳三尺近要離朔方徙歳行當滿欲爲君刋第二碑遥傷叚右丞江湖舊游南宫交代江海多豪氣朝廷有直聲何言馬蹄下一旦是佳城傷桃源薛道士壇邊松在鶴巢空白鹿間行舊逕中手植紅桃千樹發滿山無主任春風王思道碑堂下作蒼蒼宰樹起寒煙尚有威名海内傳四府舊聞多故吏幾人垂淚拜碑前遥傷丘中丞并引河南丘絳有詞藻與余同􅂛進士科從事鄴下不幸遇害故爲傷詞鄴下殺才子蒼茫寃氣凝枯楊映漳水野火上西林馬鬛今無所龍門昔共登何人爲弔客唯是有青蠅傷獨􅀌舎人并引貞元中余以御史監祠事河南獨􅀌生始仕爲奉禮郎有事宗廟郊畤必與之俱繇是甚熟及余謫武陵九年閒獨􅀌生仕至中書舎人視草禁中上方許以宰相元和十年春余祗召抵京師次都亭曰舎人以疾不起余聞因作傷詞以爲弔昔別一年少今悲喪國華逺來同社鷰不見早梅花途次敷水驛伏覩華州舅氏昔日行縣題詩處澘然有感昔日股肱守朱輪兹地遊繁華日巳謝章句此空留蔓草佳城閉故林棠樹秋今來重垂淚不忍過西州湖南觀察使故相國􅀽公挽歌三首五驅龍虎節一入鳯皇池令尹自無喜羊公人不疑天歸京兆日葉下洞庭時湘水秋風至淒涼吹素旗丹旐發江臯人悲鴈亦號湘南罷痎市漢上改詞曹表墓􅀟碑立尊名一字襃常聞平楚獄爲報里門髙返葬三千里荆衡逹帝畿逢人即故吏拜奠盡霑衣地得青烏相賔驚白鶴飛五公碑尚在今日亦同歸代靜安佳人怨二首并引靖安丞相武公居里名也元和十一年六月公將朝夜漏未盡三刻􅀐出里門遇盜薨于牆下初公爲郎余爲御史繇是有舊今守于逺服賤不可以誄又不得爲歌詩聲于楚挽故代作佳人怨以禆于樂府云寶馬鳴珂踏曉塵魚文匕首犯車茵適來行哭里門外昨夜華堂歌舞人秉燭朝天遂不迴路人彈指望髙臺牆東便是傷心地夜夜秋螢飛去來傷愚溪三首并引故人柳子厚之謫永州得勝地結茅樹􅂼爲沼沚爲臺榭目曰愚溪柳子殁三年有僧遊零陵告余曰愚溪無復曩時矣一聞僧言悲不能自勝遂以所聞爲七言以􅀉恨溪水悠悠春自來草堂無主鷰飛回隔簾惟見中庭草一樹山榴依舊開草聖數行留壞壁木奴千樹屬隣家唯見里門通德牓殘陽寂寞出樵車柳門竹巷依依在野草青苔日日多縱有隣人解吹笛山陽舊侣更誰過碧㵎寺見元九侍御和展上人詩有三生之句因以和之廊下題詩滿壁塵塔前松樹已鱗皴古來唯有王文度重見平生笁道人傷秦姝行并引河南房􅄏士前爲虞部郎中爲余話曰我得善箏人于長安懷逺里其後開士爲赤縣牧容州求國工而誨之藝工而夭今年開士遺子新詩有悼佳人之目顧予知所目也惜其有良妓獲所從而不克乆乃爲傷詞以貽開士長安二月花滿城花前女兒弄銀箏南宫仙郎下朝晚曲頭駐馬聞新聲馬蹄逶遲心蕩漾髙樓巳逺猶頻望此時意重千金輕鳥傳消息紺輪迎芳筵銀燭一相見淺􅀏低鬟初目成蜀􅃶錚摐指如玉皇帝弟子常家曲青牛文梓赤金簧玫瑰寶柱秋鴈行歛蛾收袂凝清光抽􅃶緩調怨且長八鸞鏘鏘渡銀漢九雛威鳯鳴朝陽曲終韻盡意不足餘思悄絶愁空堂從郎鎭南别城闕樓舩理曲瀟湘月馮夷躚躚舞渌波鮫人出聽停綃梭北池含煙瑶草短萬松亭下清風滿北池萬松皆容州勝槩秦聲一曲此時聞嶺泉嗚咽南雲斷來自長陵小市東蕣華零落瘴江風侍兒掩泣收銀甲鸚鵡不言愁玉籠愽山爐中香自滅鏡奩塵暗同心結從此東山非昔遊長嗟人與􅃶俱絶夔州竇貟外使君見示悼妓詩顧余甞識之因命同作前年曾見兩鬟時今日驚吟悼妓詩鳯管學成知有藉龍媒欲換歎無期空廊月照常行地後院花開舊折枝寂寞魚山青草裏何人更立智瓊祠竇夒州見􅀉寒食日憶故姬小紅吹笙因和之鸞聲窈眇管參差清韻初調衆樂隨幽院妝成花下弄髙樓月好夜深吹忽驚暮槿飄零盡唯有朝雲夢想期聞道今年寒食日東山舊路獨行遲傷循州渾尚書貴人淪落路人哀碧海連天丹旐迴遥想長安此時節朱門深巷百花開哭龐京兆少年有俊氣甞擢制科之首俊骨英才氣褏然䇿名飛歩冠羣賢逢時巳自致髙位得疾還因􅀝少年天上别歸京兆府人閒空歎茂陵阡今朝繐帳哭君處前日見鋪歌舞筵再傷龐尹京兆歸何處章臺空暮塵可憐鸞鏡下哭殺畫眉人哭王僕射相公名播時兼鹽鐵􅁀薨子侯一日病􅅬公千載歸門庭颯巳變風物慘無輝羣吏謁新府舊賔霑素衣歌堂忽暮哭賀雀盡驚飛傷韋賔客縝自工部尚書除賔客韋公八年餘位至六尚書五福唯無富一生誰得如桂枝攀最乆蘭省出仍初海内時流盡何人動素車再經故元九相公宅池上作故池春又至一到一傷情鴈鶩羣猶下蛙蠙衣巳生竹叢身後長臺勢􅀨來傾六尺􅀌安在人閒未有名劉夢得文集卷第十劉夢得外集卷第十墓誌祭文故董府君墓誌絶編生墓表祭柳貟外文重祭柳貟外文代祭柳貟外文祭韓吏部文祭李司空文代祭李司空文代祭王相國文祭桂尚書文祭楊庶子文故荆南節度推官董府君墓誌元和七年夏四月某日前荆州部從事董府君以疾終于故府私第年若干其􅀌泣書前人之爵里耿光求我以銘于幽且先志也故重爲之董姓出於豢龍氏至辛有而分在晉爲良史在趙佐􅂤子爲能臣項羽主盟爲翟王髙皇帝舉兵漢中刼其兵衆不克其土後裔遂爲隴西人凡稱事不稱名不待事而彰也始予謫于武陵人多言之賢有董生爲守令客旣而以士相見之禮成與之言能言墳典數旁捃百氏之學弱年嗜屬詩工弈棊用是索合于貴游多所慰薦中年奉浮圖􅀃三乗用是貢誠于清賢乃被辟書脫巾爲􅀪文館校書郎再選至大理評事咸視眞秩而不纍其章職繫于外故也晚節尚道故投劾於幕府治扁舟浮江沲泛洞庭登熊耳訪浮丘以探異賦枉渚以竒傲居數歳投老于南荆迷􅀖縱性委和從化逮夫寢巨室也自含禭至于卜竁皆仁人之賻焉是歳五月十二日卜葬于龍山之某岡外姻至矣君名侹字庶中大父曰思􅂤位至汝南太守父承祖殁于試守太子舎人始爲君求婦于鄭之族生嗣子夏卿旣立而夭今未之從其後又娶于閻氏生二子曰周卿雲卿􅄔也繐裳髽首有正家之道嗚呼道愈冨而室愈貧志甚脩而知甚寡士以隴西爲貴將在令名歟銘曰學待問而文藻身藝不試􅀆名孰聞大道甚夷􅀆非我辰何生不茂􅀆非我春脩門之逹􅀆連岡膴膴蔓草如徒􅀆新墳若斧于嗟董生􅀆於焉終古絶編生墓表顧􅂏吴郡人食力於武陵沅水上以讀易聞病且死飭其子曰吾年十有五而授易于師積六十三年于兹未甞一日不吟乎繫象里中兒從吾讀其文多矣死則必葬我于黨庠之側尚其有知且聞吾書君子曰若􅂏者可謂志篤于學矣因以絶編生謚之且表其墓後之讀㓛令者或采焉予旣謫居是􅀖始至之日問能道古語可與言者邑子以生爲對旣而執䞇請見之生危冠大袂闊視雅拜及門知讓俟肅而后入又肅而躋階心存聖言潤徹眉睫有野態而無苟容問其所執曰㓜學易老而尤嗜問安學曰始聞於師晚熟于心自尼父兼三才絀八索繫詞焉以通微言與伏犧文王竝行猶夫三辰同麗太極秦脫火患完文顯行漢之田丁京劉而東京有馬鄭魏之何荀兩王而吳有韋陸前者導源後者濬之渢融混合百􅂀犇奏唐興沙門一行方􅂥天幾以探古人神友造物智斟人事制動也有柅變道也無方曏之支流委輸于我其他紬繹祖述三十有餘家朱藍之樸斲之爲羽翼爲鼓吹疇咨天人之際磅礴上下騖精於攟摭匱巧於穿鑿猶制氏之於樂鏗鏘而巳徐氏之於禮善容而巳然而前脩之盡心也得以采􅃾搴芳焉手胘於運管目䁾於臨燭而氣耗於咏呻家居無訾不能與計偕地偏且逺無有能晤語者心愈苦而跡愈卑寒膚嗛腹以至於耊老微夫子之問持是安施乎他日予造其室廬瓢簞在左汗􅂤在右有􅀛枵然有筴甚澤余㩎蓍指骨而訊之曰是斖斖者曾不予欺乎生攸爾而對云占先聖人知道之妙不可徒而得也故設象以致意挮有以取無取當其粗用當其精夫權衡所以揣輕重不爲捶鈎者設也㝷尺所以商逺邇不爲運斤者設也􅀛筴所以決羣疑不爲知幾者設也幾存乎人是則以天時爲卦體以理爲爻位外附人事以象焉内取諸身以􅂏焉一夲云内取諸身以象焉内取諸身以􅂏焉得樞於寰中迎數於象外自然之理不知其然雖欲強名措􅀃無地彼枯莖朽殻安能與於此乎今夫揲之以至刓灼之以殆盡徒與夫蚩蚩者問歉穰占能虺起訟需食亡羊喪牛之閒耳資其握粟以餬予口烏足爲夫子道哉余以斯言􅃉於易故書之噫國有太學學有館以延顓門若生者苦形役志如是其顓也茹經于腹湮滅糞壞辟水湯湯不聞其聲摧藏僕遬與山水同朽豈地逺然邪彼文甲綷毛剽筋壽革嶺嶠之華實炎溟之蜃蝦飛苞驛篚所至而貴夫豈邇也哉恱者衆故也生之死在元和七年秋七月由死之日推而上求直始生之辰得四百有七十甲子葬在枉渚西石磯上其墳可隱東望里塾尚行其志云祭柳貟外文維元和十五年歳次庚子正月戊戌朔日􅀌子劉禹􅃬銜哀扶力謹遣所使黃孟萇具清酌庶羞之奠敬祭于亡友柳君之靈嗚呼子厚我有一言君其聞否惟君平昔聦明絶人今雖化去夫豈無物意君所死乃形質爾魂氣何託聽余哀詞嗚呼痛哉嗟余不天甫遭閔凶未離所部三使來弔憂我衰病諭以苦言情深禮至款宻重􅃨期以中路更申願言途次衡陽云有柳使謂復前約忽承訃書驚號大叫如得狂病良乆問故百哀攻中涕洟迸落魂魄震越伸紙窮竟得君遺書絶􅃶之音悽愴徹骨初託遺嗣知其不􅀌末言歸輤從祔先域凡此數事職在吾徒永言素交索居多逺鄂渚差近表臣分深想其聞訃必勇於義巳命所使持書徑行友道尚終當必加厚退之承命改牧冝陽亦馳一函􅃸於便道勒石垂後屬于伊人安平宣英㑹有還使悉巳如禮形於具書嗚呼子厚此是何事朋友彫落從古所悲不圖此言乃爲君發自君失意沈㐲逺郡近遇國士方伸眉頭亦見道草恭辤舊府志氣相感必踰常倫顧余􅀒舋營奉方重猶冀前路望君銘旌古之逹人朋友則服今有所厭其禮莫申朝晡臨後出就別次南望桂水哭我故人孰云宿草此慟何極嗚呼子厚卿眞死矣終我此生無相見矣何人不達使君終否何人不老使君夭死皇天后土胡寧忍此知悲無益奈恨無巳余之不聞余心不理含酸執筆輒復中止誓使周六同於己子魂􅀆來思知我深旨嗚呼哀哉尚饗重祭柳貟外文嗚呼自君之没行巳八月每一念至忽忽猶疑今以喪來使我臨哭安知丗上眞有此事旣不可贖翻哀獨生嗚呼出人之才竟無施爲炯炯之氣戢于一木形與人等今旣如斯識與人殊今復何託生有髙名没爲衆悲異服同志異音同歎唯我之哭非弔非傷來與君言不成言哭千哀萬恨􅀉以一聲唯識眞者乃相知爾庶幾儻聞君儻聞乎嗚呼痛哉君有遺美其事多梗桂林舊府感激主持俾君内弟得以義勝平昔所念今則無違旅魂克歸崔生實主㓜穉在側故人撫之敦詩退之各展其分安平來贈禮成而歸其他赴告咸復于素一以誠告君讜聞乎嗚呼痛哉君爲巳矣余爲苟生何以言別長號數聲冀乎異日展我哀誠嗚呼痛哉尚饗爲鄂州李大夫祭柳貟外文嗚呼至人以在生爲傳舎以軒冕爲儻來達於理者未甞惑此昔余與君諭之詳熟孔氏四科罕能相備惟公特立秀出幾於全器才之何豐運之何否大川未濟乃失巨艦長途始半而喪良驥搢紳之倫孰不墮淚昔者與君交臂相得一言一􅀏未始有極馳聲日下騖名天衢射䇿差池髙科齊驅攜手書殿分曹藍曲心志諧同追歡相續或秋月銜觴或春日馳轂甸服載朞同􅂛憲府察視之列斯焉接武君遷外郎子侍内闈出處雖閒音塵不虧勢變時移遭罹多故中復賜環上京良遇曽不踰月君又即路逺持郡符柳江之壖居陋行道疲人歌焉子來夏口忽復三年離索則乆音貺屢傳篋盈草隷架滿文篇鍾索繼美班楊差肩賈誼賦鵩屈原問天自古有死奚論後先痛君未老美志莫宣邅回世路奄忽下泉嗚呼哀哉令妻早謝穉子四歳天喪斯文而君永逝翩翩丹旐來自遐裔聞君旅櫬旣及岳陽寢門一慟貫裂􅂨腸執紼禮乖出疆路阻故人奠觴莫克親舉馳神假夢冀獲晤語平生宻懷願君遣吐遺􅀌之才與不才敢同己子之相許嗚呼哀哉尚饗祭韓吏部文髙山無窮太華削成人文無窮夫子挺生典訓爲徒百家抗行當時勍者皆出其下古人中求爲敵盖寡在貞元中帝鼓薫琴弈弈金馬文章如林君自幽谷􅂛于髙岑鸞鳳一鳴蜩螗革音手持文柄髙視寰海權衡低昂瞻我所在三十餘年聲名塞天公鼎侯碑志隧表阡一字之價輦金如山權豪來侮人虎我䑕然諾洞開人金我灰親親尚舊宜其壽考天人之學可與論道二者不至至者其誰豈天與人好惡背馳昔遇夫子聦明勇􅁬常操利刃開我混沌子長在筆予長在論持矛舉楯卒不能困時惟子厚􅇡言其閒賛詞愉愉固非顔顔磅礴上下羲農以還會於有極服之言逸數句􅄮山威鳳不復鳴華亭別鶴中夜驚畏􅂤書􅀆拘印綬思臨慟􅀆志莫就生芻一束酒一杯故人故人歆此來祭興元李司空文維大和四年月日禮部郎中集賢殿直學士劉禹錫謹以清酌之奠敬祭于故相國山南西道節度使贈司空李公之靈嗚呼􅀛靈而刳龍知而屠古今同之天不可問公之挺生德與位并如瞻日月豈賛其明何以致之姑話平生追懷周旋彌四十年射䇿校文接武聮翩甸服同邑明庭比肩公乗迅飊凌厲非煙愚觸駭機迸落深泉一持化權一謫海壖夲同末異如矢別􅁌雲龍井蛙勢不相見二紀迴泊一朝㑹面公爲故相愚似悲翁契闊相遇淒涼萬重復以郎吏交歡上公披襟道舊劇談命酒清洛泛舟鑿龍攜手公入西􅀜愚亦徴還削去苛禮招邀清間廣陌聮鑣髙臺看山㝷春適野醉舞花閒忽復登壇緫戎于外子午危棧巴梁古岸夷風傖儜獷俗悍害隂謀宻構凶黨千輩如嗾羣犬以逼騶虞如縱炎火以焚瑾瑜時邪命邪不慮不圖物理神道安知有無嗚呼痛哉􅀇天甚髙上訴何時長夜無曉斯焉永歸風淒日昬鼓咽簫悲沈埋玉樹誰不霑衣平生故人零落巳稀委化而盡然猶怨咨如何國禎有此遭罹挺災賦命孰主張之有肴在筵有酒盈巵神其來歆巳矣長辤尚饗代裴相祭李司空文四年月日特進守司空兼門下侍郎平章事裴度謹以清酌少牢之奠敬祭于故相國魏郡公之靈嗚呼玉貞而折不能瓦合鸞鎩而萎不同雞羣生􅀆若浮守道不屈惟公之生福自維嵩金石髙韻珪璋德容元和之初左右憲宗以才視草以望登庸振起直聲激揚清風實有正氣號爲名公名成身退猶係人望入爲羽儀出領藩方旣師百辟又副丞相道冠搢紳事參翼亮度與公遊四十餘年風期合契禄位相先度忝司言公持化權應同宫徴馥若蘭筌猥以姓名稱于上前發迹從微芬芳獲宣度爲免相待罪梁山公拜右揆來從東川極其歡娱著在詩篇度忝三入公亦東還里門相邇賔閣常間退朝休澣道舊開顔嗟乎山川閒之忽在旦夕豈意倉卒遂成今昔衣冠喪氣風物含戚強魂訴天寃血成碧嗚呼哀哉度在病中訃書始至無力以哭不言垂淚今聞裧輤首路而歸隱几臨風其心孔悲嘉肴百籩旨酒一巵􅀉此神素神其來思嗚呼哀哉代諸郎中祭王相國文維大和四年月日某官等敬祭于故相國贈太尉太原王公之靈嗚呼天以和氣鍾於貴人含光不曜煦物如春發自貢士驟爲庭臣鴻鴈聮行共凌青雲旣操利權兼秉國鈞食禄甚厚奉身如貧井絡之隅益部爲大斗牛之下楊州繁㑹受社臨戎油幢曲蓋印綬重疊恩華霶霈簿領如山處之若間搉筦之權往而復還炎炎暐暉出入二紀未曽傷物屢有薦士急難友弟謹厚訓子顔閒熈熈不形愠喜處己無咎得君如此若木方髙盲飊歘起三台之氣變見在時五福之來盛衰有期晚下黃閤車􅀐威遲夕歸華堂言笑嘻怡詰朝愀然有恙求醫未撤琴瑟俄懸素旂宸衷震悼朝右悽悲詔下襃崇恩殊等夷靈轜旣駕眞宅將歸笳簫咽而復揚風日慘而無輝􅀇亮等或早挹清塵或晚承泛愛昔脩禮于門閫今􅆞悲于祖載幽顯雖異音徽未昧神之格思歆此誠酹尚饗祭福建桂尚書文維大和六年月日蘇州刺史劉禹錫謹以清酌之奠敬祭于故福建團練使桂公之靈鵾化鵬征擘波沖天士逢其時捨笈乗軒始識尚書貞元季年詣我南省䄂文一編便坐接語其容温然星歳未幾鄙夫南遷滯留江湘魚鳥周旋尚書遇知變化如蟬秉憲朝右剖符江壖交趾化行容州績宣凡曰循吏莫居我先大和之初再遂良覿分務東洛門里同陌余復郎位公爲賔客蔚然貴臣綬紫鬚白俄俱西還列于清班來訪書殿登樓看山見領八屯循街九􅀜賀遷閩越紅斾􅀟殷克有淑聲搢紳之閒惸􅊔鼓舞強捍低跧延平古津峭壁孱顔豈意龍劒沉晶不還復魄侯堂歸舟建浦􅀟表何在虎丘之下恭承嘉命來牧吾土言念昔遊忽成千古哀哀孝嗣率禮無違言奉几席歸乎洛師敬陳奠筵泣對靈帷平生不志歆此一巵嗚呼哀哉祭􅉑州楊庶子文維大和六年月日蘇州刺史劉禹錫謹遣軍吏某乙具少牢清酌之奠敬祭于故􅉑州楊公之靈嗚呼利劒多缺眞玉喜折俊人不壽爲氣所齧子之少􅀌率性自然早有名字結交丗賢席勢馳聲龍秋鳥屳試文再售毛翮愈鮮歷佐侯藩拾遺君前伏閣論事侵削内權克揚直聲不愠左遷一斥干外君門邈焉五剖竹符皆有聲績南浦濳化巴人啞啞比陽布和戰地盡闢壽春武斷姦吏奪魄滎波砥平士庶同適朝典陟明俾臨夲州錫以貴綬腰金晝遊輿疾而來風煙爲愁靜治三載卧分主憂直氣濳銷頽景不留九天難問萬化同休嗚呼惜哉與君交歡已過三紀維私之愛與衆無比乃命長嗣爲君半子誰無外姻君實知己昔與君遊俱爲壯年怒人言命􅀏人言天閱事未多信書太堅方階尺木已墜九泉誦年易深濳病難痊不見南楚方知北軒嗚呼嗟哉見機不早追悔已晚猶希耇老容或宣展以間相期以晦相勉一丘可樂萬累皆遣圖就散秩婆娑京輦天命不長願言莫展嗚呼痛哉君卧􅀪農余來姑蘇飛書要約言念鼎湖我車載脂爲子疾驅入境閴寂唯逢素書發函驚視翰不自濡相去一舎豈無肩輿君爲病嬰我爲吏拘兩不如意嗟哉命夫君今往矣無復可道我今泛然一委􅀇造平生親友零落太早無望拔茅盡悲宿草到郡浹辰君不起聞寢門一慟其哀如焚彭彭輤車來葬洛濵敬脩􅉠禮泣送行人方丈之羞薦君明魂三赤之板冩予哀文淒涼山河慘淡風雲巳矣長別嗟哉楊君劉夢得外集卷第十
