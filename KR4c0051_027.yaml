front:
  text: 劉夢得文集卷第二十七
  hash: sha256:ab16e403d1a0b669f34426cf0d0fd0852cbdf93590cafa0c7b40df976c2563a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_027-1a}
body:
  text: 記䕫州刺史㕔壁連州刺史㕔壁機汲洗心亭復荆門縣武陵北亭䕫州刺史㕔壁䕫在春秋爲子國楚并爲楚九縣之一秦爲魚復漢爲固陵蜀爲巴東梁爲信州初城于瀼西後周大緫管龍門公柘王述登白帝歎曰此竒勢可居遂移府于今治所是歳建徳五年隋初楊素以越公領緫管又張大之唐興武徳二年詔書其以信州爲夔州七年増名都督府督黔巫一十九郡開元中猶領七州天寶初罷州置郡號雲安至徳二年命嗣道王鍊爲太守賜之旌節統峽中五郡軍事乾元初復爲州偃節于有司第以防禦使爲稱㝷罷以支郡隷江陵按版圖方輸不足當通邑而今秩與上郡齒特以帶蠻夷故也故相國安陽公乾曜甞參軍事修圖經言風俗甚備今以郡國更名之所以然著于壁云凡名殊必以國事建必以年謹始也長慶二年五月一日刺史中山劉某記連州刺史㕔壁此郡於天文與荆州同星分田壤制與番禺相犬牙觀民風與長沙同祖習故甞隷三府中而別合乃今最乆而安得人統也按宋髙祖世始拆郴之桂陽爲小桂郡後以州統縣更名如今其制誼也郡從嶺州從山而縣從其朔邑東望之曰順山由順以降無名而相歆者以萬數回環鬱撓迭髙爭秀西北朝拱于九疑城下之寖曰湟水由湟之外支流而合輸者以百數淪漣泊潏擘山爲渠東南入于海山秀而宣靈液滲漉故石鍾乳爲天下甲歳貢三百銖原鮮而膴卉物柔澤故紵蕉爲三服貴歳貢十笥林富桂檜土宜陶甄故侯居以壯聞石侔琅玕水孕金碧故境物以麗聞環峯密林激淸儲隂海風敺温交戰不勝觸石轉柯化爲涼颸城壓赭岡踞髙負陽土伯嘘濕抵堅而散襲山逗谷化爲鮮雲故罕罹嘔泄之患亟有華皓之齒信荒服之善部而炎裔之涼墟也永貞元年余始以尚書外郎坐黨累出𥙷兹郡居無何吏議以是遷也不足厭其責故道貶爲朗州司馬後十年詔書徴還抵京師俄復前命佩故印綬而南曩之騎竹馬北嚮相傒者咸仕郡縣巾韝來迎下車之日私唁且笑旣視事得前二千石名姓于壁宰臣王晙倖卿劉晃儒官嚴士元聞人韓泰僉拜焉或乆於其治功利存乎人民或不之厥官翹顒載于歌謡余不佞從羣公之後肇武徳距于今凡五十有七人所舉者四君子猶振裘之於領袖焉元和十一年七月二十四日刺史中山劉某記機汲瀕江之俗不飲於鑿而皆飲之流予謫居之明年主人授館于百雉之内江水沄沄周墉閒之一旦有工爰來思以技自賈且曰觀今之室廬及江之涯閒不容畝顧積塊峙焉而前爾請用機以汲俾矗然之狀莫我遏巳予方異其說且命之飭力焉工也儲思環視相靣勢而經營之由是比竹以爲畚寘于流中中植數尺之臬輦石以壯其趾如建標焉索綯以爲縆縻于摽垂上屬數仞之端亘空以峻其勢如張絃焉鍜鐵爲器外廉如鼎耳内鍵如樂鼓牝牡相函轉於兩端走于索上且受汲具及泉而循綆下縋盈器而圎軸上引其往有建瓴之駃其來有推轂之易瓶繘不羸如搏而昇枝長瀾出髙岸拂林抄踰峻防刳蟠木以承澍貫脩筠以逹脉走下潺潺聲寒空中通洞環折唯用所在周除而沃盥以蠲入爨而錡釡以盈餁餗之餘移用于湯沐濯澣之末泄注于圃畦雖瀵湧于庭莫尚其霈洽也昔予甞登陴􅍀然念懸流之莫可遽挹方勉保庸督臧獲㪺而挈之至于裂肩龜手然猶家人視水如酒醪之貴今也一任人之智又從而信之機發于冥冥而形於用物浩溔東流赴海爲期斡而遷焉逐我頥指曏之所謂阻且艱者莫能髙其髙而深其深也觀夫流水之應物植木之善建繩以柔而有立金以剛而無固軸卷而能舒竹圎而能通合而同功斯所以然也今之工咸盜其古先工之遺法故能成之不能知所以爲成也智盡于一端功止于一名而已噫彼經始者其取諸小過歟洗心亭天下聞寺數十輩而吉祥尤章章蹲名山俯大江荆吳雲水交錯如繡始予以不到爲恨今方弭所恨而充所望焉旣周覽讃嘆於竹石間最竒處得新亭形焉如巧人畫鼇背上物即之四顧逺邇細大雜然陳乎前引人目去来瞬不得徴其經始曰僧義然嘯侣爲工即山求材盤髙孕虚萬景坌來詞人處之思出常格禪子處之遇境而寂憂人處之百慮冰息鳥思猿清繞梁歷欀月來松閒雕鏤軒墀石列筍􅙇藤蟠蛟螭脩竹萬竿夏含涼颸斯亭之實録云爾然上人舉如意挹我曰旣志之盍名之以行乎逺夫余始以是亭圜視無不適始適乎目而方寸爲清故名洗心長慶四年九月二十三日劉某記復荆門縣直故郢北走之道其聚邑曰荆門揭起重關殿于樂都名視縣内之制居殷形束之要故吏師重焉通外民之底貢㑹南藩之述職故賔禮蕃焉其肇允經營實王孫昌䕫居荆以表之命行名建而締構之弗暇無幾何有由勇爵而授赤社于兹者徼馳名於省嗇謂相㳂爲非智因請罷去其號發踐更以董之有司不能端究事夲循空言而可其奏繇是分地征以歸他邑野人有回逺之歎廢文吏而顓戍督行旅有誰何之囏是利之不及下也黎民病之自鄢而南斯爲畫疆抵郡之路貫其七舎持瑞節而銜急宣之使蓋隂相交遂使服縵胡者備問俗之對執刀匕者申餼牽之禮是敬之不及賔也君子病之如是幾二十歳距永貞元年江陵尹裴公政成上游德及矜人大建長利俾無遺害乃外濟羣欲内張全摹周圖經制條白于狀昌言旣從公議攸同忘勞之徒樂用之工載大其門載髙其墉徑術脉分闤閭架空然後㭊便地以肥之建具官以司之糜羨財以償其力役汰冗食以資其秩稍田里不聞於徴令縣官無減於歳入越某月旣成而落之官修其方人樂其居將迎犒飲之儀展廐置符繻之事舉戍夫有伍公吏有職由彚而分率無踰閑入其封者可以知教元和元年四海㑹同天子命公師長南宫三年公以介圭入覲途出斯邑邑人之華皓㓜童咸湏王道周距躍而謡曰起我堙廢而完之倈我蕩析而安之昔室于墟風揺雨濡自公優柔郛閉盈兮昔飲于洿夏溷冬枯自公感通觱沸生兮淑旂之華兮四牡之騑傒公之還兮觴以祝之却略蹁跉百形一音公爲駐錯衡而勞之有以文從公者紀事于牘且曰民可懷也盍命夫學舊史之事以志焉公不得讓而從之走是以有授簡之辱初公以縣之之便聞于上也禹錫方以郎位帖職干計曹章下之日得以省事逮今以遷人獲宥于善部工休之日得以踐履故於拜命無牢讓於傳信無愧詞以爲古之創物建庸宜于人民而得其時者則必謌其事功爲後代法雅有營謝美召伯也傳稱城沂賢蔿敖也賦水泉原隰之狀志慮事命日之規當書而詠之細亦弗可略也是用謹其夲始而存乎篇俾後之視今者知楚郊之令典云武陵北亭郡北有短亭繇舊也亭孤其名地藏其勝前此二千石全然見之建言而莫踐去之日率遺恨焉七年冬詔書以竹使符授尚書水曹外郎竇公常曰命爾爲武陵守莅止三月以碩畫佐元侯平裔夷降渠魁又三月以順令率蒸民増水坊表火道是歳大穰明年政成農縁畝以勇勸工執技以思賈因民之餘力乗日之多暇乃顧其屬曰郊道有候亭示賔以不慁也雅聞兹地韜美未發豈有待耶自吾之治于斯也購徒庀材大起堙廢未甞殖私庭礱燕寢役必先公人不余瑕調賦幸均矣城池幸完矣而重浹辰之役掠苟簡之問卒使勝躅冒没猶璞而不攻懼換符之日還復賷恨無乃遺誚於來者乎言得其宜智愚同賛於是撤故材以移用相便地而居要去凡木以顯珍茂汰汚池以通淪漣自天而勝者列於騁望由我而美者生於頥指箕張筵楹股引房櫳斧斤息響風物異態大道出乎左藩澄湖浸乎前垠仙舟祖軷繇是區處九月壬午工告休亭長受成赤車威遲于以落之肅賔而入圜視有適沈水北澳陽山南麓耽焉蘧蘧雄殿郊隅前軒舒楊朱檻環之舞衣回旋樂簴參差北廡延隂外阿旁注芊眠清泚羅入洞戸初筵循平雕俎靜嘉林風天籟與金奏合亦旣醉止州從事舉白而言曰室成于私古有發焉矧成于公庸敢無詞觀乎棼楣有嚴丹雘相宣象公之文律曄然而光也望之弘深即之坦夷象公之酒徳温然而逹也庭芳萬夲跗蕚交映如公之家肥熾而昌也門闢戸闔連機㢮張似公之政經便而通也因髙而基因下而池躋其髙可以廣吾視泳其清可以濯吾纓俯于逵惟行旅謳吟是采瞰于野惟稼穡艱難是知雲山多狀昬旦異候百壷先韋之餞迎退食私辰之宴嬉觀民風於嘯詠之際展宸戀於天雲之末動合于誼匪唯寫憂公曰夫言之必可書者公言也從事不以私視予余從而讓之是自還也其可乎迺授簡于放臣俾書以示後後之思公者雖貫叢葽草尚勿剪拜矧翬飛之華然石刻之隱然歟劉夢得文集卷第二十七
