front:
  text: 劉夢得文集卷第二十四
  hash: sha256:3ec58c5ec71f140fd7f9263a5bd65a7bc653396845d6ea623fb11f902e89ebcc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0051_SBCK_024-1a}
body:
  text: 雜著鑒藥訊甿嘆牛儆舟原力說驥述病因論七篇序子劉子間居作因論或問其旨曷歸歟對曰因之爲言有所自也夫造端乎無形垂訓於至當其立言之徒放詞乎無方措旨於至適其寓言之徒蒙之智不逮于是造形而有感因感而有辭匪立匪寓以因爲目因論之㫖也云爾鑒藥劉子間居有負薪之憂食精良弗知其旨血氣交沴煬然焚如客有謂予子疾病積日矣乃今我里有方士淪跡於醫厲者造焉而美肥跛者造焉而善馳矧常病雅將子詣諸予然之之醫所切脉觀色聆聲參合而後言曰子之病其興居之節舛衣食之齊去乖所由致也今夫藏鮮能安榖府鮮能母氣徒爲美疹之囊橐爾我能攻之乃出藥一丸可兼方寸以授余曰服是足以瀹昬煩而鉏藴結銷蠱慝而歸耗氣然中有毒須其疾瘳而止過當則傷和是以微其齊去也予受藥以餌過信而膇能輕痺能和渉旬而苛癢絶焉抑搔罷焉踰月而視分纎聽察微蹈危如平嗜糲如精或聞而慶予且關言曰子之獲是藥幾神乎誠難遭巳顧醫之態多嗇術以自貴遺患以要平財盍重求之所至益深矣予昧者也泥通方而狃旣効猜至誠而惑勦說卒行其言逮再餌半旬厥毒果肆岑岑周體如痁瘧焉悟而走諸醫醫大咤曰吾固知夫夫未逹也促和蠲毒者投之濵於殆而有喜異日進和藥乃復初劉子慨然曰善哉醫乎用毒以攻疹用和以安神易則兩躓明矣茍循往以御變昧於節宣奚獨吾儕小人理身之弊而己訊甿劉子如京師過徐之右鄙其道旁午有甿増増扶斑白挈覊角齎生器荷農用摩肩而西僕夫告予曰斯宋人梁人毫人潁人之逋者今復矣予愕而訊云予聞隴西公暢轂之止方踰月矣今爾曹之來欣欣然似恐後者其聞有勞倈之簿歟蠲復之條歟振贍之術歟碩䑕亡歟瘈狗逐歟曰皆未聞也且夫浚都吾政之上游也自巨盜間舋而武臣顓焉牧守由將校以授皆虎而冠子男由胥徒以出皆鶴而軒故其上也子視卒而芥視民其下也􅋧其理而蛑其賦民弗堪命是軼于他土然咸重遷也非阽危擠壑不能違之曩者雖歸歟成謡而故態相㳂莫我敢復今聞吾帥故爲丞相也能清淨畫一必能以仁蘇我矣其佐常宰京邑也能誅鉏豪右必能以法衞我矣奉斯二必而來歸惡待事實之及也予因浩歎曰行積於彼而化行於此實未至而聲先馳聲之感人若是之速歟然而民知至至矣政在終終也甞試論聲實之先後曰民黠政頗須理而後勸斯實先聲後也民離政亂須感而後化斯聲先實後也立實以致聲則難在經始由聲以循實則難在克終操其柄者能審是理俾先後終始之不失斯誘民孔易也嘆牛劉子行其野有叟牽跛牛于蹊偶問焉何形之瑰歟何足之病歟今觳觫然將安之歟叟攬縻而對云瑰其形飯之至也病其足役之過也請爲君畢詞焉我僦車以自給甞驅是牛引千鈞北登太行南並商嶺一作顔掣以回之叱以聳之雖渉淖躋髙轂如蓬而輈不憤乃今廢矣顧其足雖傷而膚尚腯以畜豢之則無用以庖視之則有贏伊禁焉莫敢尸也甫聞邦君饗士卜剛日矣是往也當要平聲售於宰夫余尸之曰以叟言之則利以牛言之則悲若之何予方窶且無長物願解裘以贖將置諸豐草之郷可乎叟辴然而咍曰我之沽是屈指計其直可以持醪而囓肥飴子而衣妻若是之逸也奚事裘爲且昔之厚其生非愛之也利其力今之致其死非惡之也利其財子惡乎落吾事劉子度是叟不可用詞屈乃以杖扣牛角而嘆曰所求盡矣所利移矣是以貟能覇吳屬鏤賜斯旣帝秦五刑具長平威振杜郵死陔下敵擒鍾室誅皆用盡身賤功成禍歸可不悲哉可不悲哉嗚呼執不匱之用而應夫無方使時宜之莫吾害也苟拘於形器用極則憂明巳儆舟劉子浮于汴渉淮而東亦旣釋紼纚榜人告予曰方今湍悍而舟盬宜謹其具以虞焉予聞言若厲繇是袽以窒之灰以墐之㪺以乾之僕怠而躬行夕惕而晝勤景霾晶而莫進風異響而遄止兢兢然累辰是用獲濟偃檣弭櫂次于淮隂於是舟之工咸沛然自暇自逸或遊肆而觴矣或拊橋而歌矣隷也休役以尚寢矣吾曹無虞以宴息矣逮夜分而窾隙濳澍渙然隂潰至乎淹簀濡薦方卒愕傳呼跣跳登坵僅以身脫目未及瞬而樓傾軸墊圯于泥沙力莫能支也劉子然目視而言曰曏予兢愓也汨洪波而無害今予宴安也蹈常流而致危畏之途果無常所哉不生所畏而生於所易也是以越子膝行吳君忽晉宣尸居魏臣怠白公厲劔子西哂李園養士春申易至于覆國夷族可不儆哉嗚呼禍福之肧胎也其動甚微倚伏之矛楯也其理甚明困而後儆斯弗及巳原力劉子于邁舟次泗濵維䋏邇之于傳傳吏適傳呼曰乗馹者方來誰何之則曰力人也雅以力聞於吴楚間中貴人器之謂宜爲爪士獻言于上有旨趣音促如京師頃其至則仡然五輩咸碩其體毅其容動睛曄如曵趾岌如顧瞻低回飲啜有聲泗濵守伾由將授也恱而勞之饗以太牢飲以百壷酒酣氣振求試自矜傍如無人中若有憑有盪舟如㳂者抉鼎如飛者綯鍵如麻者開兩弧而脉不僨者屣巨石而齊如流者異哉果以力駭丗而聞于上也異日話於儒家者流有客悱然自奮曰斯誠力矣上之不過誇胡人而戲角抵次之不過倅期門而振袀服我之力異然以道用之可以格三苗而賔左衽以威用之可以係六蠻而斷右臂由是而言彼力也長雄於匹夫然猶馹其騑餼其食我力也無敵於天下亦當蒲其輪鶴其書矣予詰之曰彼之力用於形者也子之力用於心者也形近而易見心逺而難明理乎而言則子之力大矣時乎而言則彼力大矣且夫小大迭用曷常哉彼固有小矣子固有大矣予所不能齊也客於邑垂涕洟劉子解之曰屠羊于肆適味於衆口也攻玊于山俟知於獨見也貪日得則鼓刀利要歳計而韞匵多客聞之破涕曰吾方俟多於歳計也歳歟歳歟其我與歟說驥伯氏佐戎于朔陲獲良馬以遺予予不知其良也秣之稊粃飲之汚池廐櫪也上痺而下蒸羈絡也綴索而續韋其易之如此予方病且窶求沽于肆肆之駔亦不知其良也評其價六十緡將劑矣有裴氏子嬴其二以求之謂善價也卒與裴氏裴所善李生雅挾相術於馬也尤工覩之周體咍然視听然笑旣而抃隨之且曰乆矣吾之不覯於是也是何柔心勁骨竒精妍態宛如鏘如曄如翔如之備邪今夫之徳也全然矣顧其維駒藏銳于内且秣之乖方是用不恱于常目須其齒備而氣振平則衆美灼見上可以獻帝閑次可以鬻千金裴也聞言竦焉遂儆其㒒蠲其皁筐其惡蜃其溲以美薦秣以薌粒起之居之澡之挋音震之無分隂之怠斯以馬養養馬之至分也居無何果以驥徳聞客有唁予以喪其寶且譏其所貿也微予洒然曰始予有是馬也予常馬畜之今予易是馬也彼寶馬畜之寶與常在所遇爾且夫昔之翹陸也謂將蹄將齧柢以撾䇿不知其籋雲爾昔之嘘吸也謂爲疪爲癘投以藥石不知其噴玊爾夫如是則曠日歷月將頓踣是以曽何寶之有焉繇是而言方之於士則八十其緡也不猶愈於五羖皮乎客謖而竦予遂言曰馬之徳也存乎形者也可以目取然猶違之若此矧徳藴于心者乎斯從古之歎予不敢嘆述病劉子甞渉暑而征熱攻于腠以致病其僕也告痡亦莫能興逮浹日予有瘳醫診之曰疾幸閒矣顧熱沴而未平有遺類焉宜謹於攝衞攝衞之乖方則病復矣所苦旣微而怠其說倦眠于衾而興焉倦隱几而歩焉靣不能罷頮髮不能捐擳口不能忘味心不能無思如是未移日而疾也瘮踈錦反如覆癏于躬進藥求汗凡三渙然後目能視旣分則嚮時之僕巳睆一作睨然執杯圈侍予于前矣予訝而曰曩吾與若也病偕呻也謼也若酷而吾微藥也餌也吾殷而若簿何患之同而痊之異哉㒒諄諄而荅云己之被病也兀然而無知有一作其間也亦兀然而無知髮蓬如而忘乎亂靣黔如而忘乎垢洎疾之殺也雖飲食是念無滑甘之思日致復初亦不自知也予喟然嘆曰始予有斯㒒也命之理畦則𬞞荒主庖則味乖顓廐則馬瘠常謂其無適能適乃今以兀然而賢我逺甚利與鈍果相長哉㒒更矣劉子遂言曰樂於用則豫章貴厚其生則社櫟賢唯理所之曽何膠於域也劉夢得文集卷第二十四
